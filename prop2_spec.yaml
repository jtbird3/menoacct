number: 2
title: "Euclid I.2 — To place at a given point a straight line equal to a given straight line"
enunciation: "To place at a given point (as an extremity) a straight line equal to a given straight line."
conclusion: "Congratulations! You have completed Euclid's Elements Book I, Proposition 2."
viewbox: "0 0 800 470"
initial_visible:
  - dc-given

# ── SVG canvas ────────────────────────────────────────────────────────────────
