{% extends "base.html" %}
{% block title %}Admin — Menochat{% endblock %}
{% block content %}
<h1>Admin access</h1>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/admin/login">

</form>
{% endblock %}
