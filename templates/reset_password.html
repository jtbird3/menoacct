{% extends "base.html" %}
{% block title %}Reset password — Menochat{% endblock %}
{% block content %}
<h1>Reset password</h1>

{% if expired %}
<p>This reset link has expired or already been used.</p>
<p style="margin-top:16px;font-size:13px;"><a href="/forgot-password">Request a new link</a></p>
{% else %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/reset-password/{{ token }}">
  <div class="field">
    <label>new password</label>
    <input type="password" name="password" required autocomplete="new-password" minlength="8">
  </div>
  <div class="field">
    <label>confirm password</label>
    <input type="password" name="confirm" required autocomplete="new-password" minlength="8">
  </div>
  <button class="btn" type="submit">&gt; Set new password</button>
</form>
{% endif %}
{% endblock %}
