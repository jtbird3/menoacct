{% extends "base.html" %}
{% block title %}Log in — Menochat{% endblock %}
{% block content %}
<h1>Menochat Masters</h1>

{% if error %}<div class="error">{{ error }}</div>{% endif %}

<form method="post" action="/login">
  <div class="field">
    <label>username</label>
    <input type="text" name="username" required autocomplete="username" spellcheck="false">
  </div>
  <div class="field">
    <label>password</label>
    <input type="password" name="password" required autocomplete="current-password">
  </div>
  <div class="field" style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <input type="checkbox" name="remember" id="remember" value="1" style="width:auto;margin:0;">
    <label for="remember" style="display:inline;font-size:12px;opacity:.5;margin:0;">remember me for 90 days</label>
  </div>
  <button class="btn" type="submit">&gt; Log in</button>
</form>
<p style="margin-top:16px;font-size:13px;">No account? <a href="/signup">&gt; Sign up</a></p>
<p style="margin-top:8px;font-size:13px;"><a href="/forgot-password">Forgot password?</a></p>
{% endblock %}
