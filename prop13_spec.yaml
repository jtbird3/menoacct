steps:
- type: yn
  q: Let AB be a straight line set up on the straight line CD, making the adjacent
    angles CBA and ABD. Do you see that setup in the figure?
  false: CD is the horizontal straight line through B, and AB is the slanting line
    rising from B to A. Those form the adjacent angles CBA and ABD.
  text: Let any straight line AB set up on the straight line CD make the angles CBA,
    ABD.
  just: null
  side: 'Given: AB set up on CD'
  reveal:
  - dc-angles
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: yn
  q: And Euclid's claim is that these two angles are either two right angles or equal
    to two right angles. Does that make sense as the goal?
  false: Yes. We want to show that the two adjacent angles together make a straight
    angle, that is, two right angles.
  text: I say that the angles CBA, ABD are either two right angles or equal to two
    right angles.
  just: null
  side: 'Goal: the two angles make two right angles'
  reveal: []
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: open
  q: If the angle CBA is equal to the angle ABD, what follows at once?
  criteria: Then they are two right angles.
  hint: Definition 10 says that when a line standing on another makes the adjacent
    angles equal, each is a right angle.
  hint_linked_idx: null
  display_linked_idx: null
  text: Now, if the angle CBA is equal to the angle ABD, they are two right angles.
  just: Def. 10
  side: If equal, both are right
  reveal: []
  ok_regex: two right|right angles?|both right|each right
  ok_targets:
  - two right
  - right
  - both
  - each
- type: draw
  q: But if not, let BE be drawn from B at right angles to CD. Shall we draw that
    perpendicular?
  false: null
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
  text: But, if not, let BE be drawn from the point B at right angles to CD.
  just: I.11
  side: Draw BE perpendicular to CD
  reveal:
  - dc-e
- type: yn
  q: Since BE is at right angles to CD, are the angles CBE and EBD two right angles?
  false: Yes. BE makes a right angle with BC and also with BD, so the two adjacent
    angles CBE and EBD are two right angles.
  text: Therefore the angles CBE, EBD are two right angles.
  just: Def. 10
  side: ∠CBE and ∠EBD are two right angles
  reveal:
  - dc-rights
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: open
  q: Why is the angle CBE equal to the two angles CBA and ABE together?
  criteria: Because BA lies within angle CBE, so angle CBE is split into the two adjacent
    angles CBA and ABE.
  hint: The ray BA sits inside the right angle from BC to BE, dividing it into two
    smaller adjacent angles.
  hint_linked_idx: null
  display_linked_idx: null
  text: Then, since the angle CBE is equal to the two angles CBA, ABE,
  just: null
  side: ∠CBE = ∠CBA + ∠ABE
  reveal:
  - dc-split-left
  ok_regex: cbe.*cba.*abe|cba.*abe.*cbe|split|divid|inside|adjacent|^\s*add\s*$|^\s*together\s*$|^\s*both\s*$
  ok_targets:
  - CBE
  - CBA
  - ABE
  - split
  - divide
  - inside
  - adjacent
  - add
  - together
  - both
- type: open
  q: If the angle EBD is added to each side of that equality, what follows?
  criteria: The angles CBE and EBD together are equal to the three angles CBA, ABE,
    and EBD.
  hint: 'Use Common Notion 2: if equals are added to equals, the wholes are equal.'
  hint_linked_idx: 5
  display_linked_idx: null
  text: Let the angle EBD be added to each; therefore the angles CBE, EBD are equal
    to the three angles CBA, ABE, EBD.
  just: C.N. 2
  side: Add ∠EBD to both
  reveal:
  - dc-sum-left
  ok_regex: cbe.*ebd.*cba.*abe.*ebd|three angles|add|equal.*same
  ok_targets:
  - CBE
  - EBD
  - CBA
  - ABE
  - three
  - add
  - equal
- type: open
  q: And why is the angle DBA equal to the two angles DBE and EBA together?
  criteria: Because BE lies within angle DBA, splitting it into the adjacent angles
    DBE and EBA.
  hint: The ray BE stands inside the larger angle from BD to BA.
  hint_linked_idx: null
  display_linked_idx: null
  text: Again, since the angle DBA is equal to the two angles DBE, EBA,
  just: null
  side: ∠DBA = ∠DBE + ∠EBA
  reveal:
  - dc-split-right
  ok_regex: dba.*dbe.*eba|dbe.*eba.*dba|split|divid|inside|adjacent|^\s*add\s*$|^\s*together\s*$|^\s*both\s*$
  ok_targets:
  - DBA
  - DBE
  - EBA
  - split
  - divide
  - inside
  - adjacent
  - add
  - together
  - both
- type: open
  q: If the angle ABC is added to each side of that equality, what follows?
  criteria: The angles DBA and ABC together are equal to the three angles DBE, EBA,
    and ABC.
  hint: 'Again use Common Notion 2: adding the same angle to equals gives equal wholes.'
  hint_linked_idx: 7
  display_linked_idx: null
  text: Let the angle ABC be added to each; therefore the angles DBA, ABC are equal
    to the three angles DBE, EBA, ABC.
  just: C.N. 2
  side: Add ∠ABC to both
  reveal:
  - dc-sum-right
  ok_regex: dba.*abc.*dbe.*eba.*abc|three angles|add|equal.*same
  ok_targets:
  - DBA
  - ABC
  - DBE
  - EBA
  - three
  - add
  - equal
- type: open
  q: Since the angles CBE and EBD were also proved equal to the same three angles,
    what can we conclude?
  criteria: The angles CBE and EBD are equal to the angles DBA and ABC.
  hint: Things equal to the same thing are equal to one another.
  hint_linked_idx: 8
  display_linked_idx: null
  text: But the angles CBE, EBD were also proved equal to the same three angles; and
    things which are equal to the same thing are equal to one another; therefore the
    angles CBE, EBD are also equal to the angles DBA, ABC.
  just: C.N. 1
  side: Both equal the same thing
  reveal:
  - dc-same-three
  ok_regex: cbe.*ebd.*dba.*abc|same thing|equal to one another|cn\.? ?1
  ok_targets:
  - CBE
  - EBD
  - DBA
  - ABC
  - same
  - equal
  - C.N. 1
- type: open
  q: But the angles CBE and EBD are two right angles. Therefore what follows about
    the angles DBA and ABC?
  criteria: The angles DBA and ABC are also equal to two right angles.
  hint: Replace CBE and EBD by their equal pair DBA and ABC.
  hint_linked_idx: 9
  display_linked_idx: null
  text: But the angles CBE, EBD are two right angles; therefore the angles DBA, ABC
    are also equal to two right angles.
  just: null
  side: ∠DBA + ∠ABC = two right angles
  reveal:
  - dc-result
  ok_regex: dba.*abc.*two right|two right.*dba.*abc|right angles?
