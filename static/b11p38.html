<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.38</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.38 – Prove that if the sides of the opposite planes of a cube be bisected, and planes be carried through the points of section, the common section of the planes and the diameter of the cube bisect one another.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.38 chatbot!

We are given a cube AF. Do you agree? (yes/no):`,
    hint: `A cube has six square faces and equal edges.` },

  { q: `The opposite planes of the cube are CF and AH. Agreed? (yes/no):`,
    hint: `Opposite planes do not share an edge.` },

  { q: `The sides of these opposite planes are bisected at points K, L, M, N, O, Q, P, R. Do you accept this? (yes/no):`,
    hint: `Each edge is cut into two equal parts.` },

  { q: `Through the points K and N, let a plane KN be carried. Is this allowed? (yes/no):`,
    hint: `A plane may be drawn through given points.` },

  { q: `Through the points O and R, let another plane OR be carried. Possible? (yes/no):`,
    hint: `Again, a plane can be drawn through given points.` },

  { q: `Let US be the common section of the two planes. Do you see that such a line exists? (yes/no):`,
    hint: `Two planes intersect in a straight line.` },

  { q: `Let DG be the diameter of the cube AF. Agreed? (yes/no):`,
    hint: `The diameter joins opposite vertices of the cube.` },

  { q: `Our goal is to show that UT equals TS, and DT equals TG. Does that make sense? (yes/no):`,
    hint: `We want to show each line is cut into two equal parts.` },

  { q: `Join DU, UE, BS, and SG. Can we do this? (yes/no):`,
    hint: `A straight line can be drawn from any point to any point.` },

  { q: `Since DO is parallel to PE, are the alternate angles DOU and UPE equal? (yes/no):`,
    hint: `Parallel lines make equal alternate angles (I.29).` },

  { q: `Is DO equal to PE, and OU equal to UP? (yes/no):`,
    hint: `They are equal halves of equal edges of the cube.` },

  { q: `Do these equal sides contain equal angles? (yes/no):`,
    hint: `The angles were just shown equal.` },

  { q: `From this, are triangles DOU and PUE equal? (yes/no):`,
    hint: `Two sides and the included angle are equal (I.4).` },

  { q: `Therefore, is angle OUD equal to angle PUE? (yes/no):`,
    hint: `Corresponding angles of equal triangles are equal.` },

  { q: `From this, is DUE a straight line? (yes/no):`,
    hint: `Adjacent equal angles forming a straight angle imply collinearity (I.14).` },

  { q: `By the same reasoning, is BSG also a straight line, and is BS equal to SG? (yes/no):`,
    hint: `The same construction applies symmetrically.` },

  { q: `Now, is CA equal and parallel to DB? (yes/no):`,
    hint: `Opposite edges of a cube are equal and parallel.` },

  { q: `Is CA also equal and parallel to EG? (yes/no):`,
    hint: `These are corresponding edges of parallel faces.` },

  { q: `Therefore, is DB equal and parallel to EG? (yes/no):`,
    hint: `Things equal and parallel to the same thing are equal and parallel (XI.9).` },

  { q: `Do the straight lines DE and BG join their extremities? (yes/no):`,
    hint: `Each joins endpoints of the parallel segments.` },

  { q: `Therefore, is DE parallel to BG? (yes/no):`,
    hint: `Straight lines joining equal and parallel lines are parallel (I.33).` },

  { q: `Are the alternate angles EDT and BGT equal? (yes/no):`,
    hint: `Alternate angles between parallels are equal (I.29).` },

  { q: `Is the angle DTU equal to the angle GTS? (yes/no):`,
    hint: `Vertically opposite angles are equal (I.15).` },

  { q: `Do triangles DTU and GTS have two angles equal to two angles? (yes/no):`,
    hint: `We have just identified both angle pairs.` },

  { q: `Is DU equal to GS? (yes/no):`,
    hint: `They are halves of DE and BG respectively.` },

  { q: `Do the triangles therefore have one side equal to one side, subtending an equal angle? (yes/no):`,
    hint: `This matches the condition of Proposition I.26.` },

  { q: `From this, do the remaining sides correspondingly become equal? (yes/no):`,
    hint: `Triangles equal in this way have equal remaining sides.` },

  { q: `Therefore, is DT equal to TG, and UT equal to TS? (yes/no):`,
    hint: `Each line is bisected at the intersection point.` }
]

const conclusion = `Congratulations! You just if the sides of the opposite planes of a cube be bisected, and planes be carried through the points of section, the common section of the planes and the diameter of the cube bisect one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
