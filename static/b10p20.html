<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.20 – Prove that if a rational area is applied to a rational straight line, the breadth produced is a straight line rational and commensurable in length with that straight line.</h1><div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.20 chatbot!

We are given a rational area AC applied to a straight line AB, which is rational in one of the stated ways. Do you agree? (yes/no):`,
hint: `AC is given as a rational area, and AB is given as a rational straight line.` },
{ q: `This application of the area AC to AB produces a breadth BC. Do you see that BC is the breadth? (yes/no):`,
hint: `In an application of an area to a line, the breadth is the line perpendicular to the base.` },
{ q: `Our goal is to show that BC is rational and commensurable in length with BA. Does that make sense? (yes/no):`,
hint: `We want to prove both rationality and commensurability with AB.` },
{ q: `On the straight line AB, let a square AD be described. Is this construction allowed? (yes/no):`,
hint: `A square can be described on any straight line by earlier propositions.` },
{ q: `Is the square AD a rational area? (yes/no):`,
hint: `A square on a rational straight line is rational (Book X, Definition 4).` },
{ q: `Is the area AC also rational, as given? (yes/no):`,
hint: `AC was stated to be a rational area from the beginning.` },
{ q: `Since both DA and AC are rational areas, are they commensurable with one another? (yes/no):`,
hint: `Rational areas are commensurable with one another.` },
{ q: `Is it true that as DA is to AC, so DB is to BC? (yes/no):`,
hint: `This follows from Proposition VI.1, relating corresponding sides of equal-area rectangles.` },
{ q: `If DA is commensurable with AC, does it follow that DB is commensurable with BC? (yes/no):`,
hint: `By Book X, Proposition 11, proportional magnitudes preserve commensurability.` },
{ q: `Is DB equal in length to BA? (yes/no):`,
hint: `DB is a side of the square described on AB.` },
{ q: `If DB is commensurable with BC and DB equals BA, does it follow that BA is commensurable with BC? (yes/no):`,
hint: `Things equal to the same thing may be substituted in commensurability relations.` },
{ q: `Is AB rational, as given? (yes/no):`,
hint: `AB was stated to be a rational straight line.` },
{ q: `If AB is rational and commensurable with BC, does it follow that BC is also rational? (yes/no):`,
hint: `A straight line commensurable in length with a rational straight line is itself rational.` },
{ q: `Therefore, have we shown that BC is rational and commensurable in length with AB? (yes/no):`,
hint: `This is exactly what was required to be demonstrated.` }
]





const conclusion = `Congratulations! You just proved that if a rational area is applied to a rational straight line, the breadth produced is a straight line rational and commensurable in length with that straight line.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
