<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.1 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.1 - Fit a line less than the diameter into a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.1 chatbot!

We are given a circle ABC, and a straight line D less than or equal to the diameter of the circle. Do you agree? (yes/no):`,
    hint: `The problem requires D to be no longer than the circle's diameter.` },
  { q: `Our goal is to fit into the circle a chord equal to D. Does that make sense? (yes/no):`,
    hint: `To “fit” means to draw a chord inside the circle matching D in length.` },
  { q: `First, draw a diameter BC of the circle ABC. Can we do that? (yes/no):`,
    hint: `A diameter is a straight line through the center of the circle ending on both sides of the circumference.` },
  { q: `If BC equals D, is the task already complete? (yes/no):`,
    hint: `Then BC itself is the required chord equal to D.` },
  { q: `But if BC is greater than D, can we set off CE equal to D on BC? (yes/no):`,
    hint: `From a greater line we can cut off a part equal to a lesser (Proposition I.3).` },
  { q: `Next, with center C and radius CE, can we draw the circle EAF? (yes/no):`,
    hint: `Postulate 3 allows us to draw a circle with any center and radius.` },
  { q: `Now, join CA. Possible? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Since C is the center of circle EAF, is CA equal to CE? (yes/no):`,
    hint: `All radii of a circle are equal.` },
  { q: `But CE equals D. Does it follow that CA equals D? (yes/no):`,
    hint: `By substitution, if CE = D and CA = CE, then CA = D.` },
  { q: `Therefore, have we fitted CA, a chord of circle ABC, equal to the given straight line D? (yes/no):`,
    hint: `Yes, CA lies in circle ABC and equals D.` }
];

const conclusion = `Congratulations! You just fitted a line less than the diameter into a given circle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
