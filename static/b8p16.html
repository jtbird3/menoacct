<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.16</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.16 — Prove that if one square number does not measure another, then their sides do not measure one another; and if the sides do not measure one another, the squares do not measure one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.16 chatbot!

We are given two square numbers A and B, with C and D as their respective sides. Do you agree? (yes/no):`,
    hint:`A and C correspond as square and side; likewise B and D.` },

  { q:`Our goal is to show: If A does not measure B, then C does not measure D; and if C does not measure D, then A does not measure B. Does that make sense? (yes/no):`,
    hint:`The proposition states a two-way implication between numbers and their sides.` },

  { q:`First direction: if A does not measure B, then C does not measure D. We assume A does not measure B. Agreed? (yes/no):`,
    hint:`“Not measure” means A is not a divisor of B.` },

  { q:`Suppose, for contradiction, that C does measure D. Can we suppose that? (yes/no):`,
    hint:`Euclid argues by assuming the opposite in order to refute it.` },

  { q:`If C measures D, must A then measure B by VIII.14? (yes/no):`,
    hint:`In Book VIII, Prop. 14 states that if the sides of square numbers measure, then the squares measure.` },

  { q:`But A does not measure B, correct? (yes/no):`,
    hint:`This contradicts the implication from VIII.14.` },

  { q:`Therefore, can C measure D? (yes/no):`,
    hint:`A false consequence shows the assumption must be false.` },

  { q:`Second direction: We want to show that if C does not measure D, then A does not measure B. Now assume C does not measure D. Agreed? (yes/no):`,
    hint:`Now we begin the converse argument.` },

  { q:`Suppose, for contradiction, that A does measure B. May we suppose this? (yes/no):`,
    hint:`Again, Euclid assumes the contrary to show it fails.` },

  { q:`If A measures B, must C then measure D by VIII.14? (yes/no):`,
    hint:`If the squares measure, the sides measure.` },

  { q:`But C does not measure D, as we assumed. Is that correct? (yes/no):`,
    hint:`This contradicts the implication from VIII.14.` },

  { q:`Therefore, if C does not measure D, is it impossible for A to measure B? (yes/no):`,
    hint:`Again, a contradiction shows the assumption fails.` }
]













const conclusion = `Congratulations! You just proved that if one square number does not measure another, then their sides do not measure one another; and if the sides do not measure one another, the squares do not measure one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
