<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.21</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.21 — Prove that numbers prime to one another are the least of those which have the same ratio with them</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.21 chatbot!

We are given two numbers A and B, and they are prime to one another. Do you agree? (yes/no):`,
hint: `Prime to one another means they have no common measure except an unit (1).` },
{ q: `Our goal is to show that A and B are the least numbers having the same ratio as A:B. Does that make sense? (yes/no):`,
hint: `“Least” means no smaller pair of numbers has the same ratio.` },
{ q: `Suppose, for the sake of argument, that there exist smaller numbers C and D having the same ratio as A and B. Do you follow? (yes/no):`,
hint: `We assume C < A and D < B, yet C:D = A:B.` },
{ q: `Since C and D are least among numbers with that ratio, must C measure A as many times as D measures B? (yes/no):`,
hint: `Proposition VII.20: least numbers with the same ratio measure the corresponding numbers equally often.` },
{ q: `If C measures A a certain number of times, can we define a number E containing that same number of units? (yes/no):`,
hint: `E is constructed to have exactly as many units as the count of times C measures A.` },
{ q: `Since D measures B the same number of times, does E also represent that same number of units with respect to B? (yes/no):`,
hint: `E reflects the number of measures that D gives to B.` },
{ q: `If C measures A according to the units in E, must E also measure A according to the units in C? (yes/no):`,
hint: `Proposition VII.16: if one number measures another so many times, the “unit-number” representing that count also measures the original.` },
{ q: `By the same reasoning, must E also measure B according to the units in D? (yes/no):`,
hint: `Again by VII.16 for B and D.` },
{ q: `But if E measures both A and B, and A and B are prime to each other, is that possible? (yes/no):`,
hint: `Definition VII.12: numbers prime to one another have no common measure except 1.` },
{ q: `Since this leads to a contradiction, must there be no smaller numbers C and D with the same ratio as A:B? (yes/no):`,
hint: `The assumption fails, so no smaller pair exists.` },
{ q: `Therefore, must A and B be the least numbers that have their ratio? (yes/no):`,
hint: `Removing the contradiction confirms the conclusion.` },












];

const conclusion = `Congratulations! You just proved that numbers prime to one another are the least of those which have the same ratio with them.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
