<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.87</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.87 – Find the third apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.87 chatbot!

We are given a rational straight line A. Do you agree? (yes/no):`,
  hint: `A rational straight line is one whose square is rational.` },
{ q: `We are also given three numbers E, BC, and CD. Agreed? (yes/no):`,
  hint: `These are magnitudes set out for proportional comparison.` },
{ q: `We are told that E does not have to BC the ratio which a square number has to a square number. Is that given? (yes/no):`,
  hint: `This means their ratio is not a ratio of squares.` },
{ q: `We are also told that BC does not have to CD the ratio which a square number has to a square number. Agreed? (yes/no):`,
  hint: `This condition will later imply incommensurability in length.` },
{ q: `But BC does have to BD the ratio which a square number has to a square number. Do you accept this? (yes/no):`,
  hint: `This is an additional condition used later.` },

{ q: `Let it be contrived that, as E is to BC, so is the square on A to the square on FG. Is this construction acceptable? (yes/no):`,
  hint: `This follows from Euclid X.6, allowing proportional squares.` },
{ q: `Let it also be contrived that, as BC is to CD, so is the square on FG to the square on GH. Is this clear? (yes/no):`,
  hint: `Again, this is a construction by proportionality of squares.` },

{ q: `Our goal is to show that the straight line FH is a third apotome. Does that make sense? (yes/no):`,
  hint: `A third apotome has a precise definition in Book X.` },

{ q: `Since, as E is to BC, so is the square on A to the square on FG, is the square on A commensurable with the square on FG? (yes/no):`,
  hint: `Magnitudes in the same ratio are commensurable (X.6).` },
{ q: `Since the square on A is rational, does it follow that the square on FG is rational? (yes/no):`,
  hint: `A magnitude commensurable with a rational magnitude is rational.` },
{ q: `Therefore, is FG a rational straight line? (yes/no):`,
  hint: `A line is rational if its square is rational.` },
{ q: `Since E does not have to BC the ratio of square number to square number, does the square on A also fail to have to the square on FG that ratio? (yes/no):`,
  hint: `The ratios were constructed equal.` },
{ q: `Therefore, is A incommensurable in length with FG? (yes/no):`,
  hint: `By Euclid X.9.` },

{ q: `Since, as BC is to CD, so is the square on FG to the square on GH, is the square on FG commensurable with the square on GH? (yes/no):`,
  hint: `Again, X.6 applies.` },
{ q: `Since the square on FG is rational, is the square on GH also rational? (yes/no):`,
  hint: `Commensurable squares share rationality.` },
{ q: `Therefore, is GH a rational straight line? (yes/no):`,
  hint: `Its square is rational.` },
{ q: `Since BC does not have to CD the ratio of square number to square number, does it follow that FG is incommensurable in length with GH? (yes/no):`,
  hint: `By X.9 again.` },
{ q: `Since FG and GH are rational but incommensurable in length, are they commensurable in square only? (yes/no):`,
  hint: `This is the definition of such lines.` },
{ q: `Therefore, is FH an apotome? (yes/no):`,
  hint: `Euclid X.73 defines an apotome this way.` },

{ q: `Since, as E is to BC, so is the square on A to the square on FG, and as BC is to CD, so is the square on FG to the square on GH, can we conclude, ex aequali, that as E is to CD, so is the square on A to the square on GH? (yes/no):`,
  hint: `This follows from V.22 (ex aequali).` },
{ q: `Since E does not have to CD the ratio of square number to square number, does it follow that A is incommensurable in length with GH? (yes/no):`,
  hint: `Apply X.9 again.` },
{ q: `Therefore, are neither FG nor GH commensurable in length with the rational straight line A? (yes/no):`,
  hint: `Both were shown separately incommensurable with A.` },

{ q: `Now let the square on K be that by which the square on FG exceeds the square on GH. Is this construction clear? (yes/no):`,
  hint: `This defines K by the difference of squares.` },
{ q: `Since, as BC is to CD, so is the square on FG to the square on GH, does it follow, by convertendo, that as BC is to BD, so is the square on FG to the square on K? (yes/no):`,
  hint: `Use V.19, Porism.` },
{ q: `Since BC has to BD the ratio of square number to square number, does the square on FG also have to the square on K that same type of ratio? (yes/no):`,
  hint: `Ratios are preserved.` },
{ q: `Therefore, is FG commensurable in length with K? (yes/no):`,
  hint: `By X.9.` },
{ q: `Since the square on FG exceeds the square on GH by the square on a straight line commensurable with FG, does this satisfy the final condition? (yes/no):`,
  hint: `This matches the definition.` },
{ q: `Since neither FG nor GH is commensurable in length with the rational straight line A, is FH therefore a third apotome? (yes/no):`,
  hint: `Euclid X, Definition III.3.` },
]

const conclusion = `Congratulations! You just found the third apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
