<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.11 — Prove that if a whole is to a whole as a number subtracted is to a number subtracted, then the remainder is to the remainder as the whole is to the whole</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.11 chatbot!

We are given two whole numbers, AB and CD, such that as AB is to CD, so is AE (a number subtracted from AB) to CF (a number subtracted from CD). Do you agree? (yes/no):`,
hint: `This means the ratio AB : CD is the same as AE : CF.` },
{ q: `Our goal is to prove that the remainder EB is also to the remainder FD as the whole AB is to the whole CD. Does that make sense? (yes/no):`,
hint: `In other words, after subtracting equal ratio parts, the remaining parts are in the same ratio as the wholes.` },
{ q: `From the hypothesis, is it given that as AB is to CD, so is AE to CF? (yes/no):`,
hint: `This is the assumption of the proposition — the two ratios AB:CD and AE:CF are equal.` },
{ q: `If AB is to CD as AE is to CF, must AB be the same part or the same parts of CD that AE is of CF? (yes/no):`,
hint: `According to Book VII, Definition 20, equal ratios imply equal parts (the same fractional relationship).` },
{ q: `Since AE is subtracted from AB, and CF from CD, does it follow that the remainders EB and FD are the corresponding leftover parts? (yes/no):`,
hint: `EB = AB − AE, and FD = CD − CF. These are what remain after the subtractions.` },
{ q: `If AB is the same part or parts of CD that AE is of CF, do EB and FD have the same part relation as AB and CD? (yes/no):`,
hint: `By Propositions VII.7 and VII.8, if equals or proportional parts are taken away, the remaining magnitudes preserve the same ratio.` },
{ q: `Therefore, is EB to FD as AB is to CD? (yes/no):`,
hint: `This is the conclusion — the remainders are in the same ratio as the wholes.` },













];

const conclusion = `Congratulations! You just proved that if a whole is to a whole as a number subtracted is to a number subtracted, then the remainder is to the remainder as the whole is to the whole
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
