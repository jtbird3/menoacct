<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.114</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.114 – Prove that an area contained by an apotome and a corresponding binomial has a rational side.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.114 chatbot!

We are given a rectangle AB, CD, contained by an apotome AB and a binomial CD, whose terms CE, ED are commensurable with the terms AF, FB of the apotome and in the same ratio. Do you agree? (yes/no)`,
  hint: `An apotome is a line formed from rational terms commensurable in square only; a binomial is composed of two rational terms commensurable in square only, and the hypothesis matches their corresponding term-ratio condition.` },

{ q: `Our goal is to show that the side G of the rectangle AB, CD is rational. Does that make sense? (yes/no)`,
  hint: `A line is rational if its square is commensurable with a rational square.` },

{ q: `Can we set out a rational straight line H and apply to CD a rectangle equal to the square on H, producing KL as breadth? (yes/no)`,
  hint: `This is a standard Euclidean application of an area (a square) to a given straight line, producing a breadth.` },

{ q: `Is KL an apotome? (yes/no)`,
  hint: `By the cited result (X.112), applying the square on a rational straight line to a binomial produces an apotome.` },

{ q: `Are the terms KM and ML of KL commensurable with CE and ED and in the same ratio? (yes/no)`,
  hint: `X.112 also gives that the terms of the produced apotome correspond to the binomial’s terms in the same ratio.` },

{ q: `Since CE and ED are commensurable with AF and FB and in the same ratio, can we conclude that AF:FB :: KM:ML? (yes/no)`,
  hint: `Equal ratios transfer through commensurable corresponding terms (transitivity of proportionality).` },

{ q: `Therefore, alternately, as AF:KM :: BF:ML; can we also see that AB:KL :: AF:KM? (yes/no)`,
  hint: `Using alternation and the fact that AB = AF−FB while KL = KM−ML (Book V ratio transformations).` },

{ q: `Since AF is commensurable with KM, is AB commensurable with KL? (yes/no)`,
  hint: `If corresponding parts are commensurable and the internal ratios match, then the resulting remainders are commensurable (X.12, X.11).` },

{ q: `Given AB:KL :: rectangle CD,AB : rectangle CD,KL, is the rectangle CD,AB commensurable with rectangle CD,KL? (yes/no)`,
  hint: `By VI.1, equal ratios of sides yield equal ratios of the corresponding rectangles on the same base CD.` },

{ q: `But rectangle CD,KL equals the square on H, which is rational. Therefore, is rectangle CD,AB commensurable with the square on H? (yes/no)`,
  hint: `Commensurable rectangles correspond through equality/commensurability with a rational square.` },

{ q: `Since the square on G equals the rectangle CD,AB, is the square on G commensurable with the square on H? (yes/no)`,
  hint: `If an area equals an area commensurable with a rational square, then it is commensurable with that rational square.` },

{ q: `Since the square on H is rational, is the square on G also rational, making G rational? (yes/no)`,
  hint: `A line whose square is commensurable with a rational square is rational.` },

{ q: `Therefore, is G the rational side of rectangle AB, CD? (yes/no)`,
  hint: `This completes the proof required in Proposition 114.` },

{ q: `Porism: Is it made clear that a rational area can be contained by irrational lines? (yes/no)`,
  hint: `Because the rectangle is shown commensurable with a rational square even though its containing sides are irrational, the corollary follows.` },
]

const conclusion = `Congratulations! You just proved prove that an area contained by an apotome and a corresponding binomial has a rational side.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
