<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.24 – Prove that if a solid is contained by parallel planes, the opposite planes in it are equal and parallelogrammic.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.24 chatbot!

We are given a solid CDHG contained by the parallel planes AC, GF, AH, DF, BF, and AE. Do you agree? (yes/no):`,
    hint: `The solid is bounded by several planes, given as parallel in pairs.` },

  { q: `Our goal is to show that the opposite planes of this solid are equal and parallelogrammic. Does that make sense? (yes/no):`,
    hint: `“Opposite planes” means planes facing each other in the solid.` },

  { q: `Since the two parallel planes BG and CE are cut by the plane AC, are their common sections parallel? (yes/no):`,
    hint: `When parallel planes are cut by another plane, their intersections are parallel (Book XI, Prop. 16).` },

  { q: `Therefore, is AB parallel to DC? (yes/no):`,
    hint: `AB and DC are the common sections of BG and CE with plane AC.` },

  { q: `Again, since the two parallel planes BF and AE are cut by the plane AC, are their common sections parallel? (yes/no):`,
    hint: `This is the same reasoning as before, using Proposition XI.16.` },

  { q: `Therefore, is BC parallel to AD? (yes/no):`,
    hint: `BC and AD arise as corresponding sections in plane AC.` },

  { q: `Since AB is parallel to DC, and BC is parallel to AD, does it follow that AC is a parallelogram? (yes/no):`,
    hint: `A quadrilateral with both pairs of opposite sides parallel is a parallelogram.` },

  { q: `Can we similarly prove that each of the planes DF, FG, GB, BF, and AE is a parallelogram? (yes/no):`,
    hint: `The same argument applies to each pair of opposite sides in those planes.` },

  { q: `Now let AH and DF be joined. Is this allowed? (yes/no):`,
    hint: `A straight line can be drawn joining any two points.` },

  { q: `Since AB is parallel to DC, and BH is parallel to CF, do the two straight lines AB and BH meet at equal angles to the two straight lines DC and CF, though not in the same plane? (yes/no):`,
    hint: `When pairs of parallel lines meet, the angles they contain are equal, even in different planes (Book XI, Prop. 10).` },

  { q: `Therefore, is angle ABH equal to angle DCF? (yes/no):`,
    hint: `Equal angles are contained by corresponding parallel lines.` },

  { q: `Are the two sides AB and BH equal respectively to the two sides DC and CF? (yes/no):`,
    hint: `Opposite sides of parallelograms are equal (Book I, Prop. 34).` },

  { q: `Since two sides and the included angle of triangle ABH are equal to those of triangle DCF, can we conclude that AH equals DF, and that triangle ABH equals triangle DCF? (yes/no):`,
    hint: `This follows from Side–Angle–Side congruence (Book I, Prop. 4).` },

  { q: `Is the parallelogram BG double of triangle ABH? (yes/no):`,
    hint: `A parallelogram is double a triangle on the same base and between the same parallels (Book I, Prop. 34).` },

  { q: `Is the parallelogram CE double of triangle DCF? (yes/no):`,
    hint: `The same proposition applies here.` },

  { q: `Since the doubles of equal triangles are equal, is parallelogram BG equal to parallelogram CE? (yes/no):`,
    hint: `Equals multiplied by the same factor remain equal.` },

  { q: `Can we similarly prove that plane AC is equal to plane GF, and plane AE equal to plane BF? (yes/no):`,
    hint: `The same reasoning applies to the remaining opposite planes.` },

  { q: `Therefore, if a solid is contained by parallel planes, are its opposite planes equal and parallelogrammic? (yes/no):`,
    hint: `This is exactly what has been shown.` }
]

const conclusion = `Congratulations! You just if a solid is contained by parallel planes, the opposite planes in it are equal and parallelogrammic.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
