<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.27</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.27 - Find medial straight lines commensurable in square only which contain a rational rectangle.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.27 chatbot!

We are given two rational straight lines A and B, commensurable in square only. Do you agree? (yes/no):`,
hint: `“Rational” and “commensurable in square only” are stated conditions of the given lines.` },
{ q: `A mean proportional C is taken between A and B. Is this allowed? (yes/no):`,
hint: `By Proposition VI.13, a mean proportional can be taken between two straight lines.` },
{ q: `It is contrived that, as A is to B, so is C to D. Can this be done? (yes/no):`,
hint: `By Proposition VI.12, a fourth proportional can be constructed.` },
{ q: `Since A and B are rational and commensurable in square only, is the rectangle contained by A and B medial? (yes/no):`,
hint: `By VI.17, the rectangle A, B equals the square on C.` },
{ q: `And by X.21, does this make the square on C medial? (yes/no):`,
hint: `A square equal to a medial rectangle is medial.` },
{ q: `Therefore, is the straight line C medial? (yes/no):`,
hint: `X.21 states that the side of a medial square is medial.` },
{ q: `Since, as A is to B, so is C to D, and A and B are commensurable in square only, are C and D also commensurable in square only? (yes/no):`,
hint: `By X.11, commensurability in square is preserved under proportionality.` },
{ q: `And since C is medial, is D also medial? (yes/no):`,
hint: `By X.23, a straight line commensurable with a medial straight line is itself medial.` },
{ q: `So have we shown that C and D are medial and commensurable in square only? (yes/no):`,
hint: `This summarizes the conclusions already established.` },

{ q: `Our goal is to show that these medial straight lines also contain a rational rectangle. Does that make sense? (yes/no):`,
hint: `We must now prove something further about the rectangle contained by C and D.` },
{ q: `Since, as A is to B, so is C to D, does it follow alternately that, as A is to C, so is B to D? (yes/no):`,
hint: `This follows by V.16, alternation of ratios.` },
{ q: `But as A is to C, so is C to B. Is this true? (yes/no):`,
hint: `C was taken as a mean proportional between A and B.` },
{ q: `Therefore, as C is to B, so is B to D. Do you agree? (yes/no):`,
hint: `Ratios equal to the same ratio are equal.` },
{ q: `Does this imply that the rectangle C, D is equal to the square on B? (yes/no):`,
hint: `If C : B = B : D, then C·D = B².` },
{ q: `Is the square on B rational? (yes/no):`,
hint: `B is given as a rational straight line.` },
{ q: `Therefore, is the rectangle C, D also rational? (yes/no):`,
hint: `A rectangle equal to a rational square is rational.` },
{ q: `Therefore, have medial straight lines commensurable in square only been found which contain a rational rectangle? (yes/no):`,
hint: `This is exactly what was required to be demonstrated.` }

]





const conclusion = `Congratulations! You just found medial straight lines commensurable in square only which contain a rational rectangle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
