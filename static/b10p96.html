<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.96</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.96 – Prove that if an area is contained by a rational straight line and a sixth apotome, the side of the area is a straight line which produces with a medial area a medial whole.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.96 chatbot!

We are given an area AB contained by a rational straight line AC and a sixth apotome AD. Do you agree? (yes/no)`,
  hint: `AC is rational, AD is a sixth apotome; these are the lines defining the area.` },
{ q: `Our goal is to show that the side of area AB is a straight line producing with a medial area a medial whole. Does that make sense? (yes/no)`,
  hint: `“Side” here refers to a straight line which can generate a medial whole with a medial area.` },

{ q: `Let DG be the annex to AD. Do you see that we can define AG and GD this way? (yes/no)`,
  hint: `AG, GD are rational lines commensurable in square only. Neither is commensurable in length with AC.` },
{ q: `Since the square on AG is greater than the square on GD by the square on a line incommensurable with AG, can we apply to AG a parallelogram equal to one-fourth of the square on DG and deficient by a square? (yes/no)`,
  hint: `Euclid X.18 allows this, dividing AG into incommensurable parts.` },

{ q: `Let DG be bisected at E. Can we construct a rectangle AF, FG equal to the square on EG and deficient by a square figure? (yes/no)`,
  hint: `This produces AF incommensurable in length with FG.` },
{ q: `If AF is to FG as AI is to FK, can we conclude AI is incommensurable with FK? (yes/no)`,
  hint: `By Euclid VI.1 and X.11, ratios of incommensurable lines give incommensurable results.` },

{ q: `Since AG and AC are rational lines commensurable in square only, can we say AK is medial? (yes/no)`,
  hint: `X.21 establishes that a line commensurable in square only with a rational line and forming certain ratios is medial.` },
{ q: `Since AC and DG are rational but incommensurable in length, is DK medial? (yes/no)`,
  hint: `Yes, X.21 applies again.` },

{ q: `Since AG and GD are commensurable in square only, is AG incommensurable in length with GD? (yes/no)`,
  hint: `By definition of commensurable-in-square-only lines.` },
{ q: `If AG is to GD as AK is to KD, is AK incommensurable with KD? (yes/no)`,
  hint: `VI.1 and X.11 imply the incommensurability of the resulting lines.` },

{ q: `Construct squares LM equal to AI and NO equal to FK about the same angle. Is this possible? (yes/no)`,
  hint: `VI.26 allows construction of squares on given lines about the same angle.` },
{ q: `Let PR be their diameter. Can we draw the figure accordingly? (yes/no)`,
  hint: `Standard Euclidean construction.` },

{ q: `Can we identify LN as the side of area AB, producing with a medial area a medial whole? (yes/no)`,
  hint: `Based on the previous steps, LN has properties: sum of squares on its segments medial, twice rectangle medial, squares incommensurable with twice rectangle.` },
{ q: `Do LP and PN satisfy: incommensurable in square, sum of squares medial, twice rectangle medial, squares incommensurable with twice rectangle? (yes/no)`,
  hint: `This confirms LN produces with a medial area a medial whole.` },
{ q: `Therefore, is LN the side of area AB, producing with a medial area a medial whole? (yes/no)`,
  hint: `This completes the proof. Q.E.D.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and a sixth apotome, the side of the area is a straight line which produces with a medial area a medial whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
