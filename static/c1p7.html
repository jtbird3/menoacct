<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.7 — Menochat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.7 - Prove that lines drawn parallel to a base-perpendicular are bisected by the axial section</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Conics I.7 chatbot!

We are given a cone with vertex A and circular base BC. Do you agree? (yes/no):`,
hint: `The cone’s surface is generated by all straight lines from vertex A to points on the circle BC.` },
{ q: `A plane through the axis of the cone cuts it, forming the triangle ABC as the axial section. Does that make sense? (yes/no):`,
hint: `A plane through the axis produces a triangular cross-section called the axial triangle.` },
{ q: `The cone is also cut by another plane that meets the plane of the base in a straight line DE, perpendicular to diameterBC or to its continuation. Can we imagine this setup? (yes/no):`,
hint: `The cutting plane intersects the base’s plane in a line at right angles to BC or its extension.` },
{ q: `Let the new cutting plane meet the surface of the cone in a line DFE. Possible? (yes/no):`,
hint: `Any plane cutting the cone forms a conic section on its surface—here represented by DFE.` },
{ q: `Let FG be the common section of this cutting plane and the axial triangle ABC. Do you follow? (yes/no):`,
hint: `The plane of ABC and the plane of DFE intersect along a single straght line; here, that line is FG.` },
{ q: `Now, let uschoose a point H anywhere on the section DFE. Clear? (yes/no):`,
hint: `The point H lies on the conic section formed by the cutting plane.` },
{ q: `Through H, draw a straight line HK parallel to DE. Can we do that? (yes/no):`,
hint: `From any point, a line can be drawn parallel to a given line (Postulate).` },
{ q: `Our goal is to show that HK (possibly extended) meets FG, and if extended to the other side of DFE, it is bisected by FG. Does that make sense? (yes/no):`,
hint: `The line FG acts as the diameter of the conic section DFE, dividing parallels like HK into equal halves.` },
{ q: `Since the cone (vertex A, base circle BC) is cut by a plane through its axis, forming triangle ABC, and since DE is perpendicular to BC, by I.6, will it (or an extension of it) meet the triangle ABC? (yes/no):`,
hint: `By geometry of parallels (Conics I.6), any line through a point on the cone parallel to DE will meet the axial plane.` },
{ q: `Therefore, HK meets the triangle ABC and lies in the plane of section DFE. So, does HK fall along their common section FG? (yes/no):`,
hint: `The line of intersection of two planes is shared by all lines contained in both planes.` },
{ q: `If produced to the other side of DFE, is HK bisected by FG? (yes/no):`,
hint: `The axial triangle divides each such parallel equally—this defines FG as the diameter of the section.` },
{ q: `Suppose the given cone is right. Then is the triangle ABC perpendicular to the circle BC? (yes/no):`,
hint: `In a right cone, the axis is perpendicular to the base, so the axial section stands upright over the circle.` },
{ q: `Since the plane ABC is perpendicular to the plane of the circle BC, and since DE lies in the plane of BC perpendicular to BC, is DE perpendicular to the triangle ABC? (yes/no):`,
hint: `From Euclid XI.4 and XI.18, a line in one of two perpendicular planes, perpendicular to their intersection, is also perpendicular to the other plane.` },
{ q: `Therefore, is DE also perpendicular to FG? (yes/no):`,
hint: `Since FG lies in the plane ABC; a line perpendicular to the plane is perpendicular to every line in it.` },
{ q: `If the cone is oblique, but the axial triangle ABC is still perpendicular to the circle BC, would DE still be perpendicular to FG? (yes/no):`,
hint: `The same reasoning applies whenever the axial triangle and base are perpendicular.` },
{ q: `But if the cone is oblique and ABC is not perpendicular to the circle BC, can DE still be perpendicular to FG? (yes/no):`,
hint: `Suppose it were—then DE would be perpendicular to both BC and FG, implying it is perpendicular to the plane ABC, which contradicts the oblique condition.` },
{ q: `Therefore, when the cone is oblique, DE is not perpendicular to FG, unless the plane through the axis is itself perpendicular to the base. Do you agree? (yes/no):`,
hint: `Only when the axis-plane stands at right angles to the base will the perpendicular relationship hold.` },
{ q: `Since FG bisects all lines drawn parallel to DE within the section DFE, can we say that FG is the diameter of that section? (yes/no):`,
hint: `A diameter in a conic section is defined as the line that bisects all chords parallel to a given direction.` },
{ q: `Is it also clear that some of these parallels may be bisected by FG without being perpendicular to FG? (yes/no):`,
hint: `The defining property of the diameter concerns bisection, not necessarily right angles.` },





];

const conclusion = `Congratulations! You just proved that a line drawn parallel to a base-perpendicular is bisected by the axial triangle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
