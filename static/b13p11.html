<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.11 – Prove that if an equilateral pentagon is inscribed in a circle whose diameter is rational, then the side of the pentagon is the irrational straight line called minor.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.11 chatbot!

We are given a circle whose diameter is rational, and an equilateral pentagon ABCDE inscribed in it. Do you agree? (yes/no):`,
    hint: `The diameter is assumed rational, and all five sides of the pentagon are equal.` },

  { q: `Our goal is to show that the side of the pentagon, such as AB, is the irrational straight line called minor. Does that make sense? (yes/no):`,
    hint: `“Minor” is a specific irrational straight line defined in Book X.` },

  { q: `Let F be the center of the circle. Can we take the center of a circle? (yes/no):`,
    hint: `Every circle has a center by definition.` },

  { q: `Let AF and FB be joined and produced to points G and H. Is this allowed? (yes/no):`,
    hint: `A straight line may be produced continuously in a straight line (Postulate 2).` },

  { q: `Let AC be joined. Can we join two points by a straight line? (yes/no):`,
    hint: `Postulate 1.` },

  { q: `Let FK be made a fourth part of AF. Is this construction possible? (yes/no):`,
    hint: `A straight line can be divided into equal parts.` },

  { q: `Is AF rational? (yes/no):`,
    hint: `AF is half the rational diameter.` },

  { q: `If AF is rational, is FK also rational? (yes/no):`,
    hint: `A part of a rational straight line is rational.` },

  { q: `Is BF also rational? (yes/no):`,
    hint: `BF equals AF, being a radius of the same circle.` },

  { q: `Therefore, is the whole BK rational? (yes/no):`,
    hint: `The sum of rational straight lines is rational.` },

  { q: `Since the circumferences ACG and ADG are equal, and the arcs ABC and AED are equal, are the remaining arcs CG and GD equal? (yes/no):`,
    hint: `Equals subtracted from equals leave equals.` },

  { q: `If AD is joined, do the angles at L become right angles? (yes/no):`,
    hint: `Angles in a semicircle are right angles.` },

  { q: `Is CD double of CL? (yes/no):`,
    hint: `A diameter subtends a right angle, giving a midpoint relation.` },

  { q: `For the same reason, are the angles at M right, and is AC double of CM? (yes/no):`,
    hint: `The same reasoning applies symmetrically.` },

  { q: `Is the angle ALC equal to the angle AMF? (yes/no):`,
    hint: `Both are right angles.` },

  { q: `Is the angle LAC common to triangles ACL and AMF? (yes/no):`,
    hint: `It is the same angle in both triangles.` },

  { q: `Therefore, are the triangles ACL and AMF equiangular? (yes/no):`,
    hint: `Two angles equal in each triangle imply equiangularity.` },

  { q: `From this, is it true that as LC is to CA, so MF is to FA? (yes/no):`,
    hint: `Corresponding sides of equiangular triangles are proportional.` },

  { q: `If we take doubles of the antecedents, is it true that as double LC is to CA, so double MF is to FA? (yes/no):`,
    hint: `Proportions remain valid when antecedents are doubled.` },

  { q: `But is double MF to FA the same as MF to half of FA? (yes/no):`,
    hint: `Doubling the numerator equals halving the denominator.` },

  { q: `If halves of the consequents are taken, do we then have: as double LC is to half of CA, so MF is to fourth of FA? (yes/no):`,
    hint: `Proportional reasoning.` },

  { q: `Is DC double of LC, CM half of CA, and FK a fourth of FA? (yes/no):`,
    hint: `These were established earlier.` },

  { q: `Therefore, is it true that as DC is to CM, so MF is to FK? (yes/no):`,
    hint: `Substitute equals into the proportion.` },

  { q: `By componendo, is it true that as DC + CM is to CM, so MK is to KF? (yes/no):`,
    hint: `Proposition V.18.` },

  { q: `Therefore, is it also true that the square on (DC + CM) is to the square on CM as the square on MK is to the square on KF? (yes/no):`,
    hint: `Squares preserve ratios of straight lines.` },

  { q: `When AC is cut in extreme and mean ratio, is the greater segment equal to the side of the pentagon, DC? (yes/no):`,
    hint: `Proposition XIII.8.` },

  { q: `Is the square on the greater segment together with half the whole equal to five times the square on the half? (yes/no):`,
    hint: `Proposition XIII.1.` },

  { q: `Since CM is half of AC, is the square on DC and CM taken together five times the square on CM? (yes/no):`,
    hint: `Substitute CM for half of AC.` },

  { q: `But was it shown earlier that the same ratio holds for MK and KF? (yes/no):`,
    hint: `From the proportion of squares.` },

  { q: `Therefore, is the square on MK five times the square on KF? (yes/no):`,
    hint: `Equal ratios imply equal multiples.` },

  { q: `Is the square on KF rational? (yes/no):`,
    hint: `KF is a part of the rational diameter.` },

  { q: `Therefore, is the square on MK rational, and hence MK rational? (yes/no):`,
    hint: `A straight line with rational square is rational.` },

  { q: `Since BF is quadruple of FK, is BK five times KF? (yes/no):`,
    hint: `BK = BF + FK.` },

  { q: `Therefore, is the square on BK twenty-five times the square on KF? (yes/no):`,
    hint: `Squares of multiples.` },

  { q: `But since the square on MK is five times the square on KF, is the square on BK five times the square on MK? (yes/no):`,
    hint: `Compare the two ratios.` },

  { q: `Does this show that BK is incommensurable in length with KM? (yes/no):`,
    hint: `Proposition X.9.` },

  { q: `Are both BK and KM nevertheless rational? (yes/no):`,
    hint: `Each has a rational square.` },

  { q: `Therefore, are BK and KM rational straight lines commensurable in square only? (yes/no):`,
    hint: `Definition from Book X.` },

  { q: `If from a rational straight line a rational straight line commensurable in square only be subtracted, is the remainder an apotome? (yes/no):`,
    hint: `Proposition X.73.` },

  { q: `Therefore, is MB an apotome and MK its annex? (yes/no):`,
    hint: `MB = BK − KM.` },

  { q: `Is MB specifically a fourth apotome? (yes/no):`,
    hint: `By the subsequent ratio argument.` },

  { q: `Is the rectangle contained by a rational straight line and a fourth apotome irrational, with its square root called minor? (yes/no):`,
    hint: `Proposition X.94.` },

  { q: `Is the square on AB equal to the rectangle HB, BM? (yes/no):`,
    hint: `From the similarity of triangles ABH and ABM.` },

  { q: `Therefore, is the side AB of the pentagon the irrational straight line called minor? (yes/no):`,
    hint: `This is exactly what was to be shown.` }
]

const conclusion = `Congratulations! You just proved that if an equilateral pentagon is inscribed in a circle whose diameter is rational, then the side of the pentagon is the irrational straight line called minor.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
