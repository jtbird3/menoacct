<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.30</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.30 – Find two rational straight lines commensurable in square only such that the square on the greater exceeds the square on the less by the square on a straight line incommensurable in length with the greater.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.30 chatbot!

We are given a rational straight line AB. Do you agree? (yes/no):`,
hint: `AB is assumed rational by construction.` },
{ q: `Two square numbers CD and DE are also given, such that their difference CE is not a square. Do you agree? (yes/no):`,
hint: `This is required by Lemma 1.` },
{ q: `Let a semicircle AFB be described on AB. Can we do this? (yes/no):`,
hint: `A semicircle can be constructed on any straight line.` },
{ q: `It is arranged so that, as DC is to CE, so is the square on BA to the square on AF. Is this construction possible? (yes/no):`,
hint: `This follows from Proposition X.6 (Porism).` },
{ q: `Let FB be joined. Can we draw this line? (yes/no):`,
hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

{ q: `Our goal is to find two rational straight lines commensurable in square only, such that the square on the greater exceeds the square on the less by a square commensurable in length with the greater. Does that make sense? (yes/no):`,
hint: `We must produce two rational lines, square-commensurable but length-incommensurable, with a rational excess square on a line commensurable with the greater.` },

{ q: `Since, as the square on BA is to the square on AF, so is DC to CE, do the squares on BA and AF have the ratio of DC to CE? (yes/no):`,
hint: `This follows directly from the construction.` },
{ q: `Does this mean the square on BA is commensurable with the square on AF? (yes/no):`,
hint: `By Proposition X.6, equality of ratios with numbers gives commensurability in square.` },
{ q: `Is the square on AB rational? (yes/no):`,
hint: `AB was given as a rational straight line (Definition X.4).` },
{ q: `Therefore, is the square on AF also rational? (yes/no):`,
hint: `Squares commensurable with a rational square are rational.` },
{ q: `Does this imply that AF itself is a rational straight line? (yes/no):`,
hint: `A straight line whose square is rational is itself rational.` },

{ q: `Since DC does not have to CE the ratio of a square number to a square number, does the square on BA fail to have to the square on AF such a ratio? (yes/no):`,
hint: `The ratios were constructed to be equal.` },
{ q: `Therefore, is AB incommensurable in length with AF? (yes/no):`,
hint: `By Proposition X.9.` },
{ q: `So are BA and AF rational straight lines commensurable in square only? (yes/no):`,
hint: `They are rational, square-commensurable, but not length-commensurable.` },

{ q: `Since, as DC is to CE, so is the square on BA to the square on AF, does it follow by conversion that, as CD is to DE, so is the square on AB to the square on BF? (yes/no):`,
hint: `This uses conversion of ratios, together with I.47 in the right triangle (since AB is a diameter).` },
{ q: `Does CD have to DE the ratio of a square number to a square number? (yes/no):`,
hint: `CD and DE are both square numbers.` },
{ q: `Therefore, does the square on AB have to the square on BF the ratio of a square number to a square number? (yes/no):`,
hint: `Equal ratios preserve this property.` },
{ q: `Does this imply that AB is commensurable in length with BF? (yes/no):`,
hint: `By Proposition X.9.` },

{ q: `Is the square on AB equal to the squares on AF and FB together? (yes/no):`,
hint: `This follows from Euclid I.47 (Pythagoras).` },
{ q: `Therefore, is the square on AB greater than the square on AF by the square on BF? (yes/no):`,
hint: `Subtracting the square on AF leaves the square on BF.` },
{ q: `Is BF commensurable in length with AB? (yes/no):`,
hint: `This was shown earlier.` }

]





const conclusion = `Congratulations! You just found two rational straight lines commensurable in square only such that the square on the greater exceeds the square on the less by the square on a straight line incommensurable in length with the greater.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
