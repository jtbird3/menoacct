<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.71</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.71 – Prove that if a rational area and a medial area are added together, there arise four irrational straight lines, namely a binomial, a first bimedial, a major, or the side of a rational plus a medial area.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.71 chatbot!

First, let AB be greater than CD. Agreed? (yes/no):`,
  hint: `This begins the first main case.` },
{ q: `Let a rational straight line EF be set out. Is this possible? (yes/no):`,
  hint: `A rational straight line may be chosen arbitrarily.` },
{ q: `Let the rectangle EG, equal to AB, be applied to EF, producing EH as breadth. Can this be done? (yes/no):`,
  hint: `By the theory of application of areas.` },
{ q: `Let HI, equal to CD, be applied to EF, producing HK as breadth. Is this possible? (yes/no):`,
  hint: `Areas equal to given areas can be applied to a straight line.` },

{ q: `Since AB is rational and equal to EG, is EG also rational? (yes/no):`,
  hint: `Equal areas have the same character.` },
{ q: `Since EG is applied to EF producing EH as breadth, is EH rational and commensurable in length with EF? (yes/no):`,
  hint: `By Elements X.20.` },
{ q: `Since CD is medial and equal to HI, is HI also medial? (yes/no):`,
  hint: `Equal areas preserve mediality.` },
{ q: `Since HI is applied to the rational straight line EF producing HK as breadth, is HK rational and incommensurable in length with EF? (yes/no):`,
  hint: `By Elements X.22.` },

{ q: `Since AB is rational and CD medial, are AB and CD incommensurable? (yes/no):`,
  hint: `A rational and a medial magnitude are incommensurable.` },
{ q: `Therefore, are EG and HI also incommensurable? (yes/no):`,
  hint: `EG = AB and HI = CD.` },
{ q: `But as EG is to HI, so is EH to HK. Do you agree? (yes/no):`,
  hint: `By Elements VI.1, corresponding sides of equal rectangles are proportional.` },
{ q: `Therefore, is EH incommensurable in length with HK? (yes/no):`,
  hint: `By Elements X.11.` },

{ q: `Are EH and HK both rational straight lines? (yes/no):`,
  hint: `Each is rational, though incommensurable with EF.` },
{ q: `Therefore, are EH and HK rational straight lines commensurable in square only? (yes/no):`,
  hint: `This follows from their being rational yet incommensurable in length.` },
{ q: `Hence, is EK a binomial straight line, divided at H? (yes/no):`,
  hint: `By Elements X.36.` },

{ q: `Since AB > CD, and AB = EG while CD = HI, is EG > HI? (yes/no):`,
  hint: `Equals preserve inequalities.` },
{ q: `Therefore, is EH greater than HK? (yes/no):`,
  hint: `Greater applied area yields greater breadth.` },
{ q: `Is the square on EH greater than the square on HK either by the square on a straight line commensurable with EH or by one incommensurable with it? (yes/no):`,
  hint: `These exhaust the possibilities.` },

{ q: `Subcase 1a: excess commensurable. First, let the square on EH exceed the square on HK by the square on a straight line commensurable with EH. Agreed? (yes/no):`,
  hint: `This is the first subcase.` },
{ q: `Since EH is commensurable in length with the rational straight line EF, is EK a first binomial? (yes/no):`,
  hint: `By Elements X, Definitions II.1.` },
{ q: `Since EF is rational, and an area contained by a rational straight line and a first binomial has a binomial side, do we conclude the side of EI is binomial? (yes/no):`,
  hint: `By Elements X.54.` },
{ q: `Therefore, is the side of AD also binomial? (yes/no):`,
  hint: `AD is equal to EI.` },

{ q: `Subcase 1b: excess incommensurable. Next, let the square on EH exceed the square on HK by the square on a straight line incommensurable with EH. Agreed? (yes/no):`,
  hint: `This is the second subcase.` },
{ q: `Since EH is commensurable in length with EF, is EK a fourth binomial? (yes/no):`,
  hint: `By Elements X, Definitions II.4.` },
{ q: `Since EF is rational, and an area contained by a rational straight line and a fourth binomial has a major side, do we conclude the side of EI is major? (yes/no):`,
  hint: `By Elements X.57.` },
{ q: `Therefore, is the side of AD also major? (yes/no):`,
  hint: `AD equals EI.` },

{ q: `Case 2: AB less than CD. Next, let AB be less than CD. Agreed? (yes/no):`,
  hint: `This begins the second main case.` },
{ q: `Then is EG less than HI, and therefore EH less than HK? (yes/no):`,
  hint: `Equalities again preserve inequalities.` },
{ q: `Is the square on HK greater than the square on EH either by the square on a straight line commensurable with HK or by one incommensurable with it? (yes/no):`,
  hint: `These are the only possibilities.` },

{ q: `Subcase 2a: excess commensurable. First, let the excess be by the square on a straight line commensurable with HK. Agreed? (yes/no):`,
  hint: `This is the first subcase.` },
{ q: `Since the lesser straight line EH is commensurable in length with EF, is EK a second binomial? (yes/no):`,
  hint: `By Elements X, Definitions II.2.` },
{ q: `Since EF is rational, and an area contained by a rational straight line and a second binomial has a first bimedial side, do we conclude the side of EI is a first bimedial? (yes/no):`,
  hint: `By Elements X.55.` },
{ q: `Therefore, is the side of AD also a first bimedial? (yes/no):`,
  hint: `AD equals EI.` },

{ q: `Subcase 2b: excess incommensurable. Next, let the square on HK exceed the square on EH by the square on a straight line incommensurable with HK. Agreed? (yes/no):`,
  hint: `This is the final subcase.` },
{ q: `Since the lesser straight line EH is commensurable with EF, is EK a fifth binomial? (yes/no):`,
  hint: `By Elements X, Definitions II.5.` },
{ q: `Since EF is rational, and an area contained by a rational straight line and a fifth binomial has for side a side of a rational plus a medial area, do we conclude the side of EI is such a line? (yes/no):`,
  hint: `By Elements X.58.` },
{ q: `Therefore, is the side of AD also a side of a rational plus a medial area? (yes/no):`,
  hint: `AD equals EI.` },

{ q: `Therefore, if a rational and a medial area be added together, does it follow that the side of the whole is either a binomial, a first bimedial, a major, or a side of a rational plus a medial area? (yes/no):`,
  hint: `All cases have now been exhausted.` },
]

const conclusion = `Congratulations! You just proved that if a rational area and a medial area are added together, there arise four irrational straight lines, namely a binomial, a first bimedial, a major, or the side of a rational plus a medial area.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
