<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Template — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.33 - Prove that if two triangles have two sides proportional and share an angle with corresponding sides parallel, then their other sides form a straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.33 chatbot!

We are given two equal circles, ABC and DEF, with centers G and H. Do you agree? (yes/no):`,
    hint: `“Equal circles” means their radii are equal in length.` },
  { q: `In these circles, we take angles BGC and EHF at the centers, and angles BAC and EDF at the circumferences. Do you see these four angles? (yes/no):`,
    hint: `BGC and EHF are central angles; BAC and EDF are angles standing on the same arcs at the circumferences.` },
  { q: `Our goal is to show that the ratios of the angles are the same as the ratios of the circumferences on which they stand. In other words, that ∠BGC : ∠EHF = arc BC : arc EF, and ∠BAC : ∠EDF = arc BC : arc EF. Does that make sense? (yes/no):`,
    hint: `We aim to prove that ∠BGC is to ∠EHF as arc BC is to arc EF, and that ∠BAC is to ∠EDF as arc BC is to arc EF.` },
  { q: `Let us take equal arcs on each circle: on the first, arcs BC, CK, and KL all equal; on the second, arcs EF, FM, and MN all equal. Can we do that? (yes/no):`,
    hint: `Since circles ABC and DEF are equal, we can mark off equal arcs repeatedly along each circumference.` },
  { q: `Now join GK, GL, HM, and HN. Have you drawn these lines? (yes/no):`,
    hint: `These lines represent the radii joining the centers to the new points on each circle.` },
  { q: `Since arcs BC, CK, and KL are equal, are the corresponding central angles BGC, CGK, and KGL also equal? (yes/no):`,
    hint: `By Proposition III.27, equal arcs subtend equal angles at the center.` },
  { q: `Therefore, whatever multiple the arc BL is of BC, that multiple also is the angle BGL of the angle BGC. Do you agree? (yes/no):`,
    hint: `When several equal arcs are added, their central angles are also added equally.` },
  { q: `Similarly, whatever multiple the arc NE is of EF, that multiple also is the angle NHE of the angle EHF. Does that follow? (yes/no):`,
    hint: `The same reasoning applies to the second circle.` },
  { q: `Now, if the arc BL equals the arc EN, must the angle BGL equal the angle EHN? (yes/no):`,
    hint: `Again from III.27, equal arcs give equal central angles.` },
  { q: `If the arc BL is greater than EN, is the angle BGL greater than EHN? (yes/no):`,
    hint: `Larger arcs subtend larger central angles.` },
  { q: `And if the arc BL is less, is the angle BGL also less than EHN? (yes/no):`,
    hint: `The relation between arc and central angle is direct: greater arc, greater angle.` },
  { q: `Therefore, if we compare four magnitudes — the arcs BC, EF and the angles BGC, EHF — we find that equimultiples preserve the greater, equal, or less relation. Do you see that? (yes/no):`,
    hint: `This matches Definition 5 of Book V, defining equality of ratios.` },
  { q: `Hence, as the circumference BC is to EF, so is the angle BGC to EHF. Is that the proportion we sought for the central angles? (yes/no):`,
    hint: `We now have the ratio of arcs equal to the ratio of the corresponding central angles.` },
  { q: `Finally, since each central angle is double its corresponding angle at the circumference (BGC double of BAC, EHF double of EDF), do their ratios remain equal? (yes/no):`,
    hint: `Equal ratios are preserved when both quantities are multiplied or divided by the same number.` },
  { q: `Therefore, as the circumference BC is to the circumference EF, so is ∠BGC to ∠EHF, and ∠BAC to ∠EDF. Do you agree with the conclusion? (yes/no):`,
    hint: `This completes the proof. The ratios of angles correspond exactly to those of the circumferences.` },
  { q: `Congratulations! You have shown that in equal circles, angles stand in the same ratio as the circumferences on which they stand. Q.E.D.`,
    hint: `Quod Erat Demonstrandum — “which was to be demonstrated.”` }
];

const conclusion = `Congratulations! You just proved that if two triangles have two sides proportional and share an angle with corresponding sides parallel, then their other sides form a straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
