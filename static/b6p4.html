<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.4 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.4 - Prove that in equiangular triangles, the sides about the equal angles are proportional, and the corresponding sides are those opposite the equal angles.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.4 chatbot!

We are given two equiangular triangles, ABC and DCE. ∠ABC = ∠DCE, ∠BAC = ∠CDE, and ∠ACB = ∠DEC. Do you agree? (yes/no):`,
    hint: `“Equiangular” means all three angles in one triangle are equal to all three angles in the other.` },
  { q: `Our goal is to show that the sides about the equal angles are proportional, and that corresponding sides are those opposite the equal angles. Does that make sense? (yes/no):`,
    hint: `We will demonstrate ratios like AB : BC = DC : CE.` },
  { q: `Let BC be placed in a straight line with CE. Can we do that? (yes/no):`,
    hint: `This is simply extending one side to lie in a straight line with the other.` },
  { q: `Since ∠ABC and ∠ACB are less than two right angles, and ∠ACB = ∠DEC, do you see that ∠ABC and ∠DEC are also less than two right angles? (yes/no):`,
    hint: `By I.17, the sum of any two angles of a triangle is less than two right angles.` },
  { q: `Now, let us produce BA and ED to meet at some point F. Can we do that? (yes/no):`,
    hint: `Postulate 5: If two lines make interior angles on the same side less than two right angles, they meet when produced.` },
  { q: `Since ∠DCE = ∠ABC, can we conclude BF is parallel to CD? (yes/no):`,
    hint: `I.28: If alternate interior angles are equal, the lines are parallel.` },
  { q: `And since ∠ACB = ∠DEC, is AC parallel to FE? (yes/no):`,
    hint: `Again, equal alternate interior angles imply parallel lines.` },
  { q: `If BF ∥ CD and AC ∥ FE, do we see that quadrilateral FACD is a parallelogram? (yes/no):`,
    hint: `A quadrilateral with opposite sides parallel is a parallelogram (I.34).` },
  { q: `From that, is FA equal to DC and AC equal to FD? (yes/no):`,
    hint: `In a parallelogram, opposite sides are equal (I.34).` },
  { q: `Since AC ∥ FE (one side of ΔFBE), do we know by Proposition VI.2 that BA : AF :: BC : CE? (yes/no):`,
    hint: `VI.2: If a line is drawn parallel to one side of a triangle, it divides the other sides proportionally.` },
  { q: `If AF = CD, does that give us the proportion: as BA is to CD, so is BC to CE? (yes/no):`,
    hint: `Substituting equals into a proportion preserves equality.` },
  { q: `Can we write this alternately as: AB : BC :: DC : CE? (yes/no):`,
    hint: `V.16 allows the “alternando” property — swapping middle terms.` },
  { q: `Since CD ∥ BF, can we similarly state: as BC is to CE, so is FD to DE? (yes/no):`,
    hint: `VI.2 again — a line parallel to one side divides proportionally.` },
  { q: `If FD = AC, does that give: as BC is to CE, so is AC to DE? (yes/no):`,
    hint: `Substituting FD = AC.` },
  { q: `By alternando, can we also say: as BC is to CA, so is CE to ED? (yes/no):`,
    hint: `Same property (V.16): alternate ratio equality.` },
  { q: `Now, since we have AB : BC = DC : CE and BC : CA = CE : ED, can we combine these (ex aequali) to conclude AB : AC = CD : DE? (yes/no):`,
    hint: `V.22: If several ratios are equal in sequence, their extremes are equal.` }
];

const conclusion = `Congratulations! You just proved that in equiangular triangles, the sides about the equal angles are proportional, and the corresponding sides are those opposite the equal angles.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
