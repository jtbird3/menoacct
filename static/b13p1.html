<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.1 – Prove that if a straight line is cut in extreme and mean ratio, then the square on the greater segment together with the square on half the whole is five times the square on half the whole.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.1 chatbot!

We are given a straight line AB. Do you agree? (yes/no):`,
    hint: `AB is the given straight line of the proposition.` },

  { q: `The straight line AB is cut in extreme and mean ratio at point C, and AC is the greater segment. Do you agree? (yes/no):`,
    hint: `By definition of extreme and mean ratio, AC : CB = AB : AC.` },

  { q: `The straight line AD is produced in a straight line with CA, and AD is made equal to half of AB. Is this allowed? (yes/no):`,
    hint: `A straight line may be produced in a straight line, and a segment equal to half may be set off.` },

  { q: `Our goal is to show that the square on CD is five times the square on AD. Does that make sense? (yes/no):`,
    hint: `This is the statement to be proved.` },

  { q: `Squares are described on AB and on DC, namely AE on AB and DF on DC. Is this construction possible? (yes/no):`,
    hint: `Squares can be constructed on given straight lines.` },

  { q: `The figure inside the square DF is drawn, and the line FC is produced to G. Can this be done? (yes/no):`,
    hint: `A straight line may be drawn and produced as needed.` },

  { q: `Since AB has been cut in extreme and mean ratio at C, is the rectangle AB, BC equal to the square on AC? (yes/no):`,
    hint: `This follows from VI.Def.3 and VI.17.` },

  { q: `Is CE equal to the rectangle AB, BC? (yes/no):`,
    hint: `CE represents that rectangle in the diagram.` },

  { q: `Is FH equal to the square on AC? (yes/no):`,
    hint: `FH is constructed as the square on AC.` },

  { q: `Since CE equals FH, do you agree that CE is equal to FH? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Since BA is double of AD, and BA is equal to KA, while AD is equal to AH, is KA also double of AH? (yes/no):`,
    hint: `Equals substituted for equals preserve ratios.` },

  { q: `As KA is to AH, so is CK to CH. Do you agree? (yes/no):`,
    hint: `This follows from VI.1.` },

  { q: `Since KA is double of AH, is CK double of CH? (yes/no):`,
    hint: `Equal ratios preserve duplication.` },

  { q: `Are LH and HC also double of CH? (yes/no):`,
    hint: `These segments are constructed accordingly in the figure.` },

  { q: `Therefore, is KC equal to LH and HC? (yes/no):`,
    hint: `Doubles of the same magnitude are equal.` },

  { q: `Since CE was proved equal to HF, is the whole square AE equal to the gnomon MNO? (yes/no):`,
    hint: `Equal areas combine to equal wholes.` },

  { q: `Since BA is double of AD, is the square on BA quadruple of the square on AD? (yes/no):`,
    hint: `The square on a double line is four times the square on the half.` },

  { q: `Is AE the square on BA, and DH the square on AD? (yes/no):`,
    hint: `These are the constructions already made.` },

  { q: `Therefore, is AE quadruple of DH? (yes/no):`,
    hint: `Follows directly from the previous step.` },

  { q: `Since AE equals the gnomon MNO, is the gnomon MNO also quadruple of AP? (yes/no):`,
    hint: `Equal areas may be substituted.` },

  { q: `Does it then follow that the whole square DF is five times AP? (yes/no):`,
    hint: `Quadruple plus one makes five.` },

  { q: `Is DF the square on DC, and AP the square on DA? (yes/no):`,
    hint: `These are the defining constructions.` },

  { q: `Therefore, is the square on CD five times the square on DA? (yes/no):`,
    hint: `This is exactly what has been shown.` }
]

const conclusion = `Congratulations! You just proved that if a straight line is cut in extreme and mean ratio, then the square on the greater segment together with the square on half the whole is five times the square on half the whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
