<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.4 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.4 - Prove that if two chords in a circle intersect away from the center, they do not bisect one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.4 chatbot!

We are given a circle ABCD, and inside it two chords AC and BD that cut one another at E, not through the center. Do you agree? (yes/no):`,
    hint: `“Not through the center” means neither AC nor BD passes through the midpoint F of the circle.` },
  { q: `Our goal is to prove that AC and BD do not bisect one another at E. Does that make sense? (yes/no):`,
    hint: `To bisect means AE = EC and BE = ED.` },
  { q: `Suppose, for the sake of argument, that AC and BD do bisect one another at E. Then AE = EC and BE = ED. Do you follow? (yes/no):`,
    hint: `We begin by assuming the opposite of what we want to prove, to reach a contradiction.` },
  { q: `Let F be the center of the circle, and join FE. Can we do this? (yes/no):`,
    hint: `Proposition III.1 allows us to find the center of a circle and join it to any point.` },
  { q: `Since FE passes through the center and bisects AC, which does not go through the center, must FE also cut AC at right angles? (yes/no):`,
    hint: `Proposition III.3: a line through the center bisecting a chord not through the center also cuts it at right angles.` },
  { q: `Therefore, is ∠FEA a right angle? (yes/no):`,
    hint: `Right angle means 90°.` },
  { q: `Likewise, since FE bisects BD, which is also not through the center, must FE also cut BD at right angles? (yes/no):`,
    hint: `Again, Proposition III.3 applies.` },
  { q: `Therefore, is ∠FEB also a right angle? (yes/no):`,
    hint: `Right angles are 90°.` },
  { q: `But if ∠FEA is right and ∠FEB is also right, then ∠FEA = ∠FEB. Do you see that? (yes/no):`,
    hint: `Both are right angles, so they would be equal.` },
  { q: `Yet ∠FEA is clearly less than ∠FEB. Is that a contradiction? (yes/no):`,
    hint: `One angle is contained inside the other at point E, so they cannot be equal.` },
  { q: `Therefore, our assumption that AC and BD bisect one another must be false. Do you agree? (yes/no):`,
    hint: `The contradiction proves the chords cannot bisect one another.` },
  { q: `Therefore, if two chords which do not pass through the center cut one another, then they do not bisect one another. Do you agree? (yes/no):`,
    hint: `The contradiction proves the chords cannot bisect one another.` }
];

const conclusion = `Congratulations! You have shown that if in a circle two straight lines cut one another not through the center, they do not bisect one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
