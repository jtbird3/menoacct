<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.39</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.39 — Find the least number which is divided into given equal parts</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.39 chatbot!
    
We are given three equal parts of a number A, B, and C. Do you agree? (yes/no):`,
    hint: `Each “part” is a ratio describing how a number is divided.` },

  { q: `Our goal is to find the least number that will have the parts A, B, and C. Does that make sense? (yes/no):`,
    hint: `We want the smallest number that each part fits into according to its proportional name.` },

  { q: `Let D, E, F be numbers called by the same name as the parts A, B, C. Acceptable? (yes/no):`,
    hint: `“Called by the same name” means they have the same relation to the unit as A, B, C have to some whole.` },

  { q: `Next, let G be the least number that is measured by D, E, and F. Can we take such a number? (yes/no):`,
    hint: `By VII.36, we can take a least number measured by any given numbers.` },

  { q: `Since G is measured by D, E, and F, does G have parts called by the same name as D, E, F? (yes/no):`,
    hint: `Being measured by a number means that number is a part of it.` },

  { q: `And since A, B, C are parts called by the same name as D, E, F, do we conclude that G has the parts A, B, C? (yes/no):`,
    hint: `Parts with the same name correspond through equal ratios.` },

  { q: `Now we want to show that G is the least number that has the parts A, B, C. Does that make sense? (yes/no):`,
    hint: `We must show no smaller number can have the same parts.` },

  { q: `Suppose, for contradiction, that a smaller number H also has the parts A, B, C. Can we assume this? (yes/no):`,
    hint: `Euclid often proves leastness by contradiction.` },

  { q: `If H has the parts A, B, C, must H be measured by the numbers called by the same name as these parts? (yes/no):`,
    hint: `By VII.38, a number with a given part is measured by the number called by the same name as that part.` },

  { q: `Since D, E, F are called by the same name as A, B, C, does it follow that H is measured by D, E, F? (yes/no):`,
    hint: `Same-name parts imply the corresponding numbers measure.` },

  { q: `But if H is measured by D, E, F and H is less than G, is this impossible? (yes/no):`,
    hint: `G was already taken as the least number measured by D, E, F.` },

  { q: `Therefore, can there be any number less than G that has the parts A, B, C? (yes/no):`,
    hint: `The contradiction shows that no smaller number exists.` }
]
















const conclusion = `Congratulations! You just found the least number which is divided into given equal parts.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
