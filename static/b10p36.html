<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.36</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.36 – Prove that if two rational straight lines commensurable in square only are added together, the whole is irrational; let such a straight line be called binomial.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.36 chatbot!

We are given two rational straight lines AB and BC. Do you agree? (yes/no):`,
hint: `A rational straight line is one whose square is commensurable with a rational square.` },
{ q: `These two straight lines AB and BC are commensurable in square only. Do you agree? (yes/no):`,
hint: `This means their squares are commensurable, but the straight lines themselves are incommensurable in length.` },
{ q: `The straight lines AB and BC are added together to form the whole AC. Do you agree? (yes/no):`,
hint: `AC is the straight line composed of AB and BC.` },

{ q: `Our goal is to show that the whole AC is irrational. Does that make sense? (yes/no):`,
hint: `We must show that the square on AC is irrational.` },

{ q: `Since AB is incommensurable in length with BC, is AB incommensurable in length with BC? (yes/no):`,
hint: `Lines commensurable in square only are incommensurable in length.` },
{ q: `As AB is to BC, so is the rectangle AB, BC to the square on BC. Do you agree? (yes/no):`,
hint: `This follows from Euclid X.11 (via the lemma relating a side to the rectangle on it).` },
{ q: `Therefore, is the rectangle AB, BC incommensurable with the square on BC? (yes/no):`,
hint: `If AB and BC are incommensurable, then the corresponding rectangle and square are incommensurable (X.11).` },

{ q: `Is twice the rectangle AB, BC commensurable with the rectangle AB, BC? (yes/no):`,
hint: `By Euclid X.6, doubling preserves commensurability.` },
{ q: `Are the squares on AB and BC commensurable with the square on BC? (yes/no):`,
hint: `Since AB and BC are rational and commensurable in square, their squares are commensurable with one another.` },
{ q: `Therefore, is twice the rectangle AB, BC incommensurable with the squares on AB and BC? (yes/no):`,
hint: `By Euclid X.13, what is incommensurable with one member of a commensurable set is incommensurable with the others.` },

{ q: `By componendo, is twice the rectangle AB, BC together with the squares on AB and BC incommensurable with the sum of the squares on AB and BC? (yes/no):`,
hint: `This follows from Euclid X.16.` },
{ q: `Is twice the rectangle AB, BC together with the squares on AB and BC equal to the square on AC? (yes/no):`,
hint: `By Euclid II.4, the square on the whole equals the squares on the parts plus twice the rectangle contained by the parts.` },

{ q: `Is the sum of the squares on AB and BC rational? (yes/no):`,
hint: `Each square is rational, and the sum of rational areas is rational.` },
{ q: `Therefore, is the square on AC irrational? (yes/no):`,
hint: `It is incommensurable with a rational area, hence irrational.` },
{ q: `If the square on AC is irrational, is the straight line AC irrational? (yes/no):`,
hint: `By Euclid X, Definition 4.` },

{ q: `Therefore, have we shown that when two rational straight lines commensurable in square only are added together, the whole is irrational? (yes/no):`,
hint: `This completes the demonstration.` },
{ q: `And is such a straight line rightly called binomial? (yes/no):`,
hint: `This is the name assigned in the proposition.` }

]





const conclusion = `Congratulations! You just proved that if two rational straight lines commensurable in square only are added together, the whole is irrational; let such a straight line be called binomial.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
