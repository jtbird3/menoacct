<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.56</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.56 – Prove that if an area is contained by a rational straight line and the third binomial, the side of the area is the irrational straight line called a second bimedial.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.56 chatbot!

We are given an area ABCD contained by a rational straight line AB and a third binomial straight line AD. Do you agree? (yes/no):`, hint: `AB is rational, and AD is given as a third binomial.` },
{ q: `The third binomial AD is divided into its terms at E, and AE is the greater term. Do you agree? (yes/no):`, hint: `By definition of a binomial, AD is divided into two terms.` },
{ q: `Our goal is to prove that the side of the area AC is the irrational straight line called a second bimedial. Does that make sense? (yes/no):`, hint: `We want to identify the nature of the side AC.` },

{ q: `Let the same construction be made as in the preceding propositions. Is this allowed? (yes/no):`, hint: `Euclid explicitly refers to the prior construction.` },

{ q: `Since AD is a third binomial, are AE and ED rational straight lines commensurable in square only? (yes/no):`, hint: `This follows from Definition II.3 of Book X.` },
{ q: `Is the square on AE greater than the square on ED by the square on a straight line commensurable with AE? (yes/no):`, hint: `This is part of the definition of a third binomial.` },
{ q: `Is neither AE nor ED commensurable in length with AB? (yes/no):`, hint: `This is also given by Definition II.3.` },

{ q: `Following the same reasoning as before, do we prove that MO is the side of the area AC? (yes/no):`, hint: `The construction identifies MO as the side.` },
{ q: `Are MN and NO medial straight lines commensurable in square only? (yes/no):`, hint: `This follows from the same argument used earlier.` },
{ q: `Therefore, is MO a bimedial straight line? (yes/no):`, hint: `A straight line composed of two medial lines commensurable in square only is bimedial.` },

{ q: `Is DE incommensurable in length with AB, that is, with EK? (yes/no):`, hint: `AB and EK are equal by construction.` },
{ q: `Is DE commensurable in length with EF? (yes/no):`, hint: `This follows from the construction.` },
{ q: `Therefore, is EF incommensurable in length with EK? (yes/no):`, hint: `By Proposition X.13.` },

{ q: `Are EF and EK rational straight lines commensurable in square only? (yes/no):`, hint: `They are rational, but incommensurable in length.` },
{ q: `Therefore, is EL, that is MR, medial? (yes/no):`, hint: `By Proposition X.21.` },

{ q: `Is MR contained by MN and NO? (yes/no):`, hint: `This follows from the construction.` },
{ q: `Therefore, is the rectangle contained by MN and NO medial? (yes/no):`, hint: `A rectangle contained by medial lines is medial.` },

{ q: `Since MO is bimedial and satisfies this condition, is MO a second bimedial straight line? (yes/no):`, hint: `By Proposition X.38.` },
{ q: `Therefore, is MO the side of the area AC and a second bimedial straight line? (yes/no):`, hint: `This completes the proof.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and the third binomial, the side of the area is the irrational straight line called a second bimedial.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
