<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.19</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.19 — Prove that in every section of a cone any straight line drawn from the diameter parallel to an ordinate will meet the section.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  {
q: `Welcome to Conics I.19 chatbot!

We are given a section of a cone whose diameter is AB, and a point B taken on the diameter. Do you agree? (yes/no):`,
  hint: `The diameter of the section is the straight line AB, and B is some point on AB.` },
{ q: `Through point B, we draw BC parallel to an ordinate. Can we do that? (yes/no):`,
  hint: `Through a given point, we can draw a straight line parallel to a given direction (here, the direction of an ordinate).` },
{ q: `Our goal is to show that BC, when continued, will meet the section. Does that make sense? (yes/no):`,
  hint: `“Meet the section” means intersect the curve of the conic section at least once.` },
{ q: `Now, take some point D on the section. Can we do this? (yes/no):`,
  hint: `We may choose any point on the section to help the proof.` },
{ q: `Is point A also on the section? (yes/no):`,
  hint: `Since AB is the diameter of the section, its endpoint A lies on the section.` },
{ q: `Join the straight line AD. Can we do that? (yes/no):`,
  hint: `A straight line can be drawn joining any two points.` },
{ q: `Does the straight line AD fall within the section? (yes/no):`,
  hint: `Since A and D are on the section, the chord AD lies within the section.` },
{ q: `From A, draw a straight line parallel to an ordinate. Can we do this? (yes/no):`,
  hint: `This is the line “drawn from A parallel to an ordinate.”` },
{ q: `Does the straight line drawn from A parallel to an ordinate fall outside the section? (yes/no):`,
  hint: `This is the stated fact used in the proof (it lies outside the conic section).` },
{ q: `Does AD meet that line drawn from A parallel to an ordinate? (yes/no):`,
  hint: `Since AD “meets it,” we are using that AD intersects the line through A parallel to an ordinate.` },
{ q: `Since BC is parallel to an ordinate, is BC parallel to the line drawn from A parallel to an ordinate? (yes/no):`,
  hint: `Two lines each parallel to an ordinate have the same direction, so they are parallel to one another.` },
{ q: `If AD meets one of two parallel lines, must it also meet the other (if produced)? (yes/no):`,
  hint: `A straight line crossing one of two parallels will cross the other as well.` },
{ q: `Therefore, will BC meet AD? (yes/no):`,
  hint: `Because AD meets the line through A parallel to an ordinate, and BC is parallel to that direction, BC will also meet AD.` },
{ q: `If BC meets AD at a point between A and D, does BC then meet the section? (yes/no):`,
  hint: `The segment of AD between A and D lies within the section; intersecting it implies intersecting the region bounded by the section.` },
{ q: `If instead BC meets AD beyond D, at a point E, is it still true that BC first meets the section before reaching E? (yes/no):`,
  hint: `Since D is on the section and AD from A to D lies within it, meeting AD beyond D forces BC to cross the boundary (the section) before reaching E.` },
{ q: `So in either case, does the straight line BC, continued, meet the section? (yes/no):`,
  hint: `Either it meets AD inside the section, or it meets AD outside but must cross the section first.` },
{ q: `Therefore, can we conclude that any straight line drawn from a point on the diameter parallel to an ordinate will meet the section? (yes/no):`,
  hint: `This is exactly the proposition’s conclusion for BC drawn through B parallel to an ordinate.` },







];

const conclusion = `Congratulations! You just proved that in every section of a cone any straight line drawn from the diameter parallel to an ordinate will meet the section.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
