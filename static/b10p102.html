<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.102</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.102 – Prove that if the square on the straight line which produces with a medial area a medial whole is applied to a rational straight line, the breadth produced is a sixth apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.102 chatbot!

We are given a straight line AB which produces with a medial area a medial whole, and a rational straight line CD. Do you agree? (yes/no):`,
  hint: `A medial area is a line whose square is medial; CD is rational, so its square is rational.` },

{ q: `Our goal is to apply the square on AB to CD to produce CF as breadth, and show CF is a sixth apotome. Does that make sense? (yes/no):`,
  hint: `A sixth apotome is a specific type of apotome defined in Book X of Euclid.` },

{ q: `Let BG be the annex to AB, so that AG and GB are incommensurable in square, making the sum of their squares medial, twice the rectangle AG, GB medial, and the squares on AG, GB incommensurable with twice the rectangle. Do you see this setup? (yes/no):`,
  hint: `This follows from Euclid X.78, giving the decomposition of AB into two lines incommensurable in square.` },

{ q: `To CD, let there be applied CH equal to the square on AG producing CK as breadth, and KL equal to the square on GB. Is that construction clear? (yes/no):`,
  hint: `This applies squares of the subsegments to CD, splitting CL into medial segments.` },
{ q: `Is CL equal to the sum of the squares on AG and GB, and therefore medial? (yes/no):`,
  hint: `CL = CH + KL, so it equals the sum of the squares; the sum is medial.` },
{ q: `Applied to rational line CD, does CL produce CM as breadth, which is rational and incommensurable in length with CD? (yes/no):`,
  hint: `Euclid X.22 states that applying a medial area to a rational line produces a rational line incommensurable in length with the base.` },

{ q: `Since CE equals the square on AB and CL equals squares on AG, GB, is FL = CL − CE equal to twice the rectangle AG, GB? (yes/no):`,
  hint: `FL = CL − CE by subtraction of equals, using Euclid II.7.` },
{ q: `Since twice the rectangle AG, GB is medial, is FL also medial? (yes/no):`,
  hint: `Medial areas remain medial under equality/subtraction.` },
{ q: `Applied to rational line FE, does FL produce FM as breadth, rational and incommensurable with CD? (yes/no):`,
  hint: `Again using X.22: a medial applied to a rational line gives a rational breadth incommensurable in length with the base.` },

{ q: `Are CL and FL incommensurable? (yes/no):`,
  hint: `Here the sum of squares is incommensurable with twice the rectangle (and equal magnitudes preserve this).` },
{ q: `By proportionality CL:FL :: CM:MF (VI.1), is CM incommensurable with MF? (yes/no):`,
  hint: `The ratio relation transfers incommensurability to the corresponding breadths (X.11).` },

{ q: `Since CM and MF are both rational and commensurable in square only, can we conclude CF is an apotome? (yes/no):`,
  hint: `X.73: the sum/difference of such rational parts gives an apotome.` },

{ q: `To show it is a sixth apotome, bisect FM at N, draw NO parallel to CD; do rectangles FO, NL equal AG × GB? (yes/no):`,
  hint: `The bisection-and-parallels construction yields equal halves of twice the rectangle.` },
{ q: `Since squares on AG and GB are incommensurable, are CH and KL incommensurable? (yes/no):`,
  hint: `CH = square on AG and KL = square on GB, so incommensurability of the squares transfers.` },
{ q: `By VI.1, CH:KL :: CK:KM, is CK incommensurable with KM? (yes/no):`,
  hint: `Proportionality transfers incommensurability to corresponding sides (X.11).` },
{ q: `Since rectangle AG × GB is mean proportional between squares on AG, GB, is NL also mean proportional between CH and KL? (yes/no):`,
  hint: `Equal magnitudes preserve the mean-proportional relation.` },

{ q: `Therefore, by X.18, is the square on CM greater than the square on MF by a square incommensurable with CM? (yes/no):`,
  hint: `This matches the “incommensurable excess-square” condition used in the sixth apotome classification.` },
{ q: `Neither is commensurable with rational line CD. Therefore, is CF a sixth apotome? (yes/no):`,
  hint: `This matches Definition III.6 for a sixth apotome.` },
]

const conclusion = `Congratulations! You just proved that if the square on the straight line which produces with a medial area a medial whole is applied to a rational straight line, the breadth produced is a sixth apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
