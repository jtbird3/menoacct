<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.13 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.13 - Prove that in an acute triangle, the square on the side opposite the acute angle is less than the squares on the sides about it by twice the rectangle of the base side and the segment cut off within by the perpendicular</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.13 chatbot!

We are given an acute-angled triangle ABC, with the angle at B acute. Do you agree? (yes/no):`,
    hint: `An acute angle is less than a right angle; here ∠B is acute.` },
  { q: `From A, let a perpendicular AD fall on side BC. Do you see this construction? (yes/no):`,
    hint: `We can always draw a perpendicular from a point to a straight line (Postulate 12).` },
  { q: `Our goal is to prove that the square on AC is less than the sum of the squares on CB and BA by twice the rectangle contained by CB and BD. Does that make sense? (yes/no):`,
    hint: `We are trying to prove: AC² = CB² + BA² - 2(CB x BD).` },
  { q: `Since line CB is cut at D, do you recall that the squares on CB and BD equal twice the rectangle CB·BD plus the square on DC? (yes/no):`,
    hint: `This is Proposition II.7 — when a line is cut at random, the sum of the squares on the whole and one part equals twice the rectangle and the square on the other part.` },
  { q: `Now, if we add the square on DA to both sides, do we still keep equality? (yes/no):`,
    hint: `Adding the same thing to equals gives equals (Common Notion 2).` },
  { q: `So the squares on CB, BD, DA equal twice the rectangle CB·BD plus the squares on AD, DC. Do you see that? (yes/no):`,
    hint: `We've just grouped terms after adding the square on DA.` },
  { q: `But the square on AB equals the sum of squares on BD, DA. Is this correct? (yes/no):`,
    hint: `By Proposition I.47 (Pythagoras), since ∠D is right in triangle ABD.` },
  { q: `And the square on AC equals the sum of squares on AD, DC. Do you agree? (yes/no):`,
    hint: `Again, by Proposition I.47 applied to right triangle ADC.` },
  { q: `Therefore, are the squares on CB, BA equal to the square on AC plus twice the rectangle CB·BD? (yes/no):`,
    hint: `We replaced BD² + DA² with AB², and AD² + DC² with AC².` },
  { q: `So, is the square on AC alone less than the sum of the squares on CB, BA by exactly twice the rectangle CB·BD? (yes/no):`,
    hint: `Rearranging shows AC² + 2(CB x BD) = AB² + CB², so AC² is smaller by that rectangle term.` }
];

const conclusion = `Congratulations! You just proved that in an acute-angled triangle ABC, the square on side AC is less than the squares on AB and BC by twice the rectangle contained by CB and BD.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
