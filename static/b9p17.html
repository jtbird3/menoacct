<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.17 — Prove that if numbers are in continued proportion and their extremes are prime to one another, then the last has to no other number the ratio which the first has to the second</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.17 chatbot!

We are given numbers A, B, C, D in continued proportion. Do you agree? (yes/no):`,
    hint: `Continued proportion means A : B = B : C = C : D.` },

  { q: `The extremes of these numbers are A and D, and they are prime to one another. Agreed? (yes/no):`,
    hint: `Prime to one another means they have no common measure except 1.` },

  { q: `Our goal is to show that D is not to any other number as A is to B. Does that make sense? (yes/no):`,
    hint: `We want to prove that no number E can satisfy D : E = A : B.` },

  { q: `Suppose, for the sake of argument, that as A is to B, so D is to E to a number E. Is this assumption clear? (yes/no):`,
    hint: `This is a proof by contradiction.` },

  { q: `From as A is to B, so D is to E, can we infer alternately that as A is to D, so B is to E? (yes/no):`,
    hint: `This follows from Proposition VII.13 (alternation of ratios).` },

  { q: `Now, since A and D are prime to one another, are they also least numbers of their ratio? (yes/no):`,
    hint: `Proposition VII.21 states that prime numbers are least.` },

  { q: `Do least numbers measure those which have the same ratio the same number of times, antecedent the antecedent and consequent the consequent? (yes/no):`,
    hint: `This is Proposition VII.20.` },

  { q: `From this, does A measure B? (yes/no):`,
    hint: `Since A : D = B : E, the antecedent A measures the antecedent B.` },

  { q: `Since A measures B, and as A is to B so is B to C, does B also measure C? (yes/no):`,
    hint: `Equal ratios imply the same measuring relation.` },

  { q: `If B measures C, does it follow that A also measures C? (yes/no):`,
    hint: `A measures B, and B measures C.` },

  { q: `Since as B is to C so is C to D, and B measures C, does C also measure D? (yes/no):`,
    hint: `Apply the same reasoning again along the continued proportion.` },

  { q: `If A measures C and C measures D, does A also measure D? (yes/no):`,
    hint: `A common measure passes through intermediate measures.` },

  { q: `But does A also measure itself? (yes/no):`,
    hint: `Any number measures itself.` },

  { q: `If A measures both A and D, are A and D measured by the same number? (yes/no):`,
    hint: `That number would be A itself.` },

  { q: `But were A and D assumed to be prime to one another? (yes/no):`,
    hint: `This was given at the start.` },

  { q: `Is it impossible for two numbers prime to one another to have a common measure greater than 1? (yes/no):`,
    hint: `This contradicts the definition of being prime to one another.` },

  { q: `Therefore, was our assumption that D is to E as A is to B false? (yes/no):`,
    hint: `The contradiction shows the assumption cannot hold.` },

  { q: `Hence, is it true that D is not to any other number as A is to B? (yes/no):`,
    hint: `This is exactly what was to be proved.` }
]








const conclusion = `Congratulations! You just proved that if numbers are in continued proportion and their extremes are prime to one another, then the last has to no other number the ratio which the first has to the second.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
