<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.9 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.9 - Magnitudes that have the same ratio to the same are equal, and those to which the same has the same ratio are equal</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.9 chatbot!

We are given three magnitudes A, B, and C. Do you agree? (yes/no):`,
    hint: `Think of A and B as comparable magnitudes, and C as a common term for ratio comparison.` },
  { q: `Our goal is to prove: if A and B each have the same ratio to C, then A = B; and also, if C has the same ratio to each of A and B, then A = B. Does that make sense? (yes/no):`,
    hint: `This proposition connects equality of ratios with equality of magnitudes.` },
  { q: `First, suppose A has the same ratio to C as B has to C. Can we do this? (yes/no):`,
    hint: `We are considering A : C = B : C.` },
  { q: `If A ≠ B, does that mean their ratios to C must also be unequal? (yes/no):`,
    hint: `According to Proposition V.8, if unequal magnitudes are compared to the same, their ratios cannot be equal.` },
  { q: `But since A and B do have the same ratio to C, what must we conclude about A and B? Are they equal? (yes/no):`,
    hint: `The equality of ratios implies equality of magnitudes here.` },
  { q: `Now for the second part: suppose C has the same ratio to A as C has to B. Is that our new assumption? (yes/no):`,
    hint: `Now we consider C : A = C : B.` },
  { q: `If A and B were unequal, is it true that C could not have the same ratio to both? (yes/no):`,
    hint: `Again, by Proposition V.8, unequal magnitudes cannot maintain the same ratio with a single third magnitude.` },
  { q: `Since C has the same ratio to each of A and B, must A and B be equal? (yes/no):`,
    hint: `The equality of these ratios forces equality of A and B.` },
  { q: `Therefore, if magnitudes have the same ratio to the same, they are equal; and if the same has the same ratio to each, they are equal. Do you agree? (yes/no):`,
    hint: `This completes both parts of the proposition.` }
];

const conclusion = `Congratulations! You just proved that magnitudes that have the same ratio to the same are equal, and those to which the same has the same ratio are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
