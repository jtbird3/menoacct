<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.7 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.7 - Circumscribe a square about a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.7 chatbot!

We are given a circle ABCD. Do you agree? (yes/no):`,
    hint: `The circle ABCD is our starting figure — the “given circle.”` },
  { q: `Our goal is to draw a square around this circle so that all its sides touch the circle. Does that make sense? (yes/no):`,
    hint: `To “circumscribe a square” means each side of the square is tangent to the circle.` },
  { q: `First, let's draw two diameters, AC and BD, of the circle at right angles to one another, meeting at point E. Can we do that? (yes/no):`,
    hint: `Any two perpendicular diameters can be drawn in a circle; this sets up four quadrants.` },
  { q: `Next, through the points A, B, C, and D, draw straight lines FG, GH, HK, and KF, each touching the circle. Is this possible? (yes/no):`,
    hint: `By Proposition III.16, from any point on the circle, a straight line may be drawn tangent to it.` },
  { q: `Since FG touches the circle at A and EA is joined from the centre E to the point of contact, are the angles at A right angles? (yes/no):`,
    hint: `From Proposition III.18, the radius drawn to the point of contact of a tangent is perpendicular to the tangent.` },
  { q: `By the same reasoning, are the angles at B, C, and D also right angles? (yes/no):`,
    hint: `Each tangent meets its radius at a right angle.` },
  { q: `Now, the angle AEB is right, and the angle EBG is also right. From this, is GH parallel to AC? (yes/no):`,
    hint: `If alternate interior angles are equal, the lines are parallel (Proposition I.28).` },
  { q: `For the same reason, is AC parallel to FK, and therefore GH parallel to FK? (yes/no):`,
    hint: `From Proposition I.30, if two lines are parallel to the same line, they are parallel to each other.` },
  { q: `Likewise, can we show that GF and HK are parallel to BD? (yes/no):`,
    hint: `The same reasoning applies by symmetry.` },
  { q: `Then are opposite sides GF and HK, and GH and FK, equal and parallel? (yes/no):`,
    hint: `In parallelograms, opposite sides are equal and parallel (Proposition I.34).` },
  { q: `Since AC = BD (diameters of the same circle), and AC equals each of GH, FK, while BD equals each of GF, HK, is FGHK equilateral? (yes/no):`,
    hint: `All four sides are equal in length, satisfying the definition of an equilateral quadrilateral.` },
  { q: `Now, consider parallelogram GBEA: since the angle AEB is right, is the angle AGB also right? (yes/no):`,
    hint: `Opposite angles of a parallelogram are equal (Proposition I.34).` },
  { q: `By the same reasoning, are the angles at H, K, and F also right? (yes/no):`,
    hint: `Each vertex of the quadrilateral forms a right angle through the same construction.` },
  { q: `Therefore, is FGHK right-angled as well as equilateral? (yes/no):`,
    hint: `A figure that is both equilateral and right-angled is a square.` },
  { q: `Thus, have we shown that a square FGHK has been circumscribed about the given circle ABCD? (yes/no):`,
    hint: `Each side of the square touches the circle, fulfilling the definition of a circumscribed square.` }
];

const conclusion = `Congratulations! You just circumscribed a square about a given circle. 
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
