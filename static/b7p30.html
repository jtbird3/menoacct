<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.30</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.30 — Prove that if a prime number measures the product of two numbers, it also measures one of the original numbers</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.30 chatbot!

We are given two numbers A and B which multiply to make C and a prime number D which measures C. Do you agree? (yes/no):`,
    hint: `Euclid states that A·B = C, and D (prime) measures C.` },

  { q: `Our goal is to show that D measures one of A or B. Does that make sense? (yes/no):`,
    hint: `We must show D|A or D|B.` },

  { q: `First, suppose that D does not measure A. Can we assume this for contradiction? (yes/no):`,
    hint: `Euclid argues by assuming D does not divide A and deducing it must divide B.` },

  { q: `Since D is prime, and we assumed it does not measure A, do you agree that A and D are prime to one another? (yes/no):`,
    hint: `If a prime does not divide a number, the two are “prime to one another” (coprime).` },

  { q: `Let the number E contain as many units as the number of times D measures C. Acceptable? (yes/no):`,
    hint: `E is defined so that D·E = C.` },

  { q: `Since D measures C according to the units in E, do we have D multiplied by E making C? (yes/no):`,
    hint: `By definition of measure: if D measures C E times, then D·E = C.` },

  { q: `But A multiplied by B also makes C. Do you accept that AB = DE? (yes/no):`,
    hint: `Both AB and DE are equal to C, so they are equal to one another.` },

  { q: `From AB = DE, can we set the proportion D is to A as B is to E? (yes/no):`,
    hint: `Equal products allow conversion to a ratio equality (VII.19).` },

  { q: `Since D and A are prime to one another, and primes are least, does Euclid’s result imply that D measures B? (yes/no):`,
    hint: `If two numbers are coprime and form a ratio equal to another pair, the least (the prime here) measures the corresponding term (VII.20–21).` },

  { q: `Therefore, if D does not measure A, must it measure B? (yes/no):`,
    hint: `This is Euclid’s conclusion for this branch.` },

  { q: `And similarly, if D does not measure B, must it measure A? (yes/no):`,
    hint: `Symmetric reasoning applies.` },

  { q: `Thus, must D measure one of A or B? (yes/no):`,
    hint: `A prime dividing a product must divide at least one factor.` }
  ]
















const conclusion = `Congratulations! You just proved that if a prime number measures the product of two numbers, it also measures one of the original numbers.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
