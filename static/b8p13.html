<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.13</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.13 — Prove that if numbers in continued proportion each make a product by multiplying themselves, then the products are proportional; and that if the original numbers multiply these products, the results are also proportional</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.13 chatbot!

We are given numbers A, B, C in continued proportion, so that A is to B as B is to C. Do you agree? (yes/no):`,
    hint:`“Continued proportion” means each ratio equals the next: A/B = B/C.` },

  { q:`Our goal is to show that the products D, E, F (each original number multiplied by itself) are in continued proportion, and likewise the numbers G, H, K (each original multiplied by its own product). Does that make sense? (yes/no):`,
    hint:`We want D : E = E : F and G : H = H : K.` },

  { q:`First, let us take A, B, C and form D, E, F by multiplying each by itself (A multiplied by A producing D, B multiplied by B produces E, C multiplied by C produces F). Possible? (yes/no):`,
    hint:`“By multiplying itself make some number” means each number squared.` },

  { q:`Now, let us multiply A by B to make the number L. Can we do that? (yes/no):`,
    hint:`L = A·B.` },

  { q:`Then, do the two numbers A and B, by multiplying L, produce M and N? (yes/no):`,
    hint:`A·L = M and B·L = N.` },

  { q:`Similarly, let us multiply B by C to make O. Can we do that? (yes/no):`,
    hint:`O = B·C.` },

  { q:`Finally, let us multiply B and C, by multiplying O, produce P and Q? (yes/no):`,
    hint:`B·O = P and C·O = Q.` },

  { q:`Now, can we reason (as Euclid says “in manner similar to the foregoing”) that D, L, E are continuously proportional in the ratio of A to B? (yes/no):`,
    hint:`Each is formed from A, B, and their products; Euclid appeals to earlier proportional-number results.` },

  { q:`Likewise, can we reason that E, O, F are continuously proportional in the ratio of B to C? (yes/no):`,
    hint:`Same structure: numbers built from B, C, and their products follow the same proportional pattern.` },

  { q:`Since A is to B as B is to C, do we have D, L, E in the same ratio as E, O, F? (yes/no):`,
    hint:`Equal original ratios give equal derived ratios.` },

  { q:`And also G, M, N, H in the same ratio with H, P, Q, K? (yes/no):`,
    hint:`G, H, K come from multiplying A, B, C with D, E, F; the pattern continues.` },

  { q:`Is the number of terms (the “multitude”) in D, L, E equal to that in E, O, F? (yes/no):`,
    hint:`Both groups contain three terms.` },

  { q:`And is the number of terms in G, M, N, H equal to that in H, P, Q, K? (yes/no):`,
    hint:`Both groups contain four terms.` },

  { q:`Since the ratios match and the multitudes match, can we use ex aequali reasoning to conclude that D is to E as E is to F? (yes/no):`,
    hint:`Ex aequali (from equal ratios over equal lengths) yields continued proportion.` },

  { q:`Likewise, can we conclude that G is to H as H is to K? (yes/no):`,
    hint:`Same ex aequali pattern for the second sequence.` },

  { q:`Therefore, do D, E, F and G, H, K each form a continued proportion? (yes/no):`,
    hint:`The products of the original numbers, and the products of those products with the originals, both preserve the common ratio.` }
]














const conclusion = `Congratulations! You just proved that if numbers in continued proportion each make a product by multiplying themselves, then the products are proportional; and that if the original numbers multiply these products, the results are also proportional.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
