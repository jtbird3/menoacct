<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.82</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.82 – Prove that to a minor straight line only one straight line can be annexed which is incommensurable in square with the whole and which, with the whole, makes the sum of the squares rational but twice the rectangle medial.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.82 chatbot!

We are given a minor straight line AB. Do you agree? (yes/no):`,
  hint: `AB is explicitly stated to be a minor straight line.` },
{ q: `Let BC be a straight line annexed to AB, forming the whole AC. Agreed? (yes/no):`,
  hint: `BC is added to AB so that AC is the whole line.` },
{ q: `Are AC and CB incommensurable in square? (yes/no):`,
  hint: `This is given as part of the annex condition (X.76).` },
{ q: `Do the squares on AC and CB, when added together, form a rational area? (yes/no):`,
  hint: `This is stated in the definition of the annex.` },
{ q: `Is twice the rectangle contained by AC and CB medial? (yes/no):`,
  hint: `Again, this follows from the annex condition (X.76).` },

{ q: `Our goal is to show that no other straight line besides BC can be annexed to AB with these same properties. Does that make sense? (yes/no):`,
  hint: `We are proving uniqueness.` },

{ q: `Suppose, if possible, that another straight line BD is annexed to AB. Can we assume this for contradiction? (yes/no):`,
  hint: `Euclid proceeds by contradiction.` },
{ q: `Then does BD form the whole AD, with AD and DB incommensurable in square? (yes/no):`,
  hint: `BD is assumed to satisfy the same annex conditions as BC.` },
{ q: `Do the squares on AD and DB, when added together, also form a rational area? (yes/no):`,
  hint: `This is required by the same condition (X.76).` },
{ q: `Is twice the rectangle contained by AD and DB medial? (yes/no):`,
  hint: `This is also part of the annex condition.` },

{ q: `Now, does the excess of the squares on AD and DB over the squares on AC and CB equal the excess of twice the rectangle AD, DB over twice the rectangle AC, CB? (yes/no):`,
  hint: `This follows from equality of subtraction applied to squares and rectangles.` },
{ q: `Do the squares on AD and DB exceed the squares on AC and CB by a rational area? (yes/no):`,
  hint: `Each sum of squares is rational, so their difference is rational.` },
{ q: `Therefore, does twice the rectangle AD, DB exceed twice the rectangle AC, CB by a rational area? (yes/no):`,
  hint: `Equals taken from equals leave equals; rational minus rational is rational.` },

{ q: `But is it possible for one medial area to exceed another medial area by a rational area? (yes/no):`,
  hint: `By Proposition X.26, this is impossible.` },
{ q: `Does this contradiction show that no second annex BD can exist? (yes/no):`,
  hint: `The assumption of BD leads to impossibility.` },
{ q: `Therefore, to a minor straight line AB, is there only one straight line that can be annexed satisfying all the given conditions? (yes/no):`,
  hint: `The contradiction proves uniqueness.` },
]

const conclusion = `Congratulations! You just proved that to a minor straight line only one straight line can be annexed which is incommensurable in square with the whole and which, with the whole, makes the sum of the squares rational but twice the rectangle medial.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
