<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.62</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.62 – Prove that if the square on the second bimedial straight line is applied to a rational straight line, the breadth produced is the third binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.62 chatbot!

We are given a second bimedial straight line AB, divided at C into its medials, with AC the greater segment. Do you agree? (yes/no):`, hint: `A second bimedial is divided into two medial segments commensurable in square only.` },
{ q: `We are also given a rational straight line DE. Do you agree? (yes/no):`, hint: `DE is assumed rational by hypothesis.` },
{ q: `Our goal is to show that the breadth DG, produced when the square on AB is applied to DE, is a third binomial straight line. Does that make sense? (yes/no):`, hint: `We are classifying the resulting straight line DG.` },

{ q: `To the straight line DE, let the parallelogram DF equal to the square on AB be applied, producing DG as its breadth. Is this construction acceptable? (yes/no):`, hint: `This is the standard application of an area to a given straight line.` },
{ q: `Let the same construction be made as previously shown. Are we allowed to proceed under that assumption? (yes/no):`, hint: `Euclid often refers to prior constructions in Book X.` },

{ q: `Since AB is a second bimedial divided at C, are AC and CB medial straight lines commensurable in square only? (yes/no):`, hint: `This follows from the definition of a second bimedial.` },
{ q: `Do AC and CB contain a medial rectangle? (yes/no):`, hint: `This is stated in Proposition X.38.` },

{ q: `Is the sum of the squares on AC and CB therefore medial? (yes/no):`, hint: `By Propositions X.15 and X.23 (Porisms).` },
{ q: `Is this sum equal to DL? (yes/no):`, hint: `DL represents the applied area equivalent to the square on AB.` },
{ q: `Therefore, is DL also medial? (yes/no):`, hint: `Equal areas have the same classification.` },

{ q: `Since DL is applied to the rational straight line DE, is MD rational and incommensurable in length with DE? (yes/no):`, hint: `This follows from Proposition X.22.` },
{ q: `For the same reason, is MG also rational and incommensurable in length with ML, that is, with DE? (yes/no):`, hint: `The same reasoning applies symmetrically.` },
{ q: `Therefore, are both DM and MG rational and incommensurable in length with DE? (yes/no):`, hint: `Each arises from applying a medial area to a rational line.` },

{ q: `Since AC is incommensurable in length with CB, and as AC is to CB so is the square on AC to the rectangle AC, CB, is the square on AC incommensurable with the rectangle AC, CB? (yes/no):`, hint: `By Proposition X.11.` },
{ q: `Is the sum of the squares on AC and CB therefore incommensurable with twice the rectangle AC, CB? (yes/no):`, hint: `By Propositions X.12 and X.13.` },
{ q: `Is DL incommensurable with MF, and hence DM incommensurable with MG? (yes/no):`, hint: `By Proposition VI.1 and X.11.` },

{ q: `Since DM and MG are rational and incommensurable with one another, is DG a binomial straight line? (yes/no):`, hint: `By Proposition X.36.` },
{ q: `It remains to prove that DG is a third binomial straight line. Do you agree? (yes/no):`, hint: `Not all binomials are of the same type.` },

{ q: `By reasoning similar to earlier propositions, can we conclude that DM is greater than MG? (yes/no):`, hint: `This follows from the ordering of the constructed segments.` },
{ q: `Is DK commensurable with KM? (yes/no):`, hint: `This is shown by the construction.` },
{ q: `Is the rectangle DK, KM equal to the square on MN? (yes/no):`, hint: `This equality is established earlier in Book X.` },
{ q: `Does it follow that the square on DM exceeds the square on MG by the square on a straight line commensurable with DM? (yes/no):`, hint: `This matches the defining condition.` },
{ q: `And is it still true that neither DM nor MG is commensurable in length with DE? (yes/no):`, hint: `This was already established.` },
{ q: `Therefore, does DG satisfy the definition of a third binomial straight line? (yes/no):`, hint: `By Definition II.3 of Book X.` },
]

const conclusion = `Congratulations! You just proved that if the square on the second bimedial straight line is applied to a rational straight line, the breadth produced is the third binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
