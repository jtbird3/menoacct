<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.8 — Prove that if a number is the same parts of another as a subtracted number is of a subtracted number, then the remainder is the same parts of the remainder</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.8 chatbot!

We are given two numbers AB and CD, and also AE and CF, such that AB is that part of CD which AE (subtracted) is of CF (subtracted). Do you agree? (yes/no):`,
hint: `Think of AB and CD as two whole numbers we compare.` },
{ q: `We also have AE taken away (subtracted) from AB and CF taken away (subtracted) from CD. Do you agree? (yes/no):`,
hint: `AE is a part of AB; CF is a part of CD. The remainders are EB and FD.` },
{ q: `We are told that AB is the same parts of CD that AE is of CF. Does that make sense? (yes/no):`,
hint: `“The same parts” means the pattern of equal parts in AB across CD matches the pattern of equal parts in AE across CF.` },
{ q: `Our goal is to show that the remainder EB is also the same parts of the remainder FD that the whole AB is of the whole CD. Does that make sense? (yes/no):`,
hint: `We want the same “parts relation” to hold after we subtract AE from AB and CF from CD.` },
{ q: `Let another number GH be made equal to AB. Can we do that? (yes/no):`,
hint: `We may always take a new number GH with the same value as AB.` },
{ q: `Since GH is equal to AB, and AB is the same parts of CD that AE is of CF, is it true that whatever parts GH is of CD, AE is the same parts of CF? (yes/no):`,
hint: `If GH = AB, then GH has the same part-relationship to CD that AB has, and AB matches AE with CF in parts.` },
{ q: `Now, let GH be divided into the parts of CD, namely into GK and KH. Possible? (yes/no):`,
hint: `We split GH into pieces GK and KH that correspond to equal parts taken in CD.` },
{ q: `And let AE be divided into the parts of CF, namely into AL and LE. Is that also possible? (yes/no):`,
hint: `We split AE into pieces AL and LE that correspond to equal parts taken in CF.` },
{ q: `Is it then true that the number of parts GK, KH equals the number of parts AL, LE? (yes/no):`,
hint: `“The multitude of GK, KH equals the multitude of AL, LE” means we have the same count of corresponding parts on each side.` },
{ q: `Since whatever part GK is of CD, the same part AL is of CF, and CD is greater than CF, is GK greater than AL? (yes/no):`,
hint: `If a part has the same ratio to a larger number and to a smaller number, then the part taken from the larger number must itself be larger.` },
{ q: `Let GM be made equal to AL, taken from GK. Can we do that? (yes/no):`,
hint: `We choose GM on GK so that GM = AL.` },
{ q: `Since GK is the same part of CD that AL is of CF, and GM = AL, is GK the same part of CD that GM is of CF? (yes/no):`,
hint: `Replacing AL with an equal number GM keeps the same part-relation.` },
{ q: `If GK is the same part of CD that GM is of CF, can we say by Proposition VII.7 that the remainder MK is the same part of the remainder FD that the whole GK is of the whole CD? (yes/no):`,
hint: `VII.7: when numbers are in the same ratio (or same part relation), the remainders after subtracting equal parts keep that relation.` },
{ q: `Again, since whatever part KH is of CD, the same part EL is of CF, and CD is greater than CF, is KH greater than EL? (yes/no):`,
hint: `As before: the part taken from the larger number (CD) must be larger than the corresponding part of the smaller number (CF).` },
{ q: `Let KN be made equal to EL, taken from KH. Is that allowed? (yes/no):`,
hint: `We choose KN on KH so that KN = EL.` },
{ q: `Since KH is the same part of CD that EL is of CF, and KN = EL, is KH the same part of CD that KN is of CF? (yes/no):`,
hint: `Replacing EL with an equal number KN preserves the same part relation.` },
{ q: `If KH is the same part of CD that KN is of CF, can we say by Proposition VII.7 that the remainder NH is the same part of the remainder FD that the whole KH is of the whole CD? (yes/no):`,
hint: `Again by VII.7, subtracting corresponding equal parts from CD and CF gives remainders with the same part relation.` },
{ q: `We have now that MK is the same part of FD that GK is of CD, and NH is the same part of FD that KH is of CD. Do you agree? (yes/no):`,
hint: `These are exactly what we obtained from applying VII.7 twice.` },
{ q: `If MK corresponds to GK and NH corresponds to KH in this part-relation, is it reasonable that the sum MK + NH is the same parts of FD that the sum GK + KH is of CD? (yes/no):`,
hint: `Adding corresponding parts on each side preserves the “same parts” relationship.` },
{ q: `But is the sum GK + KH equal to GH? (yes/no):`,
hint: `GH was divided into GK and KH, so GK + KH = GH.` },
{ q: `And is the sum MK + NH equal to EB, the remainder of AB after AE is subtracted? (yes/no):`,
hint: `AE was matched by AL and LE, which correspond to GM and KN inside GK and KH; removing those leaves MK and NH, whose sum equals EB.` },
{ q: `Do we also have GH equal to AB from earlier? (yes/no):`,
hint: `By construction, GH was made equal to AB.` },
{ q: `Since MK + NH = EB and GH = AB, and the sum MK + NH is the same parts of FD that GH is of CD, can we conclude that EB is the same parts of FD that AB is of CD? (yes/no):`,
hint: `Replace MK + NH by EB and GH by AB in the already-established relation.` },
{ q: `Therefore, have we shown that the remainder EB is the same parts of the remainder FD that the whole AB is of the whole CD? (yes/no):`,
hint: `This is exactly the statement of Proposition VII.8 we wanted to prove. Q.E.D.` },












];

const conclusion = `Congratulations! You just proved that if a number is the same parts of another as a subtracted number is of a subtracted number, then the remainder is the same parts of the remainder.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
