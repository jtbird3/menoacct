<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.29 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.29 - Prove that in equal circles, equal circumferences are subtended by equal straight lines.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.29 chatbot!

We are given two equal circles, called ABC and DEF. Do you agree? (yes/no):`,
    hint: `Equal circles are those whose radii are equal.` },
  { q: `In circle ABC, let circumference BGC be cut off; and in circle DEF, let circumference EHF be cut off, with BGC equal to EHF. Is this clear? (yes/no):`,
    hint: `Equal circumferences mean arcs of the same length from equal circles.` },
  { q: `Join the straight lines BC and EF. Can we do that? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Our goal is to prove that chord BC is equal to chord EF. Does that make sense? (yes/no):`,
    hint: `We want to show that equal arcs in equal circles are spanned by equal chords.` },
  { q: `Take the centers of the two circles, K for circle ABC and L for circle DEF, then join BK, KC, EL, LF. Is this possible? (yes/no):`,
    hint: `III.1 lets us find the center of a circle, and Postulate 1 lets us join any two points with a straight line.` },
  { q: `Since circumference BGC is equal to circumference EHF, is ∠BKC equal to ∠ELF? (yes/no):`,
    hint: `Proposition III.27: equal arcs in equal circles subtend equal central angles.` },
  { q: `Now, are the radii BK, KC equal to the radii EL, LF? (yes/no):`,
    hint: `Equal circles have equal radii.` },
  { q: `So do triangles BKC and ELF have two sides equal to two sides, with the contained angles also equal? (yes/no):`,
    hint: `They share BK = EL, KC = LF, and ∠BKC = ∠ELF.` },
  { q: `By Proposition I.4 (SAS), can we then conclude BC = EF? (yes/no):`,
    hint: `If two triangles have two sides and the included angle equal, then their bases are equal.` },
  { q: `Therefore, given two equal circles, equal circumferences are subtended by equal straight lines? (yes/no):`,
    hint: `Yes — this completes the proof.` }
];

const conclusion = `Congratulations! You just proved that in equal circles, equal circumferences are subtended by equal straight lines. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
