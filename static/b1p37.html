<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.37 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.37 – Prove that triangles on the same base and in the same parallels are equal</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.37 chatbot!

We are given two triangles, ABC and DBC, on the same base BC and in the same parallels AD and BC. Do you agree? (yes/no):`,
    hint: `The base BC is common to both triangles, and their opposite vertices A and D lie on the parallel line AD.` },
  { q: `Our goal is to prove that triangle ABC is equal in area to triangle DBC. Does that make sense? (yes/no):`,
    hint: `Equal area means they enclose the same space.` },
  { q: `Let us extend the line AD in both directions to points E and F. Possible? (yes/no):`,
    hint: `Postulate 2 allows us to produce a finite straight line continuously in a straight line.` },
  { q: `Through B, draw line BE parallel to AC. Through C, draw line CF parallel to BD. Can we do this? (yes/no):`,
    hint: `Proposition I.31 allows a straight line to be drawn through a given point parallel to a given line.` },
  { q: `Now, is EBCA a parallelogram? (yes/no):`,
    hint: `It has opposite sides parallel: BE ∥ AC and BC ∥ AE.` },
  { q: `Is DBCF also a parallelogram? (yes/no):`,
    hint: `Similarly, CF ∥ BD and BC ∥ DF, so it is a parallelogram.` },
  { q: `Are parallelograms EBCA and DBCF equal in area? (yes/no):`,
    hint: `Proposition I.35 says parallelograms on the same base and in the same parallels are equal.` },
  { q: `Is triangle ABC half of parallelogram EBCA? (yes/no):`,
    hint: `By Proposition I.34, the diagonal AB bisects the parallelogram.` },
  { q: `Is triangle DBC half of parallelogram DBCF? (yes/no):`,
    hint: `By Proposition I.34 again, the diagonal DC bisects the parallelogram.` },
  { q: `If each triangle is half of equal parallelograms, are the triangles themselves equal? (yes/no):`,
    hint: `Halves of equal things are equal to one another (Common Notion 1).` }
];

const conclusion = `Congratulations! You just proved that triangles on the same base and within the same parallels are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
