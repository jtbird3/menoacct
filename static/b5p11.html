<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.11 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.11 - Prove that ratios equal to the same ratio are equal to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.11 chatbot!

We are given six magnitudes: A, B, C, D, E, and F. A is to B as C is to D, and also C is to D as E is to F. Do you agree? (yes/no):`,
    hint: `The given ratios are three instances of the same ratio.` },
  { q: `First, take equimultiples of the six magnitudes: let G, H, K be equimultiples of A, C, E respectively; and let L, M, N be equimultiples of B, D, F respectively. Can we do this? (yes/no):`,
    hint: `“Equimultiples” means G = p·A, H = p·C, K = p·E for some whole number p, and L = q·B, M = q·D, N = q·F for some (possibly different) whole number q.` },
  { q: `Are G, H, K taken with the same multiple on A, C, E, and L, M, N with the same (possibly different) multiple on B, D, F? (yes/no):`,
    hint: `We use one common multiplier for the first triple and one common (arbitrary) multiplier for the second triple, as in Euclid’s definition.` },
  { q: `Our goal is to prove that, as A is to B, so is E to F (A:B = E:F). Does that make sense? (yes/no):`,
    hint: `We want to show E:F has the same ratio to B as A does, using the equimultiple test (Def. V.5).` },
  { q: `We are given that A:B = C:D and also that C:D = E:F. Do you agree? (yes/no):`,
    hint: `“Same ratio” here is in the sense of Book V: the equimultiple (comparison) definition.` },
  { q: `From A:B = C:D and the equimultiples G, H of A, C and L, M of B, D, does it follow that: if G > L then H > M; if G = L then H = M; and if G < L then H < M? (yes/no):`,
    hint: `By Def. V.5: for equal ratios, corresponding equimultiples compare the same way (greater/equal/less).` },
  { q: `From C:D = E:F and the equimultiples H, K of C, E and M, N of D, F, does it follow that: if H > M then K > N; if H = M then K = N; and if H < M then K < N? (yes/no):`,
    hint: `Apply the same equimultiple test to the second equality of ratios.` },
  { q: `Combining the last two results, can we conclude: if G > L then K > N; if G = L then K = N; and if G < L then K < N? (yes/no):`,
    hint: `Transitivity: G vs L controls H vs M, and H vs M controls K vs N; therefore G vs L controls K vs N.` },
  { q: `Since G and K are equimultiples of A and E, and L and N are equimultiples of B and F, does the rule in Def. V.5 now give A:B = E:F? (yes/no):`,
    hint: `The equimultiple comparisons match in all three cases (> , = , <), which is exactly the test for proportionality.` },
  { q: `Therefore, ratios which are the same with the same ratio are also the same with one another. Do you agree? (yes/no):`,
    hint: `We’ve shown A:B = E:F from A:B = C:D and C:D = E:F by the equimultiple criterion.` }
];

const conclusion = `Congratulations! You just proved that ratios equal to the same ratio are equal to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
