<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.93</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.93 – Prove that if an area is contained by a rational straight line and a third apotome, the side of the area is a second apotome of a medial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.93 chatbot!

We are given an area AB contained by the rational straight line AC and the third apotome AD. Do you agree? (yes/no):`,
  hint: `This restates the hypothesis of the proposition.` },
{ q: `Our goal is to show that the side of the area AB is a second apotome of a medial straight line. Does that make sense? (yes/no):`,
  hint: `We want to classify the side of the area.` },

{ q: `Let DG be the annex to AD. Is this construction allowed? (yes/no):`,
  hint: `By definition, every apotome has an annex.` },
{ q: `Are AG and GD rational straight lines commensurable in square only? (yes/no):`,
  hint: `This follows from the definition of a third apotome.` },
{ q: `Is neither AG nor GD commensurable in length with the rational straight line AC? (yes/no):`,
  hint: `This is part of the defining property of a third apotome.` },
{ q: `Is the square on AG greater than the square on GD by the square on a straight line commensurable with AG? (yes/no):`,
  hint: `This is stated in Book X, Definitions III.3.` },

{ q: `Since the square on AG exceeds the square on GD in this way, can a parallelogram be applied to AG equal to the square on EG and deficient by a square figure, dividing AG into commensurable parts? (yes/no):`,
  hint: `This follows from Proposition X.17.` },
{ q: `Let DG be bisected at E. Is this permissible? (yes/no):`,
  hint: `Any straight line can be bisected.` },
{ q: `Let a parallelogram equal to the square on EG be applied to AG, deficient by a square figure, forming rectangle AF, FG. Is this construction acceptable? (yes/no):`,
  hint: `This applies the previous result directly.` },
{ q: `Let EH, FI, and GK be drawn through E, F, and G parallel to AC. Can this be done? (yes/no):`,
  hint: `Parallels through given points can be drawn.` },

{ q: `Are AF and FG commensurable in length? (yes/no):`,
  hint: `They were constructed as commensurable parts of AG.` },
{ q: `Does it follow that AI is commensurable with FK? (yes/no):`,
  hint: `By proportionality of parallelograms (VI.1, X.11).` },
{ q: `Since AF and FG are commensurable in length, is AG commensurable in length with each of AF and FG? (yes/no):`,
  hint: `This follows from Proposition X.15.` },
{ q: `But AG is rational and incommensurable in length with AC; does it follow that AF and FG are also incommensurable in length with AC? (yes/no):`,
  hint: `By Proposition X.13.` },
{ q: `Therefore, are the rectangles AI and FK medial? (yes/no):`,
  hint: `Rectangles contained by such straight lines are medial (X.21).` },

{ q: `Is DE commensurable in length with EG? (yes/no):`,
  hint: `E is the midpoint of DG.` },
{ q: `Does it follow that DG is commensurable in length with each of DE and EG? (yes/no):`,
  hint: `By Proposition X.15.` },
{ q: `But GD is rational and incommensurable in length with AC; does it follow that DE and EG are also rational and incommensurable in length with AC? (yes/no):`,
  hint: `By Proposition X.13.` },
{ q: `Therefore, are the rectangles DH and EK medial? (yes/no):`,
  hint: `Again by Proposition X.21.` },

{ q: `Since AG and GD are commensurable in square only, is AG incommensurable in length with GD? (yes/no):`,
  hint: `Commensurable in square only implies incommensurable in length.` },
{ q: `But AG is commensurable in length with AF, and GD with EG; does it follow that AF is incommensurable in length with EG? (yes/no):`,
  hint: `By Proposition X.13.` },
{ q: `But as AF is to EG, so is AI to EK; does it follow that AI is incommensurable with EK? (yes/no):`,
  hint: `By VI.1 and X.11.` },

{ q: `Let the square LM be constructed equal to AI, and let NO equal to FK be subtracted about the same angle. Is this allowed? (yes/no):`,
  hint: `This is a standard construction using VI.26.` },
{ q: `Are LM and NO about the same diameter? (yes/no):`,
  hint: `Squares and rectangles applied about the same angle share a diameter.` },

{ q: `Since the rectangle AF, FG equals the square on EG, does it follow that AF is to EG as EG is to FG? (yes/no):`,
  hint: `By VI.17.` },
{ q: `But AF is to EG as AI is to EK, and EG is to FG as EK is to FK; does it follow that EK is a mean proportional between AI and FK? (yes/no):`,
  hint: `By proportional reasoning (V.11).` },
{ q: `Is MN also a mean proportional between LM and NO? (yes/no):`,
  hint: `This is true for figures about the same diameter.` },
{ q: `Since AI equals LM and FK equals NO, is EK equal to MN? (yes/no):`,
  hint: `Equal mean proportionals between equals are equal.` },
{ q: `Is MN equal to LO, and EK equal to DH? (yes/no):`,
  hint: `These are corresponding constructed equalities.` },

{ q: `Does it follow that the whole DK equals the gnomon UVW together with NO? (yes/no):`,
  hint: `This follows from the additive construction.` },
{ q: `Is AK equal to LM and NO together? (yes/no):`,
  hint: `This follows from the construction.` },
{ q: `Therefore, is the remainder AB equal to the square on LN? (yes/no):`,
  hint: `Subtract equals from equals.` },
{ q: `Does it follow that LN is the side of the area AB? (yes/no):`,
  hint: `The side of a square equal to the area is its side.` },

{ q: `Now, since AI and FK were proved medial and equal to the squares on LP and PN, are LP and PN medial straight lines? (yes/no):`,
  hint: `If the square on a line is medial, the line is medial.` },
{ q: `Since AI is commensurable with FK, is the square on LP commensurable with the square on PN? (yes/no):`,
  hint: `By VI.1 and X.11.` },
{ q: `Since AI is incommensurable with EK, is the square on LP incommensurable with the rectangle LP, PN? (yes/no):`,
  hint: `Corresponding magnitudes preserve incommensurability.` },
{ q: `Does it follow that LP is incommensurable in length with PN? (yes/no):`,
  hint: `Again by VI.1 and X.11.` },
{ q: `Therefore, are LP and PN medial straight lines commensurable in square only? (yes/no):`,
  hint: `This matches the definition.` },

{ q: `Since EK was proved medial and equals the rectangle LP, PN, is the rectangle LP, PN medial? (yes/no):`,
  hint: `Equals of medials are medial.` },
{ q: `Therefore, do LP and PN contain a medial rectangle while being commensurable in square only? (yes/no):`,
  hint: `This completes the defining condition.` },
{ q: `Therefore, is LN a second apotome of a medial straight line? (yes/no):`,
  hint: `By Proposition X.75.` },
{ q: `And is LN the side of the area AB? (yes/no):`,
  hint: `This was shown earlier.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and a third apotome, the side of the area is a second apotome of a medial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
