<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.11 – To draw a straight line perpendicular to a given plane from a given point above it.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.11 chatbot!

We are given an elevated point A and a plane of reference. Do you agree? (yes/no):`,
    hint: `The elevated point is above or away from the plane; the plane is the surface to which we want to construct a perpendicular.` },

  { q: `Our goal is to draw from A a straight line perpendicular to the plane. Does that make sense? (yes/no):`,
    hint: `A line perpendicular to a plane meets every line in that plane that passes through its foot at right angles.` },

  { q: `Let any straight line BC be drawn in the plane at random. Can we do that? (yes/no):`,
    hint: `We can select any line lying in the plane of reference.` },

  { q: `Let AD be drawn from A perpendicular to BC. Is this possible? (yes/no):`,
    hint: `Proposition I.12 allows drawing a perpendicular from a point to a given straight line.` },

  { q: `If AD is also perpendicular to the plane, have we achieved our goal? (yes/no):`,
    hint: `A line perpendicular to a plane meets all lines in the plane passing through its foot at right angles.` },

  { q: `If not, let DE be drawn from D at right angles to BC in the plane. Can we construct this? (yes/no):`,
    hint: `Proposition XI.11 allows drawing a perpendicular from a point in a plane to a line in that plane.` },

  { q: `Let AF be drawn from A perpendicular to DE. Possible? (yes/no):`,
    hint: `Proposition I.12 again allows drawing a perpendicular from a point to a straight line.` },

  { q: `Let GH be drawn through F parallel to BC. Can we do this? (yes/no):`,
    hint: `Proposition I.31 allows drawing a line through a point parallel to a given line.` },

  { q: `Since BC is perpendicular to both DA and DE, is BC perpendicular to the plane through ED and DA? (yes/no):`,
    hint: `Proposition XI.4 shows that a line perpendicular to two intersecting lines in a plane is perpendicular to the plane.` },

  { q: `GH is parallel to BC; if one of two parallel lines is perpendicular to a plane, is the other also perpendicular? (yes/no):`,
    hint: `Proposition XI.8 confirms that parallel lines share perpendicularity to the same plane.` },

  { q: `Therefore, is GH perpendicular to all lines in the plane through ED and DA that meet it? (yes/no):`,
    hint: `By Definition XI.3, a line perpendicular to a plane meets all lines in the plane through its foot at right angles.` },

  { q: `AF meets GH and lies in the plane through ED and DA; therefore is GH ⟂ FA? (yes/no):`,
    hint: `A line perpendicular to another in the plane forms a right angle at their intersection.` },

  { q: `AF is perpendicular to DE and GH. Can we conclude AF is perpendicular to both? (yes/no):`,
    hint: `By construction, AF meets DE and GH each at right angles.` },

  { q: `If a line is perpendicular to two intersecting lines at their point of intersection, is it perpendicular to the plane through them? (yes/no):`,
    hint: `Proposition XI.4 establishes perpendicularity to a plane via two intersecting lines.` },

  { q: `Therefore, is AF perpendicular to the plane through ED and GH? (yes/no):`,
    hint: `The plane through ED and GH is determined by those two intersecting lines.` },

  { q: `Therefore, is AF perpendicular to the plane of reference? Have we completed the construction? (yes/no):`,
    hint: `We have drawn the required line from point A perpendicular to the plane. Q.E.F.` }
]

const conclusion = `Congratulations! You just constructed draw a straight line perpendicular to a given plane from a given point above it.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
