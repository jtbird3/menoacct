<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.8 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.8 – Prove that if a line is cut, four times the rectangle by the whole and one part plus the square on the other part equals the square on the whole and that part together</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.8 chatbot!

We are given a straight line AB cut at random at a point C. Do you agree? (yes/no):`,
    hint: `"Cut at random" means we choose any point C on AB, not necessarily in the middle.` },
  { q: `Our goal is to show that if AB is cut at C, then four times the rectangle contained by AB and BC, together with the square on AC, is equal to the square on the straight line made up of AB and BC. Does that make sense? (yes/no):`,
    hint: `We want to show: 4(AB x BC)+AC²=(AB+BC)².` },
  { q: `Next, produce the line AB to a point D so BD equals BC. Can we do that? (yes/no):`,
    hint: `By Postulate 2, we can extend a straight line; we then set BD equal in length to BC.` },
  { q: `Now construct the square AEFD on AD. Is this possible? (yes/no):`,
    hint: `Proposition I.46 shows how to construct a square on any straight line.` },
  { q: `Can we join DE? (yes/no):`,
    hint: `Postulate 1 allows us to draw a line from any point to any point.` },
  { q: `Through point B, draw BL parallel to AE or DF, crossing ED at K. Is this possible? (yes/no):`,
    hint: `By I.31, we can draw a line parallel to a given line through a given point.` },
  { q: `Through point C, draw CH parallel to AE or DF, crossing ED at Q. Can we do this? (yes/no):`,
    hint: `By I.31, we can draw a line parallel to a given line through a given point.` },
  { q: `Through point K, draw MN parallel to AD (or EF), crossing CH at point G. Possible? (yes/no):`,
    hint: `Proposition I.31 ensures parallels can be drawn through a point.` },
  { q: `Through point Q, draw OP parallel to AD (or EF), crossing BL at R. Is this possible? (yes/no):`,
    hint: `Proposition I.31 ensures parallels can be drawn through a point.` },
  { q: `Since CB is equal to BD, and CB equals GK while BD equals KN, do we conclude that GK equals KN? (yes/no):`,
    hint: `If each equals CB, then they equal each other.` },
  { q: `For the same reason, is QR equal to RP? (yes/no):`,
    hint: `The construction repeats the same relation.` },
  { q: `Now, since BC equals BD, and GK equals KN, do we see that CK equals KD, and GR equals RN? (yes/no):`,
    hint: `By Proposition I.36, parallelograms on equal bases and between the same parallels are equal.` },
  { q: `But CK equals RN, because they are complements in the same parallelogram. Do you agree? (yes/no):`,
    hint: `Proposition I.43: complements of parallelograms about a diagonal are equal.` },
  { q: `Therefore, are CK, KD, GR, and RN all equal areas? (yes/no):`,
    hint: `Each was proved equal to another, so all four are equal.` },
  { q: `So do the four together equal four times CK? (yes/no):`,
    hint: `Four equal areas make four times one of them.` },
  { q: `In the same way, are AG, MQ, QL, and RF all equal to one another? (yes/no):`,
    hint: `Again, by I.36 and I.43, equal bases and complements give equal areas.` },
  { q: `So do they together equal four times AG? (yes/no):`,
    hint: `As before, four equal areas equal four times one.` },
  { q: `But the eight areas together form the gnomon STU, and this equals four times AK. Do you see that? (yes/no):`,
    hint: `The two quadruple relations combine to make this gnomon.` },
  { q: `Since AK is the rectangle contained by AB and BD, is four times the rectangle AB with BD equal to the gnomon STU? (yes/no):`,
    hint: `Because BK equals BD, the rectangle AK is made from AB and BD.` },
  { q: `Now let the square on AC, called OH, be added to each side. Is this allowed? (yes/no):`,
    hint: `By Common Notion 2, if equals are added to equals, the wholes are equal.` },
  { q: `So do we have four times the rectangle AB with BD together with the square on AC equal to the gnomon STU together with OH? (yes/no):`,
    hint: `This is a direct consequence of the addition.` },
  { q: `But is the gnomon STU together with OH the whole square AEFD on AD? (yes/no):`,
    hint: `The gnomon plus the square on AC exactly fills the square on AD.` },
  { q: `Therefore, is four times the rectangle AB with BD together with the square on AC equal to the square on AD? (yes/no):`,
    hint: `The square AEFD is the square on AD.` },
  { q: `Finally, since BD is equal to BC, do we conclude that four times the rectangle AB with BC together with the square on AC equals the square on the line made up of AB and BC? (yes/no):`,
    hint: `Because AD is made from AB and BD, and BD = BC, so AD = AB + BC.` }
];

const conclusion = `Congratulations! You just proved that when a line is cut at random, four times the rectangle of the whole and one part together with the square on the other part equals the square on the whole and that part taken together.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
