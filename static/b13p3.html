<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.3 – Prove that if a straight line is cut in extreme and mean ratio, then the square on the lesser segment together with the square on half the greater segment is five times the square on half the greater segment.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.3 chatbot!

We are given a straight line AB cut in extreme and mean ratio at point C. Do you agree? (yes/no):`,
    hint: `By hypothesis, AB is divided at C in extreme and mean ratio.` },

  { q: `The segment AC is the greater segment, and BC the lesser segment. Is that correct? (yes/no):`,
    hint: `In an extreme and mean ratio division, one segment is greater and the other lesser.` },

  { q: `Let AC be bisected at point D. Can we do this? (yes/no):`,
    hint: `Any straight line can be bisected.` },

  { q: `Our goal is to show that the square on BD is five times the square on DC. Does that make sense? (yes/no):`,
    hint: `This is the claim of the proposition.` },

  { q: `Let the square AE be described on AB. Is this construction allowed? (yes/no):`,
    hint: `A square can be constructed on any straight line.` },

  { q: `Let the figure be drawn double. Do you accept this step? (yes/no):`,
    hint: `Doubling the figure allows the use of gnomons and equal areas.` },

  { q: `Since AC is double of DC, is the square on AC quadruple of the square on DC? (yes/no):`,
    hint: `If a line is doubled, the square on it is four times as large.` },

  { q: `Is the square on AC represented by RS, and the square on DC by FG? (yes/no):`,
    hint: `These labels correspond to the constructed squares in the figure.` },

  { q: `Since the rectangle AB, BC is equal to the square on AC, do you agree? (yes/no):`,
    hint: `This follows from the definition of extreme and mean ratio.` },

  { q: `And since CE is the rectangle AB, BC, is CE equal to RS? (yes/no):`,
    hint: `Equal rectangles represent equal areas.` },

  { q: `Since RS is quadruple of FG, is CE also quadruple of FG? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Since AD is equal to DC, is HK equal to KF? (yes/no):`,
    hint: `Equal segments give equal corresponding constructed parts.` },

  { q: `Hence, is the square GF equal to the square HL? (yes/no):`,
    hint: `Squares on equal lines are equal.` },

  { q: `From this, is GK equal to KL, that is, MN equal to NE? (yes/no):`,
    hint: `Equal areas imply equality of corresponding sides.` },

  { q: `Therefore, is MF equal to FE? (yes/no):`,
    hint: `Equal segments result from equal subdivisions.` },

  { q: `But MF is equal to CG. Do you agree? (yes/no):`,
    hint: `This follows from the construction.` },

  { q: `Therefore, is CG also equal to FE? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Let CN be added to each. Is this permitted? (yes/no):`,
    hint: `Equals may be added to equals.` },

  { q: `Therefore, is the gnomon OPQ equal to CE? (yes/no):`,
    hint: `Adding equal parts preserves equality.` },

  { q: `But CE was proved to be quadruple of FG. Do you agree? (yes/no):`,
    hint: `This was established earlier.` },

  { q: `Therefore, is the gnomon OPQ also quadruple of the square FG? (yes/no):`,
    hint: `Equal areas maintain the same ratio.` },

  { q: `Therefore, are the gnomon OPQ and the square FG together five times FG? (yes/no):`,
    hint: `Quadruple plus one makes five times.` },

  { q: `But the gnomon OPQ together with the square FG is the square DN. Do you agree? (yes/no):`,
    hint: `This follows from the construction of the square.` },

  { q: `Is DN the square on DB, and GF the square on DC? (yes/no):`,
    hint: `These are the corresponding geometric representations.` },

  { q: `Therefore, is the square on DB five times the square on DC? (yes/no):`,
    hint: `This is the exact conclusion required.` }
]

const conclusion = `Congratulations! You just proved that if a straight line is cut in extreme and mean ratio, then the square on the lesser segment together with the square on half the greater segment is five times the square on half the greater segment.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
