<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.3 – Prove that any pyramid with a triangular base can be divided into two equal and similar pyramids (each similar to the whole and with triangular bases) and into two equal prisms; and that the two prisms together are greater than half of the whole pyramid.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.3 chatbot!

We are given a pyramid ABCD, with triangle ABC as the base and point D as the vertex. Do you agree? (yes/no):`,
    hint: `The pyramid is defined by base ABC and vertex D.` },

  { q: `Our goal is to show that this pyramid is divided into two equal and similar pyramids, and into two equal prisms, and that the prisms are greater than half the whole pyramid. Does that make sense? (yes/no):`,
    hint: `This restates exactly what is to be proved.` },

  { q: `Let the edges AB, BC, CA, AD, DB, DC be bisected at E, F, G, H, K, L respectively. Is this allowed? (yes/no):`,
    hint: `Any straight line can be bisected.` },

  { q: `Now join the straight lines HE, EG, GH, HK, KL, LH, KF, and FG. Can we do this? (yes/no):`,
    hint: `A straight line may be drawn from any point to any point.` },

  { q: `Since AE equals EB and AH equals HD, is EH parallel to DB? (yes/no):`,
    hint: `By VI.2, a line joining midpoints of two sides of a triangle is parallel to the third side.` },

  { q: `For the same reason, is HK parallel to AB? (yes/no):`,
    hint: `The same midpoint argument applies.` },

  { q: `Since HEBK is a parallelogram, is HK equal to EB? (yes/no):`,
    hint: `Opposite sides of a parallelogram are equal (I.34).` },

  { q: `And since EB equals EA, does AE equal HK? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Since AH equals HD, do the two sides EA, AH equal the two sides KH, HD respectively? (yes/no):`,
    hint: `We have already established both pairs of equal sides.` },

  { q: `Is the angle EAH equal to the angle KHD? (yes/no):`,
    hint: `They are vertically opposite angles.` },

  { q: `Therefore, is the base EH equal to the base KD? (yes/no):`,
    hint: `By I.4 (SAS).` },

  { q: `Can we conclude that triangle AEH is equal and similar to triangle HKD? (yes/no):`,
    hint: `Equal sides and equal included angle give equality and similarity.` },

  { q: `For the same reason, is triangle AHG equal and similar to triangle HLD? (yes/no):`,
    hint: `The same construction and reasoning applies.` },

  { q: `Now, since EH and HG meet and are parallel to KD and DL respectively, and are not in the same plane, do they contain equal angles? (yes/no):`,
    hint: `By XI.10.` },

  { q: `Is the angle EHG equal to the angle KDL? (yes/no):`,
    hint: `These are the angles contained by the parallel lines.` },

  { q: `Since EH equals KD, HG equals DL, and the included angles are equal, is EG equal to KL? (yes/no):`,
    hint: `Again by I.4.` },

  { q: `Therefore, is triangle EHG equal and similar to triangle KDL? (yes/no):`,
    hint: `Equality and similarity follow from SAS.` },

  { q: `For the same reason, is triangle AEG equal and similar to triangle HKL? (yes/no):`,
    hint: `The same midpoint and parallel reasoning applies.` },

  { q: `Can we conclude that the pyramid with base AEG and vertex H is equal and similar to the pyramid with base HKL and vertex D? (yes/no):`,
    hint: `By XI.Def.10, similar bases and proportional edges give similar pyramids.` },

  { q: `Since HK is parallel to AB, is triangle ADB equiangular to triangle DHK? (yes/no):`,
    hint: `By I.29, alternate interior angles are equal.` },

  { q: `Do these triangles also have proportional sides? (yes/no):`,
    hint: `Corresponding sides lie between parallel lines.` },

  { q: `Therefore, is triangle ADB similar to triangle DHK? (yes/no):`,
    hint: `By VI.Def.1.` },

  { q: `For the same reason, is triangle DBC similar to triangle DKL, and triangle ADC to triangle DLH? (yes/no):`,
    hint: `Each pair lies in corresponding parallel planes.` },

  { q: `Since BA and AC meet, and KH and HL meet, and the pairs are parallel, do they contain equal angles? (yes/no):`,
    hint: `By XI.10 again.` },

  { q: `Is angle BAC equal to angle KHL? (yes/no):`,
    hint: `These are the angles between the corresponding pairs.` },

  { q: `And as BA is to AC, so is KH to HL, is triangle ABC similar to triangle HKL? (yes/no):`,
    hint: `By VI.Def.1.` },

  { q: `Therefore, is the pyramid with base ABC and vertex D similar to the pyramid with base HKL and vertex D? (yes/no):`,
    hint: `Similar bases imply similar pyramids.` },

  { q: `Since the pyramid HKLD was already shown similar to pyramid AEGH, is each of the pyramids AEGH and HKLD similar to the whole pyramid ABCD? (yes/no):`,
    hint: `Similarity is transitive.` },

  { q: `Now, since BF equals FC, is parallelogram EBFG double of triangle GFC? (yes/no):`,
    hint: `A parallelogram on the same base and between the same parallels is double the triangle.` },

  { q: `If two prisms have equal height, and one has a parallelogram base double of a triangular base, are the prisms equal? (yes/no):`,
    hint: `By XI.39.` },

  { q: `Therefore, is the prism with bases EBFG and EHG equal to the prism with bases GFC and HKL? (yes/no):`,
    hint: `The bases are in the required ratio and the heights are equal.` },

  { q: `Is each of these prisms greater than each of the pyramids with bases AEG and HKL respectively? (yes/no):`,
    hint: `A prism contains more volume than a pyramid on the same base and height.` },

  { q: `Is the pyramid with base EBF and vertex K equal to the pyramid with base AEG and vertex H? (yes/no):`,
    hint: `They are contained by equal and similar planes.` },

  { q: `Therefore, is the prism with base EBFG greater than the pyramid with base AEG? (yes/no):`,
    hint: `Equal things substituted preserve inequalities.` },

  { q: `Since the two prisms are equal to one another, and the two pyramids are equal to one another, are the two prisms greater than the two pyramids together? (yes/no):`,
    hint: `Equals added to equals preserve order.` },

  { q: `Finally, can we conclude that the whole pyramid ABCD has been divided into two equal pyramids and two equal prisms, and that the prisms are greater than half the whole pyramid? (yes/no):`,
    hint: `This completes exactly what was to be demonstrated.` }
]

const conclusion = `Congratulations! You just proved that any pyramid with a triangular base can be divided into two equal and similar pyramids (each similar to the whole and with triangular bases) and into two equal prisms; and that the two prisms together are greater than half of the whole pyramid.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
