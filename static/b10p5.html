<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.5 – Prove that commensurable magnitudes have to one another the ratio of one number to another number.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.5 chatbot!

We are given two commensurable magnitudes, A and B. Do you agree? (yes/no):`,
hint: `Commensurable magnitudes are magnitudes measured by a common magnitude.` },
{ q: `Our goal is to show that A has to B the same ratio as a number has to a number. Does that make sense? (yes/no):`,
hint: `We want to replace a ratio of magnitudes by a ratio of numbers.` },
{ q: `Since A and B are commensurable, does there exist some magnitude that measures both of them? (yes/no):`,
hint: `This is exactly what commensurable means.` },
{ q: `Let that common measure be called C. Is that acceptable? (yes/no):`,
hint: `We now use C to compare A and B.` },
{ q: `As many times as C measures A, let there be that many units in a number D. Do you follow? (yes/no):`,
hint: `D counts how many times C fits into A.` },
{ q: `As many times as C measures B, let there be that many units in a number E. Agreed? (yes/no):`,
hint: `E counts how many times C fits into B.` },
{ q: `Since C measures A according to the units in D, and the unit measures D according to the units in it, does the unit measure D the same number of times as C measures A? (yes/no):`,
hint: `Both describe the same counting process.` },
{ q: `Therefore, is it true that as C is to A, so the unit is to D? (yes/no):`,
hint: `This follows from Book VII, Definition 20.` },
{ q: `Then, inversely, is it true that as A is to C, so D is to the unit? (yes/no):`,
hint: `This uses the property of inverse ratios (cf. Book V, Proposition 7).` },
{ q: `Now, since C measures B according to the units in E, and the unit measures E according to the units in it, does the unit measure E the same number of times as C measures B? (yes/no):`,
hint: `The reasoning is exactly parallel to the case of A and D.` },
{ q: `Therefore, is it true that as C is to B, so the unit is to E? (yes/no):`,
hint: `Again, this follows from Book VII, Definition 20.` },
{ q: `We have shown that as A is to C, so D is to the unit, and as C is to B, so the unit is to E. Do you see that? (yes/no):`,
hint: `These two proportional relations have been established separately.` },
{ q: `From these, can we conclude, by ex aequali, that as A is to B, so D is to E? (yes/no):`,
hint: `This uses Book V, Proposition 22 (ex aequali proportions).` },
{ q: `Therefore, do the commensurable magnitudes A and B have to one another the ratio which the number D has to the number E? (yes/no):`,
hint: `This is exactly what we set out to prove.` },
{ q: `Therefore, commensurable magnitudes have to one another the ratio which a number has to a number.`,
hint: `Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated).` }
]






const conclusion = `Congratulations! You just proved that commensurable magnitudes have to one another the ratio of one number to another number.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
