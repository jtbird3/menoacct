<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.36 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.36 – Prove that parallelograms on equal bases and in the same parallels are equal</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.36 chatbot!

We are given two parallelograms ABCD and EFGH. Do you agree? (yes/no):`,
    hint: `Think of two four-sided figures with opposite sides parallel.` },
  { q: `They are on equal bases BC and FG, and in the same parallels AH and BG. Do you see this? (yes/no):`,
    hint: `Equal bases means BC = FG; same parallels means both bases lie between the same two parallel lines.` },
  { q: `Our goal is to prove that parallelogram ABCD equals parallelogram EFGH. Does that make sense? (yes/no):`,
    hint: `Equality of parallelograms means they have the same area.` },
  { q: `First, join BE and CH. Can we do that? (yes/no):`,
    hint: `By Postulate 1, a straight line can be drawn from any point to any point.` },
  { q: `Since BC = FG and FG = EH, is BC = EH? (yes/no):`,
    hint: `Common Notion 1: things equal to the same thing are equal to one another.` },
  { q: `Are BC and EH also parallel? (yes/no):`,
    hint: `By construction, both are bases lying in the same set of parallels.` },
  { q: `If EB and HC join the ends of equal and parallel lines BC and EH in the same directions, are EB and HC equal and parallel? (yes/no):`,
    hint: `Proposition I.33: lines joining equal and parallel lines are themselves equal and parallel.` },
  { q: `Therefore, is EBCH a parallelogram? (yes/no):`,
    hint: `Proposition I.34: a quadrilateral with both pairs of opposite sides equal and parallel is a parallelogram.` },
  { q: `Is parallelogram EBCH equal to ABCD? (yes/no):`,
    hint: `Proposition I.35: parallelograms on the same base and in the same parallels are equal.` },
  { q: `For the same reason, is EFGH also equal to EBCH? (yes/no):`,
    hint: `Again by Proposition I.35: same base and same parallels imply equality.` },
  { q: `If ABCD = EBCH and EFGH = EBCH, do we conclude ABCD = EFGH? (yes/no):`,
    hint: `Common Notion 1: things equal to the same thing are equal to one another.` }
];

const conclusion = `Congratulations, you just proved parallelograms on equal bases and in the same parallels are equal to one another.!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
