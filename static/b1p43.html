<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.43 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.43 – Prove that in any parallelogram, the complements of the parallelograms about the diameter are equal</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.43 chatbot!

We are given a parallelogram ABCD with diagonal AC. Do you agree? (yes/no):`,
    hint: `A parallelogram is a quadrilateral with opposite sides equal and parallel.` },
  { q: `About the diagonal AC, parallelograms EH and FG are described, making the so-called complements BK and KD. Do you see this? (yes/no):`,
    hint: `The "complements" are the parallelogram parts cut off by drawing the smaller parallelograms about the diagonal.` },
  { q: `Our goal is to prove that complement BK equals complement KD. Does that make sense? (yes/no):`,
    hint: `We want to show the two leftover parallelogram pieces are equal.` },
  { q: `Since ABCD is a parallelogram with diameter AC, is triangle ABC equal to triangle ADC? (yes/no):`,
    hint: `By Proposition I.34, the diagonal of a parallelogram bisects it into equal triangles.` },
  { q: `Since EH is a parallelogram with diameter AK, is triangle AEK equal to triangle AHK? (yes/no):`,
    hint: `The diagonal of a parallelogram divides it into equal triangles.` },
  { q: `For the same reason, is triangle KFC equal to triangle KGC? (yes/no):`,
    hint: `The diagonal KG divides parallelogram FG into two equal triangles.` },
  { q: `Now, since AEK = AHK and KFC = KGC, is AEK + KGC equal to AHK + KFC? (yes/no):`,
    hint: `Common Notion 2: if equals are added to equals, the wholes are equal.` },
  { q: `And since triangle ABC = triangle ADC, do we conclude that the remaining complement BK = the remaining complement KD? (yes/no):`,
    hint: `Common Notion 3: if equals are subtracted from equals, the remainders are equal.` }
];

const conclusion = `Congratulations! You have shown that in any parallelogram, the complements of the parallelograms about the diameter are equal. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated).`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
