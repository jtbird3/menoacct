<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.3 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.3 - Prove that if a diameter bisects a chord, it cuts it at right angles; and conversely, if it cuts it at right angles, it bisects it.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.3 chatbot!

We are given a circle ABC, and a straight line AB not through the center. Do you agree? (yes/no):`,
    hint: `AB is a chord of the circle that does not pass through the center.` },
  { q: `Let us draw line CD, passing through center E and bisecting AB at point F. Can we do this? (yes/no):`,
    hint: `Bisecting means AF = FB, with F the midpoint of AB.` },
  { q: `Our goal is to show: if CD bisects AB, it also cuts it at right angles; and conversely, if CD cuts AB at right angles, it also bisects it. Does that make sense? (yes/no):`,
    hint: `We want to prove both directions — bisect implies perpendicular, and perpendicular implies bisect.` },
  { q: `Is AF equal to FB? (yes/no):`,
    hint: `By definition of bisect, AF = FB.` },
  { q: `Join EA and EB. Is this possible? (yes/no):`,
    hint: `We can connect any two points with a straight line.` },
  { q: `Now, in triangles AFE and BFE: AF = FB, FE common, and EA = EB. Do you agree? (yes/no):`,
    hint: `AF = FB by bisect, FE shared, and EA = EB as radii of the circle.` },
  { q: `Therefore, by Proposition I.8 (SSS), does ∠AFE = ∠BFE? (yes/no):`,
    hint: `If two sides equal two sides and the base equals the base, then the angles at the base are equal.` },
  { q: `If a straight line makes adjacent angles equal, are they right angles? (yes/no):`,
    hint: `By Definition I.10, equal adjacent angles are right angles.` },
  { q: `Therefore, does CD cut AB at right angles? (yes/no):`,
    hint: `Yes, because ∠AFE and ∠BFE are right.` },
  { q: `Is ∠AFE = ∠BFE, both being right angles? (yes/no):`,
    hint: `At the intersection, both adjacent angles are right.` },
  { q: `Since EA = EB, do we have ∠EAF = ∠EBF in triangles AFE and BFE? (yes/no):`,
    hint: `From Proposition I.5, sides EA and EB being equal means base angles are equal.` },
  { q: `So in triangles AFE and BFE, do we have two angles equal to two angles and EF common? (yes/no):`,
    hint: `∠AFE = ∠BFE, ∠EAF = ∠EBF, and side EF is shared.` },
  { q: `By Proposition I.26, do triangles AFE and BFE have corresponding sides equal? (yes/no):`,
    hint: `If two triangles have equal angles and a side between them equal, then the remaining sides are equal.` },
  { q: `Therefore, is AF equal to FB? (yes/no):`,
    hint: `Equal triangles give AF = FB.` },
  { q: `So, have we shown both directions — bisect implies perpendicular, and perpendicular implies bisect? (yes/no):`,
    hint: `Yes, we proved both cases using I.8, I.5, and I.26.` }
];

const conclusion = `Congratulations! You just proved a line through the center that bisects a chord also cuts it at right angles, and if it cuts at right angles, it also bisects.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
