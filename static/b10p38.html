<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.38</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.38 - Prove that if two medial straight lines commensurable in square only and containing a medial rectangle are added together, the whole is irrational; let such a straight line be called a second bimedial straight line.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.38 chatbot!

We are given two straight lines AB and BC, each medial, and commensurable in square only. Do you agree? (yes/no):`,
hint: `“Medial” and “commensurable in square only” are given by hypothesis.` },
{ q: `We are also told that the rectangle contained by AB and BC is medial. Agreed? (yes/no):`,
hint: `This is part of the hypothesis of the proposition.` },
{ q: `We add the two straight lines AB and BC together, forming AC. Do you see that AC is the whole? (yes/no):`,
hint: `AC is composed of AB and BC placed end to end.` },
{ q: `Our goal is to prove that AC is irrational. Does that make sense? (yes/no):`,
hint: `This is exactly what the proposition claims.` },

{ q: `Let a rational straight line DE be set out. Is this allowed? (yes/no):`,
hint: `We may always assume a rational straight line.` },
{ q: `Let the parallelogram DF, equal to the square on AC, be applied to DE, producing DG as breadth. Can we do this? (yes/no):`,
hint: `Proposition I.44 allows a parallelogram equal to a given square to be applied to a given straight line.` },

{ q: `Since AC is composed of AB and BC, is the square on AC equal to the squares on AB and BC together with twice the rectangle AB, BC? (yes/no):`,
hint: `This follows from Proposition II.4.` },
{ q: `Let EH, equal to the squares on AB and BC, be applied to DE. Is this construction possible? (yes/no):`,
hint: `We are applying an area equal to a given sum of squares.` },
{ q: `Is the remaining area HF equal to twice the rectangle AB, BC? (yes/no):`,
hint: `Subtracting equals from equals leaves equal remainders.` },

{ q: `Since AB and BC are medial, are the squares on AB and BC also medial? (yes/no):`,
hint: `The square on a medial straight line is medial.` },
{ q: `By hypothesis, is twice the rectangle AB, BC also medial? (yes/no):`,
hint: `This is explicitly assumed in the proposition.` },
{ q: `Since EH equals the squares on AB and BC, and HF equals twice the rectangle AB, BC, are both rectangles EH and HF medial? (yes/no):`,
hint: `Equal areas share the same classification.` },

{ q: `Since EH and HF are medial rectangles applied to the rational straight line DE, are the straight lines DH and HG rational but incommensurable in length with DE? (yes/no):`,
hint: `Proposition X.22 applies: applying a medial area to a rational base produces a rational breadth incommensurable in length with the base.` },

{ q: `Since AB is incommensurable in length with BC, and as AB is to BC so is the square on AB to the rectangle AB, BC, is the square on AB incommensurable with the rectangle AB, BC? (yes/no):`,
hint: `This follows from Proposition X.11.` },
{ q: `Is the sum of the squares on AB and BC commensurable with the square on AB? (yes/no):`,
hint: `By Proposition X.15, the squares on AB and BC are commensurable, so their sum is commensurable with either.` },
{ q: `Is twice the rectangle AB, BC commensurable with the rectangle AB, BC? (yes/no):`,
hint: `By Proposition X.6.` },
{ q: `Therefore, is the sum of the squares on AB and BC incommensurable with twice the rectangle AB, BC? (yes/no):`,
hint: `By Proposition X.13.` },

{ q: `Since EH equals the sum of the squares on AB and BC, and HF equals twice the rectangle AB, BC, is EH incommensurable with HF? (yes/no):`,
hint: `Equal magnitudes preserve commensurability relations.` },
{ q: `Does this imply that DH is incommensurable in length with HG? (yes/no):`,
hint: `By VI.1 the rectangles on the same base have the ratio of their breadths, and by X.11 incommensurability passes to the corresponding sides.` },

{ q: `Are DH and HG rational straight lines commensurable in square only? (yes/no):`,
hint: `Each is rational (as shown), but they are incommensurable in length.` },
{ q: `Does it then follow that DG is irrational? (yes/no):`,
hint: `By Proposition X.36, the sum of two such lines is irrational.` },

{ q: `Since DE is rational, and the rectangle contained by a rational and an irrational straight line is irrational, is the area DF irrational? (yes/no):`,
hint: `An area commensurable with a rational area would make its breadth commensurable with the rational base; since the breadth DG is irrational, DF must be irrational.` },
{ q: `Is the side of the square equal to DF therefore irrational? (yes/no):`,
hint: `By Definition X.4, if a square is irrational, its side is irrational.` },
{ q: `But is AC the side of the square equal to DF? (yes/no):`,
hint: `DF was constructed equal to the square on AC.` },

{ q: `Therefore, is AC irrational? (yes/no):`,
hint: `This completes the proof.` },
{ q: `And is such a straight line rightly called a second bimedial straight line? (yes/no):`,
hint: `This follows the naming given in the proposition.` }

]





const conclusion = `Congratulations! You just proved that if two medial straight lines commensurable in square only and containing a medial rectangle are added together, the whole is irrational; let such a straight line be called a second bimedial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
