<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.39</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.39 – Prove that if there be two prisms of equal height, and one have a parallelogram as base and the other a triangle, and if the parallelogram be double of the triangle, the prisms are equal.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.39 chatbot!

We are given two prisms, ABCDEF and GHKLMN, of equal height. Do you agree? (yes/no):`,
    hint: `The proposition states explicitly that the two prisms have the same height.` },

  { q: `One prism has the parallelogram AF as its base, and the other has the triangle GHK as its base. Is that correct? (yes/no):`,
    hint: `These are the bases named in the statement.` },

  { q: `Our goal is to show that the prism ABCDEF is equal to the prism GHKLMN. Does that make sense? (yes/no):`,
    hint: `This is exactly what the proposition claims.` },

  { q: `First, let the solids AO and GP be completed. Can we do this? (yes/no):`,
    hint: `Each prism can be completed to a parallelepipedal solid.` },

  { q: `Now, we are told that the parallelogram AF is double of the triangle GHK. Do you agree? (yes/no):`,
    hint: `This is a given condition of the proposition.` },

  { q: `Is the parallelogram HK also double of the triangle GHK? (yes/no):`,
    hint: `By Proposition I.34, a parallelogram on the same base and between the same parallels is double the triangle on that base.` },

  { q: `Since AF and HK are both double of the same triangle GHK, can we conclude that parallelogram AF equals parallelogram HK? (yes/no):`,
    hint: `Things which are double of the same thing are equal to one another.` },

  { q: `Are the solids AO and GP parallelepipedal solids standing on equal bases and of the same height? (yes/no):`,
    hint: `Their bases AF and HK are equal, and the solids have equal heights.` },

  { q: `From Proposition XI.31, do parallelepipedal solids on equal bases and of the same height equal one another? (yes/no):`,
    hint: `XI.31 establishes equality under these conditions.` },

  { q: `Can we then conclude that the solid AO is equal to the solid GP? (yes/no):`,
    hint: `Equal bases and equal heights imply equal solids.` },

  { q: `Is the prism ABCDEF half of the solid AO? (yes/no):`,
    hint: `A prism is half of the parallelepiped formed by completing it.` },

  { q: `Is the prism GHKLMN half of the solid GP? (yes/no):`,
    hint: `The same reasoning applies to the second prism.` },

  { q: `If two solids are equal, are their halves also equal? (yes/no):`,
    hint: `Halves of equal magnitudes are equal (Common Notion).` },

  { q: `Can we therefore conclude that prism ABCDEF is equal to prism GHKLMN? (yes/no):`,
    hint: `Each prism is half of equal solids.` }
]

const conclusion = `Congratulations! You just if there be two prisms of equal height, and one have a parallelogram as base and the other a triangle, and if the parallelogram be double of the triangle, the prisms are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
