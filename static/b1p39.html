<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.39 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.39 – Prove that equal triangles on the same base and on the same side lie in the same parallels</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.39 chatbot!

We are given two equal triangles, ABC and DBC, on the same base BC and on the same side of it. Do you agree? (yes/no):`,
    hint: `Both triangles share base BC and lie above or below it together.` },
  { q: `Our goal is to prove that the line AD is parallel to BC. Does that make sense? (yes/no):`,
    hint: `This is the claim of the proposition — equal triangles on the same base and side are between the same parallels.` },
  { q: `Shall we join the straight line AD? (yes/no):`,
    hint: `Postulate 1 allows us to join any two points with a straight line.` },
  { q: `Suppose AD were not parallel to BC. Then can we draw through point A another line, AE, parallel to BC? (yes/no):`,
    hint: `Proposition I.31 guarantees that through a point not on a line, a parallel to the line can be drawn.` },
  { q: `Next, let us join EC. Possible? (yes/no):`,
    hint: `Again, Postulate 1: join any two points with a straight line.` },
  { q: `Now, is triangle ABC equal to triangle EBC? (yes/no):`,
    hint: `Proposition I.37: triangles on the same base BC and between the same parallels AE and BC are equal.` },
  { q: `But is triangle ABC also equal to triangle DBC? (yes/no):`,
    hint: `This was given at the start: ABC = DBC.` },
  { q: `So, from this, would it follow that DBC is also equal to EBC? (yes/no):`,
    hint: `Common Notion 1: things equal to the same thing are equal to one another.` },
  { q: `But is it possible for triangle DBC to equal triangle EBC if one is clearly greater? (yes/no):`,
    hint: `No — a greater cannot be equal to a less.` },
  { q: `Therefore, was our assumption false that AD was not parallel to BC? (yes/no):`,
    hint: `We reached a contradiction, so the assumption must be wrong.` },
  { q: `So is AD the only line through A that can be parallel to BC? (yes/no):`,
    hint: `Yes; any different parallel would yield the same contradiction.` },
  { q: `Therefore, are the equal triangles ABC and DBC contained between the same parallels, namely AD and BC? (yes/no):`,
    hint: `That is the conclusion of the proposition.` }
];

const conclusion = `Congratulations! You have shown that triangles on the same base and on the same side are equal in area if and only if they lie between the same parallels.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
