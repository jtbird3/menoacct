<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.1 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.1 - Find the center of a given circle.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.1 chatbot!

We are given a circle called ABC. Do you agree? (yes/no):`,
    hint: `A circle is defined by all points equally distant from a center, though here the center is not yet known.` },
  { q: `Our goal is to find the center of this circle. Does that make sense? (yes/no):`,
    hint: `The construction will locate the exact midpoint of the circle.` },
  { q: `Let us draw a straight line AB across the circle at random. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point, including across the circle.` },
  { q: `Now, bisect line AB at point D. Can we do that? (yes/no):`,
    hint: `Proposition I.10 allows a straight line to be bisected at a point.` },
  { q: `From point D, draw a line DC at right angles to AB, and extend it through to point E. Possible? (yes/no):`,
    hint: `Proposition I.11 allows a straight line to be drawn at right angles from the end or midpoint of another line.` },
  { q: `Next, bisect CE at point F. Is that possible? (yes/no):`,
    hint: `Again, by Proposition I.10, any finite straight line can be bisected.` },
  { q: `Now, I claim that F is the center of circle ABC. Does this follow? (yes/no):`,
    hint: `We will prove by contradiction that no other point can be the center.` },
  { q: `Suppose, if possible, that another point G is the center. Can we join GA, GD, and GB? (yes/no):`,
    hint: `Postulate 1 allows joining any two points with a straight line.` },
  { q: `Since AD = DB and DG is common, and GA = GB (radii), do triangles ADG and BDG have equal sides? (yes/no):`,
    hint: `AD = DB (by construction), DG is shared, and GA = GB (radii of circle).` },
  { q: `Therefore, are ∠ADG and ∠GDB equal? (yes/no):`,
    hint: `Proposition I.8: if two triangles have two sides equal respectively and the base equal, then the angles opposite are equal.` },
  { q: `Now, if a straight line set up on another makes equal adjacent angles, are they right angles? (yes/no):`,
    hint: `By Definition I.10, equal adjacent angles are right angles.` },
  { q: `So, is ∠GDB a right angle? (yes/no):`,
    hint: `Yes, because equal adjacent angles must be right.` },
  { q: `But is ∠FDB also right (since FD ⟂ AB)? (yes/no):`,
    hint: `By construction, FD is perpendicular to AB.` },
  { q: `If ∠GDB = ∠FDB, then a greater angle equals a lesser. This is impossible, do you agree? (yes/no):`,
    hint: `This is a contradiction; greater cannot equal less.` },
  { q: `Therefore, G is not the center. Is F the only other candidate for the center? (yes/no):`,
    hint: `The same reasoning applies to any other candidate point.` },
  { q: `Therefore, is F the center of the circle ABC? (yes/no):`,
    hint: `By exclusion, only F satisfies the condition.` },
  { q: `Porism: If a straight line in a circle is bisected at right angles, is the center always on that line? (yes/no):`,
    hint: `Yes, this follows directly from the argument.` }
];

const conclusion = `Congratulations! You have found the center of the given circle. Q.E.F. (Quod Erat Faciendum — which was to be done).`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
