<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.5 – Prove that if a straight line is drawn at right angles to three straight lines meeting at the same point, then the three straight lines lie in one plane.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.5 chatbot!

We are given three straight lines BC, BD, BE meeting at point B. Do you agree? (yes/no):`,
    hint: `The lines meet at a single common point, B.` },

  { q: `Our goal is to show that BC, BD, BE are all in one plane. Does that make sense? (yes/no):`,
    hint: `A plane can contain multiple lines that meet at a point.` },

  { q: `Let a straight line AB be set up at right angles to BC, BD, BE at point B. Is this construction possible? (yes/no):`,
    hint: `Postulate 11 allows a line to be perpendicular to other lines at their intersection.` },

  { q: `Suppose, for contradiction, that BD and BE lie in one plane, but BC is in a more elevated plane. Can we consider this case? (yes/no):`,
    hint: `This is the method of reductio ad absurdum, assuming the opposite to prove impossibility.` },

  { q: `Let us produce a plane through AB and BC; will it intersect the plane of BD and BE in a straight line? (yes/no):`,
    hint: `Proposition XI.3 says two planes intersect in a straight line.` },

  { q: `Call the intersection BF. Do AB, BC, BF lie in one plane? (yes/no):`,
    hint: `By construction, AB, BC, BF are all in the plane drawn through AB and BC.` },

  { q: `Since AB is perpendicular to BD and BE, is AB also perpendicular to the plane through BD and BE? (yes/no):`,
    hint: `Proposition XI.4 states a line perpendicular to two intersecting lines in a plane is perpendicular to the plane.` },

  { q: `But the plane through BD and BE is the reference plane. Therefore, is AB perpendicular to the reference plane? (yes/no):`,
    hint: `AB was perpendicular to BD and BE, so it must be perpendicular to their plane.` },

  { q: `Therefore AB makes right angles with all lines in the reference plane meeting it. Do you agree? (yes/no):`,
    hint: `By definition of perpendicularity to a plane (XI. Def. 3).` },

  { q: `But BF lies in the reference plane and meets AB. So is angle ABF right? (yes/no):`,
    hint: `AB perpendicular to the plane implies a right angle with all lines in it through B.` },

  { q: `By hypothesis, angle ABC is right. Is angle ABF equal to angle ABC? (yes/no):`,
    hint: `Both are right angles at B with AB.` },

  { q: `But angle ABF and angle ABC are supposed to be in different planes. Is this possible? (yes/no):`,
    hint: `Two equal right angles cannot lie in separate planes; they must be coplanar.` },

  { q: `Therefore, BC cannot lie in a more elevated plane. Do you see that? (yes/no):`,
    hint: `The assumption leads to a contradiction, so BC is in the same plane.` },

  { q: `Hence, BC, BD, BE are all in one plane. Does that conclude our proof? (yes/no):`,
    hint: `Q.E.D. – The lines are coplanar when a perpendicular is erected to all three at their intersection.` }
]

const conclusion = `Congratulations! You just if a straight line is drawn at right angles to three straight lines meeting at the same point, then the three straight lines lie in one plane.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
