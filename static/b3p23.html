<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.23 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.23 - Prove that it is impossible to have two similar circle segments of different sizes on the same side.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.23 chatbot!

We are given a straight line AB, with two arcs ADB (outer) and ACB (inner) on the same side of this line. Do you agree? (yes/no):`,
    hint: `AB is the common base line for both circle segments. ACB is the inside arc and ADB is the outer arc.` },
  { q: `Our goal is to show that we cannot have two similar but unequal circle segments on AB, on the same side. Does that make sense? (yes/no):`,
    hint: `“Similar” here means they admit equal angles (see Def. III.11).` },
  { q: `Let us suppose, for contradiction, that these two segments ACB and ADB are similar and unequal on AB, on the same side. Acceptable? (yes/no):`,
    hint: `We begin by assuming the impossible, to show a contradiction will result.` },
  { q: `Next, draw the straight line ACD through C and D, then join BC and BD. Possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Since the segment ACB is similar to the segment ADB, do we agree that ∠ACB = ∠ADB? (yes/no):`,
    hint: `By Definition III.11, similar segments admit equal angles.` },
  { q: `Now, is ∠ACB an exterior angle to triangle ADB? (yes/no):`,
    hint: `∠ACB lies outside ΔADB, adjacent to ∠ADB.` },
  { q: `But does Euclid I.16 state that an exterior angle is greater than the opposite interior angle? (yes/no):`,
    hint: `Yes — the exterior angle of a triangle is always greater than either opposite interior angle.` },
  { q: `Therefore, ∠ACB = ∠ADB, which means the exterior equals the interior. Do you agree that this is impossible? (yes/no):`,
    hint: `No — that contradicts Proposition I.16.` },
  { q: `So, is it impossible to have two unequal similar circle segments on the same side of the same line? (yes/no):`,
    hint: `Because the assumption led to contradiction, the construction cannot exist.` }
];

const conclusion = `Congratulations! You just proved that it is impossible to construct two similar and unequal segments of circles on the same side of a straight line. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
