<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.4 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.4 - Inscribe a circle in a given triangle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.4 chatbot!

We are given a triangle ABC. Do you agree? (yes/no):`,
    hint: `The problem asks us to inscribe a circle within triangle ABC.` },
  { q: `Our goal is to construct a circle inside triangle ABC that touches all three sides. Does that make sense? (yes/no):`,
    hint: `The circle must be tangent to sides AB, BC, and CA.` },
  { q: `First, let us bisect ∠ABC and ∠ACB with straight lines BD and CD that meet at a point D inside the triangle. Can we do this? (yes/no):`,
    hint: `Proposition I.9 shows how to bisect an angle.` },
  { q: `From D, let us drop perpendiculars DE, DF, DG onto the sides AB, BC, and CA. Is this possible? (yes/no):`,
    hint: `From a point to a straight line, we can always draw a perpendicular.` },
  { q: `Now, since ∠ABD = ∠CBD and ∠BED = ∠BFD, are triangles EBD and FBD equal by ASA? (yes/no):`,
    hint: `They share side BD, and have two pairs of equal angles.` },
  { q: `If triangles EBD and FBD are equal, do we have DE = DF? (yes/no):`,
    hint: `Equal triangles have corresponding sides equal.` },
  { q: `By the same reasoning, is DG also equal to DF? (yes/no):`,
    hint: `Repeating the ASA argument with the other bisected angle gives DG = DF.` },
  { q: `So, are DE, DF, and DG all equal? (yes/no):`,
    hint: `Each perpendicular is equal in length from D to the sides of the triangle.` },
  { q: `If a circle is drawn with center D and radius DE, will it also pass through F and G? (yes/no):`,
    hint: `Since DE = DF = DG, the circle centered at D goes through E, F, and G.` },
  { q: `Does this circle touch the sides AB, BC, and CA at E, F, and G? (yes/no):`,
    hint: `Each radius meets the side at right angles, so the circle touches but does not cut the sides.` },
  { q: `Therefore, have we inscribed a circle within triangle ABC, tangent to all three sides? (yes/no):`,
    hint: `Yes, the circle with center D and radius DE touches AB, BC, and CA.` }
];

const conclusion = `Congratulations! You have inscribed a circle within a given triangle. 
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
