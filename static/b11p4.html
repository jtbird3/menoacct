<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.4 – Prove that if a straight line is drawn at right angles to two straight lines that intersect at a point, then it is also at right angles to the plane containing them.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.4 chatbot!

We are given two straight lines AB and CD intersecting at point E. Do you agree? (yes/no):`,
    hint: `The lines meet at a single point E.` },

  { q: `We are also given a straight line EF drawn through E and perpendicular to both AB and CD. Do you agree? (yes/no):`,
    hint: `EF makes right angles with both lines at E.` },

  { q: `Our goal is to prove that EF is perpendicular to the plane through AB and CD. Does that make sense? (yes/no):`,
    hint: `We want to show EF is perpendicular to the plane determined by AB and CD.` },

  { q: `By definition, is a line perpendicular to a plane if it is perpendicular to every straight line in that plane which meets it? (yes/no):`,
    hint: `This is Euclid, Book XI, Definition 3.` },

  { q: `Let us cut off equal segments AE and EB on AB, and equal segments CE and ED on CD. Is this possible? (yes/no):`,
    hint: `From a given point, equal segments can be cut off on straight lines.` },

  { q: `Let us draw any straight line GEH through point E in the plane of AB and CD. Can we do this? (yes/no):`,
    hint: `Any straight line through E in the plane is allowed.` },

  { q: `Join the points A to D and C to B with straight lines. Is this permitted? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Take any point F on the line EF. Is this possible? (yes/no):`,
    hint: `Any point may be chosen on a straight line.` },

  { q: `Join FA, FB, FC, FD, FG, and FH. Can we do this? (yes/no):`,
    hint: `Straight lines may be drawn between any two points.` },

  { q: `Since AE = EB and CE = ED, and the vertical angles at E are equal, are triangles AED and CEB equal? (yes/no):`,
    hint: `Two sides and the included angle are equal (Proposition I.4).` },

  { q: `From this, do we conclude that AD equals CB? (yes/no):`,
    hint: `Corresponding sides of equal triangles are equal.` },

  { q: `Since AE = EB, FE is common, and EF is perpendicular to AB, are triangles FAE and FBE equal? (yes/no):`,
    hint: `Two sides and the included right angle are equal (Proposition I.4).` },

  { q: `From this, do we conclude that FA equals FB? (yes/no):`,
    hint: `Equal triangles have equal corresponding sides.` },

  { q: `Similarly, since CE = ED and EF is perpendicular to CD, are triangles FCE and FDE equal? (yes/no):`,
    hint: `Same construction and reasoning as before.` },

  { q: `From this, do we conclude that FC equals FD? (yes/no):`,
    hint: `Corresponding sides of equal triangles are equal.` },

  { q: `Now, since FA = FB, FD = FC, and AD = CB, are triangles FAD and FBC equal? (yes/no):`,
    hint: `Three sides are equal respectively (Proposition I.8).` },

  { q: `From this, is angle FAD equal to angle FBC? (yes/no):`,
    hint: `Equal triangles have equal corresponding angles.` },

  { q: `Since GEH is any straight line through E in the plane, and EF makes equal adjacent angles with it, is EF perpendicular to GEH? (yes/no):`,
    hint: `Equal adjacent angles imply right angles.` },

  { q: `Because GEH was chosen arbitrarily, is EF perpendicular to every straight line through E in the plane of AB and CD? (yes/no):`,
    hint: `The argument applies to any such line.` },

  { q: `Therefore, is EF perpendicular to the plane through AB and CD? (yes/no):`,
    hint: `By Definition 3, a line perpendicular to all lines in a plane is perpendicular to the plane.` }
]

const conclusion = `Congratulations! You just if a straight line is drawn at right angles to two straight lines that intersect at a point, then it is also at right angles to the plane containing them.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
