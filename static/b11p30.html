<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.30</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.30 – Prove that parallelepipedal solids which are on the same base and of the same height, and in which the extremities of the sides which stand up are not on the same straight lines, are equal to one another.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.30 chatbot!

We are given two parallelepipedal solids CM and CN on the same base AB and of the same height. Do you agree? (yes/no):`,
    hint: `The proposition explicitly states that CM and CN share the same base and height.` },

  { q: `The extremities of the sides which stand up—AF, AG, LM, LN, CD, CE, BH, BK—are not on the same straight lines. Is that given? (yes/no):`,
    hint: `This condition distinguishes the case from solids treated earlier.` },

  { q: `Our goal is to show that the solid CM is equal to the solid CN. Does that make sense? (yes/no):`,
    hint: `“Equal” here means equal in volume.` },

  { q: `Let NK and DH be produced until they meet at a point R. Is this construction allowed? (yes/no):`,
    hint: `Straight lines may be produced until they meet.` },

  { q: `Let FM and GE also be produced, meeting at points P and Q respectively. Is this possible? (yes/no):`,
    hint: `Producing straight lines is always permitted in Euclid.` },

  { q: `Now let the straight lines AO, LP, CQ, and BR be joined. Can we do this? (yes/no):`,
    hint: `A straight line can be drawn from any point to any point.` },

  { q: `Consider the solid CM, which has parallelogram ACBL as its base and FDHM as its opposite face. Do you see this? (yes/no):`,
    hint: `These faces bound the solid CM.` },

  { q: `Consider also the solid CP, which has the same base ACBL and the opposite face OQRP. Is that correct? (yes/no):`,
    hint: `CP is formed after the extensions and connections just described.` },

  { q: `Are the solids CM and CP on the same base ACBL and of the same height? (yes/no):`,
    hint: `Their bases coincide, and their opposite faces are parallel.` },

  { q: `Are the extremities of their standing sides—AF, AO, LM, LP, CD, CQ, BH, BR—on the same straight lines FP and DR? (yes/no):`,
    hint: `These points lie on the produced straight lines.` },

  { q: `From Proposition XI.29, can we conclude that the solid CM is equal to the solid CP? (yes/no):`,
    hint: `XI.29 states that such parallelepipedal solids are equal.` },

  { q: `Now consider the solid CP and the solid CN. Do they also share the same base ACBL? (yes/no):`,
    hint: `Both solids are constructed on parallelogram ACBL.` },

  { q: `Are they of the same height as well? (yes/no):`,
    hint: `Their opposite faces are parallel to the base.` },

  { q: `Are the extremities of their standing sides—AG, AO, CE, CQ, LN, LP, BK, BR—on the same straight lines GQ and NR? (yes/no):`,
    hint: `These points lie along the produced straight lines.` },

  { q: `By the same reasoning as before, does Proposition XI.29 show that CP is equal to CN? (yes/no):`,
    hint: `The same conditions are satisfied.` },

  { q: `If CM equals CP and CP equals CN, can we conclude that CM equals CN? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Therefore, are parallelepipedal solids on the same base and of the same height, whose standing sides are not on the same straight lines, equal to one another? (yes/no):`,
    hint: `This completes the general statement of the proposition.` }
]

const conclusion = `Congratulations! You just parallelepipedal solids which are on the same base and of the same height, and in which the extremities of the sides which stand up are not on the same straight lines, are equal to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
