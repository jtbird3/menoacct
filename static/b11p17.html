<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.17 – Prove that if two straight lines are cut by parallel planes, they are cut in the same ratios.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.17 chatbot!

We are given two straight lines AB and CD, cut by the parallel planes GH, KL, MN at the points A, E, B and C, F, D respectively. Do you agree? (yes/no):`,
    hint: `Each straight line meets the three parallel planes in three points.` },

  { q: `Our goal is to show that, as AE is to EB, so is CF to FD. Does that make sense? (yes/no):`,
    hint: `“Same ratios” means the segments between the planes are proportional.` },

  { q: `Let us join the straight lines AC, BD, and AD. Is this allowed? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Let the straight line AD meet the plane KL at the point O. Do you see that this point O exists? (yes/no):`,
    hint: `Since AD passes through the region between the planes, it must meet KL.` },

  { q: `Let the straight lines EO and OF be joined. Can we do this? (yes/no):`,
    hint: `Again, Postulate 1 allows straight lines to be drawn between points.` },

  { q: `Now, since the two parallel planes KL and MN are cut by the plane EBDO, are their common sections EO and BD parallel? (yes/no):`,
    hint: `When parallel planes are cut by another plane, their intersections are parallel (XI.16).` },

  { q: `For the same reason, since the two parallel planes GH and KL are cut by the plane AOFC, are their common sections AC and OF parallel? (yes/no):`,
    hint: `This follows by the same proposition on parallel planes (XI.16).` },

  { q: `Since EO is drawn parallel to BD, one side of triangle ABD, can we say that, proportionally, as AE is to EB, so is AO to OD? (yes/no):`,
    hint: `A line drawn parallel to one side of a triangle cuts the other sides proportionally (VI.2).` },

  { q: `Again, since OF is drawn parallel to AC, one side of triangle ADC, can we say that, proportionally, as AO is to OD, so is CF to FD? (yes/no):`,
    hint: `The same proportionality theorem applies here as well (VI.2).` },

  { q: `But was it already shown that, as AO is to OD, so is AE to EB? (yes/no):`,
    hint: `This was concluded from the first proportionality in triangle ABD.` },

  { q: `From this, can we conclude that, as AE is to EB, so is CF to FD? (yes/no):`,
    hint: `Things which are equal in ratio to the same ratio are also equal in ratio to one another (V.11).` },

  { q: `Therefore, have we shown that if two straight lines are cut by parallel planes, they are cut in the same ratios? (yes/no):`,
    hint: `This is exactly what was required to be demonstrated.` }
]

const conclusion = `Congratulations! You just if two straight lines are cut by parallel planes, they are cut in the same ratios.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
