<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.98</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.98 – Prove that if the square on a first apotome of a medial straight line is applied to a rational straight line, the breadth produced is a second apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.98 chatbot!

Let AB be a first apotome of a medial straight line, and CD a rational straight line. Do you agree? (yes/no):`,
  hint: `This restates the hypothesis of the proposition.` },
{ q: `To the straight line CD let CE be applied equal to the square on AB, producing CF as breadth. Is this construction accepted? (yes/no):`,
  hint: `This is the standard Euclidean application of a square to a straight line.` },
{ q: `Our goal is to show that CF is a second apotome. Does that make sense? (yes/no):`,
  hint: `We must verify that CF satisfies the definition of a second apotome.` },

{ q: `Let BG be the annex to AB. Can we take such an annex? (yes/no):`,
  hint: `Every apotome has an annex by definition.` },
{ q: `Are AG and GB medial straight lines commensurable in square only, which contain a rational rectangle? (yes/no):`,
  hint: `This follows from Proposition X.74.` },

{ q: `To CD let CH be applied equal to the square on AG, producing CK as breadth, and KL equal to the square on GB, producing KM as breadth. Is this allowed? (yes/no):`,
  hint: `Squares may be applied to a straight line by Euclidean construction.` },
{ q: `Is the whole CL equal to the squares on AG and GB together? (yes/no):`,
  hint: `CL consists of CH together with KL.` },
{ q: `Is CL therefore medial? (yes/no):`,
  hint: `The sum of medial squares is medial (X.15, X.23 Porism).` },

{ q: `Since CL is applied to the rational straight line CD producing CM as breadth, is CM rational and incommensurable in length with CD? (yes/no):`,
  hint: `This follows from Proposition X.22.` },

{ q: `Since the square on AB is equal to CE, and CL equals the squares on AG and GB, is the remainder FL equal to twice the rectangle AG, GB? (yes/no):`,
  hint: `This follows from Proposition II.7.` },
{ q: `Is twice the rectangle AG, GB rational, and therefore FL rational? (yes/no):`,
  hint: `The rectangle contained by medial straight lines is rational.` },
{ q: `Since FL is applied to the rational straight line CD producing FM as breadth, is FM rational and commensurable in length with CD? (yes/no):`,
  hint: `This follows from Proposition X.20.` },

{ q: `Since CL is medial and FL is rational, are CL and FL incommensurable? (yes/no):`,
  hint: `Medial and rational areas are incommensurable.` },
{ q: `But as CL is to FL, so is CM to FM. Do you agree? (yes/no):`,
  hint: `This follows from Proposition VI.1.` },
{ q: `Does it follow that CM is incommensurable in length with FM? (yes/no):`,
  hint: `By Proposition X.11.` },
{ q: `And since both CM and FM are rational straight lines, are they commensurable in square only? (yes/no):`,
  hint: `This is Proposition X.73.` },
{ q: `Therefore, is CF an apotome? (yes/no):`,
  hint: `CF is composed of CM and MF with these properties.` },

{ q: `I say next that CF is also a second apotome. Do you agree this is the next goal? (yes/no):`,
  hint: `We now refine the kind of apotome.` },
{ q: `Let FM be bisected at N, and let NO be drawn through N parallel to CD. Is this construction valid? (yes/no):`,
  hint: `A straight line can be bisected and a parallel drawn through a point.` },
{ q: `Are the rectangles FO and NL each equal to the rectangle AG, GB? (yes/no):`,
  hint: `Halving twice a rectangle yields equal rectangles.` },

{ q: `Since the rectangle AG, GB is a mean proportional between the squares on AG and GB, is NL also a mean proportional between CH and KL? (yes/no):`,
  hint: `Equal magnitudes preserve proportional relations.` },
{ q: `Does it follow that as CH is to NL, so is NL to KL? (yes/no):`,
  hint: `Definition of a mean proportional.` },
{ q: `As CH is to NL, is CK to NM; and as NL is to KL, is NM to MK? (yes/no):`,
  hint: `By Proposition VI.1.` },
{ q: `Does it follow that the rectangle CK, KM is equal to the square on NM? (yes/no):`,
  hint: `By Propositions V.11 and VI.17.` },
{ q: `And is this equal to the fourth part of the square on FM? (yes/no):`,
  hint: `NM is half of FM.` },

{ q: `Since CM and MF are unequal straight lines, and to CM there has been applied a rectangle equal to the fourth part of the square on MF, deficient by a square figure, and dividing it into commensurable parts, are the conditions of Proposition X.17 satisfied? (yes/no):`,
  hint: `All hypotheses of X.17 are met.` },
{ q: `Does it follow that the square on CM is greater than the square on MF by the square on a straight line commensurable in length with CM? (yes/no):`,
  hint: `This is the conclusion of Proposition X.17.` },
{ q: `And since FM is commensurable in length with the rational straight line CD, is CF a second apotome? (yes/no):`,
  hint: `This matches Definition III.2 of Book X.` },
]

const conclusion = `Congratulations! You just proved that if the square on a first apotome of a medial straight line is applied to a rational straight line, the breadth produced is a second apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
