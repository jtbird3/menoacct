<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Percentages 1 - What is a percentage?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Percentages 1 - What is a percentage?</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Percentages - What is a percentage? chatbot!

We are given a whole pizza and $100. Do you agree? (yes/no):`,
hint: `A “whole” means nothing is missing.` },

{ q: `Our goal is to understand what a percent is by using the pizza and the $100. Does that make sense? (yes/no):`,
hint: `We want to explain percent without formulas.` },

{ q: `Suppose we cut the whole pizza into 4 equal slices. Is this possible? (yes/no):`,
hint: `Equal slices mean same size.` },

{ q: `If your brother eats 2 of the 4 slices, did he eat half the pizza? (yes/no):`,
hint: `2 out of 4 equals one-half.` },

{ q: `Can half of something be thought of as a part of the whole? (yes/no):`,
hint: `A part is less than or equal to the whole.` },

{ q: `Now imagine the whole pizza is called “100 parts.” Is that reasonable? (yes/no):`,
hint: `We are just choosing to name the whole as 100.` },

{ q: `If the whole pizza is 100 parts, does half the pizza equal 50 parts? (yes/no):`,
hint: `Half of 100 is 50.` },

{ q: `So if your brother ate half the pizza, did he eat 50 out of 100 parts? (yes/no):`,
hint: `50 out of 100 can be written as 50%.` },

{ q: `Is “50% of the pizza” another way of saying “half the pizza”? (yes/no):`,
hint: `Both describe the same amount.` },

{ q: `Now consider the $100. Is $100 the whole amount of money? (yes/no):`,
hint: `There is no more money than this.` },

{ q: `If you spend $50, is that half of $100? (yes/no):`,
hint: `50 is half of 100.` },

{ q: `If the whole $100 is called 100 parts, does $50 equal 50 parts? (yes/no):`,
hint: `Each dollar can count as one part.` },

{ q: `So did you spend 50 out of 100 parts of your money? (yes/no):`,
hint: `This matches what you did with the pizza.` },

{ q: `Is spending 50 out of 100 the same as spending 50%? (yes/no):`,
hint: `“Percent” means “out of 100.”` },

{ q: `From the pizza and the $100, can we say that a percent means “how many parts out of 100”? (yes/no):`,
hint: `Both examples use the same idea.` },

{ q: `So is a percentage just a way to say how much of a whole you have or use? (yes/no):`,
hint: `It works for pizza, money, and many other things.` },

{ q: `Therefore, have we shown that a percent is simply a part of a whole measured out of 100? (yes/no):`,
hint: `This summarizes everything we discovered.` },
]






const conclusion = `Congratulations! You now just learned what a percentage is using a pizza and $100.

Click here to continue to the next lesson: 

<a href="percent_budget.html">Budgeting — understanding money habits with percentages</a>`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'bot' && text.includes('<a href')) {
    div.innerHTML = text; // Allow HTML for links
  } else {
    div.textContent = text;
  }
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
