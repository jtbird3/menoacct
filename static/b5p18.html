<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.18 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.18 - Prove that if magnitudes are proportional by separation, they are also proportional by composition</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.18 chatbot!

We are given magnitudes AE, EB, CF, and FD separando such that as AE is to EB, so is CF to FD. Do you agree? (yes/no):`,
    hint: `This means AE : EB = CF : FD, a proportion separando (taken by difference).` },
  { q: `Our goal is to show that these same magnitudes are also proportional componendo — that is, as AB is to BE, so is CD to FD. Does that make sense? (yes/no):`,
    hint: `Componendo means the ratio of the sum to the second term, e.g. AB : BE = CD : FD.` },
  { q: `Now, suppose the ratio AB : BE is not equal to CD : FD. Is that a possible assumption to test? (yes/no):`,
    hint: `In a proof by contradiction, we assume the proportion fails and test its consequences.` },
  { q: `Then CD must be to some other magnitude either less than FD or greater than FD. Do you follow? (yes/no):`,
    hint: `If the ratios are unequal, CD : FD would differ, either smaller or larger in ratio.` },
  { q: `First, let CD be to a lesser magnitude DG as AB is to BE. Can we suppose that? (yes/no):`,
    hint: `This sets up an alternative proportional relationship to test — with DG < FD.` },
  { q: `Then, since as AB is to BE, so is CD to DG, do we have magnitudes proportional componendo? (yes/no):`,
    hint: `Yes—AB : BE = CD : DG defines a componendo relation.` },
  { q: `From this, by Proposition V.17, will these also be proportional separando? (yes/no):`,
    hint: `Proposition V.17 states that if magnitudes are proportional componendo, they are also proportional separando.` },
  { q: `Therefore, as AE is to EB, so is CG to GD. Do you see this follows? (yes/no):`,
    hint: `Applying separando gives AE : EB = CG : GD.` },
  { q: `But we also have, by the given, AE : EB = CF : FD. Is that true? (yes/no):`,
    hint: `That's our starting proportion.` },
  { q: `Then, since AE : EB = CF : FD and AE : EB = CG : GD, can we conclude CG : GD = CF : FD? (yes/no):`,
    hint: `By Proposition V.11—magnitudes having the same ratio to a third are equal in ratio to each other.` },
  { q: `Now, is the first magnitude CG greater than the third magnitude CF? (yes/no):`,
    hint: `Yes, because DG was assumed less than FD, so CG > CF.` },
  { q: `Then, by Proposition V.14, must the second magnitude GD be greater than the fourth FD? (yes/no):`,
    hint: `In equal ratios, if one antecedent is greater, its consequent must also be greater.` },
  { q: `But GD was assumed less than FD. Do we have a contradiction? (yes/no):`,
    hint: `No—this is a contradiction.` },
  { q: `Therefore, is it impossible for CD be to a magnitude less than FD in the ratio AB : BE? (yes/no):`,
    hint: `Yes, because the assumption leads to impossibility.` },
  { q: `By similar reasoning, is it likewise impossible for CD be to a magnitude greater than FD in that same ratio? (yes/no):`,
    hint: `Yes; the same contradiction would occur if we assumed the other extreme.` },
  { q: `Therefore, must CD be to FD as AB is to BE? (yes/no):`,
    hint: `Yes—this is the only remaining possibility consistent with the definitions.` }
];

const conclusion = `Congratulations! You just proved that if magnitudes are proportional by separation, they are also proportional by composition.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
