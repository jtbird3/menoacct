<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.31 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.32 - Prove that if two triangles have two proportional sides and are placed with one angle equal and corresponding sides parallel, then their remaining sides lie on one straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.31 chatbot!

We are given two triangles ABC and DCE where AB is to DC as AC is to DE. Do you agree? (yes/no):`,
    hint: `Think of ΔABC and ΔDCE as the two triangles in the statement.` },
  { q: `Also, AB is parallel to DC, and AC is parallel to DE. Do you accept these givens? (yes/no):`,
    hint: `The problem assumes corresponding sides are parallel.` },
  { q: `Our goal is to prove that BC is in a straight line with CE. Does that make sense? (yes/no):`,
    hint: `We want to show BC and CE form one straight line at C.` },
  { q: `Since AB is parallel to DC and AC meets them, are the alternate angles BAC and ACD equal? (yes/no):`,
    hint: `I.29: a line crossing parallels makes equal alternate interior angles.` },
  { q: `For the same reason, does ∠CDE equal ∠ACD? (yes/no):`,
    hint: `AC is parallel to DE, so CD is a transversal to another pair of parallels.` },
  { q: `Therefore, since ∠BAC = ∠ACD and ∠ACD = ∠CDE, is ∠BAC = ∠CDE? (yes/no):`,
    hint: `If two things equal the same thing, they are equal (Common Notion 1).` },
  { q: `Now, triangles ABC and DCE have an angle at A equal to an angle at D, and the sides about these angles proportional. Does this match the conditions of VI.6? (yes/no):`,
    hint: `By VI.6, if two triangles have an angle equal and the including sides proportional, they are equiangular.` },
  { q: `From VI.6, are the triangles ABC and DCE equiangular? (yes/no):`,
    hint: `Proportional sides around equal angles give equal corresponding angles.` },
  { q: `Therefore, is ∠ABC equal to ∠DCE? (yes/no):`,
    hint: `Corresponding angles of equiangular triangles are equal.` },
  { q: `Earlier we found ∠ACD = ∠BAC. Do you remember this? (yes/no):`,
    hint: `It came from the alternate-angle argument on AB ∥ DC.` },
  { q: `If ∠ACD = ∠BAC, does it follow that ∠ACE (which is ACD + DCE) equals ∠ABC + ∠BAC? (yes/no):`,
    hint: `Angle ACE contains ∠ACD; angle DCE equals ∠ABC.` },
  { q: `Add ∠ACB to both sides: are the angles ACE + ACB equal to the angles BAC + ABC + ACB? (yes/no):`,
    hint: `We are adding the same angle to both sides.` },
  { q: `But ∠BAC + ∠ABC + ∠ACB equal two right angles. Do you agree? (yes/no):`,
    hint: `I.32: the angles of any triangle sum to two right angles.` },
  { q: `Therefore, do ∠ACE and ∠ACB also sum to two right angles? (yes/no):`,
    hint: `Both sides of the equality now total two right angles.` },
  { q: `If two adjacent angles on a straight line sum to two right angles, does that mean BC and CE are in a straight line? (yes/no):`,
    hint: `I.14: if adjacent angles equal two right angles, the sides lie on one straight line.` }
];

const conclusion = `Congratulations! You just proved that if two triangles have two proportional sides and are placed with one angle equal and corresponding sides parallel, then their remaining sides lie on one straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
