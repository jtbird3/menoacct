<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.9 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.9 - Cut off prescribed part from a straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.9 chatbot!

We are given a straight line AB. Do you agree? (yes/no):`,
    hint: `AB is our starting line segment, and we must take from it a part in a given ratio.` },
  { q: `Our goal is to cut off from AB a prescribed part — for example, one-third. Does that make sense? (yes/no):`,
    hint: `We want to mark a point F on AB so that AF is exactly one-third of AB.` },
  { q: `Let us draw another straight line AC from point A, making any angle with AB. Can we do that? (yes/no):`,
    hint: `By Postulate 1, a straight line can be drawn from any point to any point.` },
  { q: `Now take a random point D on AC. Possible? (yes/no):`,
    hint: `Any point may be chosen freely on a line.` },
  { q: `Next, can we cut off on AC two more equal segments so that DE = EC = AD? (yes/no):`,
    hint: `Proposition I.3 lets us cut off from a greater line a part equal to a lesser one; use it twice to make DE and EC equal to AD.` },
  { q: `Now join the points B and C. Can we do that? (yes/no):`,
    hint: `By Postulate 1 again, we may draw a straight line from any point to any point.` },
  { q: `Through D, draw DF parallel to BC. Can we do this? (yes/no):`,
    hint: `Proposition I.31 allows a line to be drawn through a given point parallel to a given straight line.` },
  { q: `Since DF is drawn parallel to BC, and both are sides of triangle ABC, can we say the sides are proportional? (yes/no):`,
    hint: `By VI.2, a line parallel to one side of a triangle cuts the other sides proportionally.` },
  { q: `So, as CD is to DA, is BF to FA? (yes/no):`,
    hint: `This is the specific proportionality from the parallel through D (VI.2).` },
  { q: `And since CD is double DA, is BF also double FA? (yes/no):`,
    hint: `Equal ratios preserve multiples: if CD = 2·DA, then BF = 2·FA.` },
  { q: `Therefore, is BA triple of AF? (yes/no):`,
    hint: `BA = AF + FB and FB = 2·AF, hence BA = 3·AF.` },
  { q: `So have we cut off from AB a third part equal to AF? (yes/no):`,
    hint: `AF is one part out of three equal parts into which AB is divided.` }
];

const conclusion = `Congratulations! You just cut off a prescribed part from a straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
