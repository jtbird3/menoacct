<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Theory of Parallels Theorem 9 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Theorem 9 — In a triangle, a greater side lies opposite a greater angle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Lobachevsky's Theory of Parallels Theorem 9 chatbot!

In triangle ABC, suppose AB > AC. Our goal is to show that the angle opposite AB (which is angle ACB) is greater than the angle opposite AC (which is angle ABC). Do you accept this setup? (yes/no):`,
    hint: `We have a triangle where one side is strictly longer than another, and we want to compare the angles opposite them.` },
  { q: `On side AB, mark a point D such that AD = AC. Is this possible, given that AB > AC? (yes/no):`,
    hint: `Since AB is longer than AC, we can mark off a segment AD along AB equal in length to AC, with D between A and B.` },
  { q: `In triangle ACD, we have AC = AD by construction. By Theorem 8, does angle ACD = angle ADC? (yes/no):`,
    hint: `Theorem 8: equal sides lie opposite equal angles. Since AC = AD, the angles opposite them are equal.` },
  { q: `Angle ADC is an exterior angle of triangle BCD (at vertex D, with respect to vertex B). Is angle ADC greater than angle DBC, i.e., greater than angle ABC? (yes/no):`,
    hint: `An exterior angle of a triangle is greater than either non-adjacent interior angle. Angle ADC is exterior to triangle BCD at D, and angle ABC is a non-adjacent interior angle.` },
  { q: `Now, angle ACB is greater than angle ACD (since D is interior to triangle ABC, angle ACB contains angle ACD). And angle ACD = angle ADC > angle ABC. Does it follow by the chain of inequalities that angle ACB > angle ABC? (yes/no):`,
    hint: `Combining: angle ACB > angle ACD = angle ADC > angle ABC. So the angle opposite the greater side AB is indeed greater.` }
];

const conclusion = `Congratulations! You just proved Theorem 9: in a rectilineal triangle, a greater side lies opposite a greater angle. In a right-angled triangle, the hypotenuse is greater than either leg, and the two angles adjacent to it are acute.
Q.E.D.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
