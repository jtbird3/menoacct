<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.13 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.13 - Prove that a circle does not touch another circle at more points than one.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's ELements III.13 chatbot!

Our goal is to prove that two circles cannot touch at more than one point. Does that make sense? (yes/no):`,
    hint: `Touching means they have a common point where their circumferences meet.` },
  { q: `Case 1: Internal touching
Suppose the circle ABCD touches the circle EBFD internally at two points, D and B. Can we assume this? (yes/no):`,
    hint: `This is a temporary assumption for contradiction.` },
  { q: `Let us take the centers of the circles G (for ABCD) and H (for EBFD). Agreed? (yes/no):`,
    hint: `Every circle has a center point from which all radii are equal.` },
  { q: `If circles touch internally at D and B, then the line GH must pass through both B and D. Does that make sense? (yes/no):`,
    hint: `Proposition III.11 says the line through the centers passes through the point(s) of contact.` },
  { q: `Now, since G is the center of circle ABDC, is BG equal to GD? (yes/no):`,
    hint: `Both are radii of the same circle (center G).` },
  { q: `Then BG is greater than HD. Correct? (yes/no):`,
    hint: `Because G is outside circle EBFD, distance from G to B must exceed GH-HD.` },
  { q: `So BH must be much greater than HD. Do you see why? (yes/no):`,
    hint: `BH = BG + GH, but BG > GD, creating the contradiction.` },
  { q: `But since H is the center of circle EBFD, is BH equal to HD? (yes/no):`,
    hint: `Both are radii of the circle with center H.` },
  { q: `Therefore, we have BH = HD but also BH > HD. Is this a contradiction? (yes/no):`,
    hint: `This contradiction shows our assumption was false.` },
  { q: `Therefore, is it impossible for two circles to touch internally at more than one point? (yes/no):`,
    hint: `Yes — only one internal touching point is possible. This is the only conclusion since our assumption led to a contradiction.` },
  { q: `Case 2: External touching
Now suppose circle ACK touches circle ABDC externally at two points, A and C. Acceptable for the sake ofargument? (yes/no):`,
    hint: `Again, this is a temporary assumption for contradiction.` },
  { q: `Let's join A to C with a straight line. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn between any two points.` },
  { q: `Since A and C are on both circles, will line AC fall inside both circles? (yes/no):`,
    hint: `Proposition III.2 says the line joining two points on a circle falls within the circle.` },
  { q: `But in this case, if the circles touch externally, must AC lie inside one circle but outside the other? (yes/no):`,
    hint: `By definition, if circles touch externally, the join contradicts placement.` },
  { q: `But AC clearly falls inside both circles. Do we have a contradiction? (yes/no):`,
    hint: `One line cannot be both inside and outside the same circle.` },
  { q: `Therefore, do we know it is impossible for two circles to touch externally at more than one point? (yes/no):`,
    hint: `No — only one external touching point is possible. The contradiction proves this.` },
  { q: `We just showed that circles cannot touch at more than one point, either internally or externally. Do you agree that this is our final conclusion? (yes/no):`,
    hint: `This completes the proof — a circle touches a circle at only one point.` }
];

const conclusion = `Congratulations! You have proved that a circle cannot touch another circle at more than one point, either internally or externally. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
