<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.27</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.27 — Prove that if an even number is subtracted from an odd number, the remainder is odd</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.27 chatbot!

We are given an odd number AB and an even number BC, and BC is subtracted from AB. Do you agree? (yes/no):`,
    hint: `AB is stated to be odd, and BC to be even, in the proposition.` },

  { q: `The remainder after subtracting BC from AB is CA. Do you see that CA is the remainder? (yes/no):`,
    hint: `CA is what is left when BC is taken away from AB.` },

  { q: `Our goal is to show that the remainder CA is odd. Does that make sense? (yes/no):`,
    hint: `This is exactly what the proposition claims.` },

  { q: `Let the unit AD be subtracted from AB. Is this allowed? (yes/no):`,
    hint: `Any number may have a unit subtracted from it.` },

  { q: `After subtracting the unit AD from AB, the remainder is DB. Do you see this? (yes/no):`,
    hint: `DB is what remains after removing AD from AB.` },

  { q: `Since AB is odd, does subtracting one unit make DB even? (yes/no):`,
    hint: `By Book VII, Definition 7: an odd number becomes even when a unit is subtracted.` },

  { q: `Is BC also even, as given? (yes/no):`,
    hint: `This is part of the original hypothesis.` },

  { q: `If DB is even and BC is even, is the remainder CD even? (yes/no):`,
    hint: `By Proposition IX.24, subtracting an even number from an even number leaves an even remainder.` },

  { q: `Do you see that CA differs from CD by exactly one unit? (yes/no):`,
    hint: `CA includes the unit AD, whereas CD does not.` },

  { q: `If CD is even, does adding one unit make CA odd? (yes/no):`,
    hint: `By Book VII, Definition 7: an even number becomes odd when a unit is added.` },

  { q: `Therefore, is the remainder CA odd? (yes/no):`,
    hint: `This follows directly from the definitions of even and odd numbers.` }
]






const conclusion = `Congratulations! You just proved that if an even number is subtracted from an odd number, the remainder is odd.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
