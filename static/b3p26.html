<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.26 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.26 - In equal circles, equal angles stand on equal arcs, whether at the centers or at the circumferences</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.26 chatbot!

We are given two equal circles, ABC and DEF, with equal angles at the centers (∠BGC = ∠EHF) and at the circumferences (∠BAC = ∠EDF), and points K and L on the arc between the angles. Do you agree? (yes/no):`,
    hint: `We have two equal circles. Both have equal angles at the centers and circumferences. We are naming points K and L on the arc to prove that arc BKC equals arc ELF.` },
  { q: `Our goal is to show that arc BKC equals arc ELF. Does that make sense? (yes/no):`,
    hint: `We want to prove the equal angles intercept equal circumferences.` },
  { q: `First, join BC and EF by straight lines. Is this allowed? (yes/no):`,
    hint: `Postulate 1 allows drawing a straight line from any point to any point.` },
  { q: `Since the circles ABC and DEF are equal, are the radii equal? (yes/no):`,
    hint: `Equal circles have equal radii.` },
  { q: `So are BG = EH and GC = HF? (yes/no):`,
    hint: `Each is a radius of its respective equal circle.` },
  { q: `Given BG = EH, GC = HF, and ∠BGC = ∠EHF, can we conclude BC = EF? (yes/no):`,
    hint: `Proposition I.4 (SAS) shows triangles with two equal sides and included equal angle have equal base.` },
  { q: `Next, since ∠BAC = ∠EDF, are the circular segments BAC and EDF similar? (yes/no):`,
    hint: `Definition III.11: Similar segments are those containing equal angles.` },
  { q: `And since the similar segments are on equal chords (BC = EF), are they also equal? (yes/no):`,
    hint: `Proposition III.24: Similar segments on equal straight lines are equal.` },
  { q: `Therefore, is segment BAC equal to segment EDF? (yes/no):`,
    hint: `Both similarity and equal base lines give equality of the segments.` },
  { q: `Now, since both circles are equal, when we subtract the equal segments (BAC and EDF) from the circles (ABC and DEF), do we get remainders (circumferences BKC and ELF) equal? (yes/no):`,
    hint: `Subtract equals from equals, the remainders are equal (Common Notion 3).` },
  { q: `Therefore, is arc BKC equal to arc ELF? (yes/no):`,
    hint: `Both similarity and equal base lines give equality of the segments.` }
];

const conclusion = `Congratulations! You just proved that in equal circles, equal angles stand on equal arcs, whether at the centers or the circumferences. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
