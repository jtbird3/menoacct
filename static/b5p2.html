<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.2 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.2 - Prove that if two pairs of magnitudes are in the same multiple ratio, then their sums are in the same ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.2 chatbot!

We are given six magnitudes: AB, BG, multiples of C, and DE, EH, multiples of F. Do you agree? (yes/no):`,
    hint: `AB and C form the first ratio pair; DE and F the second; BG and EH the third.` },
  { q: `AB is the same multiple of C that DE is of F. BG is the same multiple of C that EH is of F. Do you follow? (yes/no):`,
    hint: `This means that AB contains as many magnitudes equal to C as DE contains magnitudes equal to F.` },
  { q: `Our goal is to show that the sum AG (that is, AB + BG) is the same multiple of C that the sum DH (that is, DE + EH) is of F. Does that make sense? (yes/no):`,
    hint: `We are extending AB by BG to make AG, and DE by EH to make DH.` },
  { q: `Since AB is the same multiple of C that DE is of F, does the number of parts equal to C in AB equal the number of parts equal to F in DE? (yes/no):`,
    hint: `Equality of multiples means they are composed of an equal count of equal parts.` },
  { q: `And since BG is the same multiple of C that EH is of F, do they also contain the same number of parts? (yes/no):`,
    hint: `By the same reasoning, BG is divided into as many C's as EH into F's.` },
  { q: `If AB has n parts equal to C, and BG has m parts equal to C, will AG = AB + BG have n + m parts equal to C? (yes/no):`,
    hint: `Adding magnitudes adds their component parts in number.` },
  { q: `Likewise, if DE has n parts equal to F, and EH has m parts equal to F, will DH = DE + EH have n + m parts equal to F? (yes/no):`,
    hint: `The same addition of equal counts applies to DE and EH.` },
  { q: `Since AG and DH each contain n + m equal parts of C and F respectively, can we say AG is the same multiple of C that DH is of F? (yes/no):`,
    hint: `Equal numbers of equal parts define equal multiples.` },
  { q: `Therefore, is the sum of the first and fifth (AG) the same multiple of the second (C) that the sum of the third and sixth (DH) is of the fourth (F)? (yes/no):`,
    hint: `Yes—because the number of equal component magnitudes in each sum is the same.` }
];

const conclusion = `Congratulations! You just proved that if two pairs of magnitudes are in the same multiple ratio, then their sums are in the same ratio.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
