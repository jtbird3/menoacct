<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.32</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.32 – Prove that parallelepipedal solids which are of the same height are to one another as their bases.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.32 chatbot!

We are given two parallelepipedal solids AB and CD, and they are of the same height. Do you agree? (yes/no):`,
    hint: `AB and CD are explicitly stated to be parallelepipedal solids of equal height.` },

  { q: `Our goal is to show that the solid AB is to the solid CD as the base AE is to the base CF. Does that make sense? (yes/no):`,
    hint: `The proposition claims a proportionality between solids and their bases.` },

  { q: `Let the base of solid AB be AE, and the base of solid CD be CF. Is this consistent with the statement? (yes/no):`,
    hint: `Euclid names AE and CF as the respective bases of the two solids.` },

  { q: `Now let FH, equal to AE, be applied to FG. Can we do this construction? (yes/no):`,
    hint: `By Proposition I.45, a parallelogram equal to a given one can be applied to a given straight line.` },

  { q: `On FH as base, and with the same height as the solid CD, let the parallelepipedal solid GK be completed. Is this possible? (yes/no):`,
    hint: `A parallelepiped can be constructed on a given base with a given height.` },

  { q: `Is the solid AB equal to the solid GK? (yes/no):`,
    hint: `They are on equal bases AE and FH, and have the same height.` },

  { q: `Does Proposition XI.31 tell us that solids on equal bases and of the same height are equal? (yes/no):`,
    hint: `XI.31 establishes equality under those conditions.` },

  { q: `Now consider the parallelepipedal solid CK. Is it cut by the plane DG which is parallel to its opposite planes? (yes/no):`,
    hint: `DG is drawn parallel to the opposite faces of CK.` },

  { q: `Since the solid CK is so cut, does Proposition XI.25 apply? (yes/no):`,
    hint: `XI.25 concerns solids cut by planes parallel to opposite planes.` },

  { q: `From XI.25, can we say that as the base CF is to the base FH, so is the solid CD to the solid DH? (yes/no):`,
    hint: `The ratio of bases equals the ratio of the corresponding solids.` },

  { q: `But is the base FH equal to the base AE? (yes/no):`,
    hint: `FH was constructed equal to AE.` },

  { q: `And is the solid GK equal to the solid AB? (yes/no):`,
    hint: `This was already established using XI.31.` },

  { q: `Therefore, can we substitute equals for equals in the proportion? (yes/no):`,
    hint: `Equal magnitudes may replace one another in ratios.` },

  { q: `Can we now conclude that as the base AE is to the base CF, so is the solid AB to the solid CD? (yes/no):`,
    hint: `This follows by replacing FH with AE and GK with AB in the established proportion.` }
]

const conclusion = `Congratulations! You just parallelepipedal solids which are of the same height are to one another as their bases.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
