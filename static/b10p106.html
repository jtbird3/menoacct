<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.106</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.106 – Prove that a straight line commensurable in length with that which produces with a rational area a medial whole is itself a straight line which produces with a rational area a medial whole.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.106 chatbot!

We are given a straight line AB which produces with a rational area a medial whole. Do you agree? (yes/no):`,
  hint: `AB produces a rational area and a medial whole; this is the starting line.` },
{ q: `We are also given a straight line CD commensurable with AB. Is that clear? (yes/no):`,
  hint: `Commensurable means that the two lines have a common measure, a unit that measures both exactly.` },

{ q: `Our goal is to prove that CD is also a straight line which produces with a rational area a medial whole. Does that make sense? (yes/no):`,
  hint: `We want to show that the property of producing a rational area with a medial whole carries over to a commensurable line.` },

{ q: `Let BE be the annex to AB, giving segments AE and EB. Can we define these segments? (yes/no):`,
  hint: `The annex splits AB into two parts, AE and EB.` },
{ q: `AE and EB are incommensurable in square, their squares sum to a medial, but the rectangle contained by them is rational. Do you see that? (yes/no):`,
  hint: `This is given by X.77: the sum of the squares is medial, and the rectangle is rational.` },

{ q: `Let the same construction be made for CD, producing segments CF and FD. Can we do that? (yes/no):`,
  hint: `Construct CF and FD in the same way as AE and EB for the line CD.` },
{ q: `Then CF and FD are in the same ratio as AE and EB. Do you agree? (yes/no):`,
  hint: `Equal ratios are preserved by commensurability.` },

{ q: `The sum of the squares on CF and FD is commensurable with the sum of the squares on AE and EB, and the rectangle CF, FD with the rectangle AE, EB. Is that clear? (yes/no):`,
  hint: `Commensurable sums and rectangles maintain the same properties under scaling by a commensurable line.` },

{ q: `Therefore, CF and FD are also incommensurable in square, make the sum of their squares medial, and the rectangle contained by them is rational. Do you see that? (yes/no):`,
  hint: `These properties carry over from AE and EB to CF and FD by proportionality and commensurability.` },

{ q: `Thus CD is a straight line which produces with a rational area a medial whole. Q.E.D. Does that make sense? (yes/no):`,
  hint: `The proposition is demonstrated: the property is preserved under commensurability.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with that which produces with a rational area a medial whole is itself a straight line which produces with a rational area a medial whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
