<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.13 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.13 - If two pairs of magnitudes have equal ratios, and the second pair's ratio is greater than a third pair’s, then the first pair's ratio is also greater than the third's</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.13 chatbot!

We are given six magnitudes: A, B, C, D, E, F such that A is to B as C is to D and the ratio of C to D is greater than the ratio of E to F. Do you agree? (yes/no):`,
    hint: `These stand for the “first,” “second,” “third,” “fourth,” “fifth,” and “sixth” magnitudes. A : B :: C : D and C : D > E : F.` },
  { q: `Our goal is to show that A : B > E : F. Does that make sense? (yes/no):`,
    hint: `We want to prove that the greater ratio of C : D over E : F also holds for A : B, since A : B :: C : D.` },
  { q: `Now, since C : D > E : F, can we find some equimultiples of C and E, and other (arbitrary) equimultiples of D and F, such that the multiple of C is greater than that of D, but the multiple of E is not greater than that of F? (yes/no):`,
    hint: `This follows from Definition 7 of Book V — the definition of “greater ratio.”` },
  { q: `Let these equimultiples be G, H (of C, E) and K, L (of D, F), so that G > K, but H ≤ L. Is that consistent? (yes/no):`,
    hint: `G and K are corresponding multiples of C and D; H and L of E and F.` },
  { q: `Whatever multiple G is of C, let M be the same multiple of A. Similarly, whatever multiple K is of D, let N be that multiple of B. Can we do that? (yes/no):`,
    hint: `We may take equal multiples of corresponding magnitudes — this preserves ratio comparisons.` },
  { q: `Since A : B :: C : D, and we have equimultiples M, G of A, C and N, K of B, D, will the relation between M and N be the same as between G and K? (yes/no):`,
    hint: `By Definition 5 of Book V — if magnitudes are proportional, their equimultiples preserve equality, excess, or deficiency.` },
  { q: `Now, since G > K, does it follow that M > N? (yes/no):`,
    hint: `Yes — the excess is preserved because the ratios are the same.` },
  { q: `We also have H not > L, and M, H are equimultiples of A, E, while N, L are equimultiples of B, F. Does that imply A : B > E : F? (yes/no):`,
    hint: `Again by Definition 7 — since the equimultiple of A exceeds that of B, while the equimultiple of E does not exceed that of F, A has to B a greater ratio than E to F.` },
  { q: `Therefore, has it been shown that if A : B :: C : D, and C : D > E : F, then A : B > E : F? (yes/no):`,
    hint: `That is exactly the statement of the proposition.` }
];

const conclusion = `Congratulations! You just proved that A : B > E : F, or, if two pairs of magnitudes have equal ratios, and the second pair's ratio is greater than a third pair’s, then the first pair's ratio is also greater than the third's. Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
