<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.3 – Prove that if two planes intersect, their common section is a straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.3 chatbot!

We are given two planes, which we will call plane AB and plane BC, cutting one another. Do you agree? (yes/no):`,
    hint: `Two planes are said to cut one another when they intersect.` },

  { q: `Let the line DB be the common section of the two planes AB and BC. Do you agree? (yes/no):`,
    hint: `The common section is the line where the two planes meet.` },

  { q: `Our goal is to show that the common section DB is a straight line. Does that make sense? (yes/no):`,
    hint: `We want to prove DB has the defining property of straightness.` },

  { q: `Suppose, for the sake of argument, that DB is not a straight line. Are you willing to assume this temporarily? (yes/no):`,
    hint: `This is a proof by contradiction.` },

  { q: `In the plane AB, can we join from D to B a straight line DEB? (yes/no):`,
    hint: `In a plane, a straight line can be drawn between any two points.` },

  { q: `In the plane BC, can we also join from D to B a straight line DFB? (yes/no):`,
    hint: `The same construction is possible in the second plane.` },

  { q: `Do the two straight lines DEB and DFB have the same extremities D and B? (yes/no):`,
    hint: `Both begin at D and end at B.` },

  { q: `Do these two straight lines lie in different planes? (yes/no):`,
    hint: `One lies in plane AB, the other in plane BC.` },

  { q: `If two different straight lines have the same extremities and lie in different planes, do they enclose an area? (yes/no):`,
    hint: `Distinct lines between the same endpoints must separate and form a surface.` },

  { q: `Is it absurd for two straight lines with the same extremities to enclose an area? (yes/no):`,
    hint: `Straight lines are defined as not enclosing an area.` },

  { q: `Therefore, must our assumption that DB is not a straight line be false? (yes/no):`,
    hint: `The assumption led to an absurd conclusion.` },

  { q: `Can we conclude that DB is a straight line? (yes/no):`,
    hint: `Removing the false assumption leaves the desired result.` },

  { q: `Similarly, is it true that no other straight line can be joined from D to B except the common section DB of the planes AB and BC? (yes/no):`,
    hint: `Any other such line would repeat the same contradiction.` },

  { q: `Therefore, if two planes cut one another, is their common section a straight line? (yes/no):`,
    hint: `This is exactly what has been demonstrated.` }
]

const conclusion = `Congratulations! You just if two planes intersect, their common section is a straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
