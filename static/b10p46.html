<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.46</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.46 – Prove that the side of a rational plus a medial area is divided at one point only.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.46 chatbot!

We are given a straight line AB, which is the side of a rational plus a medial area. Do you agree? (yes/no):`,
    hint: `This is the given hypothesis of the proposition.` },
    { q: `The line AB is divided at point C so that AC and CB are incommensurable in square. Do you agree? (yes/no):`,
    hint: `“Incommensurable in square” means the squares on the segments are not commensurable.` },
    { q: `Do the squares on AC and CB together make a medial area? (yes/no):`,
    hint: `This is explicitly stated in the hypothesis.` },
    { q: `Is twice the rectangle contained by AC and CB rational? (yes/no):`,
    hint: `Again, this is part of the given description of the division at C.` },
    
    { q: `Our goal is to show that AB is not divided in this way at any other point. Does that make sense? (yes/no):`,
    hint: `We want to prove uniqueness of the point of division.` },
    
    { q: `Suppose, if possible, that AB is also divided at another point D. Is this assumption allowed for a proof by contradiction? (yes/no):`,
    hint: `Euclid often assumes the opposite of what is to be proved.` },
    { q: `Are AD and DB incommensurable in square as well? (yes/no):`,
    hint: `This mirrors the condition given for AC and CB.` },
    { q: `Do the squares on AD and DB together also make a medial area? (yes/no):`,
    hint: `This is part of the assumed second division.` },
    { q: `Is twice the rectangle contained by AD and DB rational? (yes/no):`,
    hint: `The second division is assumed to satisfy the same conditions as the first.` },
    
    { q: `Now, consider the difference between twice the rectangle AC, CB and twice the rectangle AD, DB. Is this difference rational? (yes/no):`,
    hint: `Both quantities are rational, so their difference is rational.` },
    { q: `Is the same difference also equal to the difference between the squares on AD, DB and the squares on AC, CB? (yes/no):`,
    hint: `Euclid relates rectangles and squares using Book X results.` },
    { q: `If twice the rectangle AC, CB exceeds twice the rectangle AD, DB by a rational area, do the squares on AD, DB exceed the squares on AC, CB by a rational area? (yes/no):`,
    hint: `The same excess applies in both comparisons.` },
    
    { q: `But are the squares on AD and DB medial areas? (yes/no):`,
    hint: `This was assumed in the second division.` },
    { q: `Is it impossible for a medial area to exceed another medial area by a rational area? (yes/no):`,
    hint: `This is ruled out by Proposition X.26.` },
    
    { q: `Therefore, does our assumption that AB is divided at another point D lead to an impossibility? (yes/no):`,
    hint: `A contradiction shows the assumption is false.` },
    { q: `Can we now conclude that AB is not divided in this way at more than one point? (yes/no):`,
    hint: `The contradiction eliminates the second division.` },
    { q: `Therefore, is the side of a rational plus a medial area divided at one point only? (yes/no):`,
    hint: `This is exactly what was to be demonstrated.` }
]

const conclusion = `Congratulations! You just proved that the side of a rational plus a medial area is divided at one point only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
