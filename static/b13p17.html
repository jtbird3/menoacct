<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.17 – Construct a dodecahedron inscribed in a given sphere, and prove that the side of the dodecahedron is the irrational straight line called apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.17 chatbot!

We are given a cube, and two of its planes, ABCD and CBEF, at right angles to one another. Do you agree? (yes/no):`,
    hint: `These are faces of the same cube meeting at a right angle.` },

  { q: `The sides AB, BC, CD, DA, EF, EB, FC are bisected at points G, H, K, L, M, N, O respectively. Do you accept this setup? (yes/no):`,
    hint: `Each midpoint is named and fixed.` },

  { q: `The lines GK, HL, MH, and NO are joined. Can we do this? (yes/no):`,
    hint: `Any two points may be joined by a straight line.` },

  { q: `The straight lines NP, PO, and HQ are cut in extreme and mean ratio at R, S, and T, with RP, PS, and TQ the greater segments. Is this clear? (yes/no):`,
    hint: `Cutting in extreme and mean ratio is a standard construction from Book XIII.` },

  { q: `From points R, S, and T, the perpendiculars RU, SV, and TW are erected to the planes of the cube, outside the cube, and made equal to RP, PS, and TQ respectively. Is this construction allowed? (yes/no):`,
    hint: `A perpendicular of given length can be set up from a point to a plane.` },

  { q: `The straight lines UB, BW, WC, CV, and VU are then joined. Can we do this? (yes/no):`,
    hint: `These joins form a pentagon.` },

  { q: `Our first goal is to show that the pentagon UBWCV is equilateral and equiangular. Does that make sense? (yes/no):`,
    hint: `We must prove equal sides, equal angles, and coplanarity.` },

  { q: `The straight lines RB, SB, and VB are joined. Is this permitted? (yes/no):`,
    hint: `Any two points may be joined.` },

  { q: `Since NP is cut in extreme and mean ratio at R, with RP the greater segment, are the squares on PN and NR triple the square on RP? (yes/no):`,
    hint: `This follows from Proposition XIII.4.` },

  { q: `Is PN equal to NB, and RP equal to RU? (yes/no):`,
    hint: `PN is a midpoint construction, and RU was set equal to RP.` },

  { q: `Therefore, are the squares on BN and NR triple the square on RU? (yes/no):`,
    hint: `Substitute equals for equals.` },

  { q: `Is the square on BR equal to the squares on BN and NR? (yes/no):`,
    hint: `This is by the Pythagorean theorem (I.47).` },

  { q: `Therefore, is the square on BR triple the square on RU? (yes/no):`,
    hint: `Combine the previous results.` },

  { q: `If the square on BU equals the squares on BR and RU, is the square on BU quadruple the square on RU? (yes/no):`,
    hint: `Add the square on RU to three times itself.` },

  { q: `Does this show that BU is double RU? (yes/no):`,
    hint: `Squares in the ratio 4:1 imply lengths in the ratio 2:1.` },

  { q: `Is VU also double RU, since SR is double PR and PR equals RU? (yes/no):`,
    hint: `Follow the chain of equalities from the construction.` },

  { q: `Can we conclude that BU equals UV? (yes/no):`,
    hint: `Both are twice the same segment.` },

  { q: `Similarly, can we prove that BW, WC, and CV are each equal to BU? (yes/no):`,
    hint: `The same reasoning applies symmetrically.` },

  { q: `Therefore, is the pentagon BUVCW equilateral? (yes/no):`,
    hint: `All five sides are equal.` },

  { q: `Our next goal is to show that the pentagon UBWCV lies in a single plane. Does that make sense? (yes/no):`,
    hint: `Coplanarity must be shown explicitly.` },

  { q: `From point P, draw PX parallel to RU and SV, outside the cube, and join XH and HW. Can we do this? (yes/no):`,
    hint: `A line parallel to given lines can be drawn.` },

  { q: `Since HQ is cut in extreme and mean ratio at T, with QT the greater segment, is HQ to QT as QT to TH? (yes/no):`,
    hint: `Definition of extreme and mean ratio.` },

  { q: `Is HQ equal to HP, and QT equal to TW and PX? (yes/no):`,
    hint: `These were set equal in the construction.` },

  { q: `Therefore, is HP to PX as WT to TH? (yes/no):`,
    hint: `Replace equal magnitudes in the ratio.` },

  { q: `Is HP parallel to TW, since both are perpendicular to the same plane? (yes/no):`,
    hint: `Lines perpendicular to the same plane are parallel.` },

  { q: `Is TH parallel to PX for the same reason? (yes/no):`,
    hint: `Each is perpendicular to plane BF.` },

  { q: `If two triangles have two sides proportional and those sides parallel, do their remaining sides lie in a straight line? (yes/no):`,
    hint: `This is Proposition VI.32.` },

  { q: `Therefore, is XH in a straight line with HW? (yes/no):`,
    hint: `Apply VI.32 to triangles XPH and HTW.` },

  { q: `Since every straight line lies in one plane, is the pentagon UBWCV in one plane? (yes/no):`,
    hint: `All its sides lie together in that plane.` },

  { q: `Our next goal is to show that the pentagon is equiangular. Does that make sense? (yes/no):`,
    hint: `Equal angles must now be shown.` },

  { q: `Since NP is cut in extreme and mean ratio at R, and PR equals PS, is NS also cut in extreme and mean ratio at P? (yes/no):`,
    hint: `Proposition XIII.5 applies.` },

  { q: `Are the squares on NS and SP triple the square on NP? (yes/no):`,
    hint: `By XIII.4 again.` },

  { q: `Is NP equal to NB, and PS equal to SV? (yes/no):`,
    hint: `From the original construction.` },

  { q: `Therefore, are the squares on NS and SV triple the square on NB? (yes/no):`,
    hint: `Substitute equals for equals.` },

  { q: `Does this imply that the squares on VS, SN, and NB together are quadruple the square on NB? (yes/no):`,
    hint: `Triple plus one equals four.` },

  { q: `Is the square on SB equal to the squares on SN and NB? (yes/no):`,
    hint: `Right triangle at S.` },

  { q: `Therefore, is the square on BV quadruple the square on NB? (yes/no):`,
    hint: `BV is the hypotenuse.` },

  { q: `Does this show that BV is double NB? (yes/no):`,
    hint: `Same square ratio argument.` },

  { q: `Is BC also double NB? (yes/no):`,
    hint: `NB is the midpoint of BC.` },

  { q: `Therefore, is BV equal to BC? (yes/no):`,
    hint: `Both are twice NB.` },

  { q: `If BU = UV and BW = WC, and BV = BC, does angle BUV equal angle BWC? (yes/no):`,
    hint: `This is Proposition I.8 (SSS).` },

  { q: `Similarly, can we prove angle UVC equals angle BWC? (yes/no):`,
    hint: `The same side equalities apply.` },

  { q: `If three angles of an equilateral pentagon are equal, is the pentagon equiangular? (yes/no):`,
    hint: `Proposition XIII.7.` },

  { q: `Therefore, is the pentagon BUVCW equilateral and equiangular? (yes/no):`,
    hint: `Both properties have now been shown.` },

  { q: `If the same construction is made on each face of the cube, is a solid formed with twelve equilateral and equiangular pentagons? (yes/no):`,
    hint: `This is the definition of a dodecahedron.` },

  { q: `Is this solid called a dodecahedron? (yes/no):`,
    hint: `By definition.` },

  { q: `Our next goal is to comprehend this dodecahedron in the given sphere. Does that make sense? (yes/no):`,
    hint: `All vertices must lie on the sphere.` },

  { q: `Produce XP to XZ so that it meets the diameter of the cube at Z, bisecting it. Is this valid? (yes/no):`,
    hint: `From Proposition XI.38.` },

  { q: `Is Z therefore the center of the sphere which comprehends the cube? (yes/no):`,
    hint: `The diameter is bisected at the center.` },

  { q: `Is ZP half the side of the cube? (yes/no):`,
    hint: `From the construction of the cube.` },

  { q: `Join UZ. Can we do this? (yes/no):`,
    hint: `Any two points may be joined.` },

  { q: `Since NS is cut in extreme and mean ratio at P, are the squares on NS and SP triple the square on NP? (yes/no):`,
    hint: `XIII.4 again.` },

  { q: `Is NS equal to XZ, since NP equals PZ and XP equals PS? (yes/no):`,
    hint: `Follow the equal segments.` },

  { q: `Is PS equal to XU, since PS equals RP and RP equals RU? (yes/no):`,
    hint: `From the perpendicular constructions.` },

  { q: `Therefore, are the squares on ZX and XU triple the square on NP? (yes/no):`,
    hint: `Replace equals for equals.` },

  { q: `Is the square on UZ equal to the squares on ZX and XU? (yes/no):`,
    hint: `Right triangle with hypotenuse UZ.` },

  { q: `Therefore, is the square on UZ triple the square on NP? (yes/no):`,
    hint: `Combine the results.` },

  { q: `Is the square on the radius of the sphere also triple the square on half the side of the cube? (yes/no):`,
    hint: `This was proved in XIII.15.` },

  { q: `Since NP is half the side of the cube, is UZ equal to the radius of the sphere? (yes/no):`,
    hint: `Equal squares imply equal lengths.` },

  { q: `Therefore, does point U lie on the surface of the sphere? (yes/no):`,
    hint: `It is at radius distance from the center.` },

  { q: `Similarly, do all other vertices of the dodecahedron lie on the sphere? (yes/no):`,
    hint: `The same reasoning applies to each.` },

  { q: `Hence, is the dodecahedron comprehended in the given sphere? (yes/no):`,
    hint: `All vertices lie on the sphere.` },

  { q: `Our final goal is to show that the side of the dodecahedron is an irrational straight line called apotome. Does that make sense? (yes/no):`,
    hint: `This concerns number theory of lines.` },

  { q: `When NP and PO are cut in extreme and mean ratio, are RP and PS their greater segments? (yes/no):`,
    hint: `Given in the construction.` },

  { q: `Therefore, when the whole NO is cut in extreme and mean ratio, is RS the greater segment? (yes/no):`,
    hint: `Ratios are preserved under doubling.` },

  { q: `Is RS equal to UV? (yes/no):`,
    hint: `From earlier equalities.` },

  { q: `Therefore, is UV the greater segment when NO is cut in extreme and mean ratio? (yes/no):`,
    hint: `Substitute equals.` },

  { q: `Is NO rational, since it is a side of the cube and the diameter of the sphere is rational? (yes/no):`,
    hint: `From XIII.15.` },

  { q: `If a rational straight line is cut in extreme and mean ratio, are both segments irrational apotomes? (yes/no):`,
    hint: `Proposition XIII.6.` },

  { q: `Therefore, is UV, the side of the dodecahedron, an irrational apotome? (yes/no):`,
    hint: `It is the greater segment of a rational line so cut.` },

  { q: `Therefore, a dodecahedron has been constructed, comprehended in a sphere, and its side has been proved to be an irrational straight line called apotome. (yes/no):`,
    hint: `Construction + comprehension + irrational classification are complete.` }
]

const conclusion = `Congratulations! You just constructed a dodecahedron inscribed in a given sphere, and proved that the side of the dodecahedron is the irrational straight line called apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
