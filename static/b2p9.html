<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.9 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.9 - Prove that if a line is cut into equal and unequal parts, the squares on the unequal parts equal twice the squares on the half and on the line between the cuts.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.9 chatbot!

We are given a straight line AB cut into equal parts at C and into unequal parts at D. Do you agree? (yes/no):`,
    hint: `We want to show: AD² + DB² = 2(AC² + CD²).` },
  { q: `Our goal is to prove that the squares on AD and DB together are double the squares on AC and CD. Does that make sense? (yes/no):`,
    hint: `AC is half of AB, and CD is the extra piece between the two cut points.` },
  { q: `From C, can we draw CE at right angles to AB, making CE equal to AC? (yes/no):`,
    hint: `We can construct a perpendicular and set off a line equal to another (Postulates, I.3).` },
  { q: `Next, can we join EA and EB? (yes/no):`,
    hint: `Any two points can be joined by a straight line (Postulate 1).` },
  { q: `Through D, can we draw DF parallel to CE, and through F draw FG parallel to AB, then join AF? (yes/no):`,
    hint: `Proposition I.31 allows a line through a point parallel to a given line.` },
  { q: `Since AC equals CE, is triangle ACE isosceles and ∠EAC equal to ∠AEC? (yes/no):`,
    hint: `Equal sides of a triangle give equal opposite angles (I.5).` },
  { q: `And since ∠ACE is right, do ∠EAC and ∠AEC together make a right angle, so each is half a right angle? (yes/no):`,
    hint: `The angles of a triangle sum to two right angles (I.32).` },
  { q: `By the same reasoning, are ∠CEB and ∠EBC also each half a right angle, so that ∠AEB is a right angle? (yes/no):`,
    hint: `Since ∠ECB is right and CE = EB, the other two angles ∠CEB and ∠EBC are equal and together make a right angle—so each is half a right angle.` },
  { q: `In triangle GEF, are ∠GEF and ∠EFG equal, so that EG equals GF? (yes/no):`,
    hint: `Equal angles at the base imply equal sides (I.6).` },
  { q: `In triangle BDF, are ∠DBF and ∠BFD equal, so that FD equals DB? (yes/no):`,
    hint: `Again, equal angles give equal opposite sides (I.6).` },
  { q: `Now, since AC equals CE, is the square on EA equal to the two squares on AC and CE together? (yes/no):`,
    hint: `Pythagoras' theorem (I.47) applies in the right triangle ACE.` },
  { q: `But AC equals CE, so are the two squares together equal to double the square on AC? (yes/no):`,
    hint: `Equal magnitudes give equal squares.` },
  { q: `Likewise, since EG equals GF, is the square on EF equal to the two squares on EG and GF together? (yes/no):`,
    hint: `Pythagoras' theorem applies in the right triangle EGF.` },
  { q: `And since EG equals GF, are these two squares together double the square on GF? (yes/no):`,
    hint: `Equal sides give equal squares.` },
  { q: `But GF equals CD. Do you see that? (yes/no):`,
    hint: `Parallels ensure GF is equal to CD (I.34).` },
  { q: `Therefore, is the square on EF double the square on CD? (yes/no):`,
    hint: `Replace GF with CD.` },
  { q: `So, are the squares on EA and EF together double the squares on AC and CD? (yes/no):`,
    hint: `Each part doubles its respective square.` },
  { q: `In right triangle AEF, is the square on AF equal to the two squares on AE and EF together? (yes/no):`,
    hint: `Pythagoras again (I.47).` },
  { q: `Therefore, is the square on AF double the squares on AC and CD? (yes/no):`,
    hint: `Combine the previous results.` },
  { q: `In right triangle ADF, is the square on AF equal to the two squares on AD and DF together? (yes/no):`,
    hint: `The angle at D is right.` },
  { q: `And since DF equals DB, are the squares on AD and DB together double the squares on AC and CD? (yes/no):`,
    hint: `Replace DF with DB.` }
];

const conclusion = `Congratulations! You just proved that the squares on AD and DB are double the squares on AC and CD.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
