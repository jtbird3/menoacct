<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.21</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.21 – Prove that any solid angle is contained by plane angles less than four right angles.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.21 chatbot!

We are given a solid angle at point A, contained by the plane angles BAC, CAD, and DAB. Do you agree? (yes/no):`,
    hint: `A solid angle is formed by more than two plane angles meeting at a point.` },

  { q: `Our goal is to show that the angles BAC, CAD, and DAB together are less than four right angles. Does that make sense? (yes/no):`,
    hint: `We want to compare their total with four right angles.` },

  { q: `Let points B, C, and D be taken at random on the straight lines AB, AC, and AD respectively. Is this allowed? (yes/no):`,
    hint: `Points may be chosen arbitrarily on given straight lines.` },

  { q: `Now let the straight lines BC, CD, and DB be joined. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Consider the solid angle at B, contained by the plane angles CBA, ABD, and CBD. Do you see this solid angle? (yes/no):`,
    hint: `Three plane angles meet at point B.` },

  { q: `Is it true that, in a solid angle, any two plane angles are greater than the remaining one? (yes/no):`,
    hint: `This follows from Proposition XI.20.` },

  { q: `Therefore, are the angles CBA and ABD together greater than the angle CBD? (yes/no):`,
    hint: `They are two of the three angles at the solid angle at B.` },

  { q: `By the same reasoning, are the angles BCA and ACD together greater than the angle BCD? (yes/no):`,
    hint: `This is the solid angle at point C.` },

  { q: `And similarly, are the angles CDA and ADB together greater than the angle CDB? (yes/no):`,
    hint: `This is the solid angle at point D.` },

  { q: `So, are the six angles CBA, ABD, BCA, ACD, CDA, and ADB together greater than the three angles CBD, BCD, and CDB? (yes/no):`,
    hint: `Each pair exceeds the corresponding single angle.` },

  { q: `Are the three angles CBD, BDC, and BCD together equal to two right angles? (yes/no):`,
    hint: `These are the angles of triangle BCD (Proposition I.32).` },

  { q: `Therefore, are the six angles CBA, ABD, BCA, ACD, CDA, and ADB greater than two right angles? (yes/no):`,
    hint: `They were shown greater than the three angles of triangle BCD.` },

  { q: `Now, are the three angles of each triangle ABC, ACD, and ADB equal to two right angles? (yes/no):`,
    hint: `This is true for every triangle (Proposition I.32).` },

  { q: `Then are the nine angles of the three triangles together equal to six right angles? (yes/no):`,
    hint: `Three triangles each contribute two right angles.` },

  { q: `Of these nine angles, are the six angles ABC, BCA, ACD, CDA, ADB, and DBA greater than two right angles? (yes/no):`,
    hint: `This was already established above.` },

  { q: `Therefore, are the remaining three angles BAC, CAD, and DAB less than four right angles? (yes/no):`,
    hint: `Six right angles minus more than two right angles leaves less than four.` },

  { q: `Thus, is any solid angle contained by plane angles less than four right angles? (yes/no):`,
    hint: `This is exactly what was to be demonstrated.` }
]

const conclusion = `Congratulations! You just any solid angle is contained by plane angles less than four right angles.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
