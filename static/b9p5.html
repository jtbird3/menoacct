<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.5 — Prove that if a cube number multiplies any number to make a cube, then the number multiplied is also cube</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.5 chatbot!

We are given a cube number A, and by multiplying A by a number B, the cube number C is produced. Do you agree? (yes/no):`,
    hint: `A·B = C, and A, C are cube numbers.` },

  { q: `Our goal is to show that B is also a cube number. Does that make sense? (yes/no):`,
    hint: `We want to prove that the multiplier of a cube yielding a cube must itself be cube.` },

  { q: `First, let A multiply itself to produce D. Possible? (yes/no):`,
    hint: `A·A = D. Proposition IX.3 states that the product of equal numbers is cube.` },

  { q: `Since A multiplied itself made D, do you see that D is cube? (yes/no):`,
    hint: `IX.3: any number multiplied by itself twice gives a cube.` },

  { q: `Now, since A multiplied itself gives D, and A multiplied B gives C, do we have A to B as D is to C? (yes/no):`,
    hint: `VII.17: if equal numbers multiply different numbers, the ratios of products follow the ratios of multipliers.` },

  { q: `Since D and C are both cube numbers, are they similar solid numbers? (yes/no):`,
    hint: `Cube numbers correspond to similar solids.` },

  { q: `If D and C are similar solids, do two mean proportionals fall between them? (yes/no):`,
    hint: `VIII.19: between similar solid numbers there exist two mean proportionals.` },

  { q: `And if D is to C as A is to B, does it follow that two mean proportionals also fall between A and B? (yes/no):`,
    hint: `VIII.8: if two ratios are equal and one ratio has two means, so does the other.` },

  { q: `And since A is cube, if two mean proportionals fall between A and B, must B also be cube? (yes/no):`,
    hint: `VIII.23: a number that has two means to a cube is itself cube.` },

  { q: `Therefore, is B a cube number? (yes/no):`,
    hint: `All steps show B has the required proportional structure relative to a cube.` }
]








const conclusion = `Congratulations! You just proved that if a cube number multiplies any number to make a cube, then the number multiplied is also cube.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
