<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.14</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.14 — Prove that if a number is the least measured by certain prime numbers, then it is not measured by any other prime except those</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.14 chatbot!

We are given a number A, which is the least number measured by the prime numbers B, C, and D. Do you agree? (yes/no):`,
    hint: `“Least” means no smaller number is measured by all of B, C, and D.` },

  { q: `Our goal is to show that no prime number other than B, C, and D measures A. Does that make sense? (yes/no):`,
    hint: `We want to rule out any additional prime divisors of A.` },

  { q: `Suppose, for the sake of argument, that A is measured by another prime number E. Can we assume this? (yes/no):`,
    hint: `This is an indirect proof; we assume the opposite of what we want to show.` },

  { q: `Is E assumed to be different from B, C, and D? (yes/no):`,
    hint: `If E were the same as one of them, there would be nothing new to prove.` },

  { q: `Since E measures A, does there exist a number F such that E multiplied by F makes A? (yes/no):`,
    hint: `To measure a number means to divide it exactly.` },

  { q: `So can we say that A equals E multiplied by F? (yes/no):`,
    hint: `This restates the definition of measurement by multiplication.` },

  { q: `We are also told that A is measured by the prime numbers B, C, and D. Is that correct? (yes/no):`,
    hint: `This is part of the original hypothesis.` },

  { q: `If two numbers multiply to make a third, and a prime measures the product, must the prime measure one of the original numbers? (yes/no):`,
    hint: `Proposition VII.30: if a prime number measures the product of two numbers, it also measures one of the original numbers.` },

  { q: `Therefore, must each of the primes B, C, and D measure either E or F? (yes/no):`,
    hint: `Apply VII.30 to the product E × F = A.` },

  { q: `Then must each of the primes B, C, or D not measure E? (yes/no):`,
    hint: `E is prime and different from B, C, and D.` },

  { q: `So must B, C, and D all measure F instead? (yes/no):`,
    hint: `If they do not measure E, they must measure the other factor.` },

  { q: `Must F be less than A? (yes/no):`,
    hint: `Since E is greater than 1, multiplying E by F gives a larger number than F alone.` },

  { q: `Is it impossible for a number smaller than A to be measured by all of B, C, and D? (yes/no):`,
    hint: `This contradicts the assumption that A is the least such number.` },

  { q: `Does this contradiction show that our assumption about E was false? (yes/no):`,
    hint: `The contradiction arises from assuming another prime measures A.` },

  { q: `Therefore, can we conclude that no prime number measures A except B, C, and D? (yes/no):`,
    hint: `The original claim now follows necessarily.` }
]








const conclusion = `Congratulations! You just proved that if a number is the least measured by certain prime numbers, then it is not measured by any other prime except those.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
