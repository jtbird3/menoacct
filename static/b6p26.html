<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.26 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.26 - Prove that if from a parallelogram a similar and similarly situated parallelogram sharing a common angle is removed, the remaining parallelogram is about the same diameter as the whole</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.26 chatbot!

We are given a parallelogram ABCD, and from it another parallelogram AF has been taken away, which is similar and similarly situated to ABCD, and shares the angle DAB with it. Do you agree? (yes/no):`,
    hint: `“Similar and similarly situated” means corresponding angles are equal, adjacent sides around them are proportional, and the figures have the same orientation.` },
  { q: `Our goal is to show that ABCD and AF are about the same diameter. Does that make sense? (yes/no):`,
    hint: `“About the same diameter” means there is a diagonal that divides each parallelogram into equal and similar parts.` },
  { q: `Suppose not; assume, if possible, that AHC is the diameter of ABCD and is not the same as that of AF. Is that a reasonable assumption for contradiction? (yes/no):`,
    hint: `Standard reductio: assume the opposite to derive an impossibility.` },
  { q: `Let the line GF be produced to H. Can we do this? (yes/no):`,
    hint: `Postulate 2: a straight line can be produced indefinitely.` },
  { q: `Draw HK through H parallel to AD (or BC). Is that possible? (yes/no):`,
    hint: `Proposition I.31: through a point, draw a line parallel to a given line.` },
  { q: `Since ABCD is about the same diameter with KG, can we state that as DA is to AB, so is GA to AK? (yes/no):`,
    hint: `Prop. VI.24: parallelograms about the same diameter have the sides about equal angles proportional.` },
  { q: `Also, since AF is similar to ABCD, do we have that as DA is to AB, so is GA to AE? (yes/no):`,
    hint: `In similar figures, corresponding sides around equal angles are proportional.` },
  { q: `Then, can we conclude that as GA is to AK, so is GA to AE? (yes/no):`,
    hint: `Prop. V.11: if two ratios are each equal to a third, they are equal to each other.` },
  { q: `Therefore, does GA have the same ratio to each of AK and AE? (yes/no):`,
    hint: `Yes—both ratios GA:AK and GA:AE are equal.` },
  { q: `If GA has the same ratio to both AK and AE, must AE = AK? (yes/no):`,
    hint: `Prop. V.9: if one magnitude has the same ratio to two others, those two are equal.` },
  { q: `But AE cannot be equal to AK, since one is clearly greater. Do you see the contradiction? (yes/no):`,
    hint: `AE lies within the figure, while AK extends beyond; they cannot be equal.` },
  { q: `Therefore, our assumption that the parallelograms are not about the same diameter must be false. Do you agree? (yes/no):`,
    hint: `Contradiction achieved ⇒ the original claim (they are about the same diameter) holds.` }
];

const conclusion = `Congratulations! You just proved that if from a parallelogram a similar and similarly situated parallelogram sharing a common angle is removed, the remaining parallelogram is about the same diameter as the whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
