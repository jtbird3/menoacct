<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.22</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.22 — Prove that the least numbers of those which have the same ratio are prime to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.22 chatbot!

We are given two numbers A and B, and they are the least numbers among those having the same ratio as A to B. Do you agree? (yes/no):`,
hint: `“Least” means no smaller pair of numbers has the same ratio.` },
{ q: `Our goal is to show that A and B are prime to one another. Does that make sense? (yes/no):`,
hint: `Prime to one another means no number but an unit (1) measures both.` },
{ q: `Suppose A and B are not prime to one another. Then some number C measures both A and B. Can we assume this for the sake of contradiction? (yes/no):`,
hint: `Euclid often argues by contradiction — assume a common measure exists.` },
{ q: `If C measures A, can we let D contain as many units as C measures A? (yes/no):`,
hint: `“As many times as C measures A, so many units let there be in D.”` },
{ q: `And if C measures B, can we similarly let E contain as many units as C measures B? (yes/no):`,
hint: `“As many times as C measures B, so many units let there be in E.”` },
{ q: `Since C measures A according to the units in D, does C multiplied by D produce A? (yes/no):`,
hint: `Definition VII.15: a number measures another if the measured number is the product of the measure and some number.` },
{ q: `Likewise, does C multiplied by E produce B? (yes/no):`,
hint: `The same definition applies to C measuring B.` },
{ q: `If C by multiplying D and E makes A and B, respectively, does this mean the ratio D:E equals the ratio A:B? (yes/no):`,
hint: `Proposition VII.17: if equal multiples produce numbers, ratios follow.` },
{ q: `But did we suppose D and E to be smaller numbers than A and B? (yes/no):`,
hint: `C > 1 would make D and E smaller than the corresponding products A and B.` },
{ q: `If D and E are smaller but have the same ratio as A and B, does this contradict the assumption that A and B are the least numbers in that ratio? (yes/no):`,
hint: `The least pair cannot have a smaller pair in the same ratio.` },
{ q: `Therefore, is it impossible that any number C measures both A and B? (yes/no):`,
hint: `The contradiction shows no common measure can exist.` },
{ q: `Hence, must A and B be prime to one another? (yes/no):`,
hint: `Being prime to one another means exactly that they share no common measure.` },













];

const conclusion = `Congratulations! You just proved that the least numbers of those which have the same ratio are prime to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
