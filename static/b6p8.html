<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.8 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.8 - Prove that in a right-angled triangle, if a perpendicular is drawn from the right angle to the base, the two smaller triangles formed are similar to the original triangle and to each other</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.8 chatbot!

We are given a right-angled triangle ABC with the right angle at A. Do you agree? (yes/no):`,
    hint: `A right-angled triangle has one angle of 90°; here ∠BAC is a right angle.` },
  { q: `We draw AD from vertex A perpendicular to the base BC. Can we do that? (yes/no):`,
    hint: `From a point to a line, one and only one perpendicular can be drawn (Post. 12).` },
  { q: `Our goal is to show that each of the smaller triangles ABD and ADC is similar to the whole triangle ABC, and also that ABD and ADC are similar to one another. Does that make sense? (yes/no):`,
    hint: `“Similar” means equal corresponding angles and proportional corresponding sides.` },
  { q: `Now, is ∠BAC equal to ∠ADB? (yes/no):`,
    hint: `Both are right angles by construction of the perpendicular AD.` },
  { q: `Is ∠ABC common to both triangles ABC and ABD? (yes/no):`,
    hint: `Yes, angle B is shared by triangles ABC and ABD.` },
  { q: `If two triangles share two equal angles (right angle at A = D, and angle at B common), are their remaining angles also equal? (yes/no):`,
    hint: `By I.32, if two angles are equal, the third pair is equal as well.` },
  { q: `Therefore, is triangle ABC equiangular with triangle ABD? (yes/no):`,
    hint: `All corresponding angles match pairwise.` },
  { q: `If corresponding angles are equal, are the sides about those angles proportional? (yes/no):`,
    hint: `VI.4: In equiangular triangles, corresponding sides are proportional.` },
  { q: `Thus, is triangle ABC similar to triangle ABD? (yes/no):`,
    hint: `Equal angles + proportional sides ⇒ similar (VI.Def.1).` },
  { q: `Can we make a similar argument for triangle ADC and the whole triangle ABC? (yes/no):`,
    hint: `Right angles equal, angle at C common; then sides are proportional by VI.4.` },
  { q: `Therefore, are both ABD and ADC similar to the whole triangle ABC? (yes/no):`,
    hint: `Each smaller triangle shares a right angle and one acute angle with ABC.` },
  { q: `Now, are the right angles at D (∠BDA and ∠ADC) equal to one another? (yes/no):`,
    hint: `Both are right angles, hence equal.` },
  { q: `And was ∠BAD earlier shown equal to ∠ACB? (yes/no):`,
    hint: `Yes—this followed from similarity of ABD and ABC.` },
  { q: `Then do the remaining angles ∠ABD and ∠DAC also turn out equal? (yes/no):`,
    hint: `By I.32, when two pairs are equal, the third pair is equal.` },
  { q: `Therefore, are triangles ABD and ADC equiangular with one another? (yes/no):`,
    hint: `They have all three corresponding angles equal.` },
  { q: `If their corresponding sides about those angles are proportional, are the triangles ABD and ADC similar? (yes/no):`,
    hint: `VI.4 and VI.Def.1: Equiangular triangles have proportional sides ⇒ similar.` },
  { q: `Therefore, the triangles ABD, ADC are similar both to the original triangle ABC and to one another. Do you agree? (yes/no):`,
    hint: `Each smaller triangle is similar to ABC, hence also to each other.` },
  { q: `From this result, can we deduce that the perpendicular AD is a mean proportional between BD and DC? (yes/no):`,
    hint: `In similar right triangles, the altitude to the hypotenuse satisfies AD² = BD·DC, so AD is the mean proportional.` }
];

const conclusion = `Congratulations! You just proved that in a right-angled triangle, if a perpendicular is drawn from the right angle to the base, the two smaller triangles formed are similar to the original triangle and to each other.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
