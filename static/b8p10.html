<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.10 — Prove that if the same number of terms in continued proportion falls between each of two numbers and a unit, then the same number of terms falls between the numbers themselves</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.10 chatbot!

We are given numbers A and B, and the unit C. Do you agree? (yes/no):`,
    hint: `A and B are ordinary numbers; C is the unit (1).` },

  { q: `We are told that numbers D, E fall between A and the unit C in continued proportion, and F, G fall between B and C in continued proportion. Do you agree? (yes/no):`,
    hint: `“Fall between C and A in continued proportion” means C is to D as D is to E as E is to A, and similarly C is to F as F is to G as G is to B.` },

  { q: `Our goal is to show that as many numbers as fall between A and C, and between B and C, in continued proportion, so many will also fall between A and B in continued proportion. Does that make sense? (yes/no):`,
    hint: `Since D, E fall between C and A, and F, G between C and B, the conclusion is that two numbers (K, L) will fall between A and B in continued proportion.` },

  { q: `First, let D multiplying F produce H. Acceptable? (yes/no):`,
    hint: `“D by multiplying F makes H” means H = D·F.` },

  { q: `Next, let D and F multiplying H make K and L respectively. Do you follow? (yes/no):`,
    hint: `This means K = D·H and L = F·H.` },

  { q: `Since C is to D as D is to E, does it follow that C measures D as many times as D measures E? (yes/no):`,
    hint: `A proportion C to D as D is to E implies equality of the ratios of measures (VII.Def.20).` },

  { q: `And because C measures D according to the units in D, must D also measure E according to the units in D? (yes/no):`,
    hint: `“Measure” means repeated unit-multiplication.` },

  { q: `Therefore, is it correct that D by multiplying itself makes E? (yes/no):`,
    hint: `This matches D·D = E.` },

  { q: `Similarly, since C is to D as E is to A, does E measure A in the same number of units that C measures D? (yes/no):`,
    hint: `Same reasoning as before using VII.Def.20.` },

  { q: `Therefore, does D multiplying E make A? (yes/no):`,
    hint: `This means A = D·E.` },

  { q: `By the same reasoning, does F by multiplying itself make G? (yes/no):`,
    hint: `F·F = G.` },

  { q: `And does F by multiplying G make B? (yes/no):`,
    hint: `F·G = B.` },

  { q: `Since D multiplying D makes E and D multiplying F makes H, is it true that we have D to F as E to H? (yes/no):`,
    hint: `This uses VII.17: equal multipliers preserve ratios of products.` },

  { q: `Likewise, is D to F as H to G? (yes/no):`,
    hint: `This follows by VII.18.` },

  { q: `Therefore, is E to H as H is to G? (yes/no):`,
    hint: `If D to F as E to H and D to F as H to G, then E to H as H to G.` },

  { q: `Since D by multiplying E and H makes A and K, is E to H as A to K? (yes/no):`,
    hint: `Another application of VII.17.` },

  { q: `And since we have E to H as D to F, does it follow that D is to F as A is to K? (yes/no):`,
    hint: `Transitive equality of ratios.` },

  { q: `Since D and F by multiplying H make K and L, is D to F as K to L? (yes/no):`,
    hint: `Another VII.18 application.` },

  { q: `If D to F as A to K and also D to F as K to L, do we conclude A to K as K to L? (yes/no):`,
    hint: `Ratios equal to the same ratio are equal.` },

  { q: `Since F by multiplying H and G makes L and B, is H to G as L to B? (yes/no):`,
    hint: `Another instance of VII.17.` },

  { q: `And since H to G as D to F, is D to F as L to B? (yes/no):`,
    hint: `Equality of ratios again.` },

  { q: `Having D to F as A to K, K to L, and L to B, do we have A is to K as K is to L as L is to B? (yes/no):`,
    hint: `All correspond to the same ratio D : F.` },

  { q: `Therefore, do A, K, L, B form a continued proportion? (yes/no):`,
    hint: `A to K as K to L as L to B is precisely the continued proportion.` },

  { q: `Hence, do as many numbers fall between A and B in continued proportion as fell between each of A, B and the unit C? (yes/no):`,
    hint: `Two numbers (K, L) fall between A and B, just as D, E and F, G fell between A, B and the unit.` }
]














const conclusion = `Congratulations! You just proved that if the same number of terms in continued proportion falls between each of two numbers and a unit, then the same number of terms falls between the numbers themselves.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
