<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.31</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.31 — Prove that any composite number is measured by some prime number</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.31 chatbot!
    
We are given a composite number A. Do you agree? (yes/no):`,
    hint: `A composite number is a number measured by some number other than an unit (1).` },

  { q: `Our goal is to show that A is measured by some prime number. Does that make sense? (yes/no):`,
    hint: `A prime number is measured by no number except an unit (1) and itself.` },

  { q: `Since A is composite, can we say that some number B measures A? (yes/no):`,
    hint: `By definition, a composite number has at least one divisor other than an unit (1).` },

  { q: `If B is prime, are we already done? (yes/no):`,
    hint: `If the divisor is prime, it is the prime we seek.` },

  { q: `But if B is composite, then must some number C measure B? (yes/no):`,
    hint: `Again, a composite number has a smaller divisor.` },

  { q: `If C measures B, and B measures A, does C also measure A? (yes/no):`,
    hint: `If C divides B and B divides A, then C divides A.` },

  { q: `If C is prime, do we then have the desired prime divisor of A? (yes/no):`,
    hint: `That prime would measure A through B.` },

  { q: `If C is composite, must it again be measured by some smaller number? (yes/no):`,
    hint: `Each composite number has a divisor smaller than itself.` },

  { q: `If we keep repeating this process, do we get a chain of ever smaller numbers each measuring A? (yes/no):`,
    hint: `Each divisor of a composite number is smaller than the number itself.` },

  { q: `Do you agree that we cannot continue decreasing numbers forever in this way? (yes/no):`,
    hint: `An infinite descending sequence of smaller and smaller positive integers is impossible.` },

  { q: `So must the process eventually reach a prime number that measures the number before it? (yes/no):`,
    hint: `The descent must stop, and it stops when the divisor is prime.` },

  { q: `And since that prime measures the number before it, and every number in the chain measures A, does that prime also measure A? (yes/no):`,
    hint: `Divisibility passes down the chain.` },

  { q: `Therefore, have we shown that any composite number A is measured by some prime number? (yes/no):`,
    hint: `We have found at least one prime among the divisors.` }
  ]
















const conclusion = `Congratulations! You just proved that any composite number is measured by some prime number.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
