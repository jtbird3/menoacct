<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.19 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.19 - Prove that if a line touches a circle, and from the point of contact you draw a line at right angles to the tangent, then the center lies on that line.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.19 chatbot!

We are given a circle ABC, and a straight line DE touching the circle at point C. Do you agree? (yes/no):`,
    hint: `A tangent touches the circle at exactly one point, here at C.` },
  { q: `From the point of contact C, let CA be drawn at right angles to the tangent DE. Do you see this line? (yes/no):`,
    hint: `The problem sets up a perpendicular CA to the tangent DE at C.` },
  { q: `Our goal is to show that the center of the circle lies on AC. Does that make sense? (yes/no):`,
    hint: `We want to prove that the radius from the center must follow line AC.` },
  { q: `Suppose, for the sake of argument, that the center is some point F not lying on AC. Can we draw this line? (yes/no):`,
    hint: `We proceed by contradiction, assuming the center is elsewhere.` },
  { q: `Join CF, the line from C to the supposed center F. Is this allowed? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Now, since DE touches the circle at C, and FC is drawn from the center to the point of contact, is FC perpendicular to DE? (yes/no):`,
    hint: `By Proposition III.18, the radius to the point of contact is at right angles to the tangent.` },
  { q: `So is ∠FCE a right angle? (yes/no):`,
    hint: `Right angle follows from perpendicularity.` },
  { q: `But we also have ∠ACE right, since CA was drawn at right angles to DE. Do you see this? (yes/no):`,
    hint: `By construction, CA ⟂ DE.` },
  { q: `Therefore ∠FCE = ∠ACE, even though one is clearly larger than the other. Is that possible? (yes/no):`,
    hint: `A contradiction arises, since one angle cannot be both less and greater than the other.` },
  { q: `Therefore, is it impossible for F or any point not on the line AC to be the center? (yes/no):`,
    hint: `Contradiction shows F is not the center.` },
  { q: `Therefore must the center of the circle lie on AC? (yes/no):`,
    hint: `Only a point on AC satisfies the condition.` }
];

const conclusion = `Congratulations! You just proved that the center of the circle lies on the line drawn from the point of contact at right angles to the tangent.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
