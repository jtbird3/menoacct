<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.11 — Prove that if numbers beginning from a unit are in continued proportion, then the lesser measures the greater according to one of the numbers in the progression</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.11 chatbot!

We are given numbers A, B, C, D, E in continued proportion, with A being the unit and B the least of the numbers B, C, D, E. Do you agree? (yes/no):`,
    hint: `“Beginning from the unit” means A = 1, and A:B = B:C = C:D = D:E.`
  },

  {
    q: `Our goal is to show that B, the least of the numbers B–E, measures E according to one of the intermediate numbers C or D. Does that make sense? (yes/no):`,
    hint: `“Measures” means “divides exactly,” and the measuring count matches one of the numbers in the continued proportion.`
  },

  {
    q: `Since A is to B as D is to E, do you see this proportionality? (yes/no):`,
    hint: `This follows from the continued proportion beginning at A.`
  },

  {
    q: `Does it follow that the unit A measures B the same number of times that D measures E? (yes/no):`,
    hint: `From A is to B as D is to E, the number of times A fits into B equals the number of times D fits into E.`
  },

  {
    q: `Can we then say, alternately, that the unit A measures D the same number of times that B measures E? (yes/no):`,
    hint: `By Euclid VII.15: from A:B = D:E follows A:D = B:E.`
  },

  {
    q: `Since the unit A measures D according to the number of units in D, is that clear? (yes/no):`,
    hint: `A = 1, so “measuring D” just means counting its units.`
  },

  {
    q: `Therefore, does B measure E according to the units in D? (yes/no):`,
    hint: `Because A measures D as many times as B measures E.`
  },

  {
    q: `Since D is one of the proportional numbers between B and E, does this show that B, the less, measures E according to one of the numbers among C or D? (yes/no):`,
    hint: `The measuring count equals the “number of units in D,” which is one of the intermediate proportional numbers.`
  },

  {
    q: `Congratulations! B measures E according to one of the proportional numbers. Q.E.D. 
    
PORISM: Is it clear that, whichever place the measuring number has when counted from the unit, the number according to which it measures has the same place when counted from the number measured? (yes/no):`,
    hint: `The positions match because the same proportional step producing the measuring number also determines the count by which it measures E.`
  }
]








const conclusion = `Congratulations! You just proved that if numbers beginning from a unit are in continued proportion, then the lesser measures the greater according to one of the numbers in the progression.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
