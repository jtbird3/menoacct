<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.14</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.14 – Prove that cones and cylinders which stand on equal bases are to one another as their heights.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.14 chatbot!

We are given two cylinders, EB and FD, standing on equal bases, namely the circles AB and CD. Do you agree? (yes/no):`,
    hint: `The proposition begins by assuming two cylinders with equal circular bases.` },

  { q: `The axis of cylinder EB is GH, and the axis of cylinder FD is KL. Do you agree? (yes/no):`,
    hint: `Each cylinder has a straight line through its center joining the centers of its bases, called the axis.` },

  { q: `Our goal is to show that, as the cylinder EB is to the cylinder FD, so is the axis GH to the axis KL. Does that make sense? (yes/no):`,
    hint: `The claim compares ratios of solids to ratios of their heights (axes).` },

  { q: `Let the axis KL be produced further to a point N. Is this allowed? (yes/no):`,
    hint: `A straight line may be produced beyond its endpoint.` },

  { q: `Let LN be made equal to the axis GH. Can we do this? (yes/no):`,
    hint: `A straight line equal to a given straight line can be set off on a produced line.` },

  { q: `Let a cylinder CM be conceived having LN as its axis. Is this construction acceptable? (yes/no):`,
    hint: `A cylinder is determined by its axis and base.` },

  { q: `Do the cylinders EB and CM have the same height? (yes/no):`,
    hint: `Their axes GH and LN were constructed to be equal.` },

  { q: `Since they are cylinders of the same height, are they to one another as their bases? (yes/no):`,
    hint: `This follows from Book XII, Proposition 11.` },

  { q: `Are the bases of EB and CM equal to one another? (yes/no):`,
    hint: `The bases were given or constructed equal.` },

  { q: `Therefore, are the cylinders EB and CM equal? (yes/no):`,
    hint: `If solids are in the ratio of equal bases, they are equal.` },

  { q: `Is the cylinder CM cut by the plane CD parallel to its opposite planes, forming the cylinder FD? (yes/no):`,
    hint: `FD is part of CM cut by a plane parallel to the base.` },

  { q: `From this, does it follow that, as the cylinder CM is to the cylinder FD, so is the axis LN to the axis KL? (yes/no):`,
    hint: `This uses Book XII, Proposition 13, relating sections of cylinders to their axes.` },

  { q: `Since CM equals EB, and LN equals GH, can we say that, as the cylinder EB is to the cylinder FD, so is the axis GH to the axis KL? (yes/no):`,
    hint: `Substitute equals for equals in the ratio.` },

  { q: `But is it also true that, as the cylinder EB is to the cylinder FD, so is the cone ABG to the cone CDK? (yes/no):`,
    hint: `This follows from Book XII, Proposition 10, relating cones and cylinders on the same bases and heights.` },

  { q: `Therefore, can we conclude that, as the axis GH is to the axis KL, so is the cone ABG to the cone CDK and the cylinder EB to the cylinder FD? (yes/no):`,
    hint: `Things equal in ratio to the same thing are equal in ratio to one another.` },

  { q: `Thus, have we shown that cones and cylinders on equal bases are to one another as their heights? (yes/no):`,
    hint: `This restates the proposition’s conclusion.` }
]

const conclusion = `Congratulations! You just proved that cones and cylinders which stand on equal bases are to one another as their heights.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
