<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.67</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.67 – Prove that a straight line commensurable in length with a bimedial straight line is itself bimedial and of the same order.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.67 chatbot!

We are given a straight line AB which is bimedial, and another straight line CD commensurable in length with AB. Do you agree? (yes/no):`, hint: `AB is stated to be bimedial, and CD is stated to be commensurable in length with AB.` },

{ q: `Our goal is to show that CD is bimedial and the same in order with AB. Does that make sense? (yes/no):`, hint: `The proposition has two conclusions: bimediality and sameness in order.` },

{ q: `Since AB is bimedial, can it be divided into its medials at a point E? (yes/no):`, hint: `A bimedial straight line is divided into two medial straight lines.` },
{ q: `Are AE and EB medial straight lines commensurable in square only? (yes/no):`, hint: `This follows from Propositions X.37 and X.38.` },

{ q: `Let it be contrived that, as AB is to CD, so AE is to CF. Can we suppose this construction? (yes/no):`, hint: `This is a standard proportional construction.` },
{ q: `Does it then follow that the remainder EB is to the remainder FD as AB is to CD? (yes/no):`, hint: `If wholes are proportional, so are the remainders (Book V, Proposition 19).` },

{ q: `Since AB is commensurable in length with CD, are AE and EB also commensurable in length with CF and FD respectively? (yes/no):`, hint: `This follows from Proposition X.11.` },
{ q: `But AE and EB are medial; does it follow that CF and FD are also medial? (yes/no):`, hint: `Medial straight lines commensurable in length with others make those others medial (X.23).` },

{ q: `Since, as AE is to EB, so is CF to FD, and AE and EB are commensurable in square only, are CF and FD also commensurable in square only? (yes/no):`, hint: `Apply Book V, Proposition 11 together with X.11.` },
{ q: `Since CF and FD are medial and commensurable in square only, can we conclude that CD is bimedial? (yes/no):`, hint: `A straight line composed of two such parts is bimedial.` },

{ q: `I say next that CD is the same in order with AB. Is that our next aim? (yes/no):`, hint: `The proposition now turns to sameness in order.` },

{ q: `Since, as AE is to EB, so is CF to FD, does it follow that as the square on AE is to the rectangle AE, EB, so is the square on CF to the rectangle CF, FD? (yes/no):`, hint: `This follows from Book V, Proposition 16.` },
{ q: `Does it then follow alternately that as the square on AE is to the square on CF, so is the rectangle AE, EB to the rectangle CF, FD? (yes/no):`, hint: `This is the alternate proportion.` },

{ q: `Is the square on AE commensurable with the square on CF? (yes/no):`, hint: `AE and CF were constructed commensurable in length.` },
{ q: `Therefore, is the rectangle AE, EB commensurable with the rectangle CF, FD? (yes/no):`, hint: `Equal ratios with commensurable antecedents give commensurable consequents.` },

{ q: `If the rectangle AE, EB is rational, is the rectangle CF, FD also rational? (yes/no):`, hint: `Commensurable rectangles share rationality.` },
{ q: `In that case, is AB a first bimedial and CD also a first bimedial? (yes/no):`, hint: `This follows from Proposition X.37.` },

{ q: `But if the rectangle AE, EB is medial, is the rectangle CF, FD also medial? (yes/no):`, hint: `Mediality is preserved under commensurability (X.23, Porism).` },
{ q: `In that case, are AB and CD both second bimedials? (yes/no):`, hint: `This follows from Proposition X.38.` },

{ q: `Therefore, in either case, is CD the same in order with AB? (yes/no):`, hint: `Both straight lines fall under the same classification.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with a bimedial straight line is itself bimedial and of the same order.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
