<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.7 – Prove that if two straight lines are parallel, and points are taken on each of them, the straight line joining the points lies in the same plane as the parallel straight lines.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.7 chatbot!

We are given two parallel straight lines AB and CD. Do you agree? (yes/no):`,
    hint: `Parallel lines are lines in the same plane that never meet.` },

  { q: `Points E and F are taken on AB and CD respectively. Correct? (yes/no):`,
    hint: `A point can be anywhere on a line.` },

  { q: `Our goal is to show that the straight line joining E and F lies in the same plane as AB and CD. Does that make sense? (yes/no):`,
    hint: `Lines in the same plane lie flat together; no part sticks out of the plane.` },

  { q: `Suppose, for contradiction, that EF is not in the plane of AB and CD. Can we do that? (yes/no):`,
    hint: `In Euclid’s style, we often assume the opposite to reach a contradiction.` },

  { q: `Let EF lie in a plane above the plane of AB and CD, called plane EGF. Is this possible to consider? (yes/no):`,
    hint: `This is the hypothetical “more elevated” plane.` },

  { q: `Draw a plane through E, G, and F. Do you see that we can draw a plane through three points? (yes/no):`,
    hint: `Proposition XI.3 says that any three points determine a plane.` },

  { q: `In the original plane of reference, does the plane EGF intersect it in a straight line, also called EF? (yes/no):`,
    hint: `The intersection of two planes is a straight line.` },

  { q: `Do EF in the elevated plane and EF in the reference plane enclose an area? (yes/no):`,
    hint: `Two straight lines cannot enclose an area by themselves.` },

  { q: `Since enclosing an area is impossible, can EF be in a more elevated plane? (yes/no):`,
    hint: `The contradiction shows our assumption is false.` },

  { q: `Therefore, is EF in the same plane as AB and CD? (yes/no):`,
    hint: `This is the conclusion of the proposition: EF lies in the plane of the parallel lines.` },

  { q: `Our goal was to show that the line joining points on parallel lines is in the same plane. Do we agree this is accomplished? (yes/no):`,
    hint: `This restates the proposition in simple terms.` }
]

const conclusion = `Congratulations! You just if two straight lines are parallel, and points are taken on each of them, the straight line joining the points lies in the same plane as the parallel straight lines.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
