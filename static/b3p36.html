<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.36 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.36 - Prove that the rectangle of the secant and its external part equals the square on the tangent from the same point</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.36 chatbot!

We are given a circle ABC, and a point D outside it. From D, one line DCA cuts the circle, and another line DB touches it. Do you agree? (yes/no):`,
    hint: `The secant goes through the circle (DCA), while the tangent touches it at one point (B).` },
  { q: `Our goal is to prove that the rectangle contained by AD and DC equals the square on DB. Does that make sense? (yes/no):`,
    hint: `This is the “tangent-secant power of a point” theorem.` },
  { q: `Case 1: The secant DCA passes through the center.

Assume the line DCA goes through the circle's center.Let us suppose that the line D-C-A passes through the center and F is the center of the circle, joining FB. Is ∠FBD a right angle? (yes/no):`,
    hint: `Proposition III.18: the radius to the point of tangency is perpendicular to the tangent.` },
  { q: `Since AC is bisected at F and CD is added, do we know that AD·DC + FC² = FD²? (yes/no):`,
    hint: `Proposition II.6 gives this relation for a line bisected at F with an external part added.` },
  { q: `And since FC = FB, can we replace FC² with FB², giving AD·DC + FB² = FD²? (yes/no):`,
    hint: `All radii of the circle are equal.` },
  { q: `Also, do FB² + BD² = FD²? (yes/no):`,
    hint: `Pythagoras (I.47) in right triangle FBD.` },
  { q: `Subtract FB² from both equations. Do we conclude AD·DC = BD²? (yes/no):`,
    hint: `Subtract equals from equals; the remainders are equal.` },
  { q: `Case 2: The secant DCA does not pass through the center.

Assume the line DCA misses the center. Let E be the center, and draw EF ⟂ AC, joining EB, EC, ED. Is ∠EBD right? (yes/no):`,
    hint: `Again by III.18, the radius to the tangency point is perpendicular to the tangent.` },
  { q: `Since EF passes through the center and is ⟂ AC, does it bisect AC? (yes/no):`,
    hint: `Proposition III.3: a diameter perpendicular to a chord bisects it.` },
  { q: `Thus AF = FC. Then, by Proposition II.6, is AD·DC + FC² = FD²? (yes/no):`,
    hint: `Same rectangle-square relation as in Case 1.` },
  { q: `Add FE² to both sides. Do we get AD·DC + FC² + FE² = FD² + FE²? (yes/no):`,
    hint: `Add equals to equals to keep equality (Common Notion 2).` },
  { q: `But is EC² = FC² + FE² (since ∠EFC is right)? (yes/no):`,
    hint: `Pythagoras (I.47) in triangle EFC.` },
  { q: `And ED² = FD² + FE²? (yes/no):`,
    hint: `Pythagoras again, in triangle EFD.` },
  { q: `So, do we conclude AD·DC + EC² = ED²? (yes/no):`,
    hint: `Substitute the Pythagorean expressions.` },
  { q: `Now, since EC = EB (radii), can we write AD·DC + EB² = ED²? (yes/no):`,
    hint: `Equal radii of the same circle.` },
  { q: `But EB² + BD² = ED² (because ∠EBD is right). Do you agree? (yes/no):`,
    hint: `Pythagoras in right triangle EBD.` },
  { q: `Subtract EB² from both sides. Is AD·DC = BD²? (yes/no):`,
    hint: `Subtract equals from equals; the remainders are equal.` }
];

const conclusion = `Congratulations! You just proved that in both cases, the rectangle AD·DC is equal to the square on DB.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
