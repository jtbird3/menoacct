<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.69</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.69 – Prove that a straight line commensurable in length with the side of a rational plus a medial area is itself also the side of a rational plus a medial area.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.69 chatbot!

We are given a straight line AB, which is the side of a rational plus a medial area. Do you agree? (yes/no):`, hint: `This is stated in the proposition.` },
{ q: `We are also given another straight line CD which is commensurable with AB. Do you agree? (yes/no):`, hint: `Commensurable means they have a common measure.` },

{ q: `Let AB be divided at point E into two straight lines AE and EB. Is this allowed? (yes/no):`, hint: `A straight line can be divided at a point.` },
{ q: `Are AE and EB incommensurable in square? (yes/no):`, hint: `This follows from the definition of the side of a rational plus a medial area.` },
{ q: `Is the sum of the squares on AE and EB medial? (yes/no):`, hint: `This is given by Proposition X.40.` },
{ q: `Is the rectangle contained by AE and EB rational? (yes/no):`, hint: `This is also given by Proposition X.40.` },

{ q: `Now let the same construction be made on CD, producing points F so that CD is divided into CF and FD. Is this possible? (yes/no):`, hint: `The proposition states that the same construction is applied.` },
{ q: `Are CF and FD incommensurable in square? (yes/no):`, hint: `The construction mirrors that on AB.` },

{ q: `Is the sum of the squares on AE and EB commensurable with the sum of the squares on CF and FD? (yes/no):`, hint: `This follows from CD being commensurable with AB.` },
{ q: `Is the rectangle contained by AE and EB commensurable with the rectangle contained by CF and FD? (yes/no):`, hint: `Corresponding rectangles from commensurable magnitudes are commensurable.` },

{ q: `Since the sum of the squares on AE and EB is medial, is the sum of the squares on CF and FD also medial? (yes/no):`, hint: `Things commensurable with a medial magnitude are also medial.` },
{ q: `Since the rectangle AE, EB is rational, is the rectangle CF, FD also rational? (yes/no):`, hint: `Commensurable rectangles preserve rationality.` },

{ q: `Our goal is to prove that CD is the side of a rational plus a medial area. Does that make sense? (yes/no):`, hint: `This matches the conclusion of the proposition.` },
{ q: `Since CF and FD are incommensurable in square, the sum of the squares on them is medial, and the rectangle contained by them is rational, is CD the side of a rational plus a medial area? (yes/no):`, hint: `This is exactly the definition.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with the side of a rational plus a medial area is itself also the side of a rational plus a medial area.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
