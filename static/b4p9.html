<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.9 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.9 - Circumscribe a circle about a given square</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.9 chatbot!

We are given a square ABCD. Do you agree? (yes/no):`,
    hint: `A square has all sides equal and all angles right angles.` },
  { q: `Our goal is to circumscribe a circle about this square ABCD. Does that make sense? (yes/no):`,
    hint: `To circumscribe a circle means to draw a circle passing through all four vertices of the square.` },
  { q: `Let us join the diagonals AC and BD so that they intersect at point E. Can we do that? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point, so we can join opposite corners.` },
  { q: `Do the diagonals AC and BD of a square bisect one another? (yes/no):`,
    hint: `In a square, the diagonals are equal and intersect each other at their midpoints.` },
  { q: `Now, since side DA equals side AB, and AC is common, do we have two pairs of equal sides in triangles DAE and BAE? (yes/no):`,
    hint: `DA = AB because all sides of the square are equal; AC is the common side.` },
  { q: `Is the base DC equal to the base BC? (yes/no):`,
    hint: `Opposite sides of a square are equal.` },
  { q: `From these equalities, do we conclude ∠DAC = ∠BAC? (yes/no):`,
    hint: `Proposition I.8: if two triangles have two sides and the base equal, then their contained angles are equal.` },
  { q: `Therefore, does AC bisect the angle DAB? (yes/no):`,
    hint: `Since ∠DAC = ∠BAC, the diagonal AC divides the angle DAB into two equal parts.` },
  { q: `By the same reasoning, do the diagonals bisect all four angles of the square? (yes/no):`,
    hint: `The square’s symmetry ensures each corner angle is bisected by a diagonal.` },
  { q: `Now, since ∠DAB = ∠ABC and each is bisected by the diagonals, are the smaller angles ∠EAB and ∠EBA equal? (yes/no):`,
    hint: `Each is half of a right angle; therefore, they are equal.` },
  { q: `If ∠EAB = ∠EBA, can we say that EA = EB? (yes/no):`,
    hint: `By Proposition I.6: in an isosceles triangle, the sides opposite the equal angles are equal.` },
  { q: `By similar reasoning, are EA, EB, EC, and ED all equal to one another? (yes/no):`,
    hint: `The diagonals bisect all angles equally, making each vertex equidistant from the intersection point E.` },
  { q: `If all four points A, B, C, D are equidistant from E, can a circle centered at E with radius EA pass through them all? (yes/no):`,
    hint: `A circle is the set of points at a fixed distance (radius) from its center.` },
  { q: `Therefore, is the circle with center E and radius EA circumscribed about square ABCD? (yes/no):`,
    hint: `Yes, it passes through every vertex A, B, C, and D.` }
];

const conclusion = `Congratulations! You just described a circle about a given square.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
