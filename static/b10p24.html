<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.24 – Prove that the rectangle contained by medial straight lines commensurable in length is medial.</h1><div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.24 chatbot!

We are given two straight lines AB and BC, and the rectangle AC is contained by them. Do you agree? (yes/no):`,
hint: `A rectangle is said to be contained by two straight lines when those lines form its sides.` },
{ q: `We are told that AB and BC are medial straight lines. Do you accept this? (yes/no):`,
hint: `This is given in the statement of the proposition.` },
{ q: `We are also told that AB and BC are commensurable in length. Is that agreed? (yes/no):`,
hint: `“Commensurable in length” means they share a common measure.` },
{ q: `Our goal is to show that the rectangle AC is medial. Does that make sense? (yes/no):`,
hint: `This is exactly what the proposition claims.` },

{ q: `On the straight line AB, let the square AD be described. Can we do this? (yes/no):`,
hint: `A square can be described on any straight line by earlier propositions.` },
{ q: `Is the square AD medial? (yes/no):`,
hint: `A square described on a medial straight line is medial.` },

{ q: `Since AB is commensurable in length with BC, and AB is equal to BD, can we conclude that DB is commensurable in length with BC? (yes/no):`,
hint: `Things equal to the same thing are interchangeable for commensurability.` },
{ q: `From this, is DA commensurable in length with AC? (yes/no):`,
hint: `From VI.1 we have the proportionality DB : BC = DA : AC, and by X.11 commensurability passes through proportional magnitudes.` },

{ q: `Is DA medial? (yes/no):`,
hint: `DA is the square on AB, and AB is medial, so DA is a medial area.` },
{ q: `If DA is medial and commensurable with AC, does it follow that AC is medial? (yes/no):`,
hint: `By X.23 (Porism), a magnitude commensurable with a medial magnitude is itself medial.` },

{ q: `Therefore, is the rectangle AC medial? (yes/no):`,
hint: `Since AC is commensurable with a medial area, AC is medial, which is what was to be shown.` }


]





const conclusion = `Congratulations! You just proved that the rectangle contained by medial straight lines commensurable in length is medial.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
