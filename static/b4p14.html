<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.14 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.14 - Circumscribe a circle about a given equilateral and equiangular pentagon</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.14 chatbot!

We are given a pentagon ABCDE, which is both equilateral and equiangular. Do you agree? (yes/no):`,
    hint: `“Equilateral” means all sides are equal; “equiangular” means all angles are equal.` },
  { q: `Our goal is to circumscribe a circle about this pentagon ABCDE. Does that make sense? (yes/no):`,
    hint: `A circumscribed circle passes through all the polygon's vertices, with its center equally distant from them.` },
  { q: `Let us bisect the angles BCD and CDE by drawing straight lines CF and DF respectively so they meet at F. Can we do this? (yes/no):`,
    hint: `Proposition I.9 allows us to bisect any given angle.` },
  { q: `From point F, can we join straight lines FB, FA, and FE to the points B, A, and E? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Can we show, as in the preceding propositions, that FB, FA, and FE bisect the remaining angles CBA, BAE, and AED? (yes/no):`,
    hint: `The construction is symmetrical; equal sides and equal angles ensure equal bisections throughout the figure.` },
  { q: `Now, is the angle BCD equal to the angle CDE? (yes/no):`,
    hint: `In an equiangular pentagon, all interior angles are equal.` },
  { q: `If ∠BCD = ∠CDE, and CF, DF bisect them, are the smaller angles FCD and CDF equal? (yes/no):`,
    hint: `Each is half of an equal angle, so they must be equal.` },
  { q: `From ∠FCD = ∠CDF, can we conclude that the sides FC and FD are equal? (yes/no):`,
    hint: `Proposition I.6: If two angles in a triangle are equal, the sides opposite them are equal.` },
  { q: `Similarly, can we show that FB, FA, and FE are also equal to FC and FD? (yes/no):`,
    hint: `By repeating the same reasoning at each vertex, the equality extends to all five radii.` },
  { q: `Therefore, are the straight lines FA, FB, FC, FD, and FE all equal? (yes/no):`,
    hint: `Equal bisected angles around a common point yield equal distances from that point to each vertex.` },
  { q: `If all these segments from F to A, B, C, D, and E are equal, can a circle with center F and radius FA pass through all five vertices? (yes/no):`,
    hint: `All points equally distant from the same center lie on one circle.` },
  { q: `So, when the circle is drawn with center F and radius FA, will it pass through B, C, D, and E as well? (yes/no):`,
    hint: `Because FB, FC, FD, and FE are equal to FA, each vertex lies on the same circle.` },
  { q: `Therefore, has a circle been circumscribed about the pentagon ABCDE? (yes/no):`,
    hint: `Yes, the circle passes through all five vertices of the equilateral and equiangular pentagon.` }
];

const conclusion = `Congratulations! You just circumscribed a circle about the given equilateral and equiangular pentagon.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
