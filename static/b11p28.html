<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.28</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.28 – Prove that if a parallelepipedal solid is cut by a plane through the diagonals of the opposite planes, the solid is bisected by the plane.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.28 chatbot!

We are given a parallelepipedal solid AB. Do you agree? (yes/no):`,
    hint: `A parallelepipedal solid is bounded by parallelogram faces.` },

  { q: `The solid AB is cut by a plane CDEF passing through the diagonals CF and DE of opposite planes. Do you see this? (yes/no):`,
    hint: `CF and DE are diagonals of opposite parallelogram faces of the solid.` },

  { q: `Our goal is to show that the solid AB is bisected by the plane CDEF. Does that make sense? (yes/no):`,
    hint: `“Bisected” means divided into two equal solids.` },

  { q: `Consider the triangles CGF and CFB. Are these triangles equal? (yes/no):`,
    hint: `By Proposition I.34, triangles on the same base and between the same parallels are equal.` },

  { q: `In the same way, are the triangles ADE and DEH equal? (yes/no):`,
    hint: `These triangles lie between the same parallels in opposite faces of the solid.` },

  { q: `Is the parallelogram CA equal to the parallelogram EB? (yes/no):`,
    hint: `Opposite parallelograms in a parallelepipedal solid are equal.` },

  { q: `Is the parallelogram GE equal to the parallelogram CH? (yes/no):`,
    hint: `These parallelograms are opposite and lie between the same parallels.` },

  { q: `Now consider the prism contained by triangles CGF and ADE together with the three parallelograms GE, AC, and CE. Do you see this prism? (yes/no):`,
    hint: `A prism is contained by two equal and parallel triangles and parallelograms joining their sides.` },

  { q: `Likewise, consider the prism contained by triangles CFB and DEH together with the three parallelograms CH, BE, and CE. Is this clear? (yes/no):`,
    hint: `This prism lies on the other side of the cutting plane.` },

  { q: `Are these two prisms equal in volume? (yes/no):`,
    hint: `They are contained by planes equal both in multitude and in magnitude (Definition XI.10).` },

  { q: `If the two prisms on either side of the plane CDEF are equal, does the plane CDEF bisect the whole solid AB? (yes/no):`,
    hint: `Equal parts on either side imply bisection of the whole.` },

  { q: `Therefore, is the parallelepipedal solid AB bisected by the plane CDEF? (yes/no):`,
    hint: `This is exactly what was to be demonstrated.` }
]

const conclusion = `Congratulations! You just if a parallelepipedal solid is cut by a plane through the diagonals of the opposite planes, the solid is bisected by the plane.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
