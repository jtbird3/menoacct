<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.21 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.21 - If three magnitudes and another three are pairwise in the same ratios but in a perturbed order, then ex aequali the first has to the third the same relation as the fourth to the sixth—greater, equal, or less</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.21 chatbot!

We are given three magnitudes A, B, C, and others D, E, F, equal to them in multitude. Do you agree? (yes/no):`,
    hint: `“Equal in multitude” means there are the same number of magnitudes in each set — three in A, B, C and three in D, E, F.` },
  { q: `These are such that, taken two and two, they are in the same ratio, but with the proportion perturbed. In other words, as A is to B, so is E to F; and as B is to C, so is D to E. Can we state this? (yes/no):`,
    hint: `Each triple (A,B,C) and (D,E,F) yields two corresponding ratios, though not in the same order.` },
  { q: `We are told that A is greater than C, ex aequali. Do you accept this? (yes/no):`,
    hint: `“Ex aequali” means from A:B :: E:F and B:C :: D:E we infer that A is to C as D is to F. A > C is given.` },
  { q: `Our goal is to show that D is greater than F when A > C; and if A = C, then D = F; if A < C, then D < F. Does that make sense? (yes/no):`,
    hint: `We want the greater/equal/less relation to carry over to the corresponding terms.` },
  { q: `Since A is greater than C, and B is some other magnitude less than C, does it follow that A has to B a greater ratio than C has to B? (yes/no):`,
    hint: `By Proposition V.8, the greater of two magnitudes has the greater ratio to the same third.` },
  { q: `But as A is to B, so is E to F. Do you see this correspondence? (yes/no):`,
    hint: `This is one of the given proportional relations.` },
  { q: `And as C is to B, so (inversely) is E to D. Does that make sense? (yes/no):`,
    hint: `Taking the inverse ratio links C:B with E:D.` },
  { q: `Therefore, does it follow that E has to F a greater ratio than E has to D? (yes/no):`,
    hint: `By Proposition V.13, the “greater ratio” relation transfers through equal corresponding ratios.` },
  { q: `But that to which the same has a greater ratio is the lesser magnitude. Do you agree? (yes/no):`,
    hint: `Proposition V.10: if the same magnitude has a greater ratio to one than to another, that one is smaller.` },
  { q: `Therefore, is F less than D? (yes/no):`,
    hint: `From E:F > E:D it follows that F < D.` },
  { q: `Hence, can we conclude that D is greater than F? (yes/no):`,
    hint: `If F < D, then D > F — the desired “greater” case.` },
  { q: `Similarly, if A = C, will D = F also hold? (yes/no):`,
    hint: `With equality, the same chain of reasoning gives equal consequents.` },
  { q: `And if A < C, will D < F likewise follow? (yes/no):`,
    hint: `By the same logic, the lesser yields the lesser in the corresponding pair.` }
];

const conclusion = `Congratulations! You just proved that if three magnitudes and another three are pairwise in the same ratios but in a perturbed order, then ex aequali the first has to the third the same relation as the fourth to the sixth—greater, equal, or less. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
