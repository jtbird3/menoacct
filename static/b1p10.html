<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.10 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.10 — Bisect a given finite straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.10 chatbot!

We are given a finite straight line AB. Do you agree? (yes/no):`,
    hint: `A finite straight line has two endpoints, here A and B.` },
  { q: `Our goal is to cut AB into two equal parts. Does that make sense? (yes/no):`,
    hint: `We want to find a point D on AB such that AD = DB.` },
  { q: `First, construct an equilateral triangle ABC on line AB. Can we do this? (yes/no):`,
    hint: `By Proposition I.1, an equilateral triangle can be constructed on any straight line.` },
  { q: `Next, bisect the angle ACB by drawing the line CD so ∠ACD = ∠BCD. Possible? (yes/no):`,
    hint: `By Proposition I.9, any angle can be bisected by a straight line from its vertex.` },
  { q: `Now, consider the two triangles ACD and BCD. Do they share the side CD in common? (yes/no):`,
    hint: `Both triangles include CD as one of their sides.` },
  { q: `Also, are AC and CB equal? (yes/no):`,
    hint: `AC = CB because ABC was constructed as an equilateral triangle.` },
  { q: `So, do we have AC = CB, CD common, and ∠ACD = ∠BCD? (yes/no):`,
    hint: `∠ACD = ∠BCD because CD was drawn as the angle bisector of ∠ACB.` },
  { q: `From Proposition I.4 (SAS), are triangles ACD and BCD equal? (yes/no):`,
    hint: `Two sides and the included angle are equal, so the triangles are congruent.` },
  { q: `If the triangles are equal, does AD = DB? (yes/no):`,
    hint: `Equal triangles have equal corresponding sides.` },
  { q: `Therefore, has AB been cut into two equal parts at D? (yes/no):`,
    hint: `Yes, D is the midpoint of AB.` }
];

const conclusion = `Congratulations! We have bisected the straight line AB.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
