<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.5 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.5 - Prove that if equal multiples lose equal parts, the remainders are also in the same multiple ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.5 chatbot!

We are given two magnitudes, AB and CD. Do you agree? (yes/no):`,
    hint: `AB is the greater, CD the other magnitude used for comparison.` },
  { q: `Let us take a part AE from AB, and a proportional part CF from CD. Do you follow? (yes/no):`,
    hint: `AE and CF are subtracted parts from their respective magnitudes.` },
  { q: `Our goal is to show that the remainder EB is the same multiple of FD that the whole AB is of CD. Does that make sense? (yes/no):`,
    hint: `We want the ratio of the remainders to correspond exactly to the ratio of the wholes.` },
  { q: `By the given, we know that AB is the same multiple of CD that AE is of CF. Correct? (yes/no):`,
    hint: `This is the given condition at the start of the proposition.` },
  { q: `Now, as AE is to CF, draw CG to EB in the same proportion. Can we do this? (yes/no):`,
    hint: `Construct EB so it bears the same multiple ratio to CG as AE does to CF.` },
  { q: `Since AE is the same multiple of CF as EB is of CG, can we conclude that AE is the same multiple of CF that AB is of GF? (yes/no):`,
    hint: `AE + EB = AB and CF + CG = GF (Book V.1 on adding equals).` },
  { q: `And, by the given, we also know that AE is the same multiple of CF that AB is of CD. Do you agree? (yes/no):`,
    hint: `Yes, that was part of the hypothesis.` },
  { q: `Therefore, since AB is the same multiple of GF as of CD, can we conclude that GF equals CD? (yes/no):`,
    hint: `If a magnitude is the same multiple of two others, those two are equal.` },
  { q: `Let CF be subtracted from each of GF and CD. Does that leave GC and FD respectively? (yes/no):`,
    hint: `Subtracting equal parts leaves equal remainders.` },
  { q: `From this, can we say that GC equals FD? (yes/no):`,
    hint: `Because GF = CD, their remainders after subtracting CF are equal.` },
  { q: `Now, since AE is the same multiple of CF that EB is of GC, and GC equals FD, can we infer AE is the same multiple of CF that EB is of FD? (yes/no):`,
    hint: `Substitute FD for GC since they are equal.` },
  { q: `But AE is also the same multiple of CF that AB is of CD. Do you agree? (yes/no):`,
    hint: `This follows again from the hypothesis.` },
  { q: `Therefore, is EB the same multiple of FD that AB is of CD? (yes/no):`,
    hint: `Equal ratios link EB:FD to AB:CD.` },
  { q: `Thus, have we shown that the remainder EB is the same multiple of the remainder FD that the whole AB is of the whole CD? (yes/no):`,
    hint: `This completes the chain: the remainders stand in the same multiple ratio as the wholes.` }
];

const conclusion = `Congratulations! You just proved that if equal multiples lose equal parts, the remainders are also in the same multiple ratio. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
