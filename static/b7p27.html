<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.27</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.27 — Prove that if two numbers are prime to one another, their squares are prime to one another, and so are the products made from them</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.27 chatbot!

We are given two numbers A and B which are prime to one another. Do you agree? (yes/no):`,
    hint: `Two numbers are prime to one another when they have no common divisor except an unit (1).` },

  { q: `Next, A multiplies itself to make C, and then A multiplies C to make D. Do you follow? (yes/no):`,
    hint: `“A multiplies itself” means A·A = C; then A·C = D.` },

  { q: `Likewise, B multiplies itself to make E, and then B multiplies E to make F. Clear? (yes/no):`,
    hint: `“B multiplies itself” means B·B = E; then B·E = F.` },

  { q: `Our goal is to show that the pairs C, E and D, F are prime to one another. Does that make sense? (yes/no):`,
    hint: `We want to show C and E have no common divisor > 1, and likewise D and F.` },

  { q: `Since A and B are prime to one another, and A multiplied itself to make C, do you agree that C is prime to B? (yes/no):`,
    hint: `As in VII.25: if A and B are prime to one another, then any multiple of A is also prime to B.` },

  { q: `If C is prime to B, and B by multiplying itself made E, can we conclude that C is prime to E? (yes/no):`,
    hint: `Again from VII.25: if C is prime to B, then C is also prime to any multiple of B.` },

  { q: `Since A and B are prime to one another, and B by multiplying itself made E, do you see that A is prime to E? (yes/no):`,
    hint: `Same principle: A is prime to any multiple of B.` },

  { q: `Since A and C are each prime to both B and E, can we say that the product of A and C is prime to the product of B and E? (yes/no):`,
    hint: `VII.26: if each of two numbers is prime to each of two others, then the product of the first pair is prime to the product of the second pair.` },

  { q: `Is the product of A and C equal to D? (yes/no):`,
    hint: `D was defined as A·C.` },

  { q: `Is the product of B and E equal to F? (yes/no):`,
    hint: `F was defined as B·E.` },

  { q: `If D is prime to F, does that complete the result that the second pair of numbers is also prime to one another? (yes/no):`,
    hint: `The proposition claims both pairs—C with E, and D with F—are prime to one another.` }
]

















const conclusion = `Congratulations! You just proved that if two numbers are prime to one another, their squares are prime to one another, and so are the products made from them
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
