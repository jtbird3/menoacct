<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.28 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.28 — prove lines parallel by equal alternate interior or interior angles summing to two right angles</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.28 chatbot!
  
We are given two straight lines, AB and CD, and a transversal EF that cuts them. Do you agree? (yes/no):`,
    hint: `A transversal is a line crossing two other lines.` },
  { q: `Our goal is to prove that AB is parallel to CD, provided certain angle equalities hold. Does that make sense? (yes/no):`,
    hint: `"Parallel" means they do not meet, no matter how far produced.` },
  { q: `Suppose the exterior angle EGB equals the interior opposite angle GHD. Do you see this condition? (yes/no):`,
    hint: `EGB lies outside at point G, while GHD is inside on the opposite side of transversal EF.` },
  { q: `Now, recall from Proposition I.15: is EGB equal also to AGH? (yes/no):`,
    hint: `When a straight line stands on another, adjacent angles are supplementary; this allows EGB = AGH.` },
  { q: `So if EGB = AGH and EGB = GHD, do we conclude AGH = GHD? (yes/no):`,
    hint: `Things equal to the same are equal (Common Notion 1).` },
  { q: `Are AGH and GHD alternate angles with respect to transversal EF? (yes/no):`,
    hint: `Alternate interior angles lie on opposite sides of the transversal.` },
  { q: `If alternate angles are equal, then are AB and CD parallel by Proposition I.27? (yes/no):`,
    hint: `I.27 states: equal alternate angles imply parallel lines.` },
  { q: `Now, for the second case: suppose the interior angles on the same side, BGH and GHD, are together equal to two right angles. Do you see that condition? (yes/no):`,
    hint: `This is another possible condition in the enunciation.` },
  { q: `Also, by Proposition I.13, are AGH and BGH together equal to two right angles? (yes/no):`,
    hint: `A straight line makes adjacent angles equal to two right angles.` },
  { q: `If AGH + BGH = two right angles and BGH + GHD = two right angles, then are AGH + BGH = BGH + GHD? (yes/no):`,
    hint: `Both sums equal the same quantity, so they are equal.` },
  { q: `If we subtract BGH from both, do we get AGH = GHD? (yes/no):`,
    hint: `Subtract equals from equals, remainders are equal (Common Notion 3).` },
  { q: `Again, are AGH and GHD alternate interior angles? (yes/no):`,
    hint: `They lie inside on opposite sides of EF.` },
  { q: `Therefore, are AB and CD parallel by Proposition I.27? (yes/no):`,
    hint: `Equal alternate angles imply parallelism.` }
];

const conclusion = `Congratulations, you just proved that if a transversal makes either (1) the external angle equal to the internal opposite, or (2) the internal angles on the same side equal to two right angles, then the two lines are parallel!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
