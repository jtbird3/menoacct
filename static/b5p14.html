<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.14 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.14 - Prove that if two pairs of magnitudes have equal ratios, then their order of greatness is the same: if the first is greater, equal, or less than the third, so is the second to the fourth</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.14 chatbot!

We are given four magnitudes: A, B, C, and D such that A is to B as C is to D and A is greater than C. Do you agree? (yes/no):`,
    hint: `The proposition compares the ratios A:B and C:D.` },
  { q: `Our goal is to show that if A is greater than C, then B is greater than D; if equal, equal; if less, less. Does that make sense? (yes/no):`,
    hint: `We want to see that the order (greater, equal, or less) is preserved when two pairs of magnitudes have the same ratio.` },
  { q: `Since A is greater than C, does A have a greater ratio to B than C has to B? (yes/no):`,
    hint: `Proposition V.8 states that if one magnitude is greater than another, it has a greater ratio to the same magnitude.` },
  { q: `But as A is to B, so is C to D. Is that still true? (yes/no):`,
    hint: `This is the given condition of equal ratios: A:B = C:D.` },
  { q: `Then, since A:B = C:D, must it follow that C has a greater ratio to D than to B? (yes/no):`,
    hint: `By Proposition V.13, equal ratios preserve inequalities of ratio in corresponding terms.` },
  { q: `And according to Proposition V.10, if the same has a greater ratio to one than to another, the second is less than the first. Do you recall this? (yes/no):`,
    hint: `V.10 says: “That to which the same has a greater ratio is less.”` },
  { q: `If D is less than B, can we conclude that B is greater than D? (yes/no):`,
    hint: `Inequality is reciprocal — if one is less, the other is greater.` },
  { q: `Therefore, if A > C, then B > D. Does that follow? (yes/no):`,
    hint: `This is the main result of the proof.` },
  { q: `By the same reasoning, if A = C, will B = D? (yes/no):`,
    hint: `Equal magnitudes in the same ratio must produce equal results.` },
  { q: `And if A < C, will B < D? (yes/no):`,
    hint: `The same logic applies in reverse: the order of size is preserved.` }
];

const conclusion = `Congratulations! You just proved that if two pairs of magnitudes have equal ratios, then their order of greatness is the same: if the first is greater, equal, or less than the third, so is the second to the fourth.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
