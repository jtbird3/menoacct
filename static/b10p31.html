<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.31</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.31 – Find two medial straight lines commensurable in square only, containing a rational rectangle, such that the square on the greater exceeds the square on the less by the square on a straight line commensurable in length with the greater.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.31 chatbot!

We are given two rational straight lines A and B, commensurable in square only, with A greater than B. Do you agree? (yes/no):`,
hint: `This is stated in the hypothesis of the proposition.` },
{ q: `The square on A exceeds the square on B by the square on a straight line commensurable in length with A. Do you accept this? (yes/no):`,
hint: `This condition is given by reference to Proposition X.29.` },
{ q: `Let the square on C be equal to the rectangle contained by A and B. Is this construction allowed? (yes/no):`,
hint: `A square can be constructed equal to a given rectangle.` },
{ q: `Is the rectangle A, B medial? (yes/no):`,
hint: `A and B are rational and commensurable in square only; see Proposition X.21.` },
{ q: `If the rectangle A, B is medial, is the square on C also medial? (yes/no):`,
hint: `Equals to the same are of the same kind (X.21).` },
{ q: `Therefore, is C itself a medial straight line? (yes/no):`,
hint: `A straight line whose square is medial is medial.` },
{ q: `Let the rectangle C, D be equal to the square on B. Can we do this? (yes/no):`,
hint: `A rectangle equal to a given square can be constructed.` },
{ q: `Is the square on B rational? (yes/no):`,
hint: `B is given as a rational straight line.` },
{ q: `If the square on B is rational, is the rectangle C, D also rational? (yes/no):`,
hint: `Equals to the same are of the same kind.` },
{ q: `Since as A is to B, so is the rectangle A, B to the square on B, do you agree? (yes/no):`,
hint: `This follows from properties of proportional magnitudes.` },
{ q: `If the square on C equals the rectangle A, B, and the rectangle C, D equals the square on B, does it follow that as A is to B, so is the square on C to the rectangle C, D? (yes/no):`,
hint: `Substitution of equals preserves ratios.` },
{ q: `But as the square on C is to the rectangle C, D, so is C to D. Do you see this? (yes/no):`,
hint: `Squares and rectangles correspond to their sides in ratio.` },
{ q: `Therefore, does it follow that as A is to B, so is C to D? (yes/no):`,
hint: `Things equal in ratio to the same thing are equal in ratio to one another.` },
{ q: `Since A is commensurable with B in square only, is C also commensurable with D in square only? (yes/no):`,
hint: `See Proposition X.11.` },
{ q: `And since C is medial, must D also be medial? (yes/no):`,
hint: `See Proposition X.23.` },
{ q: `Now, since as A is to B, so is C to D, and the square on A exceeds the square on B by the square on a straight line commensurable with A, does the square on C exceed the square on D by the square on a straight line commensurable with C? (yes/no):`,
hint: `This follows from Proposition X.14.` },
{ q: `Therefore, have we found two medial straight lines C and D, commensurable in square only, containing a rational rectangle, such that the square on the greater exceeds the square on the less by the square on a straight line commensurable in length with the greater? (yes/no):`,
hint: `This restates exactly what has been shown.` }

]





const conclusion = `Congratulations! You just found two medial straight lines commensurable in square only, containing a rational rectangle, such that the square on the greater exceeds the square on the less by the square on a straight line commensurable in length with the greater.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
