<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.19 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.19 - Prove that similar triangles are to one another in the duplicate ratio of their corresponding sides</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.19 chatbot!

We are given two similar triangles, ABC and DEF, such that ∠B = ∠E, and as AB is to BC, so is DE to EF. Do you agree? (yes/no):`,
    hint: `“Similar” means equal corresponding angles and proportional corresponding sides.` },
  { q: `Our goal is to show that triangle ABC is to triangle DEF in the duplicate ratio of BC to EF (triangle ABC : triangle DEF = (BC : EF)². Does that make sense? (yes/no):`,
    hint: `The “duplicate ratio” means the square of the ratio — area scales as the square of a corresponding side.` },
  { q: `Let us take a third proportional BG to BC and EF by drawing the line AG, so that as BC is to EF, so is EF to BG. Can we do this? (yes/no):`,
    hint: `Proposition VI.11 allows a third proportional to be taken to any two straight lines.` },
  { q: `Now, join AG. Possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Since as AB is to BC, so is DE to EF, can we say alternately that as AB is to DE, so is BC to EF? (yes/no):`,
    hint: `By Proposition V.16, equal ratios can be alternated.` },
  { q: `But as BC is to EF, so is EF to BG. Therefore, is it true that as AB is to DE, so is EF to BG? (yes/no):`,
    hint: `Equal ratios may be substituted — Proposition V.11.` },
  { q: `Do you see that in triangles ABG and DEF, the sides about the equal angles are reciprocally proportional? (yes/no):`,
    hint: `Around the equal angles, one pair of sides increases while the other decreases in the same ratio.` },
  { q: `And triangles that have one angle equal to one angle, and the sides about the equal angles reciprocally proportional, are equal in area, correct? (yes/no):`,
    hint: `Proposition VI.15 establishes this equality condition.` },
  { q: `Therefore, can we conclude that triangle ABG equals triangle DEF? (yes/no):`,
    hint: `Yes, by VI.15 — equal angle with reciprocal sides gives equal triangles.` },
  { q: `Now, since as BC is to EF, so is EF to BG, does it follow that BC has to BG a duplicate ratio of that which BC has to EF? (yes/no):`,
    hint: `Definition V.9: in three proportionals, the first to the third is in the duplicate ratio of the first to the second.` },
  { q: `Also, as CB is to BG, so is triangle ABC to triangle ABG. Do you agree? (yes/no):`,
    hint: `Proposition VI.1 — with equal heights, triangle areas are in the ratio of their bases.` },
  { q: `Then, since ABC : ABG = CB : BG, and CB : BG is in duplicate ratio of CB : EF, do we conclude that ABC : ABG is also in the duplicate ratio of BC : EF? (yes/no):`,
    hint: `Substitution preserves the relationship of duplicate ratios.` },
  { q: `But the triangle ABG equals the triangle DEF, right? (yes/no):`,
    hint: `This was proved earlier (from VI.15).` },
  { q: `Therefore, can we conclude that triangle ABC has to triangle DEF a ratio duplicate of that which BC has to EF? (yes/no):`,
    hint: `Equality of the intermediate triangle ABG allows the same ratio to transfer to DEF.` },
  { q: `Finally, the porism says: if three straight lines be proportional, as the first is to the third, so is the figure on the first to the similar figure on the second. Do you see why this follows? (yes/no):`,
    hint: `Because the area ratio of similar figures depends on the square (duplicate) of the ratio of corresponding sides.` }
];

const conclusion = `Congratulations! You just proved that similar triangles are to one another in the duplicate ratio of their corresponding sides.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
