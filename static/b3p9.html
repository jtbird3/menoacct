<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.9 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.9 - Prove that if a point inside a circle has more than two equal lines drawn to the circumference, the point is the center.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.9 chatbot!

We are given a circle ABC, and a point D within it. From D, three equal straight lines, DA, DB, DC, fall on the circle. Do you agree? (yes/no):`,
    hint: `The setup is a circle with an interior point D, joined to three or more points on the circumference at equal length. D should appear at the center, which is what we are trying to prove.` },
  { q: `Our goal is to prove that D is the center of the circle. Does that make sense? (yes/no):`,
    hint: `We must show that D lies at equal distance from all points on the circle, i.e., at the center.` },
  { q: `Let AB and BC be joined, and bisected at points E and F. Can we do this? (yes/no):`,
    hint: `Proposition I.10 shows how to bisect a line.` },
  { q: `Now join ED and FD. Produce ED to the edges of the circle making line KEDG, and produce FD making line LFDH. Is this possible? (yes/no):`,
    hint: `Postulate 2 allows producing a straight line.` },
  { q: `Since AE = EB and ED is common, and DA = DB, do triangles AED and BED have three pairs of equal sides? (yes/no):`,
    hint: `AE = EB by construction, ED is shared, DA = DB by hypothesis.` },
  { q: `From Proposition I.8, are ∠AED and ∠BED equal? (yes/no):`,
    hint: `Triangles with two sides equal to two sides and base equal have equal angles at the base.` },
  { q: `Therefore, is each of the angles AED and BED a right angle? (yes/no):`,
    hint: `When adjacent angles are equal and form a straight line, each is right (I.Def.10).` },
  { q: `Therefore, does line GK cut AB into two equal parts at right angles? (yes/no):`,
    hint: `The perpendicular from D through E bisects AB.` },
  { q: `And by Proposition III.1 (Porism), if a chord is bisected perpendicularly, is the center of the circle on that perpendicular? (yes/no):`,
    hint: `Yes, the center lies on the bisector at right angles.` },
  { q: `Therefore, is the center of circle ABC on line GK? (yes/no):`,
    hint: `The perpendicular bisector through E passes through the circleis center.` },
  { q: `By the same reasoning, is the center also on line HL? (yes/no):`,
    hint: `The same argument applies with BC bisected at F.` },
  { q: `Since lines GK and HL intersect only at D, must the center be at D? (yes/no):`,
    hint: `Two distinct perpendicular bisectors meet only at one point, which must be the center.` },
  { q: `Therefore, is D the center of the circle ABC? (yes/no):`,
    hint: `D lies on both perpendicular bisectors, so it is the unique center.` }
];

const conclusion = `Congratulations! You just proved that if more than two equal lines fall from a point inside a circle, that point is the center.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
