<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Principia Lemma 11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Principia Lemma 11</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Newton's Principia Lemma 11 chatbot!

We are given a curve with a point of contact at A. Do you agree? (yes/no):`,
    hint: `The lemma concerns behavior at the point where a curve meets its tangent.` },
  { q: `Let AB be a small arc of the curve, and let AD be the tangent at A in the direction of B. Agreed? (yes/no):`,
    hint: `AB is the conterminous arc, and AD touches the curve at A.` },
  { q: `Let BD be the subtense of the angle of contact, drawn perpendicular to the tangent AD. Do you agree? (yes/no):`,
    hint: `BD subtends the angle between the curve and its tangent, such that BDA is a right angle.` },
  { q: `Let line AB be drawn. Our goal is to show that BD is ultimately proportional to the square of AB. Does that make sense? (yes/no):`,
    hint: `“Squared ratio” means comparing BD with AB² in the limit.` },
  { q: `On the straight line AB (the chord of the arc), erect BG perpendicular to AB. Can we do that? (yes/no):`,
    hint: `A perpendicular can be erected from a point on a straight line.` },
  { q: `Also erect AG perpendicular to the tangent AD, meeting BG at G. Is this possible? (yes/no):`,
    hint: `AG and BG are both perpendicular constructions.` },
  { q: `Now let the points D, B, and G approach A, becoming d, b, and g. Do you see this limiting process? (yes/no):`,
    hint: `Newton considers the points moving toward coincidence at A.` },
  { q: `Let J be the intersection of BG and AG in the limit. Does such a point exist? (yes/no):`,
    hint: `The perpendiculars ultimately meet arbitrarily close to A.` },
  { q: `Is it evident that the distance GJ can be made less than any assigned length? (yes/no):`,
    hint: `As the points approach A, all such constructed distances vanish.` },
  { q: `From the nature of the circles through points A, B, G, do we have AB² = AG × BD? (yes/no):`,
    hint: `This follows from the geometry of right angles and circles through the three points.` },
  { q: `Similarly, for the limiting points a, b, g, do we have Ab² = Ag × bd? (yes/no):`,
    hint: `The same geometric relation holds in the limiting configuration.` },
  { q: `Is the ratio AB² : Ab² compounded of the ratios AG : Ag and BD : bd? (yes/no):`,
    hint: `Products of segments give compounded ratios.` },
  { q: `Since GJ can be made smaller than any assigned length, can AG : Ag differ from equality by less than any assigned difference? (yes/no):`,
    hint: `The perpendicular distances become arbitrarily close.` },
  { q: `Does it then follow that AB² : Ab² differs from BD : bd by less than any assigned difference? (yes/no):`,
    hint: `One factor tends to equality, so the compounded ratio depends on the other.` },
  { q: `By Lemma 1, do the ultimate ratios AB² : Ab² and BD : bd become equal? (yes/no):`,
    hint: `Quantities whose difference can be made less than any assigned amount have the same ultimate ratio.` },
  { q: `Therefore, is the vanishing subtense BD ultimately in the squared ratio of the arc AB? (yes/no):`,
    hint: `This is exactly what was to be shown in Case 1.` },
  { q: `Q.E.D.`,
    hint: `` },

  // CASE 2
  { q: `Now let BD be inclined to the tangent AD at any given angle. Do you agree? (yes/no):`,
    hint: `The subtense need not be perpendicular in this case.` },
  { q: `Is the ultimate ratio of BD to bd the same as in Case 1? (yes/no):`,
    hint: `The inclination does not affect the limiting behavior.` },
  { q: `And is this ultimate ratio still the same as that of AB² to Ab²? (yes/no):`,
    hint: `The squared ratio result is unchanged.` },
  { q: `Therefore, does the conclusion of the lemma still hold in this case? (yes/no):`,
    hint: `The same limiting proportion is obtained.` },
  { q: `Q.E.D.`,
    hint: `` },

  // CASE 3
  { q: `Suppose now that the angle at D is not given, but that BD converges to a given point or is drawn by a fixed specification. Do you agree? (yes/no):`,
    hint: `The construction rule is common to both BD and bd.` },
  { q: `Will the angles D and d, constructed according to the same specification, tend toward equality? (yes/no):`,
    hint: `Their difference can be made less than any assigned quantity.` },
  { q: `By Lemma 1, do angles D and d ultimately become equal? (yes/no):`,
    hint: `Ultimate equality follows from vanishing difference.` },
  { q: `Does it then follow that BD and bd are in the same ultimate ratio as before? (yes/no):`,
    hint: `The limiting proportionality is preserved.` },
  { q: `Therefore, even in this most general case, is the subtense of the angle of contact ultimately in the squared ratio of the arc? (yes/no):`,
    hint: `The lemma holds under all stated specifications.` },
  { q: `Q.E.D.`,
    hint: `` },
]

const conclusion = `Therefore, from AB we have cut off AE equal to C. Congratulations! You just constructed a line equal to a given line at a point. 
Q.E.F. (Quod Erat Faciendum)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
