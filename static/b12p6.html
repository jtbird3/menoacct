<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.6 – Prove that pyramids of the same height and having polygonal bases are to one another as their bases.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.6 chatbot!

We are given two pyramids of the same height, with polygonal bases ABCDE and FGHKL, and vertices M and N respectively. Do you agree? (yes/no):`,
    hint: `Both pyramids are stated to have equal height and polygonal bases.` },

  { q: `Our goal is to prove that, as the base ABCDE is to the base FGHKL, so is the pyramid ABCDEM to the pyramid FGHKLN. Does that make sense? (yes/no):`,
    hint: `We want the ratio of the pyramids to match the ratio of their bases.` },

  { q: `Let the diagonals AC and AD of the polygon ABCDE be joined. Is this allowed? (yes/no):`,
    hint: `Straight lines may be drawn between any points.` },

  { q: `Similarly, let FH and FK be joined in the polygon FGHKL. Can this be done? (yes/no):`,
    hint: `The same construction applies to the second base.` },

  { q: `Do the pyramids ABCM and ACDM have triangular bases and the same height? (yes/no):`,
    hint: `They share vertex M and lie on triangles ABC and ACD.` },

  { q: `Since they have triangular bases and equal height, are the pyramids ABCM and ACDM to one another as their bases ABC and ACD? (yes/no):`,
    hint: `This follows from Proposition XII.5.` },

  { q: `By componendo, is the base ABCD to the base ACD as the pyramid ABCDM is to the pyramid ACDM? (yes/no):`,
    hint: `Ratios of magnitudes may be compounded (Book V, Proposition 18).` },

  { q: `Do the pyramids ACDM and ADEM also have triangular bases and equal height? (yes/no):`,
    hint: `Both have vertex M and triangular bases ACD and ADE.` },

  { q: `Is it true that, as the base ACD is to the base ADE, so is the pyramid ACDM to the pyramid ADEM? (yes/no):`,
    hint: `Again by Proposition XII.5.` },

  { q: `By ex aequali, is the base ABCD to the base ADE as the pyramid ABCDM is to the pyramid ADEM? (yes/no):`,
    hint: `Equality of ratios in order (Book V, Proposition 22).` },

  { q: `By componendo, is the base ABCDE to the base ADE as the pyramid ABCDEM is to the pyramid ADEM? (yes/no):`,
    hint: `The full base is composed from its parts.` },

  { q: `Similarly, can it be proved that, as the base FGHKL is to the base FGH, so is the pyramid FGHKLN to the pyramid FGHN? (yes/no):`,
    hint: `The same reasoning applies to the second pyramid.` },

  { q: `Do the pyramids ADEM and FGHN have triangular bases and equal height? (yes/no):`,
    hint: `Both rest on triangles and have the same height.` },

  { q: `Is it therefore true that, as the base ADE is to the base FGH, so is the pyramid ADEM to the pyramid FGHN? (yes/no):`,
    hint: `Proposition XII.5 applies again.` },

  { q: `But was it previously shown that, as the base ADE is to the base ABCDE, so was the pyramid ADEM to the pyramid ABCDEM? (yes/no):`,
    hint: `This was established earlier by composition.` },

  { q: `Therefore, by ex aequali, is the base ABCDE to the base FGH as the pyramid ABCDEM to the pyramid FGHN? (yes/no):`,
    hint: `Ratios equal in order yield equality by alternation (Book V, Proposition 22).` },

  { q: `Further, is it true that, as the base FGH is to the base FGHKL, so was the pyramid FGHN to the pyramid FGHKLN? (yes/no):`,
    hint: `This follows from the earlier similar decomposition.` },

  { q: `Finally, by ex aequali, can we conclude that, as the base ABCDE is to the base FGHKL, so is the pyramid ABCDEM to the pyramid FGHKLN? (yes/no):`,
    hint: `Equal ratios chained together give the required result.` }
]

const conclusion = `Congratulations! You just proved that pyramids of the same height and having polygonal bases are to one another as their bases.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
