<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.34 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.34 – Prove that in parallelograms opposite sides and opposite angles are equal, and the diagonal bisects them</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.34 chatbot!

We are given a parallelogram ACDB, with diagonal BC drawn. Do you agree? (yes/no):`,
    hint: `A parallelogram has opposite sides parallel, and a diagonal is a line joining opposite corners.` },
  { q: `Our goal is to prove that in a parallelogram the opposite sides and angles are equal, and that the diagonal bisects the area. Does that make sense? (yes/no):`,
    hint: `We want to show both side-and-angle equality, and that the diagonal divides it into equal triangles.` },
  { q: `Since AB is parallel to CD, and BC crosses them, are alternate angles ABC and BCD equal? (yes/no):`,
    hint: `Proposition I.29 says alternate interior angles are equal when a line crosses parallels.` },
  { q: `Since AC is parallel to BD, and BC crosses them, are alternate angles ACB and CBD equal? (yes/no):`,
    hint: `Again by I.29, alternate angles are equal.` },
  { q: `So, do triangles ABC and DCB have two equal angles and a common side BC? (yes/no):`,
    hint: `The equal angles are ∠ABC = ∠BCD, ∠BCA = ∠CBD, and side BC is shared.` },
  { q: `From Proposition I.26, do the triangles then have the other sides and angle equal? (yes/no):`,
    hint: `I.26 says if two angles and the included side match, the triangles are equal in remaining sides and angles.` },
  { q: `Therefore, is AB equal to CD, AC equal to BD, and ∠BAC equal to ∠CDB? (yes/no):`,
    hint: `Equal triangles give equality of corresponding sides and angles.` },
  { q: `Also, since ∠ABC = ∠BCD and ∠CBD = ∠ACB, is the whole angle ABD equal to angle ACD? (yes/no):`,
    hint: `Common Notion 2: if equals are added to equals, the wholes are equal.` },
  { q: `Therefore, are opposite sides and angles of the parallelogram equal? (yes/no):`,
    hint: `We have shown AB = CD, AC = BD, ∠BAC = ∠CDB, and ∠ABD = ∠ACD.` },
  { q: `Now, let's show that the diagonal bisects the area. Ready? (yes/no):`,
    hint: `We need to prove the two triangles cut off by the diagonal are equal.` },
  { q: `Since AB = CD, BC is common, and ∠ABC = ∠BCD, do triangles ABC and DCB have two sides and the included angle equal? (yes/no):`,
    hint: `Side AB = CD, side BC is common, angle ABC = angle BCD.` },
  { q: `From Proposition I.4 (SAS), are the triangles ABC and DCB equal? (yes/no):`,
    hint: `Two sides and the included angle equal gives equal triangles.` },
  { q: `Therefore, does diagonal BC bisect the parallelogram into equal areas? (yes/no):`,
    hint: `Equal triangles occupy equal areas.` }
];

const conclusion = `Congratulations! We just proved that in a parallelogram the opposite sides and angles are equal, and the diagonal bisects the area!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
