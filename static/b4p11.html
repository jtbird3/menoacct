<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.11 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.11 - Inscribe an equilateral and equiangular pentagon in a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.11 chatbot!

We are given a circle ABCDE. Do you agree? (yes/no):`,
    hint: `A given circle means one already drawn, with its circumference known.` },
  { q: `Our goal is to inscribe in the circle an equilateral and equiangular pentagon. Does that make sense? (yes/no):`,
    hint: `“Inscribe” means all five vertices of the pentagon lie on the circumference of the circle.` },
  { q: `To begin, we construct an isosceles triangle FGH such that each of the angles at G and H is double the angle at F. Can we do that? (yes/no):`,
    hint: `Proposition IV.10 gives a method to construct such a triangle.` },
  { q: `Next, inscribe in the circle ABCDE a triangle ACD equiangular with triangle FGH. Possible? (yes/no):`,
    hint: `Proposition IV.2 allows one triangle to be inscribed in a circle equiangular to a given triangle.` },
  { q: `So the angle CAD equals the angle at F, and the angles at G and H equal ACD and CDA respectively. Correct? (yes/no):`,
    hint: `That follows directly from “equiangular”—each corresponding angle pair is equal.` },
  { q: `Since each of the angles ACD and CDA equals double the angle CAD, do we now know the proportion between these angles? (yes/no):`,
    hint: `Yes, each outer angle (at C and D) is twice the inner one at A.` },
  { q: `Let us now bisect the angles ACD and CDA by straight lines CE and DB. Can we do that? (yes/no):`,
    hint: `Proposition I.9 allows us to bisect any given rectilinear angle.` },
  { q: `After bisecting, we join AB, BC, DE, and EA. Are these chords all drawn inside the circle? (yes/no):`,
    hint: `Each joins two points on the circumference, forming sides of the pentagon.` },
  { q: `Since ACD and CDA are each double of CAD and have been bisected, are the angles DAC, ACE, ECD, CDB, and BDA now all equal? (yes/no):`,
    hint: `Each new smaller angle equals half of the doubled angle, thus all five are equal.` },
  { q: `Equal angles in the same circle stand on equal circumferences. Is that true? (yes/no):`,
    hint: `Proposition III.26 states that equal angles at the center or circumference subtend equal arcs.` },
  { q: `Then do we conclude that the five arcs AB, BC, CD, DE, and EA are equal? (yes/no):`,
    hint: `Equal subtended arcs follow directly from equal angles.` },
  { q: `Are equal circumferences subtended by equal straight lines? (yes/no):`,
    hint: `Proposition III.29 states that equal arcs correspond to equal chords.` },
  { q: `Therefore, are the five chords AB, BC, CD, DE, and EA equal in length? (yes/no):`,
    hint: `Equal chords mean the pentagon is equilateral.` },
  { q: `Now we show it is also equiangular. Ready? (yes/no):`,
    hint: `Next, we compare the angles at the circumference.` },
  { q: `Since the circumference AB equals the circumference DE, if we add BCD to each, are the whole circumferences ABCD and EDCB equal? (yes/no):`,
    hint: `Adding equal arcs to equal arcs keeps the sums equal.` },
  { q: `The angle AED stands on the circumference ABCD, and angle BAE on EDCB. Does that imply ∠BAE = ∠AED? (yes/no):`,
    hint: `Proposition III.27 — equal arcs subtend equal angles at the circumference.` },
  { q: `By the same reasoning, are each of the angles ABC, BCD, and CDE also equal to ∠BAE and ∠AED? (yes/no):`,
    hint: `Each stands on arcs equal in measure, so the angles are equal.` },
  { q: `Then is the pentagon ABCDE equiangular as well as equilateral? (yes/no):`,
    hint: `Equal sides and equal angles define an equilateral and equiangular pentagon.` },
  { q: `Therefore, have we inscribed in the given circle an equilateral and equiangular pentagon? (yes/no):`,
    hint: `Both conditions are satisfied — construction complete.` }
];

const conclusion = `Congratulations! You just inscribed an equilateral and equiangular pentagon in a given circle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
