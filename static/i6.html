<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Euclid I.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body {
      background: #fff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      font-size: 14px;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 16px 110px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    h1 { font-size: 15px; font-weight: bold; margin-bottom: 10px; }

    #diagram-row { position: relative; margin-bottom: 10px; }
    #diagram-wrap { position: relative; }
    #diagram {
      border: 1px solid #ccc;
      background: #fff;
      display: block;
      width: 100%;
      height: clamp(160px, 38vh, 380px);
      cursor: grab;
    }
    #diagram.panning { cursor: grabbing; }
    #diagram-controls {
      position: absolute; bottom: 22px; right: 8px;
      display: flex; flex-direction: column; gap: 2px; z-index: 10;
    }
    #diagram-controls button {
      font-family: inherit; font-size: 15px;
      width: 28px; height: 28px;
      border: 1px solid #ccc; background: rgba(255,255,255,0.9);
      cursor: pointer; padding: 0; line-height: 1;
    }
    #diagram-controls button:hover { background: #f0f0f0; }
    .resize-corner {
      position: absolute; bottom: 0; width: 16px; height: 16px;
      user-select: none; z-index: 10; opacity: 0.5;
      background: repeating-linear-gradient(-45deg,#bbb 0,#bbb 1px,transparent 1px,transparent 3px);
    }
    .resize-corner:hover { opacity: 1; }
    #rc-l { left: 0; cursor: sw-resize; }
    #rc-r { right: 0; cursor: se-resize; }

    #side-panel {
      position: absolute; left: calc(100% + 10px); top: 0;
      width: 110px; font-size: 13px;
    }
    .side-item { opacity: 0; transition: opacity 0.5s; line-height: 1.6; color: #16a34a; }
    .side-item.on { opacity: 1; }
    #left-panel {
      position: absolute; right: calc(100% + 12px); top: 0;
      width: 190px; font-size: 11.5px; line-height: 1.5;
    }
    #left-panel .prop-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
      opacity: .4; margin-bottom: 4px;
    }
    #left-panel .prop-enunc {
      font-style: italic; opacity: .55; font-size: 11px;
      border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px;
    }
    .proof-line {
      opacity: .22; margin-bottom: 6px; transition: opacity .4s, color .4s;
    }
    .proof-line .just { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .proof-line.past { opacity: .48; }
    .proof-line.active { opacity: 1; color: #16a34a; }

    .de { opacity: 0; transition: opacity 0.5s; }
    .de.on { opacity: 1; }

    #chat {
      border: 1px solid #ccc; padding: 10px;
      flex: 1; min-height: 120px; max-height: 260px;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      gap: 8px; margin-bottom: 10px;
    }
    .msg-bot, .msg-user {
      white-space: pre-wrap; word-break: break-word;
      overflow-wrap: break-word; min-width: 0; max-width: 100%;
    }
    .msg-bot  { color: #000; }
    .msg-user { color: #777; text-align: right; }

    #input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    #text-input {
      flex: 1; padding: 8px; font-family: inherit; font-size: 14px;
      border: 1px solid #ccc; outline: none;
    }
    #text-input:focus { border-color: #000; }
    #fake-input {
      display: none;
      flex: 1; padding: 8px; font-family: inherit; font-size: 14px;
      border: 1px solid #000; color: #000;
      overflow: hidden; white-space: nowrap;
      align-items: center; line-height: 1.4;
    }
    #fake-placeholder { color: #999; }
    #fake-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #000; vertical-align: text-bottom; margin-left: 1px;
      animation: blink-caret 1s step-end infinite;
    }
    @keyframes blink-caret { 50% { opacity: 0; } }
    #send-btn {
      padding: 8px 14px; font-family: inherit; font-size: 14px;
      border: 1px solid #000; background: #000; color: #fff; cursor: pointer;
    }
    #send-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

    #yn-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #ccc;
      padding: 10px 16px; gap: 12px; justify-content: center; z-index: 100;
    }
    #yn-bar button {
      flex: 1; max-width: 140px;
      padding: 12px 20px; font-family: inherit; font-size: 15px; font-weight: bold;
      border: 2px solid #000; background: #fff; color: #000; cursor: pointer;
    }
    #yn-bar button:active { background: #000; color: #fff; }

    #draw-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #ccc;
      padding: 10px 16px; justify-content: center; z-index: 100;
    }
    #draw-bar button {
      flex: 1; max-width: 200px;
      padding: 12px 20px; font-family: inherit; font-size: 15px; font-weight: bold;
      border: 2px solid #000; background: #fff; color: #000; cursor: pointer;
    }
    #draw-bar button:active { background: #000; color: #fff; }

    #proof-display {
      min-height: 1.6em;
      font-style: italic; font-size: 12px; color: #444;
      border-left: 2px solid #16a34a; padding: 4px 10px;
      margin-bottom: 8px; opacity: 0; transition: opacity 0.4s;
    }
    #proof-display.visible { opacity: 1; }
    #proof-display .proof-just { font-style: normal; font-size: 10px; color: #888; margin-left: 8px; }

    #kb-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #f0f0f0; border-top: 1px solid #ccc;
      padding: 8px 6px 14px; flex-direction: column;
      gap: 6px; z-index: 100;
    }
    .kb-row { display: flex; justify-content: center; gap: 5px; width: 100%; }
    #kb-alpha, #kb-num { display: flex; flex-direction: column; gap: 6px; }
    .kb-key {
      font-family: inherit; font-size: 15px; font-weight: bold;
      height: 42px; flex: 1;
      border: none; border-radius: 4px;
      background: #fff; color: #000;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
      cursor: pointer; padding: 0;
    }
    .kb-key:active { background: #ccc; }
    .kb-key.kb-wide  { flex: 1.4; font-size: 12px; }
    .kb-key.kb-space { flex: 5; }
    .kb-key.kb-enter { flex: 2; font-size: 13px; }

    @media (max-width: 600px) {
      html { overflow: hidden; }
      body {
        height: 100vh; height: 100dvh; min-height: unset;
        overflow: hidden; padding: 8px 10px 0;
        font-size: 13px; max-width: 100%;
      }
      h1 { font-size: 13px; margin-bottom: 6px; flex-shrink: 0; }
      #left-panel, #side-panel { display: none; }
      #diagram-row { flex-shrink: 0; margin-bottom: 6px; }
      #diagram { height: clamp(110px, 22vh, 180px); }
      #proof-display { font-size: 11px; flex-shrink: 0; }
      #chat { flex: 1; min-height: 0; max-height: none; font-size: 13px; }
      #input-row { flex-shrink: 0; }
      #text-input, #fake-input { font-size: 16px; }
      #yn-bar, #draw-bar, #kb-bar { position: static; flex-shrink: 0; }
      #kb-bar { padding-bottom: 10px; }
    }
  </style>
</head>
<body>

<h1>Euclid I.6 — If two angles of a triangle are equal, then the sides opposite the equal angles are equal</h1>

<div id="diagram-row">
<div id="diagram-wrap">

        <line x1="400" y1="85" x2="595" y2="395" stroke="#000" stroke-width="2.5"/>

      <g id="dc-equal" class="de">
        <line x1="226" y1="347" x2="237" y2="353" stroke="#2563eb" stroke-width="2.5"/>
        <line x1="479" y1="244" x2="490" y2="238" stroke="#2563eb" stroke-width="2.5"/>
        <line x1="419" y1="395" x2="419" y2="381" stroke="#555" stroke-width="2.2"/>

        <polygon points="258,310 205,395 595,395" fill="rgba(37,99,235,0.08)" stroke="none"/>
        <text x="410" y="328" font-family="inherit" font-size="13" fill="#2563eb" text-anchor="middle">△DBC ≅ △ACB  (I.4)</text>
      </g>

      <g id="dc-contradict" class="de">
        <text x="402" y="292" font-family="inherit" font-size="13" fill="#dc2626" text-anchor="middle">But △DBC is part of △ACB</text>
        <text x="402" y="308" font-family="inherit" font-size="13" fill="#dc2626" text-anchor="middle">A part cannot equal the whole</text>
      </g>

      <g id="dc-result" class="de">
        <line x1="301" y1="244" x2="312" y2="250" stroke="#16a34a" stroke-width="2.5"/>
        <line x1="488" y1="250" x2="499" y2="244" stroke="#16a34a" stroke-width="2.5"/>
        <text x="400" y="46" font-family="inherit" font-size="14" fill="#16a34a" text-anchor="middle">AB = AC ✓</text>
      </g>
    </g>
  </svg>
  <div id="rc-l" class="resize-corner"></div>
  <div id="rc-r" class="resize-corner"></div>
  <div id="diagram-controls">
    <button onclick="zoomCenter(1.5)">+</button>
    <button onclick="zoomCenter(1/1.5)">−</button>
    <button onclick="resetView()">&#x2302;</button>
  </div>
</div>
<div id="side-panel"></div>
<div id="left-panel"></div>
</div>

<div id="proof-display"></div>
<div id="chat"></div>

<div id="input-row">
  <div id="fake-input"><span id="fake-placeholder">Your answer…</span><span id="fake-cursor"></span></div>
  <input id="text-input" type="text" placeholder="Your answer…" autocomplete="off" inputmode="none">
  <button id="send-btn">→</button>
</div>

<div id="dashboard-btn" style="display:none;margin-bottom:8px;">
  <a href="/welcome" style="text-decoration:none;"><button style="width:100%;padding:10px;font-family:inherit;font-size:14px;font-weight:bold;border:2px solid #000;background:#fff;color:#000;cursor:pointer;">&gt; Go to Dashboard</button></a>
</div>

<div id="yn-bar">
  <button id="btn-no">NO</button>
  <button id="btn-yes">YES</button>
</div>

<div id="draw-bar">
  <button id="btn-draw">Yes / Draw</button>
</div>

<div id="kb-bar">
  <div id="kb-alpha">
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('q')">Q</button><button class="kb-key" onclick="kbTap('w')">W</button><button class="kb-key" onclick="kbTap('e')">E</button><button class="kb-key" onclick="kbTap('r')">R</button><button class="kb-key" onclick="kbTap('t')">T</button><button class="kb-key" onclick="kbTap('y')">Y</button><button class="kb-key" onclick="kbTap('u')">U</button><button class="kb-key" onclick="kbTap('i')">I</button><button class="kb-key" onclick="kbTap('o')">O</button><button class="kb-key" onclick="kbTap('p')">P</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('a')">A</button><button class="kb-key" onclick="kbTap('s')">S</button><button class="kb-key" onclick="kbTap('d')">D</button><button class="kb-key" onclick="kbTap('f')">F</button><button class="kb-key" onclick="kbTap('g')">G</button><button class="kb-key" onclick="kbTap('h')">H</button><button class="kb-key" onclick="kbTap('j')">J</button><button class="kb-key" onclick="kbTap('k')">K</button><button class="kb-key" onclick="kbTap('l')">L</button>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-wide" onclick="kbToggleNum()">123</button><button class="kb-key" onclick="kbTap('z')">Z</button><button class="kb-key" onclick="kbTap('x')">X</button><button class="kb-key" onclick="kbTap('c')">C</button><button class="kb-key" onclick="kbTap('v')">V</button><button class="kb-key" onclick="kbTap('b')">B</button><button class="kb-key" onclick="kbTap('n')">N</button><button class="kb-key" onclick="kbTap('m')">M</button><button class="kb-key kb-wide" onclick="kbBack()">⌫</button>
    </div>

      <button class="kb-key" onclick="kbTap('.')">.</button>
      <button class="kb-key kb-space" onclick="kbTap(' ')">space</button>
      <button class="kb-key kb-enter" onclick="kbEnter()">Enter</button>
    </div>
  </div>
  <div id="kb-num" style="display:none">
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('1')">1</button><button class="kb-key" onclick="kbTap('2')">2</button><button class="kb-key" onclick="kbTap('3')">3</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('4')">4</button><button class="kb-key" onclick="kbTap('5')">5</button><button class="kb-key" onclick="kbTap('6')">6</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('7')">7</button><button class="kb-key" onclick="kbTap('8')">8</button><button class="kb-key" onclick="kbTap('9')">9</button>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-wide" onclick="kbToggleNum()">ABC</button><button class="kb-key" onclick="kbTap('.')">.</button><button class="kb-key" onclick="kbTap('0')">0</button><button class="kb-key kb-wide" onclick="kbBack()">⌫</button>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-enter" onclick="kbEnter()">Enter</button>
    </div>
  </div>
</div>

<script>
const STEPS = [
  {
    type: 'yn',
    q: 'Triangle ABC has two equal angles at B and C. Can you see the matching green angle marks?',
    no: 'The green arcs at B and C show the given equal angles: ∠ABC = ∠ACB.',
    text: 'Let ABC be a triangle having the angle ABC equal to the angle ACB.',
    just: null,
    side: 'Given: ∠ABC = ∠ACB',
    reveal: []
  },
  {
    type: 'yn',
    q: 'Our goal is to prove that the opposite sides are equal, namely AB = AC. Ready?',
    no: 'The side opposite angle B is AC, and the side opposite angle C is AB.',
    text: 'I say that side AB is equal to side AC.',
    just: null,
    side: 'Goal: AB = AC',
    reveal: []
  },
  {
    type: 'yn',
    q: 'If AB were not equal to AC, would one of them have to be greater?',
    no: 'Yes. If two straight lines are unequal, one must be greater than the other.',
    text: 'For, if AB is unequal to AC, one of them is greater.',
    just: null,
    side: 'Assume AB ≠ AC',
    reveal: []
  },
  {
    type: 'yn',
    q: 'Let us follow Euclid and suppose AB is greater than AC. Shall we continue with that case?',
    no: 'The other case is symmetric, so Euclid carries one case through to contradiction.',
    text: 'Let AB be greater than AC.',
    just: 'Assumption',
    side: 'Assume AB > AC',
    reveal: []
  },
  {
    type: 'draw',
    q: 'From the greater AB, cut off DB equal to AC. Shall we place point D on AB?',
    text: 'From AB the greater let DB be cut off equal to AC the less.',
    just: 'I.3',
    side: 'DB = AC',
    reveal: ['dc-d']
  },
  {
    type: 'draw',
    q: 'Now join D to C. Shall we draw segment DC?',
    text: 'Let DC be joined.',
    just: 'Post. 1',
    side: 'Join DC',
    reveal: ['dc-dc']
  },
  {
    type: 'open',
    q: 'Why are DB and AC equal?',
    criteria: 'Because DB was cut off from AB equal to AC by construction, using Proposition I.3.',
    hint: 'Look back to the last construction step: what length was DB made equal to?',
    ok_regex: 'db.*ac|ac.*db|equal|same|construct|construction|cut|cop|made|mark|chosen|i\\.?\\s*3|proposition\\s*1\\.3',
    ok_targets: ['DB', 'AC', 'equal', 'same', 'construction', 'cut', 'made', 'copied', 'chosen', 'I.3'],
    text: 'Since DB was cut off equal to AC, DB is equal to AC.',
    just: 'Constr.',
    side: 'DB = AC',
    reveal: ['dc-equal'],
    hint_linked_idx: 4
  },
  {
    type: 'open',
    q: 'What side is common to triangles DBC and ACB?',
    criteria: 'BC is common to both triangles.',
    hint: 'Both triangles use the base from B to C.',
    ok_regex: '\\bbc\\b|cb|common|shared|same|both',
    ok_targets: ['BC', 'CB', 'common', 'shared', 'same', 'both'],
    text: 'And BC is common to triangles DBC and ACB.',
    just: 'Common',
    side: 'BC common',
    reveal: [],
    hint_linked_idx: null
  },
  {
    type: 'open',
    q: 'Since D lies on BA, what angle at B in the smaller triangle equals the given angle at C?',
    criteria: 'Angle DBC equals angle ACB, because DB lies along BA and the given says angle ABC equals angle ACB.',
    hint: 'Since D is on line BA, the ray BD has the same direction as BA. So angle DBC is the same as angle ABC.',
    ok_regex: 'dbc.*acb|acb.*dbc|abc.*acb|acb.*abc|same.*angle|equal.*angle|equal|given|straight.*line|same.*line',
    ok_targets: ['DBC', 'ABC', 'ACB', 'equal', 'angle', 'given', 'straight', 'line', 'same'],
    text: 'Since DB is in the same straight line as BA, angle DBC is equal to angle ACB.',
    just: 'Hyp.',
    side: '∠DBC = ∠ACB',
    reveal: [],
    hint_linked_idx: 0
  },
  {
    type: 'draw',
    q: 'So DB = AC, BC = CB, and the included angle DBC = ACB. By I.4, shall we record the congruence?',
    text: 'Therefore triangle DBC is equal to triangle ACB.',
    just: 'I.4',
    side: '△DBC ≅ △ACB',
    reveal: ['dc-cong']
  },
  {
    type: 'open',
    q: 'But where is triangle DBC compared with triangle ACB?',
    criteria: 'Triangle DBC is only a part of triangle ACB; it lies inside the larger triangle.',
    hint: 'Look at the picture: D lies on AB, so triangle DBC is contained inside triangle ABC.',
    ok_regex: 'part|inside|within|contained|smaller|interior|in.*acb|in.*triangle',
    ok_targets: ['part', 'inside', 'within', 'contained', 'smaller', 'interior', 'triangle'],
    text: 'But triangle DBC is a part of triangle ACB.',
    just: null,
    side: 'DBC is part of ACB',
    reveal: ['dc-contradict']
  },
  {
    type: 'open',
    q: 'Can a part be equal to the whole?',
    criteria: 'No. By Common Notion 5, the whole is greater than the part.',
    hint: 'Euclid Common Notion 5: the whole is greater than the part.',
    ok_regex: 'no|cannot|can.?t|impossible|whole.*greater|part.*whole|whole|part|cn\\.?\\s*5|common notion',
    ok_targets: ['no', 'cannot', 'impossible', 'whole', 'part', 'greater', 'Common', 'Notion'],
    text: 'But the whole is greater than the part.',
    just: 'C.N. 5',
    side: 'Whole > part',
    reveal: [],
    hint_linked_idx: null
  },
  {
    type: 'yn',
    q: 'Does our assumption that AB was greater than AC lead to a contradiction?',
    no: 'Yes. It makes a part equal to the whole, which is impossible.',
    text: 'Therefore AB is not greater than AC.',
    just: 'Contradiction',
    side: 'AB is not > AC',
    reveal: []
  },
  {
    type: 'open',
    q: 'By the same argument AC cannot be greater than AB either. What follows?',
    criteria: 'So neither side is greater, and therefore AB = AC.',
    hint: 'If neither straight line is greater than the other, they must be equal.',
    ok_regex: 'ab.*ac|ac.*ab|equal|same|neither.*greater|neither|both|must.*equal',
    ok_targets: ['AB', 'AC', 'equal', 'same', 'neither', 'both'],
    text: 'Therefore AB is equal to AC.',
    just: null,
    side: 'AB = AC ✓',
    reveal: ['dc-result']
  },
  {
    type: 'open',
    q: 'Q.E.D. or Q.E.F.?',
    criteria: 'Q.E.D. This proposition proves a theorem rather than constructing a figure.',
    hint: 'Did we prove a statement, or construct an object?',
    ok_regex: 'q\\.?e\\.?d\\.?|qed|demonstr|demonstrandum|prove|proof|theorem',
    ok_targets: ['QED', 'demonstrate', 'demonstrandum', 'prove', 'proof', 'theorem'],
    text: '(Being) what it was required to demonstrate.',
    just: 'Q.E.D.',
    side: 'Q.E.D.',
    reveal: []
  }
];

const PROP_NUM = 6;
const CONCLUSION = "Congratulations! You have completed Euclid's Elements Book I, Proposition 6.";

function lev(a,b){
  const m=a.length,n=b.length;
  if(!m) return n;
  if(!n) return m;
  const dp=Array.from({length:m+1},(_,i)=>[i]);
  for(let j=1;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  return dp[m][n];
}
function hasNear(response, targets){
  const words=response.toLowerCase().split(/[\s,.;!?]+/).filter(w=>w.length>=3);
  return words.some(w=>targets.some(t=>{
    const d=t.length<=7 ? 1 : 2;
    return lev(w, String(t).toLowerCase()) <= d;
  }));
}

let step = 0;
let attempts = 0;

const diagramEl = document.getElementById('diagram');
const canvas = document.getElementById('canvas');
let pan = { tx:0, ty:0, s:1 };
const MIN_S = 0.12;
const MAX_S = 12;

function clientToVB(cx,cy){
  const r=diagramEl.getBoundingClientRect(), v=diagramEl.viewBox.baseVal;
  return { x:(cx-r.left)/r.width*v.width+v.x, y:(cy-r.top)/r.height*v.height+v.y };
}
function applyTransform(){ canvas.setAttribute('transform',`translate(${pan.tx},${pan.ty}) scale(${pan.s})`); }
function zoomAt(px,py,f){
  const ns=Math.max(MIN_S,Math.min(MAX_S,pan.s*f)), r=ns/pan.s;
  pan.tx=px-(px-pan.tx)*r;
  pan.ty=py-(py-pan.ty)*r;
  pan.s=ns;
  applyTransform();
}
function zoomCenter(f){
  const v=diagramEl.viewBox.baseVal;
  zoomAt(v.x+v.width/2,v.y+v.height/2,f);
}
function animatePan(t,ms=420){
  const from={...pan}, t0=performance.now();
  (function tick(now){
    let p=Math.min((now-t0)/ms,1);
    p=p<.5 ? 2*p*p : -1+(4-2*p)*p;
    pan.tx=from.tx+(t.tx-from.tx)*p;
    pan.ty=from.ty+(t.ty-from.ty)*p;
    pan.s=from.s+(t.s-from.s)*p;
    applyTransform();
    if(p<1) requestAnimationFrame(tick);
    else pan={...t};
  })(performance.now());
}
function resetView(){ animatePan({tx:0,ty:0,s:1}); }

diagramEl.addEventListener('wheel',e=>{
  e.preventDefault();
  const p=clientToVB(e.clientX,e.clientY);
  zoomAt(p.x,p.y,e.deltaY<0?1.12:1/1.12);
},{passive:false});

let dragging=false, lastPt=null;
diagramEl.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  dragging=true;
  lastPt=clientToVB(e.clientX,e.clientY);
  diagramEl.classList.add('panning');
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const pt=clientToVB(e.clientX,e.clientY);
  pan.tx+=pt.x-lastPt.x;
  pan.ty+=pt.y-lastPt.y;
  lastPt=pt;
  applyTransform();
});
window.addEventListener('mouseup',()=>{
  dragging=false;
  diagramEl.classList.remove('panning');
});

let lastTouches=[];
diagramEl.addEventListener('touchstart',e=>{
  lastTouches=Array.from(e.touches);
  e.preventDefault();
},{passive:false});
diagramEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  const ts=Array.from(e.touches);
  if(ts.length===1 && lastTouches.length>=1){
    const c=clientToVB(ts[0].clientX,ts[0].clientY), p=clientToVB(lastTouches[0].clientX,lastTouches[0].clientY);
    pan.tx+=c.x-p.x;
    pan.ty+=c.y-p.y;
    applyTransform();
  } else if(ts.length===2 && lastTouches.length>=2){
    const d1=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);
    const d2=Math.hypot(lastTouches[1].clientX-lastTouches[0].clientX,lastTouches[1].clientY-lastTouches[0].clientY);
    if(d2>0){
      const p=clientToVB((ts[0].clientX+ts[1].clientX)/2,(ts[0].clientY+ts[1].clientY)/2);
      zoomAt(p.x,p.y,d1/d2);
    }
  }
  lastTouches=ts;
},{passive:false});
diagramEl.addEventListener('touchend',e=>{ lastTouches=Array.from(e.touches); },{passive:false});

let resizing=false, rSide=null, rStartY=0, rStartH=0, rStartX=0, rStartW=0, rStartML=0;
const rowEl=document.getElementById('diagram-row');
function startResize(side,cx,cy){
  resizing=true;
  rSide=side;
  rStartY=cy;
  rStartX=cx;
  const r=diagramEl.getBoundingClientRect();
  rStartH=r.height;
  rStartW=r.width;
  rStartML=parseFloat(rowEl.style.marginLeft)||0;
}
['rc-l','rc-r'].forEach(id=>{
  const side=id.endsWith('-l')?'l':'r';
  document.getElementById(id).addEventListener('mousedown',e=>{
    startResize(side,e.clientX,e.clientY);
    e.preventDefault();
  });
  document.getElementById(id).addEventListener('touchstart',e=>{
    startResize(side,e.touches[0].clientX,e.touches[0].clientY);
    e.preventDefault();
  },{passive:false});
});
window.addEventListener('mousemove',e=>{ if(resizing) applyResize(e.clientX,e.clientY); });
window.addEventListener('touchmove',e=>{ if(resizing) applyResize(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
window.addEventListener('mouseup',()=>{ resizing=false; });
window.addEventListener('touchend',()=>{ resizing=false; });
function applyResize(cx,cy){
  const h=Math.max(80,Math.min(600,rStartH+cy-rStartY));
  diagramEl.style.height=h+'px';
  const dx=cx-rStartX, dw=rSide==='r'?dx:-dx;
  const w=Math.max(200,Math.min(window.innerWidth-40,rStartW+dw));
  rowEl.style.width=w+'px';
  if(rSide==='l') rowEl.style.marginLeft=(rStartML-(w-rStartW))+'px';
}

function buildPanels(){
  const side=document.getElementById('side-panel');
  const left=document.getElementById('left-panel');

  left.innerHTML = `<div class="prop-label">I.6</div>
    <div class="prop-enunc">If in a triangle two angles are equal to one another, then the sides opposite the equal angles will also be equal to one another.</div>`;

  STEPS.forEach((s,i)=>{
    if(s.side){
      const el=document.createElement('div');
      el.id=`si-${i}`;
      el.className='side-item';
      el.textContent=s.side;
      side.appendChild(el);
    }
    if(s.text){
      const el=document.createElement('div');
      el.id=`pl-${i}`;
      el.className='proof-line';
      el.appendChild(document.createTextNode(s.text));
      if(s.just){
        const sp=document.createElement('span');
        sp.className='just';
        sp.textContent=s.just;
        el.appendChild(sp);
      }
      left.appendChild(el);
    }
  });
}

function getDisplayStep(){
  const s=STEPS[step];
  if(s && s.display_linked_idx != null) return s.display_linked_idx;
  for(let i=step;i>=0;i--) if(STEPS[i] && STEPS[i].text) return i;
  return -1;
}

function setProofDisplay(idx){
  const pd=document.getElementById('proof-display');
  if(!pd) return;
  if(idx<0){ pd.classList.remove('visible'); return; }
  const s=STEPS[idx];
  if(s && s.text){
    pd.innerHTML=s.text+(s.just?`<span class="proof-just">${s.just}</span>`:'');
    pd.classList.add('visible');
  } else {
    pd.classList.remove('visible');
  }
}

function updatePanels(){
  const ds=getDisplayStep();
  STEPS.forEach((s,i)=>{
    const pl=document.getElementById(`pl-${i}`);
    if(pl){
      pl.classList.toggle('active',i===ds);
      pl.classList.toggle('past',i<ds);
    }
  });
  setProofDisplay(ds);
}

function show(id){
  const el=document.getElementById(id);
  if(el) el.classList.add('on');
}

function revealStep(s){
  if(s.reveal) s.reveal.forEach(id=>show(id));
  if(s.side){
    const el=document.getElementById(`si-${step}`);
    if(el) el.classList.add('on');
  }
}

const chatEl=document.getElementById('chat');
const textInput=document.getElementById('text-input');
const sendBtn=document.getElementById('send-btn');
const ynBar=document.getElementById('yn-bar');
const drawBar=document.getElementById('draw-bar');
const inputRow=document.getElementById('input-row');
const kbBar=document.getElementById('kb-bar');
const fakeInputEl=document.getElementById('fake-input');
const fakePlaceholder=document.getElementById('fake-placeholder');

const isMobile=()=>navigator.maxTouchPoints>0;

function addMsg(text, who){
  const d=document.createElement('div');
  d.className=who==='user' ? 'msg-user' : 'msg-bot';
  d.textContent=text;
  chatEl.appendChild(d);
  chatEl.scrollTop=chatEl.scrollHeight;
  if(who==='bot') logEvent('bot', text);
  return d;
}

function logEvent(role, message){
  fetch('/api/event',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({proposition:PROP_NUM,step,role,message})
  });
}

function updateFake(){
  const v=textInput.value;
  if(v){
    fakePlaceholder.textContent=v;
    fakePlaceholder.style.color='';
  } else {
    fakePlaceholder.textContent='Your answer…';
    fakePlaceholder.style.color='#999';
  }
}

function setMode(type){
  if(type==='done'){
    ynBar.style.display='none';
    drawBar.style.display='none';
    kbBar.style.display='none';
    inputRow.style.display='none';
    document.getElementById('dashboard-btn').style.display='';
    return;
  }
  ynBar.style.display = type==='yn' ? 'flex' : 'none';
  drawBar.style.display = type==='draw' ? 'flex' : 'none';
  kbBar.style.display = (type==='open' && isMobile()) ? 'flex' : 'none';
  if(type==='open' && isMobile()){
    document.getElementById('kb-alpha').style.display='';
    document.getElementById('kb-num').style.display='none';
    setTimeout(()=>{ chatEl.scrollTop=chatEl.scrollHeight; }, 80);
    fakeInputEl.style.display='flex';
    textInput.style.display='none';
    updateFake();
  } else {
    fakeInputEl.style.display='none';
    textInput.style.display='';
  }
  inputRow.style.display = type==='draw' ? 'none' : 'flex';
  sendBtn.disabled = type==='draw';
  textInput.disabled = type==='draw';
  if(type==='open' && !isMobile()) textInput.focus();
}

function kbTap(ch){ textInput.value+=ch; updateFake(); }
function kbBack(){ textInput.value=textInput.value.slice(0,-1); updateFake(); }
function kbEnter(){ submit(textInput.value); }
function kbToggleNum(){
  const a=document.getElementById('kb-alpha'), n=document.getElementById('kb-num');
  const toNum=a.style.display!=='none';
  a.style.display=toNum?'none':'';
  n.style.display=toNum?'':'none';
}

function advance(){
  attempts=0;
  step++;
  showStep();
}

function showStep(){
  updatePanels();
  if(step>=STEPS.length){
    addMsg(CONCLUSION,'bot');
    setMode('done');
    fetch('/api/complete',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({proposition:PROP_NUM})
    }).then(r=>{
      if(r.ok){
        addMsg('✓ Your completion has been recorded.','bot');
        const d=document.createElement('div');
        d.className='msg-bot';
        d.innerHTML='<a href="/survey?prop='+PROP_NUM+'" style="color:#7c3aed;text-decoration:underline;">Share your experience →</a>';
        chatEl.appendChild(d);
        chatEl.scrollTop=chatEl.scrollHeight;
      }
    });
    return;
  }

  const s=STEPS[step];
  if(s.type==='say'){
    revealStep(s);
    addMsg(s.q,'bot');
    setTimeout(advance,700);
    return;
  }
  if(s.type==='draw'){
    addMsg(s.q,'bot');
    setMode('draw');
    return;
  }
  addMsg(s.q,'bot');
  setMode(s.type);
}

function submit(raw){
  const answer=raw.trim();
  if(!answer) return;
  textInput.value='';
  updateFake();
  addMsg(answer,'user');
  logEvent('user',answer);
  const s=STEPS[step];

  if(s.type==='yn'){
    if(/^y/i.test(answer)){
      revealStep(s);
      advance();
    } else {
      addMsg(s.no,'bot');
      setTimeout(()=>addMsg(s.q,'bot'),600);
    }
    return;
  }

  if(s.type==='open'){
    const ok = !s.ok_regex || new RegExp(s.ok_regex,'i').test(answer) || (s.ok_targets && hasNear(answer, s.ok_targets));
    if(!ok){
      attempts++;
      if(attempts>=2 && s.hint){
        addMsg(s.hint,'bot');
        if(s.hint_linked_idx!=null) setProofDisplay(s.hint_linked_idx);
      } else {
        addMsg('Not quite — try again.','bot');
      }
      if(attempts>=3){
        revealStep(s);
        setTimeout(advance,800);
      }
      return;
    }
    revealStep(s);
    advance();
  }
}

sendBtn.addEventListener('click',()=>submit(textInput.value));
textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(textInput.value); });
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && drawBar.style.display==='flex' && e.target!==textInput){
    e.preventDefault();
    document.getElementById('btn-draw').click();
  }
});
document.getElementById('btn-yes').addEventListener('click',()=>{
  addMsg('Yes','user');
  logEvent('user','Yes');
  const s=STEPS[step];
  revealStep(s);
  advance();
});
document.getElementById('btn-no').addEventListener('click',()=>{
  addMsg('No','user');
  logEvent('user','No');
  addMsg(STEPS[step].no,'bot');
  setTimeout(()=>addMsg(STEPS[step].q,'bot'),600);
});
document.getElementById('btn-draw').addEventListener('click',()=>{
  addMsg('Yes / Draw','user');
  logEvent('user','[drew]');
  const s=STEPS[step];
  revealStep(s);
  advance();
});

buildPanels();
show('dc-given');
showStep();
</script>
