<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.32 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.32 - Prove that if a tangent touches a circle and a chord is drawn from the point of contact, then the angles with the tangent equal the angles in the opposite segment</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.32 chatbot!

We are given a circle ABCD, a tangent EF touching at point B, and a chord BD drawn from B across the circle. Do you agree? (yes/no):`,
    hint: `The setup is: circle ABCD, tangent EF at B, and chord BD cutting the circle.` },
  { q: `Next, draw line BA from B at right angles to tangent EF. Can we do this? (yes/no):`,
    hint: `From a point a perpendicular to a given line can be constructed.` },
  { q: `Take a point C on the circumference BD, and join AD, DC, CB. Acceptable? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Our goal is to prove that ∠FBD equals the angle in segment BAD, and ∠EBD equals the angle in segment DCB. Does that make sense? (yes/no):`,
    hint: `These are the “alternate segment” angles mentioned in the proposition.` },
  { q: `Since EF touches circle ABCD at B, and BA is drawn at right angles to EF, do you agree that the center of the circle is on BA? (yes/no):`,
    hint: `Proposition III.19: the line from the point of contact perpendicular to the tangent passes through the center.` },
  { q: `Therefore, is BA a diameter of the circle? (yes/no):`,
    hint: `The line through the center passing through the point of contact is a diameter.` },
  { q: `If BA is a diameter, is ∠ADB a right angle? (yes/no):`,
    hint: `Proposition III.31: an angle in a semicircle is a right angle.` },
  { q: `If ∠ADB is a right angle, are the two remaining angles ∠BAD and ∠ABD together equal to a right angle? (yes/no):`,
    hint: `Triangle ∠ sum = two right angles (I.32); subtract the right angle at D.` },
  { q: `But ∠ABF is also a right angle. True? (yes/no):`,
    hint: `BA was drawn perpendicular to the tangent EF.` },
  { q: `So, is ∠ABF equal to (∠BAD + ∠ABD)? (yes/no):`,
    hint: `Both equal one right angle.` },
  { q: `Now subtract ∠ABD from both sides: is the remaining angle ∠DBF equal to ∠BAD? (yes/no):`,
    hint: `Common Notion 3: subtract equals from equals, remainders are equal.` },
  { q: `Thus ∠FBD = ∠BAD, showing ∠FBD equals the angle in alternate segment BAD. Clear? (yes/no):`,
    hint: `This completes the first part (alternate segment theorem).` },
  { q: `Next, since quadrilateral ABCD lies in a circle, do its opposite angles equal two right angles? (yes/no):`,
    hint: `Proposition III.22: opposite angles of a cyclic quadrilateral sum to two right angles.` },
  { q: `Are angles ∠DBF and ∠DBE also equal to two right angles? (yes/no):`,
    hint: `They form a straight angle through B along the tangent.` },
  { q: `Therefore, are ∠DBF + ∠DBE = ∠BAD + ∠BCD? (yes/no):`,
    hint: `Both pairs sum to two right angles.` },
  { q: `Since ∠DBF = ∠BAD (already proved), does it follow that ∠DBE = ∠DCB? (yes/no):`,
    hint: `Subtract equals from equals; the remainders are equal (Common Notion 3).` },
  { q: `So, have we shown that ∠EBD equals the angle in the alternate segment DCB? (yes/no):`,
    hint: `Yes, this proves the second part.` },
  { q: `Therefore, the angles which the chord makes with the tangent are equal to the angles in the alternate segments. Q.E.D.`,
    hint: `Final conclusion: the Alternate Segment Theorem is established.` }
];

const conclusion = `Congratulations! You just proved that the angles which the chord makes with the tangent are equal to the angles in the alternate segments of the circle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
