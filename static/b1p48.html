<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.48 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.48 – Prove that if in a triangle the square on one side equals the squares on the other two, then the angle opposite is right</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.48 chatbot!

We are given a triangle ABC where the square on side BC equals the sum of the squares on BA and AC. Do you agree? (yes/no):`,
    hint: `This is the hypothesis — BC^2 = AB^2 + AC^2.` },
  { q: `Our goal is to prove that the angle at A, ∠BAC, is a right angle. Does that make sense? (yes/no):`,
    hint: `We want the converse of Pythagoras: if the square relation holds, the contained angle is right.` },
  { q: `Let us draw from point A a line AD at right angles to AC. Possible? (yes/no):`,
    hint: `By Postulate 11, a perpendicular can be erected from a point to a line.` },
  { q: `Can we make AD equal in length to AB? (yes/no):`,
    hint: `Using Proposition I.3, we can cut off a line equal to a given one.` },
  { q: `Now, join DC. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows drawing a straight line from any point to any point.` },
  { q: `Since DA = AB, is the square on DA equal to the square on AB? (yes/no):`,
    hint: `Equal straight lines have equal squares.` },
  { q: `If we add the square on AC to both, do we get that the squares on DA and AC equal the squares on BA and AC? (yes/no):`,
    hint: `Adding equals to equals yields equals (Common Notion 2).` },
  { q: `But is the square on DC equal to the sum of the squares on DA and AC, since ∠DAC is right? (yes/no):`,
    hint: `By Proposition I.47 (Pythagoras), in a right triangle the square on the hypotenuse equals the sum on the legs.` },
  { q: `And by hypothesis, is the square on BC equal to the sum of the squares on BA and AC? (yes/no):`,
    hint: `This is given at the start.` },
  { q: `Therefore, is the square on DC equal to the square on BC? (yes/no):`,
    hint: `Both equal the same sum of squares.` },
  { q: `If the squares are equal, are the sides DC and BC equal? (yes/no):`,
    hint: `In plane geometry, equal squares imply equal sides.` },
  { q: `Now since DA = AB, and AC is common, do triangles DAC and BAC have two sides equal respectively, with base DC = BC? (yes/no):`,
    hint: `This sets up equality of triangles (Proposition I.8).` },
  { q: `Therefore, is ∠DAC equal to ∠BAC? (yes/no):`,
    hint: `If two triangles have all three sides equal, their angles are equal as well.` },
  { q: `But ∠DAC was constructed as a right angle. So, is ∠BAC also a right angle? (yes/no):`,
    hint: `Equal angles; one is right, so the other must be right too.` }
];

const conclusion = `Congratulations! You have shown that the angle at A is a right angle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
