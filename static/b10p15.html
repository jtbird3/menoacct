<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.15</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.15 – Prove that the sum of two commensurable magnitudes is commensurable with each of them; and that if the sum is commensurable with one of them, the original magnitudes are commensurable.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.15 chatbot!

We are given two magnitudes AB and BC, and they are commensurable. Do you agree? (yes/no):`,
hint: `Commensurable magnitudes are those measured by some common magnitude.` },
{ q: `Our goal is to show that the whole AC is commensurable with each of AB and BC. Does that make sense? (yes/no):`,
hint: `AC is the sum of AB and BC.` },
{ q: `Since AB and BC are commensurable, does some magnitude measure them both? (yes/no):`,
hint: `This follows directly from the definition of commensurable magnitudes.` },
{ q: `Let this common measuring magnitude be called D. Is that acceptable? (yes/no):`,
hint: `We name the magnitude that measures both AB and BC.` },
{ q: `Since D measures AB and BC, does it also measure their sum AC? (yes/no):`,
hint: `A magnitude that measures two parts also measures their whole.` },
{ q: `Does D therefore measure AB, BC, and AC? (yes/no):`,
hint: `We have already established that D measures each of them.` },
{ q: `If a single magnitude measures AC and AB, is AC commensurable with AB? (yes/no):`,
hint: `Refer to Definition X.1.` },
{ q: `Similarly, is AC commensurable with BC? (yes/no):`,
hint: `The same measuring magnitude D applies.` },
{ q: `Therefore, is the whole AC commensurable with each of the magnitudes AB and BC? (yes/no):`,
hint: `This completes the first part of the proposition.` },

{ q: `Now let the whole AC be commensurable with AB. Do you agree? (yes/no):`,
hint: `This is the new assumption for the second part.` },
{ q: `Our goal is to show that AB and BC are commensurable. Does that make sense? (yes/no):`,
hint: `We want a common measure for the original parts.` },
{ q: `Since AC and AB are commensurable, does some magnitude measure them both? (yes/no):`,
hint: `Again, this follows from Definition X.1.` },
{ q: `Let this measuring magnitude be called D. Is that acceptable? (yes/no):`,
hint: `We name the common measure.` },
{ q: `Since D measures AC and AB, does it also measure the remainder BC? (yes/no):`,
hint: `If a magnitude measures a whole and one part, it measures the remainder.` },
{ q: `Does D therefore measure both AB and BC? (yes/no):`,
hint: `We have shown D measures each separately.` },
{ q: `If one magnitude measures both AB and BC, are AB and BC commensurable? (yes/no):`,
hint: `This is exactly Definition X.1.` }
]





const conclusion = `Congratulations! You just proved that the sum of two commensurable magnitudes is commensurable with each of them; and that if the sum is commensurable with one of them, the original magnitudes are commensurable.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
