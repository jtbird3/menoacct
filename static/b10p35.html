<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.35</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.35 - Find two straight lines incommensurable in square such that the sum of the squares on them is medial, the rectangle contained by them is medial, and is moreover incommensurable with the sum of the squares.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.35 chatbot!

We are given two medial straight lines AB and BC, commensurable in square only, which contain a medial rectangle. Do you agree? (yes/no):`,
hint: `This is the initial hypothesis: AB and BC are medial and commensurable only in square.` },
{ q: `We are also given that the square on AB exceeds the square on BC by the square on a straight line incommensurable with AB. Is that correct? (yes/no):`,
hint: `This condition comes from Proposition X.32 (at the end).` },
{ q: `Our goal is to find two straight lines incommensurable in square whose sum of squares is medial, whose rectangle is medial, and whose rectangle is incommensurable with the sum of the squares. Does that make sense? (yes/no):`,
hint: `This restates exactly what the proposition asks us to find.` },
{ q: `Let the semicircle ADB be described on AB, with the remaining construction carried out as in the earlier proposition. Can this be done? (yes/no):`,
hint: `This refers to the standard semicircle construction used previously in Book X.` },

{ q: `Since AF is incommensurable in length with FB, does it follow that AD is incommensurable in square with DB? (yes/no):`,
hint: `By X.18 and X.11, the incommensurability in the constructed parts yields incommensurability in square for AD and DB.` },
{ q: `Since the square on AB is medial, is the sum of the squares on AD and DB also medial? (yes/no):`,
hint: `By I.47 the squares on AD and DB together equal the square on AB, and a sum equal to a medial area is medial.` },

{ q: `Is the rectangle AF, FB equal to the square on each of the straight lines BE and DF? (yes/no):`,
hint: `This comes from the earlier deficient-parallelogram construction.` },
{ q: `From this, is BE equal to DF? (yes/no):`,
hint: `Equal squares imply equal straight lines.` },
{ q: `If BE equals DF, is BC double of FD? (yes/no):`,
hint: `E is the midpoint of BC, so BE is half of BC; hence if BE = DF then BC = 2·DF.` },
{ q: `Does it follow that the rectangle AB, BC is double the rectangle AB, FD? (yes/no):`,
hint: `With AB fixed, doubling the other side doubles the rectangle.` },
{ q: `Since the rectangle AB, BC is medial, is the rectangle AB, FD also medial? (yes/no):`,
hint: `A half of a medial area is medial (corollary used in this context).` },

{ q: `Is the rectangle AB, FD equal to the rectangle AD, DB? (yes/no):`,
hint: `This follows from the lemma on a line cut so that a deficient parallelogram is applied: the applied parallelogram equals the rectangle under the segments.` },
{ q: `Therefore, is the rectangle AD, DB also medial? (yes/no):`,
hint: `Equals of medial magnitudes are medial.` },

{ q: `Since AB is incommensurable in length with BC, and BC is commensurable with BE, is AB also incommensurable in length with BE? (yes/no):`,
hint: `By X.13, if a line is incommensurable with a whole, it is incommensurable with a commensurable part of that whole.` },
{ q: `Does it follow that the square on AB is incommensurable with the rectangle AB, BE? (yes/no):`,
hint: `By X.11 together with the lemma relating ratios of a side to a rectangle on it, incommensurability of AB and BE yields incommensurability of these areas.` },

{ q: `Are the squares on AD and DB together equal to the square on AB? (yes/no):`,
hint: `By I.47, the sum of the squares on AD and DB equals the square on AB.` },
{ q: `Is the rectangle AD, DB equal to the rectangle AB, BE? (yes/no):`,
hint: `Rectangle AD, DB equals rectangle AB, FD, and AB, FD is half of AB, BC; with BE = DF this gives AB, FD = AB, BE.` },
{ q: `Therefore, is the sum of the squares on AD and DB incommensurable with the rectangle AD, DB? (yes/no):`,
hint: `The sum of squares equals square on AB, the rectangle equals rectangle AB, BE, and those two are incommensurable; hence their equals are incommensurable.` },

{ q: `Have we therefore found two straight lines AD and DB incommensurable in square, whose sum of squares is medial, whose rectangle is medial, and which is incommensurable with the sum of the squares? (yes/no):`,
hint: `AD and DB are incommensurable in square, their squares sum to the medial square on AB, their rectangle is medial, and it is incommensurable with that sum—exactly as required.` }

]





const conclusion = `Congratulations! You just found two straight lines incommensurable in square such that the sum of the squares on them is medial, the rectangle contained by them is medial, and is moreover incommensurable with the sum of the squares.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
