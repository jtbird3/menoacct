<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.61</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.61 – Prove that if the square on the first bimedial straight line is applied to a rational straight line, the breadth produced is the second binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.61 chatbot!

We are given a first bimedial straight line AB, divided at C into its medials, with AC the greater. Do you agree? (yes/no):`, hint: `A first bimedial is divided into two medial straight lines commensurable in square only.` },

{ q: `We are also given a rational straight line DE. Is that correct? (yes/no):`, hint: `DE is assumed rational by the proposition.` },

{ q: `A parallelogram DF equal to the square on AB is applied to DE, producing DG as its breadth. Do you see this construction? (yes/no):`, hint: `This is an application of a square to a straight line, producing a breadth.` },

{ q: `Our goal is to prove that DG is a second binomial straight line. Does that make sense? (yes/no):`, hint: `We must show DG satisfies the definition of a second binomial.` },

{ q: `Since AB is a first bimedial divided at C, are AC and CB medial straight lines commensurable in square only? (yes/no):`, hint: `This follows from Proposition X.37.` },
{ q: `Do AC and CB contain a rational rectangle? (yes/no):`, hint: `This is part of the definition of a first bimedial.` },

{ q: `Are the squares on AC and CB therefore medial? (yes/no):`, hint: `By Proposition X.21, squares on medial straight lines are medial.` },
{ q: `From this, is DL medial? (yes/no):`, hint: `This follows from Propositions X.15 and X.23 (Porism).` },

{ q: `Since DL is applied to the rational straight line DE, is MD rational and incommensurable in length with DE? (yes/no):`, hint: `By Proposition X.22.` },

{ q: `Since twice the rectangle AC, CB is rational, is MF also rational? (yes/no):`, hint: `Rational rectangles produce rational straight lines.` },
{ q: `And since MF is applied to the rational straight line ML, is MG rational and commensurable in length with ML, that is, with DE? (yes/no):`, hint: `By Proposition X.20.` },

{ q: `Therefore, is DM incommensurable in length with MG? (yes/no):`, hint: `By Proposition X.13.` },
{ q: `Are DM and MG both rational straight lines? (yes/no):`, hint: `This has been established from earlier steps.` },

{ q: `Since they are rational and commensurable in square only, is DG a binomial straight line? (yes/no):`, hint: `This follows from Proposition X.36.` },

{ q: `Next, must we show that DG is specifically a second binomial? (yes/no):`, hint: `A binomial must also be classified by type.` },

{ q: `Since the squares on AC and CB are greater than twice the rectangle AC, CB, is DL greater than MF? (yes/no):`, hint: `By Proposition VI.1.` },
{ q: `Does this imply that DM is greater than MG? (yes/no):`, hint: `The inequality carries over to the resulting segments.` },

{ q: `Since the square on AC is commensurable with the square on CB, is DH commensurable with KL? (yes/no):`, hint: `By Propositions VI.1 and X.11.` },
{ q: `Therefore, is DK commensurable with KM? (yes/no):`, hint: `Corresponding segments inherit commensurability.` },

{ q: `Is the rectangle DK, KM equal to the square on MN? (yes/no):`, hint: `This follows from the applied construction.` },
{ q: `Does it follow that the square on DM exceeds the square on MG by the square on a straight line commensurable with DM? (yes/no):`, hint: `By Proposition X.17.` },

{ q: `Is MG commensurable in length with DE? (yes/no):`, hint: `This was already established earlier.` },
{ q: `Therefore, does DG satisfy the definition of a second binomial straight line? (yes/no):`, hint: `See Definition X, II.2.` },
]

const conclusion = `Congratulations! You just proved that if the square on the first bimedial straight line is applied to a rational straight line, the breadth produced is the second binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
