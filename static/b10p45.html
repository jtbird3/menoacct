<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.45</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.45 – Prove that a major straight line is divided at one and the same point only.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.45 chatbot!

We are given a major straight line AB, divided at point C. Do you agree? (yes/no):`,
    hint: `AB is assumed to be a major straight line, with a division point C.` },
    { q: `The segments AC and CB are incommensurable in square. Is that given? (yes/no):`,
    hint: `This is part of the definition of the division at C.` },
    { q: `Do the squares on AC and CB together make a rational area? (yes/no):`,
    hint: `The sum of the squares on AC and CB is stated to be rational.` },
    { q: `Is the rectangle contained by AC and CB medial? (yes/no):`,
    hint: `This also follows from the given conditions at C.` },
    
    { q: `Our goal is to show that AB cannot also be divided at another point in the same way. Does that make sense? (yes/no):`,
    hint: `We aim to prove uniqueness of the division point.` },
    
    { q: `Suppose, for the sake of argument, that AB is also divided at another point D. Is this assumption clear? (yes/no):`,
    hint: `This is a proof by contradiction.` },
    { q: `Are the segments AD and DB also incommensurable in square? (yes/no):`,
    hint: `This is assumed in the contradictory hypothesis.` },
    { q: `Do the squares on AD and DB together make a rational area? (yes/no):`,
    hint: `This mirrors the condition at point C.` },
    { q: `Is the rectangle contained by AD and DB also medial? (yes/no):`,
    hint: `Again, this matches the assumed properties of the second division.` },
    
    { q: `Now, is it true that the difference between the squares on AC, CB and the squares on AD, DB is the same as the difference between twice the rectangle AD, DB and twice the rectangle AC, CB? (yes/no):`,
    hint: `Both decompositions give the same square on AB via II.4, so subtracting yields equality of the remainders.` },
    { q: `Do the squares on AC, CB exceed the squares on AD, DB by a rational area? (yes/no):`,
    hint: `Each sum of squares is rational, so their difference is rational.` },
    { q: `Therefore, does twice the rectangle AD, DB exceed twice the rectangle AC, CB by a rational area? (yes/no):`,
    hint: `Equal differences transfer the same “kind” of excess.` },
    
    { q: `But are both rectangles AC·CB and AD·DB medial? (yes/no):`,
    hint: `This was assumed for both divisions.` },
    { q: `Is it impossible for one medial rectangle to exceed another medial rectangle by a rational area? (yes/no):`,
    hint: `This contradicts Proposition X.26.` },
    
    { q: `Since this leads to an impossibility, must our assumption be false? (yes/no):`,
    hint: `Contradictions invalidate the original assumption.` },
    { q: `Therefore, can AB be divided at two different points in this same manner? (yes/no):`,
    hint: `The contradiction shows it cannot.` },
    { q: `Hence, is a major straight line divided at one and the same point only? (yes/no):`,
    hint: `This restates the proposition.` }
]

const conclusion = `Congratulations! You just proved that a major straight line is divided at one and the same point only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
