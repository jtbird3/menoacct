<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.14</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.14 – Prove that planes to which the same straight line is at right angles are parallel to one another.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.14 chatbot!

We are given two planes, CD and EF, and a straight line AB. Do you agree? (yes/no):`,
    hint: `The proposition begins by assuming two planes and one straight line.` },

  { q: `The straight line AB is at right angles to plane CD. Do you agree? (yes/no):`,
    hint: `“At right angles to a plane” means AB is perpendicular to every straight line in that plane through the point of intersection.` },

  { q: `The straight line AB is also at right angles to plane EF. Do you agree? (yes/no):`,
    hint: `This is stated directly in the given text.` },

  { q: `Our goal is to show that the planes CD and EF are parallel. Does that make sense? (yes/no):`,
    hint: `Parallel planes do not meet even when produced.` },

  { q: `Suppose, for the sake of argument, that the planes CD and EF are not parallel. Is that allowed? (yes/no):`,
    hint: `Euclid often proves by assuming the opposite and deriving an impossibility.` },

  { q: `If the planes are not parallel, will they meet when produced? (yes/no):`,
    hint: `This follows from the definition of parallel planes (XI. Def. 8).` },

  { q: `When the planes meet, do they have a common section which is a straight line? (yes/no):`,
    hint: `By Proposition XI.3, the intersection of two planes is a straight line.` },

  { q: `Let this common section be called GH. Is that acceptable? (yes/no):`,
    hint: `We may name the line of intersection.` },

  { q: `Take a point K at random on the straight line GH. Can we do this? (yes/no):`,
    hint: `Any point may be chosen on a straight line.` },

  { q: `Join the points A to K and B to K by straight lines. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Since AB is at right angles to plane EF, is AB also at right angles to BK, which lies in plane EF? (yes/no):`,
    hint: `By Definition XI.3, a line perpendicular to a plane is perpendicular to every line in that plane through the point of intersection.` },

  { q: `Is angle ABK therefore a right angle? (yes/no):`,
    hint: `AB ⟂ BK implies ∠ABK is right.` },

  { q: `For the same reason, since AB is at right angles to plane CD, is AB also at right angles to AK? (yes/no):`,
    hint: `AK lies in plane CD through the point K.` },

  { q: `Is angle BAK therefore a right angle? (yes/no):`,
    hint: `AB ⟂ AK implies ∠BAK is right.` },

  { q: `Now consider triangle ABK. Does it have two angles equal to two right angles? (yes/no):`,
    hint: `Both ∠ABK and ∠BAK are right angles.` },

  { q: `Is it impossible for a triangle to have two angles equal to two right angles? (yes/no):`,
    hint: `This contradicts Proposition I.17.` },

  { q: `Since this leads to an impossibility, must our assumption that the planes meet be false? (yes/no):`,
    hint: `A false conclusion means the assumption was wrong.` },

  { q: `Therefore, do the planes CD and EF fail to meet when produced? (yes/no):`,
    hint: `This is the negation of the assumption.` },

  { q: `If two planes do not meet when produced, are they parallel? (yes/no):`,
    hint: `This follows from Definition XI.8.` },

  { q: `Therefore, are the planes CD and EF parallel? (yes/no):`,
    hint: `This completes the argument.` }
]

const conclusion = `Congratulations! You just planes to which the same straight line is at right angles are parallel to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
