<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.4 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.4 — Triangles with two sides and the included angle equal are congruent (SAS)</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.4 chatbot!

We are given two triangles ABC and DEF. Side AB = DE and side AC = DF. The included angles, ∠A and ∠D, are also equal. Do you agree? (yes/no):`,
    hint: `Think of ΔABC and ΔDEF as candidates for congruence.` },
  { q: `Our goal is to show that triangle ABC is congruent to triangle DEF. Does that make sense? (yes/no):`,
    hint: `Congruent means sides and angles match up one-to-one.` },
  { q: `Let's place point A onto point D. Reasonable? (yes/no):`,
    hint: `We can mentally move (superpose) one figure onto another for a proof by fit.` },
  { q: `With AB = DE, can we align side AB onto DE so that B lands along DE? (yes/no):`,
    hint: `Because lengths are equal, the endpoint B can coincide with E.` },
  { q: `If ∠A = ∠D and AC = DF, can we align AC onto DF so that C lands along DF? (yes/no):`,
    hint: `Equal included angles ensure the arms lie along each other; equal lengths match endpoints.` },
  { q: `Under this fit, do B and E coincide and C and F coincide? (yes/no):`,
    hint: `Equal side pairs from the same vertex with equal included angle force the endpoints to meet.` },
  { q: `If B coincides with E and C coincides with F, are the bases BC and EF equal? (yes/no):`,
    hint: `Corresponding endpoints matched imply BC = EF.` },
  { q: `Do the triangles ABC and DEF coincide in all parts (are they congruent)? (yes/no):`,
    hint: `Side, included angle, and side matching yields full coincidence (SAS).` },
  { q: `Therefore, are the remaining corresponding angles equal: ∠ABC equals ∠DEF and ∠ACB equals ∠DFE? (yes/no):`,
    hint: `Matching vertices imply remaining angles are equal as well.` }
];

const conclusion = `Therefore, from AB equals DE, AC equals DF, and ∠A equals ∠D, it follows that BC equals EF, ΔABC is congruent to ΔDEF, and the remaining angles are equal respectively. Congratulations, you just proved SAS congruence!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
