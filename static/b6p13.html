<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.13 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.13 - Find a mean proportional between two given straight lines</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.13 chatbot!

We are given two straight lines, AB and BC. Do you agree? (yes/no):`,
    hint: `These are the two given magnitudes between which we want to find a mean proportional.` },
  { q: `Our goal is to find one straight line which is a mean proportional between AB and BC. Does that make sense? (yes/no):`,
    hint: `A mean proportional x between AB and BC satisfies AB:x = x:BC.` },
  { q: `Let the two lines AB and BC be placed end to end in a straight line, forming AC. Can we do that? (yes/no):`,
    hint: `By Postulate 2, a straight line can be produced continuously in a straight line.` },
  { q: `Now, describe a semicircle on AC as diameter, calling it ADC. Is this possible? (yes/no):`,
    hint: `Postulate 3 allows a circle (or part of it) to be drawn with any center and radius. A semicircle on AC means the diameter is AC.` },
  { q: `From point B, draw BD at right angles to AC, meeting the semicircle. Can we do that? (yes/no):`,
    hint: `Proposition I.11 shows how to draw a straight line from a point to make a right angle with a given straight line.` },
  { q: `Join AD and DC. Can we draw these lines? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Since the angle ADC is an angle in a semicircle, is it a right angle? (yes/no):`,
    hint: `By Proposition III.31, the angle in a semicircle is always a right angle.` },
  { q: `In the right-angled triangle ADC, BD is drawn from the right angle perpendicular to the base AC. Do you see that? (yes/no):`,
    hint: `BD meets AC at right angles, and D is the vertex of the right angle in ΔADC.` },
  { q: `By Proposition VI.8, in a right-angled triangle, when a perpendicular is drawn from the right angle to the base, that perpendicular is a mean proportional between the segments of the base. Do you agree? (yes/no):`,
    hint: `Proposition VI.8 (Porism) states that the perpendicular from the right angle divides the base so that it is the mean proportional between its segments.` },
  { q: `Therefore, is BD the mean proportional between AB and BC such that AB:BD = BD:BC? (yes/no):`,
    hint: `Since BD² = AB x BC, BD is the mean proportional between AB and BC.` }
];

const conclusion = `Congratulations! You have completed the proposition. Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
