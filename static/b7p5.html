<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.5 - Prove that if two numbers are the same part of two other numbers, then their sum is the same part of the sum</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.5 chatbot!

We are given that A is a part of BC, and D is the same part of EF that A is of BC. Do you agree? (yes/no):`,
hint: `“A is a part of BC” means BC contains an exact number of copies of A; similarly EF contains the same number of copies of D.` },
{ q: `Our goal is to show that the sum A + D is the same part of the sum BC + EF that A is of BC. Does that make sense? (yes/no):`,
hint: `We want the ratio (A + D) : (BC + EF) to match A : BC.` },
{ q: `Since A is a part of BC, can we divide BC into some whole number of segments each equal to A? (yes/no):`,
hint: `Being a part means BC can be split into repeated units equal to A.` },
{ q: `Since D is the same part of EF, can we divide EF into the same number of segments each equal to D? (yes/no):`,
hint: `EF contains repeated copies of D in the same count as BC contains copies of A.` },
{ q: `Let us call the segments of BC equal to A by the names BG, GC. Acceptable? (yes/no):`,
hint: `We name the repeated units to keep track of them.` },
{ q: `And let us call the segments of EF equal to D by the names EH, HF. Acceptable? (yes/no):`,
hint: `Again, naming the copies helps us match them.` },
{ q: `Is the number of segments BG, GC equal to the number of segments EH, HF? (yes/no):`,
hint: `Both BC and EF were divided into the same number of equal parts.` },
{ q: `Since BG = A and EH = D, do BG and EH together correspond to A and D? (yes/no):`,
hint: `Each is one of the repeated units equal to A and D respectively.` },
{ q: `Similarly, since GC = A and HF = D, do GC and HF correspond to A and D? (yes/no):`,
hint: `They are the next pair in the equal sets.` },
{ q: `If BC contains as many A’s as EF contains D’s, does BC + EF contain that same number of pairs each equal to A, D? (yes/no):`,
hint: `Pair each A - segment from BC with a D - segment from EF.` },
{ q: `If BC is a certain multiple of A, is BC + EF the same multiple of A + D? (yes/no):`,
hint: `Every A in BC has a corresponding D in EF, making equal pairs.` },
{ q: `If BC is some multiple of A, does that imply A is the same part of BC that A + D is of BC + EF? (yes/no):`,
hint: `A : BC equals (A + D) : (BC + EF) because the multiples match.` },
{ q: `Therefore, have we shown that the sum A, D is the same part of the sum BC, EF that A is of BC? (yes/no):`,
hint: `The relation of parts is preserved when both numbers are increased by equal multiples.` },









];

const conclusion = `Congratulations! You just proved that if two numbers are the same part of two other numbers, then their sum is the same part of the sum.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
