<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.105</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.105 – Prove that a straight line commensurable in length with a minor straight line is itself minor.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.105 chatbot!

We are given a minor straight line AB, and a straight line CD commensurable with AB. Do you agree? (yes/no)`,
  hint: `A minor straight line is one whose defining square/rectangle relations fit the “minor” classification in Book X; and “commensurable” means having a common measure.` },

{ q: `Our goal is to show that CD is also minor. Does that make sense? (yes/no)`,
  hint: `We want to prove that CD has the same defining “minor” properties as AB.` },

{ q: `Let us make the same construction as before. Can we do that? (yes/no)`,
  hint: `As in Euclid Book X, we divide AB and CD into corresponding parts AE+EB and CF+FD so that their ratios can be compared.` },

{ q: `Since AE and EB are incommensurable in square, do CF and FD also become incommensurable in square? (yes/no)`,
  hint: `By X.13, incommensurability in square is preserved under corresponding commensurable constructions.` },

{ q: `Now, as AE is to EB, so is CF to FD. Do you see that? (yes/no)`,
  hint: `By V.12 (and the proportional setup), corresponding parts preserve the same ratio.` },

{ q: `Therefore, as the square on AE is to the square on EB, so is the square on CF to the square on FD. Is that correct? (yes/no)`,
  hint: `By VI.22, ratios of squares correspond to the ratios of the straight lines.` },

{ q: `Componendo: as the sum of the squares on AE and EB is to the square on EB, so is the sum of the squares on CF and FD to the square on FD. Do you follow? (yes/no)`,
  hint: `By V.18 (componendo), we may add antecedent and consequent in the ratio appropriately.` },

{ q: `But the square on BE is commensurable with the square on DF. Therefore, is the sum of the squares on CF and FD also commensurable with the sum on AE and EB? (yes/no)`,
  hint: `Using X.11 together with proportionality, commensurability transfers to the corresponding sums.` },

{ q: `Since the sum of the squares on AE and EB is rational, is the sum of the squares on CF and FD also rational? (yes/no)`,
  hint: `Equals/commensurables of rational areas are rational (Book X, rationality transfer).` },

{ q: `Again, as the square on AE is to the rectangle AE·EB, so is the square on CF to the rectangle CF·FD. Do you see that? (yes/no)`,
  hint: `Ratios between corresponding squares and rectangles are preserved under the same proportional construction.` },

{ q: `While the square on AE is commensurable with the square on CF, is the rectangle AE·EB also commensurable with the rectangle CF·FD? (yes/no)`,
  hint: `Commensurability and proportionality of corresponding magnitudes transfer commensurability to the rectangles.` },

{ q: `But the rectangle AE·EB is medial. Therefore, is CF·FD also medial? (yes/no)`,
  hint: `By X.23-type transfer, equals/commensurables of medials are medial.` },

{ q: `Therefore, are CF and FD straight lines incommensurable in square, whose sum of squares is rational, and whose contained rectangle is medial? (yes/no)`,
  hint: `These are exactly the defining conditions of a minor straight line.` },

{ q: `Therefore, can we conclude that CD is minor? (yes/no)`,
  hint: `CD inherits the defining “minor” properties from AB through the commensurable proportional construction. Q.E.D.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with a minor straight line is itself minor.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
