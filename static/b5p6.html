<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.6 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.6 - If equal multiples have equal multiples subtracted, the remainders are also equal or in the same multiple ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.6 chatbot!

We are given two magnitudes AB and CD, which are equimultiples of two others E and F. Do you agree? (yes/no):`,
    hint: `To say AB and CD are equimultiples of E and F means each contains the same number of copies of E or F, respectively.` },
  { q: `We also have subtracted from them AG and CH, which are equimultiples of those same magnitudes E and F. Is that understood? (yes/no):`,
    hint: `AG and CH are taken away, each consisting of the same number of copies of E and F, respectively.` },
  { q: `Our goal is to show that the remaining parts GB and HD are either equal to E and F or equimultiples of them. Does that make sense? (yes/no):`,
    hint: `GB = AB - AG and HD = CD - CH; we must show GB, HD match E, F in equality or as common multiples.` },
  { q: `First, let us suppose that GB is equal to E. Can we make that assumption for the first case? (yes/no):`,
    hint: `We prove the equality case first, then the general multiple case.` },
  { q: `We say that HD must then be equal to F. Does that follow? (yes/no):`,
    hint: `Our task is now to deduce HD = F from GB = E.` },
  { q: `Let CK be made equal to F. Possible? (yes/no):`,
    hint: `Choose a segment CK on CD extension such that CK = F for comparison.` },
  { q: `Since AG is the same multiple of E that CH is of F, and GB = E and KC = F, can we say that AB is the same multiple of E that KH is of F? (yes/no):`,
    hint: `AB = AG + GB and KH = CH + CK; add equal multiples and equals to obtain equal multiples (V.1).` },
  { q: `But AB is also the same multiple of E that CD is of F, is it not? (yes/no):`,
    hint: `From the hypothesis, AB and CD are equimultiples of E and F.` },
  { q: `Then KH and CD must be the same multiple of F. Do you agree? (yes/no):`,
    hint: `Since AB matches both KH and CD as the same multiple of E/F, KH and CD are the same multiple of F.` },
  { q: `Since each of KH and CD is the same multiple of F, can we conclude KH = CD? (yes/no):`,
    hint: `Magnitudes that are the same multiple of the same magnitude are equal.` },
  { q: `Subtract CH from both KH and CD. Do we then have KC = HD? (yes/no):`,
    hint: `Subtract equals from equals to get equal remainders (Common Notion 3).` },
  { q: `But KC was made equal to F. Therefore, is HD also equal to F? (yes/no):`,
    hint: `Since KC = F and KC = HD, it follows HD = F.` },
  { q: `Hence, if GB = E, then HD = F. Agreed? (yes/no):`,
    hint: `This completes the equality case.` },
  { q: `Similarly, if GB is not merely equal to E but a multiple of E, would HD also be the same multiple of F? (yes/no):`,
    hint: `Repeat the argument replacing single copies by the same number of copies; the multiple relation is preserved.` }
];

const conclusion = `Congratulations! You just proved that if equal multiples have equal multiples subtracted, the remainders are also equal or in the same multiple ratio.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
