<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.31</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.31 — Prove that if an odd number is prime to a number, it is also prime to its double</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.31 chatbot!

We are given an odd number A and a number B, and A is prime to B. Do you agree? (yes/no):`,
    hint: `“Prime to” means they have no common measure except 1.` },

  { q: `Let C be double of B. Do you agree that we also have C equal to double B? (yes/no):`,
    hint: `“Double” means twice the given number.` },

  { q: `Our goal is to show that A is prime to C. Does that make sense? (yes/no):`,
    hint: `We want to show A and C have no common measure.` },

  { q: `Suppose, for the sake of argument, that A and C are not prime to one another. Is this a reasonable assumption for a proof by contradiction? (yes/no):`,
    hint: `We assume the opposite of what we want to prove.` },

  { q: `If A and C are not prime to one another, does there exist some number that measures both? (yes/no):`,
    hint: `If two numbers are not prime to one another, they share a common measure.` },

  { q: `Let D be a number that measures both A and C. Do you accept this definition? (yes/no):`,
    hint: `D is assumed to be a common measure.` },

  { q: `Since A is odd, must D also be odd? (yes/no):`,
    hint: `An even number cannot measure an odd number.` },

  { q: `Since D is odd and measures C, and C is even, does D also measure half of C? (yes/no):`,
    hint: `By Proposition IX.30: if an odd number measures an even number, it also measures its half.` },

  { q: `But is B equal to half of C? (yes/no):`,
    hint: `Since C = 2B, half of C is B.` },

  { q: `Therefore, does D measure B? (yes/no):`,
    hint: `D measures half of C, and that half is B.` },

  { q: `But does D also measure A? (yes/no):`,
    hint: `This was assumed when D was taken as a common measure of A and C.` },

  { q: `So does D measure both A and B? (yes/no):`,
    hint: `D measures A directly and B indirectly.` },

  { q: `But were A and B assumed to be prime to one another? (yes/no):`,
    hint: `This was part of the original given.` },

  { q: `Is it impossible for a number to measure two numbers that are prime to one another? (yes/no):`,
    hint: `By definition, numbers prime to one another have no common measure.` },

  { q: `Does this give a contradiction? (yes/no):`,
    hint: `D cannot exist as assumed.` },

  { q: `Therefore, must A and C be prime to one another? (yes/no):`,
    hint: `The assumption led to an impossibility.` },

  { q: `Therefore, if an odd number A is prime to B, is it also prime to the double of B? (yes/no):`,
    hint: `This is exactly what was to be shown.` }
]






const conclusion = `Congratulations! You just proved that if an odd number is prime to a number, it is also prime to its double.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
