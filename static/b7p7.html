<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.7 — Prove that if one number is the same part of another as a subtracted number is of a subtracted number, then the remainder is the same part of the remainder</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.7 chatbot!

We are given numbers AB and CD, and also AE and CF, such that AB is that part of CD which AE (subtracted) is of CF (subtracted). Do you agree? (yes/no):`,
hint: `This means the fraction (or ratio) AB/CD is the same as AE/CF.` },
{ q: `Our goal is to show that the remainder EB is the same part of the remainder FD that the whole AB is of the whole CD. Does that make sense? (yes/no):`,
hint: `We want to prove EB/FD = AB/CD.` },
{ q: `Whatever part AE is of CF, let EB be the same part of another number CG. Can we choose such a number CG? (yes/no):`,
hint: `We can always take another number CG so that EB/CG = AE/CF.` },
{ q: `Since whatever part AE is of CF, the same part is EB of CG, is it true that AE and EB are equal parts of CF and CG respectively? (yes/no):`,
hint: `“Equal parts” here means AE/CF = EB/CG.` },
{ q: `Now consider the sums AB = AE + EB and GF = CF + CG. From AE/CF = EB/CG, can we say that AB is the same part of GF that AE is of CF? (yes/no):`,
hint: `By Proposition VII.5, if two numbers are the same part of two others, the sum of the first pair is the same part of the sum of the second pair.` },
{ q: `By hypothesis, whatever part AE is of CF, the same part is also AB of CD. Do we have AB the same part of CD that AE is of CF? (yes/no):`,
hint: `This is exactly the condition given at the start: AB/CD = AE/CF.` },
{ q: `If AB is the same part of GF that AE is of CF, and also the same part of CD that AE is of CF, is AB the same part of GF that it is of CD? (yes/no):`,
hint: `AE/CF is a common “part-ratio” for both AB/GF and AB/CD.` },
{ q: `If one number (AB) is the same part of two numbers GF and CD, must GF be equal to CD? (yes/no):`,
hint: `If AB/GF = AB/CD and AB ≠ 0, then GF and CD must be equal.` },
{ q: `Let CF be subtracted from both GF and CD. Do we then get GC as the remainder from GF, and FD as the remainder from CD? (yes/no):`,
hint: `GF − CF = GC and CD − CF = FD.` },
{ q: `Since GF equals CD, if we subtract the same number CF from both, are the remainders GC and FD equal? (yes/no):`,
hint: `Subtracting equal amounts from equal numbers leaves equal remainders.` },
{ q: `Earlier, we arranged that whatever part AE is of CF, the same part is EB of GC. Do we still have EB/GC = AE/CF? (yes/no):`,
hint: `This was how we chose CG in the first place.` },
{ q: `But GC equals FD. So if EB is the same part of GC that AE is of CF, is EB also the same part of FD that AE is of CF? (yes/no):`,
hint: `Replace GC by FD in EB/GC = AE/CF, since GC = FD.` },
{ q: `From the hypothesis, AB is the same part of CD that AE is of CF. So if EB is the same part of FD that AE is of CF, and AB is the same part of CD that AE is of CF, do we now have EB/FD = AB/CD? (yes/no):`,
hint: `Both EB/FD and AB/CD match the same ratio AE/CF.` },
{ q: `Therefore, is the remainder EB the same part of the remainder FD that the whole AB is of the whole CD? (yes/no):`,
hint: `This is exactly the statement we wanted to prove.` },











];

const conclusion = `Congratulations! You just proved that if one number is the same part of another as a subtracted number is of a subtracted number, then the remainder is the same part of the remainder.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
