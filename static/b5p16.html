<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.16 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.16 - Prove that if four magnitudes are proportional, they are also proportional alternately.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.16 chatbot!

We are given four magnitudes A, B, C, D, such that A is to B as C is to D. Do you agree? (yes/no):`,
    hint: `This means the ratio of A to B is the same as that of C to D.` },
  { q: `Our goal is to show that A : C :: B : D. Does that make sense? (yes/no):`,
    hint: `“Alternately proportional” means that the first is to the third as the second is to the fourth.` },
  { q: `Let equimultiples E, F be taken of A, B. Possible? (yes/no):`,
    hint: `By Definition V.5, equimultiples of given magnitudes can be taken at will.` },
  { q: `Also let equimultiples G, H be taken of C, D. Possible? (yes/no):`,
    hint: `The same definition allows us to take any equal multiples of the remaining magnitudes.` },
  { q: `Since E and F are equimultiples of A and B, is the ratio A : B the same as E : F? (yes/no):`,
    hint: `Proposition V.15 says that magnitudes have the same ratio as their equal multiples.` },
  { q: `But A is to B as C is to D (by the given). Then, is C : D :: E : F? (yes/no):`,
    hint: `Proposition V.11 lets us substitute equal ratios in proportion.` },
  { q: `Again, since G, H are equimultiples of C, D, do we have C : D :: G : H? (yes/no):`,
    hint: `By the same V.15, equimultiples preserve ratios.` },
  { q: `But if C : D :: E : F, then also E : F :: G : H. True? (yes/no):`,
    hint: `Proposition V.11 again allows the equality of these ratios.` },
  { q: `If four magnitudes are proportional, and the first is greater than the third, will the second be greater than the fourth—and so on for equality or inferiority? (yes/no):`,
    hint: `Proposition V.14 establishes this relation of inequalities for proportional magnitudes.` },
  { q: `Therefore, if E > G, then F > H; if E = G, then F = H; if E < G, then F < H. Agreed? (yes/no):`,
    hint: `This follows directly from V.14.` },
  { q: `Now recall: E, F are equimultiples of A, B, and G, H are equimultiples of C, D. Does it follow that A : C :: B : D? (yes/no):`,
    hint: `By Definition V.5, equality of ratios is defined by such corresponding equimultiples.` }
];

const conclusion = `Congratulations! You just proved that if four magnitudes are proportional, they are also proportional alternately.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
