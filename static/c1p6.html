<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.6 — Menochat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.6 - Prove that a line drawn parallel to a base-perpendicular is bisected by the axial triangle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Conics I.6 chatbot!

We are given a cone with vertex A and base circle BC, cut by a plane through the axis, producing the axial triangle ABC. Do you agree? (yes/no):`,
hint: `The plane through the axis always intersects the cone in a triangle whose base is BC and vertex is A.` },
{ q: `From point M on the circumference of BC, a perpendicular MN is drawn to BC. Does that make sense? (yes/no):`,
hint: `M is on the base circle; a perpendicular from the circle to its diameter or chord is standard.` },
{ q: `Now, let us pick a point D on the surface of the cone and draw line DE through to somewhere on the opposite side of the axial triangle, parallel to MN. Do you agree? (yes/no):`,
hint: `A line parallel to a given line can be drawn through a point.` },
{ q: `Our goal is to show that:

(1) A line DE drawn through a point D on the cone, parallel to MN, meets the plane of triangle ABC;

And (2) when continued to the other side of the cone, DE is bisected by that triangle.

Does that make sense? (yes/no):`,
hint: `The proposition claims both intersection and bisection.` },
{ q: `Let us join AD and extend it until it meets the base circle again at K. Can we do this? (yes/no):`,
hint: `Any two points determine a line; extending it reaches the circle.` },
{ q: `At K, let us draw KH perpendicular to BC, meeting BC at H. Is this possible? (yes/no):`,
hint: `A perpendicular from a point to a line is a standard construction.` },
{ q: `Since KH is parallel to MN, and DE is drawn parallel to MN, is DE parallel to KH? (yes/no):`,
hint: `If two lines are each parallel to a third, they are parallel to each other.` },
{ q: `Join AH. Reasonable? (yes/no):`,
hint: `A straight line can be drawn from any point to any point.` },
{ q: `In triangle AHK, if DE is parallel to HK, will DE ( possibly extended) meet AH? (yes/no):`,
hint: `A line parallel to one side of a triangle meets the other two sides when extended (Euclid style).` },
{ q: `Since AH lies in the plane of triangle ABC, is it clear that DE meets the axial plane at some point F? (yes/no):`,
hint: `A line meeting one segment in the plane meets the plane.` },
{ q: `Now continue DF in a straight line until it meets the surface of the cone again at G. Is this continuation allowed? (yes/no):`,
hint: `A straight line can be extended indefinitely.` },
{ q: `Let us extend KH to meet the circumference of the base circle at L, then join AGL with a straight line. Can we do this? (yes/no):`,
hint: `A straight line can be drawn from any point to any point.` },
{ q: `Do you see that points A, G, L are on the surface of the cone and also in the plane through A, L, H, K? (yes/no):`,
hint: `Through A, K, and D is a plane; its intersection with the cone surface gives a curve including L and G.` },
{ q: `Does it follow that A, G, and L lie on one straight line? (yes/no):`,
hint: `The intersection of a plane through A and the cone’s generatrix gives a straight line segment.` },
{ q: `In triangle ALK, DG is drawn parallel to the base KH of triangle AHK. Do you see that? (yes/no):`,
hint: `DG was constructed parallel to MN, and MN ∥ KH.` },
{ q: `Since AFH is drawn across these parallels from A, can we use the proportionality result (like Euclid VI.4) that as KH is to HL, so is DF to FG? (yes/no):`,
hint: `A line from a vertex cutting two parallel segments gives proportional segments.` },
{ q: `By Euclid III.3, is KH equal to HL because KL is a chord perpendicular to the diameter BC? (yes/no):`,
hint: `A perpendicular from a diameter to a chord bisects the chord.` },
{ q: `If KH is equal to HL, and from KH is to HL as DF is to FG, does DF therefore equal DG? (yes/no):`,
hint: `Equal ratios with equal antecedents and consequents give equality of segments.` },
{ q: `Therefore, has the axial plane bisected the segment DG (i.e., DF = FG)? (yes/no):`,
hint: `F is the intersection with the plane; equal parts on each side show bisection.` },
{ q: `Therefore, have we proven that DE (possibly extended), the line drawn parallel to MN, intersects the the axial triangle and is bisected by it? (yes/no):`,
hint: `The axial triangle bisects all lines drawn parallel to MN within the section DFE.` },
];

const conclusion = `Congratulations! You just proved that a line drawn parallel to a base-perpendicular is bisected by the axial triangle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
