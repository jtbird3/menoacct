<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.70</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.70 – Prove that a straight line commensurable in length with the side of the sum of two medial areas is itself the side of the sum of two medial areas.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.70 chatbot!

We are given a straight line AB which is the side of the sum of two medial areas. Do you agree? (yes/no):`,
  hint: `This is stated directly at the beginning of the proposition.` },
{ q: `We are also given a straight line CD commensurable with AB. Agreed? (yes/no):`,
  hint: `CD is said to be commensurable with AB.` },
{ q: `Our goal is to prove that CD is also the side of the sum of two medial areas. Does that make sense? (yes/no):`,
  hint: `This is exactly what the proposition claims.` },

{ q: `Since AB is the side of the sum of two medial areas, let AB be divided at E. Is this allowed? (yes/no):`,
  hint: `The proposition tells us to divide AB at E.` },
{ q: `Are AE and EB straight lines incommensurable in square? (yes/no):`,
  hint: `This follows from AB being the side of the sum of two medial areas.` },
{ q: `Is the sum of the squares on AE and EB medial? (yes/no):`,
  hint: `This is part of the definition referenced in Book X.` },
{ q: `Is the rectangle contained by AE and EB medial? (yes/no):`,
  hint: `The rectangle AE, EB is stated to be medial.` },
{ q: `Is the sum of the squares on AE and EB incommensurable with the rectangle AE, EB? (yes/no):`,
  hint: `This is stated explicitly and follows from Proposition X.41.` },

{ q: `Let the same construction be made on CD as before. Is this permitted? (yes/no):`,
  hint: `“The same construction” refers to an analogous division of CD.` },
{ q: `Do we obtain straight lines CF and FD from CD? (yes/no):`,
  hint: `These correspond to AE and EB on AB.` },
{ q: `Are CF and FD also incommensurable in square? (yes/no):`,
  hint: `This follows by a similar proof.` },
{ q: `Is the sum of the squares on AE and EB commensurable with the sum of the squares on CF and FD? (yes/no):`,
  hint: `This is stated in the proposition.` },
{ q: `Is the rectangle AE, EB commensurable with the rectangle CF, FD? (yes/no):`,
  hint: `This also follows by the same reasoning.` },

{ q: `From this, is the sum of the squares on CF and FD medial? (yes/no):`,
  hint: `A magnitude commensurable with a medial magnitude is medial.` },
{ q: `Is the rectangle CF, FD medial? (yes/no):`,
  hint: `It is commensurable with a medial rectangle.` },
{ q: `Is the sum of the squares on CF and FD incommensurable with the rectangle CF, FD? (yes/no):`,
  hint: `This mirrors the relation for AE and EB.` },

{ q: `Therefore, is CD the side of the sum of two medial areas? (yes/no):`,
  hint: `CF and FD satisfy all required conditions.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with the side of the sum of two medial areas is itself the side of the sum of two medial areas.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
