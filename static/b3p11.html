<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.11 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.11 - Prove that if two circles touch internally, the line through their centers passes through the point of contact.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.11 chatbot!

We are given two circles, ABC and ADE  that touch internally at point A. Do you agree? (yes/no):`,
    hint: `“Touch internally” means one circle lies inside the other and they meet at exactly one point.` },
  { q: `Let us take the center of circle ABC at point F and the center of circle ADE at point G. Is this possible? (yes/no):`,
    hint: `We can find the center of a circle (III.1).` },
  { q: `Our goal is to show that the if we extend a straight line FG it will pass through A. Does that make sense? (yes/no):`,
    hint: `We want to prove that the line of centers runs exactly through the point of contact.` },
  { q: `For the sake of argument, suppose that line FG does not pass through A, but meets the circle ABC at another point H and intersecting ADE at D. Can we assume this for a proof by contradiction? (yes/no):`,
    hint: `We are assuming that FG is a straight line that passes through H instead of A. To do this, we need to move point G from the actual center of the circle ADE so that it is in line with H.` },
  { q: `Join AF and AG. Possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Now, compare AG + GF with AF. Do we get AG + GF > AF? (yes/no):`,
    hint: `By the triangle inequality, in ΔAFG, the sum of two sides AG + GF is greater than the third AF.` },
  { q: `If we subtract FG from AG + GF > AF, do we get AG > GH? (yes/no):`,
    hint: `Common Notion 3: subtract equals from equals, the remainders are equal. AG + GF - FG = AG, and AF - FG = GH, since AF and HF are radii.` },
  { q: `But is AG equal to GD (since G is the center of ADE and A, D lie on the circle)? (yes/no):`,
    hint: `All radii of a circle are equal, so AG = GD.` },
  { q: `Now, if AG = GD and AG > GH, does that mean GD > GH? (yes/no):`,
    hint: `Replace AG with GD.` },
  { q: `This means we have GD (a radius) greater than GH, an extension of it which lies outside the circle. Do we have a contradiction? (yes/no):`,
    hint: `No, this leads to a contradiction: the less cannot be greater than the greater.` },
  { q: `Therefore FG, if produced, cannot pass anywhere except for A. Must it then fall exactly on A, the point of contact between the circles? (yes/no):`,
    hint: `The contradiction forces the conclusion: FG passes through A.` }
];

const conclusion = `Congratulations! You just proved that the straight line joining the centers of two circles touching internally passes through their point of contact.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
