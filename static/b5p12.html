<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.12 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.12 - If several magnitudes are proportional, then as one antecedent is to one consequent, so are all the antecedents to all the consequents</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.12 chatbot!

We are given magnitudes A, B, C, D, E, F that are proportional, such that as A is to B, so is C to D and E to F. Do you agree? (yes/no):`,
    hint: `This means A is to B as C is to D as E is to F; all pairs have the same ratio.` },
  { q: `Our goal is to prove that as A is to B, so are A, C, E to B, D, F. Does that make sense? (yes/no):`,
    hint: `We want to show that combining the antecedents (A, C, E) and the consequents (B, D, F) preserves the same ratio.` },
  { q: `Let equimultiples G, H, K be taken of A, C, E respectively, and other (arbitrary) equimultiples L, M, N of B, D, F respectively. Is this allowed? (yes/no):`,
    hint: `By Definition V.4, equimultiples can be taken of any magnitudes.` },
  { q: `Since as A is to B, so is C to D and E to F, and we have taken equimultiples accordingly, do the following relations hold:
if G exceeds L, then H exceeds M, and K exceeds N;
if equal, equal; and if less, less? (yes/no):`,
    hint: `This follows directly from the definition of proportional magnitudes — equal ratios preserve comparative relations between corresponding multiples.` },
  { q: `Then, if G is in excess of L, are G, H, K together in excess of L, M, N; and if equal, equal; and if less, less? (yes/no):`,
    hint: `When individual corresponding magnitudes have the same relation, the collections of all antecedents and all consequents will share that same comparative relation.` },
  { q: `Now, are G and G, H, K equimultiples of A and A, C, E respectively? (yes/no):`,
    hint: `Yes — if each of G, H, K is a multiple of A, C, E in the same ratio, then all together form an equimultiple of the group A, C, E (see Proposition V.1).` },
  { q: `For the same reason, are L and L, M, N equimultiples of B and B, D, F? (yes/no):`,
    hint: `Equal reasoning applies — each of L, M, N is an equimultiple of B, D, F in the same manner.` },
  { q: `Therefore, if the relation between the equimultiples of the antecedents and those of the consequents holds (greater, equal, or less), can we conclude that as A is to B, so are A, C, E to B, D, F? (yes/no):`,
    hint: `This follows from Definition V.5 of proportionality, which compares equimultiples to determine ratio equality.` }
];

const conclusion = `Congratulations! You just proved that if several magnitudes are proportional, then as one antecedent is to one consequent, so are all the antecedents to all the consequents. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
