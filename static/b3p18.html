<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.18 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.18 - Prove that if a line touches a circle at one point, the line from the center to that point of contact is perpendicular to the tangent.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.18 chatbot!

We are given a circle ABC with center F, and a straight line DE touching the circle at point C. Do you agree? (yes/no):`,
    hint: `A tangent is a straight line that meets the circle at exactly one point.` },
  { q: `Our goal is to show that the line FC, drawn from the center to the point of contact C, is perpendicular to DE. Does that make sense? (yes/no):`,
    hint: `“Perpendicular” means forming a right angle with the tangent line.` },
  { q: `Suppose instead that FC were not perpendicular to DE. Is that assumption clear? (yes/no):`,
    hint: `We will argue by contradiction: assume something false and show it leads to an impossibility.` },
  { q: `If FC is not perpendicular, let us draw another line FG from F through B that is perpendicular to DE. Can we do this? (yes/no):`,
    hint: `From a point to a line, exactly one perpendicular can be drawn.` },
  { q: `Since ∠FGC is right, is ∠FCG acute? (yes/no):`,
    hint: `Right and acute angles are complementary in this case (I.17: a right angle is greater than an acute).` },
  { q: `Now, in triangle FCG, is the greater angle opposite the greater side? (yes/no):`,
    hint: `By Proposition I.19, the side opposite the greater angle is the greater side.` },
  { q: `Therefore, since ∠FCG < ∠FGC, must FC be greater than FG? (yes/no):`,
    hint: `The side opposite the greater angle is longer.` },
  { q: `But is FC equal to FB (both radii of the same circle)? (yes/no):`,
    hint: `All radii of a circle are equal.` },
  { q: `If FC = FB, does it follow that FB is also greater than FG? (yes/no):`,
    hint: `Substitution: FC > FG, and FC = FB, so FB > FG.` },
  { q: `But can a shorter line be greater than a longer one? (yes/no):`,
    hint: `No; this contradicts logic (the lesser cannot be greater than the greater).` },
  { q: `Therefore our assumption was wrong: FC must indeed be perpendicular to DE. Do you see that? (yes/no):`,
    hint: `By contradiction, no line from F except FC can be perpendicular to DE.` }
];

const conclusion = `Congratulations! You just proved that the line from the center of a circle to the point of contact of a tangent is perpendicular to the tangent.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
