<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Template — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.2 - Prove that in a line cut at random the rectangles by the whole and the parts together equal the square on the whole.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.2 chatbot!

We are given a straight line AB, cut at random at point C. Do you agree? (yes/no):`,
    hint: `A “cut at random” means we pick any point C on AB, so AC and CB are the two parts.` },
  { q: `Our goal is to prove that the rectangle AB⋅AC together with the rectangle AB⋅BC is equal to the square on AB. Does that make sense? (yes/no):`,
    hint: `We want to show that the sum of those two rectangles matches the square with side AB (AB x AC + AB x BC = AB²)` },
  { q: `First, can we describe a square ADEB on the line AB? (yes/no):`,
    hint: `By Proposition I.46, a square can be described on any straight line.` },
  { q: `Next, can we draw through point C a line CF parallel to AD or BE? (yes/no):`,
    hint: `By Proposition I.31, a line can be drawn parallel to a given line through any point.` },
  { q: `Do you see that this construction divide the square into two rectangles, AF and CE, along CF? (yes/no):`,
    hint: `CF is parallel to the sides, so the square is split into two rectangles.` },
  { q: `Is AE the whole square on AB? (yes/no):`,
    hint: `AE represents the full square constructed on AB.` },
  { q: `Is AF the rectangle contained by AB and AC? (yes/no):`,
    hint: `AF is bounded by DA and AC, and DA equals AB, so AF = AB x AC.` },
  { q: `Is CE the rectangle contained by AB and BC? (yes/no):`,
    hint: `CE is bounded by BE and BC, and BE equals AB, so CE = AB x BC.` },
  { q: `So, do AF and CE together equal the whole square AE? (yes/no):`,
    hint: `AF + CE make up the entire square on AB, by construction.` },
  { q: `Therefore, is the rectangle BA x AC together with AB x BC equal to the square on AB? (yes/no):`,
    hint: `The two smaller rectangles fill the square completely.` }
];

const conclusion = `Congratulations! We have shown that if a line is cut at random, the rectangles of the whole with each part together equal the square on the whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
