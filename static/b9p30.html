<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.30</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.30 — Prove that if an odd number measures an even number, it also measures its half</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.30 chatbot!

We are given an odd number A and an even number B, and A measures B. Do you agree? (yes/no):`,
    hint: `A is assumed odd, and B is assumed even by hypothesis. "Measures" means B is some multiple of A.` },

  { q: `Our goal is to show that A also measures the half of B. Does that make sense? (yes/no):`,
    hint: `We want to prove A divides B/2.` },

  { q: `Since A measures B, let A measure B according to some number C. Is this allowed? (yes/no):`,
    hint: `If A measures B, then B = A × C for some number C.` },

  { q: `Let us assume that C is odd. Do you follow the claim? (yes/no):`,
    hint: `We will prove this by contradiction.` },

  { q: `Suppose, if possible, that C is odd. Can we assume this temporarily? (yes/no):`,
    hint: `This is a standard indirect (reductio) argument.` },

  { q: `Since A measures B according to C, has A multiplied by C produced B? (yes/no):`,
    hint: `Measuring “according to C” means B = A × C.` },

  { q: `Is A an odd number and C an odd number? (yes/no):`,
    hint: `A is odd by hypothesis, and we assumed C is odd.` },

  { q: `Is a product of odd numbers made up of odd numbers in an odd multitude? (yes/no):`,
    hint: `In Euclid’s theory, odd × odd yields an odd number.` },

  { q: `Does it follow that B is odd? (yes/no):`,
    hint: `A product of odd numbers is itself odd.` },

  { q: `Is this a contradiction, since B was assumed even? (yes/no):`,
    hint: `An even number cannot be odd.` },

  { q: `Therefore, is it impossible that C is odd? (yes/no):`,
    hint: `The assumption that C is odd led to a contradiction.` },

  { q: `Must C therefore be even? (yes/no):`,
    hint: `A number that is not odd must be even.` },

  { q: `If C is even, does A measure B an even number of times? (yes/no):`,
    hint: `“According to C” now means “according to an even number.”` },

  { q: `If A measures B an even number of times, does it also measure half of B? (yes/no):`,
    hint: `Dividing an even multiple into two equal parts preserves the measure.` },

  { q: `Therefore, does the odd number A measure the half of the even number B? (yes/no):`,
    hint: `This is exactly what was to be shown.` }
]






const conclusion = `Congratulations! You just proved that if an odd number measures an even number, it also measures its half.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
