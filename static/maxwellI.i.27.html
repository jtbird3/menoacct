<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Treatise on Electricity and Magnetism I.i.27</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Experiment I - Observe electrical attraction and repulsion by rubbing glass and resin together.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Maxwell's I.i.27 chatbot!

We are given a piece of glass and a piece of resin, and at first neither shows electrical properties. Do you agree? (yes/no):`, hint: `Maxwell begins with glass and resin before they are rubbed.` },
{ q: `Our goal is to observe what happens when they are rubbed together, separated, and compared with a second rubbed pair. Does that make sense? (yes/no):`, hint: `We want to track attraction, repulsion, and the two kinds of electrification.` },
{ q: `First, let the glass and resin be rubbed together and then left with the rubbed surfaces still in contact. Can we do this? (yes/no):`, hint: `At this stage, the rubbed surfaces are still touching each other.` },
{ q: `While the rubbed surfaces remain in contact, do they still show no electrical properties? (yes/no):`, hint: `Maxwell says that while they remain in contact, they exhibit no electrical properties.` },
{ q: `Next, let the glass and resin be separated. Is this the next step? (yes/no):`, hint: `Separation is what allows the electrical effects to appear.` },
{ q: `After they are separated, do they attract each other? (yes/no):`, hint: `Maxwell says that after separation, the two bodies attract one another.` },
{ q: `Now let a second piece of glass be rubbed with a second piece of resin. Can we introduce this second pair? (yes/no):`, hint: `This gives us another glass and another resin for comparison.` },
{ q: `After rubbing, should the second glass and second resin also be separated and suspended near the first pair? (yes/no):`, hint: `Maxwell places the second pair near the first in order to compare their behavior.` },
{ q: `When the two pieces of glass are brought near each other, do they repel each other? (yes/no):`, hint: `This is Maxwell’s first observation about the second pair.` },
{ q: `Does each piece of glass attract each piece of resin? (yes/no):`, hint: `Glass and resin act oppositely, so they attract one another.` },
{ q: `When the two pieces of resin are brought near each other, do they repel each other? (yes/no):`, hint: `This is Maxwell’s third observation.` },
{ q: `Are these attractions and repulsions called electrical phenomena? (yes/no):`, hint: `Maxwell gives this name to the observed effects.` },
{ q: `Are bodies that show these effects said to be electrified, or charged with electricity? (yes/no):`, hint: `This is the general name for bodies showing electrical behavior.` },
{ q: `Can bodies be electrified in ways other than friction? (yes/no):`, hint: `Maxwell says friction is one way, but not the only way.` },
{ q: `Are the electrical properties of the two pieces of glass similar to each other? (yes/no):`, hint: `The two glasses behave alike toward other electrified bodies.` },
{ q: `Are the electrical properties of the glass opposite to those of the resin? (yes/no):`, hint: `What glass attracts, resin repels; and what glass repels, resin attracts.` },
{ q: `If a body behaves like the glass, repelling glass and attracting resin, is it called vitreously electrified? (yes/no):`, hint: `“Vitreous” is Maxwell’s label for the kind of electrification shown by glass.` },
{ q: `If a body behaves like the resin, attracting glass and repelling resin, is it called resinously electrified? (yes/no):`, hint: `“Resinous” is Maxwell’s label for the kind of electrification shown by resin.` },
{ q: `Are all electrified bodies found to be either vitreously or resinously electrified? (yes/no):`, hint: `Maxwell presents these as the two kinds of electrification.` },
{ q: `Is vitreous electrification also called positive? (yes/no):`, hint: `Men of science use “positive” for vitreous electrification.` },
{ q: `Is resinous electrification also called negative? (yes/no):`, hint: `Men of science use “negative” for resinous electrification.` },
{ q: `Is the choice of calling one positive and the other negative a matter of convention? (yes/no):`, hint: `Maxwell says the naming is arbitrary, even though the two kinds are opposite in property.` },
{ q: `Can we say the two kinds are marked by opposite signs because their properties are exactly opposite? (yes/no):`, hint: `The signs reflect opposition, though the assignment of which sign goes with which kind is conventional.` },
{ q: `Between an electrified body and a body not electrified, can any force of attraction or repulsion be observed? (yes/no):`, hint: `Maxwell says no such force is observed in that case.` },
{ q: `When a body not previously electrified seems to be acted on by an electrified body, is it because it has become electrified by induction? (yes/no):`, hint: `Maxwell explains such cases by induction, not by a direct action on a truly unelectrified body.` },
{ q: `Therefore, did we learn that rubbing and separating glass and resin produces two opposite kinds of electrification, now called positive and negative, with like kinds repelling and unlike kinds attracting? (yes/no):`, hint: `This is the main result of Experiment I.` },
{ q: `Congratulations! We have followed Maxwell’s first experiment and identified the two opposite kinds of electrification and their effects. Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`, hint: `` },

]

const conclusion = `Congratulations! You just proved that if two mutually attracting spheres have similar matter at equal distances from their centres, then each sphere’s attraction toward the other is inversely proportional to the square of the distance between their centres.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
