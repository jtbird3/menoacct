<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.29 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.29 – Prove that a straight line falling on parallels makes alternate angles equal, external/internal angles equal, and interior angles sum to two right angles.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.29 chatbot!
  
We are given two straight lines AB and CD, and they are parallel. A straight line EF falls across them, cutting AB at G and CD at H. Do you agree? (yes/no):`,
    hint: `Parallel lines are lines that, extended indefinitely, do not meet.` },
  { q: `Our goal is to prove: 1) Alternate angles AGH = GHD, 2) Exterior angle EGB = interior opposite angle GHD, 3) Interior angles on the same side (BGH + GHD) = two right angles. Does that make sense? (yes/no):`,
    hint: `This proposition gathers the key angle properties when a transversal meets parallels.` },
  { q: `Suppose for contradiction that angle AGH is not equal to angle GHD. Then one of them is greater. Can we suppose AGH > GHD? (yes/no):`,
    hint: `If they are not equal, one must exceed the other.` },
  { q: `Now, let us add angle BGH to both AGH and GHD. Does that give AGH + BGH > BGH + GHD? (yes/no):`,
    hint: `Adding equal things to unequal things preserves inequality (C.N. 4).` },
  { q: `But is AGH + BGH equal to two right angles? (yes/no):`,
    hint: `Proposition I.13: angles on a straight line add to two right angles.` },
  { q: `Therefore, is BGH + GHD less than two right angles? (yes/no):`,
    hint: `If AGH + BGH = 2 right angles, and it's greater than BGH + GHD, then BGH + GHD must be less.` },
  { q: `If two lines cut by a transversal make interior angles less than two right angles, will they meet when extended? (yes/no):`,
    hint: `Postulate 5: if a straight line falling on two straight lines makes interior angles < 2 right angles, the lines meet.` },
  { q: `But AB and CD are parallel, so they do not meet. Does this contradict our assumption that AGH ≠ GHD? (yes/no):`,
    hint: `Contradiction shows AGH must equal GHD.` },
  { q: `Now, is angle AGH equal to angle EGB? (yes/no):`,
    hint: `Proposition I.15: vertically opposite angles are equal.` },
  { q: `So, if AGH = GHD and AGH = EGB, can we conclude EGB = GHD? (yes/no):`,
    hint: `Common Notion 1: things equal to the same thing are equal.` },
  { q: `Next, let's add angle BGH to each side: do we then have EGB + BGH = GHD + BGH? (yes/no):`,
    hint: `Common Notion 2: equals added to equals yield equals.` },
  { q: `But is EGB + BGH equal to two right angles? (yes/no):`,
    hint: `Proposition I.13: a straight line makes adjacent angles equal to two right angles.` },
  { q: `Therefore, are BGH + GHD also equal to two right angles? (yes/no):`,
    hint: `Since they equal EGB + BGH, and that sum is 2 right angles, they too equal 2 right angles.` },
  { q: `Thus we have shown: (1) AGH = GHD (alternate angles), (2) EGB = GHD (exterior = opposite interior), (3) BGH + GHD = two right angles (same-side interior). Q.E.D. Agreed? (yes/no):`,
    hint: `This recaps the three angle relations when a transversal meets parallels.` }
];

const conclusion = `Congratulations, Congratulations! You just proved that when a straight line falls on parallel straight lines: (1) the alternate angles are equal, (2) the exterior angle equals the interior opposite angle, and (3) the interior angles on the same side equal two right angles.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
