<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.32</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.32 — Prove that numbers obtained by continual doubling from a dyad are even-times even only</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.32 chatbot!

We are given a dyad A, and numbers B, C, D which are continually doubled from A. Do you agree? (yes/no):`,
    hint: `B = 2A, C = 2B, D = 2C.` },

  { q: `Our goal is to show that each of the numbers B, C, D is even-times even only. Does that make sense? (yes/no):`,
    hint: `Not just even-times even, but no other form.` },

  { q: `Is it clear that each of the numbers B, C, D is even-times even? (yes/no):`,
    hint: `Each is obtained by doubling, starting from a dyad.` },

  { q: `Now we claim that each is even-times even only. Do you accept this as the next step? (yes/no):`,
    hint: `We must exclude any other possible form.` },

  { q: `Let an unit be set out. Is this allowed? (yes/no):`,
    hint: `Euclid commonly introduces an unit to reason about number proportions.` },

  { q: `Since as many numbers as we please beginning from an unit are in continued proportion, and since A after the unit is prime, do you agree that this setup applies here? (yes/no):`,
    hint: `A dyad follows immediately after the unit and is prime.` },

  { q: `Is D the greatest of the numbers A, B, C, D? (yes/no):`,
    hint: `Each number is double the preceding one.` },

  { q: `By Proposition IX.13, will D be measured by no number except A, B, or C? (yes/no):`,
    hint: `In a continued proportion beginning from a prime, the greatest term has only those measures.` },

  { q: `Are each of the numbers A, B, and C even? (yes/no):`,
    hint: `A is a dyad, and B and C are doubles of even numbers.` },

  { q: `Since D is measured only by even numbers, does this mean D has no odd measure? (yes/no):`,
    hint: `All its measures are even.` },

  { q: `By Definition VII.8, does this imply that D is even-times even only? (yes/no):`,
    hint: `A number measured only by even numbers is even-times even only.` },

  { q: `Can the same reasoning be applied to show that B and C are also even-times even only? (yes/no):`,
    hint: `The argument does not depend on D alone.` },

  { q: `Therefore, is each of the numbers continually doubled from a dyad even-times even only? (yes/no):`,
    hint: `This completes the demonstration.` }
]






const conclusion = `Congratulations! You just proved that numbers obtained by continual doubling from a dyad are even-times even only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
