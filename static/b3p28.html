<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.28 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.28 - Prove that in equal circles, equal chords cut off equal arcs.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.28 chatbot!

We are given two equal circles, ABC and DEF, and equal chords AB and DE. Do you agree? (yes/no):`,
    hint: `Equal circles have the same radius length, and AB = DE is given.` },
  { q: `Our goal is to prove that the greater arc ACB equals the greater arc DFE, and the lesser arc AGB equals the lesser arc DHE. Does that make sense? (yes/no):`,
    hint: `“Greater arc” is the larger of the two arcs cut off by a chord; “lesser arc” is the smaller.` },
  { q: `Next, let us find the centers K and L of circles ABC and DEF then draw AK, KB, DL, and LE. Can we do this? (yes/no):`,
    hint: `By III.1, we can find the centers of circles, and by Postulate 1, we can draw a straight line between two points.` },
  { q: `Since the circles are equal, are the radii AK, KB equal to the radii DL, LE? (yes/no):`,
    hint: `Equal circles have equal radii by definition.` },
  { q: `Also, AB = DE by the given. Do you agree? (yes/no):`,
    hint: `This is the initial assumption.` },
  { q: `So, with AK = DL, KB = LE, and AB = DE, do triangles AKB and DLE have three equal sides? (yes/no):`,
    hint: `Proposition I.8: if two triangles have the three sides equal, the included angles are equal.` },
  { q: `Therefore, is ∠AKB equal to ∠DLE? (yes/no):`,
    hint: `Equal triangles have equal corresponding angles; here these are central angles.` },
  { q: `But do equal central angles stand on equal arcs? (yes/no):`,
    hint: `Proposition III.26: equal angles at the centers of equal circles intercept equal circumferences.` },
  { q: `Thus, is the lesser arc AGB equal to the lesser arc DHE? (yes/no):`,
    hint: `Both are subtended by equal central angles ∠AKB and ∠DLE.` },
  { q: `Now, since the whole circles ABC and DEF are equal, and their lesser arcs are equal, do the greater arcs ACB and DFE also equal one another? (yes/no):`,
    hint: `Subtracting equals from equals (Common Notion 3) leaves equals.` },
  { q: `Therefore, have we shown that in equal circles equal chords cut off equal circumferences? (yes/no):`,
    hint: `Yes — this completes the proof.` }
];

const conclusion = `Congratulations! You just proved that equal chords cut off equal arcs!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
