<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.19</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.19 – Prove that the rectangle contained by straight lines rational and commensurable in length is rational.</h1><p>Type your answer and press enter.</p>
<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.19 chatbot!

We are given two rational straight lines AB and BC, which are commensurable in length. Do you agree? (yes/no):`,
hint: `Both AB and BC are stated to be rational, and they are commensurable in length.` },
{ q: `Our goal is to show that the rectangle AC contained by AB and BC is rational. Does that make sense? (yes/no):`,
hint: `The rectangle AC represents the rectangle formed by sides AB and BC.` },
{ q: `On AB, let the square AD be described. Can this be done? (yes/no):`,
hint: `By Euclid I.46, a square can be described on any straight line.` },
{ q: `Is the square AD rational? (yes/no):`,
hint: `A square described on a rational straight line is rational (X. Definition 4).` },
{ q: `Since AB is commensurable in length with BC, and AB is equal to BD, is BD commensurable in length with BC? (yes/no):`,
hint: `Things equal to the same thing preserve commensurability in length.` },
{ q: `As BD is to BC, so is DA to AC. Do you agree? (yes/no):`,
hint: `This follows from VI.1, relating areas to their corresponding sides.` },
{ q: `If DA is to AC as BD is to BC, and BD is commensurable with BC, is DA commensurable with AC? (yes/no):`,
hint: `By X.11, proportional magnitudes inherit commensurability.` },
{ q: `But DA is rational. Do you agree? (yes/no):`,
hint: `DA is the square on AB, and AB is rational.` },
{ q: `If DA is rational and DA is commensurable with AC, is AC also rational? (yes/no):`,
hint: `By X. Definition 4, a magnitude commensurable with a rational magnitude is rational.` },
{ q: `Therefore, is the rectangle AC rational? (yes/no):`,
hint: `This completes the argument.` }
]





const conclusion = `Congratulations! You just proved that the rectangle contained by straight lines rational and commensurable in length is rational.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
