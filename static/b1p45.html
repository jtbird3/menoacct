<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.45 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.45 – Construct a parallelogram equal to a given rectilineal figure in a given angle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.45 chatbot!

We are given a rectilineal figure ABCD, and a rectilineal angle E. Do you agree? (yes/no):`,
    hint: `ABCD is any polygonal figure bounded by straight lines, and E is a fixed angle.` },
  { q: `Our goal is to construct, in angle E, a parallelogram equal in area to figure ABCD. Does that make sense? (yes/no):`,
    hint: `A parallelogram has opposite sides equal and parallel. We want its area to equal ABCD's area.` },
  { q: `First, let us join the diagonal DB of the figure ABCD. Can we do that? (yes/no):`,
    hint: `Postulate 1 allows us to join any two points with a straight line.` },
  { q: `Now, construct a parallelogram FH equal to triangle ABD, in an angle FHK equal to angle E. Possible? (yes/no):`,
    hint: `Proposition I.42 shows how to construct a parallelogram equal to a given triangle in a given angle.` },
  { q: `Next, construct another parallelogram GM equal to triangle DBC, applied to straight line GH in an angle GHM equal to E. Possible? (yes/no):`,
    hint: `Proposition I.44 allows us to apply to a straight line a parallelogram equal to a given triangle in a given angle.` },
  { q: `Since E = HKF and E = GHM, do we also have HKF = GHM? (yes/no):`,
    hint: `If two things are equal to the same thing, they are equal to each other (Common Notion 1).` },
  { q: `Add angle KHG to each. Then are angles FKH + KHG equal to KHG + GHM? (yes/no):`,
    hint: `Adding equals to equals yields equals (Common Notion 2).` },
  { q: `But are FKH + KHG = 2 right angles? (yes/no):`,
    hint: `Proposition I.29 shows that angles on a straight line with a parallel crossing add to two right angles.` },
  { q: `Therefore, are KHG + GHM also equal to two right angles? (yes/no):`,
    hint: `Equals to equals substitution.` },
  { q: `If two adjacent angles at a point sum to two right angles, are the lines KH and HM in a straight line? (yes/no):`,
    hint: `Proposition I.14: a straight line is formed when adjacent angles equal two right angles.` },
  { q: `Now, since HG falls on parallels KM and FG, are the alternate angles MHG and HGF equal? (yes/no):`,
    hint: `Proposition I.29: alternate angles between parallels are equal.` },
  { q: `Add angle HGL to each. Then are MHG + HGL = HGF + HGL? (yes/no):`,
    hint: `Common Notion 2 again (adding equals to equals).` },
  { q: `But are MHG + HGL = 2 right angles? (yes/no):`,
    hint: `Again, Proposition I.29 (straight line plus parallel reasoning).` },
  { q: `Therefore, are HGF + HGL also = 2 right angles? (yes/no):`,
    hint: `Equals substitution (Common Notion 1).` },
  { q: `So, is FG in a straight line with GL? (yes/no):`,
    hint: `Proposition I.14 again: straight line if adjacent angles = 2 right angles.` },
  { q: `Now, since FK is equal and parallel to HG, and HG equal and parallel to ML, is KF also equal and parallel to ML? (yes/no):`,
    hint: `Parallels to the same line are equal and parallel (I.30, C.N.1).` },
  { q: `And since KM and FL join the ends, are KM and FL also equal and parallel? (yes/no):`,
    hint: `Proposition I.33: lines joining equal and parallel lines are themselves equal and parallel.` },
  { q: `Therefore, is KFLM a parallelogram? (yes/no):`,
    hint: `A quadrilateral with both pairs of opposite sides equal and parallel is a parallelogram.` },
  { q: `Now, since ABD = FH and DBC = GM, is ABCD equal to FH + GM? (yes/no):`,
    hint: `The whole is equal to the sum of its parts.` },
  { q: `But FH + GM = parallelogram KFLM. Therefore, is KFLM equal to ABCD? (yes/no):`,
    hint: `Each triangle was replaced by a parallelogram, so their sum is equal.` },
  { q: `Finally, have we constructed a parallelogram KFLM equal to rectilineal figure ABCD, in the angle FKM = E? (yes/no):`,
    hint: `This matches the enunciation: a parallelogram equal to the figure, in the given angle.` }
];

const conclusion = `Congratulations! The construction is complete.
Q.E.F. (Quod Erat Faciendum — which was to be done).`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
