<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.18</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.18 — Prove that if two numbers multiply the same number, the products have the same ratio as the multipliers</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.18 chatbot!
  
We are given two numbers A and B. Do you agree? (yes/no):`,
hint: `These are the multipliers whose ratio we want to compare.` },
{ q: `We are also given another number C. Do you agree? (yes/no):`,
hint: `C is the common number that will be multiplied by A and B.` },
{ q: `Our goal is to show that if A·C = D and B·C = E, then A : B = D : E. Does that make sense? (yes/no):`,
hint: `We want to prove that the ratio of the multipliers equals the ratio of the products.` },
{ q: `First, A multiplied by C produces D. Do you accept this? (yes/no):`,
hint: `This is given in the hypothesis of the proposition.` },
{ q: `Since A multiplied C to make D, is it also true that C multiplied A makes D? (yes/no):`,
hint: `Proposition VII.16: multiplication is commutative for numbers.` },
{ q: `Next, B multiplied by C produces E. Do you accept that? (yes/no):`,
hint: `This is also given.` },
{ q: `And since B multiplied C to make E, is it also true that C multiplied B makes E? (yes/no):`,
hint: `Again by VII.16, the order in multiplication does not matter.` },
{ q: `So, has the same number C multiplied the two numbers A and B to produce D and E? (yes/no):`,
hint: `Both D and E come from C multiplied by A and by B.` },
{ q: `If the same number multiplies two numbers, do the products have the same ratio as the original numbers? (yes/no):`,
hint: `Proposition VII.17 states: if a number multiplies two numbers, the products are proportional to the original numbers.` },
{ q: `Therefore, can we conclude that A : B = D : E? (yes/no):`,
hint: `This is precisely what VII.17 guarantees.` },


















];

const conclusion = `Congratulations! You just proved that if two numbers multiply the same number, the products have the same ratio as the multipliers.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
