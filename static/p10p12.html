<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.12</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.12 – Prove that magnitudes which are commensurable with the same magnitude are commensurable with one another.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.12 chatbot!

We are given three magnitudes A, B, and C. Agreed? (yes/no):`,
hint: `A, B, and C are magnitudes under comparison.` },
{ q: `We are told that A is commensurable with C, and that B is also commensurable with C. Do you agree? (yes/no):`,
hint: `Each shares a common measure with C.` },
{ q: `Our goal is to prove that A is commensurable with B. Does that make sense? (yes/no):`,
hint: `We want to show A and B also share a common measure.` },
{ q: `Since A is commensurable with C, does A have to C the ratio which a number has to a number? (yes/no):`,
hint: `This follows from Definition X.5.` },
{ q: `Let this ratio be the same as the ratio of the number D to the number E. Is that acceptable? (yes/no):`,
hint: `Any numerical ratio equal to A : C may be chosen.` },
{ q: `Again, since C is commensurable with B, does C have to B the ratio which a number has to a number? (yes/no):`,
hint: `This again uses Definition X.5.` },
{ q: `Let this ratio be the same as the ratio of the number F to the number G. Is that allowed? (yes/no):`,
hint: `We represent the ratio C : B numerically.` },
{ q: `Now, given the two ratios D : E and F : G, can we take numbers H, K, L continuously in these ratios? (yes/no):`,
hint: `This is justified by Book VIII, Proposition 4.` },
{ q: `So that, as D is to E, so is H to K, and as F is to G, so is K to L. Do you see this setup? (yes/no):`,
hint: `H, K, L are constructed to preserve the given ratios.` },
{ q: `Since as A is to C, so is D to E, and as D is to E, so is H to K, does it follow that as A is to C, so is H to K? (yes/no):`,
hint: `Ratios equal to the same ratio are equal (Book V, Proposition 11).` },
{ q: `Again, since as C is to B, so is F to G, and as F is to G, so is K to L, does it follow that as C is to B, so is K to L? (yes/no):`,
hint: `This again uses Book V, Proposition 11.` },
{ q: `But since as A is to C, so is H to K, and as C is to B, so is K to L, can we conclude ex aequali that as A is to B, so is H to L? (yes/no):`,
hint: `This follows from Book V, Proposition 22 (ex aequali).` },
{ q: `Since H to L is the ratio of a number to a number, does A have to B the ratio which a number has to a number? (yes/no):`,
hint: `A : B has been shown equal to a numerical ratio.` },
{ q: `Therefore, is A commensurable with B? (yes/no):`,
hint: `By Definition X.6, magnitudes with a numerical ratio are commensurable.` }
]






const conclusion = `Congratulations! You just proved that magnitudes which are commensurable with the same magnitude are commensurable with one another.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
