<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VII.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.2 - Find the greatest common measure of two given numbers</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.2 chatbot!

We are given two numbers AB and CD, and they are not prime to one another. Do you agree? (yes/no):`,
hint: `“Not prime to one another” means they have a common measure greater than 1.` },
{ q: `Our goal is to find the greatest common measure of AB and CD. Does that make sense? (yes/no):`,
hint: `A greatest common measure is the largest number that divides both AB and CD.` },
{ q: `First, check whether CD measures AB exactly. Does CD measure AB? (yes/no):`,
hint: `To prove the theorem, CD must measure AB exactly.` },
{ q: `If CD measures AB, then CD is a common measure of both AB and CD. Do you agree? (yes/no):`,
hint: `CD divides itself, and if it also divides AB, then it measures both numbers.` },
{ q: `And if CD is a common measure, is it clear that no greater number than CD can measure CD? (yes/no):`,
hint: `A number cannot be measured by any number greater than itself.` },
{ q: `But suppose CD does not measure AB. Then we subtract the smaller number from the larger repeatedly. Do you see that this is the method? (yes/no):`,
hint: `This is the Euclidean algorithm from VII.1: continually subtract the lesser from the greater until a unit is left.` },
{ q: `If the subtraction continues, must some number be left that measures the previous remainder? (yes/no):`,
hint: `A remainder of 1 would imply AB and CD are prime to each other, which contradicts the hypothesis.` },
{ q: `Let CD subtract from AB and leave remainder EA. Then let EA subtract from CD and leave remainder FC. Can we do this? (yes/no):`,
hint: `Each remainder is less than the number it came from.` },
{ q: `Now suppose CF measures AE. Is that acceptable as a step? (yes/no):`,
hint: `Eventually a remainder will measure the previous one.` },
{ q: `If CF measures AE, and AE measures DF, then does CF also measure DF? (yes/no):`,
hint: `If one number measures a second, and the second measures a third, then the first measures the third.` },
{ q: `Since CF measures itself, does it also measure the whole CD of which DF is a part? (yes/no):`,
hint: `A measure of a remainder also measures the whole.` },
{ q: `Since CD measures BE, and CF measures CD, does CF also measure BE? (yes/no):`,
hint: `A number measuring the divisor also measures the divided quantity.` },
{ q: `Since CF measures EA, does it also measure the whole BA (made of BE + EA)? (yes/no):`,
hint: `If a number measures each part, it measures the whole.` },
{ q: `Therefore, CF measures both AB and CD. Can we conclude CF is a common measure? (yes/no):`,
hint: `A number that divides both given numbers is their common measure.` },
{ q: `Next, suppose CF is not the greatest common measure. Then some greater number G would measure AB and CD. Is this the assumption? (yes/no):`,
hint: `To prove CF is greatest, assume a larger common measure exists and derive contradiction.` },
{ q: `If G measures CD, and CD measures BE, must G also measure BE? (yes/no):`,
hint: `A measure of a measure is a measure.` },
{ q: `Since G measures BA, must it also measure the remainder AE? (yes/no):`,
hint: `If G measures two numbers, it measures their difference.` },
{ q: `If G measures DF, and CD, must it then measure the remainder CF? (yes/no):`,
hint: `A common measure of a whole and part also measures the leftover part.` },
{ q: `Would that make the greater number G measure the smaller CF? (yes/no):`,
hint: `A larger number cannot divide a smaller number exactly.` },
{ q: `Since this is impossible, can we conclude no number greater than CF measures AB and CD? (yes/no):`,
hint: `The contradiction shows CF is the greatest common measure.` },
];

const conclusion = `Congratulations! You just found the greatest common measure of two given numbers.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
