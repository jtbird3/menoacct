<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.23</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.23 – Prove that a straight line commensurable with a medial straight line is medial.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.23 chatbot!

We are given a straight line A which is medial. Do you agree? (yes/no):`,
hint: `A medial straight line is one whose square is equal to a rectangle contained by rational straight lines commensurable in square only.` },
{ q: `And we are given another straight line B, commensurable with A. Is that agreed? (yes/no):`,
hint: `“Commensurable” here means commensurable in length.` },
{ q: `Our goal is to prove that B is also medial. Does that make sense? (yes/no):`,
hint: `We want to show that B satisfies the definition of a medial straight line.` },
{ q: `Let a rational straight line CD be set out. Can we do this? (yes/no):`,
hint: `A rational straight line may always be assumed as given.` },
{ q: `To CD let the rectangular area CE equal to the square on A be applied, producing ED as breadth. Is this construction possible? (yes/no):`,
hint: `By earlier propositions of Book X, a rectangle equal to a given square can be applied to a straight line.` },
{ q: `Is ED rational and incommensurable in length with CD? (yes/no):`,
hint: `This follows from Proposition X.22.` },
{ q: `Next, to CD let the rectangular area CF equal to the square on B be applied, producing DF as breadth. Is this possible? (yes/no):`,
hint: `The same construction is used as before, now with the square on B.` },
{ q: `Since A is commensurable with B, is the square on A commensurable with the square on B? (yes/no):`,
hint: `Straight lines commensurable in length have squares commensurable in area.` },
{ q: `Is EC equal to the square on A, and CF equal to the square on B? (yes/no):`,
hint: `This follows directly from how the rectangles were applied.` },
{ q: `Therefore, is EC commensurable with CF? (yes/no):`,
hint: `Each is equal to a square, and those squares are commensurable.` },
{ q: `As EC is to CF, so is ED to DF. Do you agree? (yes/no):`,
hint: `By Proposition VI.1, corresponding sides of equal rectangles are proportional.` },
{ q: `Therefore, is ED commensurable in length with DF? (yes/no):`,
hint: `By Proposition X.11, proportional magnitudes with commensurable antecedents are commensurable.` },
{ q: `But ED is rational and incommensurable in length with CD. Do you agree? (yes/no):`,
hint: `This was established earlier using Proposition X.22.` },
{ q: `Therefore, is DF also rational and incommensurable in length with CD? (yes/no):`,
hint: `By Definition 3 and Proposition X.13, properties transfer to commensurable magnitudes.` },
{ q: `Then are CD and DF rational straight lines commensurable in square only? (yes/no):`,
hint: `They are both rational, but incommensurable in length.` },
{ q: `But the straight line whose square is equal to the rectangle contained by rational straight lines commensurable in square only is medial. Do you agree? (yes/no):`,
hint: `This is exactly Proposition X.21.` },
{ q: `Is the side of the square equal to the rectangle CD, DF therefore medial? (yes/no):`,
hint: `The defining condition of a medial straight line is satisfied.` },
{ q: `And is B the side of the square equal to the rectangle CD, DF? (yes/no):`,
hint: `By construction, the square on B equals the rectangle CF, and CF corresponds to CD × DF.` },
{ q: `Therefore, is B medial? (yes/no):`,
hint: `A straight line commensurable with a medial straight line is itself medial.` },
{ q: `From this, is it manifest that an area commensurable with a medial area is also medial? (yes/no):`,
hint: `The same reasoning applies to areas as to straight lines.` }


]





const conclusion = `Congratulations! You just proved that a straight line commensurable with a medial straight line is medial.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
