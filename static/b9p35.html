<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.35</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.35 — Prove that if numbers are in continued proportion, and from the second and last equal numbers are subtracted to the first, then as the excess of the second is to the first, so is the excess of the last to all the preceding numbers</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.35 chatbot!

We are given as many numbers as we please in continued proportion: A, BC, D, EF, beginning from A as the least. Do you agree? (yes/no):`,
    hint: `Continued proportion means EF : D = D : BC = BC : A.` },

  { q: `From the second number BC and the last number EF, numbers equal to A are subtracted, namely BG and FH. Do you agree? (yes/no):`,
    hint: `BG = A and FH = A by construction.` },

  { q: `Our goal is to show that, as the excess of the second is to the first, so is the excess of the last to all those before it. Does that make sense? (yes/no):`,
    hint: `That is, as GC : A, so EH : A, BC, D.` },

  { q: `Let FK be made equal to BC, and FL equal to D. Is this allowed? (yes/no):`,
    hint: `Equal numbers may be set out equal to given numbers.` },

  { q: `Since FK = BC, and FH = BG, can we conclude that the remainder HK equals the remainder GC? (yes/no):`,
    hint: `If equals are taken from equals, the remainders are equal.` },

  { q: `Since EF is to D as D is to BC, and D = FL while BC = FK, can we say EF is to FL as FL is to FK? (yes/no):`,
    hint: `Ratios remain the same when equal numbers are substituted.` },

  { q: `And since BC to A and FK to FH are the same ratio, can we say FK to FH also fits the continued proportion? (yes/no):`,
    hint: `FH was made equal to A.` },

  { q: `Therefore, do we now have EF to FL as FL to FK as FK to FH? (yes/no):`,
    hint: `This preserves the continued proportion.` },

  { q: `Separando, can we say that EL to LF as LK to FK as KH to FH? (yes/no):`,
    hint: `By separation in proportion (Book VII, Propositions 11 and 13).` },

  { q: `From this, is it true that as one antecedent is to one consequent, so are all the antecedents to all the consequents? (yes/no):`,
    hint: `This follows from Book VII, Proposition 12.` },

  { q: `Therefore, can we say that as KH is to FH, so is EL, LK, KH to LF, FK, FH? (yes/no):`,
    hint: `All antecedents correspond to all consequents.` },

  { q: `Now, is KH equal to CG, and FH equal to A? (yes/no):`,
    hint: `These were established by construction and subtraction.` },

  { q: `Are LF, FK, FH equal respectively to D, BC, A? (yes/no):`,
    hint: `They were set equal at the beginning.` },

  { q: `Therefore, can we conclude that as CG is to A, so EH is to D, BC, A? (yes/no):`,
    hint: `Equal ratios may replace equals.` }
]






const conclusion = `Congratulations! You just proved that if numbers are in continued proportion, and from the second and last equal numbers are subtracted to the first, then as the excess of the second is to the first, so is the excess of the last to all the preceding numbers.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
