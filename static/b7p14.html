<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.14</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.14 — Prove that equal numbers taken two by two in the same ratio are in the same ratio ex aequali</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.14 chatbot!
  
We are given three numbers A, B, C, and another three numbers D, E, F, equal in multitude. Do you agree? (yes/no):`,
hint: `There are as many numbers in the first set as in the second set.` },
{ q: `Our goal is to show that if A:B = D:E and B:C = E:F, then ex aequali A:C = D:F. Does that make sense? (yes/no):`,
hint: `“Ex aequali” means we take the first to the last in each sequence when intermediate ratios match in order.` },
{ q: `We are told that as A is to B, so is D to E. Correct? (yes/no):`,
hint: `This is the first pair of equal ratios, taken two and two.` },
{ q: `From A:B = D:E, can we apply alternation to obtain A:D = B:E? (yes/no):`,
hint: `Proposition VII.13 allows conversion to the alternate ratio.` },
{ q: `We are also told that as B is to C, so is E to F. Agreed? (yes/no):`,
hint: `This is the second pair of equal ratios, continuing in order.` },
{ q: `From B:C = E:F, can we again apply alternation to obtain B:E = C:F? (yes/no):`,
hint: `VII.13 allows alternation whenever a ratio of numbers is given.` },
{ q: `If B:E = A:D and B:E = C:F, can we conclude A:D = C:F? (yes/no):`,
hint: `If two things are equal to the same thing, they are equal to one another (Common Notion 1).` },
{ q: `From A:D = C:F, do we get, by alternation, A:C = D:F? (yes/no):`,
hint: `Alternation lets us exchange positions in a proportion to compare first-to-last.` },
{ q: `Therefore, do we have the ratio ex aequali, A:C = D:F? (yes/no):`,
hint: `The “ex aequali” step links the first of the first set to the last, and likewise in the second set.` },















];

const conclusion = `Congratulations! You just proved that if equal numbers taken two by two in the same ratio are in the same ratio ex aequali.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
