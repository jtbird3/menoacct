<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.10 – Prove that if an equilateral pentagon is inscribed in a circle, then the square on the side of the pentagon is equal to the sum of the squares on the sides of the hexagon and the decagon inscribed in the same circle.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.10 chatbot!

We are given a circle ABCDE, and an equilateral pentagon ABCDE inscribed in it. Do you agree? (yes/no):`,
    hint: `All five sides of the pentagon are equal and lie on the circle.` },

  { q: `Let the center of the circle be taken, and call it point F. Is this allowed? (yes/no):`,
    hint: `Every circle has a center.` },

  { q: `Join AF and produce it through A to point G. Can we do this? (yes/no):`,
    hint: `A straight line can be produced continuously in a straight line.` },

  { q: `Join FB. Is this possible? (yes/no):`,
    hint: `A straight line can be drawn from any point to any point.` },

  { q: `From F, draw FH perpendicular to AB, and produce it to point K. Is this construction allowed? (yes/no):`,
    hint: `A perpendicular can be drawn from a point to a straight line.` },

  { q: `Join AK and KB. Can we draw these straight lines? (yes/no):`,
    hint: `Straight lines may be drawn between given points.` },

  { q: `Again, from F draw FL perpendicular to AK and produce it to M. Is this possible? (yes/no):`,
    hint: `The same perpendicular construction applies here.` },

  { q: `Join KN. Can we do this? (yes/no):`,
    hint: `A straight line can be drawn between K and N.` },

  { q: `Our goal is to show that the square on the side of the pentagon is equal to the square on the side of the hexagon together with the square on the side of the decagon. Does that make sense? (yes/no):`,
    hint: `This is exactly the statement of the proposition.` },

  { q: `Since the circumference ABCG is equal to the circumference AEDG, and the arc ABC equals the arc AED, do the remaining arcs CG and GD equal one another? (yes/no):`,
    hint: `Equals subtracted from equals leave equals.` },

  { q: `Does CD belong to the equilateral pentagon? (yes/no):`,
    hint: `CD is one side of the pentagon.` },

  { q: `Therefore, does CG belong to a decagon inscribed in the same circle? (yes/no):`,
    hint: `Equal arcs determine equal polygonal divisions of the circle.` },

  { q: `Since FA equals FB, and FH is perpendicular, are the angles AFK and KFB equal? (yes/no):`,
    hint: `In isosceles triangles, perpendiculars from the vertex bisect angles (I.5, I.26).` },

  { q: `Therefore, are the arcs AK and KB equal? (yes/no):`,
    hint: `Equal angles at the center subtend equal arcs (III.26).` },

  { q: `Hence, is AB double of BK? (yes/no):`,
    hint: `AB is composed of two equal arcs.` },

  { q: `Does it follow that AK is a side of a decagon? (yes/no):`,
    hint: `A side of a decagon subtends half the arc of a pentagon side.` },

  { q: `For the same reason, is AK double of KM? (yes/no):`,
    hint: `The same perpendicular construction applies.` },

  { q: `Since AB is double of BK and CD equals AB, is CD also double of BK? (yes/no):`,
    hint: `Things equal to the same thing are equal.` },

  { q: `Since CD is double of CG, does CG equal BK? (yes/no):`,
    hint: `Halves of equals are equal.` },

  { q: `Since BK is double of KM, is CG also double of KM? (yes/no):`,
    hint: `Substitution preserves equality.` },

  { q: `Since CB equals BA, is CB also double of BK? (yes/no):`,
    hint: `CB is another side of the equilateral pentagon.` },

  { q: `Therefore, is the whole arc GB double of BM? (yes/no):`,
    hint: `GB is composed of CB and CG.` },

  { q: `Hence, is the angle GFB double of the angle BFM? (yes/no):`,
    hint: `Angles at the center are proportional to arcs (VI.33).` },

  { q: `Is the angle GFB also double of the angle FAB, since FAB equals ABF? (yes/no):`,
    hint: `Base angles in isosceles triangles are equal.` },

  { q: `Therefore, is angle BFN equal to angle FAB? (yes/no):`,
    hint: `Equal doubles imply equality of halves.` },

  { q: `Since angle ABF is common to triangles ABF and BFN, are the remaining angles AFB and BNF equal? (yes/no):`,
    hint: `If two angles are equal and one angle is common, the third angles are equal (I.32).` },

  { q: `Therefore, are triangles ABF and BFN equiangular? (yes/no):`,
    hint: `All corresponding angles are equal.` },

  { q: `From this, is AB to BF as BF is to BN? (yes/no):`,
    hint: `Equiangular triangles give proportional sides (VI.4).` },

  { q: `Therefore, is the rectangle AB, BN equal to the square on BF? (yes/no):`,
    hint: `Rectangle contained by extremes equals square on mean (VI.17).` },

  { q: `Since AL equals LK, and LN is common and perpendicular, are the bases KN and AN equal? (yes/no):`,
    hint: `Right triangles with equal sides give equal bases (I.4).` },

  { q: `Therefore, is angle LKN equal to angle LAN? (yes/no):`,
    hint: `Equal sides subtend equal angles.` },

  { q: `But is angle LAN equal to angle KBN? (yes/no):`,
    hint: `These are corresponding angles in the construction.` },

  { q: `Hence, is angle LKN equal to angle KBN? (yes/no):`,
    hint: `Things equal to the same thing are equal.` },

  { q: `Since angle at A is common to triangles AKB and AKN, are the remaining angles AKB and KNA equal? (yes/no):`,
    hint: `Subtracting equals from equals (I.32).` },

  { q: `Therefore, are triangles KBA and KNA equiangular? (yes/no):`,
    hint: `All corresponding angles are equal.` },

  { q: `From this, is BA to AK as AK is to AN? (yes/no):`,
    hint: `Equiangular triangles imply proportional sides (VI.4).` },

  { q: `Therefore, is the rectangle BA, AN equal to the square on AK? (yes/no):`,
    hint: `Rectangle equals square on mean (VI.17).` },

  { q: `Since the rectangle AB, BN equals the square on BF, and the rectangle BA, AN equals the square on AK, is the square on BA equal to the square on BF together with the square on AK? (yes/no):`,
    hint: `Rectangle AB, BN plus rectangle BA, AN equals square on BA (II.2).` },

  { q: `Is BA the side of the pentagon, BF the side of the hexagon, and AK the side of the decagon? (yes/no):`,
    hint: `These identifications were established earlier.` },

  { q: `Therefore, is the square on the side of the pentagon equal to the squares on the sides of the hexagon and the decagon inscribed in the same circle? (yes/no):`,
    hint: `This is exactly what was to be demonstrated.` }
]

const conclusion = `Congratulations! You just proved that if an equilateral pentagon is inscribed in a circle, then the square on the side of the pentagon is equal to the sum of the squares on the sides of the hexagon and the decagon inscribed in the same circle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
