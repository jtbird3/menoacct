<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.24 — You just proved that if two numbers are prime to a third, their product is also prime to that number</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.24 chatbot!

We are given two numbers A and B, and each of them is prime to a number C. Do you agree? (yes/no):`,
    hint: `“Prime to” means they share no common measure with C.` },

  { q: `Our goal is to show that the product AB (the number D) is also prime to C. Does that make sense? (yes/no):`,
    hint: `We want to show that C and D have no common measure.` },

  { q: `Let A multiplied by B make the number D. Acceptable? (yes/no):`,
    hint: `D = A×B.` },

  { q: `Assume for contradiction that C and D are not prime to one another. Reasonable? (yes/no):`,
    hint: `Then they share some common measure.` },

  { q: `If C and D share a common measure, may we call that common measure E? (yes/no):`,
    hint: `“Measure” means “divides both numbers.”` },

  { q: `Since C and A are prime to one another, and E measures C, can we say E does not measure A? (yes/no):`,
    hint: `If E measured A, A and C would not be prime.` },

  { q: `Thus A and E are prime to one another. Agreed? (yes/no):`,
    hint: `If E divides C but not A, then A and E share no common measure.` },

  { q: `As many times as E measures D, let us draw F containing that same number of units? (yes/no):`,
    hint: `This defines F so that E×F = D.` },

  { q: `Does F then measure D according to the units in E? (yes/no):`,
    hint: `If E measures D a certain number of times, F expresses that count.` },

  { q: `Therefore, is it correct that E multiplied by F makes D? (yes/no):`,
    hint: `By definition of multiplication and measurement.` },

  { q: `But A multiplied by B also makes D. True? (yes/no):`,
    hint: `D = AB by construction.` },

  { q: `If E and F multiplied equals A and B multiplied, may we say the four numbers E, A, B, F are proportional? (yes/no):`,
    hint: `If the product of the extremes equals the product of the means, the four numbers are proportional.` },

  { q: `Therefore, is E to A as B is to F? (yes/no):`,
    hint: `Equal products imply proportionality.` },

  { q: `Since A and E are prime to one another, do they form the least numbers in their ratio? (yes/no):`,
    hint: `Numbers prime to one another are the least among those with the same ratio.` },

  { q: `If A and E are the least in their ratio, must they also “measure” the numbers in the same ratio the same number of times (antecedent measuring antecedent, consequent measuring consequent)? (yes/no):`,
    hint: `Least numbers in the same ratio measure the corresponding numbers.` },

  { q: `Thus, does E measure B? (yes/no):`,
    hint: `If E:A = B:F and A, E are least, E must measure B.` },

  { q: `But E also measures C. Is that correct under our assumption? (yes/no):`,
    hint: `We assumed E is a common measure of C and D.` },

  { q: `If E measures both B and C, are B and C no longer prime to one another? (yes/no):`,
    hint: `If two numbers share a common measure, they are not prime.` },

  { q: `But B and C were given as prime to one another. Is this a contradiction? (yes/no):`,
    hint: `If two numbers prime to one another share a common measure, they are not prime to one another. This contradicts the original hypothesis. ` },

  { q: `Since this contradiction arose from assuming E measures C and D, must we reject that assumption? (yes/no):`,
    hint: `The assumption leads to impossibility.` },

  { q: `Therefore, does it follow that no number measures C and D? (yes/no):`,
    hint: `Rejecting the common-measure assumption means none exists.` },

  { q: `Hence, are C and D prime to one another? (yes/no):`,
    hint: `Not sharing any measure means they are prime.` }
]















;

const conclusion = `Congratulations! You just proved that if two numbers are prime to a third, their product is also prime to that number.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
