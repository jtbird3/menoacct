<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Percentages - Budgeting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Percentages - Budgeting (understanding money habits with percentages)</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Percentages - Budgeting chatbot!

We are given a person who earns money and also spends money. Do you agree? (yes/no):`,
hint: `Income is money coming in, and spending is money going out.` },

{ q: `Our goal is to understand how percentages help us judge our money habits. Does that make sense? (yes/no):`,
hint: `We want to compare changes in income and spending clearly.` },

{ q: `If a person starts earning more money, is it true that they can spend more money? (yes/no):`,
hint: `More income allows more spending, even if it is not recommended.` },

{ q: `If this month you spent $1000 more than last month, did you increase your spending? (yes/no):`,
hint: `Spending more than before means spending has grown.` },

{ q: `If spending has increased, is it reasonable to check whether income has also increased? (yes/no):`,
hint: `Income growth helps explain higher spending.` },

{ q: `Now, instead of only using dollar amounts, can we compare income and spending using percentages? (yes/no):`,
hint: `Percentages show relative change, not just raw numbers.` },

{ q: `If income grew by 14% but spending grew by 30%, did spending grow faster than income? (yes/no):`,
hint: `30% is greater than 14%.` },

{ q: `Would this difference suggest a potential problem in budgeting? (yes/no):`,
hint: `Spending rising faster than income can be risky.` },

{ q: `So do percentages help us judge whether our money habits are healthy? (yes/no):`,
hint: `They make growth rates easy to compare.` },

{ q: `Now consider housing costs. A common rule is that housing should not exceed 33% of income. Does that make sense? (yes/no):`,
hint: `This is a common budgeting guideline.` },

{ q: `Our goal is to decide whether a housing cost is reasonable using this percentage. Does that make sense? (yes/no):`,
hint: `We compare housing cost to total income.` },

{ q: `If rent is $2000, is that number alone enough to decide if it is too expensive? (yes/no):`,
hint: `The cost depends on how much income there is.` },

{ q: `Is it better to ask whether $2000 is more than 33% of your income? (yes/no):`,
hint: `The percentage comparison gives context.` },

{ q: `So does using percentages help us make smarter budgeting decisions? (yes/no):`,
hint: `Percentages relate spending directly to income.` },

{ q: `If we use percentages, can we compare income and spending clearly to know if our money habits are sustainable? (yes/no):`,
hint: `This restates the main conclusion.` },
]






const conclusion = `Congratulations! You now understand how percentages can help us understand our money habits.
Q.E.D.

Click here to continue to the next lesson: <a href="percent_sat.html">Percentages - What is a percentile? (SAT example)</a>`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  
  // Special case: step 11 (index 11) - "If rent is $2000, is that number alone enough to decide if it is too expensive?"
  // Correct answer is "no"
  if (currentStep === 11) {
    if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
      currentStep++;
      showStep();
    } else if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
      addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
    } else {
      addMessage(`Please answer 'yes' or 'no'.`, 'bot');
    }
    return;
  }
  
  // Normal logic for other steps
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
