<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.30 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.30 - Cut a given finite straight line in extreme and mean ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.30 chatbot!

We are given a finite straight line AB. Do you agree? (yes/no):`,
    hint: `A finite straight line has two endpoints; here they are A and B.` },
  { q: `Our goal is to cut AB at a point E so that AB is divided in an extreme and mean ratio so that AB : AE = AE : EB. Does that make sense? (yes/no):`,
    hint: `This means AB : AE = AE : EB, with AE the greater part.` },
  { q: `First, on AB let us describe a square ABCD. Can we do that? (yes/no):`,
    hint: `From Proposition I.46 we can construct a square on any straight line.` },
  { q: `Next, to AC apply the parallelogram CD equal in area to the square BC, and let it exceed by the figure AD similar to BC. Let the rectangle have point F on CD and point E on AD. Is this allowed? (yes/no):`,
    hint: `Proposition VI.29 allows applying a parallelogram equal to a given figure and exceeding by a similar figure. We must draw a rectangular parallelogram whose are is BC and whose remainder outside it is similar to BC (a square).` },
  { q: `Since BC is a square, is AD also a square? (yes/no):`,
    hint: `The excess figure is constructed similar to BC, and a figure similar to a square is itself a square.` },
  { q: `Because BC equals CD in area, if we subtract CE from both, do the remainders BF and AD become equal? (yes/no):`,
    hint: `Subtract equals from equals, and the remainders are equal (Common Notion 3).` },
  { q: `And since BF is also equiangular with AD, are the sides about the equal angles reciprocally proportional? (yes/no):`,
    hint: `Proposition VI.14: in equal parallelograms with equal angles, the sides about those angles are inversely proportional.` },
  { q: `From this, do we get the proportion FE : ED = AE : EB? (yes/no):`,
    hint: `The reciprocal proportion of the sides gives this equality of ratios.` },
  { q: `Is FE equal to AB, and ED equal to AE? (yes/no):`,
    hint: `From the construction, FE is exactly the extension equal to AB, and ED is the segment extending AE.` },
  { q: `If FE = AB and ED = AE, then do we get BA : AE = AE : EB? (yes/no):`,
    hint: `Substitute equal magnitudes into equal ratios.` },
  { q: `Since AB is greater than AE, is AE also greater than EB? (yes/no):`,
    hint: `In a continued proportion where AB > AE, the next term AE must exceed EB.` },
  { q: `Therefore, have we cut AB in extreme and mean ratio at E, with AE the greater segment? (yes/no):`,
    hint: `This matches the definition: AB : AE = AE : EB, with AE > EB.` }
];

const conclusion = `Congratulations! You just cut a given finite straight line in extreme and mean ratio.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
