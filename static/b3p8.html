<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.8 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.8 - If two chords in a circle cut one another, the rectangle contained by the segments of one equals the rectangle contained by the segments of the other.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the Euclid's Elements III.8 chatbot!

We are given a circle with center M, and a point D taken outside it. Do you agree? (yes/no):`,
    hint: `D lies outside the circumference of circle ABC.` },
  { q: `Let us draw several straight lines from D to the circle: DA through the center, and also DE, DF, DC where the lines lie on the concave (far) side, and take points DG, DK, DL, and DH, respectively, where each of these lines lie on the convex (near) side. Does that make sense? (yes/no):`,
    hint: `DA passes through the center; others are arbitrary lines from D to the circumference.` },
  { q: `Our goal is to prove:
On the concave circumference, DA is greatest, DE > DF, DF > DC.
On the convex circumference, DG is least, DK < DL, DL < DH.
And only two equal straight lines fall on each side of DG.
Does that make sense? (yes/no):`,
    hint: `We want to order the lengths of the drawn lines according to position.` },
  { q: `Now, from the center of the circle, M, let us connect ME, MF, MC, MH, ML, MK. is this possible?`,
    hint: `Postulate 1 allows connecting any two points with a straight line.` },
  { q: `Since AM = EM (radii), and adding MD to each, is AD equal to EM + MD? (yes/no):`,
    hint: `Add equals to equals, the wholes are equal (Common Notion 2).` },
  { q: `Are EM + MD greater than ED? (yes/no):`,
    hint: `In triangle EMD, the sum of two sides is greater than the third (I.20).` },
  { q: `Therefore, is AD greater than ED? (yes/no):`,
    hint: `If AD = EM + MD and EM + MD > ED, then AD > ED.` },
  { q: `Since ME = MF and MD is common, do we have EM + MD = FM + MD? (yes/no):`,
    hint: `Equal sides plus a common side yield equal sums.` },
  { q: `And since ∠EMD > ∠FMD, is ED > FD? (yes/no):`,
    hint: `If two triangles have two sides equal but the included angle in one greater, then the third side is greater (I.24).` },
  { q: `By the same reasoning, is FD > CD? (yes/no):`,
    hint: `Repeating the comparison shows ordering of the lines.` },
  { q: `So, on the concave side, is DA greatest, with DE > DF > DC? (yes/no):`,
    hint: `This orders the inequalities we just discovered for the lines on the concave circumference.` },
  { q: `Now, consider the convex side. Since MK + KD > MD and MG = MK, is KD > GD? (yes/no):`,
    hint: `If we subtract equals (MK , MG) from the inequality, we get KD > GD.` },
  { q: `Also, in triangle MLD, with MK and KD meeting inside, are ML + LD > MK + KD? (yes/no):`,
    hint: `In any triangle, two sides are less than the sum of the other two (I.21).` },
  { q: `Therefore, if MK = ML, does it follow  that KD < LD? (yes/no):`,
    hint: `Subtracting equals from ML + LD > MK + KD shows DK is shorter than DL.` },
  { q: `Similarly, can we show DH > DL? (yes/no):`,
    hint: `By repeating the same reasoning with successive points, we get DH > DL.` },
  { q: `Therefore, on the convex side, is DG the shortest, with DK < DL < DH? (yes/no):`,
    hint: `This orders the lines to the convex circumference.` },
  { q: `Finally, let's construct angle DMB equal to angle KMD, and join DB. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows joining; Postulate 4 permits angle construction.` },
  { q: `With MK = MB and MD common, and ∠KMD = ∠BMD, do triangles KMD and BMD have two sides and included angle equal? (yes/no):`,
    hint: `SAS (I.4) gives triangle equality.` },
  { q: `Therefore, is DK = DB? (yes/no):`,
    hint: `Bases of equal triangles are equal.` },
  { q: `Can any other line from D be equal to DK besides DB? (yes/no):`,
    hint: `Suppose another line DN; it leads to contradiction with earlier ordering.` },
  { q: `Therefore, are there only two equal straight lines from D, one on each side of DG? (yes/no):`,
    hint: `These are DK and DB, symmetric about DG.` }
];

const conclusion = `Congratulations! From a point outside the circle, the line through the center is the longest on the inside curve, and the closer a line is to it, the longer it is. On the outside curve, the line through the diameter is the shortest, and the closer a line is to it, the shorter it is. And only two equal lines can be drawn, one on each side of the shortest.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
