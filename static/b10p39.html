<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.39</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.39 - Prove that if two straight lines incommensurable in square, whose squares have a rational sum but whose rectangle is medial, are added together, the whole straight line is irrational; let it be called major.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.39 chatbot!

We are given two straight lines AB and BC. Do you agree? (yes/no):`,
hint: `These are the two lines mentioned in the proposition.` },
{ q: `AB and BC are incommensurable in square. Is that part of the given conditions? (yes/no):`,
hint: `“Incommensurable in square” means their squares have no common measure.` },
{ q: `The sum of the squares on AB and BC is rational. Is that given? (yes/no):`,
hint: `This is stated directly in the proposition.` },
{ q: `The rectangle contained by AB and BC is medial. Is that also given? (yes/no):`,
hint: `A medial rectangle arises from medial magnitudes (Book X).` },
{ q: `Our goal is to show that the straight line AC, formed by adding AB and BC, is irrational. Does that make sense? (yes/no):`,
hint: `AB and BC are placed end to end to form AC.` },

{ q: `Since the rectangle AB, BC is medial, is twice the rectangle AB, BC also medial? (yes/no):`,
hint: `Medial magnitudes remain medial when doubled.` },
{ q: `The sum of the squares on AB and BC is rational. Do we still assume this? (yes/no):`,
hint: `This condition continues to hold throughout the proof.` },
{ q: `Is twice the rectangle AB, BC incommensurable with the sum of the squares on AB and BC? (yes/no):`,
hint: `A medial magnitude is incommensurable with a rational one.` },
{ q: `The square on AC is equal to the sum of the squares on AB and BC together with twice the rectangle AB, BC. Is that correct? (yes/no):`,
hint: `This follows from the identity in II.4 for the square on a sum of two straight lines.` },
{ q: `Since this square on AC includes a magnitude incommensurable with the rational sum of squares, is the square on AC itself irrational? (yes/no):`,
hint: `A magnitude which is incommensurable with a rational one cannot itself be rational.` },
{ q: `If the square on AC is irrational, does it follow that AC itself is irrational? (yes/no):`,
hint: `By Definition X.4, a straight line is irrational if its square is irrational.` },

{ q: `Therefore, is AC an irrational straight line? (yes/no):`,
hint: `This completes the demonstration.` },
{ q: `And is this irrational straight line called major? (yes/no):`,
hint: `The name is assigned by definition in the proposition.` }

]





const conclusion = `Congratulations! You just proved that if two straight lines incommensurable in square, whose squares have a rational sum but whose rectangle is medial, are added together, the whole straight line is irrational; let it be called major.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
