<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.14 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.14 - Prove that in equal and equiangular parallelograms, the sides about the equal angles are reciprocally proportional; and that equiangular parallelograms whose sides about the equal angles are reciprocally proportional are equal.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.14 chatbot!

We are given two equal and equiangular parallelograms, AFBD and BECG, having the angles at B equal. Their sides DB, BE are in a straight line, so also FB, BG lie in a straight line. Do you agree? (yes/no):`,
    hint: `Each parallelogram has the same area and shares the same angle B.` },
  { q: `Our goal is to show that in AB and BC the sides about the equal angles are reciprocally proportional—that is, as DB : BE = GB : BF. Does that make sense? (yes/no):`,
    hint: `“Reciprocally proportional” means one ratio equals the inverse of the other.` },
  { q: `Let us complete the parallelogram FE on the same straight line. Can we do that? (yes/no):`,
    hint: `By Postulate 1, a straight line can be drawn from any point to any point; the figure can be completed as a parallelogram.` },
  { q: `Since parallelogram AB equals parallelogram BC, and FE is another area, is it true that as AB is to FE, so is BC to FE? (yes/no):`,
    hint: `From V.7—equal magnitudes have equal ratios to the same third.` },
  { q: `But also, as AB : FE :: DB : BE, and as BC : FE :: GB : BF, can we conclude that DB : BE :: GB : BF? (yes/no):`,
    hint: `From V.11 — ratios equal to the same ratio are equal to each other.` },
  { q: `Therefore, in the equal and equiangular parallelograms AB, BC, are the sides about the equal angles reciprocally proportional? (yes/no):`,
    hint: `Yes—DB : BE equals GB : BF inversely.` },
  { q: `Now, let it be given that GB : BF :: DB : BE. Do you agree? (yes/no):`,
    hint: `Assume the reciprocal proportion to prove the areas equal.` },
  { q: `Our goal is to prove that AB = BC. Does that make sense? (yes/no):`,
    hint: `We will reverse the argument to deduce equal areas from reciprocal proportion.` },
  { q: `Since DB : BE :: GB : BF, and also DB : BE :: AB : FE, while GB : BF :: BC : FE, can we say AB : FE :: BC : FE? (yes/no):`,
    hint: `From V.11 again—ratios equal to the same are equal to one another.` },
  { q: `And if AB : FE :: BC : FE, is it true that the parallelogram AB equals the parallelogram BC? (yes/no):`,
    hint: `From V.9—magnitudes with the same ratio to the same magnitude are equal.` }
];

const conclusion = `Congratulations! You just proved that in equal and equiangular parallelograms, the sides about the equal angles are reciprocally proportional; and that equiangular parallelograms whose sides about the equal angles are reciprocally proportional are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
