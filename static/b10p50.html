<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.50</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.50 – Find the third binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.50 chatbot!

We are given two numbers AC and CB, arranged so that their sum AB has to BC the ratio which a square number has to a square number, but does not have to AC such a ratio. Do you agree? (yes/no):`,
    hint: `AB is the sum of AC and CB, and its ratios are specified by the proposition.` },
    
    { q: `Our goal is to find a third binomial straight line. Does that make sense? (yes/no):`,
    hint: `A third binomial is a special kind of binomial straight line defined in Book X.` },
    
    { q: `Next, we are given another number D, which is not square, and which does not have to either BA or AC the ratio which a square number has to a square number. Agreed? (yes/no):`,
    hint: `D is chosen so that none of its ratios with BA or AC are square-number ratios.` },
    
    { q: `Now let a rational straight line E be set out. Do you agree? (yes/no):`,
    hint: `E is assumed rational by construction.` },
    
    { q: `Let it be contrived that, as D is to AB, so is the square on E to the square on FG. Is this construction allowed? (yes/no):`,
    hint: `This follows from Proposition X.6 (porism).` },
    { q: `From this, is the square on E commensurable with the square on FG? (yes/no):`,
    hint: `Equality of ratio with numbers gives commensurability of the squares (X.6).` },
    { q: `Since E is rational, does it follow that FG is also rational? (yes/no):`,
    hint: `A square commensurable with a rational square is rational, hence its side is rational.` },
    { q: `Since D does not have to AB the ratio which a square number has to a square number, does it follow that the square on E does not have to the square on FG such a ratio? (yes/no):`,
    hint: `Because E²:FG² was made equal to D:AB, it inherits the same “not a square-number ratio” character.` },
    { q: `Therefore, is E incommensurable in length with FG? (yes/no):`,
    hint: `By Proposition X.9.` },
    
    { q: `Next, let it be contrived that, as BA is to AC, so is the square on FG to the square on GH. Can we do this? (yes/no):`,
    hint: `Again, this follows from Proposition X.6 (porism).` },
    { q: `Does it follow that the square on FG is commensurable with the square on GH? (yes/no):`,
    hint: `Squares having a ratio equal to a number-to-number ratio are commensurable (X.6).` },
    { q: `Since FG is rational, does it follow that GH is also rational? (yes/no):`,
    hint: `Commensurability of squares with a rational square makes the other square rational, hence the side rational.` },
    { q: `Since BA does not have to AC the ratio which a square number has to a square number, does it follow that FG is incommensurable in length with GH? (yes/no):`,
    hint: `Apply Proposition X.9 to the squares FG² and GH².` },
    
    { q: `Therefore, are FG and GH rational straight lines commensurable in square only? (yes/no):`,
    hint: `They are rational, their squares are commensurable, but they are incommensurable in length.` },
    { q: `Does it follow that FH is binomial? (yes/no):`,
    hint: `By Proposition X.36, the sum of two such lines is binomial.` },
    
    { q: `I say next that FH is also a third binomial straight line. Does that make sense? (yes/no):`,
    hint: `Additional properties must now be shown.` },
    
    { q: `Since, as D is to AB, so is the square on E to the square on FG, and as BA is to AC, so is the square on FG to the square on GH, can we conclude ex aequali that as D is to AC, so is the square on E to the square on GH? (yes/no):`,
    hint: `By V.22 (ex aequali): D:AB = E²:FG² and AB:AC = FG²:GH², hence D:AC = E²:GH².` },
    { q: `Since D does not have to AC the ratio which a square number has to a square number, does it follow that E is incommensurable in length with GH? (yes/no):`,
    hint: `Because E²:GH² equals D:AC, which is not a square-number ratio; apply X.9.` },
    
    { q: `Since, as BA is to AC, so is the square on FG to the square on GH, is the square on FG greater than the square on GH? (yes/no):`,
    hint: `Because AB > AC (since AB = AC + CB), the corresponding antecedent FG² is greater than GH².` },
    { q: `Let the square on K be equal to the excess by which the square on FG exceeds the square on GH. Is this construction acceptable? (yes/no):`,
    hint: `Since FG² > GH², the difference FG² − GH² can be set out as the square on some straight line K.` },
    { q: `By convertendo, can we say that as AB is to BC, so is the square on FG to the square on K? (yes/no):`,
    hint: `From AB:AC = FG²:GH², conversion gives AB:CB = FG²:(FG²−GH²) = FG²:K².` },
    { q: `Since AB has to BC the ratio which a square number has to a square number, does the square on FG also have to the square on K such a ratio? (yes/no):`,
    hint: `Because FG²:K² equals AB:BC, it inherits the square-number ratio property.` },
    { q: `Does it follow that FG is commensurable in length with K? (yes/no):`,
    hint: `By Proposition X.9.` },
    { q: `Therefore, is the square on FG greater than the square on GH by the square on a straight line commensurable with FG? (yes/no):`,
    hint: `FG² = GH² + K², and K is commensurable in length with FG.` },
    
    { q: `Since FG and GH are rational straight lines commensurable in square only, and neither is commensurable in length with E, does it follow that FH is a third binomial straight line? (yes/no):`,
    hint: `It is binomial (FG,GH), the greater square exceeds the lesser by a square on a line commensurable with the greater, and the greater term is incommensurable in length with the given rational line E—matching the defining marks of the third binomial.` },
    
    { q: `Therefore, have we found the third binomial straight line FH? (yes/no):`,
    hint: `All required conditions have now been satisfied.` }
]

const conclusion = `Congratulations! You just found the third binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
