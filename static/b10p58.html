<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.58</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.58 – Prove that if an area is contained by a rational straight line and the fifth binomial, the side of the area is the irrational straight line called the side of a rational plus a medial area.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.58 chatbot!

We are given an area AC contained by a rational straight line AB and a fifth binomial straight line AD. Do you agree? (yes/no):`, hint: `AB is stated to be rational, and AD is given as a fifth binomial.` },
{ q: `AD is divided at point E into its terms, with AE the greater term and ED the lesser. Is this given? (yes/no):`, hint: `This follows directly from the definition of a fifth binomial.` },
{ q: `The same construction as in the earlier propositions is made, producing points M, N, and O. Do you accept this construction? (yes/no):`, hint: `The text explicitly says “let the same construction be made as before shown.”` },
{ q: `From this construction, is MO the side of the area AC? (yes/no):`, hint: `The text says it is “manifest” that MO is the side of AC.` },

{ q: `Our goal is to prove that MO is the side of a rational plus a medial area. Does that make sense? (yes/no):`, hint: `This is exactly what the proposition claims.` },

{ q: `Since AG is incommensurable with GE, does it follow that AH is commensurable with HE, that is, that the square on MN is commensurable with the square on NO? (yes/no):`, hint: `This uses propositions X.18, VI.1, and X.11.` },
{ q: `From this, are MN and NO incommensurable in square? (yes/no):`, hint: `If their squares are commensurable but the lines are not, they are incommensurable in square.` },

{ q: `Since AD is a fifth binomial and ED is the lesser segment, is ED commensurable in length with AB? (yes/no):`, hint: `This follows from Definition X.II.5.` },
{ q: `But AE is incommensurable with ED; therefore, is AB also incommensurable in length with AE? (yes/no):`, hint: `Things commensurable with the same thing are comparable (X.13).` },

{ q: `Is AK, that is, the sum of the squares on MN and NO, therefore medial? (yes/no):`, hint: `This follows from proposition X.21.` },

{ q: `Since DE is commensurable in length with AB, and AB is commensurable with EK, while DE is also commensurable with EF, does it follow that EF is commensurable with EK? (yes/no):`, hint: `This uses proposition X.12.` },
{ q: `Since EK is rational, is EL, that is MR, that is the rectangle contained by MN and NO, also rational? (yes/no):`, hint: `This follows from proposition X.19.` },

{ q: `Are MN and NO straight lines incommensurable in square, such that the sum of their squares is medial, but the rectangle contained by them is rational? (yes/no):`, hint: `This summarizes the results just proved.` },
{ q: `Therefore, is MO the side of a rational plus a medial area? (yes/no):`, hint: `This follows directly from proposition X.40.` },
{ q: `And since MO is the side of area AC, have we proved the proposition? (yes/no):`, hint: `MO has been shown both to be the side of AC and to have the required irrational form.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and the fifth binomial, the side of the area is the irrational straight line called the side of a rational plus a medial area.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
