<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.20 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.20 - Prove that if three magnitudes and another three are pairwise in the same ratios, then their equality or inequality holds ex aequali: if the first is greater, equal, or less than the third, so is the fourth to the sixth</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.20 chatbot!

We are given three magnitudes A, B, C, and others D, E, F, equal to them in multitude. Do you agree? (yes/no):`,
    hint: `Each set contains three magnitudes — A B C and D E F — to be compared by ratio.` },
  { q: `Our goal is to show that if A is greater than C ex aequali, then D is greater than F; if equal, equal; and if less, less. Does that make sense? (yes/no):`,
    hint: `“Ex aequali” means a chained comparison: A:B = D:E and B:C = E:F.` },
  { q: `We are told that, as A is to B, so is D to E, and as B is to C, so is E to F. Do you see this? (yes/no):`,
    hint: `This sets up the two proportional pairs — one for each set of magnitudes.` },
  { q: `And A is greater than C ex aequali. Do you agree? (yes/no):`,
    hint: `Through B, A exceeds C in the composite proportion A:B :: B:C.` },
  { q: `If A is greater than C, does A have to B a greater ratio than C has to B? (yes/no):`,
    hint: `Proposition V.8: the greater of two magnitudes has the greater ratio to the same third.` },
  { q: `Since A:B is greater than C:B, and A:B :: D:E while C:B (inversely) :: F:E, can we say D:E is greater than F:E? (yes/no):`,
    hint: `By Proposition V.13, corresponding equal/greater ratios preserve inequality.` },
  { q: `If D:E is greater than F:E, is D greater than F? (yes/no):`,
    hint: `Proposition V.10: of magnitudes with a ratio to the same, the one with the greater ratio is greater.` },
  { q: `So, when A > C, we find D > F. (yes/no):`,
    hint: `The “greater, equal, less” relation carries through the proportional correspondence.` },
  { q: `Similarly, if A = C, will D = F? (yes/no):`,
    hint: `Equal magnitudes yield equal ratios; the equality transfers through the chain.` },
  { q: `And if A < C, will D < F? (yes/no):`,
    hint: `By the same reasoning, the lesser yields the lesser.` }
];

const conclusion = `Congratulations! You just proved if three magnitudes and another three are pairwise in the same ratios, then their equality or inequality holds ex aequali: if the first is greater, equal, or less than the third, so is the fourth to the sixth. Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
