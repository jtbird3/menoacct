<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.2 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.2 - Inscribe a triangle equiangular to a given triangle in a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.2 chatbot!

We are given a circle ABC, and a triangle DEF. Do you agree? (yes/no):`,
    hint: `The task is to draw a new triangle inside the circle ABC that matches the angles of DEF.` },
  { q: `Our goal is to inscribe in the circle a triangle equiangular with triangle DEF. Does that make sense? (yes/no):`,
    hint: `“Equiangular” means all three angles correspond in measure to the given triangle.` },
  { q: `Let us draw a tangent GH to the circle ABC at point A. Can we do that? (yes/no):`,
    hint: `By Proposition III.16, a straight line can be drawn touching a circle at any point.` },
  { q: `On line AH, at point A, can we construct ∠HAC equal to ∠DEF? (yes/no):`,
    hint: `By Proposition I.23, an angle equal to a given angle can be constructed on a given line at a given point.` },
  { q: `On line AG, at point A, can we construct ∠GAB equal to ∠DFE? (yes/no):`,
    hint: `Again by I.23, a second angle can be copied at a given point on a line.` },
  { q: `Now, shall we join points B and C with a straight line BC? (yes/no):`,
    hint: `By Postulate 1, a straight line can be drawn from any point to any point.` },
  { q: `Since AH is a tangent at A, and AC is drawn from the point of contact into the circle, is ∠HAC equal to ∠ABC (alternate segment)? (yes/no):`,
    hint: `Proposition III.32 states the angle between a tangent and chord equals the angle in the alternate segment.` },
  { q: `And since ∠HAC was constructed equal to ∠DEF, is ∠ABC also equal to ∠DEF? (yes/no):`,
    hint: `Equal to the same thing means equal to one another (Common Notion 1).` },
  { q: `Similarly, is ∠ACB equal to ∠DFE, since it is the alternate segment of ∠GAB? (yes/no):`,
    hint: `By the same reasoning with the tangent at A and construction of ∠GAB.` },
  { q: `Finally, if ∠ABC = ∠DEF and ∠ACB = ∠DFE, must the remaining angle ∠BAC equal the remaining ∠EDF? (yes/no):`,
    hint: `In triangles, if two angles are equal, the third must be equal too (Proposition I.32).` }
];

const conclusion = `Congratulations! You just inscribed a triangle equiangular to a given triangle in a given circle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
