<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.64</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.64 – Prove that if the square on the side of a rational plus a medial area is applied to a rational straight line, the breadth produced is the fifth binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.64 chatbot!

We are given a straight line AB which is the side of a rational plus a medial area, divided at C, with AC the greater part. Do you agree? (yes/no):`, hint: `AB is divided at C into AC and CB, and AC is stated to be the greater.` },
{ q: `A rational straight line DE is also set out. Is that correct? (yes/no):`, hint: `DE is explicitly given as rational.` },
{ q: `On DE, a parallelogram DF equal to the square on AB is applied, producing DG as its breadth. Do you agree? (yes/no):`, hint: `The area DF equals the square on AB, and DG is its breadth.` },
{ q: `Our goal is to show that DG is a fifth binomial straight line. Does that make sense? (yes/no):`, hint: `The proposition asserts DG has the definition of a fifth binomial.` },

{ q: `Since AB is the side of a rational plus a medial area, are AC and CB straight lines incommensurable in square? (yes/no):`, hint: `This follows from the definition referenced in Book X, Proposition 40.` },
{ q: `Do AC and CB make the sum of the squares on them medial? (yes/no):`, hint: `This is part of the same result in X.40.` },
{ q: `Is the rectangle contained by AC and CB rational? (yes/no):`, hint: `Again, this is stated in X.40.` },

{ q: `Since the sum of the squares on AC and CB is medial, is DL medial? (yes/no):`, hint: `The medial sum of squares corresponds to DL by the construction.` },
{ q: `Does this imply that DM is rational and incommensurable in length with DE? (yes/no):`, hint: `This follows from Book X, Proposition 22.` },

{ q: `Again, since twice the rectangle contained by AC and CB is rational, is MF rational? (yes/no):`, hint: `Twice a rational rectangle is rational.` },
{ q: `Does it follow that MG is rational and commensurable in length with DE? (yes/no):`, hint: `This follows from Book X, Proposition 20.` },

{ q: `Since DM is incommensurable in length with DE, and MG is commensurable in length with DE, is DM incommensurable in length with MG? (yes/no):`, hint: `Refer to Book X, Proposition 13.` },
{ q: `Are DM and MG rational straight lines commensurable in square only? (yes/no):`, hint: `They are rational, but incommensurable in length.` },
{ q: `From this, can we conclude that DG is a binomial straight line? (yes/no):`, hint: `This follows from the definition in Book X, Proposition 36.` },

{ q: `I say next that DG is also a fifth binomial straight line. Do you agree this is the next goal? (yes/no):`, hint: `The proposition requires the specific type of binomial.` },

{ q: `Can it be proved, as before, that the rectangle DK, KM is equal to the square on MN? (yes/no):`, hint: `Euclid states this follows by a similar construction.` },
{ q: `Is DK incommensurable in length with KM? (yes/no):`, hint: `This is part of the same argument.` },
{ q: `Does it follow that the square on DM exceeds the square on MG by the square on a straight line incommensurable with DM? (yes/no):`, hint: `See Book X, Proposition 18.` },

{ q: `Are DM and MG commensurable in square only? (yes/no):`, hint: `This was already established earlier.` },
{ q: `Is the lesser, MG, commensurable in length with DE? (yes/no):`, hint: `This was shown when MG was proved commensurable with DE.` },

{ q: `Therefore, does DG satisfy the definition of a fifth binomial straight line? (yes/no):`, hint: `A fifth binomial has these exact properties by definition.` },
]

const conclusion = `Congratulations! You just proved that if the square on the side of a rational plus a medial area is applied to a rational straight line, the breadth produced is the fifth binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
