<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.42 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.42 – Construct a parallelogram equal to a given triangle on a given straight line in a given angle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.42 chatbot!

We are given a triangle ABC and a rectilineal angle D. Do you agree? (yes/no):`,
    hint: `A rectilineal angle is simply an angle formed by two straight lines.` },
  { q: `Our goal is to construct in the angle D a parallelogram equal in area to triangle ABC. Does that make sense? (yes/no):`,
    hint: `The parallelogram should occupy the angle D and have the same area as triangle ABC.` },
  { q: `First, bisect the base BC of the triangle at point E. Is this possible? (yes/no):`,
    hint: `Proposition I.10 shows how to bisect a given straight line.` },
  { q: `Next, join point A to point E. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows us to draw a straight line from any point to any point.` },
  { q: `Now, on line EC at point E, can we construct an angle CEF equal to the given angle D? (yes/no):`,
    hint: `Proposition I.23 allows an angle to be constructed equal to a given angle at a given point.` },
  { q: `Through point A, shall we draw AG parallel to EC? (yes/no):`,
    hint: `Proposition I.31 permits drawing a line parallel to a given line through a given point.` },
  { q: `And through point C, can we draw CG parallel to EF? (yes/no):`,
    hint: `Again, by I.31, a parallel can be drawn through a given point.` },
  { q: `Then is figure FECG a parallelogram? (yes/no):`,
    hint: `Opposite sides drawn parallel produce a parallelogram.` },
  { q: `Since BE = EC, is triangle ABE equal in area to triangle AEC? (yes/no):`,
    hint: `They stand on equal bases BE and EC and are between the same parallels (I.38).` },
  { q: `So is the whole triangle ABC double the area of triangle AEC? (yes/no):`,
    hint: `It is composed of two equal triangles ABE and AEC.` },
  { q: `But is the parallelogram FECG also double the area of triangle AEC? (yes/no):`,
    hint: `They have the same base EC and lie between the same parallels (I.41).` },
  { q: `Therefore, is the parallelogram FECG equal in area to triangle ABC? (yes/no):`,
    hint: `Both are double of the same triangle AEC.` },
  { q: `And does the parallelogram FECG have angle CEF equal to the given angle D? (yes/no):`,
    hint: `By construction, ∠CEF was made equal to ∠D.` },
  { q: `Thus, have we constructed a parallelogram equal to the given triangle ABC within the given rectilineal angle D? (yes/no):`,
    hint: `Yes — this completes the construction.` }
];

const conclusion = `Congratulations, You have constructed a parallelogram equal in area to the given triangle within the given rectilineal angle!
Q.E.F. (Quod Erat Faciendum — which was to be done).`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
