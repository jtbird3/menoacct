<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.17 - Prove that if in a section of a cone a straight line is drawn from the vertex parallel to an ordinate, it will fall outside the section.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Conics 1.17 chatbot!

We are given a section of a cone whose diameter is AB. Do you agree? (yes/no):`,
hint: `The section and its diameter AB are given as the starting configuration.` },
{ q: `The vertex of the section is the point A. Is that clear? (yes/no):`,
hint: `The vertex is the endpoint of the diameter AB.` },
{ q: `Our goal is to show that a straight line drawn from point A parallel to an ordinate will fall outside the section. Does that make sense? (yes/no):`,
hint: `This is exactly the statement of the proposition.` },
{ q: `Suppose, for the sake of contradiction, that the straight line drawn from A parallel to an ordinate falls within the section, and call it AC. Do you agree to assume this temporarily? (yes/no):`,
hint: `This is a standard indirect proof (reduction to impossibility).` },
{ q: `Since point C lies on the section of the cone, can we say that C is a point taken at random on the section? (yes/no):`,
hint: `C was chosen arbitrarily on the assumed line within the section.` },
{ q: `From point C, draw a straight line within the section parallel to an ordinate. Is this allowed? (yes/no):`,
hint: `The construction follows the definition of an ordinate.` },
{ q: `Must this straight line meet the diameter AB? (yes/no):`,
hint: `By the geometry of the section, ordinates meet the diameter.` },
{ q: `According to Proposition I.7, must this line be bisected by the diameter AB? (yes/no):`,
hint: `Proposition I.7 establishes bisection by the diameter.` },
{ q: `Therefore, must AC, when continued, bisected by AB? (yes/no):`,
hint: `AC lies on the same straight line and inherits the bisection.` },
{ q: `But according to Proposition I.10, does AC, if continued, fall outside the section? (yes/no):`,
hint: `Proposition I.10 states that such a continuation cannot remain within the section.` },
{ q: `Is it impossible for a straight line to both be bisected within the section and fall outside the section when continued? (yes/no):`,
hint: `These two conclusions contradict one another.` },
{ q: `Since this contradiction arose from assuming AC falls within the section, must that assumption be false? (yes/no):`,
hint: `A false conclusion implies a false assumption.` },
{ q: `Therefore, does the straight line drawn from point A parallel to an ordinate fail to fall within the section? (yes/no):`,
hint: `This follows directly from rejecting the assumption.` },
{ q: `If it does not fall within the section, must it fall outside the section? (yes/no):`,
hint: `There is no third possibility.` },
{ q: `And since it touches the section at the vertex only, is it tangent to the section? (yes/no):`,
hint: `A line that meets a section at exactly one point is tangent.` },
]






const conclusion = `Congratulations! You just proved that if in a section of a cone a straight line is drawn from the vertex parallel to an ordinate, it will fall outside the section.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
