<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.19 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.19 - Prove that if, as a whole is to a whole, so is a part subtracted to a part subtracted, then the remainders are also in the same ratio as the wholes</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.19 chatbot!

We are given two magnitudes AB and CD. Do you agree? (yes/no):`,
    hint: `These are the “wholes” in the proportion.` },
  { q: `Let us cut off AE and CF from AB and CD respectively in equal proportions so that as AB is to CD, so is AE to CF. Can we do this? (yes/no):`,
    hint: `AE is part of AB, and CF is part of CD.` },
  { q: `Our goal is to show that the remainders EB and FD are in the same ratio as the wholes AB and CD. Does that make sense? (yes/no):`,
    hint: `We want to prove EB : FD = AB : CD.` },
  { q: `We are told that as AB is to CD, so is AE to CF. Correct? (yes/no):`,
    hint: `This is the given proportion between whole and whole, and part and part.` },
  { q: `From this, we can say alternately that as BA is to AE, DC is to CF. Do you agree? (yes/no):`,
    hint: `This follows by alternando (Book V, Prop. 16).` },
  { q: `And since magnitudes that are proportional are also proportional separando, can we say as BE is to EA, so is DF to FC? (yes/no):`,
    hint: `This is from Book V, Prop. 17 (separando).` },
  { q: `Then alternately, is BE to DF as EA to FC? (yes/no):`,
    hint: `Again by alternando (V.16).` },
  { q: `But as AE is to CF, so also is AB to CD by the given. Right? (yes/no):`,
    hint: `This repeats the original proportion given in the problem.` },
  { q: `Therefore, can we conclude that the remainder EB is to the remainder FD as the whole AB is to the whole CD? (yes/no):`,
    hint: `By combining the equal ratios through V.11, we obtain the desired conclusion.` },
  { q: `So, if magnitudes are proportional componendo, are they also proportional convertendo? (yes/no):`,
    hint: `This is the Porism—stating that the proportionality also holds when terms are inverted.` }
];

const conclusion = `Congratulations! You just proved that if as a whole is to a whole, so is a part subtracted to a part subtracted, then the remainders are also in the same ratio as the wholes.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
