<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.20 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.20 - Prove that in a circle, the angle at the center is twice the angle on the circumference standing on the same arc.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the Euclid's Elements III.20 chatbot!

We are given a circle ABC, with angle BEC at the center, and angle BAC at the circumference, both standing on the same arc BC. Do you agree? (yes/no):`,
    hint: `The central angle has its vertex at the circle’s center; the circumference angle has its vertex on the circle itself.` },
  { q: `Our goal is to prove that angle BEC is double angle BAC. Does that make sense? (yes/no):`,
    hint: `This is the classical theorem that the central angle is twice the inscribed angle on the same arc.` },
  { q: `First, join AE and produce it to a point F. Can we do this? (yes/no):`,
    hint: `Postulate 2 allows us to extend a finite straight line continuously.` },
  { q: `Since EA = EB (both radii), is ∠EAB equal to ∠EBA? (yes/no):`,
    hint: `In isosceles triangles, the base angles are equal (Proposition I.5).` },
  { q: `Therefore, are the two angles ∠EAB and ∠EBA together double of ∠EAB? (yes/no):`,
    hint: `If ∠EAB = ∠EBA, then ∠EAB + ∠EBA = 2∠EAB.` },
  { q: `Now, is ∠BEF equal to ∠EAB + ∠EBA? (yes/no):`,
    hint: `By Proposition I.32, the exterior angle of a triangle equals the sum of the two interior opposite angles.` },
  { q: `Therefore, is ∠BEF double of ∠EAB? (yes/no):`,
    hint: `Since ∠BEF = ∠EAB + ∠EBA and those two are equal, ∠BEF = 2∠EAB.` },
  { q: `Similarly, is ∠FEC double of ∠EAC? (yes/no):`,
    hint: `Apply the same reasoning on the other side of AE.` },
  { q: `Then is the whole angle BEC (made of ∠BEF + ∠FEC) double of the whole angle BAC (made of ∠EAB + ∠EAC)? (yes/no):`,
    hint: `Each part doubles its corresponding part, so the totals also satisfy doubling.` },
  { q: `Now suppose we take another point D on the circle and consider angle BDC at the circumference. Is this allowed? (yes/no):`,
    hint: `We may inscribe any angle on the same arc BC.` },
  { q: `Join DE and produce it to G. Can we do that? (yes/no):`,
    hint: `By Postulates 1 and 2, we can draw and extend lines freely.` },
  { q: `By similar reasoning, is ∠GEC double of ∠EDC? (yes/no):`,
    hint: `Use the same method with triangle DEC and its exterior angle at G.` },
  { q: `And is ∠GEB double of ∠EDB, leaving ∠BEC double of ∠BDC? (yes/no):`,
    hint: `Subtract equals from equals; the remainders are equal (Common Notion 3).` },
  { q: `Therefore, in a circle, is the angle at the center always double the angle at the circumference standing on the same arc? (yes/no):`,
    hint: `This completes the proof for all positions on the same arc.` }
];

const conclusion = `Congratulations! You just proved that the angle at the center is double the angle at the circumference on the same arc.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
