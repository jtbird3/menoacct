<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.9</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.9 – Prove that in equal pyramids with triangular bases, the bases are reciprocally proportional to the heights; and that pyramids whose bases are reciprocally proportional to their heights are equal.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.9 chatbot!

We are given two equal pyramids ABCG and DEFH, each having a triangular base. Do you agree? (yes/no):`,
    hint: `The bases are triangles ABC and DEF, and the vertices are G and H.` },

  { q: `Our goal is to show that the bases are reciprocally proportional to the heights; that is, as the base ABC is to the base DEF, so is the height of pyramid DEFH to the height of pyramid ABCG. Does that make sense? (yes/no):`,
    hint: `“Reciprocally proportional” means the base of one corresponds to the height of the other.` },

  { q: `Let the parallelepipedal solids BGML and EHQP be completed on the pyramids. Is this construction possible? (yes/no):`,
    hint: `A pyramid can be completed to a parallelepiped having the same base and height.` },

  { q: `Is the solid BGML six times the pyramid ABCG? (yes/no):`,
    hint: `A pyramid with triangular base is one-sixth of the corresponding parallelepiped.` },

  { q: `Is the solid EHQP six times the pyramid DEFH? (yes/no):`,
    hint: `The same relation holds for all such pyramids.` },

  { q: `Since pyramid ABCG equals pyramid DEFH, and BGML is six times ABCG while EHQP is six times DEFH, are the solids BGML and EHQP equal? (yes/no):`,
    hint: `Equals multiplied by the same number are equal.` },

  { q: `In equal parallelepipedal solids, are the bases reciprocally proportional to the heights? (yes/no):`,
    hint: `This is Proposition XI.34.` },

  { q: `Therefore, as the base BM is to the base EQ, is the height of solid EHQP to the height of solid BGML? (yes/no):`,
    hint: `This follows directly from XI.34.` },

  { q: `Is the ratio of base BM to base EQ the same as the ratio of triangle ABC to triangle DEF? (yes/no):`,
    hint: `Equal parallelogram bases correspond to equal triangular halves (I.34).` },

  { q: `Therefore, as triangle ABC is to triangle DEF, is the height of EHQP to the height of BGML? (yes/no):`,
    hint: `If two ratios equal a third, they are equal to one another (V.11).` },

  { q: `Is the height of solid EHQP the same as the height of pyramid DEFH? (yes/no):`,
    hint: `They share the same base and vertex line.` },

  { q: `Is the height of solid BGML the same as the height of pyramid ABCG? (yes/no):`,
    hint: `The same reasoning applies.` },

  { q: `Therefore, as the base ABC is to the base DEF, is the height of pyramid DEFH to the height of pyramid ABCG? (yes/no):`,
    hint: `Substitution of equal magnitudes preserves the ratio.` },

  { q: `Thus, in the pyramids ABCG and DEFH, are the bases reciprocally proportional to the heights? (yes/no):`,
    hint: `This completes the first direction of the proposition.` },

  { q: `Part II — Now let the bases of pyramids ABCG and DEFH be reciprocally proportional to the heights. Do you agree? (yes/no):`,
    hint: `This is the converse assumption.` },

  { q: `Our goal is to prove that pyramid ABCG equals pyramid DEFH. Does that make sense? (yes/no):`,
    hint: `We now reverse the reasoning.` },

  { q: `Let the same parallelepipedal solids BGML and EHQP be constructed as before. Is this allowed? (yes/no):`,
    hint: `The construction is identical to Part I.` },

  { q: `Since as base ABC is to base DEF, so is the height of pyramid DEFH to the height of pyramid ABCG, and as base ABC is to base DEF, so is parallelogram BM to parallelogram EQ, do these give equal ratios? (yes/no):`,
    hint: `Equal ratios to the same terms are equal (V.11).` },

  { q: `Therefore, as base BM is to base EQ, is the height of pyramid DEFH to the height of pyramid ABCG? (yes/no):`,
    hint: `This follows by substitution.` },

  { q: `Is the height of pyramid DEFH the same as the height of parallelepiped EHQP? (yes/no):`,
    hint: `They stand on the same base and vertical line.` },

  { q: `Is the height of pyramid ABCG the same as the height of parallelepiped BGML? (yes/no):`,
    hint: `The same correspondence applies.` },

  { q: `Therefore, as base BM is to base EQ, is the height of parallelepiped EHQP to the height of parallelepiped BGML? (yes/no):`,
    hint: `Equal magnitudes may be substituted in proportions.` },

  { q: `Are those parallelepipedal solids in which the bases are reciprocally proportional to the heights equal? (yes/no):`,
    hint: `This is Proposition XI.34.` },

  { q: `Therefore, is parallelepiped BGML equal to parallelepiped EHQP? (yes/no):`,
    hint: `This follows directly from XI.34.` },

  { q: `Is pyramid ABCG a sixth part of parallelepiped BGML? (yes/no):`,
    hint: `A triangular pyramid is one-sixth of its parallelepiped.` },

  { q: `Is pyramid DEFH a sixth part of parallelepiped EHQP? (yes/no):`,
    hint: `The same relation holds here.` },

  { q: `Therefore, since equal solids have equal sixth parts, is pyramid ABCG equal to pyramid DEFH? (yes/no):`,
    hint: `Equal wholes have equal corresponding parts.` }
]

const conclusion = `Congratulations! You just proved that in equal pyramids with triangular bases, the bases are reciprocally proportional to the heights; and that pyramids whose bases are reciprocally proportional to their heights are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
