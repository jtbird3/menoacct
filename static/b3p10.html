<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.10 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.10 - Prove that two circles cannot cut one another at more than two points.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the Euclid's Elements III.10 chatbot!

Our goal is to prove that two circles cannot cut one another at more than two points. Does that make sense? (yes/no):`,
    hint: `If they did, they would coincide in a way that contradicts their distinctness.` },
  { q: `Suppose, for the sake of argument, that circles ABC and DEF cut at four points: H, B, G, F. Acceptable? (yes/no):`,
    hint: `This is a reductio ad absurdum assumption (assuming more than two intersections). For the diagram, we have circle ABC and an oval DEF, which we are calling a circle, intersecting it at B, C, F, H.` },
  { q: `Let us join BH and BG, two of the chords through points of intersection. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Now, bisect BH at K and BG at L. Is this possible? (yes/no):`,
    hint: `Proposition I.10 gives bisection of a finite line.` },
  { q: `From K and L, let us draw perpendicular lines at right angles to BH and BG, extending them to the edges of both circles to make lines AKC and MNPLOE. Is this possible? (yes/no):`,
    hint: `Proposition I.11 allows a perpendicular to be drawn from a point on a line.` },
  { q: `Now, in circle ABC, does the line AC cut chord BH into two equal parts at right angles? (yes/no):`,
    hint: `By III.1 (Porism), the perpendicular bisector of a chord passes through the circle’s center.` },
  { q: `Therefore, is the center of circle ABC on line AC? (yes/no):`,
    hint: `Yes, because the perpendicular bisector identifies the center.` },
  { q: `Similarly, in the same circle ABC, does line NO (from L) cut chord BG into two equal parts at right angles? (yes/no):`,
    hint: `Again by III.1, the center lies on this line as well.` },
  { q: `Therefore, must the center of circle ABC lie at the intersection point P of AC and NO? (yes/no):`,
    hint: `Two lines meet at one point, and the center must lie on both.` },
  { q: `By the same reasoning, is P also the center of circle DEF? (yes/no):`,
    hint: `Repeating the argument with the other circle places the center at P too.` },
  { q: `By III.5, is it impossible for two circles that cut one another to have the same center? (yes/no):`,
    hint: `By III.5, two circles cannot cut one another and have the same center.` },
  { q: `But our assumption was that they cut at more than two points. Do we have a contradiction? (yes/no):`,
    hint: `No, it leads to a contradiction.` },
  { q: `Therefore, have we proven that a circle cannot cut another at more than two points? (yes/no):`,
    hint: `The contradiction shows it cannot.` }
];

const conclusion = `Congratulations! You just proved that two circles cannot cut one another at more than two points. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
