<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.12</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.12 – Prove that similar cones and cylinders are to one another in the triplicate ratio of the diameters of their bases.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.12 chatbot!

We are given two similar cones and cylinders. Do you agree? (yes/no):`,
    hint: `The proposition begins by assuming similarity of the solids.` },

  { q: `The circles ABCD and EFGH are the bases of the cones, BD and FH are the diameters of those bases, and KL and MN are the axes. Is that correct? (yes/no):`,
    hint: `These names fix the geometry of the bases and heights.` },

  { q: `Our goal is to show that the cone with base ABCD and vertex L has to the cone with base EFGH and vertex N the triplicate ratio of BD to FH. Does that make sense? (yes/no):`,
    hint: `“Triplicate ratio” means the ratio of the cubes of corresponding lengths.` },

  { q: `Suppose, for the sake of argument, that the cone ABCDL does not have to cone EFGHN the triplicate ratio of BD to FH. Is this a valid assumption for a proof by contradiction? (yes/no):`,
    hint: `Euclid often argues by assuming the contrary.` },

  { q: `Then must the cone ABCDL have that triplicate ratio either to some solid less than EFGHN or to some solid greater? (yes/no):`,
    hint: `These exhaust the possibilities.` },

  { q: `Let a square EFGH be inscribed in the circle EFGH. Is this construction allowed? (yes/no):`,
    hint: `A square can be inscribed in a circle.` },

  { q: `Is the square EFGH greater than half the circle EFGH? (yes/no):`,
    hint: `Euclid IV.6 establishes this.` },

  { q: `Now set up on the square EFGH a pyramid with the same vertex N as the cone. Can this be done? (yes/no):`,
    hint: `A pyramid may be erected on any polygonal base.` },

  { q: `Is this pyramid greater than half of the cone EFGHN? (yes/no):`,
    hint: `Its base exceeds half the base of the cone.` },

  { q: `If we now bisect the arcs EF, FG, GH, HE at points P, Q, R, S and join the straight lines, do we obtain triangles EPF, FQG, GRH, HSE? (yes/no):`,
    hint: `This follows standard polygonal subdivision.` },

  { q: `Is each of these triangles greater than half the corresponding circular segment? (yes/no):`,
    hint: `Each triangle exceeds half its segment.` },

  { q: `If pyramids are erected on each of these triangles with vertex N, is each pyramid greater than half the corresponding segment of the cone? (yes/no):`,
    hint: `The solid follows the area relation of its base.` },

  { q: `By continually bisecting, joining lines, and erecting pyramids, can we leave cone-segments smaller than the excess of cone EFGHN over solid O? (yes/no):`,
    hint: `This uses Euclid X.1 (exhaustion).` },

  { q: `Let the remaining segments be on EP, PF, FQ, QG, GR, RH, HS, SE. Is that acceptable? (yes/no):`,
    hint: `These define the final inscribed polygon.` },

  { q: `Is the pyramid with base polygon EPFQGRHS and vertex N greater than the solid O? (yes/no):`,
    hint: `The remainder exceeds O by construction.` },

  { q: `Let a pyramid be erected on ATBUCVDW with vertex L. Can we do this? (yes/no):`,
    hint: `This mirrors the earlier construction.` },

  { q: `Choose triangles LBT in the first pyramid and NFP in the second. Is this a valid correspondence? (yes/no):`,
    hint: `Corresponding parts of similar figures.` },

  { q: `Join KT and MP. Is this construction allowed? (yes/no):`,
    hint: `Straight lines may be drawn between any points.` },

  { q: `As BD is to FH, is BK to FM in the same ratio? (yes/no):`,
    hint: `Radii correspond to diameters.` },

  { q: `Does it follow that as BK is to FM, so is KL to MN? (yes/no):`,
    hint: `Substitution in equal ratios.` },

  { q: `By alternation, is BK to KL as FM to MN? (yes/no):`,
    hint: `Euclid V.16.` },

  { q: `Are the sides proportional about equal angles BKL and FMN? (yes/no):`,
    hint: `Both are right angles at the axes.` },

  { q: `Therefore, are triangles BKL and FMN similar? (yes/no):`,
    hint: `VI.6 (sides proportional about equal angles).` },

  { q: `By similar reasoning, are triangles BKT and FMP similar? (yes/no):`,
    hint: `Same proportionality and right angles.` },

  { q: `And are triangles LKT and NMP similar? (yes/no):`,
    hint: `Again by VI.6.` },

  { q: `From these similarities, are the triangles LTB and NPF equiangular and similar? (yes/no):`,
    hint: `VI.5 and VI.Def.1.` },

  { q: `Does it follow that the pyramids with bases BKT and FMP and vertices L and N are similar? (yes/no):`,
    hint: `XI.Def.9 (similar planes equal in multitude).` },

  { q: `Are similar pyramids with triangular bases in the triplicate ratio of their corresponding sides? (yes/no):`,
    hint: `XII.8.` },

  { q: `Therefore, does pyramid BKTL have to pyramid FMPN the triplicate ratio of BK to FM? (yes/no):`,
    hint: `Direct application of XII.8.` },

  { q: `By extending this to all corresponding pyramids, do the whole pyramids on ATBUCVDW and EPFQGRHS have the triplicate ratio of BD to FH? (yes/no):`,
    hint: `Euclid V.12 (composition of ratios).` },

  { q: `But by hypothesis, does the cone ABCDL also have to solid O that same triplicate ratio? (yes/no):`,
    hint: `This was the initial assumption.` },

  { q: `Is the cone greater than the pyramid contained within it? (yes/no):`,
    hint: `A solid encloses its inscribed pyramid.` },

  { q: `Does it then follow that solid O is greater than the pyramid on EPFQGRHS? (yes/no):`,
    hint: `By alternation of ratios.` },

  { q: `But was it not shown earlier that O is less than that pyramid? (yes/no):`,
    hint: `From the exhaustion construction.` },

  { q: `Is this a contradiction? (yes/no):`,
    hint: `A thing cannot be both greater and less.` },

  { q: `Therefore, can the cone ABCDL have the triplicate ratio of BD to FH to any solid less than cone EFGHN? (yes/no):`,
    hint: `First case refuted.` },

  { q: `Does this also lead to impossibility? (yes/no):`,
    hint: `By inversion of ratios.` },

  { q: `And since a cylinder on the same base and height is triple of its cone, does the same ratio hold for the cylinders? (yes/no):`,
    hint: `Euclid XII.10.` },

  { q: `Therefore, are similar cones and cylinders to one another in the triplicate ratio of the diameters of their bases? (yes/no):`,
    hint: `This is exactly what was to be proved.` }
]

const conclusion = `Congratulations! You just proved that similar cones and cylinders are to one another in the triplicate ratio of the diameters of their bases.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
