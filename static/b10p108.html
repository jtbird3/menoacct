<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.108</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.108 – Prove that if a medial area is subtracted from a rational area, the side of the remaining area becomes one of two irrational straight lines, either an apotome or a minor straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.108 chatbot!

We are given a rational area BC, from which a medial area BD is to be subtracted. Do you agree? (yes/no):`,
  hint: `BC is rational, BD is medial; these are the starting magnitudes.` },

{ q: `Our goal is to show that the side of the remaining area EC becomes either an apotome or a minor straight line. Does that make sense? (yes/no):`,
  hint: `We are examining the nature of the straight line corresponding to the remainder.` },

{ q: `Let a rational straight line FG be set out, and let there be applied to it the rectangle GH equal to BC, and let GK equal to BD be subtracted. Can we do this? (yes/no):`,
  hint: `Euclid constructs rectangles equal to given areas along rational lines.` },

{ q: `Do we then have that the remainder EC is equal to LH? (yes/no):`,
  hint: `By construction, the remainder of the rectangle corresponds to EC.` },

{ q: `Since BC is rational and BD is medial, and BC = GH, BD = GK, can we conclude GH is rational and GK is medial? (yes/no):`,
  hint: `Equal areas correspond to equal types of areas.` },

{ q: `Applied to the rational line FG, does it follow that FH is rational and commensurable in length with FG, while FK is rational and incommensurable in length with FG? (yes/no):`,
  hint: `Use Propositions X.20 and X.22 to identify commensurability from applied rational vs medial areas.` },

{ q: `Therefore, FH and FK are rational straight lines commensurable in square only; does this mean KH is an apotome and KF is its annex? (yes/no):`,
  hint: `Lines commensurable in square only define an apotome (X.73).` },

{ q: `If the square on HF is greater than the square on FK by the square on a straight line commensurable with HF, does it follow that KH is a first apotome? (yes/no):`,
  hint: `Definition III.1 classifies first apotomes.` },

{ q: `But if the square on HF is greater than the square on FK by the square on a straight line incommensurable with HF, while FH is commensurable with the rational line FG, does KH become a fourth apotome? (yes/no):`,
  hint: `Definition III.4 classifies fourth apotomes.` },

{ q: `Is the side of a rectangle contained by a rational line and a first apotome itself an apotome? (yes/no):`,
  hint: `Proposition X.91 establishes this property.` },

{ q: `Is the side of a rectangle contained by a rational line and a fourth apotome a minor straight line? (yes/no):`,
  hint: `Proposition X.94 establishes this property.` },

{ q: `Therefore, can we conclude that the side EC of the remaining area is either an apotome or a minor straight line? (yes/no):`,
  hint: `This follows directly from the classification of the remainder's side.` },
]

const conclusion = `Congratulations! You just proved that if a medial area is subtracted from a rational area, the side of the remaining area becomes one of two irrational straight lines, either an apotome or a minor straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
