<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Template — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.3 - Prove that in a line cut at random the rectangles by the whole and the parts together equal the square on the whole.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.3 chatbot!

We are given a straight line AB, cut at random at point C. Do you agree? (yes/no):`,
    hint: `This means that AB is divided into two parts, AC and CB.` },
  { q: `Our goal is to show that the rectangle contained by AB and BC is equal to the rectangle contained by AC and CB together with the square on CB. Does that make sense? (yes/no):`,
    hint: `We want to prove that AB x BC = AC x CB + CB².` },
  { q: `First, let us describe a square CDEB on the segment CB. Can we do this? (yes/no):`,
    hint: `Proposition I.46 allows a square to be drawn on any given straight line.` },
  { q: `Next, extend the side ED of the square to a point F directly beneath point A. Is this possible? (yes/no):`,
    hint: `Postulate 2 allows any finite straight line to be produced further in a straight line.` },
  { q: `Now, through point A, draw AF parallel to either CD or BE. Can we do that? (yes/no):`,
    hint: `Proposition I.31 allows a line to be drawn through a point parallel to a given straight line.` },
  { q: `From this construction, do you agree that the figure AE is the rectangle contained by AB and BC? (yes/no):`,
    hint: `AE is contained by AB and BE, and BE is equal to BC.` },
  { q: `Is the figure AD the rectangle contained by AC and CB? (yes/no):`,
    hint: `AD is contained by AC and CD, and CD is equal to CB.` },
  { q: `Is DB the square on CB? (yes/no):`,
    hint: `DB is the square we constructed on CB at the beginning.` },
  { q: `Therefore, can we conclude that the rectangle contained by AB and BC (AE) is equal to the rectangle contained by AC and CB (AD) together with the square on CB (DB)? (yes/no):`,
    hint: `The rectangle AE is made up of AD and DB.` }
];

const conclusion = `Congratulations! We have shown that the rectangle contained by AB and BC equals the rectangle contained by AC and CB together with the square on CB.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
