<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.24 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.24 - Prove that if two pairs of magnitudes have equal ratios to the same magnitudes, then the sums of the first and fifth have the same ratio to the second as the sums of the third and sixth to the fourth</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.24 chatbot!

We are given six magnitudes: AB, C, DE, F, BG, and EH. Do you agree? (yes/no):`,
    hint: `AB, C, DE, F, BG, and EH represent six magnitudes related by given ratios.` },
  { q: `We are told that AB has to C the same ratio that DE has to F. Is that understood? (yes/no):`,
    hint: `This means AB/C = DE/F.` },
  { q: `Also, BG has to C the same ratio that EH has to F. Clear? (yes/no):`,
    hint: `This means BG/C = EH/F.` },
  { q: `Our goal is to show that the sum of the first and fifth, AG, has to the second C the same ratio that the sum of the third and sixth, DH, has to the fourth F. Does that make sense? (yes/no):`,
    hint: `We must prove AG/C = DH/F.` },
  { q: `Since BG is to C as EH is to F, can we say inversely that C : BG = F : EH? (yes/no):`,
    hint: `Inverse proportion reverses the order of the terms.` },
  { q: `Now, since AB : C = DE : F, and C : BG = F : EH, can we combine these to say that AB : BG = DE : EH? (yes/no):`,
    hint: `By ex aequali (V.22), equal ratios can be linked across equal means.` },
  { q: `If magnitudes are proportional separando, will they also be proportional componendo? (yes/no):`,
    hint: `Yes—if AB : BG = DE : EH, then (AB+BG) : BG = (DE+EH) : EH (V.18).` },
  { q: `Then, is AG : GB = DH : HE? (yes/no):`,
    hint: `AG = AB + BG and DH = DE + EH by composition.` },
  { q: `But we also know BG : C = EH : F. Correct? (yes/no):`,
    hint: `This was given at the start as one of the proportional relationships.` },
  { q: `From AG : GB = DH : HE and BG : C = EH : F, can we again use ex aequali to say AG : C = DH : F? (yes/no):`,
    hint: `Combining these proportions via V.22 yields the desired ratio.` },
  { q: `So, does it follow that the sum of the first and fifth, AG, has to the second C the same ratio as the sum of the third and sixth, DH, has to the fourth F? (yes/no):`,
    hint: `Yes—that is precisely what the previous steps establish.` }
];

const conclusion = `Congratulations! You just proved that if two pairs of magnitudes have equal ratios to the same magnitudes, then the sums of the first and fifth have the same ratio to the second as the sums of the third and sixth to the fourth.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
