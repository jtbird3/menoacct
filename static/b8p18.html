<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.18</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.18 — Prove that between two similar plane numbers there is one mean proportional, and that plane numbers have the duplicate ratio of their corresponding sides</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.18 chatbot!

We are given two similar plane numbers, A and B, such that A is similar to B. Do you agree? (yes/no):`,
    hint:`Similar plane numbers have their sides proportional.` },

  { q:`Our goal is to show that (1) there is one mean proportional between A and B, and (2) A has to B the duplicate ratio of a corresponding side of A to a corresponding side of B. Does that make sense? (yes/no):`,
    hint:`Duplicate ratio means the ratio compounded twice.` },

  { q:`Let C and D be the sides of A, and E and F the sides of B. Do you accept this setup? (yes/no):`,
    hint:`A plane number is produced by multiplying its two sides.` },

  { q:`Since A and B are similar plane numbers, is C to D as E is to F? (yes/no):`,
    hint:`This is the definition of similar plane numbers (VII.Def.21).` },

  { q:`From C is to D as E is to F, can we take the alternate ratio C is to E as D is toF? (yes/no):`,
    hint:`Alternation is allowed when terms are proportional (VII.13).` },

  { q:`Since A is formed by multiplying C and D, is it true that D multiplying C gives A? (yes/no):`,
    hint:`The sides of a plane number multiply to the number.` },

  { q:`Similarly, since B is formed by multiplying E and F, is E multiplying F gives B? (yes/no):`,
    hint:`Same principle for plane number B.` },

  { q:`Now let D multiply E to produce G. Is this construction allowed? (yes/no):`,
    hint:`We may form a new number by multiplying any two numbers.` },

  { q:`Since D multiplying C gives A and D multiplying E gives G, does it follow that C is to E as A is to G? (yes/no):`,
    hint:`If a multiplier applied to two numbers produces two results, the ratios of the original numbers match the ratios of the products (VII.17).` },

  { q:`But C is to E as D is to F, so do we also have D is to F as A is to G? (yes/no):`,
    hint:`We substitute equal ratios.` },

  { q:`Next, since E multiplying D gives G and E multiplying F gives B, do we have D is to F as G is to B? (yes/no):`,
    hint:`Again from the same rule (VII.17).` },

  { q:`Since D is to F as A is to G and also D is to F as G is to B, can we conclude A is to G as G is to B? (yes/no):`,
    hint:`If two ratios are each equal to a third, they are equal to each other.` },

  { q:`If A is to G as G is to B, are A, G, B in continued proportion? (yes/no):`,
    hint:`Continued proportion means A:G = G:B.` },

  { q:`Therefore, is G a mean proportional between A and B? (yes/no):`,
    hint:`A mean proportional lies between the two numbers in continued proportion.` },

  { q:`Now, since A, G, B are in continued proportion, does A have to B the duplicate ratio of A to G? (yes/no):`,
    hint:`In continued proportion A:G = G:B, the ratio A:B is the duplicate of A:G (V.Def.9).` },

  { q:`And since A is to G as C is to E and also A is to G as D is to F, do we conclude that A to B is the duplicate of C to E (or D to F)? (yes/no):`,
    hint:`Substitute the equal ratios A:G = C:E and A:G = D:F.` },

  { q:`Therefore, have we shown that A:B is the duplicate of the ratio of a corresponding side to a corresponding side? (yes/no):`,
    hint:`The corresponding sides are C,E or D,F.` }
]













const conclusion = `Congratulations! You just proved that between two similar plane numbers there is one mean proportional, and that plane numbers have the duplicate ratio of their corresponding sides
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
