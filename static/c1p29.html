<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.29</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>
<h1>I.29 - Prove that in opposite hyperbolas a straight line is drawn through the center to meet either of the hyperbolas, then continued it will cut the other hyperbola</h1>

<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [{ q: `Welcome to Apollonius' Conics I.29 chatbot!

We are given opposite hyperbolas with transverse diameter AB and center C. Do you agree? (yes/no):`,
hint: `Opposite hyperbolas share the same center and transverse diameter.` },
{ q: `A straight line CD is drawn through the center C and meets one hyperbola at point D. Do you agree? (yes/no):`,
hint: `The line passes through C and cuts the first hyperbola at D.` },
{ q: `Our goal is to show that the same straight line CD, when continued, will also cut the other hyperbola. Does that make sense? (yes/no):`,
hint: `We want to prove CD meets both opposite branches.` },
{ q: `From point D, let ED be dropped as an ordinate to the transverse diameter AB. Can we do this? (yes/no):`,
hint: `An ordinate is drawn perpendicular to the diameter.` },
{ q: `Let AE be the segment on AB corresponding to the ordinate ED. Do you see that AE is determined? (yes/no):`,
hint: `E is the foot of the ordinate from D.` },
{ q: `Now let BF be made equal to AE on the other side of the center. Is this construction possible? (yes/no):`,
hint: `A straight line equal to a given straight line can be laid off.` },
{ q: `From point F, let FG be drawn as an ordinate to AB. Can we draw this? (yes/no):`,
hint: `Ordinates are drawn perpendicular to the diameter.` },
{ q: `Is EA equal to BF by construction? (yes/no):`,
hint: `BF was made equal to AE.` },
{ q: `Is AB common to both rectangles BE,EA and BF,FA? (yes/no):`,
hint: `Both rectangles use AB as the base line.` },
{ q: `Since EA = BF and AB is common, is rectangle BE,EA equal to rectangle BF,FA? (yes/no):`,
hint: `Rectangles with equal bases and equal heights are equal.` },
{ q: `According to Proposition I.21 of Apollonius, is rectangle BE,EA to square DE as the latus transversum is to the latus rectum? (yes/no):`,
hint: `This is the defining property of the hyperbola.` },
{ q: `Similarly, is rectangle BF,FA to square FG as the latus transversum is to the latus rectum? (yes/no):`,
hint: `The same relation holds for the opposite hyperbola.` },
{ q: `Therefore, is rectangle BE,EA to square DE as rectangle BF,FA is to square FG? (yes/no):`,
hint: `Things in the same ratio to the same thing are in the same ratio to each other.` },
{ q: `But rectangle BE,EA is equal to rectangle BF,FA. Do you agree? (yes/no):`,
hint: `This was shown earlier from equal segments.` },
{ q: `From this, does it follow that square DE is equal to square FG? (yes/no):`,
hint: `Equal ratios with equal antecedents give equal consequents.` },
{ q: `If the squares of DE and FG are equal, are the straight lines DE and FG equal? (yes/no):`,
hint: `Equal squares imply equal lengths.` },
{ q: `Is EC equal to CF, since C is the center of the hyperbolas? (yes/no):`,
hint: `The center bisects the transverse diameter.` },
{ q: `Now we have EC = CF, DE = FG, and ED is parallel to FG. Is that correct? (yes/no):`,
hint: `Ordinates are parallel by definition.` },
{ q: `Since EF is a straight line joining E and F, do these conditions satisfy Proposition VI.32 of Euclid? (yes/no):`,
hint: `Equal parallels cut off from equal halves imply collinearity.` },
{ q: `Therefore, is DG also a straight line? (yes/no):`,
hint: `The points D, G, and C lie on one straight line.` },
{ q: `Since CD passes through D and G, does the continued line CD cut the other hyperbola? (yes/no):`,
hint: `G lies on the opposite hyperbola by construction.` },



]

const conclusion = `Congratulations! You just proved that in opposite hyperbolas a straight line is drawn through the center to meet either of the hyperbolas, then continued it will cut the other hyperbola.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
