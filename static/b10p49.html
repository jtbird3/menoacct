<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.49</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.49 – Find the second binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.49 chatbot!

We are given two numbers AC and CB, set out so that their sum is AB. Do you agree? (yes/no):`,
    hint: `AB is composed of AC together with CB.` },
    { q: `AB has to BC the ratio which a square number has to a square number. Is that given? (yes/no):`,
    hint: `This is explicitly stated in the proposition.` },
    { q: `But AB does not have to AC the ratio which a square number has to a square number. Is that also given? (yes/no):`,
    hint: `This condition distinguishes the construction.` },
    { q: `We are also given a rational straight line D. Do you agree? (yes/no):`,
    hint: `A rational straight line is given by hypothesis.` },
    { q: `Let EF be commensurable in length with D. Is that assumed? (yes/no):`,
    hint: `EF is chosen commensurable in length with D.` },
    { q: `Therefore, is EF rational? (yes/no):`,
    hint: `A straight line commensurable in length with a rational straight line is rational.` },
    
    { q: `Our goal is to show that the straight line EG constructed from EF and FG is a second binomial straight line. Does that make sense? (yes/no):`,
    hint: `A second binomial has a precise definition in Book X.` },
    
    { q: `Let it be contrived that, as the number CA is to AB, so is the square on EF to the square on FG. Is this construction possible? (yes/no):`,
    hint: `By Proposition X.6, proportions of numbers can be represented by squares on straight lines.` },
    { q: `From this, is the square on EF commensurable with the square on FG? (yes/no):`,
    hint: `Equal numerical ratios imply commensurability of the corresponding squares.` },
    { q: `Therefore, is FG rational? (yes/no):`,
    hint: `A square commensurable with a rational square is rational, hence its side is rational.` },
    
    { q: `Since CA does not have to AB the ratio which a square number has to a square number, does the square on EF also fail to have to the square on FG such a ratio? (yes/no):`,
    hint: `The constructed proportion makes EF²:FG² match CA:AB, so it shares the same “not a square-number ratio” property.` },
    { q: `Therefore, is EF incommensurable in length with FG? (yes/no):`,
    hint: `By Proposition X.9, if the ratio of squares is not the ratio of square numbers, the sides are incommensurable in length.` },
    { q: `So are EF and FG rational straight lines commensurable in square only? (yes/no):`,
    hint: `Both are rational, and they are incommensurable in length, while their squares are commensurable.` },
    { q: `Does it then follow that EG is a binomial straight line? (yes/no):`,
    hint: `By Proposition X.36, the sum of two rational straight lines commensurable in square only is binomial.` },
    
    { q: `It is next to be proved that EG is a second binomial straight line. Is that our next step? (yes/no):`,
    hint: `Not every binomial is a second binomial.` },
    
    { q: `Since inversely as BA is to AC, so is the square on GF to the square on FE, is this true? (yes/no):`,
    hint: `From CA:AB = EF²:FG², inversion gives AB:CA = FG²:EF².` },
    { q: `And since BA is greater than AC, is the square on GF greater than the square on FE? (yes/no):`,
    hint: `If AB > AC, then in the equal ratio FG²:EF² = AB:AC, the antecedent FG² is greater than EF².` },
    
    { q: `Let the squares on EF and H together be equal to the square on GF. Is this construction allowed? (yes/no):`,
    hint: `Since GF² > EF², the excess GF² − EF² can be represented as the square on some straight line H.` },
    { q: `Then, convertendo, as AB is to BC, so is the square on FG to the square on H. Does this follow? (yes/no):`,
    hint: `From AB:AC = FG²:EF² and AB = AC + CB, conversion gives AB:CB = FG²:(FG² − EF²) = FG²:H².` },
    
    { q: `But AB has to BC the ratio which a square number has to a square number. Is that recalled from the givens? (yes/no):`,
    hint: `This was stated at the beginning.` },
    { q: `Therefore, does the square on FG also have to the square on H the ratio which a square number has to a square number? (yes/no):`,
    hint: `Since FG²:H² equals AB:BC, it inherits the “square-number ratio” property.` },
    { q: `Hence, is FG commensurable in length with H? (yes/no):`,
    hint: `By Proposition X.9, a square-number ratio of squares implies commensurability in length of the sides.` },
    { q: `So is the square on FG greater than the square on FE by the square on a straight line commensurable with FG? (yes/no):`,
    hint: `Because FG² = EF² + H² with H commensurable in length with FG.` },
    
    { q: `We already know that FG and FE are rational straight lines commensurable in square only. Is that correct? (yes/no):`,
    hint: `This was established when we showed EF and FG are rational and incommensurable in length, but their squares are commensurable.` },
    { q: `And EF, the lesser term, is commensurable in length with the rational straight line D. Is that given? (yes/no):`,
    hint: `EF was chosen commensurable with D at the start.` },
    
    { q: `Therefore, does it follow that EG is a second binomial straight line? (yes/no):`,
    hint: `Its terms are rational and commensurable in square only, and the square on the greater exceeds the square on the lesser by the square on a line commensurable with the greater—matching the definition of the second binomial.` }
]

const conclusion = `Congratulations! You just found the second binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
