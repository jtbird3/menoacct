<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.9</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.9 — Prove that if numbers beginning from a unit are in continued proportion, and the first after the unit is square, then all the rest are square; and if the first after the unit is cube, all the rest are cube</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.9 chatbot!

We are given as many numbers as we please, beginning from the unit, namely a list unit, A, B, C, D, E, F, and they are in continued proportion, with A (the number after the unit) being square. Do you agree? (yes/no):`,
  hint: `The list begins with 1, and each number stands to the next in the same ratio; A is stated to be a square number.` },
  { q: `Our goal is to show that all the rest of the numbers in the continued proportion are also square. Does that make sense? (yes/no):`,
    hint: `We want to prove every number after A also turns out to be square.`
  },
  { q: `We are also told that B, the third from the unit, is already known to be square, and likewise all numbers that “leave out one” (every second number after a square) are square. Do you agree this is given? (yes/no):`,
    hint: `Proposition IX.8 establishes this prior fact.`
  },
  { q: `Since A, B, C are in continued proportion, and A is square, does it follow that C is square? (yes/no):`,
    q: `Since A, B, C are in continued proportion, and A is square, does it follow that C is square? (yes/no):`,
    hint: `Proposition VIII.22 says that in three numbers in continued proportion, if the first is square, then the third is square.`
  },
  {
    q: `Next, if B, C, D are also in continued proportion, and B is square, must D also be square? (yes/no):`,
    hint: `Again, VIII.22 applies: a square first term forces a square third term.`
  },
  {
    q: `By repeating this same reasoning, do all the remaining numbers (E, F, etc.) also become square? (yes/no):`,
    hint: `Each triple in continued proportion permits the same inference.`
  },
  {
    q: `Thus, if the number after the unit is square, all the rest are also square? (yes/no):`,
    hint: `The argument has been repeated step by step for each successive number.`
  },

  // Cube-case reasoning

  {
    q: `Now suppose instead that A is cube instead of square. Our goal is to show that all the rest are also cube. Does that make sense? (yes/no):`,
    hint: `This mirrors the previous case, but now using cube results.`
  },
  {
    q: `We are told that C, the fourth from the unit, is already known to be cube, and so are all numbers that “leave out two” (unit, C, F, etc.). Acceptable? (yes/no):`,
    hint: `Proposition IX.8 gives this prior fact for cubes.`
  },
  {
    q: `Since the unit is to A as A is to B, does the unit measure A the same number of times that A measures B? (yes/no):`,
    hint: `Equal ratios mean equal numbers of measures; this is Euclid’s definition of numerical proportion.`
  },
  {
    q: `If the unit measures A by the units in it, must A measure B by the units in itself? (yes/no):`,
    hint: `This step translates “same number of times” into “A multiplies itself to produce B.”`
  },
  {
    q: `Therefore, does A by multiplying itself make B? (yes/no):`,
    hint: `A measures B exactly by its own units—meaning B = A × A.`
  },
  {
    q: `If A is cube, and a cube number by multiplying itself makes another number, is that product cube? (yes/no):`,
    hint: `Proposition IX.3 states: the product of a cube with itself is cube.`
  },
  {
    q: `Therefore, is B cube? (yes/no):`,
    hint: `B was shown to be produced by multiplying a cube number by itself.`
  },
  {
    q: `Now, since A, B, C, D are in continued proportion, and A is cube, must D also be cube? (yes/no):`,
    hint: `Proposition VIII.23: in four numbers in continued proportion, if the first is cube, the fourth is cube.`
  },
  {
    q: `By the same reasoning, are E and F (and all the rest) also cube? (yes/no):`,
    hint: `The same proportion argument repeats for each successive group of four.`
  },
  {
    q: `Thus, if the number after the unit is cube, all the rest are also cube. Do you agree? (yes/no):`,
    hint: `Each step follows from IX.3, VIII.23, and the definition of continued proportion.`
  }
]








const conclusion = `Congratulations! You just proved that if numbers beginning from a unit are in continued proportion, and the first after the unit is square, then all the rest are square; and if the first after the unit is cube, all the rest are cube.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
