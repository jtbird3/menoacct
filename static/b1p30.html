<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.30 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.30 – Prove that parallel lines are parallel to the same line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.30 chatbot!

We are given two straight lines AB and CD, each parallel to a third line EF. Do you agree? (yes/no):`,
    hint: `This is the setup — AB ∥ EF and CD ∥ EF.` },
  { q: `Our goal is to prove that AB is parallel to CD. Does that make sense? (yes/no):`,
    hint: `If two lines are parallel to the same line, they should also be parallel to each other.` },
  { q: `Let a straight line GK fall upon AB, EF, and CD. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows us to draw a straight line from any point to any point.` },
  { q: `Since GK meets the parallels AB and EF, is ∠AGK equal to ∠GHF? (yes/no):`,
    hint: `By Proposition I.29, when a line crosses parallels, alternate angles are equal.` },
  { q: `Since GK meets the parallels EF and CD, is ∠GHF equal to ∠GKD? (yes/no):`,
    hint: `Again by Proposition I.29, alternate angles with parallels are equal.` },
  { q: `But if ∠AGK = ∠GHF and ∠GHF = ∠GKD, can we conclude ∠AGK = ∠GKD? (yes/no):`,
    hint: `By Common Notion 1, things equal to the same thing are equal to one another.` },
  { q: `Are ∠AGK and ∠GKD alternate angles? (yes/no):`,
    hint: `They lie on opposite sides of GK and between AB and CD.` },
  { q: `If alternate angles are equal, can we conclude AB ∥ CD? (yes/no):`,
    hint: `This is the definition of parallel lines.` },
  { q: `Therefore AB is parallel to CD. Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`,
    hint: `Q.E.D. — which was to be demonstrated.` }
];

const conclusion = `Congratulations! You have proved that if two lines are parallel to the same straight line, they are parallel to each other!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
