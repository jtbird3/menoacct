<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.20 — Prove that in a parabola, the squares on the ordinates are proportional to the segments cut off on the diameter from the vertex.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  {
q: `Welcome to Conics I.20 chatbot!

We are given a parabola with diameter AB. Do you agree? (yes/no):`,
    hint: `The diameter is the straight line to which ordinates are drawn.` },

  { q: `On the parabola, let points C and D be taken. Do you agree? (yes/no):`,
    hint: `C and D are arbitrary points lying on the curve.` },

  { q: `From points C and D, let CE and DF be dropped as ordinates to the diameter AB. Is this understood? (yes/no):`,
    hint: `An ordinate is drawn perpendicular to the diameter.` },

  { q: `Our goal is to show that as the square on DF is to the square on CE, so FA is to AE. Does that make sense? (yes/no):`,
    hint: `We are comparing squares on ordinates with segments on the diameter from the vertex A.` },

  { q: `Let AG be the latus rectum corresponding to the ordinates to the diameter AB. Is this acceptable? (yes/no):`,
    hint: `The latus rectum is a fixed straight line associated with the parabola.` },

  { q: `According to Proposition I.11, is the square on DF equal to the rectangle contained by FA and AG? (yes/no):`,
    hint: `In a parabola, the square on an ordinate equals a rectangle applied to the diameter.` },

  { q: `Is the square on CE likewise equal to the rectangle contained by EA and AG? (yes/no):`,
    hint: `The same relation holds for every ordinate to the same diameter.` },

  { q: `From this, do we have that as sq.DF is to sq.CE, so rect.FA,AG is to rect.EA,AG? (yes/no):`,
    hint: `Each square is equal to its corresponding rectangle.` },

  { q: `According to Euclid’s Elements, Proposition VI.1, if two rectangles have the same height AG, is their ratio equal to the ratio of their bases FA and AE? (yes/no):`,
    hint: `Rectangles on equal heights are proportional to their bases.` },

  { q: `Therefore, as rect.FA,AG is to rect.EA,AG, is FA to AE? (yes/no):`,
    hint: `This follows directly from VI.1.` },

  { q: `Combining these results, can we conclude that as sq.DF is to sq.CE, so FA is to AE? (yes/no):`,
    hint: `Equal ratios may be substituted step by step.` },

  { q: `Therefore, in a parabola, are the squares on ordinates proportional to the segments of the diameter cut off from the vertex? (yes/no):`,
    hint: `This is exactly what was to be shown.` },
]







;

const conclusion = `Congratulations! You just proved that in a parabola, the squares on the ordinates are proportional to the segments cut off on the diameter from the vertex.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
