<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Principia I.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.2 - Prove that if a body moving in a plane describes equal areas in equal times about a point, then the force acting on it is directed toward that point</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [{ q: `Welcome to Apollonius's Conics I.22 chatbot!

We are given a body moving along a curved (circular) line in a plane. Do you agree? (yes/no):`,
hint: `The motion is not rectilinear but curved.` },
{ q: `We are also given a point S, to which radii are drawn from the body’s position. Do you follow? (yes/no):`,
hint: `The areas are described about point S.` },
{ q: `The areas described by these radii are proportional to the times. Do you accept this condition? (yes/no):`,
hint: `Equal times correspond to equal areas (Proposition I.1).` },
{ q: `Our goal is to show that the body is urged by a centripetal force tending toward point S. Does that make sense? (yes/no):`,
hint: `A centripetal force always points toward a fixed point.` },

{ q: `CASE 1: Point S is unmoving
Every body that moves in a curved line is deflected from a rectilinear path by some force. Do you agree? (yes/no):`,
  hint: `This follows from Law 1 of motion (a body in motion continues in motion in a straight line unless acted upon by some external force)` },
{ q: `In equal small times, the body describes equal small areas about S. Is that given? (yes/no):`,
  hint: `This restates the area–time condition.` },
{ q: `These equal areas can be represented as minimally small triangles SAB, SBC, SCD, and so on. Do you see this construction? (yes/no):`,
  hint: `Each triangle has vertex S and base on the path.` },
{ q: `At point B, the force that deflects the body acts along a line parallel to the side cC. Is this acceptable? (yes/no):`,
  hint: `By Book I, Proposition 40 of Euclid, equal triangles imply parallel directions.` },
{ q: `By Law 2, the force acts in the direction of the change of motion. Do you agree? (yes/no):`,
  hint: `Law 2 connects force with deflection.` },
{ q: `Does the line parallel to cC through B coincide with the line BS? (yes/no):`,
  hint: `Both point toward S.` },
{ q: `Likewise, at point C, the force acts along a line parallel to dD, which coincides with the line SC. Is this clear? (yes/no):`,
  hint: `The same reasoning applies at each point.` },
{ q: `Therefore, at every point of the motion, the force acts along a line tending toward S. Do you agree? (yes/no):`,
  hint: `All force directions meet at S.` },
{ q: `So the force is always directed toward the fixed point S. Is that the conclusion? (yes/no):`,
  hint:`` },

{ q: `CASE 2: The surface and point S move uniformly
Now suppose the surface, the figure, and the point S move uniformly forward in a straight line. Is this allowed? (yes/no):`,
hint: `Uniform motion does not change relative geometry.` },
{ q: `By Corollary 5 of the Laws of Motion, uniform translation does not affect the forces involved. Do you agree? (yes/no):`,
hint: `Only relative motions matter.` },
{ q: `Therefore, whether the surface and point S are at rest or move uniformly forward, the same conclusion holds. Is that correct? (yes/no):`,
hint: `The geometry and inferred force-direction are unchanged.` },

{ q: `Hence, must every body that describes areas proportional to the times about a point S is urged by a centripetal force tending toward that same point. Is that the conclusion? (yes/no):`,
hint: `Areas ∝ times implies the deflecting force always points to S.` },


]

const conclusion = `Congratulations! You just proved that if a body moving in a plane describes equal areas in equal times about a point, then the force acting on it is directed toward that point.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
