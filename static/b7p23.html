<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.23</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.23 — Prove that a divisor of a divisor of a number is also a divisor of the number</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.23 chatbot!

We are given two numbers A and B that are prime to one another. Do you agree? (yes/no):`,
  hint: `“Prime to one another” means they have no common divisor except 1.` },
{ q: `We are also given that a number C measures A. Do you accept this? (yes/no):`,
  hint: `“Measures” means C divides A exactly.` },

{ q: `Our goal is to show that C and B are also prime to one another. Does that make sense? (yes/no):`,
  hint: `We want to show C shares no common divisor with B.` },

{ q: `Suppose, for the sake of argument, that C and B are not prime to one another. May we assume this? (yes/no):`,
  hint: `A proof by contradiction begins by assuming the opposite.` },

{ q: `If C and B are not prime to one another, then some number D measures both C and B. Can you accept that? (yes/no):`,
  hint: `If two numbers are not coprime, they have a common divisor.` },

{ q: `Since D measures C, and C measures A, does D then measure A? (yes/no):`,
  hint: `A divisor of a divisor also divides the original number.` },

{ q: `And since D also measures B, does D measure both A and B? (yes/no):`,
  hint: `D divides A (through C) and divides B directly.` },

{ q: `But A and B were given to be prime to one another. Is it possible for D (greater than an unit (1)) to measure both? (yes/no):`,
  hint: `Coprime numbers have no common divisor except 1.` },

{ q: `Does this give a contradiction with the assumption that C and B were not prime to one another? (yes/no):`,
  hint: `The assumption implies a common divisor exists; the definition of “prime to one another” forbids this.` },

{ q: `Therefore, must C and B be prime to one another? (yes/no):`,
  hint: `A contradiction forces rejection of the initial assumption.` },














];

const conclusion = `Congratulations! You just proved that VII.23 — Prove that if two numbers are prime to one another, then any number that measures one of them is prime to the other.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
