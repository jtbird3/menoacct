<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.17 – In a larger of two concentric spheres, a polyhedron can be inscribed that avoids the smaller sphere.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.17 chatbot!

We are given two spheres with the same centre A, one greater and one lesser. Do you agree? (yes/no):`,
    hint: `The hypothesis states two concentric spheres about point A.` },

  { q: `Let a plane be drawn through the centre A, cutting both spheres. Is this allowed? (yes/no):`,
    hint: `Any plane through the centre of a sphere cuts it in a circle (XI. Def. 14).` },

  { q: `Do these sections form circles, one greater and one lesser, with the same centre? (yes/no):`,
    hint: `The plane passes through the common centre A.` },

  { q: `In the circle of the greater sphere, can we draw two perpendicular diameters BD and CE? (yes/no):`,
    hint: `A circle admits perpendicular diameters by elementary construction.` },

  { q: `Within the greater circle, can we inscribe an equilateral polygon with an even number of sides that does not touch the lesser circle? (yes/no):`,
    hint: `A polygon may be chosen sufficiently small so as to lie wholly outside the inner circle.` },

  { q: `Let one side of this polygon in a quadrant be BK, followed by KL, LM, ME. Do you see this setup? (yes/no):`,
    hint: `The polygon is considered quadrant by quadrant.` },

  { q: `Let KA be joined and produced beyond A, and let a line AO be erected at right angles to the plane of the circle. Is this possible? (yes/no):`,
    hint: `A perpendicular may be erected from a point to a plane (XI. 11).` },

  { q: `Do planes through AO and each of the lines BD and KN cut the sphere in great circles? (yes/no):`,
    hint: `Planes through the centre of a sphere produce great circles.` },

  { q: `Are the semicircles formed on equal diameters equal to one another? (yes/no):`,
    hint: `Semicircles on equal diameters are equal.` },

  { q: `Therefore, are the corresponding quadrants in these semicircles equal? (yes/no):`,
    hint: `Equal semicircles have equal quadrants.` },

  { q: `Can we mark off in these quadrants straight lines equal in number and length to the sides of the polygon in the original quadrant? (yes/no):`,
    hint: `Equal arcs allow equal chords to be inscribed.` },

  { q: `By joining corresponding points and drawing perpendiculars to the original plane, do we form equal perpendiculars and parallel lines? (yes/no):`,
    hint: `Equal constructions in equal figures yield equal results (I. 26, III. 27).` },

  { q: `Do these constructions form planar quadrilaterals and triangles which can serve as bases of pyramids with vertex at A? (yes/no):`,
    hint: `Lines joining parallel planes lie in single planes (XI. 7).` },

  { q: `If we repeat this construction for all sides and all quadrants, do we obtain a polyhedral solid inscribed in the greater sphere? (yes/no):`,
    hint: `The solid is composed of pyramids sharing the common vertex A.` },

  { q: `Our goal is to show that this polyhedral solid does not touch the surface of the lesser sphere. Does that make sense? (yes/no):`,
    hint: `We must show every face lies outside the lesser sphere.` },

  { q: `From the centre A, let a perpendicular be drawn to one face of the polyhedron, meeting it at X. Is this construction valid? (yes/no):`,
    hint: `A perpendicular may be drawn from a point to a plane (XI. 11).` },

  { q: `Are the distances from X to the vertices of that face equal, so that the face lies on a circle? (yes/no):`,
    hint: `Equal right triangles give equal distances (I. 47).` },

  { q: `Is the radius of this circle greater than the distance from A to the lesser sphere’s surface? (yes/no):`,
    hint: `The construction ensures the face lies farther from A than the lesser sphere.` },

  { q: `Therefore, is the perpendicular distance AX greater than any radius of the lesser sphere? (yes/no):`,
    hint: `Subtracting unequal squares yields unequal remainders.` },

  { q: `Does it follow that the face of the polyhedron cannot intersect the surface of the lesser sphere? (yes/no):`,
    hint: `A plane farther from the centre than the radius cannot meet the sphere.` },

  { q: `Since the same reasoning applies to all faces, does the entire polyhedron avoid touching the lesser sphere? (yes/no):`,
    hint: `All faces were constructed in the same manner.` },

  { q: `Therefore, given two spheres about the same centre, have we inscribed in the greater a polyhedral solid which does not touch the lesser at its surface? (yes/no):`,
    hint: `This completes the required construction.` }
]

const conclusion = `Congratulations! You just inscribed in a larger of two concentric spheres, a polyhedron can be inscribed that avoids the smaller sphere.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
