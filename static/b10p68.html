<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.68</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.68 – Prove that a straight line commensurable in length with a major straight line is itself also major.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.68 chatbot!

We are given that the straight line AB is major. Do you agree? (yes/no):`, hint: `“Major” is a named kind of irrational straight line in Book X.` },
{ q: `We are also given a straight line CD commensurable with AB. Do you agree? (yes/no):`, hint: `“Commensurable” here means there is a common measure of length (Euclid’s definition).` },

{ q: `First, let AB be divided at E, so that AE and EB are straight lines incommensurable in square, and the sum of the squares on them is rational, but the rectangle contained by them is medial. Is that the division we are taking? (yes/no):`, hint: `This is exactly the characterization used for a major straight line (X.39).` },

{ q: `Let the same construction be made as before, producing CF and FD corresponding to AE and EB (with CD corresponding to AB). Is this step accepted? (yes/no):`, hint: `The proof assumes the prior standard construction that sets up proportional corresponding segments.` },
{ q: `From the construction, we have: as AB is to CD, so AE is to CF, and EB is to FD. Do you agree? (yes/no):`, hint: `This is the stated outcome of the construction: corresponding parts are in the same ratio as the wholes.` },

{ q: `From “as AB : CD = AE : CF” and “as AB : CD = EB : FD”, can we conclude “as AE : CF = EB : FD”? (yes/no):`, hint: `If two ratios are each equal to a third ratio, then they are equal to each other (V.11).` },

{ q: `Since AB is commensurable with CD, can we conclude that AE is commensurable with CF, and EB is commensurable with FD (respectively)? (yes/no):`, hint: `This is cited as X.11: commensurability of the wholes transfers to corresponding parts in this construction.` },

{ q: `From “as AE : CF = EB : FD”, can we infer alternately that “as AE : EB = CF : FD”? (yes/no):`, hint: `This is alternation of a proportion (V.16).` },

{ q: `From “as AE : EB = CF : FD”, can we infer componendo that “as AB : BE = CD : DF”? (yes/no):`, hint: `Here AB = AE + EB and CD = CF + FD, and componendo gives (AE+EB):EB = (CF+FD):FD (V.18).` },

{ q: `From “as AB : BE = CD : DF”, can we conclude “as the square on AB : the square on BE = the square on CD : the square on DF”? (yes/no):`, hint: `If two straight lines are in ratio, their squares are in the duplicate ratio (VI.20).` },
{ q: `Similarly, can we prove that “as the square on AB : the square on AE = the square on CD : the square on CF”? (yes/no):`, hint: `The same reasoning works using AB : AE = CD : CF from the construction.` },

{ q: `From those two square-ratios, can we conclude: “as the square on AB : the squares on AE and EB = the square on CD : the squares on CF and FD”? (yes/no):`, hint: `This step combines the corresponding proportional relations for AE↔CF and EB↔FD as the text asserts.` },
{ q: `From that, can we infer alternately: “as the square on AB : the square on CD = the squares on AE and EB : the squares on CF and FD”? (yes/no):`, hint: `This is alternation again (V.16).` },

{ q: `Since AB is commensurable with CD, is the square on AB commensurable with the square on CD? (yes/no):`, hint: `Commensurable straight lines have commensurable squares.` },
{ q: `Therefore, can we conclude that the squares on AE and EB are commensurable with the squares on CF and FD (as sums), respectively? (yes/no):`, hint: `From the alternated proportion and commensurability of the antecedents, the consequents are commensurable in the same way.` },

{ q: `Since the squares on AE and EB together are rational, can we conclude the squares on CF and FD together are also rational? (yes/no):`, hint: `If two magnitudes are commensurable and one is rational, the other is rational (in Euclid’s sense).` },

{ q: `Similarly, can we conclude that twice the rectangle AE, EB is commensurable with twice the rectangle CF, FD? (yes/no):`, hint: `Corresponding rectangles formed from commensurable corresponding sides are commensurable in area (as the text states).` },
{ q: `And since twice the rectangle AE, EB is medial, can we conclude twice the rectangle CF, FD is also medial? (yes/no):`, hint: `This is cited as X.23, Por.: commensurable areas share the same classification (medial here).` },

{ q: `Now we have that CF and FD are straight lines incommensurable in square, that the sum of the squares on them is rational, and the rectangle contained by them is medial. Do you see that this matches the major criterion? (yes/no):`, hint: `These are exactly the conditions named in X.39.` },

{ q: `Our goal is to prove that CD is major. Does that make sense? (yes/no):`, hint: `If CD is composed from CF and FD in the same way AB is from AE and EB, and CF,FD meet X.39, then CD is major.` },
{ q: `Therefore, can we conclude that the whole CD is the irrational straight line called major? (yes/no):`, hint: `By X.39, a line whose parts satisfy those conditions is major.` },
{ q: `Therefore, a straight line commensurable with a major straight line is itself major. Q.E.D. (yes/no):`, hint: `This is the exact conclusion of Proposition 68.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with a major straight line is itself also major.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
