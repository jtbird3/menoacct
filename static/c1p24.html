<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>
<h1>I.24 - Prove that if a straight line meets a parabola or a hyperbola and, when produced both ways, lies outside the section, then it meets the diameter.</h1>

<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [{ q: `Welcome to Apollonius' Conics I.24 chatbot!

We are given a parabola or a hyperbola, and its diameter is the straight line AB. Do you agree? (yes/no):`,
  hint: `The diameter is a fixed straight line associated with the section.` },
{ q: `Let us draw a straight line CDE that meets the section at point D, falling outside the section in both directions. Is this possible? (yes/no):`,
  hint: `The line intersects the curve at the point D. We may draw a straight line.` },
{ q: `The straight line CDE, when continued both ways, falls outside the section. Do you agree? (yes/no):`,
  hint: `The line lies outside the curve except at the point of contact.` },
{ q: `Our goal is to show that the straight line CDE will meet the diameter AB. Does that make sense? (yes/no):`,
  hint: `We want to prove that CDE intersects AB at some point.` },
{ q: `Let us take some point F on the section. Is this possible? (yes/no):`,
  hint: `Any point on the curve may be chosen.` },
{ q: `Let us join the straight line DF. Can we do this? (yes/no):`,
  hint: `A straight line can be drawn joining any two points.` },
{ q: `According to Proposition I.22, when DF is continued, will it meet the diameter of the section (if it does not already)? (yes/no):`,
  hint: `Proposition I.22 establishes that such a line meets the diameter.` },
{ q: `Let DF, when continued, meet the diameter at point A. Do you follow this construction? (yes/no):`,
  hint: `A is defined as the intersection of DF with the diameter.` },
{ q: `Is the straight line CDE situated between the section and the straight line FDA? (yes/no):`,
  hint: `From the configuration, CDE lies between the curve and DF extended.` },
{ q: `If CDE lies between the section and FDA, does it follow that CDE, when continued, must meet the diameter outside the section? (yes/no):`,
  hint: `A line between two intersecting lines must itself intersect the diameter when extended.` },
{ q: `Therefore, have we shown that the straight line CDE, when continued both ways and falling outside the section, will meet the diameter AB? (yes/no):`,
  hint: `This is exactly what was required to be shown.` },


]

const conclusion = `Congratulations! You just proved that a straight line meets a parabola or a hyperbola and, when produced both ways, lies outside the section, then it meets the diameter.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
