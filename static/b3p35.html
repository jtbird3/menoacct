<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.35 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.35 - Prove that if two chords in a circle cut one another, the rectangle of the segments of one equals the rectangle of the segments of the other</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.35 chatbot!

We are given a circle ABCD with two chords AC and BD cutting one another at point E. Do you agree? (yes/no):`,
    hint: `A chord is any straight line drawn between two points of a circle; here AC and BD intersect at E inside the circle.` },
  { q: `Our goal is to show that AE x EC = DE x EB. Does that make sense? (yes/no):`,
    hint: `The product (rectangle) of the segments of one chord equals the product of the segments of the other.` },
  { q: `Case 1: AC and BD pass through the center.
  
First, suppose AC and BD pass through the center, so that E is the center of the circle. Is that clear? (yes/no):`,
    hint: `If both chords are diameters, then E is their midpoint, so AE = EC and DE = EB.` },
  { q: `Then is AE x EC = DE x EB in this case? (yes/no):`,
    hint: `Since AE = EC and DE = EB, the products are equal.` },
  { q: `Next, suppose AC and BD are not through the center. Let F be the center of the circle. Do you agree? (yes/no):`,
    hint: `Every circle has a unique center F.` },
  { q: `From F draw FG perpendicular to AC, and FH perpendicular to BD. Can we do this? (yes/no):`,
    hint: `From any point, a perpendicular to a line can be dropped (Postulate 12, construction).` },
  { q: `Join FB, FC, FE. Possible? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Since GF passes through the center and is perpendicular to chord AC, does it bisect AC at G? (yes/no):`,
    hint: `Proposition III.3: a diameter at right angles to a chord bisects it.` },
  { q: `So is AG = GC? (yes/no):`,
    hint: `Yes, by III.3.` },
  { q: `Now, chord AC is cut into equal parts at G and unequal parts at E. By II.5, do we have AE x EC + GE² = GC²? (yes/no):`,
    hint: `Book II.5: AE x EC + GE² = GC² when a line is cut equally at G and unequally at E.` },
  { q: `If we add the square on GF to both, do we get AE x EC + GE² + GF² = GC² + GF²? (yes/no):`,
    hint: `Adding equals to equals yields equals (Common Notion 2).` },
  { q: `But GE² + GF² = FE² and GC² + GF² = FC² by Pythagoras (I.47). Do you agree? (yes/no):`,
    hint: `Right-triangle relations in ΔFEG and ΔFGC.` },
  { q: `Therefore AE x EC + FE² = FC². Correct? (yes/no):`,
    hint: `Substitute the Pythagorean equalities.` },
  { q: `Since FC = FB (radii of the circle), can we write AE x EC + FE² = FB²? (yes/no):`,
    hint: `All radii of a circle are equal.` },
  { q: `In the same way, can we prove DE x EB + FE² = FB²? (yes/no):`,
    hint: `A symmetric argument with chord BD.` },
  { q: `So do we now have AE x EC + FE² = DE x EB + FE²? (yes/no):`,
    hint: `Both are equal to FB².` },
  { q: `Subtracting FE² from each, do we conclude AE x EC = DE x EB? (yes/no):`,
    hint: `Subtract equals from equals; the remainders are equal (Common Notion 3).` }
];

const conclusion = `Congratulations! You just proved that in a circle, if two chords cut one another, the rectangle contained by the segments of one equals the rectangle contained by the segments of the other.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
