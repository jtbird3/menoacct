<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.109</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.109 – Prove that if a rational area is subtracted from a medial area, there arise two other irrational straight lines, either a first apotome of a medial straight line or a straight line which produces with a rational area a medial whole.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.109 chatbot!

We are given a medial area BC and a rational area BD. Do you agree? (yes/no):`,
  hint: `A medial area is one whose side is commensurable in square only with a rational straight line; a rational area has sides rational.` },

{ q: `Our goal is to find the side of the remainder EC. Does that make sense? (yes/no):`,
  hint: `We want to show it is either a first apotome of a medial straight line or a straight line producing with a rational area a medial whole.` },

{ q: `Let us set out a rational straight line FG and apply areas similarly. Can we do this? (yes/no):`,
  hint: `Euclid uses a construction to represent the medial and rational areas in terms of known lengths.` },

{ q: `Then FH is rational but incommensurable in length with FG, while KF is rational and commensurable in length with FG. Do you see that? (yes/no):`,
  hint: `Applying a medial to a rational gives a rational breadth incommensurable in length (X.22), while applying a rational gives a rational breadth commensurable in length (X.20).` },

{ q: `Therefore, FH and FK are rational straight lines commensurable in square only. Agreed? (yes/no):`,
  hint: `This follows from the previous step together with X.13/X.73: rational lines, one length-incommensurable and one length-commensurable to the same rational, are commensurable in square only.` },

{ q: `Therefore, KH is an apotome, and FK is the annex to it. Do you agree? (yes/no):`,
  hint: `X.73 defines apotomes and their annexes.` },

{ q: `Now, consider the square on HF compared with the square on FK. Is it greater either by the square on a line commensurable with HF or by the square on a line incommensurable with HF? (yes/no):`,
  hint: `Euclid distinguishes two cases for the apotome construction.` },

{ q: `If the square on HF is greater than FK by a square on a line commensurable with HF, and FK is commensurable with FG, then KH is a second apotome. Do you see that? (yes/no):`,
  hint: `This is according to X, Definition III.2.` },

{ q: `But since FG is rational, is the side of LH, i.e., EC, a first apotome of a medial straight line? (yes/no):`,
  hint: `X.92 confirms this as the “second apotome ⇒ first-apotome-of-medial-side” case.` },

{ q: `But if the square on HF is greater than FK by a square on a line incommensurable with HF, while FK is commensurable with FG, is KH a fifth apotome? (yes/no):`,
  hint: `X, Definition III.5 defines the fifth apotome.` },

{ q: `Therefore, in this case, is the side of EC a straight line which produces with a rational area a medial whole? (yes/no):`,
  hint: `X.95 confirms that the remainder side generates a medial whole with a rational area.` },

{ q: `Our goal is to conclude: the side of EC is either a first apotome of a medial straight line or a straight line producing with a rational area a medial whole. Does that make sense? (yes/no):`,
  hint: `This is the final statement of Proposition 109, summarizing the two possible cases.` },
]

const conclusion = `Congratulations! You just proved that if a rational area is subtracted from a medial area, there arise two other irrational straight lines, either a first apotome of a medial straight line or a straight line which produces with a rational area a medial whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
