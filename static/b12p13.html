<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.13</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.13 – Prove that if a cylinder is cut by a plane parallel to its bases, then the two cylinders are to one another as their axes.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.13 chatbot!

We are given a cylinder AD, cut by a plane GH which is parallel to the opposite planes AB and CD. Do you agree? (yes/no):`,
    hint: `The plane GH is parallel to the bases of the cylinder.` },

  { q: `The plane GH meets the axis EF at the point K. Do you see this? (yes/no):`,
    hint: `Any plane parallel to the bases will meet the axis at a point.` },

  { q: `Our goal is to prove that, as the cylinder BG is to the cylinder GD, so is the axis EK to the axis KF. Does that make sense? (yes/no):`,
    hint: `We want a proportion between the cylinders and a matching proportion between their axes.` },

  { q: `Let the axis EF be produced in both directions to points L and M. Is this allowed? (yes/no):`,
    hint: `A straight line may be produced in a straight line.` },

  { q: `On the axis, let any number whatever of segments EN and NL be set out equal to EK, and any number whatever of segments FO and OM equal to KF. Can we do this? (yes/no):`,
    hint: `Equal straight lines may be laid off successively.` },

  { q: `Now conceive a cylinder PW on the axis LM, with bases PQ and VW. Is this construction understood? (yes/no):`,
    hint: `A cylinder is determined by its axis and circular bases.` },

  { q: `Through the points N and O, let planes be drawn parallel to AB, CD, and to the bases of cylinder PW. Is this possible? (yes/no):`,
    hint: `Planes can be drawn parallel to given planes.` },

  { q: `Do these planes produce circles RS and TU with centres at N and O? (yes/no):`,
    hint: `A plane parallel to a circular base cuts a cylinder in a circle.` },

  { q: `Since the axes LN, NE, and EK are equal to one another, do you agree? (yes/no):`,
    hint: `They were constructed to be equal.` },

  { q: `From this, are the cylinders QR, RB, and BG to one another as their bases? (yes/no):`,
    hint: `By Book XII, Proposition 11, cylinders with equal heights are in the ratio of their bases.` },

  { q: `But are the bases of these cylinders equal? (yes/no):`,
    hint: `All are circles formed by planes parallel to the same bases.` },

  { q: `Therefore, are the cylinders QR, RB, and BG equal to one another? (yes/no):`,
    hint: `Equal bases with equal heights give equal cylinders.` },

  { q: `Since the number of equal axis segments equals the number of equal cylinders, do you see that whatever multiple the axis KL is of EK, the same multiple the cylinder QG is of BG? (yes/no):`,
    hint: `Equal magnitudes taken equally many times preserve proportion.` },

  { q: `For the same reason, is it true that whatever multiple the axis MK is of KF, the same multiple the cylinder WG is of GD? (yes/no):`,
    hint: `The same construction was made on the other side.` },

  { q: `If the axis KL is equal to, greater than, or less than the axis KM, will the cylinder QG be equal to, greater than, or less than the cylinder GW respectively? (yes/no):`,
    hint: `Corresponding equimultiples preserve equality and inequality.` },

  { q: `Now, considering the four magnitudes EK, KF and BG, GD, have equimultiples been taken of each pair? (yes/no):`,
    hint: `LK and QG correspond to EK and BG; KM and GW correspond to KF and GD.` },

  { q: `And has it been shown that excess, equality, or defect of the axes implies the same for the cylinders? (yes/no):`,
    hint: `This was established by comparison of equimultiples.` },

  { q: `Therefore, by Definition 5 of Book V, does it follow that as the axis EK is to the axis KF, so is the cylinder BG to the cylinder GD? (yes/no):`,
    hint: `This is exactly the criterion for proportional magnitudes.` }
]

const conclusion = `Congratulations! You just proved that if a cylinder is cut by a plane parallel to its bases, then the two cylinders are to one another as their axes.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
