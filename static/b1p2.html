<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MenoChat — Toggle Template</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.2 — Place a straight line equal to a given straight line at a point</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.2 chatbot!

We are given a point A, and a straight line BC. Do you agree? (yes/no):`,
    hint: `Point A is where the new line will start; BC is the line we want to copy.` },
  { q: `Our goal is to draw from A a straight line equal in length to BC. Does that make sense? (yes/no):`,
    hint: `We want to "transfer" BC's length onto a line starting at A.` },
  { q: `First, join point A to point B with a straight line. Can we do that? (yes/no):`,
    hint: `Post. 1: a straight line from any point to any point.` },
  { q: `On the line AB, construct an equilateral triangle ABD. Possible? (yes/no):`,
    hint: `Prop I.1 lets us construct an equilateral triangle on any line.` },
  { q: `Next, produce (extend) DA and DB in straight lines beyond A and B. Is this possible? (yes/no):`,
    hint: `Post. 2 allows extension of a finite straight line.` },
  { q: `With center B and radius BC, draw a circle that cuts the produced line DB at G. Can we do this? (yes/no):`,
    hint: `Post. 3 allows a circle with any center and radius.` },
  { q: `Now, with center D and radius DG, draw another circle that cuts the produced line DA at L. (Possible?) (yes/no):`,
    hint: `Again Post. 3, from D with distance DG.` },
  { q: `Is DL equal to DG? (yes/no):`,
    hint: `Both are radii of the circle centered at D.` },
  { q: `If DA = DB (sides of equilateral ABD), if we subtract DB from DG and DA from DL, do we get AL = BG? (yes/no):`,
    hint: `CN3: if equals are subtracted from equals, remainders are equal.` },
  { q: `And is BC equal to BG? (yes/no):`,
    hint: `BG is a radius of the circle centered at B with radius BC.` },
  { q: `If AL = BG and BG = BC, does AL = BC? (yes/no):`,
    hint: `CN1: things equal to the same thing are equal to one another.` }
];

const conclusion = `Congratulations! You just constructed a straight line equal to a given straight line at a point. 
Q.E.F. (Quod Erat Faciendum)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
