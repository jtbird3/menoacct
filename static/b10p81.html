<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.81</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.81 – Prove that to a second apotome of a medial straight line only one medial straight line can be annexed which is commensurable with the whole in square only and which contains with the whole a medial rectangle.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.81 chatbot!

We are given a straight line AB which is a second apotome of a medial straight line. Do you agree? (yes/no):`,
  hint: `This is stated directly in the proposition.` },
{ q: `We are also given a straight line BC annexed to AB. Agreed? (yes/no):`,
  hint: `BC is said to be an annex to AB.` },
{ q: `From this, AC and CB are medial straight lines commensurable in square only. Do you agree? (yes/no):`,
  hint: `This follows from the definition of an annex to a second apotome, cited from X.75.` },
{ q: `And the rectangle contained by AC and CB is medial. Correct? (yes/no):`,
  hint: `This is explicitly stated using Proposition X.75.` },

{ q: `Our goal is to show that no other medial straight line can be annexed to AB with the same properties. Does that make sense? (yes/no):`,
  hint: `We are proving uniqueness of such an annex.` },

{ q: `Suppose, if possible, that another straight line BD is also annexed to AB. Is this our assumption? (yes/no):`,
  hint: `This is the standard method of proof by contradiction.` },
{ q: `Then AD and DB are medial straight lines commensurable in square only. Agreed? (yes/no):`,
  hint: `This mirrors the properties of AC and CB.` },
{ q: `And the rectangle contained by AD and DB is medial. Correct? (yes/no):`,
  hint: `Again, this follows from X.75.` },

{ q: `Let a rational straight line EF be set out. Is this allowed? (yes/no):`,
  hint: `A rational straight line may be taken arbitrarily.` },
{ q: `Let a rectangle equal to the squares on AC and CB be applied to EF, producing EM as breadth. Can we do this? (yes/no):`,
  hint: `This is an application of areas to a straight line.` },
{ q: `Let twice the rectangle AC, CB be subtracted, producing HM as breadth. Is this construction clear? (yes/no):`,
  hint: `The subtraction follows Book II constructions.` },
{ q: `Is the remainder EL equal to the square on AB? (yes/no):`,
  hint: `By Proposition II.7, this follows from the construction.` },
{ q: `Therefore, is AB the side of the square EL? (yes/no):`,
  hint: `A straight line is the side of the square equal to its square.` },

{ q: `Again, let a rectangle equal to the squares on AD and DB be applied to EF, producing EN as breadth. Is this analogous to the previous step? (yes/no):`,
  hint: `The same construction is repeated with AD and DB.` },
{ q: `Since EL equals the square on AB, is the remainder HI equal to twice the rectangle AD, DB? (yes/no):`,
  hint: `This again follows from II.7.` },

{ q: `Since AC and CB are medial straight lines, are the squares on AC and CB also medial? (yes/no):`,
  hint: `Medial straight lines produce medial squares.` },
{ q: `And since EG equals the squares on AC and CB, is EG medial? (yes/no):`,
  hint: `Equals taken of medials are medial (X.15, X.23).` },
{ q: `Since EG is applied to the rational straight line EF, producing EM as breadth, is EM rational and incommensurable in length with EF? (yes/no):`,
  hint: `This follows from X.22.` },

{ q: `Since the rectangle AC, CB is medial, is twice the rectangle AC, CB also medial? (yes/no):`,
  hint: `Doubling preserves mediality (X.23).` },
{ q: `And since HG equals twice the rectangle AC, CB, is HG medial? (yes/no):`,
  hint: `Equality transfers the property.` },
{ q: `Since HG is applied to EF, producing HM as breadth, is HM rational and incommensurable in length with EF? (yes/no):`,
  hint: `Again by X.22.` },

{ q: `Since AC and CB are commensurable in square only, is AC incommensurable in length with CB? (yes/no):`,
  hint: `This is the definition of “commensurable in square only.”` },
{ q: `As AC is to CB, so is the square on AC to the rectangle AC, CB. Do you agree? (yes/no):`,
  hint: `This follows from proportionality of rectangles and squares (X.11).` },
{ q: `Therefore, is the square on AC incommensurable with the rectangle AC, CB? (yes/no):`,
  hint: `Incommensurable ratios transfer through equality.` },

{ q: `Are the squares on AC and CB commensurable with the square on AC? (yes/no):`,
  hint: `Squares on equal straight lines are commensurable.` },
{ q: `And is twice the rectangle AC, CB commensurable with the rectangle AC, CB? (yes/no):`,
  hint: `By X.6, multiples are commensurable.` },
{ q: `Therefore, are the squares on AC and CB incommensurable with twice the rectangle AC, CB? (yes/no):`,
  hint: `This follows from X.13.` },

{ q: `Since EG equals the squares on AC and CB, and HG equals twice the rectangle AC, CB, is EG incommensurable with HG? (yes/no):`,
  hint: `Equal magnitudes preserve incommensurability.` },
{ q: `And as EG is to HG, so is EM to HM. Do you agree? (yes/no):`,
  hint: `By VI.1, corresponding applied rectangles preserve ratios.` },
{ q: `Therefore, is EM incommensurable in length with HM? (yes/no):`,
  hint: `Incommensurable ratios imply incommensurable lengths (X.11).` },

{ q: `Since EM and HM are both rational, are they rational straight lines commensurable in square only? (yes/no):`,
  hint: `Rational but length-incommensurable implies square-commensurable only.` },
{ q: `Therefore, is EH an apotome and HM an annex to it? (yes/no):`,
  hint: `This follows from Proposition X.73.` },

{ q: `Similarly, can HN also be shown to be an annex to EH? (yes/no):`,
  hint: `The same reasoning applies to the second construction.` },
{ q: `Does this imply that different straight lines are annexed to the same apotome? (yes/no):`,
  hint: `HM and HN would both be annexes.` },
{ q: `Is this impossible by Proposition X.79? (yes/no):`,
  hint: `X.79 forbids more than one such annex.` },
]

const conclusion = `Congratulations! You just proved that to a second apotome of a medial straight line only one medial straight line can be annexed which is commensurable with the whole in square only and which contains with the whole a medial rectangle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
