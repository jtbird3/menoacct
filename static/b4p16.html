<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.16 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.16 - Inscribe an equilateral and equiangular fifteen-angled figure in a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.16 chatbot!

We are given a circle ABCD. Do you agree? (yes/no):`,
    hint: `A circle is defined by all points at an equal distance from its center.` },
  { q: `Our goal is to inscribe in circle ABCD a fifteen-angled figure that is both equilateral and equiangular. Does that make sense? (yes/no):`,
    hint: `“Inscribe” means to draw the figure inside the circle with all its vertices on the circumference.` },
  { q: `Let's inscribe in the circle ABCD a side AC of an equilateral triangle. Can we do that? (yes/no):`,
    hint: `By earlier propositions, an equilateral triangle can be inscribed in any circle.` },
  { q: `Next, let's inscribe in the same circle a side AB of an equilateral pentagon. Is this possible? (yes/no):`,
    hint: `Proposition XIII.10 allows an equilateral pentagon to be inscribed in a circle.` },
  { q: `So, if we drew the 15-sided figure from A, in the circumference ABC, we have five of the fifteen equal segments (one-third of the circle), and in AB three (one-fifth of the circle). Do you agree? (yes/no):`,
    hint: `1/3 + 1/5 = 8/15; thus the remaining portion is 7/15 of the circle.` },
  { q: `Therefore, in the remainder BC there must be two of the equal fifteenth parts. Do you see this? (yes/no):`,
    hint: `Since AB is 3/15 and ABC is 5/15, BC = 5/15 - 3/15 = 2/15.` },
  { q: `Let's bisect the arc BC at point E. Possible? (yes/no):`,
    hint: `Proposition III.30 allows the bisection of any circumference.` },
  { q: `Then the arcs BE and EC are each one-fifteenth of the whole circle. Do you agree? (yes/no):`,
    hint: `Bisecting the 2/15 portion yields two equal arcs of 1/15 each.` },
  { q: `Now, join BE and EC. Can we draw these chords? (yes/no):`,
    hint: `Postulate 1 allows drawing a straight line from any point to any point.` },
  { q: `If we now fit straight lines equal to BE and EC successively around the circle, will the figure formed have fifteen equal sides and angles? (yes/no):`,
    hint: `Each chord subtends an arc of 1/15 of the circle; hence all sides and central angles are equal.` },
  { q: `Therefore, have we inscribed in the circle ABCD a fifteen-angled figure both equilateral and equiangular? (yes/no):`,
    hint: `Equal chords in a circle subtend equal angles at the center—so all sides and angles are equal.` },
  { q: `In the same way, if we draw tangents at each vertex of this figure, will the tangents form a circumscribed fifteen-angle also equilateral and equiangular? (yes/no):`,
    hint: `Tangents at equal arcs make equal angles, forming an equal figure around the circle.` },
  { q: `And just as in the case of the pentagon, can we also inscribe and circumscribe circles about this fifteen-angled figure? (yes/no):`,
    hint: `Regular polygons admit both an inscribed and a circumscribed circle.` }
];

const conclusion = `Congratulations! You just inscribed an equilateral and equiangular fifteen-angled figure in a given circle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
