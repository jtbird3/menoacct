<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.2 – Prove that if the square on a straight line is five times the square on a segment of it, then, when twice that segment is cut in extreme and mean ratio, the greater segment is equal to the remainder of the original straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.2 chatbot!

We are given a straight line AB, cut in extreme and mean ratio at point C, with AC the greater segment. Do you agree? (yes/no):`,
    hint: `Extreme and mean ratio means the whole is to the greater as the greater is to the lesser.` },

  { q: `Our goal is to show that the squares on AB and BC together are triple of the square on AC. Does that make sense? (yes/no):`,
    hint: `We want a relationship among the three squares.` },

  { q: `Let the square ADEB be described on AB, and let the figure be drawn. Can this be done? (yes/no):`,
    hint: `A square can be constructed on any given straight line.` },

  { q: `Since AB is cut in extreme and mean ratio at C, and AC is the greater segment, is the rectangle AB, BC equal to the square on AC? (yes/no):`,
    hint: `This follows from VI.Def.3 and VI.17.` },

  { q: `Is AK the rectangle AB, BC, and HG the square on AC? (yes/no):`,
    hint: `These names refer to the corresponding parts of the constructed figure.` },

  { q: `Therefore, is AK equal to HG? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `Since AF is equal to FE, can CK be added to each? (yes/no):`,
    hint: `Equals added to equals give equals (Common Notion 2).` },

  { q: `After adding CK to both, is the whole AK equal to the whole CE? (yes/no):`,
    hint: `Each side has had the same segment added.` },

  { q: `Therefore, are AK and CE double of AK? (yes/no):`,
    hint: `The whole consists of two equal parts.` },

  { q: `Are AK and CE the gnomon LMN together with the square CK? (yes/no):`,
    hint: `By inspection of the figure, the gnomon and square together make these areas.` },

  { q: `Therefore, is the gnomon LMN together with the square CK double of AK? (yes/no):`,
    hint: `They are equal to AK and CE together.` },

  { q: `But was AK previously shown equal to HG? (yes/no):`,
    hint: `AK was equal to the square on AC.` },

  { q: `Therefore, is the gnomon LMN together with the squares CK and HG triple of the square HG? (yes/no):`,
    hint: `Double of AK plus another AK equals triple of HG.` },

  { q: `Are the gnomon LMN together with the squares CK and HG equal to the whole squares on AB and BC? (yes/no):`,
    hint: `These parts together make the entire constructed squares.` },

  { q: `And is HG the square on AC? (yes/no):`,
    hint: `HG was defined as the square on AC.` },

  { q: `Therefore, do the squares on AB and BC together equal triple of the square on AC? (yes/no):`,
    hint: `This is exactly what was required to be shown.` }
]

const conclusion = `Congratulations! You just proved that if the square on a straight line is five times the square on a segment of it, then, when twice that segment is cut in extreme and mean ratio, the greater segment is equal to the remainder of the original straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
