<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.2 — To find the least numbers in continued proportion having a given ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.2 chatbot!
    
We are given a ratio A to B in least numbers. Do you agree? (yes/no):`,
    hint: `A : B is the primitive (least) ratio from which we will generate new proportional numbers.` },

  { q: `Our goal is to construct as many numbers in continued proportion as we please, and the least in the ratio A to B. Does that make sense? (yes/no):`,
    hint: `We must build a chain of numbers all having ratio A : B between successive terms.` },

  { q: `Suppose we choose to construct four proportional numbers. Acceptable starting point? (yes/no):`,
    hint: `Euclid chooses to produce four, but the method generalizes.` },

  { q: `Let A multiplied by itself make C, and A multiplied by B make D. Agree? (yes/no):`,
    hint: `C = A·A and D = A·B.` },

  { q: `Let B multiplied by itself make E. Acceptable? (yes/no):`,
    hint: `E = B·B.` },

  { q: `Next, let A multiply C, D, E to make F, G, H respectively. Can we do this? (yes/no):`,
    hint: `F = A·C, G = A·D, H = A·E.` },

  { q: `Let B multiply E to make K. Fine? (yes/no):`,
    hint: `K = B·E.` },

  { q: `If A makes C by multiplying itself, and makes D by multiplying B, do we have A to B as C is to D? (yes/no):`,
    hint: `VII.17: Equal multipliers preserve ratios of products.` },

  { q: `If A multiplies B to get D, and B multiplies itself to get E, do we have A is to B as D is to E? (yes/no):`,
    hint: `VII.18: If two numbers multiply the same multiplier, their results preserve the ratio of the multipliers.` },

  { q: `Having A is to B as C is to D and A is to B as D is to E, do we have C to D as D to E? (yes/no):`,
    hint: `Transitivity of equal ratios.` },

  { q: `If A multiplies C and D to make F and G, is F to G as C to D? (yes/no):`,
    hint: `VII.17 again: multiplying by A preserves the ratio.` },

  { q: `If we have C to D as A to B, do we likewise have F to G as A to B? (yes/no):`,
    hint: `Substitution of equal ratios.` },

  { q: `Since A multiplies D and E to make G and H, is G to H as D is to E? (yes/no):`,
    hint: `Again by VII.17.` },

  { q: `Since D is to E as A is to B, does this give G to H as A is to B? (yes/no):`,
    hint: `They share the same ratio.` },

  { q: `Since A and B multiply E to make H and K, do we have H to K as A is to B? (yes/no):`,
    hint: `VII.18 again.` },

  { q: `Since A is to B as F is to G and G is to H and H is to K, are F, G, H, K in continued proportion? (yes/no):`,
    hint: `Each adjacent ratio equals A : B.` },

  { q: `Therefore, are C, D, E and F, G, H, K proportional in the ratio A to B? (yes/no):`,
    hint: `All steps verify the continued proportion chain.` },

  /* NOW THE LEASTNESS ARGUMENT */

  { q: `Since A and B are the least of those having ratio A to B, must A and B be prime to one another? (yes/no):`,
    hint: `VII.22: least numbers in a ratio are coprime.` },

  { q: `Since A and B multiply themselves to produce C and E, and multiply C and E to produce F and K, must C, E and F, K also be prime to one another respectively? (yes/no):`,
    hint: `VII.27: products formed from coprime numbers remain coprime in corresponding positions.` },

  { q: `Since we now have sequences C, D, E and F, G, H, K in continued proportion whose extremes are prime to one another, does VIII.1 imply they are the least numbers having this ratio? (yes/no):`,
    hint: `VIII.1: In continued proportion, if extremes are coprime, the whole sequence is least.` },

  { q: `Therefore, are C, D, E and F, G, H, K the least numbers in the ratio A to B? (yes/no):`,
    hint: `They satisfy Euclid’s criterion for minimality.` }
]

















const conclusion = `Congratulations! You just found the least numbers in continued proportion having a given ratio.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
