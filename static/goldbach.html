<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Goldbach Conjecture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Goldbach Conjecture — Investigate whether every even number greater than 2 can be expressed as the sum of two primes</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the Goldbach Conjecture chatbot!

Source statement (translated): "It seems at least, that every integer greater than 2 can be written as the sum of three primes."

We are given a statement about integers and primes, originally proposed by Goldbach in a letter to Euler. Do you agree? (yes/no):`,
    hint: `We are starting from a historical mathematical claim, not from an established theorem.`
  },
  {
    q: `Our goal is to investigate the claim that every even integer greater than 2 can be expressed as the sum of two prime numbers, in the spirit of Goldbach’s original proposal (altered since unity (1) is no longer considered a prime number). Does that make sense? (yes/no):`,
    hint: `This modern formulation is commonly called Goldbach’s conjecture.`
  },
  {
    q: `First, do we agree that a prime number is a number greater than 1 that has no positive divisors other than 1 and itself? (yes/no):`,
    hint: `Examples of primes are 2, 3, 5, 7, and 11.`
  },
  {
    q: `Do we also agree that unity (the number 1) was allowed by Goldbach as a building block in sums, even though it is not considered a prime in modern number theory? (yes/no):`,
    hint: `Goldbach explicitly permitted unity so that sums could be extended until all terms are units.`
  },
  {
    q: `Next, consider an even integer greater than 2, such as 4, 6, or 8. Can such a number be written as the sum of two integers greater than 1? (yes/no):`,
    hint: `For example, 6 = 3 + 3 and 8 = 3 + 5.`
  },
  {
    q: `Do some small even numbers admit representations as the sum of two primes (ex. 4, 6, 8, etc.)? (yes/no):`,
    hint: `4 = 2 + 2, 6 = 3 + 3, 8 = 3 + 5, 10 = 5 + 5.`
  },
  {
    q: `From these examples, might it appear plausible that the statement holds for many even numbers? (yes/no):`,
    hint: `Observing patterns in small cases often motivates conjectures.`
  },
  {
    q: `However, do examples alone constitute a mathematical proof? (yes/no):`,
    hint: `No matter how many cases are checked, examples only show that the statement works so far, not that it must work for every integer without exception.`
  },
  {
    q: `Do we currently possess a general argument or method that explains why every even integer must have such a prime decomposition, rather than merely observing that many do? (yes/no):`,
    hint: `No such method has been discovered.`
  },
  {
    q: `Has Goldbach’s conjecture been verified by computation for very large numbers? (yes/no):`,
    hint: `Extensive numerical checks support the conjecture, but computation is not proof.`
  },
  {
    q: `Despite this evidence, has a complete logical proof been found that works for all even integers? (yes/no):`,
    hint: `This remains an open problem in mathematics.`
  },
  {
    q: `Therefore, can we conclude that Goldbach’s conjecture is widely believed to be true but has not yet been proven? (yes/no):`,
    hint: `This distinguishes conjectures from theorems.`
  },
  {
    q: `Thus, although Goldbach proposed a profound insight into the structure of numbers, does the absence of a proof mean the problem remains unresolved? (yes/no):`,
    hint: `If the conjecture has not been proven, it remains unresolved.`
  }
]








const conclusion = `You just investigated Goldbach's conjecture, that every even number greater than 2 can be expressed as the sum of two primes, and found that it is still unresolved.
This remains an open problem in mathematics.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  // Steps 7, 8, and 10 (indices 7, 8, and 10) have "no" as the correct answer
  const isStepWithNoAnswer = currentStep === 7 || currentStep === 8 || currentStep === 10;
  if (isStepWithNoAnswer) {
    if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
      currentStep++;
      showStep();
    } else if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
      addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
    } else {
      addMessage(`Please answer 'yes' or 'no'.`, 'bot');
    }
  } else {
    if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
      currentStep++;
      showStep();
    } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
      addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
    } else {
      addMessage(`Please answer 'yes' or 'no'.`, 'bot');
    }
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
