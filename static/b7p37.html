<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.37</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.37 — To find the least number which has given parts.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.37 chatbot!
    
We are given three parts A, B, and C. Do you agree? (yes/no):`,
    hint: `These are the “parts” whose common least number we want to determine.` },

  { q: `Our goal is to find the least number that has the parts A, B, and C. Does that make sense? (yes/no):`,
    hint: `A number “having parts A, B, C” means it is measured by numbers called by the same name as A, B, C.` },

  { q: `Let D, E, and F be numbers called by the same name as the parts A, B, C (i.e. numbers with the same ratio as A, B, C). Acceptable? (yes/no):`,
    hint: `Euclid introduces new numbers D, E, F that correspond in “name” (ratio/class) to A, B, C.` },

  { q: `Next, let G be the least number measured by D, E, and F. Can we take such a G? (yes/no):`,
    hint: `Proposition VII.36 guarantees a least number measured by given numbers.` },

  { q: `Since G is measured by D, E, and F, does G have parts called by the same name as D, E, and F? (yes/no):`,
    hint: `By VII.37, a number measured by given numbers has parts with the same name as those numbers.` },

  { q: `Because A, B, C are parts called by the same name as D, E, F, do you see that G has the parts A, B, C? (yes/no):`,
    hint: `If G has parts matching D, E, F, and A, B, C match those same names, then G also has A, B, C.` },

  { q: `Now we claim that G is the least number having parts A, B, C. Ready to check this? (yes/no):`,
    hint: `We must show no smaller number could also have these parts.` },

  { q: `Suppose, for contradiction, that some smaller number H also has parts A, B, C. Accept this assumption? (yes/no):`,
    hint: `Euclid uses a standard reductio: assume a smaller number exists.` },

  { q: `If H has the parts A, B, C, must H be measured by numbers called by the same name as A, B, C? (yes/no):`,
    hint: `Proposition VII.38: if a number has parts A, B, C, then it is measured by their corresponding numbers.` },

  { q: `Since D, E, F are numbers called by the same name as A, B, C, does it follow that H is measured by D, E, F? (yes/no):`,
    hint: `H must be divisible by D, E, and F.` },

  { q: `But if H is measured by D, E, F and is smaller than G, does this contradict G being the least number measured by D, E, F? (yes/no):`,
    hint: `G was defined as the least such number, so no smaller one can exist.` },

  { q: `Since the assumption of a smaller H leads to contradiction, can we conclude that no number less than G has the parts A, B, C? (yes/no):`,
    hint: `If our assumption that there is a smaller number H leads to a contradiction, the only possible conclusion is that no number less than G has the parts A, B, C.` }
]
















const conclusion = `Congratulations! You just found the least number which has given parts.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
