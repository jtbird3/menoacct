<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.6 – Prove that if two magnitudes have to one another the ratio of one number to another number, then the magnitudes are commensurable.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.6 chatbot!

We are given two magnitudes, A and B, and two numbers, D and E. Do you agree? (yes/no):`,
hint: `A and B are magnitudes; D and E are numbers.` },
{ q: `We are told that the ratio of A to B is the same as the ratio of D to E. Is that clear? (yes/no):`,
hint: `This means A : B = D : E.` },
{ q: `Our goal is to show that the magnitudes A and B are commensurable. Does that make sense? (yes/no):`,
hint: `Commensurable means measured by the same magnitude.` },
{ q: `Let magnitude A be divided into as many equal parts as there are units in the number D. Is this possible? (yes/no):`,
hint: `A magnitude can be divided into equal parts.` },
{ q: `Let one of these equal parts be called C. Do you follow? (yes/no):`,
hint: `C is one unit-part of A.` },
{ q: `Let a new magnitude F be made up of as many magnitudes equal to C as there are units in E. Is that clear? (yes/no):`,
hint: `F consists of E copies of C.` },
{ q: `Since A contains as many magnitudes equal to C as there are units in D, is C to A the same ratio as the unit to D? (yes/no):`,
hint: `By definition, equal counting gives equal ratios (VII. Def. 20).` },
{ q: `Does the unit measure the number D? (yes/no):`,
hint: `A number is measured by the unit.` },
{ q: `Therefore, does C measure the magnitude A? (yes/no):`,
hint: `If ratios correspond, so do measures.` },
{ q: `Since C is to A as the unit is to D, is A to C as D is to the unit? (yes/no):`,
hint: `This follows by inversion of ratios.` },
{ q: `Now, since F contains as many magnitudes equal to C as there are units in E, is C to F as the unit to E? (yes/no):`,
hint: `Again by VII. Def. 20.` },
{ q: `We already showed that A is to C as D is to the unit. Combining these, is A to F as D is to E? (yes/no):`,
hint: `This uses ex aequali (V. 22).` },
{ q: `But we are given that A is to B as D is to E. Is that correct? (yes/no):`,
hint: `This is the original hypothesis.` },
{ q: `Therefore, does A have the same ratio to B as it has to F? (yes/no):`,
hint: `Both ratios equal D : E.` },
{ q: `If A has the same ratio to B and to F, must B be equal to F? (yes/no):`,
hint: `Magnitudes with the same ratio to the same magnitude are equal (V. 9).` },
{ q: `Does C measure F, since F is composed of copies of C? (yes/no):`,
hint: `F was constructed from equal magnitudes C.` },
{ q: `Therefore, does C also measure B, since B equals F? (yes/no):`,
hint: `Equals have the same measures.` },
{ q: `And earlier we showed that C measures A. Is that correct? (yes/no):`,
hint: `This was already established.` },
{ q: `Therefore, does C measure both A and B? (yes/no):`,
hint: `A common measure implies commensurability.` },
{ q: `Therefore, are the magnitudes A and B commensurable? (yes/no):`,
hint: `This is exactly the definition of commensurable magnitudes.` },
{ q: `PORISM:From this result, is it evident that, given two numbers D and E and a straight line A, we can construct another straight line F such that A is to F as D is to E? (yes/no):`,
hint: `This follows directly from the construction above.` },
{ q: `If a mean proportional B is taken between A and F, does A : F equal the square on A : the square on B? (yes/no):`,
hint: `See VI.19, Porism.` },
{ q: `Since A is to F as D is to E, does it follow that the figure on A is to the similar figure on B as D is to E? (yes/no):`,
hint: `Ratios transfer to similar figures.` }
]






const conclusion = `Congratulations! You just proved that if two magnitudes have to one another the ratio of one number to another number, then the magnitudes are commensurable.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
