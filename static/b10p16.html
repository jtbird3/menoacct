<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.16</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.16 – Prove that the sum of two incommensurable magnitudes is incommensurable with each of them; and that if the sum is incommensurable with one of them, the original magnitudes are incommensurable.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.16 chatbot!

We are given two magnitudes AB and BC which are incommensurable. Do you agree? (yes/no):`,
hint: `By hypothesis, no single magnitude measures both AB and BC.` },
{ q: `These two magnitudes are placed so that AB and BC are in a straight line, forming the whole AC. Is that clear? (yes/no):`,
hint: `AC is the sum of AB and BC.` },
{ q: `Our goal is to show that the whole AC is incommensurable with AB and also with BC. Does that make sense? (yes/no):`,
hint: `We want to show no common measure exists in each case.` },
{ q: `Suppose, if possible, that AC and AB are commensurable. Is that the assumption? (yes/no):`,
hint: `We proceed by contradiction.` },
{ q: `Then some magnitude D measures both AC and AB. Do you agree? (yes/no):`,
hint: `This follows from the definition of commensurable magnitudes (X. Def. 1).` },
{ q: `If D measures AC and also measures AB, does it measure the remainder BC? (yes/no):`,
hint: `BC is what remains when AB is taken from AC.` },
{ q: `If D measures both AB and BC, are AB and BC commensurable? (yes/no):`,
hint: `A common measure exists for both.` },
{ q: `But were AB and BC assumed to be incommensurable? (yes/no):`,
hint: `This contradicts the original hypothesis.` },
{ q: `Is this contradiction impossible? (yes/no):`,
hint: `A statement cannot be both true and false.` },
{ q: `Therefore, is it false that AC and AB are commensurable? (yes/no):`,
hint: `The assumption must be rejected.` },
{ q: `So must AC and AB be incommensurable? (yes/no):`,
hint: `This follows directly.` },
{ q: `By the same reasoning, is AC also incommensurable with BC? (yes/no):`,
hint: `The argument is symmetric.` },
{ q: `Therefore, is AC incommensurable with each of AB and BC? (yes/no):`,
hint: `This completes the first part.` },

{ q: `Now suppose that AC is incommensurable with AB. Do you agree? (yes/no):`,
hint: `This is the new hypothesis.` },
{ q: `Our goal is to show that AB and BC are also incommensurable. Does that make sense? (yes/no):`,
hint: `We reason again by contradiction.` },
{ q: `Suppose, if possible, that AB and BC are commensurable. Is that assumed? (yes/no):`,
hint: `We test the opposite claim.` },
{ q: `Then some magnitude D measures both AB and BC. Do you agree? (yes/no):`,
hint: `By definition of commensurable magnitudes.` },
{ q: `If D measures AB and BC, does it also measure their sum AC? (yes/no):`,
hint: `AC is composed of AB and BC.` },
{ q: `If D measures AC and also measures AB, are AC and AB commensurable? (yes/no):`,
hint: `A common measure exists for both.` },
{ q: `But was AC assumed to be incommensurable with AB? (yes/no):`,
hint: `This contradicts the hypothesis.` },
{ q: `Is this contradiction impossible? (yes/no):`,
hint: `Contradictions cannot stand.` },
{ q: `Therefore, is it false that AB and BC are commensurable? (yes/no):`,
hint: `The assumption must be rejected.` },
{ q: `So must AB and BC be incommensurable? (yes/no):`,
hint: `This completes the second part.` },
{ q: `Therefore, have we shown the full proposition? (yes/no):`,
hint: `Both directions have been proved.` },
{ q: `Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`,
hint: `The proposition is complete.` },

{ q: `We are given a straight line AB. Do you agree? (yes/no):`,
hint: `This is the base line.` },
{ q: `A parallelogram AD is applied to AB, deficient by the square DB. Is that the construction? (yes/no):`,
hint: `DB is a square removed from the full parallelogram.` },
{ q: `Our goal is to show that parallelogram AD equals the rectangle contained by AC and CB. Does that make sense? (yes/no):`,
hint: `We compare areas.` },
{ q: `Since DB is a square, are DC and CB equal? (yes/no):`,
hint: `All sides of a square are equal.` },
{ q: `Is AD the rectangle contained by AC and CD? (yes/no):`,
hint: `This follows from the construction of the parallelogram.` },
{ q: `If CD equals CB, is AD also the rectangle contained by AC and CB? (yes/no):`,
hint: `Replace equals with equals.` },
{ q: `Therefore, is the applied parallelogram AD equal to the rectangle AC, CB? (yes/no):`,
hint: `The areas coincide.` }
]





const conclusion = `Congratulations! You just proved that the sum of two incommensurable magnitudes is incommensurable with each of them; and that if the sum is incommensurable with one of them, the original magnitudes are incommensurable.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
