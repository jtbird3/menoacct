<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.22</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.22 – Prove that if the square on a medial straight line is applied to a rational straight line, the breadth produced is a straight line rational and incommensurable in length with that straight line.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.22 chatbot!

We are given a straight line A, which is medial, and a straight line CB, which is rational. Do you agree? (yes/no):`,
hint: `A medial straight line is irrational, but its square is rational.` },
{ q: `We apply to CB a rectangular area BD equal to the square on A, producing CD as breadth. Do you agree? (yes/no):`,
hint: `This is the standard application of an area to a straight line.` },
{ q: `Our goal is to show that CD is rational and incommensurable in length with CB. Does that make sense? (yes/no):`,
hint: `We must prove both rationality and incommensurability in length.` },
{ q: `Since A is medial, is the square on A equal to a rectangle contained by rational straight lines commensurable in square only? (yes/no):`,
hint: `This follows from Proposition X.21.` },
{ q: `Let the square on A be equal to a rectangle GF. Is this allowed? (yes/no):`,
hint: `Any equal area may be represented by an equivalent rectangle.` },
{ q: `Is the rectangle BD also equal to GF? (yes/no):`,
hint: `Both are equal to the square on A.` },
{ q: `Are the rectangles BD and GF equiangular? (yes/no):`,
hint: `Rectangles have right angles.` },
{ q: `In equal and equiangular parallelograms, are the sides about the equal angles reciprocally proportional? (yes/no):`,
hint: `This is Proposition VI.14.` },
{ q: `Therefore, as BC is to EG, is EF to CD in the same ratio? (yes/no):`,
hint: `Corresponding sides of equal and equiangular parallelograms are proportional.` },
{ q: `Therefore, as the square on BC is to the square on EG, is the square on EF to the square on CD? (yes/no):`,
hint: `This follows from Proposition VI.22.` },
{ q: `Is the square on CB commensurable with the square on EG, since both straight lines are rational? (yes/no):`,
hint: `Rational straight lines have commensurable squares (X.11).` },
{ q: `Therefore, is the square on EF commensurable with the square on CD? (yes/no):`,
hint: `Equal ratios preserve commensurability.` },
{ q: `Is the square on EF rational? (yes/no):`,
hint: `EF is rational in square.` },
{ q: `Therefore, is the square on CD also rational? (yes/no):`,
hint: `Definition X.4: a straight line is rational if its square is rational.` },
{ q: `Can we then conclude that CD itself is rational? (yes/no):`,
hint: `Rationality of the square implies rationality of the line.` },
{ q: `Since EF and EG are commensurable in square only, are they incommensurable in length? (yes/no):`,
hint: `This is the definition of commensurable in square only.` },
{ q: `As EF is to EG, so is the square on EF to the rectangle FE, EG. Do you agree? (yes/no):`,
hint: `This follows from the Lemma on ratios of lines and areas.` },
{ q: `Is the square on EF therefore incommensurable with the rectangle FE, EG? (yes/no):`,
hint: `Proposition X.11.` },
{ q: `Is the square on CD commensurable with the square on EF, since both are rational in square? (yes/no):`,
hint: `Rational squares are commensurable.` },
{ q: `Is the rectangle DC, CB commensurable with the rectangle FE, EG, since both are equal to the square on A? (yes/no):`,
hint: `Equal areas are commensurable.` },
{ q: `Therefore, is the square on CD incommensurable with the rectangle DC, CB? (yes/no):`,
hint: `Proposition X.13.` },
{ q: `But as the square on CD is to the rectangle DC, CB, so is DC to CB. Do you agree? (yes/no):`,
hint: `This follows from the same Lemma relating lines and areas.` },
{ q: `Therefore, is DC incommensurable in length with CB? (yes/no):`,
hint: `Proposition X.11.` }

]





const conclusion = `Congratulations! You just proved that if the square on a medial straight line is applied to a rational straight line, the breadth produced is a straight line rational and incommensurable in length with that straight line.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
