<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.38 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.38 – Prove that triangles on equal bases and in the same parallels are equal</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.38 chatbot!

We are given two triangles ABC and DEF, on equal bases BC and EF, and lying in the same parallels BF and AD. Do you agree? (yes/no):`,
    hint: `Equal bases means BC = EF, and "same parallels" means both bases lie between parallel lines BF and AD.` },
  { q: `Our goal is to prove that triangle ABC is equal in area to triangle DEF. Does that make sense? (yes/no):`,
    hint: `We want to show that the two triangles occupy equal space.` },
  { q: `First, produce the line AD in both directions to points G and H. Can we do that? (yes/no):`,
    hint: `Extending a finite straight line is allowed (Postulate 2).` },
  { q: `Now, through point B, can we draw BG parallel to CA? (yes/no):`,
    hint: `Proposition I.31 allows a line to be drawn parallel to a given line through a point not on it.` },
  { q: `And through point F, can we draw FH parallel to DE? (yes/no):`,
    hint: `Again by I.31, we can construct a parallel through F to DE.` },
  { q: `Do you see that quadrilaterals GBCA and DEFH are parallelograms? (yes/no):`,
    hint: `Opposite sides are parallel: BG ∥ AC and GA ∥ BC; also FH ∥ DE and DH ∥ EF.` },
  { q: `Are the parallelograms GBCA and DEFH equal in area? (yes/no):`,
    hint: `By Proposition I.36, parallelograms on equal bases and in the same parallels are equal.` },
  { q: `Is triangle ABC half of parallelogram GBCA? (yes/no):`,
    hint: `The diagonal AB bisects parallelogram GBCA (Proposition I.34).` },
  { q: `Is triangle DEF half of parallelogram DEFH? (yes/no):`,
    hint: `The diagonal DF bisects parallelogram DEFH (Proposition I.34).` },
  { q: `If two whole parallelograms are equal, are their halves also equal? (yes/no):`,
    hint: `Common Notion: halves of equal things are equal.` },
  { q: `Therefore, is triangle ABC equal to triangle DEF? (yes/no):`,
    hint: `Yes, each is half of equal parallelograms.` }
];

const conclusion = `Congratulations! You just proved that triangles on equal bases within the same parallels are equal.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
