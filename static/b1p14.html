<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.14 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.14 - Prove that if adjacent angles equal two right angles, the lines are in a straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.14 chatbot!

We are given a straight line AB. Do you agree? (yes/no):`,
    hint: `Think of AB as a flat baseline.` },
  { q: `At point B on AB, we draw two other lines: BC and BD. They are on opposite sides of AB. Do you agree? (yes/no):`,
    hint: `They rise from B in different directions, not both on the same side of AB.` },
  { q: `Now, the angles ∠ABC and ∠ABD are next to each other (adjacent). Do you see that? (yes/no):`,
    hint: `They share the common side AB and touch at point B.` },
  { q: `The important condition: ∠ABC + ∠ABD = two right angles. Does that make sense? (yes/no):`,
    hint: `Together, the two adjacent angles are equal to 180°, the same as a "straight angle."` },
  { q: `Our goal is to show that CB and BD are in one straight line. Do you agree? (yes/no):`,
    hint: `That means CB and BD make one continuous straight line through B.` },
  { q: `Suppose instead BD is not straight with CB. Then imagine another line BE that is straight with CB. Can we suppose that? (yes/no):`,
    hint: `We test the opposite case to see if a contradiction appears.` },
  { q: `Since AB stands on the straight line CBE, the angles ∠ABC and ∠ABE together must equal two right angles. Does that make sense? (yes/no):`,
    hint: `Proposition I.13 says: a line standing on another line makes adjacent angles equal to two right angles.` },
  { q: `But we also know ∠ABC + ∠ABD = two right angles. Right? (yes/no):`,
    hint: `That was the given condition.` },
  { q: `So does it follow that ∠ABD = ∠ABE? (yes/no):`,
    hint: `Subtract the common angle ∠ABC from both totals: ∠ABD + ∠ABC = ∠ABE + ∠ABC (Common Notion 3).` },
  { q: `But ∠ABD can't really equal ∠ABE, if one is clearly larger. Correct? (yes/no):`,
    hint: `ABD opens wider than ABE, so they cannot be equal.` },
  { q: `So, do we have a contradiction? (yes/no):`,
    hint: `A smaller angle cannot equal a larger one.` },
  { q: `Therefore, no line except BD can be straight-on with CB. So BD and CB must form one straight line. Correct? (yes/no):`,
    hint: `The contradiction shows only BD works.` }
];

const conclusion = `Congratulations! We have shown that if two lines at a point make adjacent angles equal to two right angles, then they are straight-on with each other. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
