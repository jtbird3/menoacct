<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.18</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.18 – Prove that spheres are to one another in the triplicate ratio of their diameters.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.18 chatbot!

We are given two spheres, called sphere ABC and sphere DEF. Do you agree? (yes/no):`,
    hint: `These names follow Euclid’s convention for naming solids.` },

  { q: `Let BC be the diameter of sphere ABC, and EF the diameter of sphere DEF. Is that clear? (yes/no):`,
    hint: `Each diameter passes through the center of its sphere.` },

  { q: `Our goal is to show that the sphere ABC has to the sphere DEF the triplicate ratio of that which BC has to EF. Does that make sense? (yes/no):`,
    hint: `“Triplicate ratio” means the ratio of the cubes of the diameters.` },

  { q: `Suppose the sphere ABC does not have to the sphere DEF the triplicate ratio of BC to EF. Is this a valid assumption for a proof by contradiction? (yes/no):`,
    hint: `Euclid often argues by eliminating all alternatives.` },

  { q: `If this ratio does not hold, must the sphere ABC have that triplicate ratio either to a less sphere than DEF or to a greater one? (yes/no):`,
    hint: `These exhaust all possibilities.` },

  { q: `Case 1: Suppose it has that ratio to a lesser sphere`,
    hint: `` },

  { q: `Let GHK be a sphere less than DEF, and let DEF be conceived about the same center as GHK. Is this allowed? (yes/no):`,
    hint: `Concentric spheres may be conceived with the same center.` },

  { q: `Can we inscribe in the greater sphere DEF a polyhedral solid which does not touch the surface of the lesser sphere GHK? (yes/no):`,
    hint: `This follows from Proposition XII.17.` },

  { q: `Now, can we inscribe in sphere ABC a polyhedral solid similar to the one inscribed in DEF? (yes/no):`,
    hint: `Similar polyhedra can be inscribed in spheres.` },

  { q: `Do similar polyhedral solids have to one another the triplicate ratio of the diameters of their circumscribed spheres? (yes/no):`,
    hint: `This follows from XII.17, Porism.` },

  { q: `Since both ratios are triplicate of BC to EF, can we say that the ratio of sphere ABC to sphere GHK equals the ratio of the polyhedron in ABC to the polyhedron in DEF? (yes/no):`,
    hint: `Equal ratios to the same ratio are equal to one another.` },

  { q: `By alternation, can we say that as sphere ABC is to its inscribed polyhedron, so sphere GHK is to the polyhedron in DEF? (yes/no):`,
    hint: `Proposition V.16 allows alternation of ratios.` },

  { q: `Is the sphere ABC greater than the polyhedron inscribed in it? (yes/no):`,
    hint: `The polyhedron lies entirely inside the sphere.` },

  { q: `Then must the sphere GHK also be greater than the polyhedron inscribed in DEF? (yes/no):`,
    hint: `Equal ratios preserve inequality.` },

  { q: `But is the sphere GHK actually less than the polyhedron in DEF, since it is enclosed by it? (yes/no):`,
    hint: `The polyhedron surrounds the smaller sphere.` },

  { q: `Does this contradiction show that sphere ABC cannot have the required ratio to a sphere less than DEF? (yes/no):`,
    hint: `A magnitude cannot be both greater and less than the same magnitude.` },

  { q: `Case 2: Suppose it has that ratio to a greater sphere`,
    hint: `` },

  { q: `Can we similarly argue that sphere ABC does not have the triplicate ratio of BC to EF to any sphere greater than DEF? (yes/no):`,
    hint: `Euclid treats the greater case symmetrically.` },

  { q: `Assume, if possible, that sphere ABC has that ratio to a greater sphere LMN. Is this assumption clear? (yes/no):`,
    hint: `This sets up the second contradiction.` },

  { q: `Then inversely, does sphere LMN have to sphere ABC the triplicate ratio of EF to BC? (yes/no):`,
    hint: `Inversion of ratios is allowed.` },

  { q: `Since LMN is greater than DEF, can we apply the lemma of XII.2 to conclude that DEF has to some sphere less than ABC the same ratio? (yes/no):`,
    hint: `A greater magnitude preserves the proportional relation downward.` },

  { q: `But was it already shown impossible for sphere DEF to have this ratio to a sphere less than ABC? (yes/no):`,
    hint: `This was proved in the first case.` },

  { q: `Does this contradiction show that sphere ABC cannot have the triplicate ratio of BC to EF to any greater sphere than DEF? (yes/no):`,
    hint: `The assumption leads to impossibility.` },

  { q: `Conclusion`,
    hint: `` },

  { q: `Since sphere ABC has not the triplicate ratio of BC to EF to any sphere less than DEF, nor to any greater sphere, must it have that ratio to sphere DEF itself? (yes/no):`,
    hint: `Only one remaining possibility exists.` },

  { q: `Therefore, is it proved that spheres are to one another in the triplicate ratio of their respective diameters? (yes/no):`,
    hint: `This is exactly the proposition stated.` }
]

const conclusion = `Congratulations! You just proved that spheres are to one another in the triplicate ratio of their diameters.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
