<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gulliver's Travels — The Loadstone of the Floating Island</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Gulliver's Travel's — The Loadstone of the Floating Island</h1><div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Gulliver's Travel's Loadstone chatbot!

We are told there is a loadstone of prodigious size, shaped like a weaver’s shuttle. Do you agree? (yes/no):`,
hint: `The passage explicitly describes its size and shape.` },
{ q: `This loadstone is six yards long and about three yards thick at its widest part. Is that correct? (yes/no):`,
hint: `These measurements are directly stated.` },
{ q: `The loadstone is pierced through the middle by a strong axle of adamant. Do you see this? (yes/no):`,
hint: `The axle passes through the center of the stone.` },
{ q: `This axle allows the stone to turn freely, so that even the weakest hand can move it. Is that stated? (yes/no):`,
hint: `The stone is said to be poised exactly.` },
{ q: `The loadstone is surrounded by a hollow cylinder of adamant, placed horizontally. Do you agree? (yes/no):`,
hint: `The hoop is described as hollow, horizontal, and adamantine.` },
{ q: `This cylinder is supported by eight feet of adamant, each six yards high. Is that correct? (yes/no):`,
hint: `The number and height of the supports are specified.` },
{ q: `The hoop, its feet, and the base of the island are all one continuous piece of adamant. Do you see that? (yes/no):`,
hint: `This explains why the stone cannot be removed.` },
{ q: `Because of this construction, the loadstone cannot be forced out of its place. Does that follow? (yes/no):`,
hint: `One continuous body cannot be separated by force.` },
{ q: `By means of this loadstone, the island can rise, fall, and move from place to place. Is that stated? (yes/no):`,
hint: `This is the central function of the stone.` },
{ q: `The loadstone has an attractive power on one side and a repulsive power on the other. Do you agree? (yes/no):`,
hint: `The text assigns opposite powers to opposite ends.` },
{ q: `When the attracting end points toward the earth, the island descends. Is that correct? (yes/no):`,
hint: `Attraction draws the island downward.` },
{ q: `When the repelling end points toward the earth, the island rises. Is that correct? (yes/no):`,
hint: `Repulsion drives the island upward.` },
{ q: `When the stone is placed obliquely, the island moves obliquely as well. Do you see why? (yes/no):`,
hint: `The forces act in lines parallel to the stone’s direction.` },
{ q: `By repeatedly turning the stone on its axle, the island can be conveyed across the dominions below. Is that explained? (yes/no):`,
hint: `The passage traces the island’s motion from point to point.` },
{ q: `The island cannot move beyond the limits of the dominions beneath it. Is this stated? (yes/no):`,
hint: `Its motion is geographically bounded.` },
{ q: `The island also cannot rise higher than four miles above the earth. Do you agree? (yes/no):`,
hint: `This height limit is explicitly given.` },
{ q: `The astronomers explain this by saying the magnetic virtue extends only four miles. Is that their explanation? (yes/no):`,
hint: `Their theory limits the power of the stone.` },
{ q: `When the stone is placed parallel to the horizon, the island remains motionless. Is that correct? (yes/no):`,
hint: `Equal attraction and repulsion cancel each other.` },
{ q: `Our goal is to understand how the loadstone’s position controls the island’s motion—its rising, falling, stillness, and limited range. Does that make sense? (yes/no):`,
hint: `Every change in motion follows from the direction of the stone.` },
{ q: `We have explored how the loadstone’s position controls the island’s motion—its rising, falling, stillness, and limited range. Does that make sense? (yes/no):`,
hint: `Every change in motion follows precisely from the direction of the stone.` },


]





const conclusion = `Congratulations! You just explored how the loadstone's position controls the island's motion—its rising, falling, stillness, and limited range.
Q.E.I. (Quod Erat Illustrandum — which was to be illustrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
