<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.20</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.20 – Prove that if a solid angle is contained by three plane angles, any two, taken together in any manner, are greater than the remaining one.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.20 chatbot!

We are given a solid angle at point A, contained by the three plane angles ∠BAC, ∠CAD, and ∠DAB. Do you agree? (yes/no):`,
    hint: `A solid angle is formed by more than two plane angles meeting at a point.` },

  { q: `The three plane angles are ∠BAC, ∠CAD, and ∠DAB, all meeting at A. Correct? (yes/no):`,
    hint: `Each plane angle lies between two of the lines AB, AC, AD.` },

  { q: `First, consider the case where the angles ∠BAC, ∠CAD, and ∠DAB are all equal. Is it clear that any two of them are greater than the remaining one? (yes/no):`,
    hint: `If all three are equal, then two together must exceed one.` },

  { q: `Now suppose the angles are not all equal, and let ∠BAC be the greatest. Is this a valid assumption? (yes/no):`,
    hint: `If they are unequal, one of them must be the greatest.` },

  { q: `On the straight line AB, at the point A, let an angle ∠BAE be constructed in the plane through BA and AC, equal to the angle ∠DAB. Can this construction be made? (yes/no):`,
    hint: `An angle equal to a given angle can be constructed at a given point on a given line.` },

  { q: `Let AE be made equal to AD. Is this possible? (yes/no):`,
    hint: `A straight line equal to a given straight line can be constructed from a given point.` },

  { q: `Let the straight line through points B, E, and C be drawn, cutting AB and AC at B and C respectively. Can such a line be drawn? (yes/no):`,
    hint: `A straight line may be drawn through any two points.` },

  { q: `Join DB and DC. Is this allowed? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Now, DA is equal to AE, and AB is common to both triangles DAB and EAB. Do we now have two sides equal to two sides? (yes/no):`,
    hint: `DA = AE by construction, and AB is shared.` },

  { q: `Is the angle ∠DAB equal to the angle ∠BAE? (yes/no):`,
    hint: `∠BAE was constructed equal to ∠DAB.` },

  { q: `Therefore, by Proposition I.4, is DB equal to BE? (yes/no):`,
    hint: `If two sides and the included angle are equal, then the bases are equal.` },

  { q: `Now consider triangle BDC. Are the two sides BD and DC together greater than BC? (yes/no):`,
    hint: `In any triangle, any two sides together are greater than the remaining side (Proposition I.20).` },

  { q: `Since DB was shown equal to BE, does it follow that DC is greater than EC? (yes/no):`,
    hint: `If equals are taken from unequals, the remainders are unequal (Common Notion 5).` },

  { q: `Now consider triangles DAC and EAC. We have DA equal to AE, and AC common. Correct? (yes/no):`,
    hint: `DA = AE by construction; AC is the same line.` },

  { q: `If the base DC is greater than the base EC, does it follow that ∠DAC is greater than ∠EAC? (yes/no):`,
    hint: `In triangles with two equal sides, the greater base subtends the greater angle (Proposition I.25).` },

  { q: `But we already proved that ∠DAB equals ∠BAE. Do you agree? (yes/no):`,
    hint: `This was shown earlier by construction.` },

  { q: `Therefore, are the two angles ∠DAB and ∠DAC together greater than ∠BAC? (yes/no):`,
    hint: `One part equals ∠BAE, and the other is greater than ∠EAC.` },

  { q: `By similar reasoning, can we prove that any other pair of the three angles, taken together, is greater than the remaining one? (yes/no):`,
    hint: `The same construction applies by choosing a different angle as greatest.` },

  { q: `Therefore, in a solid angle contained by three plane angles, are any two taken together greater than the remaining one? (yes/no):`,
    hint: `This is exactly what has been demonstrated.` }
]

const conclusion = `Congratulations! You just if a solid angle is contained by three plane angles, any two, taken together in any manner, are greater than the remaining one.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
