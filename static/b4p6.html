<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.6 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.6 - Inscribe a square in a given circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.6 chatbot!

We are given a circle ABCD. Do you agree? (yes/no):`,
    hint: `The circle ABCD is the one in which we must draw a square.` },
  { q: `Our goal is to inscribe a square within this circle ABCD. Does that make sense? (yes/no):`,
    hint: `“Inscribe” means all the vertices of the square lie on the circle.` },
  { q: `Let us draw two diameters, AC and BD, of the circle, meeting each other at point E at right angles. Can we do this? (yes/no):`,
    hint: `By definition, a diameter passes through the center of the circle; and we can draw another diameter at right angles to it.` },
  { q: `Now join AB, BC, CD, DA. Possible? (yes/no):`,
    hint: `Postulate 1 allows us to draw straight lines between any two points.` },
  { q: `Since BE = ED and EA is common, do you see that triangles ABE and ADE share two equal sides and the included right angle? (yes/no):`,
    hint: `Each radius of the same circle is equal, and AC and BD meet at right angles.` },
  { q: `From this, can we conclude that AB = AD? (yes/no):`,
    hint: `By Proposition I.4, if two sides and the included angle are equal, then the bases are also equal.` },
  { q: `By the same reasoning, are BC and CD also equal to AB and AD? (yes/no):`,
    hint: `Each of the four triangles around the center is congruent.` },
  { q: `Therefore, is the quadrilateral ABCD equilateral? (yes/no):`,
    hint: `All four sides are equal in length.` },
  { q: `Next, since BD is a diameter, does it follow that angle BAD stands on a semicircle? (yes/no):`,
    hint: `The arc subtended by a diameter is always a semicircle.` },
  { q: `And is the angle in a semicircle a right angle? (yes/no):`,
    hint: `Proposition III.31 states that the angle in a semicircle is right.` },
  { q: `Then is ∠BAD a right angle? (yes/no):`,
    hint: `Yes — it subtends the semicircle.` },
  { q: `By the same reasoning, are ∠ABC, ∠BCD, and ∠CDA also right angles? (yes/no):`,
    hint: `Each angle stands on a semicircle formed by a diameter.` },
  { q: `Therefore, is the quadrilateral ABCD right-angled as well as equilateral? (yes/no):`,
    hint: `Right-angled means each interior angle is 90°, and equilateral means all sides are equal.` },
  { q: `And if it is both equilateral and right-angled, is ABCD a square? (yes/no):`,
    hint: `Definition I.22 — a square has all sides equal and all angles right.` },
  { q: `Finally, has this square ABCD been inscribed in the circle? (yes/no):`,
    hint: `Yes, all its vertices A, B, C, and D lie on the circle ABCD.` }
];

const conclusion = `Congratulations! You just inscribed a square in a given circle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
