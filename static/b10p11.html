<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.11 – Prove that if four magnitudes are proportional, then commensurability or incommensurability of the first to the second is shared by the third to the fourth.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.11 chatbot!

We are given four magnitudes A, B, C, and D, which are proportional, so that as A is to B, so is C to D. Do you agree? (yes/no):`,
hint: `This means the ratio A : B is equal to the ratio C : D.` },
{ q: `Our goal is to show that commensurability (or incommensurability) passes from A and B to C and D. Does that make sense? (yes/no):`,
hint: `We will consider two cases: first commensurable, then incommensurable.` },

{ q: `Suppose A is commensurable with B. Are we assuming this for the first part? (yes/no):`,
hint: `This is the hypothesis of the first case.` },
{ q: `If A is commensurable with B, does A have to B the ratio which a number has to a number? (yes/no):`,
hint: `By Book X, Proposition 5, commensurable magnitudes have a numerical ratio.` },
{ q: `Since as A is to B, so is C to D, do C and D have the same kind of ratio as A and B? (yes/no):`,
hint: `Equal ratios transfer the same character of ratio.` },
{ q: `If C has to D the ratio which a number has to a number, is C commensurable with D? (yes/no):`,
hint: `By Book X, Proposition 6, a numerical ratio implies commensurability.` },
{ q: `So, from A commensurable with B, have we shown that C is commensurable with D? (yes/no):`,
hint: `The property has passed through the proportionality.` },

{ q: `Now suppose A is incommensurable with B. Are we beginning the second case? (yes/no):`,
hint: `This is the opposite hypothesis.` },
{ q: `If A is incommensurable with B, does A fail to have to B the ratio which a number has to a number? (yes/no):`,
hint: `By Book X, Proposition 7, incommensurable magnitudes do not have numerical ratios.` },
{ q: `Since as A is to B, so is C to D, must C to D also fail to be a ratio of number to number? (yes/no):`,
hint: `Equal ratios cannot differ in kind.` },
{ q: `If C does not have to D the ratio which a number has to a number, is C incommensurable with D? (yes/no):`,
hint: `By Book X, Proposition 8, lack of numerical ratio implies incommensurability.` },
{ q: `So, from A incommensurable with B, have we shown that C is incommensurable with D? (yes/no):`,
hint: `The incommensurability also passes through the proportionality.` },

{ q: `Therefore, if four magnitudes are proportional, is commensurability or incommensurability preserved from the first pair to the second pair? (yes/no):`,
hint: `Both cases have now been proved.` }

]






const conclusion = `Congratulations! You just proved that if four magnitudes are proportional, then commensurability or incommensurability of the first to the second is shared by the third to the fourth.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
