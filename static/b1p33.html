<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.33 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.33 – Prove that straight lines joining equal and parallel straight lines are equal and parallel</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.33 chatbot!

We are given two equal and parallel straight lines AB and CD, and a pair of lines joining the endpoints on each side, AC and BD. Do you agree? (yes/no):`,
    hint: `AB and CD are equal in length and parallel.` },
  { q: `Our goal is to show that the lines joining them in the same directions, namely AC and BD, are themselves equal and parallel. Does that make sense? (yes/no):`,
    hint: `We want AC = BD, and AC ∥ BD.` },
  { q: `First, join the line BC. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows us to join any two points by a straight line.` },
  { q: `Since AB is parallel to CD, and BC meets them, are the alternate angles ∠ABC and ∠BCD equal? (yes/no):`,
    hint: `By Proposition I.29, alternate angles are equal when a line crosses two parallel lines.` },
  { q: `Now, AB = CD, and BC is common. Do we have two sides AB, BC equal to two sides DC, CB, with ∠ABC = ∠BCD? (yes/no):`,
    hint: `Yes, AB = DC by hypothesis, BC is common, and we just showed ∠ABC = ∠BCD.` },
  { q: `From this, can we conclude by Proposition I.4 that △ABC = △DCB, with base AC = BD, and ∠ACB = ∠CBD? (yes/no):`,
    hint: `Proposition I.4 states that two triangles are equal if they have two sides equal and the included angle equal.` },
  { q: `By I.27, if ∠ACB = ∠CBD, does that mean AC is parallel to BD? (yes/no):`,
    hint: `By Proposition I.27, if alternate angles are equal, then the lines are parallel.` },
  { q: `So, do we have AC = BD and AC ∥ BD? (yes/no):`,
    hint: `We have shown both equality and parallelism.` }
];

const conclusion = `Congratulations! You just proved that equal and parallel lines joined form equal and parallel lines!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
