<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.2 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.2 - Prove that a chord (straight line) of a circle lies within the circle</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.2 chatbot!

We are given a circle ABC, and two points A and B on its circumference. Do you agree? (yes/no):`,
    hint: `A circumference is the boundary of a circle, and A, B are chosen points on it.` },
  { q: `Our goal is to show that the straight line AB lies inside the circle. Does that make sense? (yes/no):`,
    hint: `We want to prove AB cannot lie outside, nor on the circumference itself.` },
  { q: `Suppose, if possible, that AB does not lie inside but falls outside the circle, along some line AEB. Can we assume this for contradiction? (yes/no):`,
    hint: `Proof by contradiction assumes the opposite, then shows impossibility.` },
  { q: `Let us find the center of the circle ABC and call it D. Possible? (yes/no):`,
    hint: `Proposition III.1 ensures every circle has a center.` },
  { q: `Join DA and DB, from the center D to points A and B. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows drawing straight lines from any point to any point.` },
  { q: `Draw a straight line DFE through the center D and the point E on AB. Is this possible? (yes/no):`,
    hint: `Any straight line may be produced through given points (Postulate 2).` },
  { q: `Now, since DA = DB, are the angles ∠DAE and ∠DBE equal? (yes/no):`,
    hint: `Triangle DAB is isosceles; base angles are equal (Proposition I.5).` },
  { q: `And since AB is produced through E, is ∠DEB greater than ∠DAE since it is the exterior angle? (yes/no):`,
    hint: `The exterior angle of a triangle is greater than either interior opposite angle (Proposition I.16).` },
  { q: `If ∠DAE = ∠DBE, does it follow that ∠DEB > ∠DBE? (yes/no):`,
    hint: `Replace ∠DAE with ∠DBE in the previous inequality.` },
  { q: `And if ∠DEB is greater than ∠DBE, is side DB greater than side DE? (yes/no):`,
    hint: `The greater angle of a triangle is subtended by the greater side (Proposition I.19).` },
  { q: `But DB = DF (both are radii of the circle). Do you see that? (yes/no):`,
    hint: `DA, DB, DF are all radii from the center D.` },
  { q: `If DB = DF but DB > DE, does that mean DF > DE? (yes/no):`,
    hint: `Substitution shows DF shares the same length as DB.` },
  { q: `So DF > DE, even though it is shorter on the line DFE. Is this a contradiction? (yes/no):`,
    hint: `A point cannot be both nearer and farther from D along the same line. Contradiction.` },
  { q: `Therefore AB cannot fall outside the circle. Do you agree? (yes/no):`,
    hint: `The assumption that AB lay outside led to impossibility.` },
  { q: `And if AB is a straight line, it cannot coincide with the circumference itself. Do you agree?(yes/no):`,
    hint: `A straight line cannot overlap the arc except at its endpoints.` },
  { q: `Therefore, AB must lie inside the circle. Do you agree? (yes/no):`,
    hint: `The contradiction shows AB cannot be on or outside the circle.` }
];

const conclusion = `Congratulations! You have shown that the straight line joining two points on a circle lies within the circle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
