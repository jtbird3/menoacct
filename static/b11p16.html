<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.16</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.16 – Prove that if two parallel planes are cut by any plane, their common sections are parallel.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.16 chatbot!

We are given two parallel planes AB and CD. Do you agree? (yes/no):`,
    hint: `It is given that planes AB and CD are parallel.` },

  { q: `The planes AB and CD are cut by another plane, called EFGH. Is that correct? (yes/no):`,
    hint: `The cutting plane is stated explicitly.` },

  { q: `The intersections of plane EFGH with planes AB and CD are straight lines EF and GH. Do you see this? (yes/no):`,
    hint: `The common section of two planes is a straight line.` },

  { q: `Our goal is to show that the straight line EF is parallel to the straight line GH. Does that make sense? (yes/no):`,
    hint: `This is exactly what the proposition claims.` },

  { q: `Suppose that EF is not parallel to GH. Is this an allowable assumption for a proof by contradiction? (yes/no):`,
    hint: `We assume the opposite of what we want to prove.` },

  { q: `If EF and GH are not parallel, then when produced they must meet. Do you agree? (yes/no):`,
    hint: `By the definition of parallel straight lines.` },

  { q: `They could meet either in the direction of F and H, or in the direction of E and G. Do you agree? (yes/no):`,
    hint: `These are the two possible directions of production.` },

  { q: `Let EF and GH be produced in the direction of F and H, and suppose they meet at a point K. Is this clear? (yes/no):`,
    hint: `This follows from the assumption that they are not parallel.` },

  { q: `Now, the straight line EFK lies entirely in the plane AB. Do you agree? (yes/no):`,
    hint: `EF is the intersection of plane AB with the cutting plane, so it lies in plane AB.` },

  { q: `All points on a straight line in a plane are also in that plane. Do you agree? (yes/no):`,
    hint: `Euclid XI.1.` },

  { q: `Since K lies on the straight line EFK, does it follow that K lies in plane AB? (yes/no):`,
    hint: `K is one of the points on EFK.` },

  { q: `By the same reasoning, does K also lie in plane CD? (yes/no):`,
    hint: `GH is the intersection of plane CD with the cutting plane.` },

  { q: `If point K lies in both plane AB and plane CD, do the two planes meet at K? (yes/no):`,
    hint: `Two planes meet if they share a common point.` },

  { q: `But the planes AB and CD are given to be parallel and therefore do not meet. Do you agree? (yes/no):`,
    hint: `This is part of the hypothesis.` },

  { q: `Does this produce a contradiction? (yes/no):`,
    hint: `We have shown they meet, but they are given as not meeting.` },

  { q: `Therefore, is it impossible for EF and GH to meet when produced in the direction of F and H? (yes/no):`,
    hint: `The contradiction eliminates this possibility.` },

  { q: `By the same argument, is it also impossible for EF and GH to meet when produced in the direction of E and G? (yes/no):`,
    hint: `The reasoning is symmetric.` },

  { q: `If two straight lines do not meet when produced in either direction, are they parallel? (yes/no):`,
    hint: `Definition I.23.` },

  { q: `Therefore, is EF parallel to GH? (yes/no):`,
    hint: `This follows directly from the definition of parallel lines.` },

  { q: `Therefore, if two parallel planes are cut by a plane, are their common sections parallel? (yes/no):`,
    hint: `This restates the conclusion.` }
]

const conclusion = `Congratulations! You just if two parallel planes are cut by any plane, their common sections are parallel.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
