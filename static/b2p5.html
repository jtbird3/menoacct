<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Template — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.5 – Prove that the rectangle by two lines is equal to the rectangles by the uncut line and each segment.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.5 chatbot!

We are given a straight line AB. It is cut into two equal parts at C, and also into unequal parts at D. Do you agree? (yes/no):`,
    hint: `C is the midpoint of AB, while D is some other point on AB.` },
  { q: `Our goal is to prove that the rectangle AD x DB plus the square on CD equals the square on CB. Does that make sense? (yes/no):`,
    hint: `We want to use geometry to prove the algebraic expression AD x DB + CD² = CB².` },
  { q: `Now, on CB, let us construct the square CEFB. Possible? (yes/no):`,
    hint: `Proposition I.46 lets us describe a square on a given straight line.` },
  { q: `Next, join BE. Can we do that? (yes/no):`,
    hint: `Postulate 1 allows joining any two points by a straight line.` },
  { q: `Through point D, draw DG parallel to CE or BF, crossing BE at H. Is this possible? (yes/no):`,
    hint: `Proposition I.31 allows drawing a line parallel to a given line through a given point.` },
  { q: `Through point H, draw KM parallel to AB or EF so K is below A and M is below B, crossing CE at L. Possible? (yes/no):`,
    hint: `Again by I.31, we can construct parallels.` },
  { q: `And through point A, draw AK parallel to CL or BM. Allowed? (yes/no):`,
    hint: `Same reason: I.31 guarantees such parallels can be drawn.` },
  { q: `Now, recall that in a parallelogram, complements about the diagonal are equal. Do we then have complement CH = complement HF? (yes/no):`,
    hint: `This is Proposition I.43.` },
  { q: `If we add DM to each, do we conclude CM = DF? (yes/no):`,
    hint: `Equal things added to equals give equal sums.` },
  { q: `But is CM equal to AL, since AC = CB? (yes/no):`,
    hint: `From Proposition I.36, opposite sides of parallelograms are equal, and AC = CB as halves.` },
  { q: `Therefore, is AL = DF? (yes/no):`,
    hint: `Yes, from transitivity of equality.` },
  { q: `Adding CH to each, do we have AH = gnomon NOP? (yes/no):`,
    hint: `AH is a rectangle, and gnomon NOP is the complement structure built from it.` },
  { q: `Now, is AH the rectangle AD x DB (since DH = DB)? (yes/no):`,
    hint: `By construction, DH coincides in length with DB.` },
  { q: `So does the gnomon NOP equal the rectangle AD·DB? (yes/no):`,
    hint: `AH = AD x DB, so NOP must also equal this rectangle.` },
  { q: `If we add LG (the square on CD) to each side, do we get gnomon NOP + LG = (AD x DB + CD²)? (yes/no):`,
    hint: `LG was defined as equal to the square on CD.` },
  { q: `But is gnomon NOP + LG just the whole square CEFB on CB? (yes/no):`,
    hint: `The gnomon plus the added square fills out the entire square on CB.` },
  { q: `Therefore, does it follow that AD x DB + CD² = CB²? (yes/no):`,
    hint: `Exactly the relation to be proved.` }
];

const conclusion = `Congratulations! You just proved that the rectangle contained by AD and DB, together with the square on CD, is equal to the square on CB.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
