<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.29</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.29 – Prove that parallelepipedal solids which are on the same base and of the same height, and in which the extremities of the sides which stand up are on the same straight lines, are equal to one another.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.29 chatbot!

We are given two parallelepipedal solids, CM and CN. Do you agree? (yes/no):`,
    hint: `The proposition begins by naming the two solids CM and CN.` },

  { q: `The solids CM and CN are on the same base AB. Is that correct? (yes/no):`,
    hint: `Both solids are explicitly stated to be on base AB.` },

  { q: `The solids CM and CN are also of the same height. Do you agree? (yes/no):`,
    hint: `“On the same base and of the same height” is given.` },

  { q: `The extremities of the sides which stand up—AG, AF, LM, LN, CD, CE, BH, BK—lie on the same straight lines FN and DK. Is this part of the given construction? (yes/no):`,
    hint: `These straight lines are named explicitly in the statement.` },

  { q: `Our goal is to prove that the solid CM is equal to the solid CN. Does that make sense? (yes/no):`,
    hint: `This is exactly what the proposition claims.` },

  { q: `Now, each of the figures CH and CK is a parallelogram. Do you agree? (yes/no):`,
    hint: `These faces arise from the given parallelepipedal construction.` },

  { q: `In a parallelogram, are opposite sides equal? (yes/no):`,
    hint: `This is Proposition I.34.` },

  { q: `Since CB is equal to DH and also equal to EK, can we conclude that DH is equal to EK? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another.` },

  { q: `If EH is subtracted from both DH and EK, do the remainders DE and HK remain equal? (yes/no):`,
    hint: `Subtracting equals from equals leaves equal remainders.` },

  { q: `If DE equals HK, are the triangles DCE and HBK equal? (yes/no):`,
    hint: `Equal sides allow application of Propositions I.8 and I.4.` },

  { q: `From the equality of these triangles, are the parallelograms DG and HN equal? (yes/no):`,
    hint: `Equal bases between the same parallels give equal parallelograms (I.36).` },

  { q: `For the same reason, is the triangle AFG equal to the triangle MLN? (yes/no):`,
    hint: `The same configuration and reasoning applies.` },

  { q: `Are the parallelogram CF and the parallelogram BM equal, since they are opposite? (yes/no):`,
    hint: `Opposite parallelograms in the same solid are equal.` },

  { q: `Similarly, is CG equal to BN? (yes/no):`,
    hint: `These are also opposite parallelograms.` },

  { q: `Given these equal triangles and equal parallelograms, is the prism contained by triangles AFG and DCE with parallelograms AD, DG, CG equal to the prism contained by triangles MLN and HBK with parallelograms BM, HN, BN? (yes/no):`,
    hint: `Equal corresponding faces imply equal prisms.` },

  { q: `If we add to each prism the solid having base AB and opposite face GEHM, do the resulting solids remain equal? (yes/no):`,
    hint: `Adding equals to equals yields equal wholes.` },

  { q: `Therefore, is the whole parallelepipedal solid CM equal to the whole parallelepipedal solid CN? (yes/no):`,
    hint: `Each has been shown equal part-by-part and in total.` }
]

const conclusion = `Congratulations! You just parallelepipedal solids which are on the same base and of the same height, and in which the extremities of the sides which stand up are on the same straight lines, are equal to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
