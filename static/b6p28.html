<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.28 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.28 - Apply on a given straight line a parallelogram equal to a given figure and deficient by one similar to a given parallelogram</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.28 chatbot!

We are given a straight line AB and a rectilineal figure C which is not greater than a certain parallelogram on half of AB. Do you agree? (yes/no):`,
    hint: `AB is the base line; C is the area we want to match, and it is suitably small as required by the proposition.` },
  { q: `We are also given a parallelogram D, to which the “defect” (the missing parallelogram) must be similar. Do you agree? (yes/no):`,
    hint: `D gives the shape of the small parallelogram that will be “missing” from the one we apply to AB.` },
  { q: `Our goal is to have on AB a parallelogram equal in area to C and “deficient” by a parallelogram similar to D. Does that make sense? (yes/no):`,
    hint: `We want some parallelogram on AB, whose area equals C, and such that if we remove a smaller parallelogram (similar to D) from it, the remainder is exactly C.` },
  { q: `First, let us bisect the straight line AB at the point E. Can we do this? (yes/no):`,
    hint: `A straight line can be bisected (Proposition I.10).` },
  { q: `On the half EB, let us construct a parallelogram EBFG which is similar and similarly situated to D. Is this possible? (yes/no):`,
    hint: `We can construct a parallelogram on a given line similar to a given parallelogram (VI.18).` },
  { q: `Next, let us complete the parallelogram AHGE on AB so that EBFG is part of this larger parallelogram. Can we complete AG? (yes/no):`,
    hint: `A parallelogram can be completed on a given straight line and a given adjacent side (see I.31, I.34 type constructions).` },
  { q: `Now, if the completed parallelogram AG happens to be equal in area to C, would our problem already be solved? (yes/no):`,
    hint: `If AG is on AB, equal to C, and the missing part GB is similar to D, then the construction meets the requirement.` },
  { q: `In that case, is it true that to AB we have applied AG equal to C and deficient by the parallelogram GB which is similar to D? (yes/no):`,
    hint: `EBFG was made similar to D, and GB is the appropriate “defect” taken from AG.` },
  { q: `But suppose AG is not equal to C, and let the parallelogram HE be greater than C. Are we allowed to consider this case where HE > C? (yes/no):`,
    hint: `Euclid now treats the case when the first attempt AG does not directly give area C; we suppose a certain figure HE in the diagram exceeds C.` },
  { q: `Is the parallelogram HE equal in area to the parallelogram GB? (yes/no):`,
    hint: `In Euclidean geometry, complements of a parallelogram drawn about the same diameter are equal (I.43); HE and GB play that role and so have equal area.` },
  { q: `If HE is greater than C and HE is equal to GB, does it follow that GB is also greater than C? (yes/no):`,
    hint: `If HE > C and HE = GB, then GB must also exceed C by the same amount.` },
  { q: `Let us now construct a parallelogram KLMN equal to the excess by which GB is greater than C, and similar and similarly situated to D. Can we do this? (yes/no):`,
    hint: `Proposition VI.25 allows us to construct, on a given straight line, a parallelogram equal to any given rectilineal figure and similar to a given parallelogram. Here the figure is the excess GB − C.` },
  { q: `Since D is similar to GB, and KLMN is similar to D, is KM also similar to GB? (yes/no):`,
    hint: `If two parallelograms are each similar to a third, they are similar to each other (VI.21). A side like KM of KLMN corresponds to a side of GB.` },
  { q: `Let us agree that in these similar figures the side KL corresponds to GE, and the side LM corresponds to GF. Is this a reasonable assignment of corresponding sides? (yes/no):`,
    hint: `In similar parallelograms, corresponding sides lie opposite corresponding angles and are in the same ratio. We match KL ↔ GE and LM ↔ GF.` },
  { q: `Since KLMN has been constructed equal to the excess by which GB is greater than C, is the area of GB equal to the area of C together with the area of KM? (yes/no):`,
    hint: `“Equal to the excess” means: GB = C + (area of KLMN); its side KM represents that parallelogram.` },
  { q: `If GB is equal to C plus KM, is GB therefore greater than KM by itself? (yes/no):`,
    hint: `A sum is always greater than one of its proper parts.` },
  { q: `If GB is greater than KM and the parallelograms GB and KM are similar, does it follow that the corresponding side GE is greater than KL, and GF greater than LM? (yes/no):`,
    hint: `In similar rectangles/parallelograms, the ratio of areas matches the square of the ratio of corresponding sides, so the larger area has the larger corresponding sides.` },
  { q: `Now, on GE let us take a segment GO equal in length to KL, and on GF a segment GP equal in length to LM. Can we do this? (yes/no):`,
    hint: `By I.3 and I.2 we can cut off segments GO = KL on GE and GP = LM on GF.` },
  { q: `Using GO and GP as adjacent sides, let us complete the parallelogram OGPQ. Is this possible? (yes/no):`,
    hint: `We can always complete a parallelogram on two intersecting segments.` },
  { q: `Since GO = KL and GP = LM, and KL, LM bound the parallelogram KLMN, is OGPQ equal in area and similar to KLMN? (yes/no):`,
    hint: `Equal corresponding sides with the same included angle produce congruent and thus equal and similar parallelograms.` },
  { q: `If OGPQ is equal and similar to KLMN, and KLMN is similar to GB, does it follow that GQ is also similar to GB? (yes/no):`,
    hint: `Similarity is transitive; if OGPQ ~ KLMN and KLMN ~ GB, then GQ (the parallelogram through GQ) is similar to GB.` },
  { q: `If GQ is similar to GB, are they “about the same diameter,” that is, can they be drawn around a common diagonal? (yes/no):`,
    hint: `Proposition VI.26 tells us that similar parallelograms can be placed about the same diameter.` },
  { q: `Let GQB be taken as their common diameter, and let the full figure of complements and the gnomon UWV be described around this diameter, drawing TOQR parallel to AB and QS parallel to GE. Gnomon UWV consists of PR, OS, and QB. Can we do this? (yes/no):`,
    hint: `As in the usual diagonal constructions of parallelograms, we draw the remaining sides and complements around the chosen diameter.` },
  { q: `Now, since BG is equal to the combined areas C and KM, is BG = C + KM? (yes/no):`,
    hint: `From the earlier construction, KLMN was equal to the excess GB − C, so GB = C + KM.` },
  { q: `In these equals (BG and C + KM), do we have GQ equal to KM? (yes/no):`,
    hint: `GQ was constructed to be equal and similar to KM (via OGPQ and similarity).` },
  { q: `If equals have equal parts subtracted, are the remainders equal, so that the gnomon UWV is equal in area to C? (yes/no):`,
    hint: `From BG = C + KM and GQ = KM, subtract KM from both, leaving gnomon UWV (from BG) and C (from C + KM). By Common Notion 3, the remainders are equal.` },
  { q: `We are also told that PR is equal in area to OS. Do you accept PR = OS? (yes/no):`,
    hint: `PR and OS are complements about the same diameter and so are equal (as with complements in a parallelogram).` },
  { q: `If we add the area QB to each of PR and OS, do we obtain PB and OB respectively? (yes/no):`,
    hint: `PB is made up of PR and QB; OB is made up of OS and QB.` },
  { q: `If equals (PR and OS) have the same area QB added to each, are the resulting figures PB and OB equal? (yes/no):`,
    hint: `Adding equal areas to equal areas gives equal sums (Common Notion 2).` },
  { q: `But OB is equal to TE, since AE is equal to EB and OB, TE are opposite complements in the parallelogram about the diameter. Is OB = TE? (yes/no):`,
    hint: `In a parallelogram with a diameter through A and B, equal sides AE and EB lead to gnom opposite complements OB and TE (I.36-type reasoning).` },
  { q: `If OB is equal to TE and OB is equal to PB, does it follow that TE is also equal to PB? (yes/no):`,
    hint: `If OB = TE and OB = PB, then TE = PB of equality.` },
  { q: `Now let us add the area OS to each of TE and PB. Do we then obtain TS and the gnomon VWU respectively? (yes/no):`,
    hint: `TS is TE + OS; the gnomon VWU is PB + OS in the figure constructed about the diameter.` },
  { q: `If equals (TE and PB) have the same area OS added, are TS and the gnomon VWU equal in area? (yes/no):`,
    hint: `Again by Common Notion 2, adding the same area to equals yields equals.` },
  { q: `But we have already shown that the gnomon VWU is equal to C. Do you agree that VWU = C? (yes/no):`,
    hint: `This came from subtracting equal areas (KM and GQ) from equals (BG and C + KM).` },
  { q: `If TS is equal to the gnomon VWU, and VWU is equal to C, is TS also equal in area to C? (yes/no):`,
    hint: `Equality is transitive: TS = VWU and VWU = C imply TS = C.` },
  { q: `Therefore, on the given straight line AB, have we now applied the parallelogram ST equal to the given rectilineal figure C and deficient by a parallelogram QB which is similar to D? (yes/no):`,
    hint: `ST lies on AB, its area is C, and the “defect” QB is a parallelogram similar to D, satisfying the original requirement.` }
];

const conclusion = `Congratulations! You just applied a parallelogram equal to a given figure and deficient by one similar to a given parallelogram. 
Q.E.D. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
