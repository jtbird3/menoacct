<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.88</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.88 – Find the fourth apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.88 chatbot!

We are given a rational straight line A, and another straight line BG commensurable in length with it. Do you agree? (yes/no):`,
  hint: `A straight line commensurable in length with a rational straight line is itself rational.` },
{ q: `So BG is rational. Do you agree? (yes/no):`,
  hint: `Commensurable in length with a rational straight line implies rationality.` },

{ q: `Let two numbers DF and FE be set out such that the whole DE has not to either DF or FE the ratio which a square number has to a square number. Is this given? (yes/no):`,
  hint: `This condition excludes square-number ratios.` },

{ q: `Let it be contrived that, as DE is to EF, so is the square on BG to the square on GC. Is this construction possible? (yes/no):`,
  hint: `This follows from Book X, Proposition 6 (porism).` },
{ q: `From this proportion, is the square on BG commensurable with the square on GC? (yes/no):`,
  hint: `Equal ratios imply commensurability of squares.` },

{ q: `Since the square on BG is rational, is the square on GC also rational? (yes/no):`,
  hint: `A square commensurable with a rational square is itself rational.` },
{ q: `Therefore, is GC a rational straight line? (yes/no):`,
  hint: `A straight line whose square is rational is rational.` },

{ q: `Now, since DE does not have to EF the ratio which a square number has to a square number, does the square on BG also fail to have to the square on GC that ratio? (yes/no):`,
  hint: `The ratios were constructed to be equal.` },
{ q: `Therefore, is BG incommensurable in length with GC? (yes/no):`,
  hint: `Book X, Proposition 9.` },

{ q: `And since both BG and GC are rational, are they rational straight lines commensurable in square only? (yes/no):`,
  hint: `Rational lines incommensurable in length but commensurable in square satisfy this condition.` },
{ q: `Therefore, is BC an apotome? (yes/no):`,
  hint: `Book X, Proposition 73 defines such a line as an apotome.` },

{ q: `Now let the square on H be that by which the square on BG exceeds the square on GC. Do you see that such an H exists? (yes/no):`,
  hint: `The excess of one square over another is itself a square.` },
{ q: `Since as DE is to EF, so is the square on BG to the square on GC, does it follow, convertendo, that as ED is to DF, so is the square on GB to the square on H? (yes/no):`,
  hint: `Conversion of ratios (Book V, Proposition 19).` },

{ q: `But ED does not have to DF the ratio which a square number has to a square number. Do you agree? (yes/no):`,
  hint: `This was given at the outset.` },
{ q: `Therefore, does the square on GB also fail to have to the square on H the ratio which a square number has to a square number? (yes/no):`,
  hint: `Equal ratios preserve this property.` },
{ q: `Therefore, is BG incommensurable in length with H? (yes/no):`,
  hint: `Book X, Proposition 9 again.` },

{ q: `Is the square on BG greater than the square on GC by the square on a straight line incommensurable with BG? (yes/no):`,
  hint: `That straight line is H.` },
{ q: `Is the whole BG commensurable in length with the rational straight line A originally set out? (yes/no):`,
  hint: `This was given at the beginning.` },

{ q: `Our goal is to show that BC is a fourth apotome. Does that make sense? (yes/no):`,
  hint: `A fourth apotome satisfies all these conditions by definition.` },
{ q: `Therefore, is BC a fourth apotome? (yes/no):`,
  hint: `Book X, Definitions III.4.` },
]

const conclusion = `Congratulations! You just found the fourth apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
