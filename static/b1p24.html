<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.24 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.24 — Prove base greater when included angle greater given two equal sides</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.24 chatbot!
  
We are given two triangles ABC and DEF, with AB = DE and AC = DF. Do you agree? (yes/no):`,
    hint: `These pairs of sides are stated to be equal respectively.` },
  { q: `Also, the angle ∠BAC is greater than ∠EDF. Is that clear? (yes/no):`,
    hint: `This is the key inequality between the triangles.` },
  { q: `Our goal is to prove that the base BC is greater than the base EF. Does that make sense? (yes/no):`,
    hint: `We want to show the side opposite the larger included angle is longer.` },
  { q: `Next, on line DE at point D, construct ∠EDG equal to ∠BAC. Possible? (yes/no):`,
    hint: `Proposition I.23 allows construction of an angle equal to a given angle at a given point.` },
  { q: `Now, make DG equal to AC (or DF). Can we do that? (yes/no):`,
    hint: `By Postulate 3 and I.3, we can mark off a segment equal to a given one.` },
  { q: `Join EG and FG. Can we join them? (yes/no):`,
    hint: `Postulate 1 allows drawing a straight line between any two points.` },
  { q: `Since AB = DE, AC = DG, and ∠BAC = ∠EDG, do we conclude BC = EG? (yes/no):`,
    hint: `Proposition I.4 (SAS congruence) gives equality of the third side.` },
  { q: `Now, since DF = DG, is ∠DGF = ∠DFG? (yes/no):`,
    hint: `In isosceles triangles, the base angles are equal (I.5).` },
  { q: `Therefore, is ∠DFG greater than ∠EGF? (yes/no):`,
    hint: `If ∠DGF = ∠DFG, then each is larger than ∠EGF, since the whole ∠DFG includes ∠EGF.` },
  { q: `So, does it follow that ∠EFG is much greater than ∠EGF? (yes/no):`,
    hint: `∠EFG includes ∠DFG, making it larger still.` },
  { q: `In triangle EFG, is the greater angle opposite the greater side? (yes/no):`,
    hint: `By Proposition I.19, the larger angle subtends the larger side.` },
  { q: `Therefore, is EG greater than EF? (yes/no):`,
    hint: `The side opposite ∠EFG is longer than the side opposite ∠EGF.` },
  { q: `But earlier we showed EG = BC. So is BC > EF? (yes/no):`,
    hint: `Substitute equals: BC = EG, and EG > EF, hence BC > EF.` }
];

const conclusion = `Congratulations! You just proved if two triangles have equal pairs of sides, but one included angle greater than the other, then the base opposite the larger angle is also greater!
Q.E.D. (Quod Erat Demonstrandum)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
