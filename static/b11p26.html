<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.26 – Prove that on a given straight line, and at a given point on it, to construct a solid angle equal to a given solid angle.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.26 chatbot!

We are given a straight line AB, and a point A on it. Do you agree? (yes/no):`,
    hint: `AB is the given straight line, and A is the given point on it.` },

  { q: `We are also given a solid angle at D, contained by the angles EDC, EDF, and FDC. Do you agree? (yes/no):`,
    hint: `These three plane angles together determine the given solid angle at D.` },

  { q: `Our goal is to construct on the straight line AB, and at the point A on it, a solid angle equal to the given solid angle at D. Does that make sense? (yes/no):`,
    hint: `We want a solid angle at A matching the one at D.` },

  { q: `Let a point F be taken at random on the straight line DF. Is this allowed? (yes/no):`,
    hint: `Any point may be chosen arbitrarily on a straight line.` },

  { q: `From point F, let FG be drawn perpendicular to the plane through ED and DC, meeting that plane at G. Can we do this? (yes/no):`,
    hint: `Proposition XI.11 allows a perpendicular to be drawn from a point to a plane.` },

  { q: `Let DG be joined. Is this possible? (yes/no):`,
    hint: `A straight line can be drawn joining any two points.` },

  { q: `On the straight line AB, and at the point A on it, let the angle BAL be constructed equal to the angle EDC. Is this possible? (yes/no):`,
    hint: `By Proposition I.23, an angle equal to a given angle can be constructed at a given point on a straight line.` },

  { q: `Next, let the angle BAK be constructed equal to the angle EDG. Can we do this? (yes/no):`,
    hint: `Again, Proposition I.23 applies.` },

  { q: `Let AK be made equal to DG. Is this possible? (yes/no):`,
    hint: `A straight line equal to a given straight line can be set off from a given point.` },

  { q: `From the point K, let KH be set up at right angles to the plane through BA and AL. Is this allowed? (yes/no):`,
    hint: `Proposition XI.12 allows a perpendicular to be erected from a point to a plane.` },

  { q: `Let KH be made equal to GF. Can we do this? (yes/no):`,
    hint: `A straight line equal to a given straight line can be constructed.` },

  { q: `Let HA be joined. Is this possible? (yes/no):`,
    hint: `A straight line can be drawn joining any two points.` },

  { q: `Let AB and DE be cut off equal to one another. Can this be done? (yes/no):`,
    hint: `A segment equal to a given segment can be cut off on a straight line.` },

  { q: `Let HB, KB, FE, and GE be joined. Is this possible? (yes/no):`,
    hint: `Each is formed by joining two given points.` },

  { q: `Since FG is perpendicular to the plane through ED and DC, does it make right angles with all straight lines through G in that plane? (yes/no):`,
    hint: `By Definition XI.3, a line perpendicular to a plane is perpendicular to every line in the plane through the foot.` },

  { q: `Therefore, are the angles FGD and FGE right angles? (yes/no):`,
    hint: `Both GD and GE lie in the plane through ED and DC.` },

  { q: `For the same reason, are the angles HKA and HKB right angles? (yes/no):`,
    hint: `KH is perpendicular to the plane through BA and AL.` },

  { q: `Since KA equals GD, AB equals DE, and the contained angles are equal, can we conclude that KB equals GE? (yes/no):`,
    hint: `By Proposition I.4, triangles with two sides and the included angle equal have equal bases.` },

  { q: `Since KH equals GF and the contained angles are right angles, can we conclude that HB equals FE? (yes/no):`,
    hint: `Again, Proposition I.4 applies.` },

  { q: `Since AK equals DG, KH equals GF, and the contained angles are right angles, can we conclude that AH equals FD? (yes/no):`,
    hint: `This is another application of Proposition I.4.` },

  { q: `Since AB also equals DE, are the two sides HA and AB equal to the two sides DF and DE? (yes/no):`,
    hint: `Corresponding sides have been shown equal.` },

  { q: `And since HB equals FE, can we conclude that the angle BAH equals the angle EDF? (yes/no):`,
    hint: `By Proposition I.8, equal triangles give equal angles.` },

  { q: `For the same reason, is the angle HAL equal to the angle FDC? (yes/no):`,
    hint: `The same side–angle correspondences apply.` },

  { q: `And is the angle BAL equal to the angle EDC? (yes/no):`,
    hint: `These were constructed equal at the start.` },

  { q: `Therefore, has a solid angle been constructed at A, contained by the angles BAL, BAH, and HAL, equal to the given solid angle at D? (yes/no):`,
    hint: `All three corresponding plane angles are equal.` }
]

const conclusion = `Congratulations! You just on a given straight line, and at a given point on it, to construct a solid angle equal to a given solid angle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
