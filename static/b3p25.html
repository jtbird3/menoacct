<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.25 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.25 - Draw a complete circle based on a given segment</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.25 chatbot!

We are given a segment of a circle, called ABC. Do you agree? (yes/no):`,
    hint: `A segment of a circle is the region bounded by a chord and the arc above it.` },
  { q: `Our goal is to describe the full circle of which ABC is a segment. Does that make sense? (yes/no):`,
    hint: `We want to find the circle that has ABC as part of its circumference.` },
  { q: `Let us bisect AC at D. Can we do that? (yes/no):`,
    hint: `Proposition I.10: a straight line can be bisected.` },
  { q: `From point D, let us draw DB at right angles to AC. Possible? (yes/no):`,
    hint: `Proposition I.11: from a given point on a line, a perpendicular can be drawn.` },
  { q: `Also, join AB. Can we do that? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Now, the angle ABD is either greater than, equal to, or less than the angle BAD. Do you agree? (yes/no):`,
    hint: `One angle must be in one of these three relations.` },
  { q: `Case 1: angle ABD greater than angle BAD.

Let's assume ABD is greater than BAD. On BA, construct at A the angle BAE equal to angle ABD. Possible? (yes/no):`,
    hint: `Proposition I.23: one can construct an angle equal to a given angle at a point on a line.` },
  { q: `Extend DB through to meet point E. Can we do that? (yes/no):`,
    hint: `Postulate 2: a finite straight line can be produced continuously in a straight line.` },
  { q: `Now, join EC. Possible? (yes/no):`,
    hint: `Postulate 1: line from any point to any point.` },
  { q: `Since ∠ABE = ∠BAE, do we have EB = EA? (yes/no):`,
    hint: `Proposition I.6: if two angles in a triangle are equal, then the opposite sides are equal.` },
  { q: `If AD = DC and DE is common, and ∠ADE and ∠CDE are both right angles, can we conclude AE = CE by SAS? (yes/no):`,
    hint: `Proposition I.4: two triangles equal by SAS (sides AD = DC, DE common, right angle included).` },
  { q: `And since AE = BE, therefore BE = CE. Do you agree? (yes/no):`,
    hint: `AE = BE and AE = CE implies BE = CE (Common Notion 1).` },
  { q: `Therefore, are AE, EB, and EC all equal? (yes/no):`,
    hint: `We have just shown AE = BE = CE.` },
  { q: `Then, does the circle with center E and radius AE pass through A, B, and C? (yes/no):`,
    hint: `A circle with center E and radius AE will also pass through B and C, since EB = EC = AE.` },
  { q: `So can we describe the complete circle containing segment ABC? (yes/no):`,
    hint: `Yes, the circle centered at E with radius AE contains A, B, and C.` },
  { q: `And since E lies outside the segment, is ABC less than a semicircle? (yes/no):`,
    hint: `If the center lies outside the arc, the arc is less than a semicircle.` },
  { q: `Case 2: angle ABD equal to angle BAD.

Assume ∠ABD = ∠BAD for this case. Then AD = DB = DC. Do you agree? (yes/no):`,
    hint: `Equal angles at A and B, with AC bisected, force D to be equidistant from A, B, C.` },
  { q: `So is D the center of the circle through A, B, C? (yes/no):`,
    hint: `If a point is equidistant from three points A, B, and C, it must be the center of the circle.` },
  { q: `Therefore, is ABC a semicircle? (yes/no):`,
    hint: `If D lies on the midpoint of AC and AB passes through the center, the arc is a semicircle.` },
  { q: `Case 3: angle ABD less than angle BAD.

Now, assume ∠ABD < ∠BAD. From point A, let us construct angle BAE equal to ABD by drawing a straight line AE landing on DB, then join EC Possible? (yes/no):`,
    hint: `Proposition I.23 again allows angle construction. By postulate 1, we can connect two points with a straight line.` },
  { q: `Since EA must equal EB and E lies on the perpendicular bisector BD, do we know AE = BE = CE, making E the center of the circle? (yes/no):`,
    hint: `This construction ensures the center is within the arc ABC.` },
  { q: `So is the arc ABC greater than a semicircle when ∠ABD < ∠BAD? (yes/no):`,
    hint: `If the center lies inside the arc, then the segment contains more than half the circle.` },
  { q: `Therefore, can we describe the complete circle containing segment ABC in all three cases by finding the center? (yes/no):`,
    hint: `Yes, the circle centered at E with radius AE contains A, B, and C under any condition.` }
];

const conclusion = `Congratulations! You have described the complete circle based on a given segment.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
