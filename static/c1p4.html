<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.4 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.4 - Prove that a plane parallel to the base cuts a circular section whose center lies on the axis, forming a smaller cone</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Conics I.4 chatbot!

We are given a conic surface with vertex A and base circle BC. Do you agree? (yes/no):`,
  hint: `The conic surface is generated by a line moving around BC and passing through A.` },
{ q: `Our goal is to show that a plane cutting this surface parallel to BC makes a circle DE whose center lies on the axis, and that the figure between DE and the apex A is a cone. Does that make sense? (yes/no):`,
  hint: `We want to prove the section is circular and the truncated part is a cone.` },
{ q: `Let the cutting plane meet the surface in the line DE, making a smaller circle. Can we take this as the section? (yes/no):`,
  hint: `The plane is assumed parallel to BC and intersects the conic surface.` },
{ q: `Let F be the center of the base circle BC, and join AF. Acceptable? (yes/no):`,
  hint: `Joining A to the center F gives the axis of the cone.` },
{ q: `Does AF meet the cutting plane at a point G? (yes/no):`,
  hint: `The axis passes through all parallel sections.` },
{ q: `Draw the plane through A, F, and the base BC, forming triangle ABC. Reasonable? (yes/no):`,
  hint: `A plane through the axis and the base circle yields the axial triangle.` },
{ q: `Since D, G, and E lie both in the cutting plane and the axial plane, is DGE a straight line? (yes/no):`,
  hint: `Intersection of two planes is a straight line.` },
{ q: `Take any point H on the circumference of DE. Possible? (yes/no):`,
  hint: `Any point on a straight line may be chosen.` },
{ q: `Join AH and extend it to meet the base circle at K. Acceptable? (yes/no):`,
  hint: `The generating line through A meets the base circle.` },
{ q: `Join GH and FK. Can we do that? (yes/no):`,
  hint: `Any two points determine a straight line.` },
{ q: `Since DE and BC are in parallel planes, are DE and BC parallel? (yes/no):`,
  hint: `Common sections of parallel planes with a third plane are parallel.` },
{ q: `And for the same reason, are GH and KF parallel? (yes/no):`,
  hint: `Both arise as intersections of the axial plane with parallel planes.` },
{ q: `Using the parallelism, do we have the proportionalities: FA : AG = FB : GD = FC : GE = FK : GH? (yes/no):`,
  hint: `Parallel lines cut proportional segments (VI.4).` },
{ q: `Since FB = FK = FC on the circle, does this imply DG = HG = GE? (yes/no):`,
  hint: `Equal corresponding segments give equal distances from G.` },
{ q: `If all segments from G to points on DE are equal, is every line from G to DE the same length? (yes/no):`,
  hint: `The points D, H, E all give equal distances from G.` },
{ q: `If every point of DE is at the same distance from G, is DE a circle with center G? (yes/no):`,
  hint: `A circle is the set of points at equal distance from a center.` },
{ q: `Is G on the axis AF? (yes/no):`,
  hint: `G is where the axis meets the cutting plane.` },
{ q: `Then does this show that the section DE is a circle with center on the axis? (yes/no):`,
  hint: `Its center G lies on AF.` },
{ q: `Finally, is the figure between A, the surface, and the circle DE a cone? (yes/no):`,
  hint: `A conic surface cut by a plane parallel to the base yields a smaller similar cone.` },


];

const conclusion = `Congratulations! You just proved that a plane parallel to the base cuts a circular section whose center lies on the axis, forming a smaller cone.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
