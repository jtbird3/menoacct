<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.4 — Prove that if a cube number multiplies a cube number, the product is cube</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.4 chatbot!

We are given that a cube number A multiplied by a cube number B makes a number C. Do you agree? (yes/no):`,
    hint: `A and B are both cube numbers, and A·B = C.` },

  { q: `Our goal is to show that C is also a cube number. Does that make sense? (yes/no):`,
    hint: `We want to prove the product of two cube numbers is itself cube.` },

  { q: `First, let A multiply itself to make D. Can we do this? (yes/no):`,
    hint: `Every number can multiply itself; A·A = D.` },

  { q: `If A multiplying A gives D and A is cube, is D a cube number? (yes/no):`,
    hint: `IX.3 says the square of a cube number is cube.` },

  { q: `Now, if A multiplying A gives D and A multiplying B gives C, do we have the ratio A to B as D to C? (yes/no):`,
    hint: `If A multiplies B to give C, and multiplies itself to give D, then A:B = D:C (VII.17).` },

  { q: `Since A and B are cube numbers, are they similar solid numbers? (yes/no):`,
    hint: `Cube numbers represent similar solids; equal exponents imply similarity.` },

  { q: `If A and B are similar solid numbers, do two mean proportionals fall between A and B? (yes/no):`,
    hint: `VIII.19: similar solid numbers have two mean proportionals between them.` },

  { q: `From A is to B as D is toC, do two mean proportionals also fall between D and C? (yes/no):`,
    hint: `VIII.8: proportional solids have proportional means.` },

  { q: `If D is a cube number, and two means fall between D and C, must C also be a cube number? (yes/no):`,
    hint: `VIII.23: if a number has two means between it and a cube, then it is cube.` },

  { q: `Therefore, is C a cube number? (yes/no):`,
    hint: `The same reasoning that proves D is cube now applies to C.` }
]








const conclusion = `Congratulations! You just proved that if a cube number multiplies a cube number, the product is cube.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
