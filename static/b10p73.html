<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.73</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.73 – Prove that if a rational straight line is diminished by a rational straight line commensurable with the whole in square only, the remainder is irrational; let it be called an apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.73 chatbot!

We are given a rational straight line AB, and from it a rational straight line BC is subtracted. Do you agree? (yes/no):`,
  hint: `Both AB and BC are assumed to be rational straight lines.` },
{ q: `BC is commensurable with AB in square only, and not in length. Do you accept this condition? (yes/no):`,
  hint: `“Commensurable in square only” means their squares are commensurable, but their lengths are not.` },
{ q: `Our goal is to show that the remainder AC is irrational, and is called an apotome. Does that make sense? (yes/no):`,
  hint: `AC is what remains when BC is taken away from AB.` },

{ q: `Since AB is incommensurable in length with BC, do you agree that AB : BC equals the square on AB : the rectangle AB, BC? (yes/no):`,
  hint: `This follows from the definition of commensurable in square only.` },
{ q: `Therefore, is the square on AB incommensurable with the rectangle AB, BC? (yes/no):`,
  hint: `If ratios correspond and the lengths are incommensurable, so are the associated magnitudes (X.11).` },

{ q: `Are the squares on AB and BC commensurable with the square on AB? (yes/no):`,
  hint: `BC is rational, so its square is commensurable with the square on AB (X.15).` },
{ q: `Is twice the rectangle AB, BC commensurable with the rectangle AB, BC? (yes/no):`,
  hint: `Any magnitude is commensurable with twice itself (X.6).` },

{ q: `Do you agree that the squares on AB and BC together equal twice the rectangle AB, BC plus the square on AC? (yes/no):`,
  hint: `This is the result of Euclid II.7.` },
{ q: `Since the squares on AB and BC are incommensurable with the rectangle AB, BC, are they also incommensurable with the remainder, the square on AC? (yes/no):`,
  hint: `What remains from subtracting a commensurable magnitude from an incommensurable one is itself incommensurable (X.13, X.16).` },

{ q: `Are the squares on AB and BC rational? (yes/no):`,
  hint: `The squares of rational straight lines are rational.` },
{ q: `If the square on AC is incommensurable with rational squares, does it follow that AC itself is irrational? (yes/no):`,
  hint: `A straight line whose square is incommensurable with rational squares is irrational (X, Definition 4).` },

{ q: `Therefore, is the remainder AC an irrational straight line? (yes/no):`,
  hint: `This follows directly from the preceding steps.` },
{ q: `And is this irrational straight line AC called an apotome? (yes/no):`,
  hint: `This is the definition established by the proposition.` },
]

const conclusion = `Congratulations! You just proved that if a rational straight line is diminished by a rational straight line commensurable with the whole in square only, the remainder is irrational; let it be called an apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
