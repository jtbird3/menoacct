<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.103</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.103 – Prove that a straight line commensurable in length with an apotome is itself an apotome and of the same order.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.103 chatbot!

We are given a straight line AB which is an apotome, and another straight line CD commensurable in length with AB. Do you agree? (yes/no)`,
  hint: `A straight line commensurable with an apotome shares a common measure with it.` },

{ q: `Our goal is to show that CD is also an apotome and the same in order as AB. Does that make sense? (yes/no)`,
  hint: `An apotome has rational parts commensurable in square only.` },

{ q: `Let BE be the annex to AB. Can we do that? (yes/no)`,
  hint: `By definition of apotome, AB can be split into AE and BE such that AE and EB are rational lines commensurable in square only.` },
{ q: `AE and EB are rational straight lines commensurable in square only. Do you see that? (yes/no)`,
  hint: `This follows from the definition of an apotome (X.73).` },

{ q: `Suppose the ratio of BE to DF is the same as the ratio of AB to CD. Is this reasonable? (yes/no)`,
  hint: `By similar ratios (VI.12), corresponding parts maintain proportionality.` },
{ q: `Therefore, as the whole AE is to the whole CF, so is AB to CD. Can we state that? (yes/no)`,
  hint: `Using the property of proportionality, “as one is to one, so are all to all” (V.12).` },

{ q: `But AB is commensurable in length with CD. Do we agree? (yes/no)`,
  hint: `Given in the proposition.` },
{ q: `Therefore AE is also commensurable with CF, and BE with DF. Can we conclude this? (yes/no)`,
  hint: `Two magnitudes in the same ratio as commensurable magnitudes are themselves commensurable (X.11).` },

{ q: `Since AE and EB are rational and commensurable in square only, are CF and DF also rational and commensurable in square only? (yes/no)`,
  hint: `This is a consequence of X.13 applied to CF and DF.` },

{ q: `Now, as AE is to CF, so is BE to DF. Therefore, alternately, as AE is to EB, so is CF to FD. Is that correct? (yes/no)`,
  hint: `Alternation of ratios (V.16).` },

{ q: `Consider the square on AE greater than the square on EB either by a square commensurable with AE or incommensurable with AE. Do you follow? (yes/no)`,
  hint: `By definition of apotome (X.14).` },

{ q: `If the square on AE is greater than the square on EB by a square commensurable with AE, then is the square on CF also greater than the square on FD by a square commensurable with CF? (yes/no)`,
  hint: `The property is preserved for proportional lines (X.14).` },

{ q: `If AE is commensurable in length with a rational line, is CF also commensurable? Similarly, if BE then DF? And if neither AE nor EB, then neither CF nor FD? (yes/no)`,
  hint: `X.12 and X.13 guarantee these relations.` },

{ q: `If the square on AE is greater than EB by a square incommensurable with AE, then is the square on CF also greater than FD by a square incommensurable with CF? (yes/no)`,
  hint: `Again, X.14 preserves the property of incommensurability in the corresponding lines.` },

{ q: `Therefore, is CD an apotome and the same in order as AB? (yes/no)`,
  hint: `Since CF and DF satisfy the same rationality and commensurability conditions as AE and EB, CD inherits the apotome property.` },
]

const conclusion = `Congratulations! You just proved that a straight line commensurable in length with an apotome is itself an apotome and of the same order.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
