<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.14</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.14 — Prove that if one square measures another, then their sides also measure one another; and if the sides measure one another, the squares measure one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.14 chatbot!

We are given two square numbers A and B, and their sides C and D. Agreed? (yes/no):`,
    hint:`A and B are square numbers; C and D are the integers whose squares are A and B respectively.` },

  { q:`Our goal is to show two things: (1) If A measures B, then C measures D; (2) If C measures D, then A measures B. Does that make sense? (yes/no):`,
    hint:`A “measures” B means A divides B; similarly for C and D.` },

  { q:`First direction: If A measures B, then C measures D. Suppose A measures B. Do you accept this assumption? (yes/no):`,
    hint:`This means B = k·A for some integer k.` },

  { q:`Next, let C multiply D to make a number E. Can we form such a product? (yes/no):`,
    hint:`C·D is simply the product of the sides.` },

  { q:`From this construction, are A, E, and B continuously proportional in the ratio C to D? (yes/no):`,
    hint:`Proposition VIII.11 states that for square numbers A and B with sides C and D, A : E = E : B whenever E is C·D.` },

  { q:`Since A, E, B are continuously proportional and A measures B, does A also measure E? (yes/no):`,
    hint:`By VIII.7, in a continued proportion A, E, B, if A divides B, then A divides E as well.` },

  { q:`And since A is to E as C is to D, does it follow that C measures D? (yes/no):`,
    hint:`Definition VII.20: If numbers are proportional and the antecedent measures the consequent in one ratio, then the corresponding antecedent measures the corresponding consequent.` },

  { q:`Second direction: If C measures D, then A measures B. Now suppose C measures D. Do you accept this assumption? (yes/no):`,
    hint:`This means D = m·C for some integer m.` },

  { q:`Using the same construction as before (C multiplying D giving E), do we again have A, E, B continuously proportional in the ratio C to D? (yes/no):`,
    hint:`The same reasoning from VIII.11 applies.` },

  { q:`Since C is to D as A is to E, and C measures D, do we conclude A also measures E? (yes/no):`,
    hint:`By Definition VII.20, if C divides D, then A divides E.` },

  { q:`If A, E, B are continuously proportional, and A measures E, does A also measure B? (yes/no):`,
    hint:`In a continuous proportion, if A divides E, then A divides B as well.` }
]














const conclusion = `Congratulations! You just proved that if one square measures another, then their sides also measure one another; and if the sides measure one another, the squares measure one another
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
