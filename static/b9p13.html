<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.13</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.13 — Prove that if numbers beginning from a unit are in continued proportion and the number after the unit is prime, then the greatest is measured only by those numbers which occur in the proportion</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.13 chatbot!

We are given numbers A, B, C, D beginning from an unit and in continued proportion. The number A, the number after the unit, is prime. Do you agree? (yes/no):`,
    hint: `“Beginning from an unit” means the first term is the unit, followed by A, B, C, D in continued proportion.` },

  { q: `Our goal is to show that D, the greatest number, cannot be measured by any number except A, B, or C. Does that make sense? (yes/no):`,
    hint: `“Measured by” means divided exactly with no remainder.` },

  { q: `Assume, if possible, that D is measured by some number E which is not the same as A, B, or C. Is this assumption clear? (yes/no):`,
    hint: `This is a proof by contradiction.` },

  { q: `Now, we will investigate if E is prime. Ready to continue? (yes/no):`,
    hint: `We will examine whether E can be prime.` },

  { q: `If E were prime and measures D, must it also measure A? (yes/no):`,
    hint: `By Proposition IX.12, whatever measures a term of the proportion also measures the first term.` },

  { q: `But A is prime and not the same as E. Is it impossible for one prime to measure another distinct prime? (yes/no):`,
    hint: `A prime is measured only by unity and itself.` },

  { q: `Therefore, is E not prime? (yes/no):`,
    hint: `This follows from the contradiction.` },

  { q: `If E is not prime, is it composite? (yes/no):`,
    hint: `Every number is either prime or composite.` },

  { q: `Is every composite number measured by some prime number? (yes/no):`,
    hint: `Proposition VII.31 states this.` },

  { q: `Must E be measured by some prime number? (yes/no):`,
    hint: `Apply VII.31.` },

  { q: `Must A be the only prime that measures E? (yes/no):`,
    hint: `If another prime measured E, it would also measure D, and hence A, which is impossible.` },

  { q: `Therefore, must A measure E? (yes/no):`,
    hint: `A is the only possible prime measure.` },

  { q: `Now if E is not prime but does measure D, let it measure it according to F. Is this step clear? (yes/no):`,
    hint: `This means D = E × F.` },

  { q: `Now, suppose that F is the same as any of the numbers A, B, or C. May we assume this for contradiction? (yes/no):`,
    hint: `Suppose it were and derive a contradiction.` },

  { q: `If F were one of A, B, or C, would E then also be one of A, B, or C? (yes/no):`,
    hint: `By Proposition IX.11: In numbers in continued proportion, each term is produced by multiplying the preceding term by the same number.` },

  { q: `But this contradicts the hypothesis about E, assumed to be different from A, B, and C. Is that correct? (yes/no):`,
    hint: `E was assumed different from A, B, and C.` },

  { q: `If E is different from A, B, and C, and E measures D according to F, must F be different from A, B, and C? (yes/no):`,
    hint: `This follows by contradiction.` },

  { q: `And by the same reasoning that E is not prime, is F likewise not prime? (yes/no):`,
    hint: `If F were prime and measures D, then by Proposition IX.12 it would also measure A; but A is prime and not equal to F, which is impossible. (A prime is measured only by unity and itself.)` },

  { q: `If F were prime and measured D, would it also measure A? (yes/no):`,
    hint: `Again apply Proposition IX.12.` },

  { q: `Is this impossible since A is prime and distinct? (yes/no):`,
    hint: `A prime cannot be measured by another prime.` },

  { q: `Therefore, is F not prime and thus composite? (yes/no):`,
    hint: `Same reasoning as before.` },

  { q: `Now, must F be measured by some prime number? (yes/no):`,
    hint: `By Proposition VII.31.` },

  { q: `Must A be the only prime that measures F? (yes/no):`,
    hint: `Otherwise it would measure D and hence A.` },

  { q: `Therefore, does A measure F? (yes/no):`,
    hint: `A is again the only possibility.` },

  { q: `If E measures D according to F, and A by multiplying C also makes D, are the products A,C and E,F equal? (yes/no):`,
    hint: `Both equal D.` },

  { q: `From equality of products, can we say proportionally that as A is to E, so F is to C? (yes/no):`,
    hint: `Proposition VII.19.` },

  { q: `Since A measures E, does F also measure C? (yes/no):`,
    hint: `If A : E = F : C and A divides E, then F divides C.` },

  { q: `Let F measure C according to G. Is this clear? (yes/no):`,
    hint: `C = F × G.` },

  { q: `Can we similarly show that G is measured by A and is not the same as A or B? (yes/no):`,
    hint: `Repeat the same argument used for E and F.` },

  { q: `Since F by multiplying G makes C, and A by multiplying B also makes C, are the products F,G and A,B equal? (yes/no):`,
    hint: `Both equal C.` },

  { q: `From this equality, can we say proportionally that as A is to F, so G is to B? (yes/no):`,
    hint: `Proposition VII.19 again.` },

  { q: `If A measures F, does G also measure B? (yes/no):`,
    hint: `Apply the same proportional reasoning.` },

  { q: `Let G measure B according to H. Is this step clear? (yes/no):`,
    hint: `B = G × H.` },

  { q: `Is H different from A? (yes/no):`,
    hint: `Otherwise a contradiction will arise.` },

  { q: `If G by multiplying H makes B, and A by multiplying itself also makes B, are the products G,H and A,A equal? (yes/no):`,
    hint: `By Proposition IX.8.` },

  { q: `From this, can we say proportionally that as H is to A, so A is to G? (yes/no):`,
    hint: `Proposition VII.19.` },

  { q: `If A measures G, does H then measure A? (yes/no):`,
    hint: `If H : A = A : G and A divides G, then H divides A.` },

  { q: `But since A is prime and H is not the same as A, is this impossible? (yes/no):`,
    hint: `A prime cannot be measured by another distinct number.` },

  { q: `Therefore, is our original assumption false? (yes/no):`,
    hint: `The contradiction completes the proof.` },

  { q: `Therefore, does it follow that D is not measured by any number except A, B, and C? (yes/no):`,
    hint: `This is exactly what was to be shown.` }
]








const conclusion = `Congratulations! You just proved that if numbers beginning from a unit are in continued proportion and the number after the unit is prime, then the greatest is measured only by those numbers which occur in the proportion.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
