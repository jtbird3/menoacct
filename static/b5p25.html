<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.25 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.25 - Prove that if four magnitudes are proportional, the greatest and the least together are greater than the other two</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.25 chatbot!

We are given four magnitudes AB, CD, E, F, such that as AB is to CD, so is E to F. A is the greatest, and F is the least. Do you agree? (yes/no):`,
    hint: `This means the ratio AB : CD is equal to the ratio E : F. A is the longest, F is the shortest.` },
  { q: `Our goal is to prove that AB and F together are greater than CD and E. Does that make sense? (yes/no):`,
    hint: `We are showing that the sum of the extreme magnitudes exceeds the sum of the means.` },
  { q: `Let us make another magnitude AG equal to E, and CH equal to F. Can we construct these? (yes/no):`,
    hint: `We can take magnitudes equal to given ones, by definition of equality of magnitudes.` },
  { q: `Since as AB is to CD, so is E to F, and E = AG and F = CH, can we say as AB is to CD, so is AG to CH? (yes/no):`,
    hint: `Equal magnitudes can replace equals in a proportion.` },
  { q: `Now, from this proportion, if the same ratio holds when equal parts are taken away, then GB : HD equals AB : CD. Does that follow? (yes/no):`,
    hint: `By Proposition V.19, taking away equal ratios from proportional magnitudes leaves the remainders proportional.` },
  { q: `Since AB > CD, must GB > HD also be true? (yes/no):`,
    hint: `If two magnitudes are proportional and the first is greater than the second, the corresponding remainders keep that inequality.` },
  { q: `And we already have AG = E and CH = F. Is that still correct? (yes/no):`,
    hint: `These were constructed equal at the start.` },
  { q: `Then do AG and F equal CH and E in sum? (yes/no):`,
    hint: `Equal magnitudes added together form equal totals.` },
  { q: `Now, since GB > HD, if we add AG and F to GB, and CH and E to HD, will the sum AB and F be greater than CD and E? (yes/no):`,
    hint: `Adding equal quantities to unequal ones preserves the inequality.` },
  { q: `Therefore, are AB and F together greater than CD and E? (yes/no):`,
    hint: `The greater plus an equal remains greater than the lesser plus an equal.` }
];

const conclusion = `Congratulations! You just proved that if four magnitudes are proportional, the greatest and the least together exceed the remaining two.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
