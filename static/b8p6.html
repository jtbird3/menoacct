<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.6 — Prove that if numbers are in continued proportion and the first does not measure the second, none of the others measure another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.6 chatbot!

We are given several numbers A, B, C, D, E in continued proportion. Do you agree? (yes/no):`,
    hint: `Continued proportion means we have A to B as B to C as C to D as D to E.` },

  { q: `We are also told that A does not measure B. Do you accept this? (yes/no):`,
    hint: `“Does not measure” means A is not a divisor of B.` },

  { q: `Our goal is to show that none of the given numbers measure another "in order". Does that make sense? (yes/no):`,
    hint: `If A does not measure B, then likewise C does not measure D, D does not measure E, etc.` },

  { q: `If A does not measure even B, do A, B, C, D, E likewise not measure one another in order? (yes/no):`,
    hint: `If the first fails to measure the second, the sequence already fails immediately “in order.”` },

  { q: `Next, suppose for contradiction that A does measure C. Can we assume this for the sake of argument? (yes/no):`,
    hint: `By assuming the opposite of what we want to prove, if we derive a contradiction, then our assumption must be false.` },

  { q: `Let F, G, H be the least numbers having the same ratio as A, B, C. Can such least proportional numbers be taken? (yes/no):`,
    hint: `Proposition VII.33 guarantees least numbers in the same ratio as any given proportional numbers.` },

  { q: `If we have F to G equal to A to B and A does not measure B, does it follow that F does not measure G? (yes/no):`,
    hint: `VII Definition 20: if two numbers are in ratio and the first does not measure the second, then the corresponding first also does not measure the corresponding second.` },

  { q: `If F does not measure G, must F be not a unit? (yes/no):`,
    hint: `A unit measures every number, so if F fails to measure G, F cannot be 1.` },

  { q: `Now, by VIII.3, may we claim F and H prime to one another? (yes/no):`,
    hint: `Proposition VIII.3 says least numbers in the same ratio are relatively prime.` },

  { q: `If A is to C as F is to H, and F and H are prime to one another, must A not measure C? (yes/no):`,
    hint: `If F and H are prime to one another, the corresponding pair A and C cannot stand in a divisor relation derived from equality of ratios.` },

  { q: `So, does this contradict our assumption that A measured C? (yes/no):`,
    hint: `Yes — we assumed A measured C, but we just deduced that A cannot measure C.` },

  { q: `Since the contradiction arose from assuming A measures C, must we reject that assumption? (yes/no):`,
    hint: `A proof by contradiction requires discarding the false assumption.` },

  { q: `By the same reasoning, may we similarly conclude that no other number in the sequence A, B, C, D, E will measure any other? (yes/no):`,
    hint: `The argument applies to any pair in continued proportion with the same structure.` }
]















const conclusion = `Congratulations! You just proved that if numbers are in continued proportion and the first does not measure the second, none of the others measure another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
