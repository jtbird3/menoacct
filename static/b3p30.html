<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.30 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.30 - Bisect a given circumference</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements III.30 chatbot!

We are given a circumference ADB. Do you agree? (yes/no):`,
    hint: `A circumference is part of the perimeter of a circle.` },
  { q: `Our goal is to bisect ADB so that the arc is divided into two equal parts. Does that make sense? (yes/no):`,
    hint: `To bisect means to divide into two equal parts.` },
  { q: `First, join points A and B with a straight line. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows us to draw a straight line from any point to any point.` },
  { q: `Next, bisect the straight line AB at point C. Can we do this? (yes/no):`,
    hint: `Proposition I.10 shows how to bisect a given straight line.` },
  { q: `From point C, draw a straight line CD at right angles to AB. Can we do this? (yes/no):`,
    hint: `Proposition I.11 shows how to draw a straight line at right angles to a given line from a given point on it.` },
  { q: `Now join AD and DB. Is this possible? (yes/no):`,
    hint: `Postulate 1 allows us to join any two points with a straight line.` },
  { q: `Since AC = CB and CD is common, do triangles ACD and BCD have two sides equal? (yes/no):`,
    hint: `AC = CB by construction, and CD is the same for both triangles.` },
  { q: `And is ∠ACD equal to ∠BCD, since both are right angles? (yes/no):`,
    hint: `A line drawn perpendicular to AB at C makes right angles with AB.` },
  { q: `Therefore, by Proposition I.4 (SAS), are triangles ACD and BCD equal? (yes/no):`,
    hint: `Two sides and the included angle equal implies the triangles are equal.` },
  { q: `Therefore, is AD equal to DB? (yes/no):`,
    hint: `Corresponding sides of equal triangles are equal.` },
  { q: `But equal chords cut off equal circumferences, provided both are less than a semicircle. Do you agree? (yes/no):`,
    hint: `Proposition III.28 states this exactly.` },
  { q: `Since AD = DB and both arcs are less than a semicircle, is arc AD equal to arc DB? (yes/no):`,
    hint: `Equal chords cut equal arcs.` },
  { q: `Therefore, has the given circumference ADB been bisected at point D? (yes/no):`,
    hint: `Yes, arc AD = arc DB, so D is the midpoint of the circumference.` }
];

const conclusion = `Congratulations! You have bisected the given circumference.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
