<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.13</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.13 — Prove that in a section of a cone cut obliquely, any straight line drawn parallel to the common section has its square equal to a rectangle applied to the diameter; such a section is called an ellipse.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  {
    q: `Welcome to Conics I.13 chatbot!

We are given a cone whose vertex is A and whose base is the circle BC. Do you agree? (yes/no):`,
  hint: `A cone is determined by a vertex and a circular base.` },
{ q: `The cone is cut by a plane through its axis, making the triangle ABC as a section. Do you agree? (yes/no):`,
  hint: `A plane through the axis cuts the cone in an axial triangle.` },
{ q: `The cone is also cut by another plane, meeting both sides of the axial triangle, neither parallel nor antiparallel to the base, making a closed curved line DE on the cone. Is this clear? (yes/no):`,
  hint: `This is a general oblique section of the cone.` },
{ q: `Let FG be the common section of this plane with the base plane, and let FG be perpendicular to BC, where G is a point on BC produced. Agreed? (yes/no):`,
  hint: `FG lies in the base plane and is taken perpendicular to BC.` },
{ q: `According to Proposition I.7 and Definition 4, let ED be the diameter of the section DE. Do you accept this? (yes/no):`,
  hint: `The diameter is defined by the given construction rules.` },
{ q: `Let EH be drawn from E perpendicular to ED. Can we do this? (yes/no):`,
  hint: `A perpendicular can be drawn from a point to a line.` },
{ q: `Let AK be drawn through A parallel to ED, where K falls on extended base line BC. Is this allowed? (yes/no):`,
  hint: `A line parallel to a given line through a given point can be drawn.` },
{ q: `Let it be contrived that as square AK is to rectangle BK,KC, so DE is to EH. Is this proportion accepted? (yes/no):`,
  hint: `This is a given condition fixing the construction.` },
{ q: `Let a point L be taken at random on the section DE, and let LM be drawn through L parallel to FG. Is this construction clear? (yes/no):`,
  hint: `We may take an arbitrary point and draw a parallel through it.` },
{ q: `Our goal is to show that LM is equal in square to a rectangle applied to EH with breadth EM, decreased by a figure similar to rectangle DE,EH. Does that make sense? (yes/no):`,
  hint: `“Equal in square” means equal in area to a square on LM.` },
{ q: `Let DH be joined. Can we join these points? (yes/no):`,
  hint: `Any two points can be joined by a straight line.` },
{ q: `Through M let MXN be drawn parallel to HE such that EH = MN and X falls on line DH. Is this possible? (yes/no):`,
  hint: `A parallel through a given point can be drawn.` },
{ q: `Let HN and XO be drawn parallel to EM, where O falls on line EH. Is this allowed? (yes/no):`,
  hint: `Again, parallels through a point are allowed.` },
{ q: `Through M let PMR be drawn parallel to BC, where P and R fall on sides of the axial triangle ABC. Can we do this? (yes/no):`,
  hint: `We draw a line through M parallel to the base direction.` },
{ q: `Since PR is parallel to BC and LM is parallel to FG, is the plane through LM and PR parallel to the plane through FG and BC? (yes/no):`,
  hint: `Euclid XI.15: planes through parallel lines are parallel.` },
{ q: `Is the plane through FG and BC the base plane of the cone? (yes/no):`,
  hint: `FG lies in the base plane with BC.` },
{ q: `If a plane is drawn through LM and PR, is the section a circle with diameter PR? (yes/no):`,
  hint: `Conics I.4: a section parallel to the base gives a circle.` },
{ q: `Is LM perpendicular to that circle? (yes/no):`,
  hint: `LM is perpendicular to its diameter PR.` },
{ q: `Therefore, is rectangle PM,MR equal to square LM? (yes/no):`,
  hint: `Euclid II.14: rectangle under half-diameter segments equals square on the perpendicular.` },
{ q: `Recall: as square AK is to rectangle BK,KC, so DE is to EH. Do you recall this? (yes/no):`,
  hint: `This was the defining proportion.` },
{ q: `Is the ratio square AK to rectangle BK,KC compounded of the ratios AK to KB and AK to KC? (yes/no):`,
  hint: `Euclid VI.23: ratios of areas are compounded of side ratios.` },
{ q: `As AK is to KB, is EG to GB and EM to MP? (yes/no):`,
  hint: `Euclid VI.4: corresponding sides in similar triangles are proportional.` },
{ q: `As AK is to KC, is DG to GC and DM to MR? (yes/no):`,
  hint: `Again VI.4 applied on the other side.` },
{ q: `Therefore, is the ratio DE to EH compounded of EM to MP and DM to MR? (yes/no):`,
  hint: `The compounded ratios match term by term.` },
{ q: `Is the ratio rectangle EM,MD to rectangle PM,MR also compounded of EM to MP and DM to MR? (yes/no):`,
  hint: `Euclid VI.23 applied to rectangles.` },
{ q: `Therefore, as rectangle EM,MD is to rectangle PM,MR, so DE is to EH and DM is to MX. Do you agree? (yes/no):`,
  hint: `Euclid VI.4: equality of compounded ratios.` },
{ q: `Taking ME as common height, as DM is to MX, is rectangle DM,ME to rectangle XM,ME? (yes/no):`,
  hint: `Euclid VI.1: rectangles with equal heights follow side ratios.` },
{ q: `Therefore, as rectangle DM,ME is to rectangle PM,MR, so rectangle DM,ME is to rectangle XM,ME. Do you accept this? (yes/no):`,
  hint: `Euclid V.11: proportional alternation.` },
{ q: `Hence, is rectangle PM,MR equal to rectangle XM,ME? (yes/no):`,
  hint: `Euclid V.9: equality from equal ratios.` },
{ q: `But was rectangle PM,MR shown equal to square LM? (yes/no):`,
  hint: `This was proved from the circular section.` },
{ q: `Therefore, is rectangle XM,ME equal to square LM? (yes/no):`,
  hint: `Things equal to the same thing are equal.` },
{ q: `Is rectangle XM,ME the parallelogram applied to HE with breadth EM, decreased by a figure similar to rectangle DE,EH? (yes/no):`,
  hint: `The construction of MO and ON gives the decrease by a similar figure.` },
{ q: `Therefore, is LM equal in square to that applied rectangle? (yes/no):`,
  hint: `This is exactly what was to be shown.` },
{ q: `Thus such a section is called an ellipse, EH the latus rectum, and ED the latus transversum. Do you accept these names? (yes/no):`,
  hint: `These are definitions introduced at the end of the proof.` },








];

const conclusion = `Congratulations! You just proved that in a section of a cone cut obliquely, any straight line drawn parallel to the common section has its square equal to a rectangle applied to the diameter; such a section is called an ellipse.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
