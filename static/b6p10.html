<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.10 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.10 - Cut a given uncut straight line similarly to a given cut straight line</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.10 chatbot!

We are given a straight line AB (uncut) and another straight line AC cut at points D and E. Do you agree? (yes/no):`,
    hint: `AB is the uncut line; AC is divided at D and E into three parts AD, DE, EC.` },
  { q: `Our goal is to cut the line AB so that it is divided in the same ratio as AC is divided at D and E. Does that make sense? (yes/no):`,
    hint: `We want to divide AB at two points in the same proportional way as AC is divided.` },
  { q: `Let us place the two lines AB and AC so that they contain any angle between them. Is this possible? (yes/no):`,
    hint: `Two straight lines can be positioned to meet at a point, forming an angle (Postulate 1).` },
  { q: `Next, join the points B and C with a straight line. Can we do this? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },
  { q: `Through the points D and E on AC, draw the lines DF and EG parallel to BC. Can we do this? (yes/no):`,
    hint: `Proposition I.31 allows a straight line to be drawn through a given point parallel to a given straight line.` },
  { q: `Through D, draw another line DHK parallel to AB. Possible? (yes/no):`,
    hint: `Again by Proposition I.31, a parallel can be drawn through any point to a given line.` },
  { q: `Since DF and EG are drawn parallel to BC, and DH is parallel to AB, are FH and HB parallelograms? (yes/no):`,
    hint: `Opposite sides of a parallelogram are parallel (Definition 22).` },
  { q: `If FH and HB are parallelograms, is DH equal to FG, and HK equal to GB? (yes/no):`,
    hint: `Proposition I.34: Opposite sides and angles of parallelograms are equal.` },
  { q: `Since HE is drawn parallel to KC (one side of triangle DKC), can we say the sides are in proportion? (yes/no):`,
    hint: `Proposition VI.2: A line drawn parallel to one side of a triangle cuts the other two sides proportionally.` },
  { q: `Then, is the ratio of CE to ED the same as that of KH to HD? (yes/no):`,
    hint: `By VI.2, the parallel line HE makes CE:ED = KH:HD.` },
  { q: `But KH equals BG, and HD equals GF; does it follow that CE:ED = BG:GF? (yes/no):`,
    hint: `Replace KH and HD with their equal counterparts BG and GF.` },
  { q: `Again, since FD is drawn parallel to GE (one side of triangle AGE), are the sides AG, AE cut proportionally? (yes/no):`,
    hint: `Proposition VI.2 again: a line parallel to one side divides the others in proportion.` },
  { q: `So, is ED:DA equal to GF:FA? (yes/no):`,
    hint: `From the previous step, proportionality gives ED:DA = GF:FA.` },
  { q: `We have now two proportionalities — CE:ED = BG:GF and ED:DA = GF:FA. Do you see that AB is divided in the same ratio as AC? (yes/no):`,
    hint: `Each corresponding segment on AB has the same ratio as on AC; hence AB is cut similarly to AC.` },
  { q: `Therefore, have we succeeded in cutting the given uncut straight line AB similarly to the given cut line AC? (yes/no):`,
    hint: `The divisions correspond in the same proportional order, fulfilling the problem’s goal.` }
];

const conclusion = `Congratulations! You just cut a given uncut straight line similarly to a given cut straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
