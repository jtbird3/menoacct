<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.11 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.11 - Cut a line so rectangle equals square.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.11 chatbot!

We are given a straight line AB. Do you agree? (yes/no):`,
    hint: `AB is the line we must cut into two parts.` },
  { q: `Our goal is to cut AB so that the rectangle contained by AB and one part equals the square on the other. Does that make sense? (yes/no):`,
    hint: `One segment makes a rectangle with the whole line; the other segment makes a square. These must be equal.` },
  { q: `First, can we describe a square ABCD on AB? (yes/no):`,
    hint: `Proposition I.46 allows us to construct a square on any straight line.` },
  { q: `Now, let AC be bisected at point E. Possible? (yes/no):`,
    hint: `Proposition I.10 allows us to bisect a given straight line.` },
  { q: `Next, join BE. Can we do that? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Extend CA in a straight line to a point F so EF = EB. Can we do this? (yes/no):`,
    hint: `Postulate 2 allows a finite straight line to be produced further.` },
  { q: `On AF, can we describe a square FH? (yes/no):`,
    hint: `Again by Proposition I.46, we can construct a square on any line.` },
  { q: `Let GH be drawn through to K. Do you agree? (yes/no):`,
    hint: `We extend side GH of the square FH.` },
  { q: `Now for the proof: Since AC is bisected at E and FA is added, is the rectangle CF × FA plus the square on AE equal to the square on EF? (yes/no):`,
    hint: `Proposition II.6: rectangle plus square equals square on the whole.` },
  { q: `But EF equals EB. Is that correct? (yes/no):`,
    hint: `By construction, EF was made equal to BE.` },
  { q: `Therefore, is the rectangle CF x FA plus the square on AE equal to the square on EB? (yes/no):`,
    hint: `Substitution: EF = EB.` },
  { q: `But are the squares on BA and AE together equal to the square on EB? (yes/no):`,
    hint: `Yes, by Proposition I.47 (Pythagoras), since ∠A is right.` },
  { q: `So does it follow that the rectangle CF x FA plus the square on AE equals the squares on BA and AE? (yes/no):`,
    hint: `Equality follows from substitution.` },
  { q: `Now subtract the square on AE from both. Do we get rectangle CF x FA equal to the square on AB? (yes/no):`,
    hint: `Common Notion 3: subtract equals from equals.` },
  { q: `But rectangle CF x FA is FK (since AF = FG). Do you agree? (yes/no):`,
    hint: `AF and FG are equal sides of the square FH.` },
  { q: `And the square on AB is AD. Right? (yes/no):`,
    hint: `AD is the square constructed on AB.` },
  { q: `Thus FK = AD. If we subtract AK from both, do we get FH = HD? (yes/no):`,
    hint: `Again, Common Notion 3 allows subtraction of equals.` },
  { q: `Now, HD is the rectangle AB x BH (since AB = BD). Do you see this? (yes/no):`,
    hint: `By construction, BD equals AB, so HD corresponds to the rectangle.` },
  { q: `And FH is the square on AH. Correct? (yes/no):`,
    hint: `FH is the square drawn on AF, and AF = AH by the cut.` },
  { q: `Therefore, is the rectangle AB x BH equal to the square on AH? (yes/no):`,
    hint: `Yes, this is exactly the conclusion we set out to prove.` }
];

const conclusion = `Therefore, AB is cut at H so that the rectangle contained by AB and BH equals the square on AH. Good job!
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
