<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.19</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.19 – Prove that if two planes which cut one another are at right angles to a plane, their common section is also at right angles to that plane.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.19 chatbot!

We are given two planes, AB and BC, which cut one another. Do you agree? (yes/no):`,
    hint: `The planes intersect in a straight line.` },

  { q: `We are also given a plane of reference. Do you agree? (yes/no):`,
    hint: `This is the plane to which right angles are being considered.` },

  { q: `The plane AB is at right angles to the plane of reference. Agreed? (yes/no):`,
    hint: `This is given in the proposition.` },

  { q: `The plane BC is also at right angles to the plane of reference. Agreed? (yes/no):`,
    hint: `Both planes are perpendicular to the same plane.` },

  { q: `The common section of the planes AB and BC is the straight line BD. Do you see that? (yes/no):`,
    hint: `The intersection of two planes is a straight line.` },

  { q: `Our goal is to show that the straight line BD is at right angles to the plane of reference. Does that make sense? (yes/no):`,
    hint: `We want to prove BD is perpendicular to the plane of reference.` },

  { q: `Suppose that BD is not at right angles to the plane of reference. Can we assume this for a proof by contradiction? (yes/no):`,
    hint: `Euclid often proves statements by assuming the opposite.` },

  { q: `From the point D, let DE be drawn in the plane AB at right angles to the straight line AD. Is this construction possible? (yes/no):`,
    hint: `In a plane, a straight line can be drawn at right angles to a given straight line.` },

  { q: `From the same point D, let DF be drawn in the plane BC at right angles to CD. Is this also possible? (yes/no):`,
    hint: `The same construction applies in plane BC.` },

  { q: `Now, since the plane AB is at right angles to the plane of reference, and DE lies in plane AB at right angles to AD, is DE at right angles to the plane of reference? (yes/no):`,
    hint: `By Definition XI.4, a line perpendicular to the common section in a right-angled plane is perpendicular to the other plane.` },

  { q: `Similarly, since the plane BC is at right angles to the plane of reference, is DF also at right angles to the plane of reference? (yes/no):`,
    hint: `The same reasoning applies symmetrically.` },

  { q: `From the same point D, have we now set up two straight lines, DE and DF, both at right angles to the plane of reference on the same side? (yes/no):`,
    hint: `Both lines originate at D and are perpendicular to the same plane.` },

  { q: `Is it impossible to set up two distinct straight lines from the same point at right angles to the same plane on the same side? (yes/no):`,
    hint: `This contradicts Proposition XI.13.` },

  { q: `Since this contradiction arises, must our assumption be false? (yes/no):`,
    hint: `A false conclusion means the assumption was incorrect.` },

  { q: `Therefore, is the straight line BD at right angles to the plane of reference? (yes/no):`,
    hint: `BD is the only possible perpendicular from point D.` }
]

const conclusion = `Congratulations! You just if two planes which cut one another are at right angles to a plane, their common section is also at right angles to that plane.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
