<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.31</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>
<h1>I.31 - Prove that in a hyperbola, if a point on the transverse axis is taken not less than half the axis from the vertex, then any straight line drawn from that point to the section, when produced, falls within the section on the near side</h1>

<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [{ q: `Welcome to Apollonius' Conics I.31 chatbot!

We are given a hyperbola whose diameter is AB. Do you agree? (yes/no):`, hint: `AB is stated to be the diameter of the hyperbola.` },
{ q: `A point C is taken on the diameter AB, cutting off CB not less than (greater than or equal to) half of AB. Do you agree? (yes/no):`, hint: `The condition is CB ≥ ½ AB.` },
{ q: `Our goal is to show that a straight line drawn from C to meet the section, when continued, will fall within the section. Does that make sense? (yes/no):`, hint: `This is exactly the claim of the proposition.` },
{ q: `Let a straight line CD be drawn from point C to meet the hyperbola at D. Is this allowed? (yes/no):`, hint: `A straight line can be drawn from any point to meet a curve.` },
{ q: `Suppose, for the sake of contradiction, that CD when continued falls outside the section, as CDE. Do you accept this assumption? (yes/no):`, hint: `This is a standard indirect (reductio) step.` },
{ q: `From a point E taken at random on the produced line, let EG be drawn as an ordinate to the diameter, such that the line touches the section at F. Can we do this? (yes/no):`, hint: `Ordinates are drawn perpendicular to the diameter.` },
{ q: `From point D, let DH also be drawn as an ordinate to the diameter. Is this possible? (yes/no):`, hint: `Both EG and DH are ordinates to AB.` },
{ q: `First, suppose we have AB equal to CB. Do you accept this step? (yes/no):`, hint: `This considers the limiting case where CB is exactly half of AB.` },
{ q: `Do you agree that the ratio of the square on EG to the square on DH is greater than the ratio of the square on FG to the square on DH? (yes/no):`, hint: `This follows from Euclid V.8 and VI.22, as cited by Apollonius.` },
{ q: `Since EG is parallel to DH, is the ratio of the square on EG to the square on DH equal to the ratio of the square on CG to the square on CH? (yes/no):`, hint: `Parallel ordinates give proportional corresponding segments.` },
{ q: `For the hyperbola, is the ratio of the square on FG to the square on DH equal to the ratio of the rectangle AG, GB to the rectangle AH, HB? (yes/no):`, hint: `This is the defining property of the section (Apollonius I.21).` },
{ q: `Therefore, is the ratio of sq. CG to sq. CH greater than the ratio of rect. AG·GB to rect. AH·HB? (yes/no):`, hint: `This follows by substitution into the previous inequality.` },
{ q: `By alternation, is the ratio of sq. CG to rect. AG·GB greater than the ratio of sq. CH to rect. AH·HB? (yes/no):`, hint: `Standard proportional transformation (alternando).` },
{ q: `By separation (separando), does it follow that the ratio of sq. CB to rect. AG·GB is greater than the ratio of sq. CB to rect. AH·HB? (yes/no):`, hint: `Uses Euclid II.6 and V.17.` },
{ q: `Is this conclusion impossible, according to Euclid V.8? (yes/no):`, hint: `Equal magnitudes cannot have unequal ratios to unequal magnitudes in this way.` },
{ q: `Therefore, must the assumption that CDE falls outside the section be false? (yes/no):`, hint: `The contradiction shows the assumption cannot hold.` },
{ q: `So does the straight line CD, when continued, fall within the section? (yes/no):`, hint: `This is the desired conclusion.` },
{ q: `Finally, does it follow a fortiori that a straight line drawn from any point nearer than C on AC will also fall within the section? (yes/no):`, hint: `Such a line must lie even further inside than CD.` },



]

const conclusion = `Congratulations! You just proved that in a parabola or a hyperbola, a straight line drawn parallel to the diameter meets the section at one point only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
