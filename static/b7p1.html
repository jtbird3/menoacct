<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.1 - Prove that if repeated subtraction leaves a unit, the original numbers are prime to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.1 chatbot!

We are given two unequal numbers, which we will call AB and CD. Do you agree? (yes/no):`,
hint: `“Unequal” just means one is larger than the other.` },
{ q: `Our goal is to show that if repeated subtraction leaves a unit, the original numbers are prime to one another. Does that make sense? (yes/no):`,
hint: `Prime to one another means that only 1 measures both numbers.` },
{ q: `The smaller of AB and CD is continually subtracted from the larger. Can you picture this? (yes/no):`,
hint: `We keep subtracting the lesser number from the greater, step by step.` },
{ q: `We are told that the number left over never measures the number before it, until finally a unit is left. Do you accept this condition? (yes/no):`,
hint: `“Measures” means “divides without remainder.” “Unit” means the number 1.` },
{ q: `Let us suppose, for contradiction, that AB and CD are not prime to one another. May we assume this? (yes/no):`,
hint: `Euclid often uses contradiction: assume the opposite and derive an impossibility.` },
{ q: `If AB and CD are not prime to one another, must a number E measure both? (yes/no):`,
hint: `If two numbers share a common divisor > 1, that divisor measures each.` },
{ q: `Since CD measures BF, and E measures CD, must E also measure BF? (yes/no):`,
hint: `If a number measures another number, it also measures anything measured by that number.` },
{ q: `Since E measures AB, and BF is part of AB, must E also measure AF? (yes/no):`,
hint: `If a number measures a whole, it also measures the remainder after subtracting something it measures.` },
{ q: `Since AF measures DG, and E measures AF, do we conclude E measures DG? (yes/no):`,
hint: `Again, anything measured by a measured number is itself measured by E.` },
{ q: `Since E measures CD, and CD includes DG, can we say E measures CG (the remainder)? (yes/no):`,
hint: `Same pattern: if E measures the whole and part of it, it measures the leftover.` },
{ q: `Since CG measures FH, and E measures CG, does E also measure FH? (yes/no):`,
hint: `If X measures Y, and Y measures Z, then X measures Z.` },
{ q: `Since E measures FA, and FH is part of FA, can we say E measures AH, the unit? (yes/no):`,
hint: `A divisor of a number also divides its remainder.` },
{ q: `But a number cannot measure a unit. Do you agree? (yes/no):`,
hint: `Only 1 can measure 1. No other number can divide 1.` },
{ q: `Is this a contradiction? (yes/no):`,
hint: `We obtained something impossible: a non-unit measuring a unit.` },
{ q: `Therefore, must we reject the assumption that AB and CD share a common measure greater than 1? (yes/no):`,
hint: `Contradiction forces us to deny the assumption.` },
{ q: `So, are AB and CD prime to one another? (yes/no):`,
hint: `If no number >1 measures both, only 1 measures them.` },








];

const conclusion = `Congratulations! You just proved that if repeated subtraction leaves a unit, the original numbers are prime to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
