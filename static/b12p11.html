<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.11</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.11 – Prove that cones and cylinders of the same height are to one another as their bases.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.11 chatbot!

We are given two cones and two cylinders of equal height. Do you agree? (yes/no):`,
    hint: `The proposition assumes all solids compared have the same height.` },

  { q: `The circles ABCD and EFGH are the bases of the cones and cylinders. Is that correct? (yes/no):`,
    hint: `The bases are circles, named explicitly in the statement.` },

  { q: `The straight lines KL and MN are the axes of the cones, and AC and EG are diameters of the base circles. Agreed? (yes/no):`,
    hint: `The axes determine the common height; diameters fix the bases.` },

  { q: `Our goal is to prove that, as the circle ABCD is to the circle EFGH, so is the cone AL to the cone EN. Does that make sense? (yes/no):`,
    hint: `This is the exact claim of the proposition.` },

  { q: `Suppose, for the sake of contradiction, that the cone AL is not to the cone EN as the circle ABCD is to the circle EFGH. Is this allowed? (yes/no):`,
    hint: `Euclid often argues by exhaustion and contradiction.` },

  { q: `Then must the cone AL be in that ratio either to some solid less than the cone EN or to a greater one? (yes/no):`,
    hint: `These exhaust all possibilities.` },

  { q: `First, assume that, as the circle ABCD is to the circle EFGH, so the cone AL is to a solid O less than the cone EN. Do you follow? (yes/no):`,
    hint: `This is the first case considered.` },

  { q: `Let the solid X be equal to the difference by which the cone EN exceeds the solid O. Is that clear? (yes/no):`,
    hint: `Then EN = O + X.` },

  { q: `Let a square EFGH be inscribed in the circle EFGH. Is this possible? (yes/no):`,
    hint: `Any polygon can be inscribed in a circle.` },

  { q: `Is the square greater than half of the circle? (yes/no):`,
    hint: `An inscribed square exceeds half the area of its circle.` },

  { q: `From the square EFGH, let a pyramid be set up of equal height with the cone EN. Can this be done? (yes/no):`,
    hint: `Solids can be erected on plane bases with given height.` },

  { q: `Is this pyramid greater than half of the cone EN? (yes/no):`,
    hint: `By comparing inscribed and circumscribed pyramids.` },

  { q: `Now bisect the circumferences EF, FG, GH, HE at points P, Q, R, S, and join HP, PE, EQ, QF, FR, RG, GS, SH. Is this construction allowed? (yes/no):`,
    hint: `Straight lines may be joined between any points.` },

  { q: `Is each triangle HPE, EQF, FRG, GSH greater than half of the circular segment about it? (yes/no):`,
    hint: `Each triangle exceeds half its corresponding segment.` },

  { q: `On each of these triangles, let a pyramid of equal height with the cone be erected. Can we do this? (yes/no):`,
    hint: `Same base–height principle as before.` },

  { q: `Is each such pyramid greater than half of the corresponding segment of the cone? (yes/no):`,
    hint: `Solids follow the same proportional reasoning as their bases.` },

  { q: `By continually repeating this process, can we leave cone segments whose total volume is less than the solid X? (yes/no):`,
    hint: `By Euclid X.1, magnitudes can be exhausted.` },

  { q: `Let such segments be left, so that the remaining pyramid on base HPEQFRGS is greater than the solid O. Do you agree? (yes/no):`,
    hint: `Removing less than X leaves more than O.` },

  { q: `Now inscribe in circle ABCD a polygon DTAUBVCW similar and similarly situated to polygon HPEQFRGS. Is this possible? (yes/no):`,
    hint: `Similar polygons can be inscribed in circles.` },

  { q: `On this polygon, let a pyramid be erected of equal height with cone AL. Can we do this? (yes/no):`,
    hint: `Same height ensures proportional comparison.` },

  { q: `Since the squares on AC and EG are in the ratio of the polygons, and also in the ratio of the circles, do we conclude that the circles are to one another as the polygons are? (yes/no):`,
    hint: `By XII.1 and XII.2.` },

  { q: `As the polygons are to one another, are the pyramids erected on them (with equal height) in the same ratio? (yes/no):`,
    hint: `By XII.6, solids of equal height follow base ratios.` },

  { q: `But we assumed that, as the circle ABCD is to the circle EFGH, so is the cone AL to the solid O. Is that correct? (yes/no):`,
    hint: `This was the hypothesis of the contradiction.` },

  { q: `Therefore, is the cone AL to the pyramid in it as the solid O is to the pyramid in cone EN? (yes/no):`,
    hint: `By alternation and proportion theory (V.11, V.16).` },

  { q: `But is the cone AL greater than the pyramid inscribed in it? (yes/no):`,
    hint: `Any inscribed pyramid is less than the cone.` },

  { q: `Then must the solid O also be greater than the pyramid in cone EN? (yes/no):`,
    hint: `Equals are compared by proportion.` },

  { q: `But was the solid O not assumed to be less than that pyramid? (yes/no):`,
    hint: `This gives a contradiction.` },

  { q: `Therefore, is it impossible that the cone AL is to a lesser solid than cone EN in the ratio of their bases? (yes/no):`,
    hint: `The contradiction rules this out.` },

  { q: `Similarly, can we show it is impossible for the cone EN to be in that ratio to a lesser solid than cone AL? (yes/no):`,
    hint: `The argument is symmetric.` },

  { q: `Next, suppose that the cone AL is to a solid greater than cone EN as the circle ABCD is to EFGH. Is this the second case? (yes/no):`,
    hint: `This completes the alternatives.` },

  { q: `Then, inversely, would the circle EFGH be to ABCD as that greater solid is to cone AL? (yes/no):`,
    hint: `Inversion of ratios.` },

  { q: `Would this imply that cone EN is to a solid less than cone AL in the same ratio? (yes/no):`,
    hint: `By proportional inversion.` },

  { q: `But was this not already shown to be impossible? (yes/no):`,
    hint: `It contradicts the earlier result.` },

  { q: `Therefore, is the cone AL neither to a greater nor to a lesser solid than cone EN in the ratio of their bases? (yes/no):`,
    hint: `Both cases have been eliminated.` },

  { q: `Must it follow that, as the circle ABCD is to the circle EFGH, so is the cone AL to the cone EN? (yes/no):`,
    hint: `This is the only remaining possibility.` },

  { q: `Since each cylinder is triple of the cone on the same base and height, are cylinders in the same ratio as the cones? (yes/no):`,
    hint: `By XII.10.` },

  { q: `Therefore, are cylinders of equal height to one another as their bases? (yes/no):`,
    hint: `This completes the proposition.` }
]

const conclusion = `Congratulations! You just proved that cones and cylinders of the same height are to one another as their bases.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
