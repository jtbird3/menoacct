<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.6 — Prove that if two numbers are the same parts of two others, then their sum is the same parts of the sum</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.6 chatbot!

AB is said to be parts of C, and DE the same parts of F. Do you agree? (yes/no):`,
hint: `“AB is parts of C” means that AB measures C — that is, AB is a divisor of C.` },
{ q: `Our goal is to prove that the sum of AB and DE is the same parts of the sum of C and F that AB is of C. Does that make sense? (yes/no):`,
hint: `We want to show that the relation of part to whole is preserved when equal ratios are added together.` },
{ q: `Since AB is parts of C, and DE the same parts of F, does it follow that as many parts of C as there are in AB, there are also as many parts of F in DE? (yes/no):`,
hint: `The “same parts” condition means the number of equal measures fitting into each whole is identical.` },
{ q: `Let AB be divided into its parts of C — call them AG and GB — and DE into its parts of F — call them DH and HE. Is this allowed? (yes/no):`,
hint: `We can always conceptually divide a number into as many equal parts as it measures another.` },
{ q: `Now, is the multitude (count) of AG, GB equal to the multitude of DH, HE? (yes/no):`,
hint: `Each pair contains the same number of equal parts, by assumption.` },
{ q: `Since whatever part AG is of C, the same part DH is of F, can we say that whatever part AG is of C, the same part also is the sum of AG and DH of the sum of C and F? (yes/no):`,
hint: `By Proposition VII.5, equal ratios remain equal when corresponding magnitudes are added.` },
{ q: `For the same reason, is whatever part GB is of C the same part as the sum of GB and HE of the sum of C and F? (yes/no):`,
hint: `The same reasoning applies to every corresponding part pair.` },
{ q: `Therefore, if the parts AG, GB correspond to DH, HE in this way, can we conclude that the whole AB is to C as the whole AB + DE is to C + F? (yes/no):`,
hint: `Combining equal ratios termwise preserves equality (VII.5 extended to all parts).` },
{ q: `So, is it true that whatever parts AB is of C, the same parts also is the sum of AB and DE of the sum of C and F? (yes/no):`,
hint: `Each component pair preserves the same part-to-whole relation, so their sums do also.` },










];

const conclusion = `Congratulations! You just proved that if two numbers are the same parts of two others, then their sum is the same parts of the sum
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
