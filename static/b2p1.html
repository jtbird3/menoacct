<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Template — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.1 - Prove that the rectangle of the uncut line cut line is equal to the rectangles by the uncut line and each segment of cut line.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.1 chatbot!

We are given two straight lines, A and BC, where BC is cut at points D and E. Do you agree? (yes/no):`,
    hint: `A is one line kept whole, while BC is divided into the parts BD, DE, and EC.` },
  { q: `Our goal is to show that the rectangle contained by A and BC equals the sum of the rectangles contained by A with BD, with DE, and with EC. Does that make sense? (yes/no):`,
    hint: `We want to prove: A x BC = A x BD + A x DE + A x EC.` },
  { q: `First, from point B draw BF at right angles to BC. Can we do that? (yes/no):`,
    hint: `Postulate I.11 lets us draw a perpendicular from a point on a line.` },
  { q: `Next, cut off from BF line BG equal to A. Is that possible? (yes/no):`,
    hint: `By I.3, we can cut off from a greater line a part equal to a given lesser line.` },
  { q: `Through G draw GH parallel to BC. Can we do this? (yes/no):`,
    hint: `Proposition I.31 allows a parallel to be drawn through a given point.` },
  { q: `Now, through points D, E, and C, draw DK, EL, and CH each parallel to BG. Is this possible? (yes/no):`,
    hint: `Again, by I.31, we can draw parallels through any chosen point.` },
  { q: `Do you see that the large rectangle BH equals the rectangles BK, DL, and EH put together? (yes/no):`,
    hint: `The parallels cut the figure into adjoining smaller rectangles.` },
  { q: `Do you see that BH is the rectangle contained by A and BC? (yes/no):`,
    hint: `BH is formed by GB and BC, and GB = A.` },
  { q: `Do you see that BK is the rectangle contained by A and BD? (yes/no):`,
    hint: `BK is formed by GB and BD, and GB = A.` },
  { q: `Is DL the rectangle contained by A and DE? (yes/no):`,
    hint: `DK equals BG, and BG = A.` },
  { q: `And is EH the rectangle contained by A and EC? (yes/no):`,
    hint: `CH equals BG, and BG = A.` },
  { q: `Therefore, is the whole rectangle BH equal to the sum BK + DL + EH? (yes/no):`,
    hint: `The whole rectangle divides exactly into the sum of the parts.` }
];

const conclusion = `Congratulations! We have shown that the rectangle on A and BC equals the sum of the rectangles on A x BD, A x DE, and A x EC.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
