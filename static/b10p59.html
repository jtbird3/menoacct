<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.59</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.59 – Prove that if an area is contained by a rational straight line and the sixth binomial, the side of the area is the irrational straight line called the side of the sum of two medial areas.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.59 chatbot!

We are given an area ABCD contained by a rational straight line AB and a sixth binomial AD. Do you agree? (yes/no):`, hint: `AB is rational, and AD is a sixth binomial by hypothesis.` },
{ q: `The sixth binomial AD is divided into its terms at E, with AE the greater term. Is that clear? (yes/no):`, hint: `A sixth binomial is composed of two unequal rational terms.` },
{ q: `Our goal is to show that the side of AC is the irrational straight line called the side of the sum of two medial areas. Does that make sense? (yes/no):`, hint: `We want to classify the side of the square equal to the area.` },

{ q: `Let the same construction be made as before shown. Is this allowed? (yes/no):`, hint: `Euclid refers to a previously established construction for such areas.` },
{ q: `From this construction, is it evident that MO is the side of AC? (yes/no):`, hint: `MO is constructed as the side of the square equal to area ABCD.` },

{ q: `Are MN and NO incommensurable in square? (yes/no):`, hint: `This follows from the properties of the sixth binomial construction.` },

{ q: `Now, since EA is incommensurable in length with AB, are EA and AB rational straight lines commensurable in square only? (yes/no):`, hint: `This is the definition of such incommensurability.` },
{ q: `Therefore, is AK (the sum of the squares on MN and NO) a medial area? (yes/no):`, hint: `By Proposition X.21, the sum of squares of such lines is medial.` },

{ q: `Again, since ED is incommensurable in length with AB, is FE incommensurable with EK? (yes/no):`, hint: `This follows from Proposition X.13.` },
{ q: `Are FE and EK rational straight lines commensurable in square only? (yes/no):`, hint: `Incommensurability in length but commensurability in square implies this.` },
{ q: `Therefore, is EL (that is, MR, the rectangle contained by MN and NO) medial? (yes/no):`, hint: `Again by Proposition X.21.` },

{ q: `Since AE is incommensurable with EF, is AK also incommensurable with EL? (yes/no):`, hint: `By Proposition VI.1 and X.11, incommensurability is preserved.` },
{ q: `Is AK the sum of the squares on MN and NO, and is EL the rectangle contained by MN and NO? (yes/no):`, hint: `This comes directly from their constructions.` },
{ q: `Therefore, is the sum of the squares on MN and NO incommensurable with the rectangle MN, NO? (yes/no):`, hint: `This follows from the previous step.` },

{ q: `Are each of these areas medial, and are MN and NO incommensurable in square? (yes/no):`, hint: `All these properties have now been established.` },
{ q: `Therefore, is MO the side of the sum of two medial areas? (yes/no):`, hint: `By Proposition X.41, this exactly defines such a line.` },
{ q: `And since MO is the side of AC, have we shown that the side of AC is the side of the sum of two medial areas? (yes/no):`, hint: `MO and AC have already been identified as corresponding.` },
{ q: `Therefore, if an area is contained by a rational straight line and a sixth binomial, is its side the irrational straight line called the side of the sum of two medial areas? (yes/no):`, hint: `This is precisely what has been demonstrated.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and the sixth binomial, the side of the area is the irrational straight line called the side of the sum of two medial areas.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
