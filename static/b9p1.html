<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.1 — Prove that if two similar plane numbers multiply one another, their product is square</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.1 chatbot!

We are given two similar plane numbers A and B. Do you agree? (yes/no):`,
    hint:`“Similar plane numbers” means they have the same ratio of sides; they are constructed from two numbers in the same proportion.` },

  { q:`Our goal is to show that if A multiplied by B makes C, then C is square. Does that make sense? (yes/no):`,
    hint:`A “square number” is the product of some number multiplied by itself.` },

  { q:`A multiplied by B makes the number C. Are we assuming this? (yes/no):`,
    hint:`The proposition begins with A·B = C.` },

  { q:`Next, let A multiply itself and make the number D. Can we do that? (yes/no):`,
    hint:`Any number can be multiplied by itself to create a square number.` },

  { q:`Is D therefore square? (yes/no):`,
    hint:`A number formed from A×A is, by definition, square.` },

  { q:`If A multiplying A gives D and A multiplying B gives C, do we have the ratio A is to B as D is to C? (yes/no):`,
    hint:`Proposition VII.17: if the same number multiplies unequal numbers, the products are proportional.` },

  { q:`If A and B are similar plane numbers, does one mean proportional fall between them? (yes/no):`,
    hint:`Proposition VIII.18: between similar plane numbers exactly one mean proportional exists.` },

  { q:`If one mean proportional falls between A and B, does one also fall between D and C (numbers having the same ratio)? (yes/no):`,
    hint:`Proposition VIII.8: if numbers have equal ratios, the same number of means fall between them.` },

  { q:`If one mean proportional also falls between D and C, and D is square, must C be square? (yes/no):`,
    hint:`Proposition VIII.22: if a number has one mean proportional to a square, then the second number is also square.` },

  { q:`Therefore, is the product C of the similar plane numbers A and B a square number? (yes/no):`,
    hint:`The reasoning shows C must be square.` }
]








const conclusion = `Congratulations! You just proved that if two similar plane numbers multiply one another, their product is square.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
