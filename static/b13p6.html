<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.6 – Prove that if a rational straight line is cut in extreme and mean ratio, each of the resulting segments is the irrational straight line called an apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.6 chatbot!

We are given an equilateral pentagon ABCDE. Do you agree? (yes/no):`,
    hint: `Equilateral means all five sides AB, BC, CD, DE, EA are equal.` },

  { q: `The angles at A, B, and C, taken in order, are equal to one another. Agreed? (yes/no):`,
    hint: `These are three consecutive interior angles.` },

  { q: `First, let us join AC, BE, and FD. Is this construction allowed? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn from any point to any point.` },

  { q: `Our goal is to prove that all five interior angles of pentagon ABCDE are equal. Does that make sense? (yes/no):`,
    hint: `“Equiangular” means all interior angles are equal.` },

  { q: `Now, consider the two sides CB, BA and the two sides BA, AE. Are these pairs equal respectively? (yes/no):`,
    hint: `The pentagon is equilateral, so CB = BA and BA = AE.` },

  { q: `Is the angle CBA equal to the angle BAE? (yes/no):`,
    hint: `These are among the given equal angles at B and A.` },

  { q: `Since two sides and the included angle are equal in triangles ABC and ABE, can we apply Proposition I.4? (yes/no):`,
    hint: `I.4 is the Side–Angle–Side triangle congruence.` },

  { q: `From Proposition I.4, do we conclude that AC = BE, the triangles ABC and ABE are equal, and the remaining angles are equal? (yes/no):`,
    hint: `Equal triangles have equal corresponding sides and angles.` },

  { q: `In particular, is the angle BCA equal to the angle BEA? (yes/no):`,
    hint: `These are angles subtended by equal sides in the equal triangles.` },

  { q: `Also, is the angle ABE equal to the angle CAB? (yes/no):`,
    hint: `Another pair of corresponding angles from I.4.` },

  { q: `From this, can we conclude that AF = BF? (yes/no):`,
    hint: `This follows from Proposition I.6 (angles opposite equal angles are equal).` },

  { q: `Now, was it already shown that the whole AC equals the whole BE? (yes/no):`,
    hint: `This came from triangle congruence.` },

  { q: `If AC = BE and AF = BF, can we conclude that the remainders FC and FE are equal? (yes/no):`,
    hint: `Subtract equals from equals (Common Notion 3).` },

  { q: `Is side CD equal to side DE? (yes/no):`,
    hint: `All sides of the pentagon are equal.` },

  { q: `Do the two sides FC, CD equal the two sides FE, ED, with FD common? (yes/no):`,
    hint: `FC = FE, CD = DE, and FD is the same line.` },

  { q: `From Proposition I.8, can we conclude that ∠FCD = ∠FED? (yes/no):`,
    hint: `Two sides and the base equal imply equal angles.` },

  { q: `Was the angle BCA already proved equal to AEB? (yes/no):`,
    hint: `This came from triangle congruence earlier.` },

  { q: `Therefore, is the whole angle BCD equal to the whole angle AED? (yes/no):`,
    hint: `Each consists of equal component angles.` },

  { q: `By hypothesis, is ∠BCD equal to the angles at A and B? (yes/no):`,
    hint: `BCD is one of the given equal angles.` },

  { q: `Can we then conclude that ∠AED is also equal to the angles at A and B? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another (Common Notion 1).` },

  { q: `Similarly, can we prove that ∠CDE is also equal to the angles at A, B, and C? (yes/no):`,
    hint: `The same reasoning applies cyclically.` },

  { q: `Therefore, have we shown that all five angles of pentagon ABCDE are equal? (yes/no):`,
    hint: `Each interior angle has been shown equal to the others.` },

  { q: `Thus, is the pentagon ABCDE equiangular? (yes/no):`,
    hint: `Q.E.D. (Quod Erat Demonstrandum).` },

  { q: `Case 2 — Three equal angles not taken in order. Now suppose the equal angles are at A, C, and D, not taken in order. Do you agree? (yes/no):`,
    hint: `These are non-consecutive vertices.` },

  { q: `Let BD be joined. Is this allowed? (yes/no):`,
    hint: `Postulate 1 again.` },

  { q: `Consider the sides BA, AE and the sides BC, CD. Are these equal respectively? (yes/no):`,
    hint: `All sides of the pentagon are equal.` },

  { q: `Do these side pairs contain equal angles? (yes/no):`,
    hint: `By hypothesis, the angles at A and C are equal.` },

  { q: `Can we apply Proposition I.4 to triangles ABE and BCD? (yes/no):`,
    hint: `Two sides and the included angle are equal.` },

  { q: `From I.4, do we conclude that BE = BD and that the triangles are equal? (yes/no):`,
    hint: `Corresponding sides of equal triangles are equal.` },

  { q: `Does it follow that ∠AEB = ∠CDB? (yes/no):`,
    hint: `Corresponding angles of equal triangles.` },

  { q: `Since BE = BD, are the base angles ∠BED and ∠BDE equal? (yes/no):`,
    hint: `Proposition I.5 (isosceles triangle).` },

  { q: `From this, can we conclude that the whole angle AED equals the whole angle CDE? (yes/no):`,
    hint: `Each is composed of equal parts.` },

  { q: `By hypothesis, is ∠CDE equal to the angles at A and C? (yes/no):`,
    hint: `CDE is one of the given equal angles.` },

  { q: `Therefore, is ∠AED also equal to the angles at A and C? (yes/no):`,
    hint: `Things equal to the same thing are equal.` },

  { q: `For the same reason, is the angle ABC equal to the angles at A, C, and D? (yes/no):`,
    hint: `The argument repeats symmetrically.` },

  { q: `Therefore, have we shown that all five interior angles are equal? (yes/no):`,
    hint: `Each has been shown equal to the same given angles.` },

  { q: `Thus, in this case also, is the pentagon ABCDE equiangular? (yes/no):`,
    hint: `The proof holds in both configurations.` }
]

const conclusion = `Congratulations! You just proved that if a rational straight line is cut in extreme and mean ratio, each of the resulting segments is the irrational straight line called an apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
