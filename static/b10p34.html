<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.34</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.34 - Find two straight lines incommensurable in square such that the sum of the squares on them is medial, but the rectangle contained by them is rational.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.34 chatbot!

Let there be set out two medial straight lines AB and BC, commensurable in square only. Do you agree? (yes/no):`,
hint: `“Commensurable in square only” means their squares are commensurable, but the lines themselves are not.` },
{ q: `Assume that the rectangle contained by AB and BC is rational. Do you accept this condition? (yes/no):`,
hint: `This is given in the proposition.` },
{ q: `Assume also that the square on AB exceeds the square on BC by the square on a straight line incommensurable with AB. Is this given? (yes/no):`,
hint: `This follows from the cited result in Book X.` },
{ q: `Let the semicircle ADB be described on AB. Can we do this? (yes/no):`,
hint: `A semicircle can be drawn on any straight line as diameter.` },
{ q: `Let BC be bisected at E. Is this construction possible? (yes/no):`,
hint: `Any straight line can be bisected.` },
{ q: `Let there be applied to AB a parallelogram equal to the square on BE and deficient by a square figure, namely the rectangle AF, FB. Is this allowed? (yes/no):`,
hint: `Proposition VI.28 permits the application of a parallelogram equal to a given figure and deficient by a square.` },
{ q: `From this construction, is AF incommensurable in length with FB? (yes/no):`,
hint: `This follows from Book X, Proposition 18.` },
{ q: `Let FD be drawn from F at right angles to AB. Can we draw this perpendicular? (yes/no):`,
hint: `A perpendicular can be drawn from a point to a line.` },
{ q: `Let AD and DB be joined. Is this permitted? (yes/no):`,
hint: `A straight line may be drawn joining any two points.` },

{ q: `Our goal is to find two straight lines incommensurable in square such that the sum of the squares on them is medial, but the rectangle contained by them is rational. Does that make sense? (yes/no):`,
hint: `We must produce two lines with (1) incommensurable squares, (2) a medial sum of squares, and (3) a rational rectangle.` },

{ q: `Since AF is incommensurable in length with FB, is the rectangle BA, AF incommensurable with the rectangle AB, BF? (yes/no):`,
hint: `By Book X, Proposition 11, proportionality transfers commensurability and incommensurability to the corresponding rectangles.` },
{ q: `Is the rectangle BA, AF equal to the square on AD? (yes/no):`,
hint: `In the right triangle ADB (right angle at D), the rectangle under AB and AF equals the square on AD by the lemma on a right triangle.` },
{ q: `Is the rectangle AB, BF equal to the square on DB? (yes/no):`,
hint: `Similarly, the rectangle under AB and BF equals the square on DB.` },
{ q: `Therefore, is the square on AD incommensurable with the square on DB? (yes/no):`,
hint: `Equals substituted for equals preserve incommensurability.` },
{ q: `Since the square on AB is medial, is the sum of the squares on AD and DB also medial? (yes/no):`,
hint: `By I.47, the squares on AD and DB together equal the square on AB, and a sum equal to a medial area is medial.` },
{ q: `Since BC is double of DF, is the rectangle AB, BC double of the rectangle AB, FD? (yes/no):`,
hint: `Rectangles scale with their sides when the base AB is fixed.` },
{ q: `Is the rectangle AB, BC rational? (yes/no):`,
hint: `This was given at the start.` },
{ q: `Therefore, is the rectangle AB, FD also rational? (yes/no):`,
hint: `By Book X, Proposition 6, a half of a rational area is rational, hence a double/half relation preserves rationality.` },
{ q: `Is the rectangle AB, FD equal to the rectangle AD, DB? (yes/no):`,
hint: `This is the standard lemma for a right triangle: the rectangle contained by the hypotenuse and the altitude equals the rectangle contained by the segments of the hypotenuse.` },
{ q: `Therefore, is the rectangle AD, DB rational? (yes/no):`,
hint: `Things equal to the same rational area are rational.` },

{ q: `Have we therefore found two straight lines AD and DB incommensurable in square, such that the sum of the squares on them is medial, but the rectangle contained by them is rational? (yes/no):`,
hint: `AD and DB have incommensurable squares, their squares sum to the medial square on AB, and their rectangle equals a rational rectangle, so all conditions are satisfied.` }

]





const conclusion = `Congratulations! You just found two straight lines incommensurable in square such that the sum of the squares on them is medial, but the rectangle contained by them is rational.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
