<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.29 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.29 - Apply a parallelogram with a given excess</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.29 chatbot!

We are given a straight line AB, a rectilineal figure C, and a figure D. Agreed? (yes/no):`,
    hint: `AB is the line we will apply a parallelogram to; C is the area to match; D is the shape of the excess.` },
  { q: `Our goal is to apply to AB a parallelogram equal to C and exceeding by a parallelogram similar to D. Does that make sense? (yes/no):`,
    hint: `We want a parallelogram on AB whose “extra part” has the same shape as D.` },
  { q: `First, bisect AB at E. Can we do that? (yes/no):`,
    hint: `Proposition I.10 allows us to bisect any given straight line.` },
  { q: `On EB, construct a parallelogram BF similar and similarly situated to D. Possible? (yes/no):`,
    hint: `VI.18 allows constructing a parallelogram similar to a given figure on a given line.` },
  { q: `Next, construct a parallelogram GH that is equal to BF + C and also similar and similarly situated to D. Can we do this? (yes/no):`,
    hint: `VI.25 gives a way to construct a figure similar to a given one and equal to any assigned area.` },
  { q: `Let KH correspond to FL and KG correspond to FE in these similar figures. Do you accept this correspondence? (yes/no):`,
    hint: `Corresponding sides of similar parallelograms match in order.` },
  { q: `Since GH is greater than BF, we know that KH is greater than FL and KG is greater than FE. Do you agree? (yes/no):`,
    hint: `In similar figures, greater wholes imply proportionally greater corresponding sides.` },
  { q: `Produce FL beyond L and FE beyond E so that FLM = KH and FEN = KG. Allowed? (yes/no):`,
    hint: `Postulate 2 lets us extend any straight line. I.3 lets us mark off a segment equal to a given segment.` },
  { q: `Now, complete parallelogram MN. Is this possible? (yes/no):`,
    hint: `Parallelogram completion is standard.` },
  { q: `Since MN was constructed with corresponding sides equal to KH and KG, is MN equal and similar to GH? (yes/no):`,
    hint: `Equal corresponding sides in the same ratio give equal and similar parallelograms.` },
  { q: `GH is similar to EL; therefore is MN also similar to EL? (yes/no):`,
    hint: `If two figures are both similar to a third, they are similar to each other.` },
  { q: `If MN is similar to EL, are they said to be “about the same diameter”? (yes/no):`,
    hint: `VI.26 uses similarity to define figures about the same diameter.` },
  { q: `Let us draw the common diameter FO. Can we draw FO? (yes/no):`,
    hint: `We may join any two points by a straight line (Postulate 1).` },
  { q: `Now, let us complete the figure about diameter FO. Extend LB beyond B to Q and EB beyond B to P. Acceptable? (yes/no):`,
    hint: `Completing a parallelogram or figure about a diameter is standard in Book VI.` },
  { q: `Since GH = BF + C and GH = MN, is MN also equal to BF + C? (yes/no):`,
    hint: `If two things equal the same thing, they equal each other (Common Notion 1).` },
  { q: `Subtract EL (equal to BF) from both GH and MN. Do we get the gnomon XWV (gnomon around FB) equal to C? (yes/no):`,
    hint: `Subtracting equals from equals leaves equals (Common Notion 3).` },
  { q: `Complete parallelogram AN. Since AE = EB, does AN = NB? (yes/no):`,
    hint: `I.36 gives that parallelograms on equal bases between parallels have equal areas; here the equal halves imply equal segments.` },
  { q: `And does NB = LP? (yes/no):`,
    hint: `I.43 relates complements in parallelograms: equal complements are equal.` },
  { q: `Add EO to both AN and LP. Then is AO equal to the gnomon VWX? (yes/no):`,
    hint: `Adding equals to equals gives equals (Common Notion 2).` },
  { q: `But the gnomon VWX is equal to C; therefore is AO equal to C? (yes/no):`,
    hint: `We just established AO equals that gnomon, and the gnomon equals C.` },
  { q: `Finally, does AO exceed AB by a parallelogram QP that is similar to D, since PQ is similar to EL? (yes/no):`,
    hint: `VI.24 ensures that parallelograms similarly situated to EL are similar to D.` },
  { q: `Therefore, have we applied to AB a parallelogram equal to C and exceeding by a parallelogram similar to D? (yes/no):`,
    hint: `This completes the construction exactly as required. Q.E.F.` }
];

const conclusion = `Congratulations! You just applied a parallelogram with a given excess.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
