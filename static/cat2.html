<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Anamnesis: The Elenchus of Naming</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #1a1a1a; color: #d4d4d4; font-family: "Georgia", serif; padding: 20px; max-width: 700px; margin: auto; }
    #chat { background: #252525; padding: 25px; min-height: 450px; border-radius: 8px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; border: 1px solid #333; }
    .msg { line-height: 1.6; animation: fadeIn 0.5s; }
    .bot { color: #e0e0e0; font-weight: 400; border-left: 2px solid #ce9178; padding-left: 15px; }
    .user { color: #9cdcfe; text-align: right; padding-right: 15px; font-style: italic; }
    #input-area { margin-top: 20px; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px; background: #333; border: 1px solid #444; color: #fff; font-family: inherit; }
    button { padding: 10px 20px; background: #ce9178; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #b57a62; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<h2 style="text-align: center; color: #ce9178;">Anamnesis Tutoring: Aristotle's Categories</h2>
<div id="chat"></div>
<div id="input-area">
  <input type="text" id="userInput" placeholder="Speak your mind..." autocomplete="off">
  <button onclick="handleInput()">Respond</button>
</div>

<script>
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let stage = "intro";

const script = {
  intro: {
    q: "If I show you a living man and a painting of a man, and I call them both 'animals', am I lying in either case?",
    process: (val) => {
      val = val.toLowerCase();
      if (val.includes("no") || val.includes("both")) return "common_name";
      return "aporia_lying";
    }
  },
  aporia_lying: {
    q: "If it is a lie to call the painting an 'animal', why does every man recognize it as such when asked? Does the word not belong to it in some way?",
    process: () => "common_name"
  },
  common_name: {
    q: "So they share the name 'animal'. Now, consider the 'being' of the man and the 'being' of the paint. If you defined what makes the man an animal, would that same definition describe the painting?",
    process: (val) => {
      val = val.toLowerCase();
      if (val.includes("no") || val.includes("different")) return "the_gap";
      return "aporia_definition";
    }
  },
  aporia_definition: {
    q: "If the definition is the same, then should the painting not be able to walk or eat? If it cannot, is the 'animal' in the painting the same thing as the 'animal' in the man?",
    process: () => "the_gap"
  },
  the_gap: {
    q: "We have one name, but two different accounts of what the things are. Aristotle calls this 'Equivocal'. In your own words, how can one word represent two things that are fundamentally different?",
    process: (val) => "articulation"
  },
  articulation: {
    q: "You have arrived. You see that 'equivocal' things have a common name, but the definition of their essence is different. How would you now define 'equivocal' to someone who has never heard the word?",
    process: () => "end"
  }
};

function addMessage(text, sender) {
  const m = document.createElement('div');
  m.className = `msg ${sender}`;
  m.innerHTML = text;
  chatDiv.appendChild(m);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function handleInput() {
  const val = inputField.value;
  if (!val) return;
  addMessage(val, 'user');
  inputField.value = '';

  setTimeout(() => {
    stage = script[stage].process(val);
    if (stage === "end") {
      addMessage("Q.E.D. You have recollected the first principle of the Categories. The tutoring is complete.", "bot");
    } else {
      addMessage(script[stage].q, "bot");
    }
  }, 600);
}

// Initial prompt
addMessage(script.intro.q, "bot");

inputField.addEventListener("keypress", (e) => {
  if (e.key === "Enter") handleInput();
});
</script>
</body>
</html>
