<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.3 — Prove that if a cube number multiplies itself, the product is cube</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.3 chatbot!

We are given a cube number A, and by multiplying A by itself we obtain B. Do you agree? (yes/no):`,
    hint: `A cube number means it is produced by a number multiplied by itself twice.` },

  { q: `Let C be the side (the root) of the cube number A. Acceptable? (yes/no):`,
    hint: `A cube number has a side whose triple product gives it.` },

  { q: `Let C multiplied by itself produce D. Can we state this? (yes/no):`,
    hint: `C × C = D.` },

  { q: `Since C multiplied D produces A, do you accept that C multiplying D gives A? (yes/no):`,
    hint: `A is cube with side C, so C·C·C = A.` },

  { q: `If C multiplying itself makes D, does C measure D? (yes/no):`,
    hint: `If x·y = z, then x measures z according to the units in y.` },

  { q: `Since the unit measures C, can we say the ratio of an unit to C equals the ratio C to D? (yes/no):`,
    hint: `This is Euclid VII.Def.20.` },

  { q: `Because C multiplied D makes A, does D measure A? (yes/no):`,
    hint: `D measures A according to the units in C.` },

  { q: `Since the unit measures C, can we also say an unit is to C as D is to A? (yes/no):`,
    hint: `Same proportionality rule: VII.Def.20.` },

  { q: `Now, if an unit is to C as C is to D and also an unit is to C as D is to A, do we have a continued proportion an unit is to C as C is to D as D is to A? (yes/no):`,
    hint: `Equal ratios link into one proportion.` },

  { q: `From this, have two mean proportionals C, D fallen between unit and A? (yes/no):`,
    hint: `A sequence of four in continuous proportion has two means.` },

  { q: `Next, since A multiplied itself makes B, do you agree A measures B? (yes/no):`,
    hint: `A × A = B.` },

  { q: `Since the unit measures A, can we say an unit is to A as A is to B? (yes/no):`,
    hint: `Again VII.Def.20.` },

  { q: `If we already know that two mean proportionals fall between unit and A; does Euclid VIII.8 guarantee that two mean proportionals also fall between A and B? (yes/no):`,
    hint: `VIII.8: equal ratio structures extend forward.` },

  { q: `Finally, if two mean proportionals fall between two numbers, and the first is cube, is the second also cube? (yes/no):`,
    hint: `VIII.23: cube-ness is preserved under this proportional structure.` },

  { q: `Since A is cube, must B also be cube? (yes/no):`,
    hint: `The property transfers by VIII.23.` }
]








const conclusion = `Congratulations! You just proved that if a cube number multiplies itself, the product is cube.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
