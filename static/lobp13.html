<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Theory of Parallels Theorem 13 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Theorem 13 — A line perpendicular to the intersection of two perpendicular planes, lying in one, is perpendicular to the other</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Lobachevsky's Theory of Parallels Theorem 13 chatbot!

Let planes P and Q be perpendicular to each other, intersecting along line t. Let line l lie in plane P and be perpendicular to t at point O. Do you accept this setup? (yes/no):`,
    hint: `We have two planes meeting at a right dihedral angle, and a line in one plane that is perpendicular to their line of intersection.` },
  { q: `In plane Q, draw a line m perpendicular to t at the same point O. Is this possible? (yes/no):`,
    hint: `Within plane Q, we can always draw a line through O perpendicular to t.` },
  { q: `The dihedral angle between planes P and Q is measured by the angle between lines in each plane that are perpendicular to t at the same point. That angle is 90° since P ⊥ Q. So the angle between l (in P, perpendicular to t) and m (in Q, perpendicular to t) is 90°. Do you agree? (yes/no):`,
    hint: `The dihedral angle is measured exactly by this pair of lines — one in each plane, both perpendicular to the line of intersection at the same point.` },
  { q: `So l is perpendicular to both t and m, and these two lines both lie in plane Q passing through O. By Theorem 11, is l therefore perpendicular to every line in plane Q that passes through O? (yes/no):`,
    hint: `Theorem 11 says: a line perpendicular to two lines in a plane at their common point is perpendicular to all lines in that plane through that point.` },
  { q: `A line that is perpendicular to every line in plane Q through O is, by definition, perpendicular to plane Q. Does it follow that l ⊥ Q? (yes/no):`,
    hint: `This is the definition of a line being perpendicular to a plane: it must be perpendicular to every line in the plane passing through the foot of the perpendicular.` }
];

const conclusion = `Congratulations! You just proved Theorem 13: a straight line at right angles to the intersection of two perpendicular planes, and lying in one, is perpendicular to the other.
Q.E.D.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
