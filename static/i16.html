<script>
const STEPS = [
  { type:"yn", q:"We are given triangle ABC with side BC produced to D. Can you see the triangle and the exterior extension?", no:"ABC is the triangle, and BC continues past C to D.", text:"Let ABC be a triangle, and let one side of it BC be produced to D;", just:null, side:"Given: BC produced to D", reveal:[] },
  { type:"yn", q:"Our claim is that the exterior angle ACD is greater than either opposite interior angle, CBA and BAC. Does that match the goal?", no:"Yes. We are proving the exterior angle is greater than each of the two remote interior angles.", text:"I say that the exterior angle ACD is greater than either of the interior and opposite angles CBA, BAC.", just:null, side:"Goal: ∠ACD > ∠ABC and ∠BAC", reveal:[] },
  { type:"open", q:"What does Euclid do first to side AC?", criteria:"He bisects AC at E.", hint:"The first construction step uses Proposition I.10.", ok_regex:"bisect|bisected|midpoint|e", ok_targets:["bisect","midpoint","e"], text:null, just:null, side:null, reveal:[], display_linked_idx:3 },
  { type:"draw", q:"Let AC be bisected at E.", reveal:["dc-midpoint"], text:"Let AC be bisected at E,", just:"I.10", side:"AE = EC" },
  { type:"draw", q:"Join BE and produce it in a straight line to F.", reveal:["dc-bef"], text:"and let BE be joined and produced in a straight line to F;", just:null, side:"BE produced to F" },
  { type:"open", q:"What must be made equal to BE?", criteria:"EF (or FE) must be made equal to BE.", hint:"Euclid now copies BE onto the produced line.", ok_regex:"\\bef\\b|\\bfe\\b|ef.*be|be.*ef|equal", ok_targets:["ef","fe","be","equal"], text:null, just:null, side:null, reveal:[], display_linked_idx:6 },
  { type:"draw", q:"Let EF be made equal to BE.", reveal:[], text:"let EF be made equal to BE,", just:"I.3", side:"BE = EF" },
  { type:"draw", q:"Join FC.", reveal:["dc-fc"], text:"let FC be joined,", just:"Post. 1", side:"Join FC" },
  { type:"draw", q:"And draw AC through to G.", reveal:["dc-ag"], text:"and let AC be drawn through to G.", just:"Post. 2", side:"Produce AC to G" },
  { type:"open", q:"By which proposition do we know that angle AEB equals angle FEC?", criteria:"Proposition I.15.", hint:"Those are vertical angles.", ok_regex:"i\\s*\\.?\\s*15|prop(?:osition)?\\.?\\s*15|fifteen|vertical", ok_targets:["i15","fifteen","vertical"], text:null, just:null, side:null, reveal:["dc-i15"], display_linked_idx:10 },
  { type:"open", q:"Since AE equals EC and BE equals EF, and angle AEB equals angle FEC, which proposition lets us compare triangles ABE and CFE?", criteria:"Proposition I.4.", hint:"Two sides and the included angle are equal.", ok_regex:"i\\s*\\.?\\s*4|prop(?:osition)?\\.?\\s*4|four|sas", ok_targets:["i4","four","sas"], text:"Then, since AE is equal to EC, and BE to EF, the two sides AE, EB are equal to the two sides CE, EF respectively; and the angle AEB is equal to the angle FEC, for they are vertical angles.", just:"I.15", side:"∠AEB = ∠FEC", reveal:[], display_linked_idx:11 },
  { type:"open", q:"So what follows about base AB, base FC, and the remaining corresponding angles?", criteria:"AB equals FC, triangle ABE equals triangle CFE, and angle BAE equals angle ECF.", hint:"Use I.4: equal sides and included angle give equal bases and corresponding angles.", ok_regex:"ab.*fc|bae.*ecf|equal", ok_targets:["ab","fc","bae","ecf","equal"], text:"Therefore the base AB is equal to the base FC, and the triangle ABE is equal to the triangle CFE, and the remaining angles are equal to the remaining angles respectively, namely those which the equal sides subtend; therefore the angle BAE is equal to the angle ECF.", just:"I.4", side:"∠BAE = ∠ECF", reveal:["dc-i4"] },
  { type:"open", q:"Which angle is greater than angle ECF?", criteria:"Angle ECD is greater than angle ECF.", hint:"The whole is greater than the part.", ok_regex:"ecd.*ecf|greater", ok_targets:["ecd","ecf","greater"], text:"But the angle ECD is greater than the angle ECF;", just:"C.N. 5", side:"∠ECD > ∠ECF", reveal:["dc-cn5"] },
  { type:"open", q:"Since angle BAE equals angle ECF, what can we conclude about angle ACD?", criteria:"Angle ACD is greater than angle BAE.", hint:"Replace ECF by its equal BAE.", ok_regex:"acd.*bae|greater", ok_targets:["acd","bae","greater"], text:"therefore the angle ACD is greater than the angle BAE.", just:null, side:"∠ACD > ∠BAE", reveal:[] },
  { type:"open", q:"What other angle does Euclid say ACD can be proved greater than?", criteria:"Angle ABC.", hint:"It is the other interior and opposite angle of the triangle.", ok_regex:"\\babc\\b|angle abc", ok_targets:["abc"], text:"Similarly also, if BC be bisected, the angle BCG, that is, the angle ACD, can be proved greater than the angle ABC as well.", just:"I.15", side:"∠ACD > ∠ABC", reveal:["dc-similar"] },
  { type:"open", q:"Q.E.F. or Q.E.D.?", criteria:"Q.E.D., because this is a theorem proved by demonstration.", hint:"This is a proposition proving a general fact.", ok_regex:"q\\.?\\s*e\\.?\\s*d|qed|demonstr|proved|shown", ok_targets:["qed","demonstration","proved"], text:"Therefore etc. Q.E.D.", just:"Q.E.D.", side:"Q.E.D.", reveal:[] }
];
const PROP_NUM = 16;
const CONCLUSION = "Congratulations! You have completed Euclid's Elements Book I, Proposition 16.";
function lev(a,b){ const m=a.length,n=b.length; if(!m)return n; if(!n)return m; const dp=Array.from({length:m+1},(_,i)=>[i]); for(let j=1;j<=n;j++) dp[0][j]=j; for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]); return dp[m][n]; }
function hasNear(response, targets){ const words=response.toLowerCase().split(/[\s,.;!?]+/).filter(w=>w.length>=3); return words.some(w=>targets.some(t=>{ const d=t.length<=7?1:2; return lev(w,t)<=d; })); }
let step = 0, attempts = 0;
const diagramEl = document.getElementById('diagram');
const canvas = document.getElementById('canvas');
let pan = { tx:0, ty:0, s:1 };
const MIN_S = 0.12, MAX_S = 12;
function clientToVB(cx,cy){ const r=diagramEl.getBoundingClientRect(), v=diagramEl.viewBox.baseVal; return { x:(cx-r.left)/r.width*v.width+v.x, y:(cy-r.top)/r.height*v.height+v.y }; }
function applyTransform(){ canvas.setAttribute('transform',`translate(${pan.tx},${pan.ty}) scale(${pan.s})`); }
function zoomAt(px,py,f){ const ns=Math.max(MIN_S,Math.min(MAX_S,pan.s*f)), r=ns/pan.s; pan.tx=px-(px-pan.tx)*r; pan.ty=py-(py-pan.ty)*r; pan.s=ns; applyTransform(); }
function zoomCenter(f){ const v=diagramEl.viewBox.baseVal; zoomAt(v.x+v.width/2,v.y+v.height/2,f); }
function animatePan(t,ms=420){ const from={...pan}, t0=performance.now(); (function tick(now){ let p=Math.min((now-t0)/ms,1); p=p<.5?2*p*p:-1+(4-2*p)*p; pan.tx=from.tx+(t.tx-from.tx)*p; pan.ty=from.ty+(t.ty-from.ty)*p; pan.s=from.s+(t.s-from.s)*p; applyTransform(); if(p<1) requestAnimationFrame(tick); else pan={...t}; })(performance.now()); }
function resetView(){ animatePan({tx:0,ty:0,s:1}); }
diagramEl.addEventListener('wheel',e=>{ e.preventDefault(); const p=clientToVB(e.clientX,e.clientY); zoomAt(p.x,p.y,e.deltaY<0?1.12:1/1.12); },{passive:false});
let dragging=false,lastPt=null;
diagramEl.addEventListener('mousedown',e=>{ if(e.button!==0) return; dragging=true; lastPt=clientToVB(e.clientX,e.clientY); diagramEl.classList.add('panning'); e.preventDefault(); });
window.addEventListener('mousemove',e=>{ if(!dragging) return; const pt=clientToVB(e.clientX,e.clientY); pan.tx+=pt.x-lastPt.x; pan.ty+=pt.y-lastPt.y; lastPt=pt; applyTransform(); });
window.addEventListener('mouseup',()=>{ dragging=false; diagramEl.classList.remove('panning'); });
let lastTouches=[];
diagramEl.addEventListener('touchstart',e=>{ lastTouches=Array.from(e.touches); e.preventDefault(); },{passive:false});
diagramEl.addEventListener('touchmove',e=>{ e.preventDefault(); const ts=Array.from(e.touches); if(ts.length===1&&lastTouches.length>=1){ const c=clientToVB(ts[0].clientX,ts[0].clientY), p=clientToVB(lastTouches[0].clientX,lastTouches[0].clientY); pan.tx+=c.x-p.x; pan.ty+=c.y-p.y; applyTransform(); } else if(ts.length===2&&lastTouches.length>=2){ const d1=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY); const d2=Math.hypot(lastTouches[1].clientX-lastTouches[0].clientX,lastTouches[1].clientY-lastTouches[0].clientY); if(d2>0){ const p=clientToVB((ts[0].clientX+ts[1].clientX)/2,(ts[0].clientY+ts[1].clientY)/2); zoomAt(p.x,p.y,d1/d2); } } lastTouches=ts; },{passive:false});
diagramEl.addEventListener('touchend',e=>{ lastTouches=Array.from(e.touches); },{passive:false});
let resizing=false,rSide=null,rStartY=0,rStartH=0,rStartX=0,rStartW=0,rStartML=0;
const rowEl=document.getElementById('diagram-row');
function startResize(side,cx,cy){ resizing=true; rSide=side; rStartY=cy; rStartX=cx; const r=diagramEl.getBoundingClientRect(); rStartH=r.height; rStartW=r.width; rStartML=parseFloat(rowEl.style.marginLeft)||0; }
['rc-l','rc-r'].forEach(id=>{ const side=id.endsWith('-l')?'l':'r'; document.getElementById(id).addEventListener('mousedown',e=>{ startResize(side,e.clientX,e.clientY); e.preventDefault(); }); document.getElementById(id).addEventListener('touchstart',e=>{ startResize(side,e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); },{passive:false}); });
window.addEventListener('mousemove',e=>{ if(resizing) applyResize(e.clientX,e.clientY); });
window.addEventListener('touchmove',e=>{ if(resizing) applyResize(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
window.addEventListener('mouseup',()=>{ resizing=false; });
window.addEventListener('touchend',()=>{ resizing=false; });
function applyResize(cx,cy){ const h=Math.max(80,Math.min(600,rStartH+cy-rStartY)); diagramEl.style.height=h+'px'; const dx=cx-rStartX,dw=rSide==='r'?dx:-dx; const w=Math.max(200,Math.min(window.innerWidth-40,rStartW+dw)); rowEl.style.width=w+'px'; if(rSide==='l') rowEl.style.marginLeft=(rStartML-(w-rStartW))+'px'; }
function buildPanels(){ const side=document.getElementById('side-panel'); const left=document.getElementById('left-panel'); left.innerHTML = `<div class="prop-label">I.16</div><div class="prop-enunc">In any triangle, if one of the sides be produced, the exterior angle is greater than either of the interior and opposite angles.</div>`; STEPS.forEach((s,i)=>{ if(s.side){ const el=document.createElement('div'); el.id=`si-${i}`; el.className='side-item'; el.textContent=s.side; side.appendChild(el); } if(s.text){ const el=document.createElement('div'); el.id=`pl-${i}`; el.className='proof-line'; el.appendChild(document.createTextNode(s.text)); if(s.just){ const sp=document.createElement('span'); sp.className='just'; sp.textContent=s.just; el.appendChild(sp); } left.appendChild(el); } }); }
function getDisplayStep(){ const s=STEPS[step]; if(s && s.display_linked_idx != null) return s.display_linked_idx; for(let i=step;i>=0;i--){ if(STEPS[i] && STEPS[i].text) return i; } return -1; }
function setProofDisplay(idx){ const pd=document.getElementById('proof-display'); if(!pd) return; if(idx<0){ pd.classList.remove('visible'); return; } const s=STEPS[idx]; if(s && s.text){ pd.innerHTML=s.text+(s.just?`<span class="proof-just">${s.just}</span>`:''); pd.classList.add('visible'); } else pd.classList.remove('visible'); }
function updatePanels(){ const ds=getDisplayStep(); STEPS.forEach((s,i)=>{ const pl=document.getElementById(`pl-${i}`); if(pl){ pl.classList.toggle('active',i===ds); pl.classList.toggle('past',i<ds); } }); setProofDisplay(ds); }
function show(id){ const el=document.getElementById(id); if(el) el.classList.add('on'); }
function revealStep(s){ if(s.reveal) s.reveal.forEach(id=>show(id)); if(s.side){ const el=document.getElementById(`si-${step}`); if(el) el.classList.add('on'); } }
const chatEl=document.getElementById('chat'), textInput=document.getElementById('text-input'), sendBtn=document.getElementById('send-btn'), ynBar=document.getElementById('yn-bar'), drawBar=document.getElementById('draw-bar'), inputRow=document.getElementById('input-row'), kbBar=document.getElementById('kb-bar'), fakeInputEl=document.getElementById('fake-input'), fakePlaceholder=document.getElementById('fake-placeholder');
const isMobile=()=>navigator.maxTouchPoints>0;
function addMsg(text, who){ const d=document.createElement('div'); d.className = who==='user' ? 'msg-user':'msg-bot'; d.textContent=text; chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; if(who==='bot') logEvent('bot', text); return d; }
function logEvent(role, message){ fetch('/api/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({proposition:PROP_NUM,step,role,message})}); }
function updateFake(){ const v=textInput.value; if(v){ fakePlaceholder.textContent=v; fakePlaceholder.style.color=''; } else { fakePlaceholder.textContent='Your answer…'; fakePlaceholder.style.color='#999'; } }
function setMode(type){ if(type==='done'){ ynBar.style.display='none'; drawBar.style.display='none'; kbBar.style.display='none'; inputRow.style.display='none'; document.getElementById('dashboard-btn').style.display=''; return; } ynBar.style.display=type==='yn'?'flex':'none'; drawBar.style.display=type==='draw'?'flex':'none'; kbBar.style.display=(type==='open'&&isMobile())?'flex':'none'; if(type==='open'&&isMobile()){ document.getElementById('kb-alpha').style.display=''; document.getElementById('kb-num').style.display='none'; setTimeout(()=>{ chatEl.scrollTop=chatEl.scrollHeight; },80); fakeInputEl.style.display='flex'; textInput.style.display='none'; updateFake(); } else { fakeInputEl.style.display='none'; textInput.style.display=''; } inputRow.style.display=type==='draw'?'none':'flex'; sendBtn.disabled=type==='draw'; textInput.disabled=type==='draw'; if(type==='open'&&!isMobile()) textInput.focus(); }
function kbTap(ch){ textInput.value+=ch; updateFake(); }
function kbBack(){ textInput.value=textInput.value.slice(0,-1); updateFake(); }
function kbEnter(){ submit(textInput.value); }
function kbToggleNum(){ const a=document.getElementById('kb-alpha'),n=document.getElementById('kb-num'); const toNum=a.style.display!=='none'; a.style.display=toNum?'none':''; n.style.display=toNum?'':'none'; }
function advance(){ attempts=0; step++; showStep(); }
function appendSurveyLink(){ const d=document.createElement('div'); d.className='msg-bot'; d.innerHTML='<a href="/survey?prop='+PROP_NUM+'" style="color:#7c3aed;text-decoration:underline;">Share your experience →</a>'; chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; }
function showStep(){ updatePanels(); if(step>=STEPS.length){ addMsg(CONCLUSION,'bot'); setMode('done'); appendSurveyLink(); fetch('/api/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({proposition:PROP_NUM})}).then(r=>{ if(r.ok) addMsg('Your completion has been recorded.','bot'); }).catch(()=>{}); return; } const s=STEPS[step]; if(s.type==='say'){ revealStep(s); addMsg(s.q,'bot'); setTimeout(advance,700); return; } if(s.type==='draw'){ addMsg(s.q,'bot'); setMode('draw'); return; } addMsg(s.q,'bot'); setMode(s.type); }
function submit(raw){ const answer=raw.trim(); if(!answer) return; textInput.value=''; updateFake(); addMsg(answer,'user'); logEvent('user',answer); const s=STEPS[step]; if(s.type==='yn'){ if(/^y/i.test(answer)){ revealStep(s); advance(); } else { addMsg(s.no,'bot'); setTimeout(()=>addMsg(s.q,'bot'),600); } return; } if(s.type==='open'){ const ok=!s.ok_regex || new RegExp(s.ok_regex,'i').test(answer) || (s.ok_targets && hasNear(answer, s.ok_targets)); if(!ok){ attempts++; if(attempts>=2 && s.hint) addMsg(s.hint,'bot'); else addMsg('Not quite — try again.','bot'); if(attempts>=3){ revealStep(s); setTimeout(advance,800); } return; } revealStep(s); advance(); } }
sendBtn.addEventListener('click',()=>submit(textInput.value));
textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(textInput.value); });
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&drawBar.style.display==='flex'&&e.target!==textInput){ e.preventDefault(); document.getElementById('btn-draw').click(); } });
document.getElementById('btn-yes').addEventListener('click',()=>{ addMsg('Yes','user'); logEvent('user','Yes'); const s=STEPS[step]; revealStep(s); advance(); });
document.getElementById('btn-no').addEventListener('click',()=>{ addMsg('No','user'); logEvent('user','No'); addMsg(STEPS[step].no,'bot'); setTimeout(()=>addMsg(STEPS[step].q,'bot'),600); });
document.getElementById('btn-draw').addEventListener('click',()=>{ addMsg('Yes / Draw','user'); logEvent('user','[drew]'); const s=STEPS[step]; revealStep(s); advance(); });
buildPanels();
["dc-given"].forEach(id=>show(id));
showStep();
</script>
</body>
</html>
