<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.4 - Prove that any smaller number is either part or parts of a greater</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.4 chatbot!

We are given two numbers A and BC, with BC the smaller. Do you agree? (yes/no):`,
hint: `A is the greater number; BC is the lesser.` },
{ q: `Our goal is to show that BC is either a part of A or parts of A. Does that make sense? (yes/no):`,
hint: `“Part” means BC measures A; “parts” means BC is made of several equal parts each of which is a part of A.` },
{ q: `Now, A and BC are either prime to one another or not. Do you agree? (yes/no):`,
hint: `Any pair of numbers is either relatively prime or not.` },
{ q: `Suppose first that A and BC are prime to one another. Agreed? (yes/no):`,
hint: `This means they have no common measure besides 1.` },
{ q: `If BC is divided into its units, is each unit a part of A? (yes/no):`,
hint: `A unit (1) is always a part of any number.` },
{ q: `If each unit is a part of A, is BC therefore “parts” of A? (yes/no):`,
hint: `Several parts taken together give “parts.”` },
{ q: `Next, suppose A and BC are not prime to one another. Reasonable? (yes/no):`,
hint: `Then they share some common measure greater than 1.` },
{ q: `In this case, BC either measures A or does not. True? (yes/no):`,
hint: `Either BC goes into A exactly, or it doesn’t.` },
{ q: `If BC measures A, is BC then a part of A? (yes/no):`,
hint: `A “part” is a number that measures the whole.` },
{ q: `If BC does not measure A, may we take the greatest common measure D of A and BC? (yes/no):`,
hint: `Proposition VII.2 guarantees the existence of the greatest common measure.` },
{ q: `Can BC be divided into numbers equal to D — such as BE, EF, FC? (yes/no):`,
hint: `D measures BC, so BC consists of several D’s.` },
{ q: `Since D measures A, is D a part of A? (yes/no):`,
hint: `A number that measures another is its part.` },
{ q: `Since D equals each of BE, EF, and FC, is each of these also a part of A? (yes/no):`,
hint: `Equal numbers have the same relation to A.` },
{ q: `If each part BE, EF, FC is a part of A, is BC (made of them) “parts” of A? (yes/no):`,
hint: `A whole made of parts-of-A is “parts-of-A.”` },
{ q: `Therefore, in all cases, is BC either a part or parts of A? (yes/no):`,
hint: `We have covered the cases: prime, not prime, measuring, not measuring.` },








];

const conclusion = `Congratulations! You just proved that any lesser number is either part or parts of a greater.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
