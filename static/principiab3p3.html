<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Principia III.8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.8 - Prove that if two mutually attracting spheres have similar matter at equal distances from their centres, then each sphere’s attraction toward the other is inversely proportional to the square of the distance between their centres.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Principia III.3 chatbot!

We are given two spheres which mutually gravitate toward each other. Do you agree? (yes/no):`,
hint: `Each sphere attracts the other by gravity.` },
{ q: `Also, the matter in each sphere is arranged similarly in layers equally distant from their centres. Do you agree? (yes/no):`,
hint: `At equal distances from the centres, the distribution of matter is the same.` },
{ q: `Our goal is to prove that the force between the spheres is inversely proportional to the square of the distance between their centres. Does that make sense? (yes/no):`,
hint: `That is, force varies as 1 divided by the square of the distance.` },
{ q: `Do we begin with the idea that the gravity toward a whole sphere arises from the sum of the attractions of all its parts? (yes/no):`,
hint: `The total force is compounded from many փոքր forces.` },
{ q: `Is each փոքր part assumed to attract according to the inverse-square law of distance? (yes/no):`,
hint: `Each մաս acts with force proportional to 1 / (distance²).` },
{ q: `Might we doubt whether the total combined force exactly follows this same inverse-square proportion? (yes/no):`,
hint: `Because the distances to different parts are not all equal.` },
{ q: `Is this doubt especially relevant near the surface of the sphere? (yes/no):`,
hint: `Near the surface, the arrangement of parts is less uniform relative to the other body.` },
{ q: `Can earlier propositions (LXXV and LXXVI of Book I) help resolve this difficulty? (yes/no):`,
hint: `These results address how spherical bodies act in gravitational attraction.` },
{ q: `Do those propositions show that a sphere attracts as if all its matter were concentrated at its centre? (yes/no):`,
hint: `Symmetry causes the نیرو of all parts to combine in this way.` },
{ q: `If so, does the total force between the two spheres depend only on the distance between their centres? (yes/no):`,
hint: `The internal arrangement no longer affects the result.` },
{ q: `Therefore, is the gravitational force between the two spheres inversely proportional to the square of the distance between their centres? (yes/no):`,
hint: `This confirms the exact inverse-square law for the whole spheres.` },
]

const conclusion = `Congratulations! You just found the sixth binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
