<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.26 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.26 — Prove that triangles are equal if they have two angles and one side equal (ASA, AAS)</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.26 chatbot!
  
We are given two triangles, ABC and DEF, with ∠ABC = ∠DEF and ∠BCA = ∠EFD. Do you agree? (yes/no):`,
    hint: `The triangles have two pairs of equal angles.` },
  { q: `Our goal is to prove that if one side is also equal (either adjoining (ASA) or subtending (AAS)), then the triangles are fully equal. Does that make sense? (yes/no):`,
    hint: `This proposition shows triangle congruence from AAS or ASA conditions.` },
  { q: `Case 1: Let us suppose side BC = side EF (ASA). Can we do that? (yes/no):`,
    hint: `This is the case where the equal side lies between the equal angles.` },
  { q: `Suppose AB ≠ DE. Then one must be greater. Is that assumption reasonable? (yes/no):`,
    hint: `Euclid proceeds by contradiction when sides are assumed unequal.` },
  { q: `Let us take BG = DE on AB. Can we construct such a point? (yes/no):`,
    hint: `Proposition I.3 lets us cut off a segment equal to a given line.` },
  { q: `Join GC. Possible? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Now, are sides GB = DE and BC = EF? (yes/no):`,
    hint: `Yes, by construction and hypothesis.` },
  { q: `Also, is ∠GBC = ∠DEF? (yes/no):`,
    hint: `Given angle equality.` },
  { q: `From Proposition I.4 (SAS), can we say ΔGBC = ΔDEF? (yes/no):`,
    hint: `Two sides and included angle equal imply triangles equal.` },
  { q: `Therefore, is GC = DF and ∠GCB = ∠DFE? (yes/no):`,
    hint: `Equal triangles have equal bases and angles.` },
  { q: `But ∠DFE = ∠BCA (by hypothesis). Then does ∠BCG = ∠BCA, a smaller equal to a greater? (yes/no):`,
    hint: `That contradiction shows AB cannot be unequal to DE.` },
  { q: `Therefore AB = DE. Is that clear? (yes/no):`,
    hint: `The contradiction forces equality.` },
  { q: `Now since AB = DE, BC = EF, and ∠ABC = ∠DEF, do we conclude AC = DF and ∠BAC = ∠EDF? (yes/no):`,
    hint: `This is again Proposition I.4.` },
  { q: `Case 2: Now suppose AB = DE instead (AAS). Do you agree? (yes/no):`,
    hint: `This is the second possibility in the enunciation.` },
  { q: `Suppose BC ≠ EF. Then one must be greater. Reasonable? (yes/no):`,
    hint: `Again, contradiction method.` },
  { q: `Let BH = EF on BC. Possible? (yes/no):`,
    hint: `By Proposition I.3, we can cut off a segment equal to a given line.` },
  { q: `Join AH. Can we do that? (yes/no):`,
    hint: `Postulate 1 allows joining any two points.` },
  { q: `Now, are AB = DE and BH = EF? (yes/no):`,
    hint: `Yes, by hypothesis and construction.` },
  { q: `And is ∠ABH = ∠DEF? (yes/no):`,
    hint: `The equal angles are included.` },
  { q: `From Proposition I.4, do we then have ΔABH = ΔDEF? (yes/no):`,
    hint: `Two sides and the included angle equal yield congruence.` },
  { q: `Thus, is AH = DF and ∠BHA = ∠EFD? (yes/no):`,
    hint: `Corresponding sides and angles are equal.` },
  { q: `But ∠EFD = ∠BCA (by hypothesis). Then in ΔAHC, is ∠BHA = ∠BCA, an exterior angle equal to an interior opposite? (yes/no):`,
    hint: `This contradicts Proposition I.16.` },
  { q: `Therefore BC = EF. Is that clear? (yes/no):`,
    hint: `The contradiction forces equality.` },
  { q: `Now with AB = DE, BC = EF, and ∠ABC = ∠DEF, do we conclude AC = DF and ∠BAC = ∠EDF? (yes/no):`,
    hint: `Again, Proposition I.4.` }
];

const conclusion = `Congratulations, you have proven that In both cases, if two triangles have two angles equal and one side equal (either adjoining or subtending), then the remaining sides and angle are equal!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
