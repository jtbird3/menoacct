<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Percentages - Percentiles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>What Is a Percentile? (SAT Example)</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Percentages - What is a percentile? (SAT example) chatbot!

We are given four students applying to a college, each with an SAT score. Do you agree? (yes/no):`,
hint: `The scores are 900, 1200, 1300, and 1450.` },

{ q: `Our goal is to understand what a percentile is and why it is useful. Does that make sense? (yes/no):`,
hint: `We want to compare students fairly.` },

{ q: `Do higher SAT numbers mean higher scores? (yes/no):`,
hint: `1450 is higher than 1300, 1200, and 900.` },

{ q: `If we only look at the numbers (900, 1200, 1300, and 1450), does the student with 1450 seem best? (yes/no):`,
hint: `Bigger numbers usually look better.` },

{ q: `Now suppose the students come from different schools. Is that possible? (yes/no):`,
hint: `Students do not all attend the same school.` },

{ q: `Can some schools be more competitive than others? (yes/no):`,
hint: `Some schools have stronger classes or more test prep.` },

{ q: `Would it generally be easier to get a high SAT score at a very strong school? (yes/no):`,
hint: `You are surrounded by high-performing students.` },

{ q: `But does the raw SAT number alone tell the whole story? (yes/no):`,
hint: `We may be missing context.` },

{ q: `Instead of comparing students to everyone, can we compare a student to classmates at the same school? (yes/no):`,
hint: `This keeps the comparison fair.` },

{ q: `If a student did better than most classmates, does that tell us something important? (yes/no):`,
hint: `It shows how strong the student is relative to peers.` },

{ q: `Suppose a student did better than 90 out of 100 students at her school. Did she outperform most of her classmates? (yes/no):`,
hint: `Only 10 students did better.` },

{ q: `If a student did better than 90 out of 100 classmates, can we say she is at the 90th percentile? (yes/no):`,
hint: `Percentile means “how many you did better than out of 100.”` },

{ q: `But does the 90th percentile mean she scored 90 points? (yes/no):`,
hint: `Percentile is about rank, not score.` },

{ q: `Does the percentile tell us how a student ranks compared to others in the same group? (yes/no):`,
hint: `The group here is her school.` },

{ q: `So a percentile uses percentages to show ranking, not amount. Do you agree? (yes/no):`,
hint: `It answers “how many people are below you.”` },

{ q: `Does this help colleges compare students from different schools more fairly? (yes/no):`,
hint: `It adjusts for school differences.` },

{ q: `Therefore, can we say that a percentile tells how a student ranks compared to others, using parts out of 100? (yes/no):`,
hint: `This is the final conclusion.` },
]






const conclusion = `Congratulations! You now understand what a percentile is from the SAT example.

Q.E.D.

Click here to continue to the next lesson:`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  
  // Special case: step 7 (index 7) - "But does the raw SAT number alone tell the whole story?"
  // Correct answer is "no"
  if (currentStep === 7) {
    if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
      currentStep++;
      showStep();
    } else if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
      addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
    } else {
      addMessage(`Please answer 'yes' or 'no'.`, 'bot');
    }
    return;
  }
  
  // Special case: step 12 (index 12) - "But does the 90th percentile mean she scored 90 points?"
  // Correct answer is "no"
  if (currentStep === 12) {
    if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
      currentStep++;
      showStep();
    } else if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
      addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
    } else {
      addMessage(`Please answer 'yes' or 'no'.`, 'bot');
    }
    return;
  }
  
  // Normal logic for other steps
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
