<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.48</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.48 – Find the first binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.48 chatbot!

We are given two numbers AC and CB, set out so that their sum AB has to BC the ratio which a square number has to a square number. Do you agree? (yes/no):`,
    hint: `This is a given condition on the numbers AC, CB, and their sum AB.` },
    { q: `We are also given that AB does not have to CA the ratio which a square number has to a square number. Agreed? (yes/no):`,
    hint: `This distinguishes the relation AB:CA from AB:BC.` },
    { q: `Next, we are given a rational straight line D. Do you agree? (yes/no):`,
    hint: `A rational straight line is one commensurable in square with the unit.` },
    { q: `We are also given a straight line EF commensurable in length with D. Is that correct? (yes/no):`,
    hint: `EF shares length-commensurability with a rational line.` },
    { q: `Since EF is commensurable in length with a rational straight line, is EF itself rational? (yes/no):`,
    hint: `Any line commensurable in length with a rational line is rational.` },
    
    { q: `Our goal is to show that the straight line EG is a first binomial straight line. Does that make sense? (yes/no):`,
    hint: `A first binomial is defined in Book X.` },
    
    { q: `Let it be contrived that, as BA is to AC, so is the square on EF to the square on FG. Is this construction allowed? (yes/no):`,
    hint: `This follows from Proposition X.6 (proportional squares).` },
    { q: `Since BA has to AC the ratio which a number has to a number, does the square on EF also have to the square on FG the ratio which a number has to a number? (yes/no):`,
    hint: `Equal ratios transfer through proportional constructions.` },
    { q: `If the square on EF has to the square on FG the ratio which a number has to a number, are the two squares commensurable? (yes/no):`,
    hint: `Squares with numerical ratio are commensurable (X.6).` },
    { q: `Since EF is rational, does it follow that FG is also rational? (yes/no):`,
    hint: `A square commensurable with a rational square is rational, hence its side is rational.` },
    
    { q: `Now, since BA does not have to AC the ratio which a square number has to a square number, does it follow that the square on EF does not have to the square on FG that ratio either? (yes/no):`,
    hint: `The constructed proportion mirrors the original one.` },
    { q: `If the squares on EF and FG do not have the ratio of square numbers, is EF incommensurable in length with FG? (yes/no):`,
    hint: `This is Proposition X.9.` },
    { q: `Since EF and FG are rational but incommensurable in length, are they commensurable in square only? (yes/no):`,
    hint: `That is exactly what “commensurable in square only” means.` },
    { q: `If EF and FG are rational and commensurable in square only, does it follow that EG is a binomial straight line? (yes/no):`,
    hint: `Proposition X.36 defines binomial straight lines.` },
    
    { q: `I say further that EG is a first binomial straight line. Do you accept this as the next aim? (yes/no):`,
    hint: `We now distinguish which kind of binomial it is.` },
    { q: `Since BA is greater than AC, is the square on EF greater than the square on FG? (yes/no):`,
    hint: `In equal ratios, the greater antecedent corresponds to the greater consequent.` },
    { q: `Let the square on H together with the square on FG be equal to the square on EF. Is this construction possible? (yes/no):`,
    hint: `If one square is greater than another, the excess can be represented as the square on some straight line.` },
    { q: `Since, convertendo, as AB is to BC, so is the square on EF to the square on H, do you agree? (yes/no):`,
    hint: `From AB:AC = EF²:FG² and AB = AC + CB, conversion gives AB:CB = EF²:(EF² − FG²) = EF²:H².` },
    { q: `But AB has to BC the ratio which a square number has to a square number. Is that correct? (yes/no):`,
    hint: `This was given at the start.` },
    { q: `Does it follow that the square on EF has to the square on H the ratio which a square number has to a square number? (yes/no):`,
    hint: `Since EF²:H² equals AB:BC, it has the same “square-number ratio” property.` },
    { q: `If the square on EF has to the square on H the ratio of square numbers, is EF commensurable in length with H? (yes/no):`,
    hint: `By Proposition X.9, a square-number ratio of squares implies commensurability in length of the sides.` },
    { q: `Therefore, is the square on EF greater than the square on FG by the square on a straight line commensurable with EF? (yes/no):`,
    hint: `EF² = FG² + H², and H is commensurable in length with EF.` },
    { q: `Since EF and FG are rational, and EF is commensurable in length with D, does EF meet all the conditions of a first binomial straight line? (yes/no):`,
    hint: `The terms are rational and commensurable in square only, and the excess square is on a line commensurable with the greater term—matching the first-binomial characterization.` },
    
    { q: `Therefore, is EG a first binomial straight line? (yes/no):`,
    hint: `This completes the classification.` }
]

const conclusion = `Congratulations! You just found the first binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
