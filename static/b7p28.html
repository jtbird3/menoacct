<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.28</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.28 — Prove that if two numbers are prime to one another, the sum will also be prime to each of them; and, if the sum of two numbers be prime to any one of them, the original numbers will also be prime to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.28 chatbot!

We are given two numbers AB and BC that are prime to one another. Do you agree? (yes/no):`,
    hint: `“Prime to one another” means they have no common measure.` },

  { q: `Our goal is to show that their sum AC is prime to each of AB and BC. Does that make sense? (yes/no):`,
    hint: `We must show AC shares no common divisor with either AB or BC.` },

  { q: `Suppose, for contradiction, that AC and AB are not prime to one another. Okay? (yes/no):`,
    hint: `This assumes some number divides both AC and AB.` },

  { q: `If AC and AB share a common measure, can we let that common measure be called D? (yes/no):`,
    hint: `A common divisor can always be named.` },

  { q: `If D measures AC and AB, does it also measure the remainder BC? (yes/no):`,
    hint: `A number that measures two numbers also measures their difference.` },

  { q: `But BC and AB are prime to one another. So can D measure both AB and BC? (yes/no):`,
    hint: `If they are prime to one another, no common measure is possible.` },

  { q: `If D cannot measure both AB and BC, must our earlier assumption be impossible? (yes/no):`,
    hint: `Contradictions arise from false assumptions.` },

  { q: `Therefore, are AC and AB prime to one another? (yes/no):`,
    hint: `No number measures both, so they are prime to each other.` },

  { q: `By the same reasoning, is AC also prime to BC? (yes/no):`,
    hint: `The same contradiction would appear if a measure existed.` },

  { q: `Therefore, is AC prime to each of AB and BC? (yes/no):`,
    hint: `AC shares no common measure with either number.` },

  // Part 2
  { q: `Now assume CA and AB are prime to one another. Do you agree? (yes/no):`,
    hint: `CA and AB have no common measure.` },

  { q: `Our goal is to show AB and BC are also prime to one another. Does that make sense? (yes/no):`,
    hint: `We must prove AB and BC have no common divisor.` },

  { q: `Suppose AB and BC are not prime to one another. Acceptable as a hypothesis? (yes/no):`,
    hint: `We assume some number divides both.` },

  { q: `If AB and BC share a common measure, can we call it D? (yes/no):`,
    hint: `Name the assumed common divisor.` },

  { q: `If D measures AB and BC, does it also measure the whole CA? (yes/no):`,
    hint: `A number measuring two segments also measures their sum.` },

  { q: `But CA and AB are prime to one another. So can D measure both CA and AB? (yes/no):`,
    hint: `Being prime to one another forbids a shared measure.` },

  { q: `If D cannot measure CA and AB, does our assumption that D measures AB and BC lead to a contradiction? (yes/no):`,
    hint: `The resulting impossibility shows the assumption was false.` },

  { q: `Therefore, must AB and BC be prime to one another? (yes/no):`,
    hint: `No shared measure can exist.` }
  ]
















const conclusion = `Congratulations! You just proved that if two numbers be prime to one another, the sum will also be prime to each of them; and, if the sum of two numbers be prime to any one of them, the original numbers will also be prime to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
