<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.21</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.21 – Prove that the rectangle contained by rational straight lines commensurable in square only is irrational, and that the side of the square equal to it is irrational; let such a straight line be called medial.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.21 chatbot!

We are given two rational straight lines AB and BC, commensurable in square only, and containing the rectangle AC. Do you agree? (yes/no):`,
hint: `“Commensurable in square only” means their squares are commensurable, but the lines themselves are incommensurable in length.` },
{ q: `Our goal is to prove that the rectangle AC is irrational, and that the side of the square equal to AC is irrational, and is called medial. Does that make sense? (yes/no):`,
hint: `This is exactly the statement of the proposition.` },
{ q: `First, on AB let the square AD be described. Can we do this? (yes/no):`,
hint: `A square can be described on any straight line.` },
{ q: `Is AD rational? (yes/no):`,
hint: `By Definition X.4, the square on a rational straight line is rational.` },
{ q: `Since AB is incommensurable in length with BC, and AB is equal to BD, is BD also incommensurable in length with BC? (yes/no):`,
hint: `Things equal to the same thing share the same relations of commensurability.` },
{ q: `As DB is to BC, so is AD to AC. Is this true? (yes/no):`,
hint: `By Proposition VI.1, similar ratios are preserved between corresponding areas.` },
{ q: `If DB is incommensurable with BC, does it follow that AD is incommensurable with AC? (yes/no):`,
hint: `By Proposition X.11, if a ratio is incommensurable, the corresponding magnitudes are incommensurable.` },
{ q: `But AD is rational. Does that imply that AC is irrational? (yes/no):`,
hint: `A rational magnitude cannot be commensurable with an irrational one.` },
{ q: `If AC is irrational, is the side of the square equal to AC also irrational? (yes/no):`,
hint: `By Definition X.4, the nature of the square determines the nature of its side.` },
{ q: `Is this irrational straight line therefore called medial? (yes/no):`,
hint: `This is the definition introduced in the proposition.` },
  { q: `Therefore, is the rectangle AC irrational, and is the side of the square equal to it irrational and called medial? (yes/no):`,
    hint: `All required properties have now been established: AC is irrational, and its square root is an irrational straight line called medial.` },
  { q: `LEMMA:We are given two straight lines FE and EG. Do you agree? (yes/no):`,
hint: `These are arbitrary straight lines.` },
{ q: `Our goal is to show that, as FE is to EG, so is the square on FE to the rectangle contained by FE and EG. Does that make sense? (yes/no):`,
hint: `This is exactly the lemma’s claim.` },
{ q: `On FE let the square DF be described. Can we do this? (yes/no):`,
hint: `A square can be constructed on any straight line.` },
{ q: `Let the rectangle GD be completed. Is this construction possible? (yes/no):`,
hint: `A rectangle can be completed from given sides.` },
{ q: `Is FD the square on FE? (yes/no):`,
hint: `FD was constructed as the square on FE.` },
{ q: `Is DG the rectangle contained by FE and EG? (yes/no):`,
hint: `DG represents the rectangle formed by those two straight lines.` },
{ q: `As FE is to EG, is FD to DG in the same ratio? (yes/no):`,
hint: `By Proposition VI.1, corresponding sides and areas preserve ratios.` },
{ q: `Since FD is the square on FE, and DG is the rectangle FE, EG, does it follow that as FE is to EG, so is the square on FE to the rectangle FE, EG? (yes/no):`,
hint: `This follows directly from the substitutions just identified.` },
{ q: `Similarly, as GD is to FD, is GE to EF? (yes/no):`,
hint: `This is the same reasoning applied in reverse.` },
{ q: `Therefore, is the lemma proved? (yes/no):`,
hint: `The required proportionality has been established.` }

]





const conclusion = `Congratulations! You just proved that the rectangle contained by rational straight lines commensurable in square only is irrational, and that the side of the square equal to it is irrational; let such a straight line be called medial.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
