<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.10 — Prove that if two numbers are the same parts of two others, then alternately each has the same parts of the corresponding number</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.10 chatbot!

We are given numbers AB and C, where AB is parts of C. Do you agree? (yes/no):`,
hint: `“Parts of” means C can be divided into a number of equal parts, and AB is made of that many parts.` },
{ q: `We are also given numbers DE and F, where DE is the same parts of F. Do you agree? (yes/no):`,
hint: `AB has the same number of parts in C as DE has in F.` },
{ q: `Our goal is: to show that, alternately, whatever part(s) AB is of DE, the same part(s) is C of F. Does that make sense? (yes/no):`,
hint: `We want to compare AB : DE in the same way we compare C : F.` },
{ q: `Since AB is parts of C and DE the same parts of F, can we say the number of parts in AB equals the number of parts in DE? (yes/no):`,
hint: `Both AB and DE represent the same multitude of equal parts.` },
{ q: `Let us divide AB into its parts of C, calling them AG and GB. Possible? (yes/no):`,
hint: `Since AB is made of those parts, we can name them explicitly.` },
{ q: `Let us also divide DE into its parts of F, calling them DH and HE. Possible? (yes/no):`,
hint: `DE is made of the same number of parts of F.` },
{ q: `Is the multitude of AG, GB equal to the multitude of DH, HE? (yes/no):`,
hint: `AB and DE were assumed to consist of the same number of parts.` },
{ q: `Since AG is the same part of C as DH is of F, can we use alternation to say that whatever part(s) AG is of DH, C is of F? (yes/no):`,
hint: `This is Euclid VII.9, which allows alternating proportional parts.` },
{ q: `For the same reason, whatever part(s) GB is of HE, is C of F. True? (yes/no):`,
hint: `GB and HE correspond exactly as AG and DH did.` },
{ q: `If AG corresponds to DH, and GB corresponds to HE, can we say AB corresponds to DE in the same way? (yes/no):`,
hint: `AB is composed of AG, GB and DE of DH, HE.` },
{ q: `Therefore, whatever parts or part AB is of DE, the same parts or the same part is C of F. Do you agree? (yes/no):`,
hint: `This follows by combining the part-to-part relations (Euclid VII.5, VII.6).` },












];

const conclusion = `Congratulations! You just proved that if two numbers are the same parts of two others, then alternately each has the same parts of the corresponding number.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
