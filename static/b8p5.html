<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.5 — Prove that plane numbers have to one another the ratio compounded of the ratios of their sides</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.5 chatbot!

We are given two plane numbers A and B, with C, D as the sides of A and E, F as the sides of B. Do you agree? (yes/no):`,
    hint: `A plane number is the product of two numbers, such that A is CD produced and B is EF produced.` },

  { q: `Our goal is to prove that A to B is the ratio compounded of C to E and D to F. Does that make sense? (yes/no):`,
    hint: `A compounded ratio means “first C to E, then D to F, combined in order.”` },

  { q: `Let the least numbers G, H, K be taken in continuous proportion with C to E and D to F. Is this allowed? (yes/no):`,
    hint: `Proposition VIII.4 guarantees least numbers in given ratios C to E and D to F.` },

  { q: `So do we have C to E equal to G to H and D to F equal to H to K? (yes/no):`,
    hint: `G, H match the first ratio; H, K match the second.` },

  { q: `Next, let D by multiplying E make L. Possible? (yes/no):`,
    hint: `Multiplying a number by another produces a product; here L equals DE produced.` },

  { q: `Since D multiplies C to make A, and also multiplies E to make L, do we have C to E equal to A to L? (yes/no):`,
    hint: `VII.17: If the same number multiplies two numbers, their ratio equals the ratio of the resulting products.` },

  { q: `And since C to E equals G to H, do we have G to H equal to A to L? (yes/no):`,
    hint: `If two ratios equal the same ratio, they equal each other.` },

  { q: `Next, since E multiplies D to make L, and E multiplies F to make B, do we have D to F equal L to B? (yes/no):`,
    hint: `VII.17 again: the multiplier E preserves ratios to the products.` },

  { q: `And if we have D to F equal to H to K, do we conclude H is to K as L is to B? (yes/no):`,
    hint: `Replace D to F with its equal ratio H to K.` },

  { q: `We now have G to H equals A to L and H is to K as L is to B. From these, do we have, ex aequali, G is to K as A is to B? (yes/no):`,
    hint: `VII.14 (ex aequali): when middle terms match in proportional sequences, extremes are in proportion.` },

  { q: `And since G to K is the ratio compounded of the ratios of the sides, may we conclude A to B is also the compounded ratio of the sides? (yes/no):`,
    hint: `Equal ratios share the same compounded structure.` },

  { q: `Therefore, have we shown that A has to B the ratio compounded of C to E and D to F? (yes/no):`,
    hint: `All proportional steps correspond; A to B matches the compounded ratio of the sides.` }
]
















const conclusion = `Congratulations! You just proved that plane numbers have to one another the ratio compounded of the ratios of their sides.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
