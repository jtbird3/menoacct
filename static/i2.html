<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Euclid I.2 — To place at a given point a straight line equal to a given straight line</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body {
      background: #fff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      font-size: 14px;
      max-width: 800px;
      margin: 0 auto;
      padding: 16px 16px 110px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    h1 { font-size: 15px; font-weight: bold; margin-bottom: 10px; }

    /* ── Diagram ── */
    #diagram-row { position: relative; margin-bottom: 10px; }
    #diagram-wrap { position: relative; }
    #diagram {
      border: 1px solid #ccc;
      background: #fff;
      display: block;
      width: 100%;
      height: clamp(160px, 38vh, 380px);
      cursor: grab;
    }
    #diagram.panning { cursor: grabbing; }
    #diagram-controls {
      position: absolute; bottom: 22px; right: 8px;
      display: flex; flex-direction: column; gap: 2px; z-index: 10;
    }
    #diagram-controls button {
      font-family: inherit; font-size: 15px;
      width: 28px; height: 28px;
      border: 1px solid #ccc; background: rgba(255,255,255,0.9);
      cursor: pointer; padding: 0; line-height: 1;
    }
    #diagram-controls button:hover { background: #f0f0f0; }
    .resize-corner {
      position: absolute; bottom: 0; width: 16px; height: 16px;
      user-select: none; z-index: 10; opacity: 0.5;
      background: repeating-linear-gradient(-45deg,#bbb 0,#bbb 1px,transparent 1px,transparent 3px);
    }
    .resize-corner:hover { opacity: 1; }
    #rc-l { left: 0; cursor: sw-resize; }
    #rc-r { right: 0; cursor: se-resize; }

    /* side panels */
    #side-panel {
      position: absolute; left: calc(100% + 10px); top: 0;
      width: 110px; font-size: 13px;
    }
    .side-item { opacity: 0; transition: opacity 0.5s; line-height: 1.6; color: #16a34a; }
    .side-item.on { opacity: 1; }
    #left-panel {
      position: absolute; right: calc(100% + 12px); top: 0;
      width: 190px; font-size: 11.5px; line-height: 1.5;
    }
    #left-panel .prop-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
      opacity: .4; margin-bottom: 4px;
    }
    #left-panel .prop-enunc {
      font-style: italic; opacity: .55; font-size: 11px;
      border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px;
    }
    .proof-line {
      opacity: .22; margin-bottom: 6px; transition: opacity .4s, color .4s;
    }
    .proof-line .just { display: block; font-size: 10px; opacity: .65; margin-top: 1px; }
    .proof-line.past { opacity: .48; }
    .proof-line.active { opacity: 1; color: #16a34a; }

    /* SVG elements */
    .de { opacity: 0; transition: opacity 0.5s; }
    .de.on { opacity: 1; }

    /* ── Chat ── */
    #chat {
      border: 1px solid #ccc; padding: 10px;
      flex: 1; min-height: 120px; max-height: 260px;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      gap: 8px; margin-bottom: 10px;
    }
    .msg-bot, .msg-user {
      white-space: pre-wrap; word-break: break-word;
      overflow-wrap: break-word; min-width: 0; max-width: 100%;
    }
    .msg-bot  { color: #000; }
    .msg-user { color: #777; text-align: right; }

    /* ── Input ── */
    #input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    #text-input {
      flex: 1; padding: 8px; font-family: inherit; font-size: 14px;
      border: 1px solid #ccc; outline: none;
    }
    #text-input:focus { border-color: #000; }
    #fake-input {
      display: none;
      flex: 1; padding: 8px; font-family: inherit; font-size: 14px;
      border: 1px solid #000; color: #000;
      overflow-x: scroll; overflow-y: hidden; white-space: nowrap;
      scrollbar-width: none; -ms-overflow-style: none;
      align-items: center; line-height: 1.4;
    }
    #fake-input::-webkit-scrollbar { display: none; }
    #fake-placeholder { color: #999; }
    #fake-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #000; vertical-align: text-bottom; margin-left: 1px;
      animation: blink-caret 1s step-end infinite;
    }
    @keyframes blink-caret { 50% { opacity: 0; } }
    #send-btn {
      padding: 8px 14px; font-family: inherit; font-size: 14px;
      border: 1px solid #000; background: #000; color: #fff; cursor: pointer;
    }
    #send-btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

    /* ── YES/NO ── */
    #yn-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #ccc;
      padding: 10px 16px; gap: 12px; justify-content: center; z-index: 100;
    }
    #yn-bar button {
      flex: 1; max-width: 140px;
      padding: 12px 20px; font-family: inherit; font-size: 15px; font-weight: bold;
      border: 2px solid #000; background: #fff; color: #000; cursor: pointer;
    }
    #yn-bar button:active { background: #000; color: #fff; }

    /* ── Draw bar ── */
    #draw-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #ccc;
      padding: 10px 16px; justify-content: center; z-index: 100;
    }
    #draw-bar button {
      flex: 1; max-width: 200px;
      padding: 12px 20px; font-family: inherit; font-size: 15px; font-weight: bold;
      border: 2px solid #000; background: #fff; color: #000; cursor: pointer;
    }
    #draw-bar button:active { background: #000; color: #fff; }

    /* ── Proof display ── */
    #proof-display {
      min-height: 1.6em;
      font-style: italic; font-size: 12px; color: #444;
      border-left: 2px solid #16a34a; padding: 4px 10px;
      margin-bottom: 8px; opacity: 0; transition: opacity 0.4s;
    }
    #proof-display.visible { opacity: 1; }
    #proof-display .proof-just { font-style: normal; font-size: 10px; color: #888; margin-left: 8px; }

    /* ── Custom keyboard (mobile only) ── */
    #kb-bar {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #f0f0f0; border-top: 1px solid #ccc;
      padding: 8px 6px 14px; flex-direction: column;
      gap: 6px; z-index: 100;
    }
    .kb-row { display: flex; justify-content: center; gap: 5px; width: 100%; }
    #kb-alpha, #kb-num { display: flex; flex-direction: column; gap: 6px; }
    .kb-key {
      font-family: inherit; font-size: 15px; font-weight: bold;
      height: 42px; flex: 1;
      border: none; border-radius: 4px;
      background: #fff; color: #000;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
      cursor: pointer; padding: 0;
    }
    .kb-key:active { background: #ccc; }
    .kb-key.kb-wide  { flex: 1.4; font-size: 12px; }
    .kb-key.kb-space { flex: 5; }
    .kb-key.kb-enter { flex: 2; font-size: 13px; }

    @media (max-width: 600px) {
      html { overflow: hidden; }
      body {
        height: 100vh; height: 100dvh; min-height: unset;
        overflow: hidden; padding: 8px 10px 0;
        font-size: 13px; max-width: 100%;
      }
      h1 { font-size: 13px; margin-bottom: 6px; flex-shrink: 0; }
      #left-panel, #side-panel { display: none; }
      #diagram-row { flex-shrink: 0; margin-bottom: 6px; }
      #diagram { height: clamp(110px, 22vh, 180px); }
      #proof-display { font-size: 11px; flex-shrink: 0; }
      #chat { flex: 1; min-height: 0; max-height: none; font-size: 13px; }
      #input-row { flex-shrink: 0; }
      #text-input, #fake-input { font-size: 16px; }
      #yn-bar, #draw-bar, #kb-bar { position: static; flex-shrink: 0; }
      #kb-bar { padding-bottom: 10px; }
    }
  </style>
</head>

<div id="diagram-row">

  <svg id="diagram"
       viewBox="0 0 800 470"
       preserveAspectRatio="xMidYMid meet"

    <g id="canvas">

      <g id="dc-given" class="de">

        <text x="207" y="337" font-family="inherit" font-size="18" fill="#000">A</text>
        <line x1="450" y1="310" x2="570" y2="310" stroke="#000" stroke-width="3"/>
        <circle cx="450" cy="310" r="6" fill="#000"/>
        <circle cx="570" cy="310" r="6" fill="#000"/>
        <text x="437" y="337" font-family="inherit" font-size="18" fill="#000">B</text>
        <text x="564" y="337" font-family="inherit" font-size="18" fill="#000">C</text>
      </g>
      <!-- Segment AB -->
      <g id="dc-ab" class="de">
        <line x1="220" y1="310" x2="450" y2="310" stroke="#000" stroke-width="2.5"/>

      <!-- Equilateral triangle DAB with apex D above AB -->
      <!-- D=(335,111): midpoint x of AB=335, y=310−100√3≈310−173=111 (apex above) -->
      <g id="dc-tri" class="de">

        <circle cx="335" cy="111" r="6" fill="#2563eb"/>
        <text x="340" y="108" font-family="inherit" font-size="18" fill="#2563eb">D</text>
      </g>

      <g id="dc-ext" class="de">

        <line x1="450" y1="310" x2="537" y2="460" stroke="#bbb" stroke-width="1" stroke-dasharray="6 4"/>
      </g>
      <!-- Circle CGH: centre B(450,310), radius BC=120 -->
      <!-- G=(510,414) lies on this circle and on extension of DB beyond B -->
      <g id="dc-circle-cgh" class="de">
        <circle cx="450" cy="310" r="120" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="10 6" opacity=".7"/>

      <!-- Point G -->

        <text x="518" y="432" font-family="inherit" font-size="16" fill="#dc2626">G</text>

      <g id="dc-circle-gkl" class="de">
        <circle cx="335" cy="111" r="350" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="10 6" opacity=".5"/>
        <text x="624" y="450" font-family="inherit" font-size="14" fill="#7c3aed" opacity=".85">&#x25CB;GKL</text>
      </g>
      <!-- Point L -->
      <g id="dc-l" class="de">

      <g id="dc-ticks-bc" class="de">
        <line x1="510" y1="303" x2="510" y2="317" stroke="#dc2626" stroke-width="2.5"/>
      </g>
      <!-- Tick on AL midpoint (~190,362) + conclusion label — revealed when AL=BC is established -->
      <g id="dc-ticks-al" class="de">
        <line x1="184" y1="359" x2="196" y2="367" stroke="#16a34a" stroke-width="2.5"/>
        <text x="164" y="375" font-family="inherit" font-size="11" fill="#16a34a" opacity=".85">AL = BC</text>
      </g>
    </g>
  </svg>
  <div id="rc-l" class="resize-corner"></div>

  <div id="diagram-controls">
    <button onclick="zoomCenter(1.5)">+</button>

</div>

  <div id="kb-alpha">
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('q')">Q</button><button class="kb-key" onclick="kbTap('w')">W</button><button class="kb-key" onclick="kbTap('e')">E</button><button class="kb-key" onclick="kbTap('r')">R</button><button class="kb-key" onclick="kbTap('t')">T</button><button class="kb-key" onclick="kbTap('y')">Y</button><button class="kb-key" onclick="kbTap('u')">U</button><button class="kb-key" onclick="kbTap('i')">I</button><button class="kb-key" onclick="kbTap('o')">O</button><button class="kb-key" onclick="kbTap('p')">P</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('a')">A</button><button class="kb-key" onclick="kbTap('s')">S</button><button class="kb-key" onclick="kbTap('d')">D</button><button class="kb-key" onclick="kbTap('f')">F</button><button class="kb-key" onclick="kbTap('g')">G</button><button class="kb-key" onclick="kbTap('h')">H</button><button class="kb-key" onclick="kbTap('j')">J</button><button class="kb-key" onclick="kbTap('k')">K</button><button class="kb-key" onclick="kbTap('l')">L</button>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-wide" onclick="kbToggleNum()">123</button><button class="kb-key" onclick="kbTap('z')">Z</button><button class="kb-key" onclick="kbTap('x')">X</button><button class="kb-key" onclick="kbTap('c')">C</button><button class="kb-key" onclick="kbTap('v')">V</button><button class="kb-key" onclick="kbTap('b')">B</button><button class="kb-key" onclick="kbTap('n')">N</button><button class="kb-key" onclick="kbTap('m')">M</button><button class="kb-key kb-wide" onclick="kbBack()">&#x232B;</button>
    </div>

      <button class="kb-key" onclick="kbTap('.')">.</button>

      <button class="kb-key" onclick="kbTap('1')">1</button><button class="kb-key" onclick="kbTap('2')">2</button><button class="kb-key" onclick="kbTap('3')">3</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('4')">4</button><button class="kb-key" onclick="kbTap('5')">5</button><button class="kb-key" onclick="kbTap('6')">6</button>
    </div>
    <div class="kb-row">
      <button class="kb-key" onclick="kbTap('7')">7</button><button class="kb-key" onclick="kbTap('8')">8</button><button class="kb-key" onclick="kbTap('9')">9</button>
    </div>
    <div class="kb-row">
      <button class="kb-key kb-wide" onclick="kbToggleNum()">ABC</button><button class="kb-key" onclick="kbTap('.')">.</button><button class="kb-key" onclick="kbTap('0')">0</button><button class="kb-key kb-wide" onclick="kbBack()">&#x232B;</button>
    </div>

    </div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// SCRIPT
// type: 'yn'   = yes/no question
//       'open' = free-text, keyword check via ok(), hint after 1 fail, advance after 2
//       'say'  = tutor narrates, auto-advances
//       'draw' = tutor narrates, student clicks Draw to reveal and advance
// ─────────────────────────────────────────────────────────────────────────────

// ─── Fuzzy matching helpers ───────────────────────────────────────────────────
function lev(a,b){
  const m=a.length,n=b.length;
  if(!m)return n; if(!n)return m;
  const dp=Array.from({length:m+1},(_,i)=>[i]);
  for(let j=1;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
  return dp[m][n];
}
// Returns true if any word in `response` is within edit distance of any target.
// Threshold: ≤7-char targets allow 1 edit, 8+ chars allow 2 edits.
function hasNear(response, targets){
  const words=response.toLowerCase().split(/[\s,.;!?]+/).filter(w=>w.length>=3);
  return words.some(w=>targets.some(t=>{
    const d=t.length<=7?1:2;
    return lev(w,t)<=d;
  }));
}
// ─────────────────────────────────────────────────────────────────────────────

const PROP_NUM = 2;

const STEPS = [
  // 0
  { type:'yn',
    q:'We are given a point A and a straight line BC. Can you see both in the diagram?',
    no:'Point A is the dot on the left. Segment BC is the bold line on the right with endpoints B and C.',
    text:'Let A be the given point, and BC the given straight line.', just:null,
    side:'Given: A, line BC', reveal:[] },

  // 1
  { type:'yn',
    q:'Our goal is to place a straight line starting at A that is equal in length to BC. Ready?',
    no:'We want to draw a new segment with one endpoint at A whose length equals BC.',
    text:'It is required to place at the point A (as an extremity) a straight line equal to the given straight line BC.', just:null,
    side:'Goal: AL = BC', reveal:[] },

  // 2
  { type:'open',
    q:'What does Postulate 1 allow us to do?',
    ok: r => /draw|join|connect|link|post\.?\s*1/i.test(r)
          || hasNear(r,['draw','join','connect','link']),
    hint:'Postulate 1: To draw a straight line from any point to any point.',
    text:'Post. 1: To draw a straight line from any point to any point.', just:'Post. 1',
    side:null, reveal:[] },

  // 3
  { type:'draw',
    q:'Can we join A to B with a straight line?',
    reveal:['dc-ab'],
    text:'Let the straight line AB be joined.', just:'Post. 1',
    side:'Join AB' },

  // 4
  { type:'open',
    q:'We need equal lengths near A. Which earlier proposition constructs equal segments on a line?',
    ok: r => /\b1\b|\bi\.?\s*1\b|\bprop(?:osition)?\.?\s*1\b|\bone\b|\bfirst\b|equilateral|triangle|previous/i.test(r)
          || hasNear(r,['equilateral','triangle','proposition']),
    hint:'In I.1 we constructed an equilateral triangle on AB — all three sides equal. We build on that here.',
    text:null, just:null,
    side:null, reveal:[], numpad:true },

  // 5
  { type:'draw',
    q:'Can we construct an equilateral triangle DAB on the line AB? (We proved this in I.1.)',
    reveal:['dc-tri'],
    text:'On the straight line AB let the equilateral triangle DAB be constructed.', just:'I.1',
    side:'△DAB equilateral' },

  // 6
  { type:'open',
    q:'What does Postulate 2 allow us to do?',
    ok: r => /extend|produc|continu|lengthen|prolong|stretch|elongat|post\.?\s*2/i.test(r)
          || hasNear(r,['extend','produce','continue','lengthen','prolong','stretch']),
    hint:'Postulate 2: To produce a finite straight line continuously in a straight line.',
    text:'Post. 2: To produce a finite straight line continuously in a straight line.', just:'Post. 2',
    side:null, reveal:[] },

  // 7
  { type:'draw',
    q:'Can we extend line DA past A, and line DB past B?',
    reveal:['dc-ext'],
    text:'Let the straight lines AE and BF be produced in a straight line with DA and DB.', just:'Post. 2',
    side:'Extend DA, DB' },

  // 8
  { type:'open',
    q:'What does Postulate 3 allow us to do?',
    ok: r => /circle|arc|radius|compass|describ|sweep|post\.?\s*3/i.test(r)
          || hasNear(r,['circle','radius','compass','describe']),
    hint:'Postulate 3: To describe a circle with any centre and distance.',
    text:'Post. 3: To describe a circle with any centre and distance.', just:'Post. 3',
    side:null, reveal:[] },

  // 9
  { type:'draw',
    q:'Can we draw a circle with centre B and radius BC?',
    reveal:['dc-circle-cgh'],
    text:'With centre B and distance BC let the circle CGH be described.', just:'Post. 3',
    side:'&#x25CB;CGH, r = BC' },

  // 10
  { type:'draw',
    q:'Look where the circle at B meets the extension of DB beyond B. Can we name this point G?',
    reveal:['dc-g'],
    text:null, just:null,
    side:'G = &#x25CB;CGH &#x2229; BF' },

  // 11
  { type:'draw',
    q:'Can we draw a circle with centre D and radius DG?',
    reveal:['dc-circle-gkl'],
    text:'With centre D and distance DG let the circle GKL be described.', just:'Post. 3',
    side:'&#x25CB;GKL, r = DG' },

  // 12
  { type:'draw',
    q:'Look where the circle at D meets the extension of DA beyond A. Can we name this point L?',
    reveal:['dc-l'],
    text:null, just:null,
    side:'L = &#x25CB;GKL &#x2229; AE' },

  // 13
  { type:'open',
    q:'What are BC and BG, with respect to circle B?',
    ok: r => /radius|radi|centre|center|distance|equidist/i.test(r)
          || hasNear(r,['radius','radii','centre','center','distance']),
    hint:'Both BC and BG run from the centre B to circle B — what do we call such segments?',

const CONCLUSION = "Congratulations! You have completed Euclid's Elements Book I, Proposition 2.";

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────

let step     = 0;
let attempts = 0;

// ─────────────────────────────────────────────────────────────────────────────
// Pan / Zoom
// ─────────────────────────────────────────────────────────────────────────────

const diagramEl = document.getElementById('diagram');
const canvas    = document.getElementById('canvas');
let pan = { tx:0, ty:0, s:1 };
const MIN_S=0.12, MAX_S=12;

function clientToVB(cx,cy){
  const r=diagramEl.getBoundingClientRect(), v=diagramEl.viewBox.baseVal;
  return { x:(cx-r.left)/r.width*v.width+v.x, y:(cy-r.top)/r.height*v.height+v.y };
}
function applyTransform(){ canvas.setAttribute('transform',`translate(${pan.tx},${pan.ty}) scale(${pan.s})`); }
function zoomAt(px,py,f){
  const ns=Math.max(MIN_S,Math.min(MAX_S,pan.s*f)), r=ns/pan.s;
  pan.tx=px-(px-pan.tx)*r; pan.ty=py-(py-pan.ty)*r; pan.s=ns; applyTransform();
}
function zoomCenter(f){ const v=diagramEl.viewBox.baseVal; zoomAt(v.x+v.width/2,v.y+v.height/2,f); }
function animatePan(t,ms=420){
  const from={...pan}, t0=performance.now();
  (function tick(now){
    let p=Math.min((now-t0)/ms,1); p=p<.5?2*p*p:-1+(4-2*p)*p;
    pan.tx=from.tx+(t.tx-from.tx)*p; pan.ty=from.ty+(t.ty-from.ty)*p; pan.s=from.s+(t.s-from.s)*p;
    applyTransform(); if(p<1) requestAnimationFrame(tick); else pan={...t};
  })(performance.now());
}
function resetView(){ animatePan({tx:0,ty:0,s:1}); }

diagramEl.addEventListener('wheel',e=>{
  e.preventDefault(); const p=clientToVB(e.clientX,e.clientY);
  zoomAt(p.x,p.y,e.deltaY<0?1.12:1/1.12);
},{passive:false});

let dragging=false, lastPt=null;
diagramEl.addEventListener('mousedown',e=>{
  if(e.button!==0) return; dragging=true; lastPt=clientToVB(e.clientX,e.clientY);
  diagramEl.classList.add('panning'); e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!dragging) return;
  const pt=clientToVB(e.clientX,e.clientY);
  pan.tx+=pt.x-lastPt.x; pan.ty+=pt.y-lastPt.y; lastPt=pt; applyTransform();
});
window.addEventListener('mouseup',()=>{ dragging=false; diagramEl.classList.remove('panning'); });

let lastTouches=[];
diagramEl.addEventListener('touchstart',e=>{ lastTouches=Array.from(e.touches); e.preventDefault(); },{passive:false});
diagramEl.addEventListener('touchmove',e=>{
  e.preventDefault(); const ts=Array.from(e.touches);
  if(ts.length===1&&lastTouches.length>=1){
    const c=clientToVB(ts[0].clientX,ts[0].clientY), p=clientToVB(lastTouches[0].clientX,lastTouches[0].clientY);
    pan.tx+=c.x-p.x; pan.ty+=c.y-p.y; applyTransform();
  } else if(ts.length===2&&lastTouches.length>=2){
    const d1=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);
    const d2=Math.hypot(lastTouches[1].clientX-lastTouches[0].clientX,lastTouches[1].clientY-lastTouches[0].clientY);
    if(d2>0){ const p=clientToVB((ts[0].clientX+ts[1].clientX)/2,(ts[0].clientY+ts[1].clientY)/2); zoomAt(p.x,p.y,d1/d2); }
  }
  lastTouches=ts;
},{passive:false});
diagramEl.addEventListener('touchend',e=>{ lastTouches=Array.from(e.touches); },{passive:false});

let resizing=false, rSide=null, rStartY=0, rStartH=0, rStartX=0, rStartW=0, rStartML=0;
const rowEl=document.getElementById('diagram-row');
function startResize(side,cx,cy){
  resizing=true; rSide=side; rStartY=cy; rStartX=cx;
  const r=diagramEl.getBoundingClientRect(); rStartH=r.height; rStartW=r.width;
  rStartML=parseFloat(rowEl.style.marginLeft)||0;
}
['rc-l','rc-r'].forEach(id=>{
  const side=id.endsWith('-l')?'l':'r';
  document.getElementById(id).addEventListener('mousedown',e=>{ startResize(side,e.clientX,e.clientY); e.preventDefault(); });
  document.getElementById(id).addEventListener('touchstart',e=>{ startResize(side,e.touches[0].clientX,e.touches[0].clientY); e.preventDefault(); },{passive:false});
});
window.addEventListener('mousemove',e=>{ if(resizing) applyResize(e.clientX,e.clientY); });
window.addEventListener('touchmove',e=>{ if(resizing) applyResize(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
window.addEventListener('mouseup',()=>{ resizing=false; });
window.addEventListener('touchend',()=>{ resizing=false; });
function applyResize(cx,cy){
  const h=Math.max(80,Math.min(600,rStartH+cy-rStartY)); diagramEl.style.height=h+'px';
  const dx=cx-rStartX, dw=rSide==='r'?dx:-dx;
  const w=Math.max(200,Math.min(window.innerWidth-40,rStartW+dw));
  rowEl.style.width=w+'px'; if(rSide==='l') rowEl.style.marginLeft=(rStartML-(w-rStartW))+'px';
}

// ─────────────────────────────────────────────────────────────────────────────
// Side & Left panels
// ─────────────────────────────────────────────────────────────────────────────

function buildPanels(){
  const side = document.getElementById('side-panel');
  const left = document.getElementById('left-panel');

  left.innerHTML = `<div class="prop-label">I.2</div>
    <div class="prop-enunc">To place at a given point (as an extremity) a straight line equal to a given straight line.</div>`;

  STEPS.forEach((s,i)=>{
    if(s.side){
      const el=document.createElement('div');
      el.id=`si-${i}`; el.className='side-item';
      el.innerHTML=s.side; side.appendChild(el);
    }
    if(s.text){
      const el=document.createElement('div');
      el.id=`pl-${i}`; el.className='proof-line';
      el.appendChild(document.createTextNode(s.text));
      if(s.just){ const sp=document.createElement('span'); sp.className='just'; sp.textContent=s.just; el.appendChild(sp); }
      left.appendChild(el);
    }
  });
}

function getDisplayStep(){
  const s=STEPS[step];
  if(s && s.display_linked_idx != null) return s.display_linked_idx;
  for(let i=step; i>=0; i--){ if(STEPS[i] && STEPS[i].text) return i; }
  return -1;
}

function setProofDisplay(idx){
  const pd=document.getElementById('proof-display');
  if(!pd) return;
  if(idx<0){ pd.classList.remove('visible'); return; }
  const s=STEPS[idx];
  if(s && s.text){
    pd.innerHTML=s.text+(s.just?`<span class="proof-just">${s.just}</span>`:'');
    pd.classList.add('visible');
  } else {
    pd.classList.remove('visible');
  }
}

function updatePanels(){
  const ds=getDisplayStep();
  STEPS.forEach((s,i)=>{
    const pl=document.getElementById(`pl-${i}`);
    if(pl){ pl.classList.toggle('active',i===ds); pl.classList.toggle('past',i<ds); }
  });
  setProofDisplay(ds);
}

// ─────────────────────────────────────────────────────────────────────────────
// Diagram reveal
// ─────────────────────────────────────────────────────────────────────────────

function show(id){ const el=document.getElementById(id); if(el) el.classList.add('on'); }

function revealStep(s){
  if(s.reveal) s.reveal.forEach(id=>show(id));
  if(s.side){ const el=document.getElementById(`si-${step}`); if(el) el.classList.add('on'); }
}

// ─────────────────────────────────────────────────────────────────────────────
// Chat
// ─────────────────────────────────────────────────────────────────────────────

const chatEl    = document.getElementById('chat');
const textInput = document.getElementById('text-input');
const sendBtn   = document.getElementById('send-btn');
const ynBar     = document.getElementById('yn-bar');
const drawBar   = document.getElementById('draw-bar');
const inputRow  = document.getElementById('input-row');
const kbBar     = document.getElementById('kb-bar');
const fakeInputEl   = document.getElementById('fake-input');
const fakePlaceholder = document.getElementById('fake-placeholder');

const isMobile = () => navigator.maxTouchPoints > 0;

function addMsg(text, who){
  const d=document.createElement('div');
  d.className = who==='user' ? 'msg-user' : 'msg-bot';
  d.textContent=text; chatEl.appendChild(d);
  chatEl.scrollTop=chatEl.scrollHeight;
  if(who==='bot') logEvent('bot', text);
  return d;
}

function logEvent(role, message){
  fetch('/api/event',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({proposition:PROP_NUM,step,role,message})});
}

function updateFake(){
  const v=textInput.value;
  if(v){ fakePlaceholder.textContent=v; fakePlaceholder.style.color=''; }
  else { fakePlaceholder.textContent='Your answer…'; fakePlaceholder.style.color='#999'; }
  fakeInputEl.scrollLeft = fakeInputEl.scrollWidth;
}

function setMode(type){
  if(type==='done'){
    ynBar.style.display='none'; drawBar.style.display='none'; kbBar.style.display='none';
    inputRow.style.display='none';
    document.getElementById('dashboard-btn').style.display='';
    return;
  }
  ynBar.style.display   = type==='yn'   ? 'flex' : 'none';
  drawBar.style.display = type==='draw' ? 'flex' : 'none';
  kbBar.style.display   = (type==='open' && isMobile()) ? 'flex' : 'none';
  if(type==='open' && isMobile()){
    document.getElementById('kb-alpha').style.display='';
    document.getElementById('kb-num').style.display='none';
    setTimeout(()=>{ chatEl.scrollTop=chatEl.scrollHeight; }, 80);
    fakeInputEl.style.display='flex'; textInput.style.display='none'; updateFake();
  } else {
    fakeInputEl.style.display='none'; textInput.style.display='';
  }
  inputRow.style.display = type==='draw' ? 'none' : 'flex';
  sendBtn.disabled = type==='draw'; textInput.disabled = type==='draw';
  if(type==='open' && !isMobile()) textInput.focus();
}

function kbTap(ch){ textInput.value+=ch; updateFake(); }
function kbBack(){ textInput.value=textInput.value.slice(0,-1); updateFake(); }
function kbEnter(){ submit(textInput.value); }
function kbToggleNum(){
  const a=document.getElementById('kb-alpha'), n=document.getElementById('kb-num');
  const toNum=a.style.display!=='none';
  a.style.display=toNum?'none':''; n.style.display=toNum?'':'none';
}

// ─────────────────────────────────────────────────────────────────────────────
// Flow
// ─────────────────────────────────────────────────────────────────────────────

function advance(){ attempts=0; step++; showStep(); }

function showStep(){
  updatePanels();
  if(step>=STEPS.length){
    addMsg(CONCLUSION,'bot'); setMode('done');
    fetch('/api/complete',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({proposition:PROP_NUM})})
      .then(r=>{
        if(r.ok){
          addMsg('✓ Your completion has been recorded.','bot');
          const d=document.createElement('div');
          d.className='msg-bot';
          d.innerHTML='<a href="/survey?prop=2" style="color:#7c3aed;text-decoration:underline;">Share your experience →</a>';
          chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
        } else {
          addMsg('(Could not record completion — are you logged in via /i2?)','bot');
        }
      })
      .catch(()=>addMsg('(Network error recording completion.)','bot'));
    return;
  }
  const s=STEPS[step];

  if(s.type==='say'){
    revealStep(s); addMsg(s.q,'bot'); setTimeout(advance,700); return;
  }
  if(s.type==='draw'){
    addMsg(s.q,'bot'); setMode('draw'); return;
  }
  addMsg(s.q,'bot'); setMode(s.type);
  if(s.numpad && isMobile()){
    document.getElementById('kb-alpha').style.display='none';
    document.getElementById('kb-num').style.display='';
  }
}

function submit(raw){
  const answer=raw.trim(); if(!answer) return;
  textInput.value=''; updateFake();
  addMsg(answer,'user');
  logEvent('user',answer);
  const s=STEPS[step];

  if(s.type==='yn'){
    if(/^y/i.test(answer)){
      revealStep(s); advance();
    } else {
      addMsg(s.no,'bot');
      setTimeout(()=>addMsg(s.q,'bot'),600);
    }
    return;
  }

  if(s.type==='open'){
    if(s.ok(answer)){
      revealStep(s);
      advance();
    } else {
      attempts++;
      if(attempts >= 2){
        addMsg(s.hint,'bot');
        if(s.hint_linked_idx != null) setProofDisplay(s.hint_linked_idx);
      } else {
        addMsg('Not quite — try again.','bot');
      }
      if(attempts >= 3){
        revealStep(s);
        setTimeout(advance, 800);
      }
    }
  }
}

sendBtn.addEventListener('click',()=>submit(textInput.value));
textInput.addEventListener('keydown',e=>{ if(e.key==='Enter') submit(textInput.value); });
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&drawBar.style.display==='flex'&&e.target!==textInput){
    e.preventDefault(); document.getElementById('btn-draw').click();
  }
});
document.getElementById('btn-yes').addEventListener('click',()=>{
  addMsg('Yes','user'); logEvent('user','Yes'); const s=STEPS[step]; revealStep(s); advance();
});
document.getElementById('btn-no').addEventListener('click',()=>{
  addMsg('No','user'); logEvent('user','No'); addMsg(STEPS[step].no,'bot');
  setTimeout(()=>addMsg(STEPS[step].q,'bot'),600);
});
document.getElementById('btn-draw').addEventListener('click',()=>{
  addMsg('Yes / Draw','user'); logEvent('user','[drew]'); const s=STEPS[step]; revealStep(s); advance();
});

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────

buildPanels();
show('dc-given');
showStep();
</script>
