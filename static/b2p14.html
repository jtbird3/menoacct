<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.14 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.14 - Construct a square equal to a given rectilineal figure</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.14 chatbot!

We are given a rectilineal figure A. Do you agree? (yes/no):`,
    hint: `A rectilineal figure is any figure bounded by straight lines (e.g., triangle, quadrilateral, or polygon).` },
  { q: `Our goal is to construct a square equal in area to figure A. Does that make sense? (yes/no):`,
    hint: `By “equal,” Euclid means equal in area, not necessarily in shape.` },
  { q: `First, construct a rectangular parallelogram BD equal to the rectilineal figure A. Can we do this? (yes/no):`,
    hint: `Proposition I.45 shows how to make a parallelogram equal in area to any rectilineal figure.` },
  { q: `Suppose BD = BE. Would BD be a square equal to A? (yes/no):`,
    hint: `A square is a parallelogram with equal adjacent sides.` },
  { q: `If not, suppose BE is greater than ED. Let BE be produced to F, and make EF equal to ED. Is that possible? (yes/no):`,
    hint: `Postulate 3 and Proposition I.3 allow us to mark off EF equal to ED on the extension of BE.` },
  { q: `Now, bisect BF at G. Can we do this? (yes/no):`,
    hint: `Proposition I.10 shows how to bisect a given finite straight line.` },
  { q: `With center G and radius GB (or GF), draw the semicircle BHF. Possible? (yes/no):`,
    hint: `Postulate 3 allows a circle or semicircle with any center and radius.` },
  { q: `Produce DE to meet the semicircle at H, and join GH. Can we do this? (yes/no):`,
    hint: `By Postulate 2 and Postulate 1, we may extend lines and join points with straight lines.` },
  { q: `Since BF is cut equally at G and unequally at E, is the rectangle BE x EF together with the square on GE equal to the square on GF? (yes/no):`,
    hint: `This is exactly Proposition II.5.` },
  { q: `But GF equals GH (both radii of the semicircle). So, is the rectangle BE x EF plus GE² equal to GH²? (yes/no):`,
    hint: `All radii of the same circle are equal.` },
  { q: `And since GH² equals GE² + HE² (by Pythagoras, I.47), can we replace GH² with GE² + HE²? (yes/no):`,
    hint: `The square on the hypotenuse equals the sum of the squares on the legs of a right triangle.` },
  { q: `Subtract GE² from both sides. Do we get BE x EF = HE²? (yes/no):`,
    hint: `Common Notion 3: Subtract equals from equals, the remainders are equal.` },
  { q: `But BE x EF is the parallelogram BD (since EF = ED). Therefore, is BD equal in area to the square on EH? (yes/no):`,
    hint: `By construction, EF = ED, so BD = BE x ED = BE x EF.` },
  { q: `Since BD equals figure A, and BD equals the square on EH, can we conclude the square on EH equals the rectilineal figure A? (yes/no):`,
    hint: `Transitivity of equality: things equal to the same thing are equal to one another (Common Notion 1).` },
  { q: `Therefore, have we constructed a square (on EH) equal to the given rectilineal figure A? (yes/no):`,
    hint: `Yes, this is the required construction.` }
];

const conclusion = `Congratulations! You just constructed a square equal to the given rectilineal figure.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
