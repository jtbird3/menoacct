<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.5 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.5 - Prove that triangles with proportional sides are equiangular</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.5 chatbot!

We are given two triangles ABC and DEF with sides proportional: AB:BC = DE:EF, BC:CA = EF:FD, and BA:AC = ED:DF. Do you agree? (yes/no):`,
    hint: `The three pairwise ratios are given as equal.` },
  { q: `Our goal is to prove that ABC is equiangular with DEF, with angles opposite corresponding sides equal (∠ABC = ∠DEF, ∠BCA = ∠DFE, ∠BAC = ∠EDF). Does that make sense? (yes/no):`,
    hint: `We will transfer equality from GEF to DEF.` },
  { q: `On the straight line EF, at the point E, construct angle FEG equal to angle ABC. Can we do this? (yes/no):`,
    hint: `By I.23, an angle equal to a given angle can be constructed at a given point on a given line.` },
  { q: `On the same line EF, at the point F, construct angle EFG equal to angle ACB. Is this allowed? (yes/no):`,
    hint: `Again, I.23 permits constructing a given angle at a given point on a given line.` },
  { q: `Since ∠FEG = ∠ABC and ∠EFG = ∠ACB, is the remaining angle at A equal to the remaining angle at G? (yes/no):`,
    hint: `The third angles of two triangles are equal when the other two are equal (I.32).` },
  { q: `Therefore, is triangle ABC equiangular to triangle GEF? (yes/no):`,
    hint: `All three corresponding angles match pairwise.` },
  { q: `From the equiangular triangles ABC and GEF, are the sides about equal angles proportional, namely AB:BC = GE:EF? (yes/no):`,
    hint: `In equiangular triangles, corresponding sides about equal angles are proportional (VI.4).` },
  { q: `Given AB:BC = DE:EF (hypothesis) and AB:BC = GE:EF, do we get DE:EF = GE:EF? (yes/no):`,
    hint: `Ratios equal to the same ratio are equal (V.11).` },
  { q: `If DE:EF = GE:EF, must DE = GE? (yes/no):`,
    hint: `If two magnitudes have the same ratio to an equal magnitude, they are equal (V.9).` },
  { q: `From the equiangular triangles ABC and GEF, do we also have BA:AC = GE:GF? (yes/no):`,
    hint: `Again use VI.4 with angles at A and G.` },
  { q: `Given BA:AC = ED:DF (hypothesis) and BA:AC = GE:GF, can we conclude ED:DF = GE:GF? (yes/no):`,
    hint: `Equal to the same implies equal (V.11).` },
  { q: `If ED = GE and ED:DF = GE:GF, does it follow that DF = GF? (yes/no):`,
    hint: `With equal antecedents in equal ratios, the consequents are equal (V.9).` },
  { q: `Now with DE = GE and common side EF, are the two sides DE, EF equal respectively to GE, EF? (yes/no):`,
    hint: `They match term-by-term, sharing EF.` },
  { q: `And since DF = GF, are the bases DF and GF equal as well? (yes/no):`,
    hint: `This was just established.` },
  { q: `With two sides and the base equal respectively (DE = GE, EF common, DF = GF), is ∠DEF equal to ∠GEF, and are triangles DEF and GEF equal with remaining angles equal respectively? (yes/no):`,
    hint: `Side-side-side equality gives equality of included angles and triangles (I.8 and I.4).` },
  { q: `Since ∠FED = ∠GEF and ∠GEF = ∠ABC, do we have ∠ABC = ∠DEF? (yes/no):`,
    hint: `Replace equal by equal (transitivity of angle equality).` },
  { q: `By the same reasoning, is ∠ACB = ∠DFE and ∠BAC = ∠EDF? (yes/no):`,
    hint: `Use the already established triangle equality and angle correspondences.` },
  { q: `Therefore, are the triangles ABC and DEF equiangular with equal corresponding angles opposite proportional sides? (yes/no):`,
    hint: `We have matched all three angle pairs.` }
];

const conclusion = `Congratulations! You just proved that triangles with proportional sides are equiangular.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
