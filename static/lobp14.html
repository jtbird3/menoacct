<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Theory of Parallels Theorem 14 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Theorem 14 — In a spherical triangle, equal sides lie opposite equal angles, and inversely</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Lobachevsky's Theory of Parallels Theorem 14 chatbot!

A spherical triangle is formed by three great circle arcs on a sphere. Each side is an arc, and each angle is the dihedral angle between the two planes of the great circles meeting at that vertex. Do you accept this description? (yes/no):`,
    hint: `On a sphere, "straight lines" are great circles (circles whose center is the center of the sphere). A spherical triangle has three great-circle-arc sides and three dihedral angles.` },
  { q: `Let the spherical triangle have sides a, b, c (arcs) with opposite angles A, B, C. Suppose a = b. Each arc corresponds to a central angle at the center O of the sphere — equal arcs mean equal central angles. Do you agree? (yes/no):`,
    hint: `Arc length = radius × central angle. Since the radius is fixed, equal arcs correspond to equal central angles at O.` },
  { q: `The angle A of the spherical triangle is the dihedral angle between the two planes containing the great circle arcs meeting at vertex A. This dihedral angle is determined by the two sides meeting at A. Do you accept this? (yes/no):`,
    hint: `Each vertex angle of a spherical triangle is the angle between the two planes (each containing a side of the triangle and the center O).` },
  { q: `If sides a and b are equal (equal arcs, equal central angles), the configuration is symmetric with respect to the plane bisecting the arc between the endpoints of a and b. Does this symmetry force the dihedral angles A and B opposite those sides to be equal? (yes/no):`,
    hint: `Equal arcs produce a geometrically symmetric figure. The symmetry plane maps the angle opposite side a to the angle opposite side b, so A = B.` },
  { q: `The converse follows by the same symmetry argument: if angles A = B, then the figure is symmetric, forcing the sides a = b opposite them to be equal. Do you agree? (yes/no):`,
    hint: `Symmetry works in both directions: equal angles imply the figure is symmetric, which in turn forces the opposite sides to be equal.` }
];

const conclusion = `Congratulations! You just proved Theorem 14: in a spherical triangle, equal sides lie opposite equal angles, and inversely.
Q.E.D.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
