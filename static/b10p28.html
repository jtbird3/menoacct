<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.28</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.28 – Find medial straight lines commensurable in square only which contain a medial rectangle.</h1><div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>
<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.28 chatbot!

We are given rational straight lines A, B, and C, which are commensurable in square only. Do you agree? (yes/no):`,
hint: `“Commensurable in square only” means their squares are commensurable, but the lines themselves are not.` },
{ q: `Let D be taken as a mean proportional between A and B. Is this construction allowed? (yes/no):`,
hint: `By Book VI, Proposition 13, a mean proportional can be found between two straight lines.` },
{ q: `Next, let it be contrived that, as B is to C, so is D to E. Can this be done? (yes/no):`,
hint: `Book VI, Proposition 12 allows us to construct a fourth proportional.` },
{ q: `Our goal is to find medial straight lines commensurable in square only which also contain a medial rectangle. Does that make sense? (yes/no):`,
hint: `We aim to prove both a property of the lines and of the rectangle they contain.` },

{ q: `Since A and B are rational straight lines commensurable in square only, is the rectangle contained by A and B medial? (yes/no):`,
hint: `By Book X, Proposition 21, the rectangle of such lines is medial.` },
{ q: `But the rectangle A, B is equal to the square on D. Do you agree? (yes/no):`,
hint: `By Book VI, Proposition 17, the square on the mean proportional equals the rectangle of the extremes.` },
{ q: `Therefore, is the square on D medial? (yes/no):`,
hint: `It equals a medial rectangle.` },
{ q: `Does it then follow that D itself is a medial straight line? (yes/no):`,
hint: `By Book X, Proposition 21, a line whose square is medial is itself medial.` },
{ q: `Since B and C are commensurable in square only, and as B is to C so is D to E, are D and E also commensurable in square only? (yes/no):`,
hint: `By Book X, Proposition 11, proportionality preserves commensurability in square only.` },
{ q: `But D is medial; does it follow that E is also medial? (yes/no):`,
hint: `By Book X, Proposition 23, a straight line commensurable with a medial straight line is itself medial.` },
{ q: `Therefore, have we found medial straight lines D and E commensurable in square only? (yes/no):`,
hint: `This concludes the first part of the proposition.` },

{ q: `Since as B is to C, so is D to E, does it follow alternately that as B is to D, so is C to E? (yes/no):`,
hint: `This is the alternation property of ratios (Book V, Proposition 16).` },
{ q: `But as B is to D, so is D to A. Do you agree? (yes/no):`,
hint: `D was constructed as the mean proportional between A and B.` },
{ q: `Therefore, does it follow that as D is to A, so is C to E? (yes/no):`,
hint: `Ratios equal to the same ratio are equal to one another.` },
{ q: `From this, is the rectangle A, C equal to the rectangle D, E? (yes/no):`,
hint: `By Book VI, Proposition 16, equality of ratios gives equality of rectangles.` },
{ q: `But is the rectangle A, C medial? (yes/no):`,
hint: `A and C are rational lines commensurable in square only, so their rectangle is medial (Book X, Proposition 21).` },
{ q: `Therefore, is the rectangle D, E also medial? (yes/no):`,
hint: `It is equal to a medial rectangle.` },

{ q: `Therefore, have medial straight lines commensurable in square only been found which contain a medial rectangle? (yes/no):`,
hint: `Both required conditions have now been demonstrated.` }


]





const conclusion = `Congratulations! You just found medial straight lines commensurable in square only which contain a medial rectangle.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
