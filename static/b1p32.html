<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.32 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.32 – Prove that in a triangle the three interior angles are equal to two right angles, and the exterior angle equals the opposite two.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.32 chatbot!

We are given a triangle ABC, and one of its sides BC is produced to D. Do you agree? (yes/no):`,
    hint: `To "produce" means to extend a straight line beyond one of its endpoints (Postulate 2).` },
  { q: `Our goal is:
(1) To prove that the exterior angle ACD equals the two interior and opposite angles CAB and ABC.
(2) To prove that the three interior angles of the triangle (ABC, BCA, CAB) equal two right angles.
Does that make sense? (yes/no):`,
    hint: `This is a compound theorem: part about one exterior angle, part about the sum of all three.` },
  { q: `First, can we draw through C a line CE parallel to AB? (yes/no):`,
    hint: `Proposition I.31 allows drawing a straight line through a point parallel to a given line.` },
  { q: `Since AB ∥ CE, and AC meets them, are alternate angles BAC and ACE equal? (yes/no):`,
    hint: `Proposition I.29: when a straight line meets parallels, alternate interior angles are equal.` },
  { q: `Also, since AB ∥ CE and BD meets them, is the exterior angle ECD equal to the interior opposite angle ABC? (yes/no):`,
    hint: `Again, Proposition I.29: exterior angle equals opposite interior angle when a transversal cuts parallels.` },
  { q: `So, do we now see that angle ACD = angle ACE + angle ECD = BAC + ABC? (yes/no):`,
    hint: `ACE = BAC and ECD = ABC, so their sum equals ACD.` },
  { q: `Now, let us add angle ACB to both sides. Do we then have ACD + ACB = ABC + BCA + CAB? (yes/no):`,
    hint: `Adding equals to equals gives equals (Common Notion 2).` },
  { q: `But do we know that ACD + ACB equal two right angles? (yes/no):`,
    hint: `Proposition I.13: a straight line makes adjacent angles equal to two right angles.` },
  { q: `Therefore, are the three angles ABC, BCA, CAB also equal to two right angles? (yes/no):`,
    hint: `Since ACD + ACB = two right angles, and they equal the sum of the three interior angles, those three equal two right angles as well.` }
];

const conclusion = `Congratulations! You have proved that (1) the exterior angle of a triangle equals the two opposite interior angles, and (2) the three interior angles equal two right angles.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
