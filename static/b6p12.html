<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>VI.12 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VI.12 - Find a fourth proportional to three given straight lines</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements VI.12 chatbot!

We are given three straight lines A, B, and C. Do you agree? (yes/no):`,
    hint: `These are the three given magnitudes, and we must find a fourth that is proportional to them.` },
  { q: `Our goal is to find a straight line HF such that A : B = C : HF. Does that make sense? (yes/no):`,
    hint: `A fourth proportional means the first is to the second as the third is to the fourth.` },
  { q: `Let us draw two straight lines DE and DF containing any angle EDF. Can we do that? (yes/no):`,
    hint: `By Postulate 1, a straight line can be drawn from any point to any point, and we may choose any angle.` },
  { q: `Next, let us set off DG equal to A along DE. Possible? (yes/no):`,
    hint: `Using Proposition I.3, we can cut off a segment equal to a given straight line.` },
  { q: `Now, on DE, make GE equal to B. Can we do this? (yes/no):`,
    hint: `Again, a segment equal to a given length can be marked off on any straight line.` },
  { q: `Then, on DF, let DH be made equal to C. Is that construction allowed? (yes/no):`,
    hint: `By the same method, a line equal to a given one can be set off from a point along any line.` },
  { q: `Join the points G and H with a straight line GH. Can we draw this? (yes/no):`,
    hint: `Postulate 1 allows a straight line to be drawn between any two points.` },
  { q: `Now, through point E, draw EF parallel to GH. Can this be done? (yes/no):`,
    hint: `Proposition I.31 states that through a given point a line can be drawn parallel to a given straight line.` },
  { q: `Since GH is parallel to EF, one side of triangle DEF, is it true that as DG : GE :: DH : HF? (yes/no):`,
    hint: `By Proposition VI.2, in a triangle with a line drawn parallel to one side, the sides about the angle are proportional.` },
  { q: `Now, is DG equal to A, GE equal to B, and DH equal to C? (yes/no):`,
    hint: `Those were the lengths we set equal in our construction.` },
  { q: `Then, do we have that as A is to B, so is C to HF? (yes/no):`,
    hint: `Substituting equal quantities into the proportion gives A : B = C : HF.` },
  { q: `Therefore, have we found the fourth proportional HF to the three given straight lines A, B, C? (yes/no):`,
    hint: `Yes — HF satisfies A : B = C : HF, which completes the problem.` }
];

const conclusion = `Congratulations! You just found a fourth proportional to three given straight lines.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
