<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Principia I.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.1 — Prove that a body moving under a force toward a fixed center describes equal areas in equal times in a fixed plane</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<!-- Corollaries container (appears after main Q.E.D.) -->
<div id="corollaries" style="margin-top:20px; display:none;">
  <h2>Corollaries to Proposition I.1</h2>
  <div id="corollaryButtons" style="margin-bottom:10px; display:flex; gap:8px; flex-wrap:wrap;">
    <button class="cor-btn" data-cor="1">Corollary 1</button>
    <button class="cor-btn" data-cor="2">Corollary 2</button>
    <button class="cor-btn" data-cor="3">Corollary 3</button>
    <button class="cor-btn" data-cor="4">Corollary 4</button>
    <button class="cor-btn" data-cor="5">Corollary 5</button>
    <button class="cor-btn" data-cor="6">Corollary 6</button>
  </div>
  <div id="corChat" style="border:1px solid #ccc; padding:10px; min-height:120px; white-space:pre-wrap; display:flex; flex-direction:column; gap:8px;"></div>
  <div id="corInputArea" style="margin-top:10px;">
    <input id="corInput" type="text" placeholder="Type 'yes' or 'no' for the corollary chatbot...">
  </div>
</div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Newton's Principia I.1 chatbot!

We are given a body in motion, a fixed center S, and time divided into equal parts AB, BC, CD, ED, EF (chords on the orbit). Do you agree? (yes/no):`,
hint: `The argument begins by assuming equal time intervals and a center toward which the force acts.` },
{ q: `In the first part of the time, the body moves by its inherent force alone and describes a straight line AB. Do you agree? (yes/no):`,
hint: `By inertia, a body moves uniformly in a straight line when no force acts.` },
{ q: `In the second equal part of the time, if nothing hindered it, the body would go straight on from B to c, describing Bc equal to AB. Do you agree? (yes/no):`,
hint: `By Law 1, equal times correspond to equal straight-line distances.` },
{ q: `If radii AS, BS, and line cS are drawn to the center S, are the triangular areas ASB and BSc equal? (yes/no):`,
hint: `The triangles have equal bases and lie between the same parallels.` },
{ q: `Our goal is to show that equal areas are described in equal times about the center S. Does that make sense? (yes/no):`,
hint: `This is the area law to be demonstrated.` },
{ q: `Now, when the body arrives at B, let a centripetal force act with a single strong impulse. Is this allowed? (yes/no):`,
hint: `Newton models the force as acting instantaneously at the end of each time interval.` },
{ q: `If BC is the body's motion in the second interval, does this impulse deflect the body from the straight line Bc and cause it to proceed along BC? (yes/no):`,
hint: `An impulse changes the direction of motion but not the position at that instant.` },
{ q: `Draw cC parallel to BS, meeting BC at point C. Can this construction be made? (yes/no):`,
hint: `A line can be drawn through a point parallel to a given line.` },
{ q: `At the end of the second time interval, is the body found at point C? (yes/no):`,
hint: `By Corollary 1 of the Laws, motions combine by composition.` },
{ q: `Join SC. Do you see that triangle SBC is formed? (yes/no):`,
hint: `S is the center, and B and C are successive positions of the body.` },
{ q: `Since SB is parallel to cC, are triangles SBC and SBc equal in area? (yes/no):`,
hint: `Triangles on the same base (BS) and between the same parallels (SB and cC) are equal.` },
{ q: `And since we showed triangle SBc equals triangle SAB, do we conclude that triangle SBC equals triangle SAB? (yes/no):`,
hint: `Things equal to the same thing are equal to one another.` },
{ q: `So, in equal times, are equal areas described about the center S? (yes/no):`,
hint: `Each equal time interval corresponds to an equal triangular area.` },
{ q: `If the same centripetal impulse acts successively at C, D, E, and so on, must the straight lines CD, DE, EF all lie in the same plane? (yes/no):`,
hint: `Each deflection occurs in the plane determined by the motion and the center.` },
{ q: `Are the successive triangles SCD, SDE, SEF equal in area to one another? (yes/no):`,
hint: `The same reasoning applies at each step.` },
{ q: `Therefore, are equal areas described in equal times in a fixed plane? (yes/no):`,
hint: `This follows from the equality of all corresponding triangles.` },
{ q: `If several such triangular areas are taken together, are their sums proportional to the times of description? (yes/no):`,
hint: `By composition, sums of equal parts correspond to sums of times.` },
{ q: `Now let the number of triangles be increased indefinitely, and their widths decreased indefinitely. Do you accept this limiting process? (yes/no):`,
hint: `The polygonal path approaches a curve in the limit.` },
{ q: `Does the ultimate perimeter of the polygon become a curved line? (yes/no):`,
hint: `By Lemma 3, Corollary 4, it becomes a curve.` },
{ q: `In this limit, does the centripetal force act continuously rather than by impulses? (yes/no):`,
hint: `The impulses become infinitely frequent and infinitely small.` },
{ q: `Are the areas described still proportional to the times in this continuous case? (yes/no):`,
hint: `The proportionality is preserved in the limit.` },


];

// Mini-chatbots for Corollaries 1–6 (you can refine the wording/content later)
const corollarySteps = {
  1: [
    { q: `Corollary 1: From the area law it follows that the centripetal force is always directed toward the fixed center S. Do you see why? (yes/no):`,
      hint: `If areas are proportional to times, the deflection at each step must be toward S.` },
    { q: `Does this mean that knowing the orbit and the center is enough to say the force is central (toward S)? (yes/no):`,
      hint: `A non‑central force would not preserve equal areas in equal times.` }
  ],
  2: [
    { q: `Corollary 2: If the force toward S vanishes, does the body continue in the tangent straight line with equal areas no longer described about S? (yes/no):`,
      hint: `Without centripetal deflection, the motion is inertial and no longer central.` },
    { q: `So, does the continuation of equal areas characterize the continual action of the force? (yes/no):`,
      hint: `The area law fails the instant the central force stops acting.` }
  ],
  3: [
    { q: `Corollary 3: If times are not equal but proportionals, are the areas described still proportional to those times? (yes/no):`,
      hint: `Composing equal‑time triangles gives areas proportional to total time.` },
    { q: `Does summing many equal‑area triangles over a longer time give a total area proportional to the whole elapsed time? (yes/no):`,
      hint: `Equal parts add to proportional totals.` }
  ],
  4: [
    { q: `Corollary 4: If the force toward S is increased or diminished in a known ratio, does the departure from the tangent change accordingly? (yes/no):`,
      hint: `By Law 2, change of motion is proportional to the motive force.` },
    { q: `So, by comparing the actual orbit to its tangents, can we compare the strengths of central forces in different cases? (yes/no):`,
      hint: `Larger departures from tangents correspond to stronger forces.` }
  ],
  5: [
    { q: `Corollary 5: If one body moves in a given orbit about S, can a second body in a different orbit about the same S obey the same area law? (yes/no):`,
      hint: `Both motions may be governed by the same central force if each describes equal areas in equal times about S.` },
    { q: `Does this show that very different orbits can still share the same central law, provided they obey the same area–time relation? (yes/no):`,
      hint: `The area law concerns the center, not the shape alone.` }
  ],
  6: [
    { q: `Corollary 6: If the force is always directed toward S, does the converse hold—that equal areas in equal times must be described? (yes/no):`,
      hint: `I.1 and I.2 together express an equivalence between central forces and the area law.` },
    { q: `Taken together, do these corollaries show a tight link between central forces and the geometry of orbits? (yes/no):`,
      hint: `Dynamics and geometry constrain one another.` }
  ]
};

const conclusion = `Congratulations! You just proved that a body moving under a force toward a fixed center describes equal areas in equal times in a fixed plane. 
Q.E.D. (Quod Erat Demonstrandum - which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

// Corollary state
const corContainer = document.getElementById('corollaries');
const corChatDiv = document.getElementById('corChat');
const corInputField = document.getElementById('corInput');
let currentCorollary = null;
let currentCorStep = 0;
const corChatState = {}; // preserve per‑corollary chat HTML for seamless navigation

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function addCorMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  corChatDiv.appendChild(div);
  corChatDiv.scrollTop = corChatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
    // Reveal corollary mini‑chatbots when the main proposition is complete
    corContainer.style.display = 'block';
  }
}

function showCorStep() {
  if (!currentCorollary) return;
  const seq = corollarySteps[currentCorollary] || [];
  if (currentCorStep < seq.length) {
    addCorMessage(seq[currentCorStep].q, 'bot');
  } else {
    addCorMessage(`End of Corollary ${currentCorollary}. You can switch to another corollary above.`, 'bot');
  }
}

function processCorAnswer(answer) {
  if (!currentCorollary) return;
  const seq = corollarySteps[currentCorollary] || [];
  addCorMessage(answer, 'user');
  const lower = answer.toLowerCase();
  if (lower === 'yes' || lower === 'y') {
    currentCorStep++;
    showCorStep();
  } else if (lower === 'no' || lower === 'n') {
    const step = seq[currentCorStep];
    if (step && step.hint) {
      addCorMessage(`Hint: ${step.hint}`, 'bot');
    } else {
      addCorMessage(`Hint: try to restate the step in your own words.`, 'bot');
    }
  } else {
    addCorMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

function startCorollary(n) {
  if (!corollarySteps[n]) return;
  // Save current chat HTML (if any) for the active corollary
  if (currentCorollary !== null) {
    corChatState[currentCorollary] = corChatDiv.innerHTML;
  }
  currentCorollary = n;
  // Restore prior chat for this corollary if it exists
  if (corChatState[n]) {
    corChatDiv.innerHTML = corChatState[n];
    // infer step index from number of bot questions already asked is tricky;
    // simplest: if we have history, continue from where we left off
    const totalSteps = corollarySteps[n].length;
    // rough heuristic: assume we advanced sequentially; keep currentCorStep if already set for this n
  } else {
    corChatDiv.innerHTML = '';
    currentCorStep = 0;
    showCorStep();
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

corInputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = corInputField.value.trim();
    if (answer && currentCorollary !== null) {
      processCorAnswer(answer);
      corInputField.value = '';
    }
  }
});

document.querySelectorAll('.cor-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const n = parseInt(this.getAttribute('data-cor'), 10);
    startCorollary(n);
  });
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
