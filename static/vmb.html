<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Von Mises-Bernstein Theorem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <h1>VIII.4 — Prove that if numbers in continued proportion are the least having a given ratio, then their extremes are prime to one another</h1>
  <p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the Von Mises-Bernstein Theorem chatbot!

We are given a sequence of independent random variables X₁, X₂, X₃, …, each with mean 0. Do you agree? (yes/no):`,
    hint: `Independence and zero mean are our starting assumptions.` },

  { q: `Their variances are finite, and we call them σ₁², σ₂², … . Agreed? (yes/no):`,
    hint: `Finite variance ensures the total variance can be used to scale the sum.` },

  { q: `Let the total variance up to n be Vₙ = σ₁² + σ₂² + ⋯ + σₙ². Does this definition make sense? (yes/no):`,
    hint: `This is simply the sum of the variances.` },

  { q: `Our goal is to determine when the normalized sum Sₙ = (X₁ + ⋯ + Xₙ)/√Vₙ converges in distribution to the standard normal law. Does that make sense? (yes/no):`,
    hint: `This is the question of when a central limit theorem holds.` },

  { q: `Now consider the following condition: for every ε>0, (1/Vₙ) Σ E[Xᵢ² ; |Xᵢ| > ε√Vₙ] → 0 as n→∞. Do you see that this condition limits the influence of large outliers? (yes/no):`,
    hint: `It measures how much variance comes from unusually large values.` },

  { q: `Is it clear that this condition requires no single Xᵢ to contribute a disproportionately large share of the total variance? (yes/no):`,
    hint: `If one variable dominates, the sum cannot behave normally.` },

  { q: `The theorem says: The sequence Sₙ converges to a normal distribution if and only if this condition holds. Does this two-way statement make sense? (yes/no):`,
    hint: `The condition is both necessary and sufficient.` },

  { q: `Does the “if” direction mean: whenever the condition holds, the normalized sums go to the normal distribution? (yes/no):`,
    hint: `Yes — the condition guarantees the CLT.` },

  { q: `Does the “only if” direction mean: if the normalized sums go to the normal distribution, then the condition must hold? (yes/no):`,
    hint: `Without the condition, convergence to the normal law cannot happen.` },

  { q: `So, do we conclude that the von Mises–Bernstein condition exactly characterizes when independent mean-zero finite-variance variables satisfy the central limit theorem? (yes/no):`,
    hint: `This is the full power of the theorem.` }
]


















const conclusion = `Congratulations! You just proved that if numbers in continued proportion are the least having a given ratio, then their extremes are prime to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
