<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Conics I.25</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>
<h1>I.25 - Prove that if a straight line meeting an ellipse between two diameters and continued both ways falls outside the section, it will meet each of the diameters</h1>

<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [{ q: `Welcome to Apollonius' Conics I.25 chatbot!

We are given an ellipse with diameters AB and CD. Do you agree? (yes/no):`, hint: `An ellipse can have multiple diameters; here two are named AB and CD.` },
{ q: `A straight line EF meets the ellipse at a point G, between the two diameters AB and CD. Is that correct? (yes/no):`, hint: `The phrase “between two diameters” specifies the position of G.` },
{ q: `The straight line EF is continued in both directions, falling outside the ellipse. Do you accept this setup? (yes/no):`, hint: `“Continued both ways” means the line is extended indefinitely.` },
{ q: `Our goal is to show that the straight line EF will meet each of the diameters AB and CD. Does that make sense? (yes/no):`, hint: `We want to prove intersection with both diameters.` },
{ q: `From the point G, let GH be dropped as an ordinate to AB. Is this construction possible? (yes/no):`, hint: `An ordinate is drawn perpendicular to a diameter.` },
{ q: `From the same point G, let GK be dropped as an ordinate to CD. Can this also be done? (yes/no):`, hint: `Ordinates may be drawn to different diameters.` },
{ q: `Is GK parallel to AB? (yes/no):`, hint: `Proposition I.15 establishes this parallelism.` },
{ q: `Now, has the straight line GF met the line GK? (yes/no):`, hint: `G lies on both GK and GF.` },
{ q: `If a straight line meets one of two parallel lines, must it also meet the other if extended? (yes/no):`, hint: `A line crossing a parallel must cross any non-parallel line in the same plane.` },
{ q: `Therefore, will GF meet AB? (yes/no):`, hint: `GK is parallel to AB, and GF already meets GK.` },
{ q: `Since GF is part of the straight line EF, will EF also meet AB? (yes/no):`, hint: `EF and GF are the same straight line.` },
{ q: `By the same reasoning, will EF also meet CD? (yes/no):`, hint: `The argument applies symmetrically to the other diameter.` },
{ q: `Therefore, does the straight line EF meet each of the diameters AB and CD? (yes/no):`, hint: `This is exactly what was to be shown.` },


]

const conclusion = `Congratulations! You just proved that if a straight line meeting an ellipse between two diameters and continued both ways falls outside the section, it will meet each of the diameters.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
