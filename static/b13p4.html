<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.4 – Prove that if a straight line is cut in extreme and mean ratio, then the square on the whole together with the square on the lesser segment is three times the square on the greater segment.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.4 chatbot!

We are given a straight line AB, cut at point C in extreme and mean ratio. Do you agree? (yes/no):`,
    hint: `Point C divides AB so that AB : AC = AC : CB.` },

  { q: `AC is the greater segment, and BC is the lesser segment. Is that clear? (yes/no):`,
    hint: `In extreme and mean ratio, the middle term (AC) is greater than the remaining segment.` },

  { q: `First, let the square ADEB be described on the whole line AB. Can we do this? (yes/no):`,
    hint: `A square can be constructed on any given straight line.` },

  { q: `Let the figure be drawn with all necessary lines. Is that acceptable? (yes/no):`,
    hint: `Euclid often assumes the auxiliary lines are drawn as needed.` },

  { q: `Our goal is to show that the squares on AB and BC together are triple of the square on AC. Does that make sense? (yes/no):`,
    hint: `“Triple” means equal to three times the square on AC.` },

  { q: `Since AB is cut in extreme and mean ratio at C, is the rectangle AB, BC equal to the square on AC? (yes/no):`,
    hint: `This follows from VI. Definition 3 and Proposition VI.17.` },

  { q: `Is the rectangle AB, BC represented in the figure by AK? (yes/no):`,
    hint: `AK is constructed as a rectangle equal to AB × BC.` },

  { q: `Is the square on AC represented by HG? (yes/no):`,
    hint: `HG is constructed as the square with side AC.` },

  { q: `Therefore, is AK equal to HG? (yes/no):`,
    hint: `Both represent areas equal to the square on AC.` },

  { q: `Now, AF is equal to FE. Do you agree? (yes/no):`,
    hint: `F is the midpoint of AE in the square construction.` },

  { q: `If CK is added to both AF and FE, do the wholes AK and CE become equal? (yes/no):`,
    hint: `Equals added to equals yield equals (Common Notion 2).` },

  { q: `If AK equals CE, are AK and CE together double of AK? (yes/no):`,
    hint: `Two equal areas together make double one of them.` },

  { q: `Are AK and CE together composed of the gnomon LMN and the square CK? (yes/no):`,
    hint: `This is how the gnomon is defined in the figure.` },

  { q: `Therefore, are the gnomon LMN and square CK together double of AK? (yes/no):`,
    hint: `They together equal AK + CE.` },

  { q: `But since AK was already shown equal to HG, does double AK equal double HG? (yes/no):`,
    hint: `Equals multiplied by the same number remain equal.` },

  { q: `If the gnomon LMN and square CK are double of HG, and HG itself is added, do we get triple HG? (yes/no):`,
    hint: `Double plus one makes triple.` },

  { q: `Are the gnomon LMN together with squares CK and HG the same as the squares on AB and BC? (yes/no):`,
    hint: `They together make up the whole square on AB and the square on BC.` },

  { q: `Is HG the square on AC? (yes/no):`,
    hint: `HG was constructed as the square on AC.` },

  { q: `Therefore, are the squares on AB and BC triple of the square on AC? (yes/no):`,
    hint: `This is exactly what has been shown step by step.` }
]

const conclusion = `Congratulations! You just proved that if a straight line is cut in extreme and mean ratio, then the square on the whole together with the square on the lesser segment is three times the square on the greater segment.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
