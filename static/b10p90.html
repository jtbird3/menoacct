<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.90</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.90 – Find the sixth apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.90 chatbot!

We are given a rational straight line A. Do you agree? (yes/no):`,
  hint: `A rational straight line is one whose square is rational.` },
{ q: `We are also given three numbers E, BC, and CD, which do not have to one another the ratio which a square number has to a square number. Is that clear? (yes/no):`,
  hint: `This means none of these ratios is the ratio of two perfect squares.` },
{ q: `Further, CB does not have to BD the ratio which a square number has to a square number. Do you agree? (yes/no):`,
  hint: `This condition will be used later for incommensurability.` },

{ q: `Let it be contrived that, as E is to BC, so is the square on A to the square on FG. Is this construction allowed? (yes/no):`,
  hint: `This follows from Proposition X.6 (Porism).` },
{ q: `And let it also be contrived that, as BC is to CD, so is the square on FG to the square on GH. Is that acceptable? (yes/no):`,
  hint: `Again, this is justified by Proposition X.6.` },

{ q: `Our goal is to show that FH is a sixth apotome. Does that make sense? (yes/no):`,
  hint: `We aim to identify FH by the defining properties of a sixth apotome.` },

{ q: `Since, as E is to BC, so is the square on A to the square on FG, is the square on A commensurable with the square on FG? (yes/no):`,
  hint: `Equal ratios imply commensurable squares (X.6).` },
{ q: `But the square on A is rational. Do you agree? (yes/no):`,
  hint: `This was given at the start.` },
{ q: `Therefore, is the square on FG also rational? (yes/no):`,
  hint: `A square commensurable with a rational square is itself rational.` },
{ q: `Does it follow that FG itself is rational? (yes/no):`,
  hint: `A straight line whose square is rational is rational.` },
{ q: `Since E does not have to BC the ratio which a square number has to a square number, does the square on A also not have to the square on FG that ratio? (yes/no):`,
  hint: `The ratios are constructed to be equal.` },
{ q: `Therefore, is A incommensurable in length with FG? (yes/no):`,
  hint: `This follows from Proposition X.9.` },

{ q: `Again, since, as BC is to CD, so is the square on FG to the square on GH, is the square on FG commensurable with the square on GH? (yes/no):`,
  hint: `Proposition X.6 applies again.` },
{ q: `But the square on FG is rational. Do you agree? (yes/no):`,
  hint: `This was already shown.` },
{ q: `Therefore, is the square on GH also rational? (yes/no):`,
  hint: `Commensurable squares share rationality.` },
{ q: `Does it follow that GH is also rational? (yes/no):`,
  hint: `A line whose square is rational is rational.` },
{ q: `Since BC does not have to CD the ratio which a square number has to a square number, does the square on FG also not have that ratio to the square on GH? (yes/no):`,
  hint: `The ratios are equal by construction.` },
{ q: `Therefore, is FG incommensurable in length with GH? (yes/no):`,
  hint: `Proposition X.9 applies again.` },
{ q: `Since FG and GH are both rational but incommensurable in length, are they commensurable in square only? (yes/no):`,
  hint: `This is the definition of such straight lines.` },
{ q: `Therefore, is FH an apotome? (yes/no):`,
  hint: `Proposition X.73 defines an apotome in this case.` },

{ q: `I say next that it is also a sixth apotome. Do you follow? (yes/no):`,
  hint: `We now check the additional defining conditions.` },
{ q: `Since, ex aequali, as E is to CD, so is the square on A to the square on GH, do you agree? (yes/no):`,
  hint: `This follows from Book V, Proposition 22.` },
{ q: `But E does not have to CD the ratio which a square number has to a square number. Do you agree? (yes/no):`,
  hint: `This was given at the start.` },
{ q: `Therefore, is A incommensurable in length with GH? (yes/no):`,
  hint: `By Proposition X.9 again.` },
{ q: `So is neither FG nor GH commensurable in length with the rational straight line A? (yes/no):`,
  hint: `We have shown this separately for FG and GH.` },

{ q: `Now let the square on K be that by which the square on FG exceeds the square on GH. Is this construction acceptable? (yes/no):`,
  hint: `This defines K by the difference of squares.` },
{ q: `Since, as BC is to CD, so is the square on FG to the square on GH, does it follow, by conversion, that as CB is to BD, so is the square on FG to the square on K? (yes/no):`,
  hint: `This follows from Book V, Proposition 19 (Porism).` },
{ q: `But CB does not have to BD the ratio which a square number has to a square number. Do you agree? (yes/no):`,
  hint: `This was one of the initial conditions.` },
{ q: `Therefore, is FG incommensurable in length with K? (yes/no):`,
  hint: `Proposition X.9 again.` },
{ q: `Is the square on FG greater than the square on GH by the square on a straight line incommensurable in length with FG? (yes/no):`,
  hint: `That straight line is K.` },
{ q: `And is neither FG nor GH commensurable in length with the rational straight line A? (yes/no):`,
  hint: `This has already been established.` },

{ q: `Therefore, does FH satisfy the definition of a sixth apotome? (yes/no):`,
  hint: `Compare directly with Definition III.6 of Book X.` },
{ q: `Therefore, has the sixth apotome FH been found? (yes/no):`,
  hint: `All defining properties have now been shown.` },
]

const conclusion = `Congratulations! You just found the sixth apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
