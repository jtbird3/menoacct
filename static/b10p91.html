<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.91</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.91 – Prove that if an area is contained by a rational straight line and a first apotome, the side of the area is an apotome.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.91 chatbot!

We are given an area AB, contained by the rational straight line AC and the first apotome AD. Do you agree? (yes/no):`,
  hint: `“Contained by” means AB is a rectangle (or parallelogram) with sides AC and AD.` },
{ q: `Our goal is to show that the side of the area AB is an apotome. Does that make sense? (yes/no):`,
  hint: `“Side of the area” means a straight line whose square is equal to the area AB.` },

{ q: `Since AD is a first apotome, can we take DG to be its annex, so that AG and GD are rational straight lines commensurable in square only? (yes/no):`,
  hint: `This is the property of a first apotome and its annex. (X.73)` },
{ q: `Is the whole AG commensurable with the rational straight line AC that is set out? (yes/no):`,
  hint: `This is part of the definition/condition used for a first apotome configuration with a rational line.` },
{ q: `Is the square on AG greater than the square on GD by the square on a straight line commensurable in length with AG? (yes/no):`,
  hint: `This matches the condition used in the definition cited in the text. (X, Def. III.1)` },

{ q: `If a parallelogram equal to the fourth part of the square on DG is applied to AG and is deficient by a square, does it divide AG into commensurable parts? (yes/no):`,
  hint: `This is exactly what the cited result guarantees. (X.17)` },
{ q: `Let DG be bisected at E. Is EG then equal to ED? (yes/no):`,
  hint: `Bisection means the two parts are equal.` },
{ q: `Now apply to AG a parallelogram equal to the square on EG and deficient by a square figure, forming the rectangle AF, FG. Is that the construction being made? (yes/no):`,
  hint: `The rectangle is laid along AG, leaving a square deficiency.` },
{ q: `From this construction, do we have that AF is commensurable with FG? (yes/no):`,
  hint: `That is the point of using X.17 here: it produces commensurable parts.` },

{ q: `Through the points E, F, and G, can we draw EH, FI, and GK parallel to AC? (yes/no):`,
  hint: `Through a given point we can draw a line parallel to a given straight line (in Euclid’s developed theory of parallels).` },
{ q: `Since AF is commensurable in length with FG, is AG commensurable in length with each of AF and FG? (yes/no):`,
  hint: `If two segments partition a whole into commensurable parts, the whole is commensurable with each part. (X.15)` },
{ q: `Since AG is commensurable with AC, does it follow that each of AF and FG is commensurable in length with AC? (yes/no):`,
  hint: `Things commensurable with the same straight line are commensurable with one another. (X.12)` },
{ q: `Because AC is rational, are AF and FG also rational? (yes/no):`,
  hint: `A straight line commensurable in length with a rational line is rational.` },

{ q: `Therefore, are the rectangles AI and FK rational as well? (yes/no):`,
  hint: `Rectangles contained by rational straight lines are rational. (X.19)` },

{ q: `Since DE is commensurable in length with EG, is DG commensurable in length with each of DE and EG? (yes/no):`,
  hint: `If a whole is split into equal parts, it is commensurable with each part. (X.15)` },
{ q: `DG is rational but incommensurable in length with AC. Does it follow that each of DE and EG is rational and also incommensurable in length with AC? (yes/no):`,
  hint: `If DG is incommensurable with AC, then any line commensurable with DG is also incommensurable with AC. (X.13)` },
{ q: `Therefore, are the rectangles DH and EK medial? (yes/no):`,
  hint: `A rectangle contained by rational lines incommensurable in length with the given rational line is medial. (X.21)` },

{ q: `Now let the square LM be made equal to the rectangle AI, and let the square NO be made equal to the rectangle FK, sharing a common angle LPM. Can we set this up? (yes/no):`,
  hint: `This is a standard “convert a rectangle to an equal square” move in Euclid’s theory of areas.` },
{ q: `Do the squares LM and NO lie about the same diameter? (yes/no):`,
  hint: `This follows from the cited result about squares constructed with a common angle and related areas. (VI.26)` },
{ q: `Let PR be their diameter, and let the figure be drawn. Is this the next construction step? (yes/no):`,
  hint: `The diameter here is the diameter of the circle used in the VI.26 configuration.` },

{ q: `Since the rectangle contained by AF and FG is equal to the square on EG, do we have the proportion AF : EG = EG : FG? (yes/no):`,
  hint: `If AF·FG = EG², then EG is mean proportional between AF and FG. (VI.17)` },
{ q: `Using parallels, do we also have AF : EG = AI : EK and EG : FG = EK : KF? (yes/no):`,
  hint: `This is an application of proportionality in similar figures/parallel constructions. (VI.1)` },
{ q: `Therefore, is EK a mean proportional between AI and KF? (yes/no):`,
  hint: `If AI/EK = EK/KF, then EK is mean proportional. (V.11)` },

{ q: `Is MN also a mean proportional between LM and NO? (yes/no):`,
  hint: `This is the lemma cited after X.53.` },
{ q: `Since AI = LM and KF = NO, does it follow that MN = EK? (yes/no):`,
  hint: `Mean proportional depends only on the pair of extremes.` },
{ q: `But EK is equal to DH, and MN is equal to LO. Does that let us replace EK by DH and MN by LO in the equalities? (yes/no):`,
  hint: `Substituting equals for equals is allowed.` },

{ q: `From these equalities, does the text conclude that DK is equal to the gnomon UVW and NO? (yes/no):`,
  hint: `This is the area-chasing step in the constructed figure (using gnomons and equal complements).` },
{ q: `Also, is AK equal to the squares LM and NO together? (yes/no):`,
  hint: `This is another area relation coming from the same diagram.` },
{ q: `Therefore, is the remainder AB equal to ST? (yes/no):`,
  hint: `“Remainder” means subtract equal areas from equal areas.` },
{ q: `And is ST the square on LN? (yes/no):`,
  hint: `ST is constructed as a square on LN in the figure.` },
{ q: `So is the square on LN equal to AB? (yes/no):`,
  hint: `This is the key conclusion: LN² = area AB.` },
{ q: `Therefore, is LN a side of the area AB? (yes/no):`,
  hint: `By definition, a side of an area is a line whose square equals the area.` },

{ q: `Now we must show LN is an apotome. Is that our next goal? (yes/no):`,
  hint: `We already have LN² = AB; now we classify LN.` },
{ q: `Since the rectangles AI and FK are rational and equal respectively to LM and NO, are the squares LM and NO rational? (yes/no):`,
  hint: `If a square equals a rational area, that square is rational.` },
{ q: `Therefore, are the straight lines LP and PN rational? (yes/no):`,
  hint: `If the square on a line is rational, the line is rational.` },
{ q: `Since DH is medial and equal to LO, is LO also medial? (yes/no):`,
  hint: `Equal areas have the same classification.` },
{ q: `Since LO is medial while NO is rational, is LO incommensurable with NO? (yes/no):`,
  hint: `Rational and medial areas are incommensurable.` },
{ q: `But as LO : NO = LP : PN, does it follow that LP is incommensurable in length with PN? (yes/no):`,
  hint: `Incommensurability transfers from areas to corresponding sides in this proportional setup. (VI.1, X.11)` },
{ q: `And since LP and PN are both rational, and commensurable in square only, does it follow that LN is an apotome? (yes/no):`,
  hint: `This is exactly the criterion: difference of two rational lines commensurable in square only gives an apotome. (X.73)` },
{ q: `Finally, since LN is an apotome and LN is the side of AB, can we conclude that the side of the area AB is an apotome? (yes/no):`,
  hint: `That is the statement of Proposition X.91.` },
]

const conclusion = `Congratulations! You just proved that if an area is contained by a rational straight line and a first apotome, the side of the area is an apotome.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
