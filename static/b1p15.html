<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.15 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.15 - If two straight lines cut one another, they make the vertical angles equal to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.15 chatbot!

We are given two straight lines AB and CD that cut one another at point E. Do you agree? (yes/no):`,
    hint: `The lines cross at E, forming four angles around the point.` },
  { q: `Our goal is to prove the ∠AEC = ∠DEB and ∠CEB = ∠AED. Does that make sense? (yes/no):`,
    hint: `These are called vertically opposite angles.` },
  { q: `Since AE stands on line CD, do the angles ∠CEA and ∠AED add up to two right angles? (yes/no):`,
    hint: `Proposition I.13: a straight line standing on another makes adjacent angles equal to two right angles.` },
  { q: `Likewise, since DE stands on line AB, do the angles ∠AED and ∠DEB add up to two right angles? (yes/no):`,
    hint: `Again by I.13, a straight line on another makes two right angles.` },
  { q: `If ∠CEA + ∠AED = two right angles, and ∠AED + ∠DEB = two right angles, are these two sums equal? (yes/no):`,
    hint: `Both equal the same thing (two right angles).` },
  { q: `From this, if we subtract ∠AED from both sums, do we get ∠CEA = ∠DEB? (yes/no):`,
    hint: `Common Notion 3: if equals are subtracted from equals, the remainders are equal.` },
  { q: `By the same reasoning, can we also conclude that ∠CEB = ∠AED? (yes/no):`,
    hint: `Repeat the same steps with the other pair of vertical angles.` },
  { q: `Therefore, are vertically opposite angles equal whenever two straight lines cut one another? (yes/no):`,
    hint: `Yes, this is exactly what we set out to prove.` }
];

const conclusion = `Congratulations! We have shown that when two straight lines cut one another, the vertically opposite angles are equal. 
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)

Corollary: From this it also follows that if two straight lines cut each other the angles at the point of intersection are equal to four right angles.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
