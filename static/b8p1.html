<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VIII.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VIII.1 — Prove that if numbers are in continued proportion and the extremes are prime to one another, then the numbers are the least having that ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VIII.1 chatbot!
    
We are given numbers A, B, C, D in continued proportion. Do you agree? (yes/no):`,
    hint: `“Continued proportion” means A is to B as B is to C as C is to D.` },

  { q: `We are told that the extremes A and D are prime to one another. Do you accept this? (yes/no):`,
    hint: `Being “prime to one another” means A and D share no common divisor greater than a unit.` },

  { q: `Our goal is to show that A, B, C, D are the least numbers having their same ratio. Does that make sense? (yes/no):`,
    hint: `We must show no smaller proportional set of given numbers exists.` },

  { q: `Suppose, for contradiction, that there exist smaller numbers E, F, G, H in the same ratio as A, B, C, D. Acceptable? (yes/no):`,
    hint: `Euclid assumes the contrary to derive an impossibility.` },

  { q: `Since A, B, C, D have the same ratio as E, F, G, H, and both sets have the same number of terms, do we have A is to D as E is to H by ex aequali? (yes/no):`,
    hint: `VII.14: From equal-number proportion chains, we get equality of the extremes' ratios.` },

  { q: `Since A and D are prime, and primes are the least numbers in a ratio, do they measure in the same ratio the corresponding numbers E and H? (yes/no):`,
    hint: `VII.21: Numbers prime to one another are least; VII.20: the least numbers in a ratio measure proportional numbers.` },

  { q: `Does it follow that A measures E, even though E was assumed less than A? (yes/no):`,
    hint: `If A:D = E:H and A,D are least, A divides E.` },

  { q: `Is it impossible for a greater number to measure a smaller number? (yes/no):`,
    hint: `A cannot divide a smaller positive number exactly.` },

  { q: `Then must the assumption that smaller numbers E, F, G, H maintain the same ratio be false? (yes/no):`,
    hint: `The derived impossibility invalidates the assumption.` },

  { q: `Therefore, are A, B, C, D the least numbers having their ratio? (yes/no):`,
    hint: `No smaller proportional set exists; the given numbers are minimal.` }
]

















const conclusion = `Congratulations! You just proved that if numbers are in continued proportion and the extremes are prime to one another, then the numbers are the least having that ratio
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
