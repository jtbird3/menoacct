<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.33</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.33 — Prove that if a number has an odd half, it is even-times odd only</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.33 chatbot!

We are given a number A whose half is odd. Do you agree? (yes/no):`,
    hint: `“Its half” means A divided by 2, and this result is an odd number.` },

  { q: `Our goal is to show that A is even-times odd only. Does that make sense? (yes/no):`,
    hint: `“Even-times odd” means an even number multiplied by an odd number (VII. Def. 9).` },

  { q: `First, since the half of A is odd, does that half measure A an even number of times? (yes/no):`,
    hint: `Any number is measured twice by its half.` },

  { q: `Does this show immediately that A is even-times odd? (yes/no):`,
    hint: `The half (odd) measures A by 2, which is even.` },

  { q: `Next, let us claim that A is even-times odd only, and not even-times even. Do you follow this claim? (yes/no):`,
    hint: `We must rule out the possibility that A is also even-times even.` },

  { q: `Suppose, for the sake of argument, that A were even-times even. Is this assumption allowed? (yes/no):`,
    hint: `Proof by contradiction begins by assuming the opposite.` },

  { q: `If A were even-times even, would it be measured by an even number according to an even number? (yes/no):`,
    hint: `This is exactly the definition of even-times even (VII. Def. 8).` },

  { q: `Would this imply that the half of A is also measured by an even number? (yes/no):`,
    hint: `Dividing an even-times-even number by 2 preserves even measure.` },

  { q: `But is the half of A given to be odd? (yes/no):`,
    hint: `This is stated in the original assumption.` },

  { q: `Is it absurd for an odd number to be measured by an even number? (yes/no):`,
    hint: `An odd number cannot be evenly divisible by 2.` },

  { q: `Therefore, does the assumption that A is even-times even lead to a contradiction? (yes/no):`,
    hint: `The half cannot be both odd and evenly measured by an even number.` },

  { q: `So must A fail to be even-times even? (yes/no):`,
    hint: `Contradiction eliminates this possibility.` },

  { q: `Since A is even-times odd and not even-times even, is it even-times odd only? (yes/no):`,
    hint: `This exhausts the possible cases.` }
]






const conclusion = `Congratulations! You just proved that if a number has an odd half, it is even-times odd only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
