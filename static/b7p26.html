<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.26</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.26 — Prove that if two numbers are prime to two numbers, each to each, their products are prime to one another</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.26 chatbot!

We are given two numbers A and B, and two other numbers C and D, such that A and B are both prime to C and D. Do you agree? (yes/no):`,
    hint: `Think of A and B as one pair, and C and D as another pair.` },


  { q: `Let A multiplied by B make E. Likewise let C multiplied by D make F. Is that clear? (yes/no):`,
    hint: `E = A·B and F = C·D.` },

  { q: `Our goal is to show that E and F are prime to one another. Does that make sense? (yes/no):`,
    hint: `We want to prove E and F share no common divisor greater than 1.` },

  { q: `Since A and B are each prime to C, is it true that the product of A and B is also prime to C? (yes/no):`,
    hint: `Proposition VII.24 says: if a number is prime to each of two numbers, it is also prime to their product.` },

  { q: `Since the product of A and B is E, do we conclude E is prime to C? (yes/no):`,
    hint: `Replace A·B with its name E.` },

  { q: `By the same reasoning, is E also prime to D? (yes/no):`,
    hint: `Because A and B are each prime to D also.` },

  { q: `If E is prime to C, and E is prime to D, do we have that each of C and D is prime to E? (yes/no):`,
    hint: `Saying “E is prime to C” is symmetric: C is prime to E.` },

  { q: `If C and D are each prime to E, does Proposition VII.24 tell us that their product of C andD is also prime to E? (yes/no):`,
    hint: `VII.24 applies again: if a number is prime to two numbers individually, it is prime to their product.` },

  { q: `Since the product of C and D is F, do we conclude F is prime to E? (yes/no):`,
    hint: `Replace C·D with F.` },

  { q: `If F is prime to E, does it follow that E and F are prime to one another? (yes/no):`,
    hint: `“Prime to” is mutual and symmetric.` }

]

















const conclusion = `Congratulations! You just proved that if two numbers are prime to two numbers, each to each, their products are prime to one another.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
