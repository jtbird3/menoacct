<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements VII.19</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>VII.19 — Prove that if four numbers are proportional, the product of the first and fourth equals the product of the second and third; and if these products are equal, the four numbers are proportional</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements VII.19 chatbot!
  
We are given four numbers A, B, C, D, and they are in proportion, meaning “as A is to B, so is C to D.” Do you agree? (yes/no):`,
hint: `This is the initial proportionality: A : B :: C : D.` },
{ q: `Let A multiplied by D produce the number E, and let B multiplied by C produce the number F. Do you accept this construction? (yes/no):`,
hint: `The text says A × D = E and B × C = F.` },
{ q: `Let A multiplied by C produce the number G. Is that allowed? (yes/no):`,
hint: `A × C = G is an additional construction used in the proof.` },
{ q: `Our goal is to show first that, if the four numbers are proportional, then E = F; and conversely, if E = F, then the four numbers are proportional. Does that make sense? (yes/no):`,
hint: `This proposition has two directions: proportional ⇒ equal products, and equal products ⇒ proportional.` },

// Forward direction
{ q: `Since A × C = G and A × D = E, has A multiplied the two numbers C and D to produce the two numbers G and E? (yes/no):`,
hint: `Both G and E are products made by A with C and D respectively.` },
{ q: `If A multiplied C to make G and D to make E, does VII.17 give us that “as C is to D, so is G to E”? (yes/no):`,
hint: `VII.17 states: if the same number multiplies two numbers, the ratios of the original numbers equal the ratios of the products.` },
{ q: `But we also have “as C is to D, so is A to B”; therefore, is it true that “as A is to B, so is G to E”? (yes/no):`,
hint: `If C:D = A:B, and C:D = G:E, then A:B = G:E.` },
{ q: `Now, since A × C = G and B × C = F, have the two numbers A and B multiplied the same number C to produce G and F? (yes/no):`,
hint: `A and B both multiply C.` },
{ q: `By VII.18, if A and B multiply C to give G and F, do we have “as A is to B, so is G to F”? (yes/no):`,
hint: `VII.18: if two numbers multiply a number, the ratios of the original numbers equal the ratios of the products.` },
{ q: `But earlier we also had “as A is to B, so is G to E.” So do we conclude that “as G is to E, so is G to F”? (yes/no):`,
hint: `If A:B = G:E and A:B = G:F, then G:E = G:F.` },
{ q: `If G has the same ratio to E and to F, must E = F? (yes/no):`,
hint: `If G:E = G:F, then E and F are equal (cf. V.9).` },
{ q: `Thus, from A:B = C:D, do we conclude E = F? (yes/no):`,
hint: `This completes the forward direction.` },

// Reverse direction
{ q: `Now assume E = F. With the same constructions as before, does E = F imply that “as G is to E, so is G to F”? (yes/no):`,
hint: `If E = F, the ratios G:E and G:F are equal (cf. V.7).` },
{ q: `But VII.17 gives “as G is to E, so is C to D,” and VII.18 gives “as G is to F, so is A to B.” Do you accept these two ratio equalities? (yes/no):`,
hint: `These follow from the same products as before: A×C = G, A×D = E; A×C = G, B×C = F.` },
{ q: `Since “as G is to E = as C is to D” and “as G is to F = as A is to B,” and G:E = G:F, must “as A is to B, so is C to D”? (yes/no):`,
hint: `If two ratios each equal the same ratio G:E = G:F, they are equal to each other.` },
{ q: `Therefore, do we conclude that A, B, C, D are proportional? (yes/no):`,
hint: `This completes the reverse direction.` },



















];

const conclusion = `Congratulations! You just proved that if four numbers are proportional, the product of the first and fourth equals the product of the second and third; and if these products are equal, the four numbers are proportional.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
