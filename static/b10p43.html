<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.43</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.43 – Prove that a first bimedial straight line is divided at one point only.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.43 chatbot!

We are given a straight line AB which is a first bimedial straight line. Do you agree? (yes/no):`,
    hint: `A first bimedial straight line is composed of two medial straight lines, commensurable in square only, and containing a rational rectangle.` },
    
    { q: `The straight line AB is divided at a point C, so that AC and CB are medial straight lines, commensurable in square only, and containing a rational rectangle. Is that agreed? (yes/no):`,
    hint: `This is the given division that defines AB as first bimedial.` },
    
    { q: `Our goal is to show that AB cannot be divided in this same way at another point. Does that make sense? (yes/no):`,
    hint: `We want to prove the division point is unique.` },
    
    { q: `Suppose, for the sake of argument, that AB is also divided at another point D. Are we allowed to assume this temporarily? (yes/no):`,
    hint: `This is a proof by contradiction.` },
    
    { q: `At point D, are AD and DB also medial straight lines, commensurable in square only, and containing a rational rectangle? (yes/no):`,
    hint: `This is exactly what it would mean for AB to be divided again in the same way.` },
    
    { q: `Consider twice the rectangle contained by AD and DB, and twice the rectangle contained by AC and CB. Do you see that both of these areas are rational? (yes/no):`,
    hint: `Each pair contains a rational rectangle by definition.` },
    
    { q: `Does the difference between twice the rectangle AD, DB and twice the rectangle AC, CB equal the difference between the squares on AC, CB and the squares on AD, DB? (yes/no):`,
    hint: `This follows from earlier results relating rectangles and squares in Book X.` },
    
    { q: `Since the difference of the two rectangles is rational, does it follow that the difference of the corresponding squares is also rational? (yes/no):`,
    hint: `Equal differences imply equal kinds of magnitude.` },
    
    { q: `But are the squares on AC, CB and the squares on AD, DB medial squares? (yes/no):`,
    hint: `They are squares on medial straight lines.` },
    
    { q: `Is it impossible for the difference of two medial squares to be rational? (yes/no):`,
    hint: `This contradicts Proposition X.26.` },
    
    { q: `Therefore, does our assumption that AB can be divided again at point D lead to an absurdity? (yes/no):`,
    hint: `A rational difference of medial squares is impossible.` },
    
    { q: `Must we then reject the assumption that AB is divided at another point? (yes/no):`,
    hint: `Contradictions force us to deny the assumption.` },
    
    { q: `Therefore, is a first bimedial straight line divided into its terms at one point only? (yes/no):`,
    hint: `This is the conclusion of the proposition.` }
]

const conclusion = `Congratulations! You just proved that a first bimedial straight line is divided at one point only.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
