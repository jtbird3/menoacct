<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.2 - Prove that if, by repeatedly subtracting the lesser magnitude from the greater, no remainder ever measures the one before it, then the magnitudes are incommensurable.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.2 chatbot!

We are given two unequal magnitudes, AB and CD, with AB the less. Do you agree? (yes/no):`,
hint: `The proposition begins by assuming two unequal magnitudes, naming AB as the smaller.` },
{ q: `The less magnitude AB is continually subtracted in turn from the greater CD. Is that clear? (yes/no):`,
hint: `This is the standard Euclidean process of repeated subtraction.` },
{ q: `We are told that at no stage does the remainder measure the magnitude before it. Do you follow? (yes/no):`,
hint: `“Never measures the one before it” is the key assumption.` },
{ q: `Our goal is to prove that AB and CD are incommensurable. Does that make sense? (yes/no):`,
hint: `Incommensurable means no common measure exists.` },
{ q: `Assume, for the sake of argument, that AB and CD are commensurable. Can we assume this? (yes/no):`,
hint: `Euclid proceeds by proof through contradiction.` },
{ q: `If they are commensurable, must there exist some magnitude E that measures them both? (yes/no):`,
hint: `By definition, commensurable magnitudes have a common measure.` },
{ q: `Let E be a magnitude that measures both AB and CD. Do you accept this setup? (yes/no):`,
hint: `This is the assumed common measure.` },
{ q: `Let AB, measuring FD of CD, leave CF less than itself. Is this consistent with repeated subtraction? (yes/no):`,
hint: `Each subtraction leaves a remainder smaller than the subtracted magnitude.` },
{ q: `Let CF, measuring BG of AB, leave AG less than itself. Do you follow this step? (yes/no):`,
hint: `The same process is applied again to the new remainder.` },
{ q: `Is this process of subtraction repeated continually? (yes/no):`,
hint: `Euclid assumes the repetition continues step by step.` },
{ q: `Eventually, is there left a magnitude AG that is less than E? (yes/no):`,
hint: `The proposition assumes this outcome for the contradiction.` },
{ q: `Now, since E measures AB and AB measures FD, does E also measure FD? (yes/no):`,
hint: `A magnitude that measures a measure also measures what that measure measures.` },
{ q: `Since E measures the whole CD, does it also measure the remainder CF? (yes/no):`,
hint: `If a magnitude measures a whole and a part, it measures the remainder.` },
{ q: `Since CF measures BG, does E also measure BG? (yes/no):`,
hint: `The same transitive reasoning applies again.` },
{ q: `Since E measures the whole AB, does it also measure the remainder AG? (yes/no):`,
hint: `Measuring the whole and a part implies measuring the remainder.` },
{ q: `But AG was assumed to be less than E. Is it impossible for a greater magnitude to measure a lesser one? (yes/no):`,
hint: `A greater magnitude cannot measure a smaller one exactly.` },
{ q: `Does this contradiction show that no magnitude E can measure both AB and CD? (yes/no):`,
hint: `The assumption of a common measure led to impossibility.` },
{ q: `Therefore, are the magnitudes AB and CD incommensurable? (yes/no):`,
hint: `This follows directly from the absence of any common measure.` },
{ q: `Thus, if by repeatedly subtracting the lesser magnitude from the greater, no remainder ever measures the one before it, then the magnitudes are incommensurable. Is this correct? (yes/no):`,
hint: `This is the necessary conclusion of the proof.` }
]






const conclusion = `Congratulations! You just proved that if, by repeatedly subtracting the lesser magnitude from the greater, no remainder ever measures the one before it, then the magnitudes are incommensurable.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
