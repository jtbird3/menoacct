<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.115</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.115 – Prove that infinitely many distinct irrational straight lines arise from a medial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.115 chatbot!

We are given a medial straight line, call it A. Do you agree? (yes/no):`,
  hint: `A medial line is defined as the mean between two rational lines.` },

{ q: `Our goal is to show that from A, infinitely many irrational straight lines arise, none identical to any preceding one. Does that make sense? (yes/no):`,
  hint: `We will generate an endless sequence by repeatedly taking a line whose square equals a rectangle formed from a fixed rational line and the previous line.` },

{ q: `Let a rational straight line B be set out. Can we do that? (yes/no):`,
  hint: `Rational lines are those whose lengths are commensurable with a given unit.` },

{ q: `Let the square on C be equal to the rectangle contained by B and A. Is this possible? (yes/no):`,
  hint: `A rectangle equal to a given square can be constructed, so a line C with C² = B·A can be produced.` },

{ q: `Therefore C is irrational. Do you see why? (yes/no):`,
  hint: `A rectangle contained by a rational straight line and a medial straight line is medial, so its equal square has an irrational side.` },

{ q: `Is C the same as any preceding irrational line? (yes/no):`,
  hint: `C is newly defined by the equation C² = B·A, so it cannot coincide with an earlier line not satisfying that same defining relation.` },

{ q: `Let the square on D be equal to the rectangle contained by B and C. Can we do that? (yes/no):`,
  hint: `We can repeat the same construction: choose D so that D² = B·C.` },

{ q: `Therefore D is irrational. Do you agree? (yes/no):`,
  hint: `Since B is rational and C is irrational, the rectangle B·C is irrational/medial, so its equal square has an irrational side.` },

{ q: `Is D the same as any preceding line? (yes/no):`,
  hint: `D is characterized by D² = B·C; if it equaled a prior line, that prior line would have to satisfy this new defining relation, which it does not.` },

{ q: `Can this procedure continue indefinitely, producing new irrational lines each time? (yes/no):`,
  hint: `Yes: from each new line X we may define a next line Y by Y² = B·X, repeating without end.` },

{ q: `Therefore, from a medial line A, infinitely many distinct irrational lines arise. Do you agree? (yes/no):`,
  hint: `This is the conclusion: the iterative construction yields an infinite sequence of distinct irrational straight lines from A. Q.E.D.` },
]

const conclusion = `Congratulations! You just proved prove that infinitely many distinct irrational straight lines arise from a medial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
