<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IV.8 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IV.8 - Inscribe a circle in a given square</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements IV.8 chatbot!

We are given a square ABCD. Do you agree? (yes/no):`,
    hint: `A square has all sides equal and all angles right.` },
  { q: `Our goal is to inscribe a circle within this square ABCD. Does that make sense? (yes/no):`,
    hint: `To “inscribe” a circle means to draw one that touches all four sides of the square internally.` },
  { q: `Let us bisect AD at E and AB at F. Can we do this? (yes/no):`,
    hint: `Proposition I.10 allows any finite straight line to be bisected.` },
  { q: `Through E, draw a line EH parallel to either AB or CD; and through F, draw a line FK parallel to either AD or BC and let the lines meet at G. Is that possible? (yes/no):`,
    hint: `Proposition I.31 allows a straight line to be drawn through a given point parallel to a given line.` },
  { q: `By these parallels, each of the figures AK, KB, AH, HD, AG, GC, BG, GD becomes a parallelogram. Do you see that? (yes/no):`,
    hint: `When opposite sides are parallel, the figure formed is a parallelogram.` },
  { q: `Therefore, are opposite sides of each parallelogram equal? (yes/no):`,
    hint: `Proposition I.34 states that in parallelograms opposite sides and angles are equal.` },
  { q: `Since AD = AB, and AE = ½AD, and AF = ½AB, do we have AE = AF? (yes/no):`,
    hint: `Equal halves of equal quantities are equal.` },
  { q: `If AE = AF, are the opposite sides also equal, making FG = GE? (yes/no):`,
    hint: `In the corresponding parallelogram, opposite sides are equal.` },
  { q: `Can we similarly prove GH = GK and each equal to FG and GE? (yes/no):`,
    hint: `The same reasoning applies to each parallelogram formed around the square’s center.` },
  { q: `Are the four straight lines GE, GF, GH, GK all equal to one another? (yes/no):`,
    hint: `Each extends equally from the square's center G to the midpoints of its sides.` },
  { q: `Let us draw a circle with center G and radius one of these equal segments, will it pass through all four points E, F, H, K? (yes/no):`,
    hint: `Yes — since all radii from G to E, F, H, K are equal, the circle passes through them all.` },
  { q: `Will this circle touch the sides AB, BC, CD, and DA? (yes/no):`,
    hint: `The circle touches each side where the radius meets it at a right angle (at points E, F, H, K).` },
  { q: `For the sake of argument, if the circle were to cut any side, would a perpendicular from the diameter's end fall inside the circle? (yes/no):`,
    hint: `Yes — and Proposition III.16 shows that is impossible.` },
  { q: `Since this is absurd, therefore, does the circle touch the sides without cutting them? (yes/no):`,
    hint: `Since cutting them is impossible, it must only touch — that is, be tangent.` },
  { q: `So the circle described with center G and radius one of the lines GE, GF, GH, GK touches all four sides of square ABCD. Do you agree? (yes/no):`,
    hint: `This means the circle is inscribed in the square.` }
];

const conclusion = `Congratulations! You just inscribed a circle in a given square.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
