<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.10 – Find two straight lines incommensurable with a given straight line: one in length only, and the other in square also.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements X.10 chatbot!

We are given a straight line A, which is the assigned straight line. Do you agree? (yes/no):`,
hint: `A is the line with respect to which we compare other lines.` },
{ q: `Our goal is to find two straight lines, one incommensurable with A in length only, and the other incommensurable with A in square also. Does that make sense? (yes/no):`,
hint: `One line will differ from A only in length, the other both in square and length.` },
{ q: `Let two numbers B and C be set out which do not have to one another the ratio which a square number has to a square number. Do you agree this is possible? (yes/no):`,
hint: `Such numbers are called not similar plane numbers.` },
{ q: `Let it be contrived that, as B is to C, so is the square on A to the square on D. Can this be done? (yes/no):`,
hint: `This follows from Proposition X.6 (Porism).` },
{ q: `If the square on A is to the square on D as B is to C, is the square on A commensurable with the square on D? (yes/no):`,
hint: `Proposition X.6 shows this commensurability.` },
{ q: `Since B does not have to C the ratio which a square number has to a square number, does the square on A also fail to have to the square on D such a ratio? (yes/no):`,
hint: `Equal ratios preserve this property.` },
{ q: `If the squares on A and D do not have the ratio of square numbers, is A incommensurable in length with D? (yes/no):`,
hint: `This follows from Proposition X.9.` },
{ q: `Now let E be taken as a mean proportional between A and D. Is this construction acceptable? (yes/no):`,
hint: `A mean proportional exists by Book V, Definition 9.` },
{ q: `If E is a mean proportional, do we have: as A is to D, so is the square on A to the square on E? (yes/no):`,
hint: `This is the defining property of a mean proportional.` },
{ q: `Since A is incommensurable in length with D, is the square on A incommensurable with the square on E? (yes/no):`,
hint: `This follows from Proposition X.11.` },
{ q: `If the square on A is incommensurable with the square on E, is A incommensurable in square with E? (yes/no):`,
hint: `Incommensurability of squares defines incommensurability in square.` },
{ q: `Therefore, have we found two straight lines D and E such that D is incommensurable with A in length only, and E is incommensurable with A in square and also in length? (yes/no):`,
hint: `This matches exactly what was required.` }

]






const conclusion = `Congratulations! You just found two straight lines incommensurable with a given straight line: one in length only, and the other in square also.
Q.E.F. (Quod Erat Faciendum — which was to be done)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
