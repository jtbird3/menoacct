<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.110</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.110 – Prove that if a medial area incommensurable with the whole is subtracted from a medial area, there arise two irrational straight lines, either a second apotome of a medial straight line or a straight line which produces with a medial area a medial whole.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.110 chatbot!

We are given a medial area BC, and from it a medial area BD is subtracted, which is incommensurable with the whole. Do you agree? (yes/no)`,
  hint: `A medial area is one whose side is a rational straight line incommensurable with a rational straight line.` },

{ q: `Our goal is to show that the side of EC, after subtraction, is either a second apotome of a medial straight line or a straight line which produces with a medial area a medial whole. Does that make sense? (yes/no)`,
  hint: `We want to classify the resulting irrational line based on Euclid’s definitions of apotomes.` },

{ q: `Since each rectangle BC and BD is medial, and BC is incommensurable with BD, can we say that the straight lines FH and FK are rational and incommensurable in length with FG? (yes/no)`,
  hint: `By Proposition X.22, medial areas applied to a rational straight line yield rational straight lines incommensurable in length with it.` },

{ q: `Given that BC is incommensurable with BD, that is, GH with GK, can we conclude that HF is also incommensurable with FK? (yes/no)`,
  hint: `Incommensurable areas imply incommensurable corresponding straight lines (VI.1, X.11).` },

{ q: `Since FH and FK are rational straight lines commensurable in square only, is KH an apotome? (yes/no)`,
  hint: `By Proposition X.73, rational straight lines commensurable in square only form an apotome.` },

{ q: `If the square on FH is greater than the square on FK by the square on a straight line commensurable with FH, while neither FH nor FK is commensurable in length with FG, is KH a third apotome? (yes/no)`,
  hint: `This matches the definition of a third apotome (Book X, Definition III.3).` },

{ q: `If KL is rational, and the rectangle contained by a rational straight line and a third apotome is irrational, is the side of the rectangle irrational, and is it called a second apotome of a medial straight line? (yes/no)`,
  hint: `By Proposition X.93, such a construction yields a second apotome of a medial straight line.` },

{ q: `Therefore, can we conclude that the side of LH, that is, of EC, is a second apotome of a medial straight line? (yes/no)`,
  hint: `This follows logically from the preceding construction and classification.` },

{ q: `Alternatively, if the square on FH is greater than the square on FK by the square on a straight line incommensurable with FH, while neither HF nor FK is commensurable in length with FG, is KH a sixth apotome? (yes/no)`,
  hint: `This is exactly the definition of a sixth apotome (Book X, Definition III.6).` },

{ q: `Is the side of the rectangle contained by a rational straight line and a sixth apotome a straight line which produces with a medial area a medial whole? (yes/no)`,
  hint: `According to Proposition X.96, such a construction produces a medial whole.` },

{ q: `Therefore, can we conclude that the side of LH, that is, of EC, is a straight line which produces with a medial area a medial whole? (yes/no)`,
  hint: `This completes the classification of the resulting irrational line.` },
]

const conclusion = `Congratulations! You just proved that if a medial area incommensurable with the whole is subtracted from a medial area, there arise two irrational straight lines, either a second apotome of a medial straight line or a straight line which produces with a medial area a medial whole.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
