<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>II.12 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>II.12 - Prove that in an obtuse triangle, the square on the side opposite the obtuse angle is greater than the squares on the sides about it by twice the rectangle of the base and the external segment</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements II.12 chatbot!

We are given a triangle ABC with obtuse angle at A. Do you agree? (yes/no):`,
    hint: `An obtuse angle is greater than a right angle; here ∠BAC is obtuse.` },
  { q: `Let us produce AC beyond A, and from point B drop a perpendicular BD to this extension. Can we do that? (yes/no):`,
    hint: `Postulate 12 allows a perpendicular to be drawn from a point to a line.` },
  { q: `Our goal is to prove that in this obtuse triangle, the square on BC is greater than the squares on BA and AC by twice the rectangle CA x AD. Does that make sense? (yes/no):`,
    hint: `We want to prove: BC² = BA² + AC² + 2(CA x AD).` },
  { q: `So BD is perpendicular to CA produced at point D. Do you see this? (yes/no):`,
    hint: `By construction, BD ⟂ CA.` },
  { q: `Now, recall Proposition II.4: if a line CD is cut at A, the square on CD equals the sum of the squares on CA, AD and twice rectangle CA x AD. Do you accept this? (yes/no):`,
    hint: `This is a known result: (CA + AD)² = CA² + AD² + 2·CA·AD.` },
  { q: `Thus, the square on CD equals CA² + AD² + 2·CA·AD. Right? (yes/no):`,
    hint: `Direct application of II.4.` },
  { q: `Next, add the square on DB to both sides. Is that valid? (yes/no):`,
    hint: `Equals added to equals remain equal (Common Notion 2).` },
  { q: `So now, CD² + DB² = CA² + AD² + DB² + 2·CA·AD. Agreed? (yes/no):`,
    hint: `This is just rearranging the addition.` },
  { q: `But since ∠D is right, by Proposition I.47 (Pythagoras), CB² = CD² + DB². True? (yes/no):`,
    hint: `In right triangles, the square on the hypotenuse equals the sum of squares on the sides.` },
  { q: `Also, in right triangle ADB, AB² = AD² + DB². Correct? (yes/no):`,
    hint: `Another direct use of I.47.` },
  { q: `Therefore, CB² = CA² + AB² + 2·CA·AD. Do you see this conclusion? (yes/no):`,
    hint: `Substitute AB² = AD² + DB² into the earlier equality.` },
  { q: `So CB² is greater than CA² + AB² by twice CA x AD. Do you agree? (yes/no):`,
    hint: `The “greater” part comes from the extra rectangle term.` }
];

const conclusion = `Congratulations! You just proved that in an obtuse triangle, the square on the side opposite the obtuse angle exceeds the sum of the squares on the containing sides by twice the rectangle of the side containing the obtuse angle (CA) and the external piece (AD).
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
