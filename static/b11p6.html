<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.6 – Prove that if two straight lines are at right angles to the same plane, the straight lines are parallel.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.6 chatbot!

We are given two straight lines AB and CD, each at right angles to the same plane. Do you agree? (yes/no):`,
    hint: `AB and CD are perpendicular to the plane of reference by assumption.` },

  { q: `Our goal is to prove that AB is parallel to CD. Does that make sense? (yes/no):`,
    hint: `Parallel lines are lines in the same plane that do not meet.` },

  { q: `Let AB and CD meet the plane at points B and D, respectively. Shall we join BD? (yes/no):`,
    hint: `Joining points in a plane with a straight line is always possible (Postulate 1).` },

  { q: `In the plane, draw DE at right angles to BD. Shall we make DE equal to AB? (yes/no):`,
    hint: `We can draw a line in the plane perpendicular to BD and set its length equal to AB.` },

  { q: `Can we now join BE, AE, and AD? (yes/no):`,
    hint: `Lines connecting points in a plane can always be drawn (Postulate 1).` },

  { q: `Since AB is perpendicular to the plane, will it also be perpendicular to all lines in the plane that meet it? (yes/no):`,
    hint: `By Definition XI.3, a line perpendicular to a plane is perpendicular to all lines in that plane through the foot.` },

  { q: `Therefore, are the angles ABD and ABE right angles? (yes/no):`,
    hint: `Both BD and BE lie in the plane and meet AB, so each forms a right angle at B.` },

  { q: `Similarly, are the angles CDB and CDE right angles? (yes/no):`,
    hint: `Same reasoning: CD is perpendicular to the plane.` },

  { q: `AB = DE and BD = DB; they include right angles. Can we conclude AD = BE? (yes/no):`,
    hint: `Proposition I.4 (SAS) states that two triangles with two sides and the included angle equal have equal bases.` },

  { q: `AB = DE and AD = BE, with common base AE. Can we conclude ∠ABE = ∠EDA? (yes/no):`,
    hint: `Proposition I.8 applies: equality of sides implies equality of corresponding angles.` },

  { q: `Since ∠ABE is right, is ∠EDA also right? (yes/no):`,
    hint: `Equal angles to a right angle are right angles.` },

  { q: `Then ED is at right angles to DA. Shall we agree? (yes/no):`,
    hint: `A line forming a right angle with a given line is perpendicular to it.` },

  { q: `Since ED is at right angles to BD, DA, and DC, are the three lines in one plane? (yes/no):`,
    hint: `By Proposition XI.5, three lines meeting at a point with one perpendicular to all lie in the same plane.` },

  { q: `Since AB, BD, and DA are in one plane, is AB in the same plane as BD and DC? (yes/no):`,
    hint: `Every triangle lies in a plane (XI.2).` },

  { q: `Each of the angles ABD and BDC is right. Therefore, is AB parallel to CD? (yes/no):`,
    hint: `By Proposition I.28, lines in a plane making equal corresponding angles with a transversal are parallel.` },

  { q: `Our goal is achieved: AB is parallel to CD. Do you agree? (yes/no):`,
    hint: `Q.E.D. This concludes the proof.` }
]

const conclusion = `Congratulations! You just if two straight lines are at right angles to the same plane, the straight lines are parallel.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
