<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>V.3 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>V.3 - Prove that if two pairs of magnitudes are in the same multiple ratio, then equal multiples of them are also in the same ratio</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements V.3 chatbot!

We are given four magnitudes, A, B, C, and D, such that A is proportional to B and C is proportional to D. Do you agree? (yes/no):`,
    hint: `“Having the same ratio” means A is to B as C is to D.` },
  { q: `Our goal is to show that taking equimultiples of A and C, and (possibly different) equimultiples of B and D, preserves the equality of ratios. Does that make sense? (yes/no):`,
    hint: `We want the proportionality to remain true after multiplying the antecedents and consequents.` },
  { q: `Let E and F be equimultiples of A and C, respectively. Can we do this? (yes/no):`,
    hint: `Book V, Def. 2: we may take any multiples of given magnitudes.` },
  { q: `Also, let G and H be equimultiples of B and D, respectively. Possible? (yes/no):`,
    hint: `We choose (independently) multiples of B and D for comparison.` },
  { q: `Now take equimultiples K and L of E and F, and M and N of G and H. Agreed? (yes/no):`,
    hint: `We form “second-level” equimultiples to use Euclid’s Def. 5 test.` },
  { q: `Since E is the same multiple of A that F is of C, and K, L are equimultiples of E, F, is K the same multiple of A that L is of C? (yes/no):`,
    hint: `Prop. V.3: equimultiples of equimultiples preserve the multiple relation.` },
  { q: `Likewise, since G is the same multiple of B that H is of D, are M and N the same multiples of B and D, respectively? (yes/no):`,
    hint: `The same Prop. V.3 reasoning applies to G, H.` },
  { q: `Given A : B = C : D, if K > M, does it follow that L > N? (yes/no):`,
    hint: `Book V, Def. 5: comparisons of equimultiples characterize equal ratios.` },
  { q: `And if K = M, then L = N; if K < M, then L < N. Is that consistent? (yes/no):`,
    hint: `All three comparative cases (>, =, <) must match for equal ratios.` },
  { q: `Since K, L are equimultiples of E, F and M, N of G, H with matching comparisons, do we conclude E : G = F : H? (yes/no):`,
    hint: `By Def. 5 again, equality of ratios is preserved for the chosen multiples.` }
];

const conclusion = `Congratulations! You just proved that if two pairs of magnitudes are in the same multiple ratio, then equal multiples of them are also in the same ratio.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
