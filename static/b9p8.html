<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.8 — Prove that numbers in continued proportion become square, cube, or both</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.8 chatbot!

We are given numbers A, B, C, D, E, F, that beginning from an unit are all in continued proportion. Do you agree? (yes/no):`,
    hint: `“Continued proportion” means: 1:A = A:B = B:C = C:D = D:E = E:F.` },

  { q: `Our goal is to show (i) the third number from the unit (B) is square, (ii) the fourth (C) is cube, (iii) the seventh (F) is both square and cube, and also show the same for numbers that “leave out” 1, 2, or 5 respectively. Does that make sense? (yes/no):`,
    hint: `“Leave out one/two/five” means skip 1, 2, or 5 intermediate terms in the continued proportion.` },

  /* ---------------------- PART 1: Showing B is square ---------------------- */

  { q: `Since the unit, A, B are in continued proportion, is it true that the unit is to A as A is to B? (yes/no):`,
    hint: `The first three numbers follow the same ratio.` },

  { q: `If the unit is to A as A is to B, does the unit measure A the same number of times that A measures B? (yes/no):`,
    hint: `VII.Def.20: equal ratios imply equal numbers of measures.` },

  { q: `Does the unit measure A according to the units in A? (yes/no):`,
    hint: `A contains exactly A units.` },

  { q: `Then does A measure B according to the units in A? (yes/no):`,
    hint: `Because 1:A = A:B, A must measure B as many times as 1 measures A.` },

  { q: `If A multiplied by itself makes B, is B a square number? (yes/no):`,
    hint: `A·A = B means B is the square on A.` },

  { q: `Do B, C, D also lie in continued proportion? (yes/no):`,
    hint: `A:B = B:C = C:D ensures the sequence continues.` },

  { q: `If B is square and B, C, D are in continued proportion, does Euclid VIII.22 tell us that D is also square? (yes/no):`,
    hint: `In a continued proportion, every second number after a square is also square.` },

  { q: `By the same reasoning, is F (the seventh number in continued proportion) also square? (yes/no):`,
    hint: `F is also two steps after a square in the continued sequence.` },

  { q: `Therefore, do all numbers that leave out one (every second number after a square) become square? (yes/no):`,
    hint: `This matches the “leave out one” pattern described in VIII.22.` },

  /* ---------------------- PART 2: Showing C is cube ---------------------- */

  { q: `Since the unit, A, B, C are in continued proportion, do we have an unit to A as B is to C? (yes/no):`,
    hint: `1:A = A:B = B:C; we use the equality 1:A = B:C.` },

  { q: `If the unit is to A as B is to C, does the unit measure A the same number of times that B measures C? (yes/no):`,
    hint: `VII.Def.20: equal ratios reflect equal counts of measurement.` },

  { q: `If the unit measures A according to the units in A, does B measure C according to the units in A? (yes/no):`,
    hint: `Replace the unit’s count of A with B’s count of C.` },

  { q: `If A multiplied by B makes C, is this consistent with C being a cube once we know that A multiplied by itself makes B? (yes/no):`,
    hint: `A·A = B and A·B = C imply A·A·A = C.` },

  { q: `Thus is C cube? (yes/no):`,
    hint: `A³ = C shows C is cube.` },

  { q: `Do C, D, E, F lie in continued proportion? (yes/no):`,
    hint: `The sequence continues without interruption.` },

  { q: `If C is cube and C, D, E, F are in continued proportion, does Euclid VIII.23 tell us that F is also cube? (yes/no):`,
    hint: `Every third number after a cube in continued proportion is also cube.` },

  { q: `Was F already proved square? (yes/no):`,
    hint: `Yes, from Part 1 using VIII.22.` },

  { q: `If F is both square and cube, is the seventh number from the unit both square and cube? (yes/no):`,
    hint: `F is the seventh term: 1, A, B, C, D, E, F.` },

  { q: `Do all the numbers that leave out five (every sixth after the first) also become both square and cube? (yes/no):`,
    hint: `The same proportional pattern repeats indefinitely along the progression.` }
]








const conclusion = `Congratulations! You just proved that numbers in continued proportion become square, cube, or both.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
