<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.15</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.15 – Prove that if two straight lines which meet one another are parallel to two straight lines which meet one another, not being in the same plane, the planes containing them are parallel.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.15 chatbot!

We are given two straight lines AB and BC meeting one another. Do you agree? (yes/no):`,
    hint: `They intersect at the point B.` },

  { q: `We are also given two straight lines DE and EF meeting one another. Agreed? (yes/no):`,
    hint: `They intersect at point E.` },

  { q: `And AB is parallel to DE, and BC is parallel to EF, while the pairs are not in the same plane. Is that correct? (yes/no):`,
    hint: `The proposition assumes the pairs of lines lie in different planes.` },

  { q: `Our goal is to show that the plane through AB, BC is parallel to the plane through DE, EF. Does that make sense? (yes/no):`,
    hint: `We want to prove the planes do not meet.` },

  { q: `Let a straight line BG be drawn from point B perpendicular to the plane through DE, EF. Is this construction allowed? (yes/no):`,
    hint: `Proposition XI.11 allows drawing a perpendicular from a point to a plane.` },

  { q: `Let BG meet the plane through DE, EF at point G. Do you see that such a point G exists? (yes/no):`,
    hint: `A perpendicular from a point to a plane meets the plane.` },

  { q: `Through point G, let GH be drawn parallel to DE. Is this possible? (yes/no):`,
    hint: `Proposition I.31 allows a parallel to be drawn through a given point.` },

  { q: `Through the same point G, let GK be drawn parallel to EF. Is this also possible? (yes/no):`,
    hint: `Again, Proposition I.31 applies.` },

  { q: `Since BG is perpendicular to the plane through DE, EF, does it make right angles with all straight lines in that plane which meet it? (yes/no):`,
    hint: `Definition XI.3 describes a line perpendicular to a plane.` },

  { q: `Do the straight lines GH and GK meet BG and lie in the plane through DE, EF? (yes/no):`,
    hint: `Both were drawn through G in that plane.` },

  { q: `Therefore, are the angles BGH and BGK right angles? (yes/no):`,
    hint: `Each is formed by BG with a line in the plane.` },

  { q: `Since BA is parallel to GH, are the angles GBA and BGH equal to two right angles? (yes/no):`,
    hint: `Proposition I.29: interior angles with a parallel equal two right angles.` },

  { q: `But angle BGH is a right angle; therefore is angle GBA also a right angle? (yes/no):`,
    hint: `If two angles together equal two right angles and one is right, the other is right.` },

  { q: `Therefore, is GB at right angles to BA? (yes/no):`,
    hint: `A right angle at B shows perpendicularity.` },

  { q: `By the same reasoning, is GB also at right angles to BC? (yes/no):`,
    hint: `BC is parallel to EF, which corresponds to GK.` },

  { q: `Since GB is at right angles to both BA and BC, which cut one another, is GB perpendicular to the plane through BA, BC? (yes/no):`,
    hint: `Proposition XI.4 applies.` },

  { q: `Are planes to which the same straight line is at right angles parallel to one another? (yes/no):`,
    hint: `Proposition XI.14.` },

  { q: `Therefore, is the plane through AB, BC parallel to the plane through DE, EF? (yes/no):`,
    hint: `Both planes are perpendicular to GB.` }
]

const conclusion = `Congratulations! You just if two straight lines which meet one another are parallel to two straight lines which meet one another, not being in the same plane, the planes containing them are parallel.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
