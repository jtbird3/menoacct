<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements X.51</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>X.51 – Find the fourth binomial straight line.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
{ q: `Welcome to Elements X.51 chatbot!

We are given two numbers AC and CB, arranged so that AB has not to BC, nor yet to AC, the ratio which a square number has to a square number. Do you agree? (yes/no):`,
    hint: `This means neither AB:BC nor AB:AC is a square-number ratio.` },
    
    { q: `Let a rational straight line D be set out. Do you see that this is given? (yes/no):`,
    hint: `A rational straight line is assumed as given in the proposition.` },
    { q: `Let EF be commensurable in length with D. Is this possible? (yes/no):`,
    hint: `A straight line commensurable in length with a rational line can be taken.` },
    { q: `So is EF also a rational straight line? (yes/no):`,
    hint: `Commensurable in length with a rational line implies rational.` },
    
    { q: `Let it be contrived that, as the number BA is to AC, so is the square on EF to the square on FG. Can this be arranged? (yes/no):`,
    hint: `This follows from Proposition X.6 (Porism).` },
    { q: `From this, is the square on EF commensurable with the square on FG? (yes/no):`,
    hint: `By X.6, having a ratio equal to a number-to-number ratio makes the squares commensurable.` },
    { q: `Therefore, is FG also a rational straight line? (yes/no):`,
    hint: `A square commensurable with a rational square is rational, hence its side is rational.` },
    
    { q: `Now, since BA has not to AC the ratio which a square number has to a square number, does the square on EF also fail to have to the square on FG such a ratio? (yes/no):`,
    hint: `Because EF²:FG² was constructed equal to BA:AC, it inherits the same “not a square-number ratio” character.` },
    { q: `Therefore, is EF incommensurable in length with FG? (yes/no):`,
    hint: `By Proposition X.9: if the ratio of squares is not that of square numbers, the sides are incommensurable in length.` },
    
    { q: `Are EF and FG rational straight lines commensurable in square only? (yes/no):`,
    hint: `They are rational, their squares are commensurable, but they are incommensurable in length.` },
    { q: `So is EG a binomial straight line? (yes/no):`,
    hint: `By Proposition X.36, the sum of two rational straight lines commensurable in square only is binomial.` },
    
    { q: `Our goal is to show that EG is not just binomial, but a fourth binomial straight line. Does that make sense? (yes/no):`,
    hint: `We must verify the defining conditions of a fourth binomial.` },
    
    { q: `Since, as BA is to AC, so is the square on EF to the square on FG, is the square on EF greater than the square on FG? (yes/no):`,
    hint: `Because AB = AC + CB, we have AB > AC, hence EF² > FG² in the equal ratio.` },
    { q: `Let the square on H together with the square on FG be equal to the square on EF. Is this construction allowed? (yes/no):`,
    hint: `Since EF² > FG², the excess EF² − FG² can be represented as the square on some straight line H.` },
    
    { q: `Therefore, convertendo, as the number AB is to BC, so is the square on EF to the square on H. Do you agree? (yes/no):`,
    hint: `From AB:AC = EF²:FG² and AB = AC + CB, conversion gives AB:CB = EF²:(EF²−FG²) = EF²:H².` },
    { q: `But since AB has not to BC the ratio which a square number has to a square number, does the square on EF also fail to have to the square on H such a ratio? (yes/no):`,
    hint: `Because EF²:H² equals AB:BC, it shares the same “not a square-number ratio” property.` },
    { q: `Therefore, is EF incommensurable in length with H? (yes/no):`,
    hint: `By Proposition X.9 again.` },
    { q: `So is the square on EF greater than the square on FG by the square on a straight line incommensurable with EF? (yes/no):`,
    hint: `EF² = FG² + H², and H is incommensurable in length with EF.` },
    
    { q: `We have EF and FG rational straight lines commensurable in square only, and EF commensurable in length with D. Do you agree? (yes/no):`,
    hint: `These were established from the constructions and from EF’s commensurability with the rational line D.` },
    { q: `Therefore, does EG satisfy the definition of a fourth binomial straight line? (yes/no):`,
    hint: `Its terms are rational and commensurable in square only; the square on the greater exceeds the square on the lesser by the square on a line incommensurable in length with the greater; and the greater term is commensurable in length with the given rational line D.` },
    { q: `Therefore, is EG a fourth binomial straight line? (yes/no):`,
    hint: `All defining conditions have been verified.` }
]

const conclusion = `Congratulations! You just found the fourth binomial straight line.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
