<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XIII.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XIII.5 – Prove that if a straight line is cut in extreme and mean ratio, and a straight line equal to the greater segment is added to it, then the whole straight line is again cut in extreme and mean ratio, and the original straight line is the greater segment.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XIII.5 chatbot!

We are given a straight line AB cut at point C in extreme and mean ratio, with AC the greater segment. Do you agree? (yes/no):`,
    hint: `“Extreme and mean ratio” means AB : AC = AC : CB.` },

  { q: `A straight line AD is added such that AD is equal to AC. Is that given? (yes/no):`,
    hint: `AD is constructed equal to the greater segment AC.` },

  { q: `Our goal is to show that DB is cut in extreme and mean ratio at A, and that AB is the greater segment. Does that make sense? (yes/no):`,
    hint: `We want DB : BA = BA : AD, with BA > AD.` },

  { q: `Let the square AE be described on AB, and let the figure be drawn. Can we do this? (yes/no):`,
    hint: `A square can be described on any straight line.` },

  { q: `Since AB has been cut in extreme and mean ratio at C, is the rectangle AB, BC equal to the square on AC? (yes/no):`,
    hint: `By VI. Definition 3 and VI.17.` },

  { q: `Is CE the rectangle AB, BC, and is CH the square on AC? (yes/no):`,
    hint: `These are parts of the constructed figure.` },

  { q: `Since the rectangle AB, BC equals the square on AC, is CE equal to CH? (yes/no):`,
    hint: `Equal magnitudes are equal to one another.` },

  { q: `Is HE equal to CE, and is DH equal to HC? (yes/no):`,
    hint: `These are corresponding equal parts in the construction.` },

  { q: `If CE = HC, and HE = CE, and DH = HC, does it follow that DH = HE? (yes/no):`,
    hint: `Things equal to the same thing are equal to one another (Common Notion 1).` },

  { q: `Does it then follow that the whole DK is equal to the whole AE? (yes/no):`,
    hint: `Equals added to equals give equals.` },

  { q: `Is DK the rectangle BD, DA, since AD is equal to DL? (yes/no):`,
    hint: `By construction, DA equals the corresponding segment.` },

  { q: `Is AE the square on AB? (yes/no):`,
    hint: `AE was described as the square on AB.` },

  { q: `Therefore, is the rectangle BD, DA equal to the square on AB? (yes/no):`,
    hint: `DK = AE, and these represent those magnitudes.` },

  { q: `From this, can we conclude that as DB is to BA, so is BA to AD? (yes/no):`,
    hint: `This follows from VI.17.` },

  { q: `Is DB greater than BA? (yes/no):`,
    hint: `DB contains BA as a part.` },

  { q: `If DB is greater than BA, does it follow that BA is greater than AD? (yes/no):`,
    hint: `By V.14, the greater ratio corresponds to the greater magnitude.` },

  { q: `Therefore, has DB been cut in extreme and mean ratio at A, and is AB the greater segment? (yes/no):`,
    hint: `This matches exactly the definition of extreme and mean ratio.` }
]

const conclusion = `Congratulations! You just proved that if a straight line is cut in extreme and mean ratio, and a straight line equal to the greater segment is added to it, then the whole straight line is again cut in extreme and mean ratio, and the original straight line is the greater segment.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
