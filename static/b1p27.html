<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>I.27 — MenoChat (Toggle: Pure ↔ Graph)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>I.27 — prove lines parallel by equal alternate angles</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Euclid's Elements I.27 chatbot!

We are given two straight lines AB and CD, with a transversal EF crossing them. Do you agree? (yes/no):`,
    hint: `EF "falls on" AB and CD, creating angles at AEF and EFD.` },
  { q: `Our goal is to prove that AB is parallel to CD if ∠AEF = ∠EFD. Does that make sense? (yes/no):`,
    hint: `This is the enunciation: equality of alternate angles implies parallelism.` },
  { q: `Suppose ∠AEF = ∠EFD. Do you see that these are alternate angles? (yes/no):`,
    hint: `Alternate angles are inside the two lines, on opposite sides of the transversal.` },
  { q: `Now, if AB and CD are not parallel, would they meet when produced? (yes/no):`,
    hint: `By definition, non-parallel straight lines, when extended, must intersect.` },
  { q: `Let them meet on the side of points B and D, at point G. Possible? (yes/no):`,
    hint: `Any two non-parallel lines intersect at some point when produced.` },
  { q: `Then consider triangle GEF. In that triangle, is ∠AEF an exterior angle at vertex E? (yes/no):`,
    hint: `Extending side GE past E makes ∠AEF an exterior angle to △GEF.` },
  { q: `Is ∠EFG the interior opposite angle of that exterior angle? (yes/no):`,
    hint: `In △GEF, the angle at F is opposite the exterior angle at E.` },
  { q: `But we assumed ∠AEF = ∠EFD. Does this make the exterior angle equal to the opposite interior angle? (yes/no):`,
    hint: `Yes — which contradicts Proposition I.16 (an exterior angle is greater than the interior opposite angle).` },
  { q: `So is it impossible that AB and CD meet towards B and D? (yes/no):`,
    hint: `Because it contradicts I.16, they cannot intersect that way.` },
  { q: `By a similar argument, can they meet towards A and C? (yes/no):`,
    hint: `The same contradiction arises on the other side.` },
  { q: `If AB and CD do not meet in either direction, must they be parallel? (yes/no):`,
    hint: `By Definition 23: lines that do not meet in either direction are parallel.` },
  { q: `Therefore, from ∠AEF = ∠EFD, can we conclude AB ∥ CD? (yes/no):`,
    hint: `Yes, that is exactly what the definition states.` }
];

const conclusion = `Congratulations! You have shown that if a straight line falling across two lines makes alternate angles equal, then the two lines are parallel!
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
