<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>III.17 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>III.17 - Draw a straight line touching a given circle from a given point.</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to the III.17 chatbot!

We are given a point A and a circle BCD. Do you agree? (yes/no):`,
    hint: `A is any fixed point outside the circle; BCD is the given circle.` },
  { q: `Our goal is to draw from point A a straight line that touches the circle BCD. Does that make sense? (yes/no):`,
    hint: `A tangent line touches the circle at exactly one point.` },
  { q: `First, find the center E of the circle BCD. Can we do that? (yes/no):`,
    hint: `By Proposition III.1, the center of any circle can be found.` },
  { q: `Next, join the line AE from A to the center E. Is this possible? (yes/no):`,
    hint: `Postulate 1: a straight line can be drawn from any point to any point.` },
  { q: `Now, with center E and radius EA, draw another circle AFG. Can we do this? (yes/no):`,
    hint: `Postulate 3: a circle can be drawn with any center and distance.` },
  { q: `From point D on the circle BCD, draw DF perpendicular to AE. Do you see that this is possible? (yes/no):`,
    hint: `A line can be drawn at right angles to a given line from a given point (Proposition I.11).` },
  { q: `Join EF and also join AB. Is that allowed? (yes/no):`,
    hint: `Postulate 1: join any two points by a straight line.` },
  { q: `Now, notice AE = EF and ED = EB. Is that correct? (yes/no):`,
    hint: `AE and EF are radii of the circle AFG; ED and EB are radii of the circle BCD.` },
  { q: `Since AE = EF and EB = ED, and ∠AEB = ∠FED, can we say △BEA = △DEF by SAS? (yes/no):`,
    hint: `Proposition I.4: if two sides and the included angle are equal, then the triangles are equal.` },
  { q: `If △BEA = △DEF, does it follow that ∠EBA = ∠EDF? (yes/no):`,
    hint: `Equal triangles have equal corresponding angles.` },
  { q: `But ∠EDF is a right angle. So is ∠EBA also a right angle? (yes/no):`,
    hint: `Equal angles to a right angle must also be right.` },
  { q: `Now, EB is a radius of the circle. And a line drawn at right angles to a diameter at its extremity touches the circle. Does this apply here? (yes/no):`,
    hint: `Proposition III.16 (Porism): such a line is tangent to the circle.` },
  { q: `Therefore, does AB touch the circle BCD at point B? (yes/no):`,
    hint: `Yes, AB is tangent at B.` }
];

const conclusion = `Congratulations! You have draw a straight line touching a given circle from a given point.
Q.E.F. (Quod Erat Faciendum — which was to be done).`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
