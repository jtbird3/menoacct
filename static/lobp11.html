<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Theory of Parallels Theorem 11 — MenoChat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>Theorem 11 — A line perpendicular to two lines in a plane is perpendicular to all lines through that point in the plane</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Lobachevsky's Theory of Parallels Theorem 11 chatbot!

Let line l pass through point O and be perpendicular to both line m and line n, where m and n lie in a plane P, and l itself is not in P. Do you accept this setup? (yes/no):`,
    hint: `We have a line l that sticks up perpendicularly from a plane, meeting it at O, and is perpendicular to two lines m and n within that plane.` },
  { q: `Let p be any other straight line lying in plane P and passing through O. Do you agree such lines exist? (yes/no):`,
    hint: `There are infinitely many lines in plane P passing through O — p is any one of them other than m and n.` },
  { q: `Choose points A on m and B on n equidistant from O (that is, OA = OB). Is this possible? (yes/no):`,
    hint: `We can always mark equal lengths along m and n from O.` },
  { q: `Let Q be a point on l distinct from O. Since l is perpendicular to m and n, triangles QOA and QOB are right triangles sharing leg QO and having OA = OB. By the Pythagorean theorem, QA = QB. Do you agree? (yes/no):`,
    hint: `In right triangles QOA and QOB, QO is common and OA = OB, so the hypotenuses QA and QB are equal.` },
  { q: `Line p in plane P meets segment AB at some point C (by Theorem 5, since p crosses from one side of AB to the other). Since OA = OB, triangle OAB is isosceles, so OC is perpendicular to AB and C is the midpoint of AB. Do you agree? (yes/no):`,
    hint: `The perpendicular from the apex of an isosceles triangle bisects the base. O is equidistant from A and B, so OC bisects AB at right angles.` },
  { q: `Since QA = QB as well, Q is also equidistant from A and B, so QC is also perpendicular to AB. Both QO and OC are perpendicular to AB and meet at O — does this force angle QOC = 90°, meaning l is perpendicular to p? (yes/no):`,
    hint: `In the plane QOC, both QO and OC are perpendicular to AB. Two lines in a plane both perpendicular to a third line are perpendicular to each other. So l ⊥ p.` }
];

const conclusion = `Congratulations! You just proved Theorem 11: a straight line which stands at right angles upon two other straight lines not in one plane with it is perpendicular to all straight lines drawn through the common intersection point in the plane of those two.
Q.E.D.`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
