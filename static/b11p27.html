<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XI.27</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XI.27 – Prove that on a given straight line to describe a parallelepipedal solid similar and similarly situated to a given parallelepipedal solid.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XI.27 chatbot!

We are given a straight line AB and a parallelepipedal solid CD. Do you agree? (yes/no):`,
    hint: `AB is the given straight line, and CD is the given solid.` },

  { q: `Our goal is to describe on the straight line AB a parallelepipedal solid similar and similarly situated to the given solid CD. Does that make sense? (yes/no):`,
    hint: `“Similar and similarly situated” means same shape and orientation, possibly different size.` },

  { q: `At the point A on the straight line AB, can we construct a solid angle equal to the solid angle at C of the given solid CD? (yes/no):`,
    hint: `A solid angle equal to a given solid angle can be constructed.` },

  { q: `Can we arrange this solid angle so that ∠BAH equals ∠ECF, ∠BAK equals ∠ECG, and ∠KAH equals ∠GCF? (yes/no):`,
    hint: `Each plane angle at A corresponds to a plane angle at C.` },

  { q: `Can we also contrive that, as EC is to CG, so BA is to AK? (yes/no):`,
    hint: `This fixes one proportional pair of corresponding edges.` },

  { q: `And can we further contrive that, as CG is to CF, so KA is to AH? (yes/no):`,
    hint: `This fixes a second proportional pair of edges.` },

  { q: `From these proportions, does it follow ex aequali that, as EC is to CF, so BA is to AH? (yes/no):`,
    hint: `This follows from proportional magnitudes taken in order (Elements V.22).` },

  { q: `Now, can we complete the parallelogram HB and the solid AL on the constructed lines? (yes/no):`,
    hint: `Completing the figure means drawing the remaining faces required for the solid.` },

  { q: `Since EC is to CG as BA is to AK, and the angles ECG and BAK are equal, are the sides about these equal angles proportional? (yes/no):`,
    hint: `Both the ratios of sides and the included angles agree.` },

  { q: `From this, is the parallelogram GE similar to the parallelogram KB? (yes/no):`,
    hint: `Parallelograms with proportional sides about equal angles are similar.` },

  { q: `By the same reasoning, is the parallelogram KH similar to the parallelogram GF? (yes/no):`,
    hint: `The same proportional construction applies.` },

  { q: `And similarly, is the parallelogram FE similar to the parallelogram HB? (yes/no):`,
    hint: `Corresponding faces are constructed in proportion.` },

  { q: `Therefore, are three parallelograms of the solid CD similar to three parallelograms of the solid AL? (yes/no):`,
    hint: `Each face of one solid corresponds to a similar face of the other.` },

  { q: `Are these three parallelograms in CD equal and similar to the three opposite parallelograms of the same solid? (yes/no):`,
    hint: `Opposite faces of a parallelepiped are equal and similar.` },

  { q: `Likewise, are the three corresponding parallelograms in AL equal and similar to their opposites? (yes/no):`,
    hint: `The same property holds for the constructed solid.` },

  { q: `From this, does it follow that the whole solid CD is similar to the whole solid AL? (yes/no):`,
    hint: `This matches the definition of similar solids (Elements XI, Definition 9).` },

  { q: `Therefore, has a parallelepipedal solid AL been described on the straight line AB similar and similarly situated to the given solid CD? (yes/no):`,
    hint: `This completes the required construction.` }
]

const conclusion = `Congratulations! You just on a given straight line to describe a parallelepipedal solid similar and similarly situated to a given parallelepipedal solid.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
