<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements IX.19</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>IX.19 — Investigate whether a fourth proportional can be found between three given numbers</h1>
<p>Type your answer and press enter.</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements IX.19 chatbot!

We are given three numbers A, B, and C. Do you agree? (yes/no):`, hint: `These are the three given numbers of the proposition.` },
{ q: `Our goal is to investigate when it is possible to find a fourth number proportional to A, B, and C. Does that make sense? (yes/no):`, hint: `A fourth proportional D satisfies: as A is to B, so is C to D.` },
{ q: `Do we see that there are four possible cases to consider, depending on 
(1) whether A, B, C are in continued proportion, 
(2) whether the extremes A and C are prime to one another? (yes/no):`, hint: `Euclid explicitly lists these four possibilities: 
(1) A, B, C are in continued proportion, and A, C are prime to one another; 
(2) A, B, C are in continued proportion, and A, C are not prime to one another; 
(3) A, B, C are not in continued proportion, and A, C are prime to one another; 
(4) A, B, C are not in continued proportion, and A, C are not prime to one another.` },

{ q: `Case 1: A, B, C are in continued proportion, and A, C are prime to one another. Has it already been proved that in this case it is impossible to find a fourth proportional? (yes/no):`, hint: `This follows from Proposition IX.17: if numbers are in continued proportion and their extremes are prime to one another, then the last has to no other number the ratio which the first has to the second.` },

{ q: `Case 2: A, B, C are not in continued proportion, and A, C are prime to one another. Let us suppose, if possible, that a fourth proportional D exists, so that as A is to B, so is C to D. Is this the correct assumption? (yes/no):`, hint: `This is a proof by contradiction.` },
{ q: `Now let it be contrived that as B is to C, so is D to a number E. Is this allowed? (yes/no):`, hint: `We may introduce a further proportional if needed.` },
{ q: `Since as A is to B, so is C to D, and as B is to C, so is D to E, can we conclude, ex aequali, that as A is to C, so is C to E? (yes/no):`, hint: `Proposition VII.14: equal numbers taken two by two in the same ratio are in the same ratio ex aequali.` },
{ q: `By assumption, are A and C are prime to one another, and therefore also least numbers? (yes/no):`, hint: `Prime numbers are least numbers (VII.21).` },
{ q: `Do least numbers measure those which have the same ratio, antecedent to antecedent? (yes/no):`, hint: `This is Proposition VII.20: least numbers with the same ratio measure equally: the greater measures the greater, and the less measures the less.` },
{ q: `Therefore, does A measure C? (yes/no):`, hint: `A is the antecedent corresponding to C.` },
{ q: `But does A also measure itself? (yes/no):`, hint: `Every number measures itself.` },
{ q: `Then does A measure both A and C, which are prime to one another? (yes/no):`, hint: `This contradicts the definition of prime numbers.` },
{ q: `Is this impossible? (yes/no):`, hint: `Prime numbers have no common measure.` },
{ q: `Therefore, is it impossible to find a fourth proportional to A, B, C in this case? (yes/no):`, hint: `This follows from the contradiction.` },

{ q: `Case 3: A, B, C are in continued proportion, and A, C are not prime to one another. Let B multiply C to make D. Do you agree this defines D? (yes/no):`, hint: `D is the product of B and C.` },
{ q: `Now either A measures D, or it does not. Is that correct? (yes/no):`, hint: `These are the only two possibilities.` },

{ q: `Subcase 3a: A measures D. Let A measure D according to E, so that A multiplied by E equals D, do you agree? (yes/no):`, hint: `This is the definition of “measures.”` },
{ q: `Since B multiplied by C also equals D, are the products A,E and B,C equal? (yes/no):`, hint: `Both equal D.` },
{ q: `From equality of products, do we conclude proportionally that as A is to B, so is C to E? (yes/no):`, hint: `This follows from Proposition VII.19.` },
{ q: `Have we therefore found E as a fourth proportional to A, B, C? (yes/no):`, hint: `` },

{ q: `Subcase 3b: A does not measure D. If we suppose, for contradiction, that a fourth proportional E exists, does it follow that we have product A,E equals B,C? (yes/no):`, hint: `This is again Proposition VII.19.` },
{ q: `But since B·C equals D, does A·E also equal D? (yes/no):`, hint: `Both equal the same product.` },
{ q: `Does this imply that A measures D? (yes/no):`, hint: `A multiplied by E gives D.` },
{ q: `But was it assumed that A does not measure D? (yes/no):`, hint: `This was the hypothesis of the subcase.` },
{ q: `Is this a contradiction? (yes/no):`, hint: ``},
{ q: `Therefore, is it impossible to find a fourth proportional in this subcase? (yes/no):`, hint:`` },

{ q: `A, B, C are not in continued proportion, and A, C are not prime to one another. Let B multiply C to make D. Is this construction the same as before? (yes/no):`, hint: `The same product D is used.` },
{ q: `Can it similarly be proved that if A measures D, a fourth proportional exists, but if it does not measure D, none exists? (yes/no):`, hint: `The reasoning follows the same steps as the previous case.` },

{ q: `Have we now fully determined in which cases a fourth proportional to three given numbers can or cannot be found? (yes/no):`, hint: `All possible configurations have been examined.` },
]







const conclusion = `Congratulations! You just investigated whether a third proportional can be found between three given numbers.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
