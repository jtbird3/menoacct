<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Elements XII.16</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #ffffff;
      color: #000;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    #chat {
      border: 1px solid #ccc;
      padding: 10px;
      min-height: 200px;
      white-space: pre-wrap;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #inputArea {
      margin-top: 10px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
    }

    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        padding: 15px;
        padding-bottom: 100px;
      }

      h1 { font-size: 20px; }

      #inputArea {
        display: none;
      }

      .mobile-buttons {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #ccc;
        padding: 15px;
        display: flex;
        gap: 15px;
        justify-content: center;
        z-index: 1000;
      }

      .mobile-btn {
        flex: 1;
        max-width: 120px;
        padding: 15px 20px;
        font-size: 18px;
        font-weight: bold;
        border: 2px solid #000;
        background: #fff;
        color: #000;
        cursor: pointer;
        font-family: inherit;
        border-radius: 0;
        user-select: none;
        text-align: center;
      }

      .mobile-btn:active {
        background: #000;
        color: #fff;
      }

      .mobile-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    }

    /* Hide mobile buttons on desktop */
    .mobile-buttons {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-buttons {
        display: flex;
      }
    }
  </style>
</head>
<body>

<h1>XII.16 – Prove that, given two concentric circles, it is possible to inscribe in the greater circle an equilateral polygon with an even number of sides that does not meet the lesser circle.</h1>
<p>Type your answer and press enter.</p>
<div id="chat"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Type 'yes' or 'no'..." autofocus>
</div>

<!-- Mobile buttons -->
<div class="mobile-buttons">
  <button class="mobile-btn" id="mobileYes">YES</button>
  <button class="mobile-btn" id="mobileNo">NO</button>
</div>

<script>
const steps = [
  { q: `Welcome to Elements XII.16 chatbot!

We are given two circles ABCD and EFGH having the same centre K. Do you agree? (yes/no):`,
    hint: `The circles are concentric, meaning they share the common centre K.` },

  { q: `Let the greater circle be ABCD and the lesser circle be EFGH. Is that clear? (yes/no):`,
    hint: `The construction will take place in the greater circle.` },

  { q: `First, draw the straight line BD through the centre K. Can we do this? (yes/no):`,
    hint: `A straight line can be drawn through any two points (Postulate 1).` },

  { q: `From point G, draw GA at right angles to BD, and produce it to meet the circumference at C. Is this construction possible? (yes/no):`,
    hint: `A perpendicular can be drawn from a point to a straight line, and a straight line can be produced further (Postulates 1 and 2).` },

  { q: `Does the straight line AC touch the lesser circle EFGH? (yes/no):`,
    hint: `By Proposition III.16 (Porism), the perpendicular from a point on a circle to a diameter touches the circle.` },

  { q: `Now, bisect the circumference BAD of the greater circle. Can we do this? (yes/no):`,
    hint: `A circumference can be bisected by standard Euclidean constructions.` },

  { q: `Next, bisect the half again, and continue this process repeatedly. Is this allowed? (yes/no):`,
    hint: `Repeated bisection of a magnitude is permitted (Book X methods).` },

  { q: `By continuing this process, do we eventually leave a circumference less than the straight line AD? (yes/no):`,
    hint: `By Proposition X.1, continual bisection will produce a remainder smaller than any given magnitude.` },

  { q: `Let the remaining arc be LD. Do you accept this? (yes/no):`,
    hint: `LD denotes the small remaining arc on the circumference.` },

  { q: `From point L, draw LM perpendicular to BD and produce it to N. Can we do this? (yes/no):`,
    hint: `As before, perpendiculars and produced straight lines are allowed.` },

  { q: `Join the straight lines LD and DN. Is this possible? (yes/no):`,
    hint: `A straight line can be drawn between any two points (Postulate 1).` },

  { q: `Is LD equal in length to DN? (yes/no):`,
    hint: `Equal arcs subtend equal chords, and by symmetry with perpendiculars, the resulting triangles are equal (III.3, I.4).` },

  { q: `Since LN is parallel to AC, do you agree that LN does not touch the lesser circle EFGH? (yes/no):`,
    hint: `Parallel lines remain everywhere equidistant; since AC touches EFGH, a parallel through L will lie outside it.` },

  { q: `Therefore, do the straight lines LD and DN also remain clear of the lesser circle EFGH? (yes/no):`,
    hint: `These lines lie farther from the centre than LN, so they cannot touch the inner circle.` },

  { q: `If we now fit into the circumference of the greater circle ABCD straight lines equal to LD, placed continuously, do we form a polygon? (yes/no):`,
    hint: `Equal straight lines fitted successively around a circle form an equilateral polygon.` },

  { q: `Will this polygon have an even number of sides? (yes/no):`,
    hint: `The construction is symmetric about the diameter BD, producing pairs of equal sides.` },

  { q: `Does this equilateral polygon lie entirely in the greater circle and avoid touching the lesser circle EFGH? (yes/no):`,
    hint: `Each side is equal to LD and DN, which were shown not to touch the inner circle.` },

  { q: `Our goal is to inscribe in the greater circle an equilateral polygon with an even number of sides which does not touch the lesser circle. Does that make sense? (yes/no):`,
    hint: `This restates exactly what has now been constructed.` },

  { q: `Therefore, have we inscribed in the greater circle ABCD an equilateral polygon with an even number of sides which does not touch the circle EFGH? (yes/no):`,
    hint: `This is the exact consclusion` }
]

const conclusion = `Congratulations! You just prove that, given two concentric circles, it is possible to inscribe in the greater circle an equilateral polygon with an even number of sides that does not meet the lesser circle.
Q.E.D. (Quod Erat Demonstrandum — which was to be demonstrated)`;

let currentStep = 0;
const chatDiv = document.getElementById('chat');
const inputField = document.getElementById('userInput');

let isMobile = window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

function addMessage(text, role = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showStep() {
  if (currentStep < steps.length) {
    addMessage(steps[currentStep].q, 'bot');
  } else {
    addMessage(conclusion, 'bot');
    inputField.disabled = true;
    document.getElementById('mobileYes').disabled = true;
    document.getElementById('mobileNo').disabled = true;
  }
}

function processAnswer(answer) {
  addMessage(answer, 'user');
  if (answer.toLowerCase() === 'yes' || answer.toLowerCase() === 'y') {
    currentStep++;
    showStep();
  } else if (answer.toLowerCase() === 'no' || answer.toLowerCase() === 'n') {
    addMessage(`Hint: ${steps[currentStep].hint}`, 'bot');
  } else {
    addMessage(`Please answer 'yes' or 'no'.`, 'bot');
  }
}

inputField.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const answer = inputField.value.trim();
    if (answer) {
      processAnswer(answer);
      inputField.value = '';
    }
  }
});

document.getElementById('mobileYes').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('yes');
  }
});

document.getElementById('mobileNo').addEventListener('click', function() {
  if (isMobile) {
    processAnswer('no');
  }
});

showStep();
</script>

</body>
</html>
