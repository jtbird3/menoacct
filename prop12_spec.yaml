steps:
- type: yn
  q: Let AB be the given infinite straight line, and C the given point not on it.
    Do you see that setup in the figure?
  false: AB is the long horizontal straight line, extended in both directions, and
    C is the point above it.
  text: Let AB be the given infinite straight line, and C the given point not on it.
  just: null
  side: 'Given: infinite AB, point C off it'
  reveal: []
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: yn
  q: And our task is to draw from C to AB a straight line perpendicular to AB. Does
    that make sense?
  false: We want a line from the outside point C that meets AB at a right angle.
  text: Thus it is required to draw from the given point C to the given infinite straight
    line AB a perpendicular straight line.
  just: null
  side: 'Goal: draw a perpendicular from C'
  reveal: []
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: draw
  q: Let a point D be taken at random on the other side of AB from C. Shall we place
    it?
  false: null
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
  text: Let a point D be taken at random on the other side of AB from C.
  just: null
  side: Take D below AB
  reveal:
  - dc-d
- type: draw
  q: Now with center C and distance CD, let the circle EFG be described. Shall we
    draw it?
  false: null
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
  text: With center C and distance CD let the circle EFG be described.
  just: Post. 3
  side: Draw circle centered at C
  reveal:
  - dc-circle
- type: draw
  q: Let the straight line EG be bisected at H. Shall we mark the midpoint H?
  false: null
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
  text: Let the straight line EG be bisected at H.
  just: I.10
  side: Bisect EG at H
  reveal:
  - dc-h
- type: draw
  q: And let the straight lines CG, CH, and CE be joined. Shall we draw them?
  false: null
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
  text: And let the straight lines CG, CH, and CE be joined.
  just: Post. 1
  side: Join CG, CH, CE
  reveal:
  - dc-joins
- type: yn
  q: Euclid now claims that CH has been drawn perpendicular to AB from the given point
    C. Is that the claim we are proving?
  false: Yes. The whole point of the construction is to show that CH meets AB at a
    right angle.
  text: I say that CH has been drawn perpendicular to the given infinite straight
    line AB from the given point C.
  just: null
  side: 'Claim: CH is perpendicular to AB'
  reveal: []
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: open
  q: Since EG was bisected at H, what follows about GH and HE?
  false: null
  criteria: GH is equal to HE.
  hint: A point that bisects a line cuts it into two equal parts.
  hint_linked_idx: 4
  display_linked_idx: null
  text: For, since GH is equal to HE,
  just: I.10
  side: GH = HE
  reveal: []
  ok_regex: gh.*he|he.*gh|equal|same|half|bisect
  ok_targets:
  - GH
  - HE
  - equal
  - same
  - bisect
  - half
- type: open
  q: What side is common to triangles GHC and EHC?
  false: null
  criteria: HC is common to both triangles.
  hint: Both triangles use the segment from H to C.
  hint_linked_idx: 5
  display_linked_idx: null
  text: And HC is common,
  just: Common
  side: HC common
  reveal:
  - dc-common
  ok_regex: ^\s*(hc|ch)\s*$|(hc|ch).*common|common.*(hc|ch)|shared|same side
  ok_targets:
  - HC
  - CH
  - common
  - shared
  - same
- type: open
  q: And because G and E lie on the same circle with center C, what can we say about
    CG and CE?
  false: null
  criteria: CG is equal to CE, since they are radii of the same circle.
  hint: Any two radii of the same circle are equal.
  hint_linked_idx: 3
  display_linked_idx: null
  text: And the base CG is equal to the base CE,
  just: Radii of same circle
  side: CG = CE
  reveal:
  - dc-radii
  ok_regex: cg.*ce|ce.*cg|radii|radius|equal|same circle
  ok_targets:
  - CG
  - CE
  - radii
  - radius
  - equal
  - circle
- type: open
  q: So if GH = HE, HC is common, and CG = CE, what follows about angles CHG and EHC?
  false: null
  criteria: The angle CHG is equal to the angle EHC.
  hint: 'Apply I.8: equal sides in the two triangles give equality of the contained
    opposite angles.'
  hint_linked_idx: 9
  display_linked_idx: null
  text: Therefore the angle CHG is equal to the angle EHC.
  just: I.8
  side: ∠CHG = ∠EHC
  reveal:
  - dc-angleeq
  ok_regex: chg.*ehc|ehc.*chg|equal.*angle|same angle|i\.?8
  ok_targets:
  - CHG
  - EHC
  - equal
  - angle
  - I.8
  - same
- type: yn
  q: And are those equal angles adjacent angles?
  false: Yes. They sit next to one another on the straight line EHG.
  text: And they are adjacent angles.
  just: null
  side: Adjacent angles
  reveal:
  - dc-adjacent
  criteria: null
  hint: null
  hint_linked_idx: null
  display_linked_idx: null
- type: open
  q: When a straight line standing on another makes the adjacent angles equal, what
    must each of those angles be?
  false: null
  criteria: Each of them is right.
  hint: 'This is Euclid''s Definition 10: equal adjacent angles made this way are
    right angles.'
  hint_linked_idx: null
  display_linked_idx: null
  text: But when a straight line standing on a straight line makes the adjacent angles
    equal to one another, each of the equal angles is right.
  just: Def. 10
  side: Equal adjacent angles are right
  reveal:
  - dc-right
  ok_regex: right|right angles?|each.*right|def\.?\s*10
  ok_targets:
  - right
  - each
  - angle
  - Def. 10
- type: open
  q: Therefore, what follows about CH with respect to AB?
  false: null
  criteria: CH has been drawn perpendicular to AB from the point C.
  hint: A line that makes a right angle with another line is perpendicular to it.
  hint_linked_idx: 12
  display_linked_idx: null
  text: Therefore CH has been drawn perpendicular to the given infinite straight line
    AB from the given point C.
  just: null
  side: CH ⟂ AB
  reveal:
  - dc-result
  ok_regex: perpendicular|ch.*ab|ab.*ch|right angles?
  ok_targets:
  - perpendicular
  - CH
  - AB
  - right
- type: open
  q: Q.E.D. or Q.E.F.?
  false: null
  criteria: Q.E.F., because this proposition is a construction.
  hint: We were asked to draw something. Euclid closes constructions with Q.E.F.
  hint_linked_idx: null
  display_linked_idx: null
  text: Q.E.F.
  just: Q.E.F.
  side: Q.E.F.
  reveal: []
  ok_regex: q\.?e\.?f\.?|qef|faciendum|construction
  ok_targets:
  - QEF
  - faciendum
  - construction
