number: 12
title: Euclid I.12 — To a given infinite straight line, from a given point which is
  not on it, to draw a perpendicular straight line
enunciation: To a given infinite straight line, from a given point which is not on
  it, to draw a perpendicular straight line.
conclusion: Congratulations! You have completed Euclid's Elements Book I, Proposition
  12.
